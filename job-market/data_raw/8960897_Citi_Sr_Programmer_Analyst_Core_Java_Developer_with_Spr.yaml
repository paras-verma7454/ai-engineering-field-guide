description: |
  The Applications Development Senior Programmer Analyst is an
  intermediate-level position responsible for participating in
  the establishment and implementation of new or revised
  application systems and programs in coordination with the
  Technology team. This role requires a combination of
  advanced Java development skills and experience in
  leveraging AI-driven development tools, such as GitHub
  Copilot, for code generation, optimization, and automated
  testing to accelerate the software development lifecycle.
  The overall objective for this role is to contribute to
  applications systems analysis and programming activities.
  
  Responsibilities:
  
  - Conducting tasks related to feasibility studies, time and
    cost estimates, IT planning, and risk analysis for
    applications development.
  - Establishing and implementing new or revised applications
    systems and programs to meet specific business needs.
  - Monitoring and controlling all phases of the development
    process, including analysis, design, construction,
    testing, and implementation.
  - Integrating and deploying machine learning models and AI-
    powered features into Java-based enterprise applications.
  - Collaborating with data scientists and AI specialists to
    build scalable and secure AI solutions.
  - Applying Generative AI (GenAI) tools and techniques to
    accelerate development, optimize code, and improve
    documentation.
  - Providing user and operational support on applications to
    business users.
  - Utilizing in-depth specialty knowledge of applications
    development to analyze complex problems, provide
    evaluation of business processes, and make evaluative
    judgments.
  - Recommending and developing security measures in post-
    implementation analysis of business usage to ensure
    successful system design and functionality.
  - Consulting with users, clients, and other technology groups
    on issues and recommending advanced programming solutions.
  - Ensuring essential procedures are followed and helping
    define operating standards and processes.
  - Serving as an advisor or coach to new or lower-level
    analysts.
  - Operating with a limited level of direct supervision and
    exercising independence of judgment and autonomy.
  - Acting as a Subject Matter Expert to senior stakeholders and
    other team members.
  - Appropriately assessing risk when business decisions are
    made, demonstrating consideration for the firm's
    reputation and safeguarding Citigroup, its clients and
    assets, by driving compliance with applicable laws, rules
    and regulations, adhering to Policy, applying sound
    ethical judgment regarding personal behavior, conduct and
    business practices, and escalating, managing and reporting
    control issues with transparency.
  
  Qualifications:
  
  - 5-8 years of relevant experience in systems analysis and
    programming software applications.
  - A strong background in Java development is essential.
  - Experience in managing and implementing successful projects.
  - Working knowledge of consulting and project management
    techniques/methods.
  - Demonstrated ability to work under pressure and manage
    deadlines or unexpected changes in expectations or
    requirements.
  - Proficiency in leveraging AI-powered coding assistants
    (e.g., GitHub Copilot) to enhance and streamline the
    software development lifecycle, including tasks such as
    code generation, refactoring, debugging, unit test
    creation, and documentation.
  
  Education:
  
  - B.Tech from a top engineering college/university, preferably
    in Computer Science, EE, or ECE branches.
  - Candidates with a passion for coding and systems development
    from other disciplines may also apply.
  - A substantial part of experience should be in top-notch
    IBs/Banks and product companies.
  
  AI Co-pilot / AI Tools for Development
  
  Experience with AI co-pilot and other AI-driven development
  tools is highly valued. The ideal candidate will be
  proficient in leveraging these tools to enhance
  productivity, code quality, and accelerate development
  cycles. This includes:
  
  - Efficient Prompting: Demonstrating expertise in crafting
    clear, concise, and effective prompts to maximize the
    utility of AI co-pilots for code generation, debugging,
    refactoring, and documentation.
  - Code Optimization: Utilizing AI tools to identify and
    implement performance improvements, security enhancements,
    and adherence to best practices within Java/J2EE
    applications.
  - Automated Testing Support: Employing AI capabilities to
    generate test cases, analyze code coverage, and streamline
    testing processes for faster and more reliable
    deployments.
  - Knowledge Sharing: Promoting the adoption of AI development
    tools within the team and contributing to best practices
    for their efficient and accurate use.
  
  This job description provides a high-level review of the
  types of work performed. Other job-related duties may be
  assigned as required.
  
