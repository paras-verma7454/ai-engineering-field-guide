description: |
  Who we are
  
  Samsara (NYSE: IOT) is the pioneer of the Connected
  Operations™ Cloud, which is a platform that enables
  organizations that depend on physical operations to harness
  Internet of Things (IoT) data to develop actionable insights
  and improve their operations. At Samsara, we are helping
  improve the safety, efficiency and sustainability of the
  physical operations that power our global economy.
  Representing more than 40% of global GDP, these industries
  are the infrastructure of our planet, including agriculture,
  construction, field services, transportation, and
  manufacturing — and we are excited to help digitally
  transform their operations at scale.
  
  Working at Samsara means you’ll help define the future of
  physical operations and be on a team that’s shaping an
  exciting array of product solutions, including Video-Based
  Safety, Vehicle Telematics, Apps and Driver Workflows, and
  Equipment Monitoring. As part of a recently public company,
  you’ll have the autonomy and support to make an impact as we
  build for the long term.
  
  About the role:
  
  The Samsara AI team builds end-to-end AI solutions for our
  customers as well as core ML infrastructure for Samsara. As
  a Staff Machine Learning Engineer, you will be working with
  petabyte-scale sensor, diagnostic, video, and text data to
  solve critical problems for Physical Operations customers,
  globally. You will work closely with ML Engineers and
  Scientists, as well as full-stack and firmware engineers to
  deliver core product features, services, and optimizations.
  
  This is a remote position open to candidates residing in the
  United States. This position requires travel up to 5% of the
  time. Relocation assistance will not be provided for this
  role.
  
  You should apply if:
  
  - You want to impact the industries that run our world: The
    software, firmware, and hardware you build will result in
    real-world impact—helping to keep the lights on, get food
    into grocery stores, and most importantly, ensure workers
    return home safely.
  - You want to build for scale: With over 2.3 million IoT
    devices deployed to our global customers, you will work on
    a range of new and mature technologies driving scalable
    innovation for customers across industries driving the
    world's physical operations.
  - You are a life-long learner: We have ambitious goals. Every
    Samsarian has a growth mindset as we work with a wide
    range of technologies, challenges, and customers that push
    us to learn on the go.
  - You believe customers are more than a number: Samsara
    engineers enjoy a rare closeness to the end user and you
    will have the opportunity to participate in customer
    interviews, collaborate with customer success and product
    managers, and use metrics to ensure our work is
    translating into better customer outcomes.
  - You are a team player: Working on our Samsara Engineering
    teams requires a mix of independent effort and
    collaboration. Motivated by our mission, we’re all racing
    toward our connected operations vision, and we intend to
    win—together.
  
  In this role, you will:
  
  - Lead design and implementation of critical AI product
    initiatives on Edge devices.
  - Develop both tactical AI solutions as well as more strategic
    and longer term research.
  - Work with petabyte-scale data from customer operations
    including text, transactions, diagnostics, sensor, camera,
    and location data.
  - Partner across business units to explore and prototype new
    AI experiences and optimize the ML model performance on
    edge devices.
  - Stay connected to industry and academic research and adopt
    novel technology that suits Samsara’s needs.
  - Champion, role model, and embed Samsara’s cultural
    principles (Focus on Customer Success, Build for the Long
    Term, Adopt a Growth Mindset, Be Inclusive, Win as a Team)
    as we scale globally and across new offices
  
  Minimum requirements for the role:
  
  - 8+ years experience as a Machine Learning Engineer.
  - Profound experience in optimizing ML models and systems for
    Edge compute constraints.
  - Proficient with Spark, Ray, or a similar framework.
  - Coding in python or similar.
  - Coding in C++ or Rust.
  - Strong functional knowledge of the iterative machine
    learning product development process.
  - Experienced in developing and shipping production code at
    large scale.
  - Ability to distill informal or ambiguous customer and
    business requirements into crisp problem definitions.
  - Proven ability to communicate verbally and in writing to
    technical peers and leadership teams with various levels
    of technical knowledge.
  - Experience coaching and mentoring ML Engineers.
  
  An ideal candidate also has:
  
  - Proficiency in self-serving with data for experiments and
    model training at scale.
  - An established record of successful high impact deliveries
    in AI.
  - Deep knowledge in state of the art Computer Vision and
    multi-model models.
  
  The range of annual base salary for full-time employees for
  this position is below. Please note that base pay offered
  may vary depending on factors including your city of
  residence, job-related knowledge, skills, and experience.
  This role is also eligible for an initial RSU grant with no
  vesting cliff, and ongoing refresh opportunities tied to
  performance, subject to plan terms and conditions. Learn
  more about our total rewards and benefits below.
  
  Annual Base Salary
  
  $178,640—$319,000 USD
  
  Total Rewards
  
  At Samsara, we build for the people who keep the global
  economy moving. We want owners, not passengers, which is why
  our rewards are designed to fuel high-impact builders. Our
  compensation program delivers above-market total
  compensation through a combination of base salary,
  performance-based bonus/variable pay, and equity (for
  eligible roles) in a high-growth public company. We
  meaningfully differentiate pay for our top performers, who
  have the opportunity to earn above-market compensation that
  can outpace the broader market over time.
  
  Beyond compensation, we provide the foundations that enable
  long-term success: a flexible, employee-led remote model, a
  professional development stipend, comprehensive health and
  parental leave plans, and more. If you’re ready to build for
  the long term and own the outcome, your journey starts here.
  
  Flexible Working
  
  At Samsara, we embrace a flexible working model that caters
  to the diverse needs of our teams. Our offices are open for
  those who prefer to work in-person and we also support
  remote work where it aligns with our operational
  requirements. For certain positions, being close to one of
  our offices or within a specific geographic area is
  important to facilitate collaboration, access to resources,
  or alignment with our service regions. In these cases, the
  job description will clearly indicate any working location
  requirements. Our goal is to ensure that all members of our
  team can contribute effectively, whether they are working
  on-site, in a hybrid model, or fully remotely. All offers of
  employment are contingent upon an individual’s ability to
  secure and maintain the legal right to work at the company
  and in the specified work location, if applicable.
  
  Belonging at Samsara
  
  At Samsara, we welcome everyone regardless of their
  background. All qualified applicants will receive
  consideration for employment without regard to race, color,
  religion, national origin, sex, gender, gender identity,
  sexual orientation, protected veteran status, disability,
  age, and other characteristics protected by law. We depend
  on the unique approaches of our team members to help us
  solve complex problems and want to ensure that Samsara is a
  place where people from all backgrounds can make an impact.
  
  Accommodations
  
  Samsara is an inclusive work environment, and we are
  committed to ensuring equal opportunity in employment for
  qualified persons with disabilities. Please email
  accessibleinterviewing@samsara.com or click here if you
  require any reasonable accommodations throughout the
  recruiting process.
  
  Our Commitment to Authenticity
  
  We use Tofu, a fraud detection tool, to validate the
  authenticity of applications and protect against identity
  fraud. This ensures we are connecting with real people and
  allows us to prioritize genuine candidates. Please see
  Samsara’s Candidate Privacy Notice for more information.
  
  Fraudulent Employment Offers
  
  Samsara is aware of scams involving fake job interviews and
  offers. Please know we do not charge fees to applicants at
  any stage of the hiring process. Official communication
  about your application will only come from emails ending in
  @samsara.com, @us-greenhouse-mail.io or @mail3.guide.co. For
  more information regarding fraudulent employment offers,
  please visit our blog post here.
