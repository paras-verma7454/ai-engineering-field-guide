  production code to strategic teams weekly.
  
  Location: London, UK
  
  Why this role is remarkable:
  
  - Join a high-intensity, pre-seed startup backed by
    Entrepreneurs First (EF) and founded by Cambridge alumni
    at the ground floor.
  - Directly impact the pharmaceutical industry by building
    privacy-first, SOC 2 compliant AI that automates complex
    strategic analyst workflows.
  - Experience true technical ownership with the ability to make
    architectural decisions and see your code in production
    the same day.
  
  What you will do:
  
  - Design and implement core LLM orchestration layers and data
    pipelines to monitor and triage global pharmaceutical
    signals.
  - Build and maintain the full-stack platform using Python,
    TypeScript, and React to deliver contextualized insights
    to enterprise customers.
  - Collaborate with founders to shape the product roadmap and
    translate complex regulatory data into actionable
    strategic intelligence.
  
  The ideal candidate:
  
  - Strong experience building and shipping production-grade
    LLM-powered systems and complex AI engineering workflows.
  - Proficient in Python and TypeScript/React with a technical
    degree from a top-tier UK Russell Group university.
  - Between 0-4 years of software engineering experience with a
    builder’s mindset and a desire to thrive in a fast-paced
    environment.
  
