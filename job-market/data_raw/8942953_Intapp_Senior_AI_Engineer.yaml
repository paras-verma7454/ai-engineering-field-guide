description: |
  As a Senior AI Engineer at Intapp, you’ll work on an AI-
  powered, industry-specific cloud platform that transforms
  professional and financial services firms. Collaborating
  with other senior engineers, technical leads, product
  managers, and designers, you’ll have ample mentorship
  opportunities for skills development and career progression.
  You’ll be part of an innovative team working on Celeste –
  AI-as-a-Service platform, designed to handle complex, long-
  running tasks across CRMs, data products, and workflow
  automation.  This is a hybrid role that requires the
  successful candidate to be at the Palo Alto, Charlotte or
  NYC office.
  
  What You’ll Do:
  
  - Develop and maintain AI agent systems using LangGraph and
    LangChain to support complex, multi-step workflows across
    enterprise applications and datasets.
  - Design agent workflows, tool routing strategies, and
    execution pipelines capable of handling long-running
    tasks, multi-agent coordination, and dynamic tool usage.
  - Take ownership of technical challenges from discovery to
    deployment. Investigate systems, collaborate with other
    teams, and propose practical solutions to unblock
    progress.
  - Translate business problems into reliable AI-driven
    processes by combining LLM reasoning, structured data, and
    external APIs.
  - Extend, customize, and optimize LangGraph and related
    frameworks to support scalable, maintainable agent
    systems.
  - Partner with engineers, product teams, and design partners
    to ship AI-powered features that integrate with existing
    platforms and workflows.
  - Leverage modern AI-assisted development workflows to
    accelerate implementation while maintaining high-quality
    engineering standards.
  - Ensure long-term sustainability through thoughtful
    architecture, testing, and documentation.
  - This role focuses on building production AI agents and
    orchestration systems, not training models, working on LLM
    research, or semantic machine learning
  
  What you will need:
  
  - 7+ years of development experience, with at least 3 years
    focused on AI/ML, LLMs, or generative AI
  - 3+ years of Python experience – AI development and
    orientation
  - Experience with LangGraph, LangChain, CrewAI or AutoGen
  - Experience with Azure or other major cloud providers (AWS,
    Google Cloud)
  - Experience with Docker – containerization and runtime
    environments
  - Experience with PostgreSQL & Vector – structured and
    unstructured data
  - Hands-on experience with CI/CD Tools: Github actions, Azure
    Pipelines and awareness of how to deploy and work in a
    cloud infrastructure
  - Bachelor's or advanced degree in engineering or computer
    science or equivalent experience.
  
  What you will gain:
  
  At Intapp, you’ll get the opportunity to bring your talents
  and intellectual curiosity to create better outcomes for our
  people and our clients. You’ll be part of a growing public
  company, with a modern work environment that’s connected yet
  flexible and where your professional growth and well-being
  are top priorities.  We’ll collaborate and grow together,
  supporting each other in a positive, open atmosphere that
  fosters creativity, innovation, and teamwork.
  
  Here, you will have the opportunity to:
  
  - Expand Your Skills: Unlock your potential with professional
    development opportunities supported by a community of
    experienced professionals. We offer reimbursement for
    training and continuing education to help you stay ahead
    in your career.
  - Enjoy Where You Work: Thrive in our modern, open offices
    designed to inspire creativity and collaboration. Our
    complimentary lunches and fully stocked kitchens ensure
    you have everything you need to stay energized throughout
    the day.
  - Support What Matters Most: Our comprehensive wellness and
    flexible time off programs and our benefits are designed
    to care for you and your family.  Our family-formation
    benefits and support during your family-building journey
    ensure you have the resources you need when it matters
    most. We believe in giving back and supporting our
    communities with paid volunteer time off and a donation
    matching program for the causes you care about.
  
  Join us and be a part of a collaborative and welcoming
  culture where your contributions are valued, and your
  professional growth is a priority. Together, we are building
  a company of long-term value that we can all be proud of.
  
  Your actual base salary will be determined by factors such
  as relevant experience, geographic location, and internal
  equity. In addition to base salary, variable compensation
  and equity may also be included.
  
  Intapp provides equal employment opportunities to all
  qualified applicants and will make hiring decisions without
  regard to race, color, sex, sexual orientation, gender
  identity or expression, religion, national origin or
  ancestry, age, disability, marital status, pregnancy,
  protected veteran status, protected genetic information,
  political affiliation, or any other characteristic protected
  by federal, state or local laws.
  
  Please note: Intapp will not hire through text message,
  social media, or email alone. We will never extend a job
  offer unless you have been contacted directly by an Intapp
  recruiter and have participated in the interview process
  which will generally consist of 3 or more virtual or in
  person meetings. Please note that Intapp only uses company
  email addresses, which contain “@intapp.com” or
  “@dealcloud.com” to communicate with candidates via email.
  Intapp will never ask for financial information of any kind
  or for any payment during the job application process. We
  post all legitimate job openings on the Intapp Career Site
  at https://www.intapp.com/working-at-intapp/. If you believe
  you were a victim of such a scam, you may contact your local
  authorities. Intapp is not responsible for any claims,
  losses, damages, or expenses resulting from scammers.
