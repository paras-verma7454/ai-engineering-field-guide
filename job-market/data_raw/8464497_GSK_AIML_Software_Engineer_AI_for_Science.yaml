description: |
  At GSK, we are actively working on building a future in
  which state-of-the-art software, Artificial Intelligence
  (AI) and Machine Learning (ML) enable us to develop new
  therapies and personalized medicines that drive better
  outcomes for patients at reduced cost with fewer side
  effects. This ambitious mission requires scalable, cloud-
  native solutions at the forefront of Software Engineering,
  Cloud Infrastructure, Efficient Compute, Machine Learning
  and AI. If this excites you, we would love to chat.
  
  About the Role
  
  To strengthen our AI for Science (AI4S) team, we are looking
  for Software Engineers with a track record in developing
  production-grade, data-driven software solutions. You will
  drive the development of scalable cloud infrastructure and
  efficient compute solutions to support large-scale AI models
  and agentic systems — building robust, high-performance
  software that enables scientific research using modern cloud
  technologies and the vast biomedical data sources available
  at GSK.
  
  Team Culture
  
  The AI4S team is built on the principles of ownership,
  accountability, continuous development, and collaboration.
  We hire for the long term, and we are motivated to make this
  a great place to work. Our leaders will be committed to your
  career and development from day one. We strongly encourage
  applications from people with diverse and underrepresented
  backgrounds and perspectives.
  
  In this role you will
  
  - Design and implement scalable infrastructure and software
    solutions to support large-scale AI models and agentic
    systems across the entire software development life cycle.
  - Design and implement sophisticated machine learning and deep
    learning pipelines that can handle massive amounts of data
    with optimal resource utilization.
  - Develop and maintain cloud-native architectures that enable
    seamless deployment and scaling of AI/ML workloads.
  - Deliver robust, tested and high-performance code in an agile
    environment.
  - Liaise with AI/ML engineers, data scientists, and domain
    experts to ensure fit-for-purpose infrastructure and data
    pipelines for cutting-edge scientific projects.
  
  Why you?
  
  Qualifications & Skills:
  
  We are looking for professionals with these required skills
  to achieve our goals:
  
  - A degree in a quantitative or engineering discipline (e.g.,
    computer science, computational biology, bioinformatics,
    engineering, among others); OR equivalent work experience
    as a professional software engineer.
  - Demonstrated advanced programming expertise in Python and in
    developing and delivering robust, scalable software
    solutions.
  - Experience with cloud platforms (AWS, GCP, Azure) and cloud-
    native architectures.
  - Passion for software design and commitment to the
    development of reusable, scalable, and testable software
    components.
  - Basic understanding of at least one major deep learning
    framework (PyTorch, JAX, TensorFlow).
  - Knowledge of command-line tools and shell scripting.
  - Knowledge of software engineering best practices, including
    continuous integration (CI) and continuous deployment
    (CD), containerization, and infrastructure as code.
  - Strong problem-solving and debugging skills, and experience
    working in cluster settings or cloud-based environments.
  - Fluency in English.
  
  Preferred Qualifications & Skills:
  
  If you have the following characteristics, it would be a
  plus:
  
  - Familiarity with machine learning principles and state-of-
    the-art modelling approaches.
  - Experience in design, development and deployment of
    commercial cloud-native software and infrastructure.
  - Experience building and deploying large-scale AI models and
    agentic systems in production environments.
  - Experience architecting, developing, and deploying
    distributed training pipelines for large models with
    PyTorch or TensorFlow.
  - Expertise in performance optimization, cost optimization,
    and efficient compute resource management in cloud
    environments.
  - Contributions to relevant open-source projects.
  - Knowledge or interest in disease biology, molecular biology
    and medicine.
  - Experience working with biomedical data (e.g., genomics,
    transcriptomics, proteomics, electronic health records,
    clinical images).
  
  Please take a copy of the Job Description, as this will not
  be available post closure of the advert.
  
  
  When applying for this role, please use the ‘cover letter’
  of the online application or your CV to describe how you
  meet the competencies for this role, as outlined in the job
  requirements above. The information that you have provided
  in your cover letter and CV will be used to assess your
  application.
  
  During the course of your application, you will be requested
  to complete voluntary information which will be used in
  monitoring the effectiveness of our equality and diversity
  policies. Your information will be treated as confidential
  and will not be used in any part of the selection process.
  If you require a reasonable adjustment to the application /
  selection process to enable you to demonstrate your ability
  to perform the job requirements, please contact 0808 234
  4391. This will help us to understand any modifications we
  may need to make to support you throughout our selection
  process.
  
  #LI-GSK
  
