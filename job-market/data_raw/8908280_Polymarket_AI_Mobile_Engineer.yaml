description: |
  About Polymarket
  
  Polymarket is the world’s largest prediction market
  platform. We enable individuals to express views on real-
  world events by trading on outcomes across politics,
  economics, sports, culture, and current affairs. Built as a
  peer-to-peer marketplace with no centralized “house,”
  Polymarket aggregates diverse opinions into transparent,
  market-based probabilities that reflect collective
  expectations about the future.
  
  We’re growing fast – both in terms of volume ($21B traded in
  2025) and adoption as an alternative news source. Our
  ambition is to become a ubiquitous beacon of truth in global
  media and we need your help adding fuel to the fire.
  
  About the role
  
  Polymarket is looking for an AI-native Mobile Engineer to
  build the automation layer that powers our mobile
  development team. This is not a traditional mobile product
  engineering role – you’ll design and implement AI-driven
  systems that make our mobile engineers dramatically more
  efficient.
  
  You’ll work at the intersection of mobile development and AI
  tooling, building orchestration systems that automate
  everything from ticket creation to code generation, testing,
  and review. The goal is to push toward a fully autonomous
  mobile development pipeline.
  
  This is a high-ownership role for someone who is deeply
  curious about the frontier of AI-assisted engineering and
  wants to rethink how mobile software gets built.
  
  What you’ll do
  
  - Build AI-powered development workflows. You’ll design and
    implement systems that automate the mobile development
    lifecycle, from issue creation to pull requests and code
    review.
  - Own mobile-specific AI tooling. You’ll tackle challenges
    unique to mobile environments (e.g., compilation
    constraints, CI on macOS, simulator workflows) and build
    systems that integrate seamlessly with them.
  - Improve the feedback loop. You’ll optimize and re-architect
    our current tooling stack (e.g., Slack bots, ticketing
    systems, codegen tools, CI pipelines) to reduce latency
    and increase reliability.
  - Develop orchestration systems. You’ll connect tools like
    LLMs, design systems, and codebases into cohesive
    pipelines that can reason about and modify mobile
    codebases.
  - Collaborate with mobile engineers. You’ll work closely with
    the iOS team to identify bottlenecks and build tools that
    meaningfully improve developer velocity.
  - Experiment aggressively. You’ll stay on the cutting edge of
    AI tooling and continuously evaluate new models,
    frameworks, and approaches.
  - Contribute to mobile code when needed. During high-priority
    moments, you may occasionally jump into the codebase to
    support product development.
  
  What we’re looking for
  
  - 2+ years of experience building native iOS (and ideally
    Android) applications
  - Proficiency in Swift/Kotlin, with a solid understanding of
    mobile build systems and tooling
  - Strong programming skills in TypeScript (or willingness to
    ramp quickly)
  - Experience building or experimenting with AI-powered
    developer tools, agents, or automation systems
  - Familiarity with LLMs and modern AI tooling (e.g., code
    generation, agents, orchestration frameworks)
  - A systems mindset — you think in terms of pipelines,
    automation, and leverage
  - High agency and curiosity — you proactively explore new
    tools, ideas, and approaches
  - (Plus) Experience building internal developer tools or CI/CD
    systems
  - (Plus) Familiarity with mobile CI environments (e.g., macOS
    build systems, simulators, provisioning)
  - (Plus) Experience with tools like Cursor, Claude, or similar
    AI coding assistant
  - (Plus) Active engagement with the AI engineering ecosystem
    (Twitter, blogs, open-source, etc.)
  - (Plus) Experience integrating with tools like Slack, Linear,
    or Figma APIs
  
  Benefits
  
  - Competitive salary & equity
  - Unlimited PTO
  - Full Health, Vision, & Dental coverage
  - 401k match
  - Hardware setup — new MacBook Pro, big display, & accessories
