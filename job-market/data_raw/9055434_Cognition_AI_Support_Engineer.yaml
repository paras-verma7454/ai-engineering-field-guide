description: |
  We are an applied AI lab building end-to-end software
  agents.
  
  We're the makers of Devin, the first AI software engineer,
  and Windsurf, the AI-native IDE. Together, they represent
  our vision for collaborative AI teammates that enable
  engineers to focus on more interesting problems and empower
  teams to strive for more ambitious goals.
  
  Our team is small and talent-dense. Among our founding team,
  we have world-class competitive programmers, former
  founders, and leaders from companies at the cutting edge of
  AI including Scale AI, Palantir, Cursor, Waymo, Tesla,
  Lunchclub, Modal, Google DeepMind, and Nuro.
  
  Building Devin and Windsurf is just the first step—our
  hardest challenges still lie ahead. If you’re excited to
  solve some of the world’s biggest problems and build AI that
  can reason on real-world tasks, apply to join us.
  
  About the Role
  
  Are you excited about the limitless possibilities of
  artificial intelligence and machine learning? Do you want to
  make these possibilities into realities for real people? If
  so, we have an extraordinary opportunity to join our startup
  as an AI Support Engineer.
  
  Cognition and Windsurf give AI-powered tools to development
  teams at thousands of enterprises, from startups to Fortune
  500 companies. Due to the complexity of enterprise tasks and
  environments, combined with the rapid evolution of the
  product itself, customer issues may come up that would
  reduce adoption and value driven if not addressed rapidly.
  You will be the first line of responding and resolving these
  customer issues, leveraging your computer science and AI
  knowledge to help customers effectively. Your role will be
  instrumental in driving adoption of AI technology.
  
  This is a unique opportunity to work at an AI startup with
  real users.
  
  Key Responsibilities:
  
  - First line of response to any customer issues: Customer
    issues could stem from misuse of the software, errors in
    the deployment, or bugs in the underlying software.
    Support engineers are required to use their AI and CS
    knowledge to root cause, reproduce, and respond to any
    type of issue. Support engineers will help define
    processes and build automations to streamline our support
    function.
  - Escalation, resolution, and education: If a support engineer
    is unable to resolve a customer issue, they are
    responsible for escalating the issue to the appropriate
    Cognition/Windsurf stakeholders (deployed engineering,
    field IT, or enterprise engineering), tracking and
    understanding the resolution of the issue, and educating
    the customer on the solution.
  - Knowledge documentation and distribution: Support engineers
    are responsible for documenting learnings about failure
    modalities across use and deployment and distributing that
    knowledge to end customers and internal engineering teams.
  - Product testing and feedback: Cognition and Windsurf’s
    products work across a range of IDEs, programming
    languages, and modalities. Support engineers will be
    instrumental in testing each release. Support engineers
    will also use their CS and AI skills to automate parts of
    the QA process.
  
  Qualifications:
  
  - 2+ years working in a technical role
  - Bachelor's or higher degree in Computer Science, Software
    Engineering, or related field.
  - Knowledge of distributed computing, containerization, and
    orchestration technologies (e.g., Docker, Kubernetes).
  - Proficiency in programming languages such as Python, Java,
    or Go
  - Strong organizational skills and customer friendliness.
  - Strong problem-solving skills and the ability to work in a
    fast-paced, dynamic startup environment.
  - Passion for artificial intelligence and large language
    models. Hands-on experience with these technologies is not
    required, but is a plus.
  
  Equal Opportunity
  
  Cognition is an equal opportunity employer. We do not
