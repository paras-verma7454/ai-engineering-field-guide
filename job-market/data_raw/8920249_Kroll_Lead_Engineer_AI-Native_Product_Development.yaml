description: |
  Kroll is building AI-enabled internal products that
  materially accelerate how our advisory professionals work.
  This role is not traditional software engineering. It is AI-
  orchestrated product development.
  
  
  
  The Lead Engineer will own end-to-end build
  streams—designing, developing, testing, and shipping
  internal tools that enhance core workflows across valuation,
  investigations, restructuring, cyber, and compliance. You
  will operate as a force multiplier by leveraging agentic
  coding systems and multi-agent orchestration to compress
  development cycles while maintaining production-grade
  quality.
  
  
  
  This role requires technical depth, architectural judgment,
  and fluency in AI-driven development paradigms.
  
  
  
  Core Responsibilities:
  
  
  
  1. End-to-End Product Ownership
  
  - Own full-stack development of AI-enabled internal products
  - Translate workflow requirements into scalable application
    architectures
  - Deliver production-grade systems—not prototypes—aligned with
    enterprise security and governance requirements
  - Maintain accountability for performance, reliability, and
    maintainability
  
  
  
  2. Agentic Development & Multi-Agent Orchestration
  
  - Design and orchestrate swarms of coding agents to:
    - Generate modular code components
    - Refactor and optimize legacy code
    - Write and execute test suites
    - Generate documentation and developer artifacts
  - Use tools such as Claude Code and related agentic frameworks
    to accelerate development cycles
  - Build repeatable development pipelines that combine human
    oversight with AI execution
  - Architect guardrails for deterministic outputs, version
    control integrity, and testing validation
  
  
  
  3. AI-Accelerated Engineering Lifecycle
  
  
  
  Leverage AI across the entire SDLC:
  
  - UX wireframing and rapid interface prototyping
  - Schema design and backend service scaffolding
  - Automated test generation and regression testing
  - Performance tuning and debugging support
  - CI/CD pipeline enhancement
  
  
  
  You are expected to apply AI not only to coding, but to
  product design, QA, and documentation.
  
  
  
  4. Cross-Functional Collaboration
  
  - Partner with Product and AI Transformation leaders to
    prioritize high-impact workflow tools
  - Work directly with service line stakeholders to understand
    domain constraints and regulatory considerations
  - Collaborate with data and ML engineers when integrating
    models or AI services
  - Ensure defensibility, security, and compliance alignment in
    all builds
  
  
  
  Qualifications:
  
  
  
  Required Experience
  
  - 6–10+ years of full-stack software engineering experience
  - Proven experience building and shipping production systems
  - Deep familiarity with modern web frameworks (frontend and
    backend)
  - Strong architectural design capability
  
  
  
  AI-Native Engineering Capability
  
  - Demonstrated proficiency with agentic coding tools (e.g.,
    Claude Code or equivalent)
  - Experience orchestrating multi-agent workflows for
    development tasks
  - Comfort designing systems where AI is embedded into the
    build process itself
  - Ability to evaluate, validate, and supervise AI-generated
    code rigorously
  
  
  
  Technical Breadth
  
  - Frontend frameworks (e.g., React, Next.js or similar)
  - Backend development (Node, Python, or similar)
  - API design and integration
  - Cloud-native architecture
  - Automated testing frameworks and CI/CD
  
  
  
  What Success Looks Like
  
  - Internal tools that materially reduce advisory workflow
    cycle times
  - High code quality despite accelerated build cycles
  - AI-driven development pipelines that reduce time-to-ship by
    30–60%
  - Repeatable patterns for agentic development
    institutionalized across the team
  
  
  
  Your recruiter will be happy to walk you through your
  U.S.-specific benefits, which include:
  
  
  
  - Healthcare Coverage: Comprehensive medical, dental, and
    vision plans.
  - Time Off and Leave Policies: Generous paid time off (PTO),
    paid company holidays, generous parental and family leave.
  - Protective Insurances: Life insurance, short- and long-term
    disability coverage, and accident protection.
  - Compensation and Rewards: Competitive salary structures,
    performance-based incentives, and merit-based compensation
    reviews.
  - Retirement Plans: 401(k) plans with company matching.
  
  
  
  Please note that benefits may vary by region, department and
  role. We encourage you to speak with your recruiter to learn
  more about the specific benefits available for your
  position.
  
  
  
  About Kroll
  
  
  
  Join the global leader in risk and financial advisory
  solutions—Kroll. With a nearly century-long legacy, we blend
  trusted expertise with cutting-edge technology to navigate
  and redefine industry complexities. As a part of One Team,
  One Kroll, you'll contribute to a collaborative and
  empowering environment, propelling your career to new
  heights. Ready to build, protect, restore and maximize our
  clients’ value? Your journey begins with Kroll.
  
  
  
  In order to be considered for a position, you must formally
  apply via careers.kroll.com.
  
  
  
  We are proud to be an equal opportunity employer and will
  consider all qualified applicants regardless of gender,
  gender identity, race, religion, color, nationality, ethnic
  origin, sexual orientation, marital status, veteran status,
  age or disability.
  
  
  
  The current salary range for this position is $150,000 to
  $200,000
  
  
  
  
  
