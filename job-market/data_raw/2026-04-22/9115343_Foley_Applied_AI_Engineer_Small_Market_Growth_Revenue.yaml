description: |
  Foley is hiring an Applied AI Engineer to build and scale
  AI-driven revenue systems within our Small Market segment.
  This role sits at the intersection of AI, growth, and
  revenue execution—designing systems that convert inbound
  demand into measurable revenue outcomes.
  
  You will work directly with Growth, Sales, and RevOps to
  build production-grade systems that automate, augment, or
  replace traditional sales workflows. This is a builder role
  focused on shipping real systems, not strategy or
  coordination.
  
  What you’ll do
  
  - Build AI-driven revenue systems that capture, qualify, and
    convert inbound demand into measurable revenue
  - Design self-service and e-commerce experiences using AI to
    guide customers from interest to purchase
  - Automate and augment sales workflows, reducing manual effort
    and accelerating deal velocity
  - Develop multi-channel engagement systems across email, SMS,
    and web that adapt to user behavior in real time
  - Own measurement and optimization, using data and AI to
    continuously improve conversion and funnel performance
  - Partner cross-functionally with Growth, Sales, and RevOps to
    build scalable, production-ready systems
  
  Who you are
  
  - Demonstrated ability to build and ship real systems
    (portfolio, GitHub, or deployed work)
  - Strong proficiency in Python (APIs, automation, data
    workflows)
  - Experience building with LLMs or AI systems (agents, RAG,
    workflows, etc.)
  - Ability to translate business and revenue problems into
    technical solutions
  - Strong communication skills with technical and non-technical
    stakeholders
  
  Nice-to-haves
  
  - Experience with CRM or marketing automation platforms (e.g.,
    HubSpot, Salesforce)
  - Experience building lead scoring, routing, or conversion
    systems
  - Background in growth, marketing, sales, or RevOps
    environments
  - Familiarity with AI orchestration frameworks (e.g.,
    LangChain, LangGraph, CrewAI)
  - Experience with telemetry, observability, or performance
    tracking systems
  
  Location: This role is primarily remote (US based) with the
  expectation of occasional visits to our offices for team
  collaboration, training, or company events.
  
  This role may be based remotely out of the following states:
  Arizona, California, Colorado, Connecticut, Florida,
  Georgia, Illinois, Indiana, Kansas, Maryland, Massachusetts,
  Michigan, Nebraska, New Hampshire, New Jersey, New York,
  North Carolina, Pennsylvania, Rhode Island, South Carolina,
  Tennessee, Texas, Virginia, Wisconsin
  
  About us
  
  At Foley, we’re reimagining how safety-sensitive industries
  hire, stay compliant, and manage risk. We’ve evolved into a
  modern SaaS company with an all-in-one, AI-ready platform
  that helps transportation, construction, distribution, and
  utility businesses operate faster, smarter, and safer.
  
  As we continue to grow, we’re looking for curious, strategic
  thinkers who thrive in complexity, are motivated by making
  an impact, and want to join a team that’s passionate about
  building great products and supporting customers. Our core
  values — Teammateship, Grit, and Innovation — guide
  everything we do. Whether we’re collaborating internally or
  helping customers, we approach every challenge with
  optimism, humor, and a shared commitment to success.
  
  Benefits Foley offers a comprehensive benefits package that
  includes medical, dental, and vision coverage, a 401(k) with
  company match, paid time off and holidays, wellness
  programs, and an employee assistance program.
  
  Equal Employment Opportunity  Foley is an Equal Opportunity
  Employer. We celebrate diversity and are committed to
  creating an inclusive environment for all employees. All
  qualified applicants will receive consideration for
  employment without regard to race, color, religion, sex,
  sexual orientation, gender identity or expression, national
  origin, age, disability, protected veteran status, or any
  other legally protected characteristic.
  
  Reasonable Accommodations  If you require a reasonable
  accommodation during the application or interview process,
  please contact us at careers@foley.io
  
  Employment Status  Employment with Foley is on an at-will
  basis. Nothing in this job posting or in future
