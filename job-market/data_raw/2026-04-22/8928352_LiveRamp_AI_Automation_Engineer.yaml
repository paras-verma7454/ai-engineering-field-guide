  or ambiguous workflows. ● Develop custom agentic actions and
  integrate them with enterprise platforms using Model Context
  Protocol (MCP) servers and APIs, following established
  patterns and best practices. ● Develop and troubleshoot
  Python scripts. ● Monitor and maintain workflow
  integrations, agents, and automations, identifying issues
  and proposing improvements within your area of
  responsibility. Your team will: ● Collaborate on designing
  and implementing AI and automation solutions. ● Support each
  other in the ideation and creation of technical designs.
  
  ● Ensure the seamless integration and maintenance of
  automation tools and workflows. ● Work closely with other
  departments to understand and fulfill automation needs.
  
  
  About you: ● Strong hands-on experience working with APIs
  and integrations. ● Proficient in Python. ● Experience
  contributing to the technical design of automation and AI
  solutions and presenting them to stakeholders across
  different departments (HR, Legal, Sales, Eng). ● Strong
  understanding of modern LLMs (Gemini, Claude, OpenAI) and
  hands-on experience with prompt engineering and agentic
  design patterns. ● Ability to support other team members in
  design ideation, creation, implementation, and peer reviews.
  ● Excellent communication and collaboration skills. ● Strong
  problem-solving mindset, attention to detail, and a passion
  for driving internal productivity. ● Typically 3–5+ years of
  related experience in software engineering, data
  engineering, or automation/AI engineering (or equivalent
  practical experience).
  
  
  Preferred Skills: ● Familiarity with iPaaS tools like
  Workato, Okta Workflows, and Zapier. ● Deep experience or
  strong interest in cross-department AI development,
  including working with MCP servers, APIs and agentic
  frameworks. ● Understanding of data pipelines (e.g.,
  BigQuery). ● Exposure to cloud infrastructure such as GCP or
  AWS.
  
  
