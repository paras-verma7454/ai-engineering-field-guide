description: |
  About Gusto
  
  At Gusto, we're on a mission to grow the small business
  economy. We handle the hard stuff — payroll, health
  insurance, 401(k)s, and HR — so owners can focus on their
  craft and their customers. With teams in Denver, San
  Francisco, and New York, we support more than 400,000 small
  businesses nationwide and are building a workplace that
  reflects the people we serve.
  
  
  All full-time employees receive competitive base pay,
  benefits, and equity (RSUs) — because everyone who helps
  build Gusto should share in its success. Offer amounts are
  determined by role, level, and location. Learn more about
  our Total Rewards philosophy.
  
  
  AI is a fundamental part of how work gets done at Gusto. We
  expect all team members to actively engage with AI tools
  relevant to their role and grow their fluency as the
  technology evolves. AI experience requirements vary by role
  and will be assessed during the interview process.
  
  About the role
  
  Gusto is looking for a Staff AI/ML Engineer to join the
  Applied Data Science team at Gusto Retirement-App. This is a
  critical role to build AI and ML framework and
  infrastructure to enable us to strengthen and optimize how
  data is used to enable customer journey and experience at
  Gusto.
  
  Here’s what you’ll do day-to-day
  
  - Develop, test, and deploy AI/ML models to solve complex
    business problems, such as anomaly detection, personalized
    experience, generative AI application, algorithm &
    optimization.
  - Transition models from proof-of-concept to production-ready
    solutions, ensuring scalability and performance.
  - Review and contribute to codebases, participate in pull
    requests, and maintain high-quality engineering standards.
  - Work with containerized environments to deploy, monitor, and
    troubleshoot ML services.
  - Collaborate closely with cross-functional teams, including
    analytics, engineering, products and business
    stakeholders, to align solutions with organizational
    needs.
  - Become a domain expert in key business areas, enabling you
    to craft intelligent, impactful data-driven solutions.
  
  Here’s what we’re looking for
  
  - PhD with 3+ years or MS with 5+ years of industry experience
    in applied ML/GenAI, data science, or a related field.
  - Proven track record of developing and deploying ML solutions
    in production, from PoC to scalable systems.
  - Strong programming skills (Python, Javascript, C++, Java, or
    Scala) and proficiency in SQL for data extraction and
    manipulation.
  - Hands-on experience with cloud platforms (AWS, GCP, or
    Azure), MLOps, and containerization (Docker, Kubernetes).
  - Ability to work cross-functionally, translating business
    needs into AI-driven solutions and communicating
    effectively with technical and non-technical stakeholders.
  
  Our cash compensation amount for this role is targeted at
  $230k-280k for San Francisco, New York, and Seattle $205k -
  255k in Los Angeles, $185k-234k in Denver, and 200k-250k CAD
  for Toronto. Final offer amounts are determined by multiple
  factors including candidate experience and expertise and may
  vary from the amounts listed above.
  
  Gusto has physical office spaces in Denver, San Francisco,
  and New York City. Employees who are based in those
  locations will be expected to work from the office on
  designated days approximately 2-3 days per week (or more
  depending on role). The same office expectations apply to
  all Symmetry roles, Gusto's subsidiary, whose physical
  office is in Scottsdale.
  
  Note: The San Francisco office expectations encompass both
  the San Francisco and San Jose metro areas.
  
  When approved to work from a location other than a Gusto
  office, a secure, reliable, and consistent internet
  connection is required. This includes non-office days for
  hybrid employees.
  
