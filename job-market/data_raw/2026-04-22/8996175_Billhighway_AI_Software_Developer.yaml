  solutions that help our non-profit clients improve the
  world.
  
  Why people love working here:
  
  - Focus on personal and career development.
  
  - Competitive salary, benefits, and other forms of
    compensation.
  
  - Fresh approaches to using familiar skill sets and areas of
    expertise.
  
  - Caring, capable leaders.
  
  - Thriving culture powered by hybrid and remote team members.
  
  - Our vision: Provide powerful solutions that help our non-
    profit clients improve the world.
  
  - Our core values: Initiative, Collaboration, Reliability and
    Stewardship.
  
  This role: A day and week in the life…
  
  - Design, develop, unit test and support the re:Members suite
    of applications, using C#, SQL, JavaScript and other
    languages as needed.
  
  - Ensure the operational stability and resiliency of the
    software applications developed, both pre- and post-
    deployment.
  
  - Utilize AI coding assistants for at least 50% of coding,
    debugging, and documentation tasks.
  
  - Use issue tracking systems, Jira, and source control, git,
    to adhere to sound engineering principles.
  
  - Handling periodic on-call duty and out-of-band requests
  
  This role: You will be successful in this role if you…
  
  - Worked for 5+ years as a software developer.
  
  - Have proficiency in using programming languages, such as C#,
    JavaScript, and SQL.
  
  - Have used agentic engineering and spec-driven development
    techniques and applied them in your daily development
    workflow.
  
  - Have strong understanding of object-oriented software
    techniques and ER data modeling concepts.
  
  - Can resolve complex issues and document root-cause analysis.
  
  - Have strong communication, interpersonal and leadership
    skills.
  
  - Earned a bachelor’s degree in computer science, or a related
    field or have equivalent work experience.
  
  Eligible candidates reside in one of these states: DC, FL,
  IL, IN, MD, MI, MN, NC, NJ, OH, PA, SC, TN, TX, VA.
  
