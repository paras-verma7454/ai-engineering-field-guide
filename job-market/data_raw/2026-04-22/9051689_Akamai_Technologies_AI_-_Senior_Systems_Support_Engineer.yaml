description: |
  Would you like to support users and keep systems running
  smoothly?
  
  Would you like to be a part of IT Support team?
  
  Join our IT Support team
  
  Our IT Engineering team provides 24/5 support for
  applications using modern technologies, supporting internal
  business functions. Collaboration occurs with various teams
  and units to ensure application support and service
  delivery.
  
  Partner with the best
  
  As a Senior Systems Support Engineer, overseeing support for
  cloud and on-premises applications. Collaborate with
  stakeholders and teams to understand IT application needs.
  Troubleshoot issues, guide the team, and deliver effective
  resolutions.
  
  As a Senior Systems Support Engineer, you will be
  responsible for:
  
  - Providing support and mentorship to SAAS/Linux/on-premises
    application engineers within the team.
  - Owning the problem resolution and collaborating with
    internal support, operations and engineering teams to
    investigate and troubleshoot complex problems.
  - Understanding architecture, establishing processes, and
    analyzing technical issues on on-premises and cloud
    applications.
  - Obtaining certification in Azure
  - Enhancing system monitoring for faster error detection,
    improving performance, reliability, and service
    restoration processes
  
  Do what you love
  
  To be successful in this role you will:
  
  - Possess 6+ years of experience in Systems Support with Azure
  - Demonstrate expertise in Azure Infrastructure, focusing on
    Azure AI Foundry and Azure OpenAI service architectures
  - Understand LLM lifecycle management, monitor token usage,
    implement rate-limiting strategies, and support Anthropic
    Claude or comparable LLMs effectively.
  - Demonstrate expertise in Linux, SQL, Cloud Technologies,
    Configuration Management tools, and scripting languages
    like Shell, Bash, and Python
  - Have a track record of meeting support KPIs and SLAs, and
    achieving high customer satisfaction scores
  - Have experience providing technical solutions & support to
    Enterprise customers.
  - Exhibit availability, a responsive mindset, demonstrate
    communication and collaboration skills, and build trusting
    relationships effectively
  
