  About the job
  
  The AI & Optimization Lead — Bitcoin Mining Operations will
  play a crucial role in defining and executing the AI vision
  for MOS (Mining Operating System) and MDK (Mining
  Development Kit) — the core FOSS platforms powering Tether’s
  Bitcoin-mining operations worldwide.
  
  This role is responsible for designing the data foundation
  and AI models that drive real-world operational efficiency
  across mining sites, with a focus on performance
  optimization, predictive insights, and intelligent
  automation. You will work closely with engineering, data,
  and operations teams to define a structured data baseline,
  ensure high-quality data modelling, and develop AI-driven
  solutions that are fully integrated into MOS/MDK.
  
  Your mission is simple and ambitious: turn data into
  intelligence — and intelligence into site-level efficiency.
  
  A strong background in data architecture, modelling, ML/AI
  systems, and mathematical optimization is essential. Prior
  exposure to Bitcoin mining or industrial/IoT environments is
  highly valuable, but not mandatory.
  
  Responsibilities
  
  AI Vision & Strategy
  
  - Define and lead the AI strategy for MOS & MDK with a focus
    on operational efficiency and measurable business
    outcomes.
  - Translate operational challenges into data and optimization
    problems that AI models can solve.
  - Establish best-practice frameworks for scalable, production-
    ready AI systems.
  
  Data Foundation & Modelling
  
  - Design a standardized data baseline / schema for all mining-
    site telemetry and events.
  - Ensure data is structured, normalized, labelled and
    accessible for AI/ML use cases.
  - Work with backend engineers to evolve the data pipeline and
    integration standards.
  
  Model Development & Optimization
  
  - Build and deploy ML/AI and optimization models such as:
    - performance optimization
    - anomaly detection
    - predictive failure & maintenance
    - energy-efficiency insights
    - operational automation recommendations
  - Continuously evaluate and improve model performance in
    production.
  
  Integration & Delivery
  
  - Work with MOS & MDK engineering teams to embed AI models
    into platform workflows and APIs.
  - Ensure models are efficient, reliable, explainable, and
    maintainable.
  
  Cross-Team Collaboration
  
  - Collaborate with site-operations teams to validate results
    and gather feedback.
  - Align with leadership on AI roadmap, priorities, impact
    tracking, and KPIs.
  - Document systems, architecture, and modelling assumptions
    clearly.
  
  Culture & Mindset
  
  - Promote a data-driven, efficiency-first culture within the
    Mining Software team.
  - Stay updated on AI, optimization and industrial analytics
    trends.
  
  - Bachelor’s or Master’s degree in Computer Science, Data
    Science, Applied Mathematics, Engineering, Statistics, or
    similar.
  - 3+ years’ experience in AI/ML, data science, or applied
    optimization roles.
  - Proven experience designing data models / schemas /
    baselines for large-scale, time-series–heavy datasets.
  - Strong proficiency in Python and modern ML frameworks (e.g.,
    PyTorch, TensorFlow, Scikit-Learn).
  - Strong JavaScript / TypeScript proficiency (Node.js
    ecosystem)
  - Familiarity with containerized workloads (Docker)
  - Experience developing and deploying time-series, anomaly
    detection, classification, and predictive models for
    mechanical, electromechanical, or hardware-intensive
    equipment/systems in production environments.
  - Solid understanding of signal processing and feature
    extraction for sensor data (e.g., electrical, thermal,
    vibration, or telemetry signals).
  - Solid understanding of optimization techniques (linear/non-
    linear programming, simulation, decision systems, etc.).
  - Experience deploying, monitoring, maintaining AI models into
    production systems including handling model drift and
    evolving operating conditions.
  - Excellent English communication skills and ability to
    collaborate in distributed teams.
  
