  About the Role
  
  We are looking for a AI & Machine Learning Engineer with
  expertise in machine learning, generative AI, and agentic AI
  workflows. The role involves building, fine-tuning, and
  deploying large-scale ML and GenAI models while developing
  intelligent agentic systems that operate autonomously
  
  Key Responsibilities
  
  - Design, train, and optimize ML models for prediction,
    classification, and analytical use cases.
  - Build, fine-tune, and deploy open-source LLMs (GPT, Llama,
    Mistral, T5, Falcon, BERT, ViT).
  - Apply prompt engineering and build RAG-based AI assistants
    and chatbots.
  - Develop agentic AI workflows using LangChain, LangGraph,
    CrewAI, Autogen, or PhiData.
  - Deploy and manage models using MLflow, Kubeflow, SageMaker,
    Docker, and Kubernetes.
  - Monitor model performance, drift, and ensure scalability and
    robustness in production.
  - Collaborate with cross-functional teams to align ML
    solutions with business and product goals.
  - Document model architectures, workflows, and experiments.
  
  Required Skills & Qualifications
  
  - Candidate should be completed AI/ML training from reputed
    organization
  - At least 6 month working experience in ML engineering or
    GenAI development.
  - Proven experience in deploying ML/GenAI Agents in production
    at scale.
  - Strong proficiency in Python and Java preferred.
  - Hands-on with TensorFlow, PyTorch, Scikit-learn, Hugging
    Face Transformers, LangChain.
  - Familiarity with MLOps and containerization (MLflow,
    Kubeflow, SageMaker, Docker, Kubernetes).
  - Experience fine-tuning open-source LLMs and developing
    generative or agentic AI systems.
  - Knowledge of data processing tools (SQL, Spark, Pandas,
    NumPy).
  - Excellent problem-solving and communication skills.
  
  Preferred Qualifications
  
  - Knowledge of cloud platforms (AWS, GCP, Azure).
  - Familiarity with reinforcement learning or continuous
    learning pipelines.
  - Experience with Git and SDLC best practices.
  
  Summary
  
  This role blends advanced machine learning, generative AI,
  and agentic automation to deliver production-ready, scalable
  AI solutions. The engineer will work across the full AI
  lifecycle from model development to deployment within a
  high-performance AI/ML domain team.
  
