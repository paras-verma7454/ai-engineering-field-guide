  A Career at HARMAN
  
  As a technology leader that is rapidly on the move, HARMAN
  is filled with people who are focused on making life better.
  Innovation, inclusivity and teamwork are a part of our DNA.
  When you add that to the challenges we take on and solve
  together, you’ll discover that at HARMAN you can grow, make
