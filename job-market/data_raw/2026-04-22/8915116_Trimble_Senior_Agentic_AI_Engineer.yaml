description: |
  Revolutionize the Future of Logistics as our next Senior
  Agentic AI Engineer
  
  Are you ready to redefine how global freight moves by
  building the next generation of LLM-powered autonomous
  agents? Trimble is looking for a passionate problem-solver
  like you to design and deploy sophisticated GenAI solutions
  that connect the digital and physical worlds, making global
  trade safer, simpler, and more efficient.
  
  About Us:
  
  Trimble is an industrial technology company transforming the
  way the world works by delivering solutions that enable our
  customers to thrive. We create technologies that connect the
  digital and physical worlds, helping our customers increase
  productivity, quality, safety, and sustainability. From
  purpose-built products to enterprise-level solutions, our
  technology empowers professionals in construction,
  geospatial, government, transportation, and more.
  
  In the Transportation & Logistics segment, our solutions
  make it safer, simpler and more efficient to move
  freight—bringing together a global network of shippers,
  carriers, brokers and 3PLs.
  
  What Makes This Role Great:
  
  In this role, you will be at the absolute forefront of the
  GenAI revolution, moving beyond simple chatbots to develop
  complex LLM agents. You will have the autonomy to experiment
  with cutting-edge RAG frameworks and prompt engineering
  techniques, directly influencing the intelligence of our
  global transportation network and shaping the future of
  autonomous supply chain technology.
  
  Key Exciting Responsibilities
  
  - Architect and code sophisticated AI modules, including high-
    performance embedding pipelines, custom chunkers, and
    advanced retrieval evaluators.
  - Lead the integration of intelligent agent services with
    diverse internal and external APIs and vector databases to
    solve complex, cross-service challenges.
  - Stay at the bleeding edge of AI research, implementing the
    latest advancements in fine-tuning, RLHF, and prompt
    engineering frameworks like DSPy.
  - Drive agile excellence by spearheading sprint deliveries and
    collaborating with cross-functional leaders to define the
    scope of transformative AI features.
  - Champion code quality and team growth by performing high-
    level peer reviews and contributing to shared utility
    libraries that boost development velocity.
  - Architect and implement modular, cloud-native microservices
    that integrate GenAI into our production ecosystem,
    ensuring our Agentic solutions are as scalable and
    reliable as they are intelligent.
  - Take ownership of the production lifecycle by building
    robust CI/CD pipelines and using observability frameworks
    (like Datadog or Databricks) to monitor model health,
    trace agent logic, and ensure system uptime.
  - Drive technical excellence by developing comprehensive
    evaluation suites—incorporating both traditional testing
    and modern LLM-based evals—to benchmark accuracy, safety,
    and performance before every release.
  
  Essential Skills & Experience
  
  - You bring 6+ years of robust engineering experience
  - You are a Python expert with a deep understanding of
    developing and scaling high-quality code.
  - You have at least 6 months of hands-on experience building
    and deploying GenAI applications.
  - You possess a strong background in RAG frameworks, including
    vector databases, hybrid search, and ANN algorithms.
  - You hold a B.Tech, M.E, M.Tech, or M.S. in Computer Science
    Engineering from a premier institute.
  
  Bonus Points For:
  
  - Recognition in national-level Olympiads or talent search
    examinations.
  - A history of contributing to open-source projects or
    presenting technical papers at national forums.
  - GenAI Passion: You have a portfolio of personal projects, a
    technical blog, or a GitHub repository demonstrating your
    hands-on experimentation with the latest LLM frameworks.
  - Community Contribution: You’ve contributed to open-source AI
    libraries (like LangChain, LlamaIndex, or AutoGPT) or have
    a history of sharing insights at technical meetups.
  
  Why You'll Love Working With Us
  
  At Trimble, we're not just a company that "does good"—we are
  a team dedicated to making a tangible, positive Real-World
  Impact. We build innovative solutions designed to solve the
  world's most critical challenges. From construction sites to
  transportation hubs, our work tangibly improves how people
  live, build, move, and grow.
  
  You'll work on projects that truly matter: Our purpose-
  driven culture means you'll be helping to build and deliver
  solutions that make work faster, safer, and more sustainable
  for millions of people worldwide. Our impact is tangible,
  from connected machines that save fuel to data-driven
  insights that reduce waste.
  
  Collaborate with like-minded people: Our strong internal
  culture is a "hidden gem." You will work with a
  collaborative, supportive team that shares your purpose and
  fosters a genuine sense of belonging. We're a company of
  "visionary pragmatists" who think boldly and build things
  that work.
  
  How to Apply: Please submit an online application for this
  position by clicking on the ‘Apply Now’ button located in
  this posting.
  
  Join a Values-Driven Team: Belong, Grow, Innovate.
  
  At Trimble, our core values of Belong, Grow, and Innovate
  aren't just words—they're the foundation of our culture. We
  foster an environment where you are seen, heard, and valued
  (Belong); where you have an opportunity to build a career
  and drive our collective growth (Grow); and where your
  innovative ideas shape the future (Innovate). We believe in
  empowering local teams to create impactful strategies,
  ensuring our global vision resonates with every individual.
  Become part of a team where your contributions truly matter.
  
