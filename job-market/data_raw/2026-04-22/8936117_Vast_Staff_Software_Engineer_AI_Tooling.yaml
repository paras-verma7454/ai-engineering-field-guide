  COMPENSATION AND BENEFITS
  
  
  
  Base salary will vary depending on job-related knowledge,
  education, skills, experience, business needs, and market
  demand. Salary is just one component of our comprehensive
  compensation package. Full-time employees also receive
  company equity, as well as access to a full suite of
  compelling benefits and perks, including: 100% medical,
  dental, and vision coverage for employees and dependents,
  generous paid time off; up to 20+ days of vacation for
  exempt staff and up to 10+ days of vacation for non-exempt
  staff with the ability to cash-out unused vacation annually,
  paid parental leave, short and long-term disability
  insurance, life insurance, access to a 401(k) retirement
  plan, ClassPass credits, personalized mental healthcare
  through Spring Health, and other discounts and perks. We
  also take pride in offering exceptional food perks, with
  snacks, drip coffee & onsite barista, cold drinks, and
  dinner meals remaining free of charge, and lunch subsidized
  as part of Vast’s ongoing commitment to providing high-
  quality meals for employees.
  
  
  
  U.S. EXPORT CONTROL COMPLIANCE STATUS
  
