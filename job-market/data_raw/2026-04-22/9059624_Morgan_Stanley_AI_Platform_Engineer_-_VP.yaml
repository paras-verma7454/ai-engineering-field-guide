description: |
  Job Description
  
  Morgan Stanley has been at the forefront of the AI journey
  with applications such as Genome that use AI to provide
  better, personalized advice to our clients. Generative AI
  provides further unique opportunities to provide new
  capabilities to the firm’s internal users as well as our
  clients. This role is for a senior platform engineer who
  will help build a firmwide AI Development Platform and drive
  adoption of AI capabilities throughout the enterprise. The
  ideal candidate will have strong hands-on experience of
  building software platforms on Kubernetes, API based
  development, REST framework, data engineering, and large-
  scale API Gateway environments etc. Knowledge of AIML and
  hands-on experience implementing solutions using Generative
  AI are also preferable. The candidate will have a strong
  passion for using AI to increase productivity as well as
  help generate new ideas for product & technical
  improvements.
  
  Primary Responsibilities
  
  - Develop tooling and self-service capabilities for deploying
    AI solutions for the firm. Collaborate with other
    developers to enhance the developer experience when
    building and deploying AI applications.
  - Have a platform mindset and build common, reusable solutions
    to scale Generative AI use cases using pre-trained models
    as well as fine-tuned models.
  - Collaborate with product manager, other tech leads, junior
    staff and other stakeholders to analyze requirements,
    translate them into technical specification and
    architecture documentation.
  - Design scalable, robust, secure, and flexible architecture
    of components of the AI development platform.
  - Leverage Kubernetes/OpenShift to develop modern
    containerized workloads.
  - Leverage container registries like JFrog artifactory,
    container packaging/configuration management technologies
    like Helm & Kustomize, and GitOps deployment methods to
    orchestrate, manage and deploy these workloads.
  - Integrate with capabilities such as large-scale vector
    stores for embeddings.
  - Author best practices on the Generative AI ecosystem, when
    to use which tools, available models such as GPT, Llama,
    Hugging Face etc. and libraries such as Langchain.
  - Analyze, investigate, and implement GenAI solutions focusing
    on Agentic Orchestration and Agent Builder frameworks.
  - Contribute to major design decisions and product selection
    for building Generative AI solutions. Inclusive of app
    authentication, service communication, state
    externalization, container layering strategy and
    immutability.
  - Ensure AI platform are reliable, scalable, and operational;
    (e.g. blueprints for upgrade/release strategies (E.g.
    Blue/Green); logging/monitoring/metrics; automation of
    system management tasks)
  - Participate in all team’s Agile/ Scrum ceremonies.
  
  Required Skills
  
  - Strong hands-on Application Development background in at
    least one prominent programming language, preferably
    Python Flask or FAST Api.
  - Broad understanding of data engineering (SQL, NoSQL, Big
    Data, Kafka, Redis), data governance, data privacy and
    security.
  - Experience in development, management, and deployment of
    Kubernetes workloads, preferably on OpenShift.
  - Experience with designing, developing, and managing RESTful
    services for large-scale enterprise solutions.
  - Hands-on experience with multiprocessing, multithreading,
    asynchronous I/O, performance profiling in at least one
    prominent programming language, preferably python.
  - Practitioner of unit testing, performance testing and
    BDD/acceptance testing.
  - Understanding of OAuth 2.0 protocol for secure
    authorization.
  - Proficiency with Open Telemetry tools including Grafana,
    Loki, Prometheus, and Cortex.
  - Demonstrated experience in DevOps, understanding of CI/CD
    (Jenkins) and GitOps.
  - Ability to articulate technical concepts effectively to
    diverse audiences.
  - Strong desire and ability to influence development teams and
    help them adopt AI.
  - Demonstrated ability to work effectively and collaboratively
    in a global organization, across time zones, and across
    organizations.
  - Understanding of deep learning, understanding of Machine
    Learning frameworks such as TensorFlow or PyTorch.
  - Understanding of Information Security, Secure coding
    practices.
  - Experience in building cloud and container native
    applications.
  - Knowledge of DevOps and Agile practices.
  - Excellent communication skills.
  
  Desired Skills
  
  - Strong understanding and experience designing and building
    software following cloud-native architecture with
    microservices, Kubernetes, docker, kafka, etc.
  - Good knowledge of Microservice based architecture, industry
    standards, for both public and private cloud.
  - Good understanding of modern Application configuration
    techniques.
  - Hands on experience with Cloud Application Deployment
    patterns like Blue/Green.
  - Good understanding of State sharing between scalable cloud
    components (Kafka, dynamic distributed caching).
  - Good knowledge of various DB engines (SQL, Redis, Kafka,
    etc) for cloud app storage.
  - Experience building AI applications, preferably Generative
    AI and LLM based apps.
  - Deep understanding of AI agents, Agentic Orchestration,
    Multi-Agent Workflow Automation, along with hands-on
    experience in Agent Builder frameworks such Lang Chain and
    Lang Graph.
  - Experience working with Generative AI development,
    embeddings, fine tuning of Generative AI models.
  - Understanding of ModelOps/ ML Ops/ LLM Op.
  - Understanding of SRE techniques.
  - Understanding of Responsible AI, AI Ethics.
  - Understanding of Information Security, Secure coding
    practices.
  
  Qualifications:
  
  - Bachelor’s or Master’s degree in Computer Science or related
    field, or equivalent job experience
  - 10+ years of experience in software engineering, design, and
    development
  - 5+ years of experience architecting distributed systems.
  - 1+ year of experience building AI applications, preferably
    Generative AI and LLM based apps.
  
  About us
  
  Morgan Stanley is a leading global financial services firm
  providing a wide range of investment banking, securities,
  investment management and wealth management services. We
  advise, originate, trade, manage and distribute capital for
  governments, institutions, and individuals. As a market
  leader, the talent and passion of our people is critical to
  our success. Together, we share a common set of values
  rooted in integrity, excellence, and strong team ethic. We
  provide you a superior foundation for building a
  professional career where you can learn, achieve, and grow.
  
  At Morgan Stanley, we are shaping the future of our global
  business and contributing to our local community.
  
  Technology
  
  Technology is the key differentiator that ensures that we
  manage our global businesses and serve clients on a market-
  leading platform that is resilient, safe, efficient, smart,
  fast, and flexible. Technology redefines how we do business
  in global, complex, and dynamic financial markets. We have a
  large number of award-winning technology platforms that help
  to propel our Firm’s businesses to be the top in the market.
  We have built strong techno-functional teams which partner
  with our offices globally taking global ownership of systems
  and products. We have a vibrant and diverse mix of
  technologists working on different technologies and
  functional domains. There is a large focus on innovation,
  inclusion, giving back to the community and sharing
  knowledge.
  
  Technology Architecture and Modernization
  
  Technology Architecture & Modernization (A+M) unites a
  highly inter-connected set of functions in a pivotal role
  driving the over-arching technical framework, product
  delivery and developer enablement teams at the center of
  Morgan Stanley's technology strategy. Combining efforts to
  modernize technologies, architecture and development
  practices, A+M drives the Firm's multi-year Technology
  Modernization roadmap to more effective and innovative
  technology platforms, enabling our business to serve
  evolving client demands in a highly competitive industry.
  
  As the group expands and matures, we continue to add top
  technical talent, experienced professionals driven by the
  pursuit of engineering excellence, looking for complex and
  challenging technology roles with impact, visibility and
  unparalleled opportunities to work across Technology in
  multi-disciplinary collaboration with high performing teams,
  including our Distinguished Engineers.
  
  
  What we offer
  
  - To work with some of the best professionals in the business
    - for a firm that values individual intellect as much as
    teamwork.
  - Flexible working arrangements (core hours and opportunity to
    work from home, as per the Morgan Stanley policies in
    effect).
  - Enriching challenges that provide opportunity for constant
    learning and advancement.
  - An environment which is leveraging technology to its highest
    potential.
  
  WHAT YOU CAN EXPECT FROM MORGAN STANLEY:
  
   At Morgan Stanley, we raise, manage and allocate capital
  for our clients – helping them reach their goals. We do it
  in a way that’s differentiated – and we’ve done that for 90
  years.  Our values - putting clients first, doing the right
  thing, leading with exceptional ideas, committing to
  diversity and inclusion, and giving back - aren’t just
  beliefs, they guide the decisions we make every day to do
  what's best for our clients, communities and more than
  80,000 employees in 1,200 offices across 42 countries. At
  Morgan Stanley, you’ll find an opportunity to work alongside
  the best and the brightest, in an environment where you are
  supported and empowered. Our teams are relentless
  collaborators and creative thinkers, fueled by their diverse
  backgrounds and experiences. We are proud to support our
  employees and their families at every point along their
  work-life journey, offering some of the most attractive and
  comprehensive employee benefits and perks in the industry.
  There’s also ample opportunity to move about the business
  for those who show passion and grit in their work.
  
  To learn more about our offices across the globe, please
  copy and paste https://www.morganstanley.com/about-
  us/global-offices into your browser.
  
  Expected base pay rates for the role will be between
  $150,000 and $210,000 per year at the commencement of
  employment. However, base pay if hired will be determined on
  an individualized basis and is only part of the total
  compensation package, which, depending on the position, may
  also include commission earnings, incentive compensation,
  discretionary bonuses, other short and long-term incentive
  packages, and other Morgan Stanley sponsored benefit
  programs.
  
  Morgan Stanley's goal is to build and maintain a workforce
  that is diverse in experience and background but uniform in
  reflecting our standards of integrity and excellence.
  Consequently, our recruiting efforts reflect our desire to
  attract and retain the best and brightest from all talent
  pools. We want to be the first choice for prospective
  employees.
  
