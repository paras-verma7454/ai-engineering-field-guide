description: |
  ABOUT INNOCAP
  
  Innocap is the world’s leading firm of managed account
  platform services. With over US$100 billion in assets under
  management, over 500 employees and offices in five
  countries, we are shaping the future of alternative
  investments for institutional owners and allocators. Our
  mission is to revolutionize the asset management industry
  and to provide customized expert services and an exceptional
  client experience.
  
  We are seeking forward-thinking individuals to join us on
  our exciting journey. Innocap’s success is built on the
  diversity of our people and the strength of their ambitions.
  We empower our teams and foster a culture of inclusivity,
  collaboration, innovation, and growth. At Innocap, you'll
  have the opportunity to enhance your career, work on
  exciting projects, and make a real impact.
  
  About the Role
  
  We are seeking a highly skilled Tech Lead – AI Developer
  with 7+ years of experience in software development,
  including at least 3 years in AI-driven application
  development. The ideal candidate is proficient in modern AI
  tools, large language model (LLM) integrations, Agentic
  workflows, and cloud-native architectures.
  
  This role requires strong technical leadership, hands-on
  engineering capability, and the ability to guide teams in
  building scalable AI-powered solutions using .NET, Azure
  services, DevOps, and modern AI coding assistants.
  
  Key Responsibilities:
  
  · Lead the design & development of AI-driven applications
  using C#, .NET / .NET Core, and cloud-native services
  
  · Architect and implement LLM-based workflows, AI agents,
  automation pipelines
  
  · Work extensively with SQL Server and cloud data platforms
  (Azure SQL, Data Lake, Delta)
  
  · Drive AI coding practices using GitHub Copilot, Claude
  Code, and other AI coding assistants
  
  · Implement Agentic AI patterns, retrieval-augmented
  generation (RAG).
  
  · Collaborate with data engineering teams on Azure
  DataBricks, Data Factory, and ML pipelines
  
  · Ensure code quality using automated unit testing,
  debugging, and performance optimizations
  
  · Guide the team through code reviews, architectural
  decisions, and AI best practices
  
  · Work with DevOps engineers to manage CI/CD pipelines,
  Dockerized applications, Kubernetes deployments
  
  · Create and maintain technical specifications, architecture
  diagrams, and documentation
  
  Qualifications:
  
  · Bachelor’s or Master’s degree in Computer Science,
  Information Technology, Engineering, or related field
  
  · Proven experience developing web applications, APIs,
  microservices, and cloud-hosted backend systems
  
  · Strong knowledge of relational databases and SQL
  
  · Experience with Git, Azure DevOps, and cloud-based
  repositories
  
  · Ability to translate business requirements into modern AI-
  powered technical solutions
  
  · Excellent analytical, debugging, and communication skills
  
  · Experience working in Agile/Scrum environments
  
  Must-Have Skills:
  
  Core Development & Architecture:
  
  · Strong proficiency in C#, .NET / .NET Core
  
  · Proficiency in SQL Server, data modeling, and query
  optimization
  
  AI & LLM Engineering:
  
  · Hands-on experience using GitHub Copilot, Microsoft
  Copilot, Claude Code
  
  · Experience with Agentic AI, LLM orchestration frameworks,
  and task automation
  
  · Experience building AI-integrated applications using Azure
  OpenAI, Anthropic Claude, HuggingFace, or similar platforms
  
  Cloud & DevOps:
  
  · Strong experience with Azure cloud services.
  
  · Hands-on expertise with Docker, containerization, and
  Kubernetes (AKS preferred)
  
  · Experience building and maintaining CI/CD pipelines
  
  Nice-to-Have Skills:
  
  · Exposure to cloud-based testing environments and DevOps
  integration.
  
  · Exposure to financial instruments or experience in the
  BFSI (Banking, Financial Services, and Insurance) domain.
  
  · Knowledge of performance and security testing practices.
  
  Our Offerings:
  
  Hybrid work culture: Flexible working environment to promote
  a healthy work-life balance.
  
  A smart, talented & agile team: International collaboration
  across locations and time zones, with a focus on learning,
  sharing, and fun.
  
  Competitive compensation package: Attractive salary,
  comprehensive insurance, fitness discounts, and employee
  assistance programs.
  
  Continuous learning opportunities: Access to professional
  development platforms and resources.
  
  Diversity and Inclusion: Commitment to fostering a diverse
  and inclusive environment for all employees.
  
