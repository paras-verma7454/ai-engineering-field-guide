description: |
  Lead Python Software Engineer (Python, Node.js, GenAI) -
  Generative AI Products and Platform - Vice President - C13 –
  Pune
  
  The Opportunity
  
  This is your chance to build the foundational backend
  systems for 'Citi Assist', a Generative AI assistant that
  will reach every Citi employee globally. You will join us on
  the ground floor, becoming a core builder on a high-
  visibility platform that sets the standard for how a global
  bank adopts this technology safely and at scale.
  
  What You'll Do
  
  · Build, Code, and Deliver. This is a hands-on role where
  you will be a core contributor to our Python backend. Your
  focus is on writing high-quality, tested code and moving
  features from idea to production efficiently.
  
  · Own Your Features End to End. You will take ownership of
  the features you build. This means you're responsible for
  not just writing the code, but for figuring out the path
  forward, asking the right questions, and driving your work
  to completion without waiting for detailed instructions.
  
  · Build with Safety and Security in Mind. You will build
  with a security-first mindset. For us, building safe, sound,
  and compliant systems is non-negotiable and part of our
  craft. You will be responsible for implementing security
  best practices in your code, from technical hardening to
  considering the emerging challenges of AI safety.
  
  · Be a Great Teammate. You will make the team better through
  collaboration. We expect you to be an active participant in
  our engineering culture; offering and receiving constructive
  code reviews, helping your peers when they are blocked, and
  sharing what you learn. We succeed as a team.
  
  · Live Our Engineering Craftsmanship. You will live our
  Developer Manifesto. We are a team that believes in
  engineering discipline---clean code, meaningful commits,
  tidy branches, and rigorous CI/CD are how we work. You will
  be accountable for upholding these principles in every
  commit you make.
  
  · Take Initiative and Communicate Clearly. This is not a
  role where you'll be handed detailed specs for every task.
  We expect you to take ownership of a problem, ask clarifying
  questions, and then drive your work forward with a high
  degree of autonomy. This also means communicating your
  progress and blockers proactively and concisely. No one on
  the team should ever have to ask you for a status update.
  
  What We're Looking For
  
  · A pragmatic builder who takes pride in their craft and
  builds software that lasts.
  
  · A solutions-first mindset. You find the best path to solve
  the problem, whether that's writing new code, improving an
  old system, or integrating the right tool. The outcome is
  what matters.
  
  · A bias for action and a focus on shipping. You understand
  our goal is to deliver value to users, not just to write
  perfect code. You know when to be pragmatic and when to
  invest in technical excellence.
  
  · An instinct for ownership and communication. You are
  proactive by nature. You don't wait to be told what to do,
  and you understand that keeping the team aligned through
  clear communication is your responsibility.
  
  · A drive for technical excellence and a collaborative
  spirit. You find satisfaction in building high-quality
  software, and you thrive in a team environment where you can
  learn from and help your peers.
  
  · Deep, hands-on experience building, deploying, and
  maintaining production-grade Python services.
  
  · A security-conscious mindset. You see security and safety
  as part of the job, not an afterthought.
  
  · A firm grasp of software design patterns and a belief in
  writing clean, testable, and maintainable code.
  
  · Comfort with deploying and managing applications in
  containerized environments (we use OpenShift, but Kubernetes
  experience is what matters).
  
  · Practical experience with CI/CD pipelines and a belief in
  automating everything.
  
  · Solid experience working with relational databases like
  Postgres.
  
  Qualifications:
  
  - 10-15 years of strong Development engineering experience
    using Python, TypeScript, React, Next.js, Node.js.
  - Kubernetes (Red Hat OpenShift), Containers
  - GitHub, CI/CD (e.g., Tekton, Harness), GitHub Copilot
  - Direct experience with Generative AI concepts, LLMs, or
    related personal/professional projects.
  - Experience with other languages like TypeScript, Go, or
    Java. It shows your curiosity and adaptability.
  - Experience with data pipelines and ETL tools such as Apache
    Airflow and Dagster.
  
  Our Tech Stack
  
  · Backend: Python
  
  · Databases: Postgres
  
  · Infrastructure: Kubernetes (Red Hat OpenShift), Containers
  
  · DevOps: GitHub, CI/CD (e.g., Tekton, Harness), GitHub
  Copilot
  
  · Frontend (for context): TypeScript, React, Next.js
  
  Our Team, Mission, and Why You Should Join Us
  
  We are the Common Platform Engineering - GenAI team, a
  central group in the Chief Technology Office (CTO). We're a
  focused agile team that owns our work from idea to
  production.
  
  Our culture is built on a shared belief in engineering
  craftsmanship, backed by leadership that understands what
  that means. We're on a journey to prove what's possible
  inside a large organization, and that means navigating some
  legacy while building the future. This isn't a role for
  someone who wants everything to be perfect on day one. It's
  for an engineer who wants to be part of the team that gets
  us there, influencing how we solve problems and raising our
  collective bar through their work.
  
  We have a dual mission: build 'Citi Assist,' the GenAI
  digital assistant for our colleagues, and provide the
  platforms and guidance that enable the entire organization
  to adopt GenAI safely and effectively.
  
  This is not a typical banking job. You will build
  foundational technology that has a direct, positive impact
  on hundreds of thousands of people. You'll have the
  executive support to tackle big problems and the autonomy to
  help shape our solutions. Most importantly, you will join a
  passionate, collaborative team where we all learn from each
  other, and we succeed or fail as one.
  
