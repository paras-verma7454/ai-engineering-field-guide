  About Firework
  
  
  
  Join Firework – Where Innovation Meets Impact
  
  
  
  Firework is redefining the future of commerce as an AI and
  video commerce company — combining cutting-edge technology,
  an exclusive network of enterprise brands and retailers, and
  a first-mover position to win the agentic commerce race.
  
  
  
  We've built the world's most advanced and largest video
  commerce platform, trusted by global brands and leading
  retailers. But we're more than software — our compounding
  network effect grows stronger with every partner we add,
  bringing the energy of in-store experiences online and
  transforming how businesses engage, convert, and build
  lasting customer relationships at scale.
  
  
  
  Having raised over $235M to date, led by investors such as
  SoftBank Vision Fund 2, and operating at global scale, we
  offer unparalleled opportunities to solve complex challenges
  and drive meaningful impact in the future of connected
  commerce.
  
  
  
  If you're curious, ambitious, and energized by big ideas —
  Firework is the place to grow, lead, and shape what comes
  next. Together.
  
  
  
  Summary
  
  
  
  Firework is looking for an AI GTM Engineer to architect,
  build, and operate the AI-powered systems that fuel our go-
  to-market motion. You will sit at the intersection of AI
  engineering and revenue operations, building autonomous
  agents that supercharge our GTM teams—enabling SDRs, AEs,
  and marketers to move faster, personalize at scale, and
  focus on what matters most: closing deals and growing
  enterprise pipelines.
  
  
  
  This is a high-impact, highly visible role for someone who
  thrives at the cutting edge of AI tooling and wants to
  directly shape how a fast-growing company wins in the
  market.
  
