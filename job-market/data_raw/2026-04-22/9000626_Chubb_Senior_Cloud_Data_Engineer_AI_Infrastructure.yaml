  Employee Benefits
  
  Our company offers a comprehensive benefits package designed
  to support our employees’ health, well-being, and
  professional growth. Employees enjoy flexible work options,
  generous paid time off, and robust health coverage,
  including treatment for dental and vision related
  requirements. We invest in the future of our employees
  through continuous learning opportunities and career
  advancement programs, while fostering a supportive and
  inclusive work environment. Our benefits include:
  
  - Savings and Investment plans: We provide specialized
    benefits like Corporate NPS (National Pension Scheme),
    Employee Stock Purchase Plan (ESPP), Long-Term Incentive
    Plan (LTIP), Retiral Benefits and Car Lease that help
    employees optimally plan their finances
  - Upskilling and career growth opportunities: With a focus on
    continuous learning, we offer customized programs that
    support upskilling like Education Reimbursement Programs,
    Certification programs and access to global learning
    programs.
  - Health and Welfare Benefits: We care about our employees’
    well-being in and out of work and have benefits like
    Hybrid Work Environment, Employee Assistance Program
    (EAP), Yearly Free Health campaigns and comprehensive
    Insurance benefits.
  
  Application Process
  
  Our recruitment process is designed to be transparent, and
  inclusive.
  
  - Step 1: Submit your application via the Chubb Careers
    Portal.
  - Step 2: Engage with our recruitment team for an initial
    discussion.
  - Step 3: Participate in Hacker Rank
    assessments/technical/functional interviews and
    assessments (if applicable).
  - Step 4: Final interaction with Chubb leadership.
  
  Join Us
  
  With you Chubb is better. Whether you are solving challenges
  on a global stage or creating innovative solutions for local
  markets, your contributions will help shape the future. If
  you value integrity, innovation, and inclusion, and are
  ready to make a difference, we invite you to be part of
  Chubb India’s journey.
  
