description: |
  Job Description
  
  Purpose of the role
  
  To design, develop and improve software, utilising various
  engineering methodologies, that provides business, platform,
  and technology capabilities for our customers and
  colleagues.
  
  Accountabilities
  
  - Development and delivery of high-quality software solutions
    by using industry aligned programming languages,
    frameworks, and tools. Ensuring that code is scalable,
    maintainable, and optimized for performance.
  - Cross-functional collaboration with product managers,
    designers, and other engineers to define software
    requirements, devise solution strategies, and ensure
    seamless integration and alignment with business
    objectives.
  - Collaboration with peers, participate in code reviews, and
    promote a culture of code quality and knowledge sharing.
  - Stay informed of industry technology trends and innovations
    and actively contribute to the organization’s technology
    communities to foster a culture of technical excellence
    and growth.
  - Adherence to secure coding practices to mitigate
    vulnerabilities, protect sensitive data, and ensure secure
    software solutions.
  - Implementation of effective unit testing practices to ensure
    proper code design, readability, and reliability.
  
  Assistant Vice President Expectations
  
  - To advise and influence decision making, contribute to
    policy development and take responsibility for operational
    effectiveness. Collaborate closely with other functions/
    business divisions.
  - Lead a team performing complex tasks, using well developed
    professional knowledge and skills to deliver on work that
    impacts the whole business function. Set objectives and
    coach employees in pursuit of those objectives, appraisal
    of performance relative to objectives and determination of
    reward outcomes
  - If the position has leadership responsibilities, People
    Leaders are expected to demonstrate a clear set of
    leadership behaviours to create an environment for
    colleagues to thrive and deliver to a consistently
    excellent standard. The four LEAD behaviours are: L –
    Listen and be authentic, E – Energise and inspire, A –
    Align across the enterprise, D – Develop others.
  - OR for an individual contributor, they will lead
    collaborative assignments and guide team members through
    structured assignments, identify the need for the
    inclusion of other areas of specialisation to complete
    assignments. They will identify new directions for
    assignments and/ or projects, identifying a combination of
    cross functional methodologies or practices to meet
    required outcomes.
  - Consult on complex issues; providing advice to People
    Leaders to support the resolution of escalated issues.
  - Identify ways to mitigate risk and developing new
    policies/procedures in support of the control and
    governance agenda.
  - Take ownership for managing risk and strengthening controls
    in relation to the work done.
  - Perform work that is closely related to that of other areas,
    which requires understanding of how areas coordinate and
    contribute to the achievement of the objectives of the
    organisation sub-function.
  - Collaborate with other areas of work, for business aligned
    support areas to keep up to speed with business activity
    and the business strategy.
  - Engage in complex analysis of data from multiple sources of
    information, internal and external sources such as
    procedures and practises (in other areas, teams,
    companies, etc).to solve problems creatively and
    effectively.
  - Communicate complex information. 'Complex' information could
    include sensitive information or information that is
    difficult to communicate because of its content or its
    audience.
  - Influence or convince stakeholders to achieve outcomes.
  
  All colleagues will be expected to demonstrate the Barclays
  Values of Respect, Integrity, Service, Excellence and
  Stewardship – our moral compass, helping us do what we
  believe is right. They will also be expected to demonstrate
  the Barclays Mindset – to Empower, Challenge and Drive – the
  operating manual for how we behave.
  
  Join us as a Software Engineer Agentic AI at Barclays, where
  you'll spearhead the evolution of our digital landscape,
  driving innovation and excellence. You'll harness cutting-
  edge technology to revolutionize our digital offerings,
  ensuring unapparelled customer experiences. The ideal
  candidate will have deep expertise in cloud-native
  technologies, distributed streaming platforms, Kubernetes
  orchestration, and multi-region architecture patterns.
  
  To be a successful as Software Engineer Agentic AI you
  should have experience with:
  
  - Lead the design and development of agentic AI systems,
    leveraging modern frameworks such as LangChain, LangGraph,
    CrewAI, and similar orchestration libraries to build
    autonomous, goal‑driven AI workflows.
  - Drive hands‑on development of multi‑agent systems, including
    agent collaboration, task delegation, memory management,
    and tool integration patterns.
  - Act as a hands‑on expert in Python‑based AI/ML development,
    using industry‑standard libraries such as NumPy, Pandas,
    Scikit‑learn, TensorFlow, PyTorch, Keras, and associated
    tooling.
  - Apply strong fundamentals in machine learning, deep
    learning, and data processing, ensuring models and agents
    are explainable, testable, and maintainable.
  - Guide teams on model lifecycle management, inference
    optimisation, and production readiness of AI solutions.
  - Lead integration of Large Language Models (LLMs) into
    enterprise systems, including prompt engineering,
    tool‑calling, retrieval‑augmented generation (RAG), and
    agent reasoning strategies.
  - Ensure AI solutions align with responsible AI principles,
    data privacy, security, and regulatory expectations.
  - Evaluate and influence adoption of latest AI innovations,
    including Speculative AI techniques, reasoning‑augmented
    agents, and hybrid symbolic‑LLM approaches.
  - Champion modern AI‑assisted engineering practices, including
    familiarity with tools such as Claude Code, GitHub
    Copilot, and similar coding assistants, to improve
    developer productivity and code quality.
  - Set standards for engineering quality, testing,
    observability, and operational readiness in AI‑driven
    systems.
  - Experience working in cloud environments, with hands‑on
    exposure to AWS Bedrock or similar managed AI platforms.
  - Deliver software using Agile methodologies, actively
    participating in sprint planning, reviews, retrospectives,
    and continuous improvement.
  - Apply DORA metrics (deployment frequency, lead time for
    change, change failure rate, MTTR) to drive delivery
    predictability and engineering health.
  - Strong familiarity with modern developer tooling including
    GitLab, DevSecOps pipelines, and secure CI/CD practices.
  - Hands‑on experience with: Docker Desktop for local
    containerized development, IntelliJ IDEA or equivalent
    enterprise IDEs and Secure source control, branching
    strategies, and automated quality gates
  - Drive a test‑first, quality‑driven engineering culture, with
    hands‑on experience in – Contract Testing (PACT), Unit
    Testing (Junit), Performance and Load testing (Jmeter),
    Mutation Testing.
  
  Some other highly valued skills may include:
  
  - Contributes as an Individual Contributor (ICE) in the
    delivery of agentic AI solutions, owning end‑to‑end
    technical implementation of autonomous and multi‑agent
    systems, including design, development, integration,
    testing, and production readiness, while operating with
    minimal supervision and strong engineering accountability.
  - Work effectively within Agile/Scrum delivery models, using
    Jira for backlog management, delivery tracking, and sprint
    execution.
  - Apply strong analytical and troubleshooting skills to
    diagnose and resolve complex issues in distributed,
    event‑driven systems.
  - Demonstrate excellent verbal and written communication,
    producing clear architecture designs, decision records,
    and technical documentation.
  - Collaborate closely with cross‑functional teams
    (engineering, DevOps, security, architecture) to deliver
    integrated, enterprise‑ready solutions.
  - Exhibit strong ownership, self‑drive, and innovation
    mindset, staying current with cloud‑native technologies
    and modern engineering best practices.
  
  You may be assessed on key critical skills relevant for
  success in role, such as risk and controls, change and
  transformation, business acumen, strategic thinking and
  digital and technology, as well as job-specific technical
  skills.
  
  This role is based out of Bengaluru.
