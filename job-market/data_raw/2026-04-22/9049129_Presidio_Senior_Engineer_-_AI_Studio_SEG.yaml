description: |
  Presidio, Where Teamwork and Innovation Shape the Future
  At Presidio, we’re at the forefront of a global technology
  revolution, transforming industries through cutting-edge
  digital solutions and next-generation AI. We empower
  businesses—and their customers—to achieve more through
  innovation, automation, and intelligent insights.
  
  The Role Presidio’s Solution Engineering Group is building
  the next generation of solutions that enhance business
  outcomes for our clients and internal teams. We are seeking
  a Sr Engineer (SEG) with strong full stack technical
  fundamentals, curiosity for emerging technologies, and a
  passion for solving real-world challenges using cloud and
  Generative AI.
  
  Why You'll Love this Role:
  
  
  
  - Opportunity to work on cutting-edge innovation projects with
    real business impact.
  - Exposure to cloud, AI, and automation technologies shaping
    Presidio’s future.
  - A culture that values learning, experimentation, and
    collaboration.
  - Room to grow within a team that supports technical
    excellence and creative thinking.
  
  Responsibilities include:
  
  
  
  - Develop and expand our AI Studio Platform toward full
    commericalization
  - Design, develop, and test innovative prototypes and
    accelerators that enhance Presidio’s product and service
    offerings.
  - Collaborate with architects, product managers, and senior
    engineers to implement cloud-native and AI-powered
    solutions.
  - Contribute to building platforms, frameworks, and automation
    solutions that improve team efficiency and create customer
    value.
  - Research and apply emerging technologies — especially in
    GenAI, data, and automation — to deliver value-driven
    outcomes.
  - Participate in design reviews, documentation, and innovation
    showcases to share knowledge and best practices.
  
  Required Skills and Professional Experience
  
  
  
  - Bachelor’s degree or equivalent experience and/or military
    experience
  - 2–5 years of professional software engineering experience.
  - Proficiency in one or more programming languages: Python,
    Java, Go, C#, or TypeScript.
  - Experience with APIs, microservices, and containerization
    (Docker).
  - Familiarity with cloud environments (AWS, Azure, or GCP).
  - Interest or exposure to AI/ML or GenAI technologies.
  - Strong problem-solving, analytical, and communication
    skills.
  - A collaborative mindset with a drive to learn and
    experiment.
  
  Your future at Presidio
  
  Joining Presidio means stepping into a culture of
  trailblazers—thinkers, builders, and collaborators—who push
  the boundaries of what’s possible. With our expertise in AI-
  driven analytics, cloud solutions, cybersecurity, and next-
  gen infrastructure, we enable businesses to stay ahead in an
  ever-evolving digital world.
  
  Here, your impact is real. Whether you're harnessing the
  power of Generative AI, architecting resilient digital
  ecosystems, or driving data-driven transformation, you’ll be
  part of a team that is shaping the future.
  
  Ready to innovate? Let’s redefine what’s next—together.
  
  About Presidio  At Presidio, speed and quality meet
  technology and innovation. Presidio is a trusted ally for
  organizations across industries with a decades-long history
  of building traditional IT foundations and deep expertise in
  AI and automation, security, networking, digital
  transformation, and cloud computing. Presidio fills gaps,
  removes hurdles, optimizes costs, and reduces risk.
  Presidio’s expert technical team develops custom
  applications, provides managed services, enables actionable
  data insights and builds forward-thinking solutions that
  drive strategic outcomes for clients globally. For more
  information, visit www.presidio.com.
  
  Presidio is committed to hiring the most qualified
  candidates to join our amazing culture. We aim to attract
  and hire top talent from all backgrounds, including
  underrepresented and marginalized communities. We encourage
  women, people of color, people with disabilities, and
  veterans to apply for open roles at Presidio. Diversity of
  skills and thought is a key component to our business
  success.
  
