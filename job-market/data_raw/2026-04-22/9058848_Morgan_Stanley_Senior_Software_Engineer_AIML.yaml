description: |
  In the Technology division, we leverage innovation to build
  the connections and capabilities that power our Firm,
  enabling our clients and colleagues to redefine markets and
  shape the future of our communities.
  
  We have multiple Software Engineering positions open at
  Associate, Director and VP levels, which are part of the job
  family responsible for developing and maintaining software
  solutions that support business needs.
  
  Since 1935, Morgan Stanley is known as a global leader in
  financial services, always evolving and innovating to better
  serve our clients and our communities in more than 40
  countries around the world.
  
  Morgan Stanley is a leading global financial services firm,
  providing investment banking, securities, wealth management,
  and investment management services in over 40 countries. The
  firm is recognized for its commitment to innovation,
  integrity, and delivering value to clients, shareholders,
  and communities worldwide.
  
  The Role Join the LIFC Technology team to help modernize
  core accounting and P&L platforms used daily by Finance and
  Treasury. We are consolidating legacy and spreadsheet‑driven
  workflows into a single, cloud‑native web platform that
  supports reporting, exception analysis, accounting
  adjustments, and daily P&L sign‑off.
  
  This role is ideal for strong backend engineers who enjoy
  working on data‑intensive, business‑critical systems and
  partnering closely with finance users.
  
  What You’ll Do
  
  - Build and operate backend services using Java, Scala, and
    Python
  - Deploy services on Databricks and cloud platforms
  - Design secure, scalable APIs for finance workflows and
    analytics
  - Collaborate with Finance, Product Control, and UI/reporting
    teams
  - Apply strong engineering fundamentals (data structures,
    testing, code quality)
  - Learn and apply new technologies, including AI/ML and
    prompt‑based approaches, where they add value
  
  What We’re Looking For
  
  - 4-15 years of strong backend engineering experience
  - Solid grasp of data structures, algorithms, and system
    design
  - Experience with data‑heavy or workflow‑driven systems
  - Ownership mindset and willingness to learn
  
  Why Join
  
  - Work on core finance systems with real business impact
  - High‑visibility role with platform and architectural
    influence
  - Collaborative team modernizing critical finance workflows
  
  Tech Stack at a Glance
  
  - Backend: Java, Scala, Python
  - Data / Compute: Databricks
  - Cloud: Cloud‑native services & deployments
  - Frontend / Reporting: Angular, Power BI, Tableau
  - Focus Areas: Accounting workflows, P&L, controls, data
    quality, AI‑assisted analytics
  
