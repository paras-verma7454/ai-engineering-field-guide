description: |
  SitusAMC is where the best and most passionate people come
  to transform our client’s businesses and their own careers.
  Whether you’re a real estate veteran, a passionate
  technologist, or looking to get your start, join us as we
  work together to realize opportunities for everyone, we
  proudly serve.
  
  At SitusAMC, we are looking to match your unique experience
  with one of our amazing careers, so that we can help you
  realize your potential and career growth within the Real
  Estate Industry. If you are someone who can be yourself,
  advocate for others, stay nimble, dream big, own every
  outcome, and think global but act local – come join our
  team!
  
  This role is responsible for the development and execution
  of AI-driven solutions within the commercial real estate
  division. This role is responsible for crafting
  sophisticated prompts and overseeing the design of advanced
  agents to enhance operational efficiency, optimize customer
  engagement, and drive the divi-sion’s digital
  transformation. This role collaborates closely with both
  technical and business teams, provid-ing guidance to ensure
  that AI solution decisions are accurate, scalable, and
  compliant with industry stand-ards. This position is
  instrumental in translating complex business needs into
  actionable AI use cases, de-veloping and reviewing test
  plans, and leading quality assurance, volume, and bias
  testing to ensure the reliability and ethical integrity of
  AI models and processes.
  
  Essential Job Functions:
  
  - Develop AI agents and prompts, ensuring seamless
  - Supporting integration with existing internal and 3rd party
    systems
  - Ensure AI models and solutions are built with scalability,
    reliability, and compliance in mind, addressing ethical AI
    concerns and industry regulations.
  - Ensure AI development follows SitusAMC standard processes
    and procedures
  - Participate in Quality Assurance testing, Volume testing and
    Bias testing of agents including creating test plans
  - Work alongside existing delivery teams to enhance product
    offerings, streamline workflows, and improve decision-
    making through AI-powered insights.
  - Support Business Personnel tasked with advancing AI
    initiatives
  - Other activities as may be assigned by your manage
  
  Qualifications/ Requirements:
  
  - Bachelor's degree in a relevant field (such as Business,
    Computer Science, or Engineering) or equivalent
    combination of education and experience
  - Mid-level professional with 2-4 years of industry and/or
    relevant experience, typically at an Analyst level role or
    external equivalent.
  - Strategic mindset with the ability to align product
    decisions with organizational strategy
  - Excellent communication and presentation skills; able to
    communicate effective across business lines
  - Strong analytical skills
  - Knowledge of Agile delivery methodologies and their
    application in product or service development
  - Ability to collaborate effectively with cross-functional
    teams and stakeholders
  - Real estate experience preferred, but not required
  
  #LI-AS1 #LI-Remote
  
  Note: This job description is not intended to be all
  inclusive or exclusive. At any time, employees may perform
  other related duties as required to meet the ongoing needs
  of the organization and participate in additional trainings.
  SitusAMC does not accept unsolicited resumes from staffing
  agencies, search firms or any third parties. Any unsolicited
  resume submitted to SitusAMC in any manner will be
  considered SitusAMC property, and SitusAMC will not pay a
  fee for any placement resulting from the receipt of an
  unsolicited resume.
  
  The annual full time base salary range for this role is
  
  $50,000.00 - $80,000.00
  
  Specific compensation is determined through interviews and a
  review of relevant education, experience, training, skills,
  geographic location and alignment with market data.
  Additionally, certain positions may be eligible to receive a
  discretionary bonus as determined by bonus program
  guidelines, position eligibility and SitusAMC Senior
  Management approval. SitusAMC offers PTO and paid holidays,
  the terms of which are set forth in the program policies.
  All full time employees also are eligible to participate in
  various benefit plans, including medical, dental, vision,
  life, disability insurance and 401K; in each case in
  accordance with the terms of the applicable plans.
  
