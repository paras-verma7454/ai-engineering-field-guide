description: |
  This is a job that Jill, our AI Recruiter, is recruiting for
  on behalf of one of our customers.
  
  She will pick the best candidates from Jack's network
  
  The next step is to speak to Jack.
  
  Job Title: Full Stack Engineer
  
  Salary: £60k-£80k + Equity
  
  Company Description: Lichen AI - Early-stage agentic
  platform for AI discovery
  
  Job Description: As the first full-time engineer, you will
  transform a working prototype into a production-grade
  enterprise SaaS. You'll build robust backends, design
  intuitive interfaces for complex AI outputs, and establish
  foundational engineering practices. Working directly with an
  expert founding team, you'll ensure the platform is secure,
  reliable, and ready for global enterprise customers.
  
  Location: Cambridge, UK
  
  Why this role is remarkable:
  
  - Join as the first founding engineer with a significant
    equity stake and a clear path to technical leadership as
    the company scales.
  - Work alongside a world-class founding team including the
    former Chair of the UK Government’s AI Council and Amazon
    Alexa's speech recognition lead.
  - Build a mission-driven platform that uses agentic AI to
    amplify human insight rather than replacing it, solving a
    critical adoption gap for enterprise clients.
  
  What you will do:
  
  - Transition a high-potential prototype to a production-grade
    platform by building secure, scalable backend systems and
    automated deployment pipelines.
  - Lead the end-to-end development of the user interface,
    making complex AI-generated insights legible and
    actionable for non-technical business users.
  - Implement enterprise-grade security and compliance standards
    including ISO 27001 and GDPR to ensure safe handling of
    sensitive client data.
  
  The ideal candidate:
  
  - Has 3-8 years of experience shipping production web
    applications using modern JavaScript/TypeScript (React)
    and Python (FastAPI).
  - Demonstrates strong proficiency in cloud infrastructure,
    specifically AWS, and designing robust database structures
    and data pipelines.
  - Thrives in a small, fast-paced startup environment and
    possesses a genuine interest in human-centered AI that
    enhances domain expertise.
  
  Who are Jack & Jill? Ok, I'll go first. I'm Jack, an AI that
  gets to know you on a quick call, learning what you're great
  at and what you want from your career. Then I help you land
  your dream job by finding unmissable opportunities as they
  come up, supporting you with applications, interview prep,
  and moral support. And I'm Jill, an AI Recruiter who talks
  to companies to understand who they're looking to hire. Then
  I recruit from Jack's network, making an introduction when I
  spot an excellent candidate.
  
  Next steps Step 1. Visit our website. Step 2. Click 'Talk to
  Jack'. Step 3. Talk to Jack so he can understand your
  experience and ambitions. Step 4. Jack will make sure Jill
  (the AI agent working for the company) considers you for
  this role. Step 5. If Jill thinks you're a great fit and her
  client wants to meet you, they will make the introduction.
  Step 6. If not, Jack will find you excellent alternatives.
  All for free.
  
  We never post fake jobs This isn't a trick. This is an open
  role that Jill is currently recruiting for from Jack's
  network. Sometimes Jill's clients ask her to anonymize their
  jobs when she advertises them, which means she can't share
  all the details in the job description. We appreciate this
  can make them look a bit suspect, but there isn't much we
  can do about it. Give Jack a spin! You could land this role.
  If not, most people find him incredibly helpful with their
  job search, and we're giving his services away for free.
