description: |
  Join us to build future-proof digital solutions
  
  At Riverflex, we believe in creating impactful digital
  products that are lean, scalable, and human-centered. As a
  Full Stack/Product Engineer, you’ll be a core member of our
  in-house engineering team—helping to develop high-performing
  software solutions that power business transformation across
  industries. You’ll work on client-facing products, internal
  tools, and prototypes that leverage modern web frameworks,
  cloud platforms, and data-driven architectures.
  
  We’re looking for a curious, proactive engineer who thrives
  in agile environments and brings a user-first mindset to
  technical challenges. If you’re passionate about writing
  clean code, mentoring others, and delivering impact through
  technology, let’s talk.
  
  The Role
  
  You’ll play a pivotal role in the design, development, and
  delivery of digital products across the full stack—from
  front-end user interfaces to backend systems and cloud
  services. We’re looking for someone with hands-on experience
  implementing LLM APIs and developing RAG applications,
  including work with embeddings and vector search.
  
  Responsibilities
  
  - Design and develop scalable web applications using modern
    front-end and back-end technologies (React, Node.js,
    Python)
  
  - Take ownership of the full software development lifecycle,
    including architecture, development, testing, and
    deployment
  
  - Write clean, well-documented, and testable code following
    best practices
  
  - Collaborate with designers, product managers, and clients to
    shape features from concept to implementation
  
  - Review code, mentor junior engineers, and contribute to
    improving engineering practices
  
  - Integrate third-party APIs and services securely and
    efficiently
  
  - Drive continuous delivery and DevOps improvements (CI/CD,
    cloud infra-as-code, automated testing)
  
  - Contribute to technical documentation and team knowledge-
    sharing
  
  Must-Haves
  
  - 7+ years of professional experience in full-stack
    development
  
  - Deep knowledge of modern front-end frameworks (React, Vue)
    and back-end technologies (Node.js, Python)
  
  - Proficiency with RESTful APIs, microservices, and databases
    (PostgreSQL, MongoDB, etc.)
  
  - Experience deploying to cloud environments (preferably AWS
    or GCP)
  
  - Strong understanding of software architecture and design
    patterns
  
  - Comfort working in Agile, cross-functional teams
  
  - Strong communication and collaboration skills
  
  Nice-to-Haves
  
  - Experience with CI/CD pipelines, containerization (Docker,
    Kubernetes)
  
  - Familiarity with AI/ML model integration or data engineering
    workflows
  
  - Interest in mentoring and growing engineering talent
  
  - Passion for clean code, testing, and automation
  
  What We Offer
  
  - 25 days off per year plus closure between Christmas and New
    Year's.
  
  - Flexible remote work from abroad options for up to 6 weeks
    per year.
  
  - Learning & Development budget, including full access to
    Udemy courses.
  
  - Classpass membership to support well-being.
  
  - Latest tech & tools, including home office budget and
    professional software subscriptions.
  
  - Equity share scheme to give long-term team members ownership
    in Riverflex.
  
  - Annual company trips to celebrate successes together.
