  About the Role:
  
  Grade Level (for internal use):
  
  11
  
  The Role: Lead Java Developer (with Gen AI)
  
  The Team: The Foreseer team delivers digital transformation
  solutions at EDO for information extraction from structures
  and semi structured documents and websites. Foreseer is a
  human in the loop platform that combines latest AI/ML
  advances with a state-of-the-art UI for delivering multiple
  projects, all powered by a core distributed, cloud native,
  auto scalable framework. Team comprises of experts in Java
  and Python language and ML engineers.
  
  Responsibilities Include
  
  - Support and foster a quality-first, agile culture that is
    built on partnership, trust and sharing.
  - Design, develop and maintain functionalities to create new
    solutions on the platform.
  - Learning and understanding all aspects of the framework and
    the project deliverables.
  - Be technically deep and able to write high quality code
    using industry best practices.
  - Be responsible for implementation of new features and
    iterations of your project.
  - Implement security measures and compliance standards to
    protect sensitive data and ensure adherence to industry
    regulations.
  - Maintain comprehensive documentation of platform, processes
    and procedures for reference and knowledge sharing.
  - Ensure the use of standards, governance and best practices
    in the industry to deliver high quality scalable
    solutions.
  - Strategic thinker and influencer with demonstrated technical
    and business acumen and problem-solving skills.
  
  Experience & Qualifications:
  
  - BS or MS degree in Computer Science or Information
    Technology or equivalent.
  - 8+ years hands on experience with Java, J2EE and related
    frameworks and technologies (Spring, Restful services,
    Spring Boot, Spring JPA, Spring Security, MVC etc.).
  - 3+ years of experience with designing and building
    microservices based distributed systems in serverless
    environment (containers platforms).
  - 3+ years of experience in Active MQ or other related JMS
    providers.
  - Proficient with Data structures and Algorithms.
  - Experience in different data base technologies (like RDBMS,
    NOSQL)
  - Experience with Performance tuning, Thread dump analysis and
    code refactoring.
  - Experience in Containerization, cloud platforms, CI/CD, and
    deployments through CI/CD pipelines, and AWS services like
    S3, EKS, EC2 etc.
  - Proficiency in the development environment, including IDE,
    web & application server, GIT, Azure DevOps, unit-testing
    tool and defect management tools
  - AI/ML solutions architecture.
  - Knowledge of GenAI Platforms and tech stacks.
  
  Nice to Have Skills
  
  - Distributed systems programming.
  - Hands on experience with Elastic/Redis search.
  - Hands on experience in Python
  - Hands on experience in Vaadin/React Framework
  - Experience in Agile and Scrum methodologies
  
