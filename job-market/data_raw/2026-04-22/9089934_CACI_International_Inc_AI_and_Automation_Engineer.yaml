  * * *
  
  The Opportunity: We are seeking an experienced AI &
  Automation Lead to join our team, responsible for the
  strategic design, engineering, and deployment of generative
  AI and automation solutions across the organization. This
  individual will lead a small automation team with a focus on
  delivering secure, scalable AI applications that accelerate
  decision-making, optimize logistics, and automate complex
  workflows. Responsibilities:
  
  - Design and implement retrieval-augmented generation (RAG)
    systems and semantic search architectures. Build
    production-grade LLM applications and autonomous agentic
    systems capable of executing complex tasks.
  - Adapt and fine-tune foundation models for specialized,
    highly secure use cases. Deploy scalable AI solutions
    across multi-domain environments, including cloud, on-
    prem, and hybrid infrastructures.
  - Apply LLMs to complex, domain-specific problems and
    integrate them directly into operational workflows to
    accelerate mission outcomes.
  - Analyze and identify manual processes and tasks used by
    operations staff that can be automated
  - Design, develop, and implement automation solutions using a
    variety of tools and technologies, such as scripting
    languages (e.g. Python, PowerShell), automation frameworks
    (e.g. Ansible, Puppet), and workflow management tools
    (e.g. ServiceNow, BMC Helix)
  - Develop and maintain automation tools and scripts that
    integrate with existing systems and applications
  
  Work with stakeholders to define automation requirements and
  ensure that solutions meet their needs Qualifications:
  Required:
  
  - B.S. in machine learning, computer science, mathematics, or
    related fields
  - 8+ years of experience, preferably in software development
    or as a data scientist with 2+ years of building LLM
    applications
  - Demonstrated ability to fine-tune foundational models
  - Demonstrated ability to securely integrate and manage
    commercial AI APIs
  - Building adapters to use foundational models (e.g. PEFT,
    llama factory)
  - Using Retrieval Augmented Generation techniques to populate
    and query vector databases
  - Strong knowledge of scripting languages (e.g. Python,
    PowerShell) and automation frameworks (e.g. Ansible,
    Puppet)
  - Experience with workflow management tools (e.g. ServiceNow,
    BMC Helix) and IT service management platforms
  - Strong understanding of operational processes and workflows
  - Excellent problem-solving skills and attention to detail
  - Ability to work collaboratively with operations staff and
    stakeholders to understand their needs and develop
    effective automation solutions
  - Strong communication and documentation skillsDesired:
  
  - Large Language Models and experience identifying ways to
    incorporate them into new domains and applications
  - Natural Language Processing algorithms such as BERT
  - Experience with CUDA and Python libraries such as CuPy,
    Numba, CuSignal, CuDF, etc.
  - Experience with containerization technologies (e.g. Docker)
    and orchestration tools (e.g. Kubernetes)
  - Knowledge of agile development methodologies and version
    control systems (e.g. Git)
  - Experience with continuous integration and continuous
    deployment (CI/CD) pipelinesEducation:
  - Bachelor's degree in Computer Science, Engineering, or a
    related field
  
