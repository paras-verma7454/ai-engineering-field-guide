description: |
  About Us
  
  At LangChain, our mission is to make intelligent agents
  ubiquitous. We build the foundation for agent engineering in
  the real world, helping developers move from prototypes to
  production-ready AI agents that teams can rely on. We began
  as widely adopted open-source tools and have grown to also
  offer a platform for building, evaluating, deploying, and
  operating agents at scale.
  
  With $125M raised at Series B from IVP, Sequoia, Benchmark,
  CapitalG, and Sapphire Ventures, we’re at a stage where
  we’re continuing to develop new products, growth is
  accelerating, and all team members have meaningful impact on
  what we build and how we work together. LangChain is a place
  where your contributions can shape how this technology shows
  up in the real world.
  
  Today, LangChain, LangGraph, LangSmith, and Fleet are used
  by teams shipping real AI products across startups and large
  enterprises. Millions of developers trust LangChain to power
  AI teams at companies like Replit, Clay, Coinbase, Workday,
  Lyft, Cloudflare, Harvey, Rippling, Vanta, and 35% of the
  Fortune 500.
  
  About the role
  
   We're looking for a Fullstack Engineer to work on
  LangSmith, our commercial AI observability and evals
  platform product. In this role, you'll have the opportunity
  to build new features and functionality for the platform
  while working close enterprise customers, developer end-
  users and internal stakeholders.
  
  What you will do
  
  - Develop and implement key product features working across
    our entire Go, Python, and Typescript stack
  - Collaborate closely with product and design teams to iterate
    on new features and enhance the product roadmap
  - Drive aggressive project timelines while ensuring high
    engineering standards are being met by writing clean,
    maintainable, and well-tested code
  
  How to be successful in this role
  
  - 2+ years of experience in software engineering working on
    complex platform products
  - Fullstack engineering experience with Go or Python on the
    backend and React + Typescript on the frontend
  - Solid understanding of database systems, particularly
    Postgres and Redis
  - Experience designing and scaling APIs, preferably in high-
    performance, data-intensive applications
  - Strong ownership and a “get stuff done” mindset -
    comfortable shipping fast and iterating based on user
    feedback
  - Strong communicator with the ability to collaborate closely
    with various internal stakeholders and engage directly
    with our top-tier customers
  - Bonus: Experience with AI/LLM-powered applications,
    developer tools, or observability platforms
  
  Compensation Annual salary range: $145,000-180,000 USD
  
  Compensation Philosophy:
  
  We offer competitive compensation that includes base salary,
  variable compensation for relevant roles, meaningful equity,
  benefits, and perks. Actual compensation and offerings will
  vary based on role, level, and location. Team members in the
  EU, UK, and APAC receive locally competitive benefits
  aligned with regional norms and regulations.
  
  Benefits
  
  Benefits include medical, dental, and vision coverage,
  flexible vacation, a 401(k) plan, meals on in-office days in
  the US and more.
