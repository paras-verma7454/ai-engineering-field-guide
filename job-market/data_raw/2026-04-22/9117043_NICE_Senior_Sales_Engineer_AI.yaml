description: |
  At NiCE, we don’t limit our challenges. We challenge our
  limits. Always. We’re ambitious. We’re game changers. And we
  play to win. We set the highest standards and execute beyond
  them. And if you’re like us, we can offer you the ultimate
  career opportunity that will light a fire within you.
  
  So, What's the role all about?
  
  As a member of our presales team, you will work closely with
  our sales team on discovery calls, technical deep dives,
  product demonstrations, and basic POC’s/POV’s. A sales
  engineering role is all about creating a great experience
  for our customers.
  
  Are you a tech-savvy professional with a knack for
  delivering captivating demos? Do you thrive in the world of
  enterprise software, especially in contact center or
  automation technologies? If so, we have an exciting
  opportunity for you! Location: Germany (Remote or Hybrid)
  Territory: DACH + France
  
  How will you make an impact?
  
  - Support strategic opportunities across the DACH and France
    region, working closely with sales to drive growth in
    these markets.
  - Partnering with the sales team to plan, prepare and execute
    on strategic deals within the sales cycle.
  - Participating in discovery calls and technical deep dives.
  - Creating and delivering powerful presentations and
    customized product demonstrations
  - Design and recommend solutions that meet customer specific
    needs and business requirements, highlighting the
    benefits, capabilities and value proposition of NiCE
    Cognigy.
  - Discover and analyze customer requirements, understand their
    pain points, and provide recommendations on how NiCE
    Cognigy can address these needs.
  - Collaborating with relevant stakeholders to communicate
    customer requirements and further enhancements.
  - Provide technical support to the sales team before and
    during the sales process, answering technical questions,
    demonstrating NiCE Cognigy to potential customers, and
    providing product information.
  - Stay up-to-date on the competitive landscape and perform
    technical comparisons between the company's software and
    other conversational AI products on the market.
  - Provide internal training to other teams across the company
  
  Have you got what it takes?
  
  - Consulting & Sales Engineering Expertise: Leverage your
    experience in roles like consultant, sales engineer, or
    presales to provide insightful and engaging
    demonstrations.
  - Enterprise Software Proficiency: Bring your background in
    the enterprise software space, particularly with contact
    center or automation technologies, to the table.
  - Programming Skills: Utilize your JavaScript
    programming/scripting experience, essential for presales
    and enablement services. Knowledge of Java, Python, or
    similar languages is a plus.
  - Low Code & Conversational AI Experience: Experience
    presenting conversational AI and generative AI
    technologies.
  - Contact Center Knowledge: Understanding contact center
    technology (SIP and typical contact center components such
    as SBCs, ACD, ASR, TTS, etc.). Experience with
    conversation design, IVR design or chatbot design.
  - Presentation Prowess: Be a confident and engaging presenter,
    capable of captivating your audience.
  - Creative & Design Skills: Experience with video editing,
    Photoshop, or similar tools is a valuable asset.
  - Tech Enthusiast: Demonstrate confidence in speaking about
    and dealing with technology, with an ability to quickly
    learn new technologies.
  - Technical Expertise: Have a deep understanding of Cognigy,
    conversational AI technologies, NLU/NLP, and related
    software technologies, including UI/UX.
  - Sales Acumen: Effectively communicate complex technology in
    an easy-to-understand manner, build rapport with
    customers, and showcase Cognigy’s capabilities and value
    proposition.
  - Communication & Collaboration: Exhibit excellent
    communication skills, tailored to your audience, and the
    ability to collaborate effectively with cross-functional
    teams (Must be fluent in English, German, and French –
    French at a professional level is required.)
  
  What’s in it for you?
  
  Join an ever-growing, market disrupting, global company
  where the teams – comprised of the best of the best – work
  in a fast-paced, collaborative, and creative environment! As
  the market leader, every day at NICE is a chance to learn
  and grow, and there are endless internal career
  opportunities across multiple roles, disciplines, domains,
  and locations. If you are passionate, innovative, and
  excited to constantly raise the bar, you may just be our
  next NICEr!
  
  
  
  About Cognigy
  
  NiCE Cognigy delivers AI that works—fast, human, and
  enterprise-ready. As the leading AI-first CX platform built
  for real-world scale, we combine Generative and
  Conversational AI through orchestration, tools, and
  enterprise systems to power Agentic AI. Backed by global CX
  leader NiCE, we empower brands with AI Agents that redefine
  customer experiences and achieve measurable ROI—instantly,
  across every channel and in 100+ languages.
  
