description: |
  Company Description NBCUniversal is one of the world's
  leading media and entertainment companies. We create world-
  class content, which we distribute across our portfolio of
  film, television, and streaming, and bring to life through
  our global theme park destinations, consumer products, and
  experiences. We own and operate leading entertainment and
  news brands, including NBC, NBC News, NBC Sports, Telemundo,
  NBC Local Stations, Bravo, and Peacock, our premium ad-
  supported streaming service. We produce and distribute
  premier filmed entertainment and programming through our
  powerhouse film and television studios, including Universal
  Pictures, DreamWorks Animation, and Focus Features, and the
  four global television studios under the Universal Studio
  Group banner, and operate industry-leading theme parks and
  experiences around the world through Universal Destinations
  & Experiences, including Universal Orlando Resort, home to
  Universal Epic Universe, and Universal Studios Hollywood.
  NBCUniversal is a subsidiary of Comcast Corporation. Visit
  www.nbcuniversal.com for more information. Our impact is
  rooted in improving the communities where our employees,
  customers, and audiences live and work. We have a rich
  tradition of giving back and ensuring our employees have the
  opportunity to serve their communities. We champion an
  inclusive culture and strive to attract and develop a
  talented workforce to create and deliver a wide range of
  content reflecting our world. Job Description NBCUniversal
  is seeking a driven, energetic Staff Software Engineer (AI
  Infrastructure/Python) to lead the development of innovative
  new systems and solutions making use of a rapidly changing
  landscape of emerging technologies. This is a senior role
  that's part of a team focused on proving the value of new
  tech and bringing it to production quickly. We are seeking a
  candidate well versed in full stack web application software
  development. Responsibilities:
  
  - Develop prototypes rapidly for new proofs of concept,
    ensuring high usability and adherence to design
    specifications.
  - Maintain a working knowledge of back-end systems to
    facilitate efficient API integration and occasional
    deployment of full-stack applications.
  - Ability to integrate front end systems into Active Directory
    and UX flows for OAuth authentication.
  - Uphold high standards of code quality through rigorous
    testing, adherence to code standards, and common-sense
    testing.
  - Develop automated tests for your code, ensuring every
    function, service, and object is compatible with your
    team's work and with the many systems within the
    NBCUniversal system portfolio as well as ensuring cross-
    device and browser compatibility.
  - Create documentation for developers as well as business
    users to help them understand our products.
  - Work collaboratively with a multidisciplinary team within a
    matrixed organization, leveraging strong interpersonal
    skills to navigate system complexities and deploy
    solutions efficiently.
  - Deploy to cloud-based platforms (AWS, Azure, GCP) and
    troubleshoot application, cloud, and configuration issues
    when necessary.
  - Utilize tools for code & test generation to dramatically
    accelerate the delivery of features and components you
    create.
  
  Qualifications
  
  - 8+ years of experience in full stack
    development/engineering, demonstrated through a
    comprehensive portfolio and related experience.
  - Proven capability to bring a basic application from idea to
    delivery without requiring support from others.
  - Expertise in backend technologies (Python) and RESTful
    services, with practical experience in integrating and
    consuming APIs in front-end projects.
  - Expertise in modern JavaScript, including ES6+ features and
    asynchronous programming. Expert in at least one modern
    front-end framework (React preferred, Angular or Vue
    acceptable).
  - Proficiency with working with foundation model APIs and
    agent frameworks to build custom generative-AI agents.
  - Strong understanding of web design principles, responsive
    and adaptive design, and UI/UX best practices.
  - Experience with front-end testing frameworks, code
    versioning tools, and a commitment to writing clean,
    maintainable code.
  - Proficient in designing and implementing serverless
    architectures, with hands-on experience deploying
    applications on a leading cloud platform such as AWS,
    Azure or GCP.
  - Demonstrated ability to adapt to an agile development
    environment, quickly incorporating feedback and adjusting
    to changing priorities.
  - Ability to visualize the architecture of a proposed system
    or service, draw it out, socialize it, and build it.
  
  Desired Characteristics:
  
  - Competent in working in secured internal network
    environments and complex cloud network setups.
  - Working knowledge of AI Gateways.
  - Experience with Terraform.
  - Proven adaptability in a fast-paced, evolving technology
    landscape, with a strong problem-solving ability and quick
    learning curve.
  - Effective communication skills, capable of working
    collaboratively across diverse teams and navigating a
    large, matrixed organization efficiently.
  - Ability to translate business needs into clear technical
    requirements.
  
  Additional Requirements:
  
  - Fully Remote: This position has been designated as fully
    remote, meaning that the position is expected to
    contribute from a non-NBCUniversal worksite, most commonly
    an employee's residence.
  
  This position is eligible for company sponsored benefits,
  including medical, dental and vision insurance, 401(k), paid
  leave, tuition reimbursement, and a variety of other
  discounts and perks. Learn more about the benefits offered
  by NBCUniversal by visiting the Benefits page of the Careers
  website. Salary range: $150,000 - $170,000 (bonus eligible)
  Additional Information As part of our selection process,
  external candidates may be required to attend an in-person
  interview with an NBCUniversal employee at one of our
  locations prior to a hiring decision. NBCUniversal's policy
