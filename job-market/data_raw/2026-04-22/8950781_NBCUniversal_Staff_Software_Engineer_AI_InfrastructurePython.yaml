  membership in the uniformed services, genetic information,
  or any other basis protected by applicable law. If you are a
  qualified individual with a disability or a disabled veteran
  and require support throughout the application and/or
  recruitment process as a result of your disability, you have
  the right to request a reasonable accommodation. You can
  submit your request to AccessibilitySupport@nbcuni.com.
