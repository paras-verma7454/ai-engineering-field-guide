  welcoming community is essential in driving our success.
  
  Why Join Us?
  
  To shape the future of travel, people must come first.
  Guided by our Values and Leadership Agreements, we foster an
  open culture where everyone belongs, differences are
  celebrated and know that when one of us wins, we all win.
  
  We provide a full benefits package, including exciting
  travel perks, generous time-off, parental leave, a flexible
  work model (with some pretty cool offices), and career
  development resources, all to fuel our employees' passion
  for travel and ensure a rewarding career journey. We’re
  building a more open world. Join us.
  
  About the Role
  
  As an Software Development Engineer II – AI Platform
  Engineer, you will be a hands-on engineer focused on
  building, integrating, and operationalizing AI solutions
  using modern ML and LLM technologies. This role blends ML
  engineering, software engineering, and applied AI, with an
  emphasis on shipping real products.
  
  
  Key Responsibilities
  
  - Build and deploy AI/ML and LLM-powered components used in
    Finance products
  - Implement prompt engineering, RAG pipelines, and AI
    workflows under defined architectures
  - Develop data pipelines, feature logic, and backend services
    supporting AI use cases
  - Apply strong SQL and Python skills to transform and analyze
    Finance data
  - Integrate AI services with APIs, data platforms, and UI
    layers
  - Package, deploy, and operate AI systems using CI/CD
    pipelines
  - Support experimentation, evaluation, and iteration of AI
    solutions
  - Contribute to system reliability, monitoring, and production
    readiness
  - Document solutions and support adoption by downstream users
  
  Required Skills & Experience
  
  - Strong hands-on experience in Python and SQL
  
  - Working knowledge of machine learning and LLM-based systems
  - Experience with prompt engineering, structured prompts, and
    RAG patterns
  - Familiarity with integrating systems with LLMs such as
    OpenAI GPT, Claude, Gemini, or Llama
  - Understanding of ML/AI frameworks and tooling (e.g.,
    LangChain, LangGraph, LangFlow, LlamaIndex - exposure is
    must)
  - Experience with cloud platforms, CI/CD pipelines, and
    deployment workflows
  - Experience building APIs and backend services (FastAPI,
    Flask, etc.)
  - Good knowledge of Data Structures and Algorithm.
  - Understanding of containers and deployment (Docker;
    Kubernetes exposure must)
  - Ability to learn new tools and AI techniques quickly
  
  What Success Looks Like
  
  - AI components are delivered on time and work reliably in
    production
  - Finance use cases are translated into working AI solutions
  - Systems are stable, explainable, and maintainable
  - You grow into owning larger AI modules independently
  
