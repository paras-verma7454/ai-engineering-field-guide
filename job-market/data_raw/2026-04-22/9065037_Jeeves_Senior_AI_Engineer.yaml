description: |
  Jeeves is a groundbreaking financial operating system built
  for global businesses that provides corporate cards, cross-
  border payments, and spend management software within one
  unified platform. The company operates across 20+ countries
  including Brazil, Canada, Colombia, Mexico, the United
  Kingdom, across Europe, and the United States, and serves
  over 5,000 clients ranging from venture-backed startups to
  SMBs around the world. With a mission to empower businesses
  with more efficient and cost-effective financial solutions
  worldwide, Jeeves combines cutting-edge financial technology
  with exceptional team expertise to transform the business
  financial landscape. Jeeves has been recognized as one of
  The Information's 50 Most Promising Startups in 2023, as
  well as a Y Combinator Top Company 2021-2023 and won
  “Fintech of the Year" at the European Fintech Awards.
  
  Since graduating from Y Combinator in 2020, Jeeves has
  successfully raised over $380 million and is backed by top
  world-class investors including Andreessen Horowitz, Y
  Combinator, CRV, Tencent, Stanford University, Clocktower
  Ventures, and founders of more than 15 unicorns including
  David Velez (Nubank), Carlos Garcia (Kavak) and Sebastián
  Mejía (Rappi).
  
  Jeeves is building AI into the core of its financial
  platform — from intelligent spend categorization and anomaly
  detection to LLM-powered workflows that help finance teams
  move faster. We're looking for a Senior AI Engineer who is
  obsessed with building AI systems that actually work in
  production: reliable, observable, cost-efficient, and
  genuinely useful.
  
  This is not a research role. You will ship AI-powered
  features that process real financial data for real
  businesses. You'll work alongside backend engineers, data
  scientists, and product teams to take AI from prototype to
  production — and you'll help define how Jeeves builds with
  AI as the company scales.
  
  If you've built LLM pipelines, designed RAG architectures,
  operated ML systems in production, and care deeply about
  what happens when your AI makes a wrong call in a financial
  context — we want to meet you.
  
  Location: This is a full-time remote position. #LI-REMOTE
  
  
  
