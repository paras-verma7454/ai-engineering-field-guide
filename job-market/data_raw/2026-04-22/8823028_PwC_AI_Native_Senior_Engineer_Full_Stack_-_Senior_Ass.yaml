description: |
  At PwC, our people in software and product innovation focus
  on developing cutting-edge software solutions and driving
  product innovation to meet the evolving needs of clients.
  These individuals combine technical experience with creative
  thinking to deliver innovative software products and
  solutions. Those in software engineering at PwC will focus
  on developing innovative software solutions to drive digital
  transformation and enhance business performance. In this
  field, you will use your knowledge to design, code, and test
  cutting-edge applications that revolutionise industries and
  deliver exceptional user experiences. Focused on
  relationships, you are building meaningful client
  connections, and learning how to manage and inspire others.
  Navigating increasingly complex situations, you are growing
  your personal brand, deepening technical expertise and
  awareness of your strengths. You are expected to anticipate
  the needs of your teams and clients, and to deliver quality.
  Embracing increased ambiguity, you are comfortable when the
  path forward isn't clear, you ask questions, and you use
  these moments as opportunities to grow. Examples of the
  skills, knowledge, and experiences you need to lead and
  deliver value at this level include but are not limited to:
  
  - Respond effectively to the diverse perspectives, needs, and
    feelings of others.
  - Use a broad range of tools, methodologies and techniques to
    generate new ideas and solve problems.
  - Use critical thinking to break down complex concepts.
  - Understand the broader objectives of your project or role
    and how your work fits into the overall strategy.
  - Develop a deeper understanding of the business context and
    how it is changing.
  - Use reflection to develop self awareness, enhance strengths
    and address development areas.
  - Interpret data to inform insights and recommendations.
  - Uphold and reinforce professional and technical standards
    (e.g. refer to specific PwC tax and audit guidance), the
    Firm's code of conduct, and independence requirements.
  
  Key Responsibilities
  
  - Design, develop, and maintain microservices using .NET and
    REST APIs, leveraging AI-assisted coding workflows to
    accelerate delivery.
  - Build responsive and user-friendly UI components using
    ReactJS and integrate with backend services using AI tools
    for rapid prototyping and iteration.
  
  - Deploy and manage applications on Azure, leveraging services
    like Functions, Blob Storage, Azure API Manager, and Azure
    SQL.
  
  - Write clean, scalable code using AI coding assistants;
    leverage AI for test generation, code completion,
    refactoring, and debugging.
  
  - Participate in code reviews, using AI-assisted review tools
    to improve quality and identify issues faster.
  
  - Collaborate with API architects, DevOps engineers, QA teams,
    and product owners.
  
  - Participate in Agile ceremonies and contribute to sprint
    planning, estimation, and delivery.
  
  - Support troubleshooting, bug fixing, and optimization in
    development and production environments.
  
  - Contribute to team knowledge-sharing on effective AI-
    assisted development patterns and prompt engineering
    techniques.
  
  AI-Native Engineering Expectations
  
  - Use AI coding assistants (GitHub Copilot, Cursor, Claude
    Code, Codex) as your default development workflow for code
    generation, completion, refactoring, and debugging.
  
  - Leverage AI for automated test creation, code review
    preparation, and documentation drafting.
  
  - Apply prompt engineering skills to consistently improve the
    quality and relevance of AI tool outputs.
  
  - Contribute to team knowledge on effective AI-assisted
    development patterns.
  
  Required Qualifications
  
  - 4+ years of full stack development experience in enterprise
    environments.
  
  - Strong hands-on experience with .NET, ReactJS, and Azure
    services including Functions and Apps.
  
  - Daily proficiency with AI coding assistants (GitHub Copilot,
    Cursor, Claude Code, or Codex) for code generation, test
    creation, debugging, and refactoring.
  
  - Demonstrated ability to use prompt engineering techniques to
    improve AI tool output quality.
  
  - Proficiency in building and consuming REST APIs.
  
  - Experience with Azure deployment, monitoring, and
    troubleshooting.
  
  - Familiarity with CI/CD pipelines and Git-based version
    control.
  
  - Strong understanding of Agile development practices.
  
  - Experience with unit testing and test-driven development.
  
  Preferred Qualifications
  
  - Awareness of agentic AI frameworks (LangChain, Claude Agent
    SDK, Azure AI Agent Service) and how they integrate with
    application development.
  
  - Experience with Adobe Analytics, Target, Tag/Launch.
  
  - Azure certifications (Azure Developer Associate or
    equivalent).
  
  The salary range for this position is: $77,000 - $202,000.
  Actual compensation within the range will be dependent upon
  the individual's skills, experience, qualifications and
  location, and applicable employment laws. All hired
  individuals are eligible for an annual discretionary bonus.
  PwC offers a wide range of benefits, including medical,
  dental, vision, 401k, holiday pay, vacation, personal and
  family sick leave, and more. To view our benefits at a
