description: |
  About the Team
  
  The AI Deployment Engineering (ADE) team ensures the safe
  and effective deployment of Generative AI applications for
  developers and enterprises. We serve as trusted technical
  advisors, helping customers and partners move from early
  experimentation to production-scale AI systems.
  
  As a Partner AI Deployment Engineer focused on AWS, you will
  operate at the center of one of our most strategic
  partnerships, driving joint customer success and enabling
  AWS and partner ecosystems to scale adoption of OpenAI-
  powered solutions.
  
  About the Role
  
  We are looking for a highly experienced technical leader to
  serve as the primary technical counterpart to AWS field
  leadership (Solutions Architects, Specialists, and Partner
  teams).
  
  This role goes beyond individual deal support—you will shape
  strategy, define engagement models, and build repeatable
  systems that scale across AWS globally. You will work across
  pre- and post-sales, guiding complex enterprise customers
  from ideation to production while enabling AWS and partners
  to independently drive deployments.
  
  You will combine deep technical expertise, strong judgment,
  and ecosystem leadership to maximize impact across a
  portfolio of high-priority opportunities.
  
  In This Role, You WillStrategic AWS Engagement & Influence
  
  - Serve as the senior technical counterpart to AWS field
    leadership, building trust and credibility across regions
    and teams.
  - Influence joint account strategy and technical direction for
    high-priority opportunities.
  - Shape how OpenAI engages with AWS by defining engagement
    models, prioritization frameworks, and best practices.
  - Proactively identify and drive net-new opportunities and
    high-impact use cases across the AWS ecosystem.
  
  Complex Deal Leadership & Execution
  
  - Lead technical strategy for large, ambiguous, and high-
    stakes enterprise engagements.
  - Guide customers from early ideation through architecture
    design, prototyping, and production deployment.
  - Act as a technical decision-maker and escalation point, de-
    risking complex implementations.
  - Apply strong judgment to prioritize opportunities and
    allocate limited technical resources for maximum impact.
  
  Solution Architecture & Hands-On Building
  
  - Design and communicate end-to-end AI architectures
    leveraging OpenAI and AWS services.
  - Build and guide development of prototypes, POCs, and
    reference implementations to accelerate adoption.
  - Establish best practices for scalable, secure, and
    production-ready GenAI systems.
  - Ensure solutions are designed for repeatability,
    extensibility, and partner-led delivery.
  
  Ecosystem Enablement & Scale
  
  - Enable AWS and partners through scalable technical motions
    (workshops, playbooks, reference architectures, demos).
  - Develop reusable solution patterns and assets that can be
    deployed independently by AWS teams and SIs.
  - Mentor and uplift partner technical teams, accelerating
    their path to self-sufficiency.
  - Scale impact by working through GSIs, RSIs, and ISVs, rather
    than relying solely on direct engagement.
  
  Cross-Functional Leadership & Feedback
  
  - Partner closely with Alliances, Product, Engineering, GTM,
    and Enablement to align on strategy and execution.
  - Act as a bridge between field and product, delivering high-
    signal insights to inform roadmap and prioritization.
  - Contribute to internal knowledge systems and help define
    standards, patterns, and playbooks for the ADE function.
  
  We’re Looking for Someone With
  
  - 8+ years of experience in solutions architecture, technical
    consulting, or equivalent customer-facing roles.
  - Deep experience with AWS architecture and field engagement
    models.
  - Strong understanding of AI/ML systems and modern application
    architectures.
  - Proven track record of leading complex, enterprise-scale
    technical engagements.
  - Experience supporting enterprise sales cycles as a senior
    technical lead.
  - Strong ability to translate ambiguous business problems into
    scalable technical solutions.
  - Demonstrated judgment in prioritization, tradeoffs, and
    resource allocation.
  - Experience influencing senior technical stakeholders and
    executive leadership.
  - Track record of driving production deployments and
    measurable customer outcomes.
  - Experience working within partner ecosystems (AWS, GSIs,
    ISVs).
  
  You Might Thrive in This Role If You
  
  - Operate as a technical leader and systems thinker, not just
    an individual contributor.
  - Balance hands-on building with strategic influence and
    scale.
  - Know when to go deep technically vs. enable others to
    execute.
  - Build trust quickly with engineers, architects, and
    executives alike.
  - Default to creating repeatable patterns, not one-off
    solutions.
  - Are comfortable owning ambiguous, high-visibility problem
    spaces.
  - Take a long-term, ecosystem-oriented view of impact.
  - Are motivated by driving customer and partner success at
    scale.
  
  About OpenAI
  
  OpenAI is an AI research and deployment company dedicated to
  ensuring that general-purpose artificial intelligence
  benefits all of humanity. We push the boundaries of the
  capabilities of AI systems and seek to safely deploy them to
  the world through our products. AI is an extremely powerful
  tool that must be created with safety and human needs at its
  core, and to achieve our mission, we must encompass and
  value the many different perspectives, voices, and
  experiences that form the full spectrum of humanity.
  
  We are an equal opportunity employer, and we do not
  discriminate on the basis of race, religion, color, national
  origin, sex, sexual orientation, age, veteran status,
  disability, genetic information, or other applicable legally
  protected characteristic.
  
  For additional information, please see OpenAI’s Affirmative
  Action and Equal Employment Opportunity Policy Statement.
  
  Background checks for applicants will be administered in
  accordance with applicable law, and qualified applicants
  with arrest or conviction records will be considered for
  employment consistent with those laws, including the San
  Francisco Fair Chance Ordinance, the Los Angeles County Fair
  Chance Ordinance for Employers, and the California Fair
  Chance Act, for US-based candidates. For unincorporated Los
  Angeles County workers: we reasonably believe that criminal
  history may have a direct, adverse and negative relationship
  with the following job duties, potentially resulting in the
  withdrawal of a conditional offer of employment: protect
  computer hardware entrusted to you from theft, loss or
  damage; return all computer hardware in your possession
  (including the data contained therein) upon termination of
  employment or end of assignment; and maintain the
  confidentiality of proprietary, confidential, and non-public
  information. In addition, job duties require access to
  secure and protected information technology systems and
  related data security obligations.
  
