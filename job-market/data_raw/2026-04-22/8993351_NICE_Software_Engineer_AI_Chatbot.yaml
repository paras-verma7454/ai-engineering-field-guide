description: |
  At NiCE, we don’t limit our challenges. We challenge our
  limits. Always. We’re ambitious. We’re game changers. And we
  play to win. We set the highest standards and execute beyond
  them. And if you’re like us, we can offer you the ultimate
  career opportunity that will light a fire within you.
  
  So, what’s the role all about?
  
  As a Software Engineer (Expert Services), you will work as a
  member of our Expert team to configure and build
  integrations based on customer requirements. Typical
  projects include working with customers to understand
  business requirements, document those requirements, educate
  the customers with relevant technical information, configure
  our product, assist with the go-live steps. Configuration
  timelines must adhere to implementation timelines and if you
  foresee any delays, escalate to the implementation manager.
  
  How will you make an impact?
  
  - As a billable and customer-facing role, this position has
    significant financial impact on CXone:
  - The Consultant’s time is billable and is recognized by the
    company as direct revenue. Ensure hours are accurately
    tracked and recorded on customer master account.
  - The timeframe required for the Consultant to deploy a
    customer has a direct impact on CXone's ability to begin
    recognizing revenue for new customers/existing customers.
    Ensure deployments are completed timely, accurately and
    according to customer’s contract.
  - The Consultant’s ability to satisfy his or her customers has
    a direct impact on the customer’s likelihood of loyalty
    and increased business.
  - The Consultant’s ability to keep commitments, to hold him-
    or herself accountable and to handle delicate situations
    appropriately is critical to minimizing CXone's exposure
    to liability.
  - Ensure that adjustments made to customer’s account are
    completed in accordance with the Company’s Adjustment
    Policy.
  
  This job description is not intended to be all-inclusive,
  and employees will also perform other reasonable related
  business duties as assigned by immediate supervisor and
  other management as required. This organization reserves the
  right to revise or change job duties as the need arises.
  This job description does not constitute a written or
  implied contract of employment. Have you got what it takes?
  
  - 2-4 yrs experience required
  - Proven experience as a Bot Developer or in a similar role
    involving integration and customization, such as chatbot
    integration with platforms like Google Dialogflow or IBM
    Watson.
  - Knowledge on Prompt Engineering
  - Good understanding of modern authentication standards ex -
    oAuth2, OIDC, SAML
  - Good understanding of browser security like CORS, X-frame-
    options
  - Good understanding of HTML i.e. iframe, CSS
  - Good understanding of JavaScript / jQuery
  - Ability to read API documentation and implement proof of
    concepts
  - Strong understanding of user experience and conversational
    interfaces
  - Good verbal skills for communicating with customers and with
    peers during design and code reviews
  - Excellent Troubleshooting and Debugging skills on SaaS
    Applications.
  - Creation of Design docs, Functional Requirements docs, Test
    use cases, and deployment guide
  - Product knowledge and ability to adapt previous integrations
    to meet customer’s requests
  - Flexibility to extent hours to exchange info with US team
  - Bachelor’s degree or equivalent experience in a high-level
    environment
  
  What’s in it for you?
  
  Join an ever-growing, market disrupting, global company
  where the teams – comprised of the best of the best – work
  in a fast-paced, collaborative, and creative environment! As
  the market leader, every day at NiCE is a chance to learn
  and grow, and there are endless internal career
  opportunities across multiple roles, disciplines, domains,
  and locations. If you are passionate, innovative, and
  excited to constantly raise the bar, you may just be our
  next NiCEr!
  
  Enjoy NiCE-FLEX!
  
  At NiCE, we work according to the NiCE-FLEX hybrid model,
  which enables maximum flexibility: 2 days working from the
  office and 3 days of remote work, each week. Naturally,
  office days focus on face-to-face meetings, where teamwork
  and collaborative thinking generate innovation, new ideas,
  and a vibrant, interactive atmosphere.
  
