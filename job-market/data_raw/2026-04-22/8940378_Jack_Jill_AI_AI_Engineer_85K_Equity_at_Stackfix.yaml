  Job Title: AI Engineer
  
  Salary: £85K+ + Equity
  
  Company Description: Stackfix - High-growth AI
  implementation firm backed by Tier 1 investors
  
  Job Description: You will bridge the gap between frontier AI
  and real-world business operations. Instead of building
  generic SaaS tools, you will deploy production-grade AI
  systems for PE funds and manufacturers. Working directly
  with repeat founders who sold companies to TikTok, you will
  own the end-to-end process of transforming workflows and
  growing client profits.
  
  Location: London, UK
  
  Why this role is remarkable:
  
  - Learn directly from two exited founders (including a former
    TikTok engineering leader) in a high-intensity,
    apprenticeship-style environment.
  - Gain deep expertise in frontier AI by building production
    systems that handle real transactions, rather than just
    experimenting with tutorials.
  - Enjoy significant variety and ownership, shipping impactful
    solutions across diverse industries like logistics,
    ecommerce, and private equity within 4-9 month cycles.
  
  What you will do:
  
  - Build and deploy sophisticated AI systems and full-stack
    software that manage high-volume production workflows for
    enterprise clients.
  - Interface directly with leadership at client sites to scope
    workflows and present high-impact AI transformation
    strategies.
  - Own the full product lifecycle from initial technical
    discovery and architecture to shipping production-ready
    systems that generate real revenue.
  
  The ideal candidate:
  
  - 4+ years of full-stack software engineering experience with
    a proven track record of shipping production-grade
    systems.
  - Demonstrates high agency and a passion for building through
    side projects, open-source contributions, or technical
    content creation.
  - Exhibits a strong curiosity for business operations and a
    record of high performance in challenging environments
    (professional or personal).
  
  Who are Jack & Jill? Ok, I'll go first. I'm Jack, an AI that
  gets to know you on a quick call, learning what you're great
  at and what you want from your career. Then I help you land
  your dream job by finding unmissable opportunities as they
  come up, supporting you with applications, interview prep,
  and moral support. And I'm Jill, an AI Recruiter who talks
  to companies to understand who they're looking to hire. Then
  I recruit from Jack's network, making an introduction when I
  spot an excellent candidate.
  
  Next steps Step 1. Visit our website. Step 2. Click 'Talk to
  Jack'. Step 3. Talk to Jack so he can understand your
  experience and ambitions. Step 4. Jack will make sure Jill
  (the AI agent working for the company) considers you for
  this role. Step 5. If Jill thinks you're a great fit and her
  client wants to meet you, they will make the introduction.
  Step 6. If not, Jack will find you excellent alternatives.
  All for free.
  
  We never post fake jobs This isn't a trick. This is an open
  role that Jill is currently recruiting for from Jack's
  network. Sometimes Jill's clients ask her to anonymize their
