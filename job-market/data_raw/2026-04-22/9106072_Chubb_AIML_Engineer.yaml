  About Chubb
  
  Chubb is a world leader in insurance. With operations in 54
  countries and territories, Chubb provides commercial and
  personal property and casualty insurance, personal accident
  and supplemental health insurance, reinsurance and life
  insurance to a diverse group of clients. The company is
  defined by its extensive product and service offerings,
  broad distribution capabilities, exceptional financial
  strength and local operations globally. Parent company Chubb
  Limited is listed on the New York Stock Exchange (NYSE: CB)
  and is a component of the S&P 500 index. Chubb employs
  approximately 43,000 people worldwide. Additional
  information can be found at: www.chubb.com.
  
  About Chubb India
  
  At Chubb India, we are on an exciting journey of digital
  transformation driven by a commitment to engineering
  excellence and analytics. We are proud to share that we have
  been officially certified as a Great Place to Work® for the
  third consecutive year, a reflection of the culture at Chubb
  where we believe in fostering an environment where everyone
  can thrive, innovate, and grow.
  
  With a team of over 2500 talented professionals, we
  encourage a start-up mindset that promotes collaboration,
  diverse perspectives, and a solution-driven attitude. We are
  dedicated to building expertise in engineering, analytics,
  and automation, empowering our teams to excel in a dynamic
  digital landscape.
  
  We offer an environment where you will be part of an
  organization that is dedicated to solving real-world
  challenges in the insurance industry. Together, we will work
  to shape the future through innovation and continuous
  learning.
  
  Position Details:
  
  - Job Title:  Senior Principal AI/ML Engineer
  - Function/Department: Risk Management and Analytics
  - Location: Bangalore, India
  - Employment Type: Full Time
  - Role Overview – As an AI/ML Engineer, you’ll be working with
    a global team of AI and machine learning practitioners,
    software engineers, and business and solution architects
    to implement state of the art - AI enabled digital
    solutions to transform the P&C insurance globally. This
    position offers the opportunity to develop, deploy, and
    optimize Large Language Models (LLMs)
  
  MAJOR RESPONSIBILITIES:
  
  - Work closely with team of AI engineers to design, build, and
    serve LLMs to solve complex business challenges using
    Azure (CPU & GPU environments)
  - Researching & implementing state of the art LLM techniques
    including pre-training, fine-tuning, preference alignment,
    and deployment while also focusing on prompt engineering
    and generative AI more broadly
  - Heavily focusing on developing novel data sets that enable
    LLMs to perform new tasks as well as tooling/platforming
    to collect these samples at scale. You will need strong
    python data fundamentals coupled with a software mindset
    for making data processing and collection pipelines
    repeatable, scalable, and high quality.
  - Ensure high quality code that meets business objectives,
    quality standards and development guidelines.
  - Building reusable pipelines, processes, and tools to
    streamline LLM and generative AI workflows
  - Manage project stakeholder expectations and issue
    communications on progress.
  - React to shifting priorities without compromising deadlines
    and momentum.
  
  QUALIFICATIONS:
  
  - Must have:
    - 3 + years’ experience in AI/ML.
    - Experience in LLM Engineering – pretraining, post-training
      /alignment
    - Deep expertise in writing and reviewing production code in
      Python.
    - Understanding the development lifecycle for LLMs— developing
      data sets for pre-training, instruction tuning, and
      preference alignment alongside the modelling techniques
      for each stage and LLM deployment is as MAJOR plus.
    - Multi-disciplinary approach to problem solving, including
      excellent interpersonal and communication skills
      (written and verbal). This includes crisply talking
      about technical solutions while being able to
      collaborate with business architects effectively.
    - Strong knowledge of LLM frameworks and libraries (such as
      transformers, trl, deepspeed, PyTorch), and exposure to
      various ML techniques and their practical implementation
      in production at large scale.
    - Experience on distributed, high throughput and low latency
      architectures
    - Strong fundamentals in NLP techniques for text
      representation, semantic extraction techniques, data
      structures and modeling.
    - Experience building software on top of major container
      technology (Kubernetes, Docker etc.)
  - Nice to have:
    - Experience defining system architectures and exploring
      technical feasibility tradeoffs is a huge plus
    - Familiarity with end-to-end application development using
      full stack is a plus.
    - Experience in P&C insurance is a plus.
  
