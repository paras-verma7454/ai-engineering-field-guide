description: |
  Job Summary Synechron is seeking a highly experienced AI/ML
  Developer to lead the development and deployment of
  innovative AI-driven solutions, focusing on generative AI,
  cloud infrastructure, and emerging technologies. This role
  involves designing scalable, secure, and efficient AI
  models, integrating them into cloud environments, and
  guiding cross-functional teams towards successful project
  delivery. The ideal candidate will contribute significantly
  to the organization’s digital transformation and
  technological advancement initiatives.
  
  Software Requirements
  
  - Required:
    - Extensive experience with Python for AI/ML development,
      model training, and deployment.
    - Deep understanding of cloud platforms (AWS, Azure, or GCP),
      including services related to AI, storage, and
      deployment.
    - Knowledge of data management, data pipelines, and tools such
      as SQL, NoSQL, or data lakes.
    - Experience with AI/ML frameworks such as TensorFlow,
      PyTorch, or Scikit-learn.
    - Familiarity with containerization (Docker) and orchestration
      tools like Kubernetes for deploying and scaling models.
    - Strong understanding of APIs, microservices architecture,
      and security best practices for AI solutions.
  
  - Preferred:
    - Experience with Large Language Models (LLMs) and retrieval-
      augmented generation (RAG) architectures.
    - Knowledge of model explainability, ethical AI, or
      responsible AI practices.
    - Experience with automation tools for CI/CD pipelines and
      model lifecycle management tools like MLFlow.
  
  Overall Responsibilities
  
  - Design, develop, and optimize AI models, including natural
    language processing (NLP), generative models, and
    retrieval-augmented generation systems.
  - Collaborate with data scientists, software engineers, and
    cloud teams to implement end-to-end AI solutions
    integrated within cloud environments.
  - Lead model training, tuning, evaluation, and deployment
    processes to ensure high accuracy and efficiency.
  - Develop scalable APIs and microservices for AI models,
    ensuring performance and security in production.
  - Provide technical guidance and mentorship to team members;
    promote best practices for AI development and deployment.
  - Stay current with AI/ML advancements, evaluate emerging
    tools, and recommend innovative approaches.
  - Support operational monitoring, troubleshooting, and model
    updating activities to maintain model performance over
    time.
  
  Technical Skills (By Category)
  
  - Programming Languages:Required: Python (expertise in AI/ML
    frameworks, model deployment)Preferred: Additional
    languages such as Java, JavaScript, or Shell scripting for
    automation
  
  - Databases/Data Management:SQL (MySQL, PostgreSQL), NoSQL
    (MongoDB, DynamoDB), data pipelines, and storage
    management
  
  - Cloud Technologies:AWS, GCP, or Azure cloud services,
    including AI/ML platform services (SageMaker, Vertex AI,
    Azure ML), serverless functions, and storage solutions
  
  - Frameworks and Libraries:TensorFlow, PyTorch, Scikit-learn,
    Hugging Face transformers, retrieval-augmented generation
    modules
  
  - Development Tools & Methodologies:CI/CD pipelines (Jenkins,
    GitLab, Azure DevOps), containers (Docker), orchestration
    (Kubernetes), Agile Scrum, model versioning (MLFlow)
  
  - Security Protocols:Model security, encryption, access
    controls, compliance with data privacy standards
  
  Experience Requirements
  
  - Minimum of 8 years of experience in AI/ML development, with
    proven success in deploying generative models, RAG
    architectures, and cloud-connected applications.
  - Extensive hands-on experience with AI/ML frameworks, cloud
    deployment, and scalable model design.
  - Strong background in data engineering, NLP, or related
    domains.
  - Experience leading cross-functional teams and driving
    innovation in AI projects.
  - Industry experience in finance, healthcare, or enterprise
    solutions highly desirable.
  
  Day-to-Day Activities
  
  - Develop and optimize AI models, including training, tuning,
    and evaluation for production readiness.
  - Collaborate closely with data engineers, cloud architects,
    and product teams to develop integrated AI solutions.
  - Build and maintain APIs and microservices to serve AI models
    securely and efficiently.
  - Monitor model performance, troubleshoot issues, and update
    models as needed to maintain accuracy.
  - Research emerging AI/ML trends, experiment with new
    architectures, and implement proof of concepts.
  - Document technical approaches, model architectures, and
    deployment procedures.
  
  Qualifications
  
  - Bachelor’s or Master’s degree in Computer Science, Data
    Science, AI, or related; PhD preferred.
  - Proven expertise in AI/ML development, model deployment, and
    cloud infrastructure.
  - Certifications in cloud platforms (AWS Certified Solutions
    Architect, Azure AI Engineer, GCP Professional ML
    Engineer) are advantageous.
  - Commitment to ongoing learning of technological advancements
    and best practices in AI.
  
  Professional Competencies
  
  - Strong analytical and problem-solving skills tailored toward
    complex AI system development.
  - Excellent communication skills to articulate technical
    concepts to diverse audiences, including non-technical
    stakeholders.
  - Leadership qualities to mentor colleagues and accelerate
    project delivery.
  - Adaptability and eagerness to explore and implement cutting-
    edge AI/ML solutions.
  - Innovation mindset to evaluate emerging technologies and
    translate them into practical applications.
  - Effective time and project management skills to deliver
    high-impact solutions within deadlines.
  
