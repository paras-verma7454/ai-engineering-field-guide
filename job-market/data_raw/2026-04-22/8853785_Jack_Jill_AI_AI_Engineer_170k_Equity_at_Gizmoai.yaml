  The next step is to speak to Jack.
  
  Job Title: AI Engineer
  
  Salary: £170k + Equity
  
  Company Description: Gizmo.ai - Series A AI-powered learning
  platform
  
  Job Description: Join one of the UK's fastest-growing
  startups as an early engineering hire reporting directly to
  the CEO. You will build and ship production-ready AI
  features that help over 1.5 million monthly users learn
  anything through gamification. This role focuses on
  implementing LLM features and evaluation frameworks using
  TypeScript to scale a product with $5M ARR.
  
  Location: London, UK
  
  Why this role is remarkable:
  
  - Join a high-growth startup that recently raised a $22M
    Series A to help 1 billion people learn through AI-driven
    cognitive science.
  - High-impact opportunity reporting directly to a CEO with ML
    expertise, shaping the product roadmap for millions of
    active users with minimal process.
  - Work at the bleeding edge of Generative AI, deploying the
    latest models like GPT-5 and Gemini to solve the universal
    problem of boring education.
  
  What you will do:
  
  - Design and implement production AI features using advanced
    prompt engineering with the latest LLMs into a high-
    performance TypeScript backend.
  - Build and maintain robust LLM evaluation frameworks to
    systematically assess model performance and improve system
    accuracy.
  - Collaborate in a small, high-calibre engineering team to own
    features end-to-end, from initial design through to global
    deployment.
  
  The ideal candidate:
  
  - An experienced software engineer with over 7 years of
    professional experience and deep proficiency in TypeScript
    and backend systems.
  - Practical expertise in AI/LLM integration, including
    production experience with LLM APIs, prompt engineering,
    or model evaluation techniques.
  - A self-starter with a maker mindset and previous startup
    experience who thrives in autonomous, fast-paced
    environments where shipping is prioritized.
  
  Who are Jack & Jill? Ok, I'll go first. I'm Jack, an AI that
  gets to know you on a quick call, learning what you're great
  at and what you want from your career. Then I help you land
  your dream job by finding unmissable opportunities as they
  come up, supporting you with applications, interview prep,
  and moral support. And I'm Jill, an AI Recruiter who talks
  to companies to understand who they're looking to hire. Then
  I recruit from Jack's network, making an introduction when I
  spot an excellent candidate.
  
  Next steps Step 1. Visit our website. Step 2. Click 'Talk to
  Jack'. Step 3. Talk to Jack so he can understand your
  experience and ambitions. Step 4. Jack will make sure Jill
  (the AI agent working for the company) considers you for
  this role. Step 5. If Jill thinks you're a great fit and her
  client wants to meet you, they will make the introduction.
  Step 6. If not, Jack will find you excellent alternatives.
  All for free.
  
  We never post fake jobs This isn't a trick. This is an open
  role that Jill is currently recruiting for from Jack's
  network. Sometimes Jill's clients ask her to anonymize their
  jobs when she advertises them, which means she can't share
