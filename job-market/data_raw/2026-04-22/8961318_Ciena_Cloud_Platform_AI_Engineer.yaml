description: |
  As the global leader in high-speed connectivity, Ciena is
  committed to a people-first approach. Our teams enjoy a
  culture focused on prioritizing a flexible work environment
  that empowers individual growth, well-being, and belonging.
  We’re a technology company that leads with our
  humanity—driving our business priorities alongside
  meaningful social, community, and societal impact.
  
  Ciena is seeking a Cloud Platform & AI Engineer to join the
  IT Cloud Infrastructure team and help enable secure,
  scalable, and intelligent use of public cloud technologies
  across the organisation. This role plays a critical part in
  advancing cloud automation, security, compliance, and
  artificial intelligence (AI) capabilities that empower
  internal teams to innovate with confidence. The position is
  remote, with flexibility to transition to a hybrid model if
  business needs evolve.
  
  How you will make an impact:
  
  - Design and evolve automation frameworks for public cloud
    infrastructure deployments at scale.
  - Enable secure cloud adoption by automating governance,
    audit, security, and compliance controls.
  - Use, develop and maintain AI services across AWS Platform
    (Cloud Native)
  - Build and maintain infrastructure and application monitoring
    to detect, prevent, and respond to incidents.
  - Drive cloud reliability, performance, and cost optimisation
    through best practices and continuous improvement.
  - Develop tools and mechanisms that eliminate repetitive
    operational tasks and improve engineering efficiency.
  - Review code, assess technical implementations, and provide
    actionable feedback to improve platform tooling.
  - Participate in on‑call rotations and serve as an escalation
    point for cloud service incidents.
  
  The must haves:
  
  - Bachelor’s degree in Computer Science or a related field, or
    equivalent practical experience
  - 4+ years of overall professional experience, including 2+
    years supporting multi‑account Amazon Web Services (AWS)
    platform infrastructure
  - Efficient in use, maintenance of AWS AI services like
    Bedrock, Sagemaker while maintaining strong proficiency in
    AI/ML Concepts
  - Proficiency in object‑oriented programming and SOLID design
    principles with hands-on experience with one or more
    programming languages, such as Python,
    JavaScript/TypeScript, Ruby, Java, or Go
  - Strong experience with infrastructure as code (IaC),
    automation, and continuous integration/continuous delivery
    (CI/CD) pipelines
  - Demonstrated knowledge of public cloud security best
    practices, tooling, and risk identification
  - Working knowledge of networking fundamentals, including
    Domain Name System (DNS), load balancing, Secure Sockets
    Layer (SSL), Transmission Control Protocol/Internet
    Protocol (TCP/IP), and related concepts.
  
  Nice to haves:
  
  - Hands‑on experience with container technologies, including
    Docker and Kubernetes
  - Understanding of AI security best practices within AWS
    Platform
  - Familiarity with cloud‑native application architectures and
    development practices
  - Ability to estimate software components and interface
    effectively with multiple internal partners
  
  At Ciena, we are committed to building and fostering an
  environment in which our employees feel respected, valued,
  and heard.  Ciena values the diversity of its workforce and
  respects its employees as individuals. We do not tolerate
  any form of discrimination.
  
  Ciena is an Equal Opportunity Employer, including disability
  and protected veteran status.
  
  If contacted in relation to a job opportunity, please advise
  Ciena of any accommodation measures you may require.
