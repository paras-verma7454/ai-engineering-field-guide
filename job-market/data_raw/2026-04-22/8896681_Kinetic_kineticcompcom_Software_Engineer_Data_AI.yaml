description: |
  At Kinetic, a single, powerful mission unites us: Creating
  the best Workers’ Comp experience. Our culture is the engine
  that drives this mission forward—a culture built on
  togetherness, excellence, accountability, and a deep
  commitment to our customers.
  
  About Kinetic
  
  Backed by Nationwide, we’re transforming workers’ comp with
  technology-driven solutions for injury prediction,
  prevention, and management—helping employers create safer,
  healthier workplaces. We also work directly with enterprise
  clients.
  
  Our platform is built for labor intensive industries
  including parcel delivery, manufacturing, and
  wholesale/warehousing operations. From wearable tech that
  reduces strain and sprain injuries by over 60% to a tech-
  driven program that speeds up return-to-work and generative
  AI for claims management, we're redefining what workers'
  comp can do.
  
  We’re a remote-first team headquartered in New York City,
  growing fast—10x in the past two years—and driven by
  accountability, continuous improvement, and collaboration.
  If you're excited to build a career with impact, we’d love
  to meet you.
  
  Kinetic has been named to: Business Insurance's Best Place
  to Work in Insurance 2025
  
  The Role
  
  As a Software Engineer on our team, you’ll be a versatile
  contributor working across a wide range of projects and
  technologies in service of Kinetic’s mission. You’ll
  collaborate with cross-functional teams to design, build,
  and maintain our data ecosystem including ETL pipelines,
  data lakes, autonomous AI agents, and other LLM-based
  applications. The role provides broad exposure to data-
  intensive applications across the company.
  
  We’re looking for someone who enjoys tackling complex, real-
  world challenges, thrives in a fast-paced environment, and
  is eager to learn and adapt as technologies evolve. You’ll
  contribute to everything from core infrastructure to
  experimental features, helping deliver high-impact solutions
  that reduce workplace injuries and improve operational
  outcomes for our customers. A strong engineering foundation,
  curiosity, and a collaborative mindset are key to success in
  this role.
  
  Responsibilities:
  
  - Design, develop, and implement robust, scalable, and cloud-
    native data and AI solutions that directly contribute to
    Kinetic’s mission.
  - Write clean, efficient, well-tested, and maintainable code
    in a team environment.
  - Participate in architecture and code reviews to ensure
    consistent quality, performance, reliability, and
    scalability of software systems.
  - Implement security, reliability, and observability best
    practices in software design and development.
  - Proactively identify opportunities for improvement in
    existing systems and processes.
  - Troubleshoot and resolve complex technical issues,
    emphasizing root cause analysis and post-mortem
    documentation.
  - Contribute to projects across the stack—including backend
    services, internal tools, and AI-powered features—as
    priorities evolve.
  
  Basic Qualifications:
  
  - Bachelor's degree in Computer Science or a related field and
    at least 3 years of relevant software engineering
    experience.
  - Back-end development experience in a modern tech stack that
    includes Python in a cloud environment.
  - Experience delivering software from concept through
    production, including CI/CD, monitoring, and operational
    support.
  - Proven track-record of building and operating large-scale
    cloud solutions in production while managing technical
    debt effectively.
  - The working language at Kinetic is English.
  
  Preferred Qualifications:
  
  - Experience developing and deploying AI features in
    production software, especially those leveraging LLMs or
    agentic AI patterns.
  - Experience with AWS, Apache Airflow, and Terraform.
  - Strong testing and documentation practices.
  - Experience with production security practices in the cloud
    including building systems that meet enterprise security
    standards and industry best practices.
  - Experience operating in early-stage or high-growth startup
    environments where pragmatism and speed matter.
  
  What we offer:
  
  - This is a remote position (candidate must be a full time
    U.S. resident)
  - Salary Range: $140,000 - 180,000 per year
  - Equity Grant
  - Medical, dental, and vision insurance
  - 20 vacation days per year
  - 9 federal holidays off
  - Parental Leave
  - Pre-tax 401k contribution
  - HSA with compatible health plans
  - FREE: Health Advocate
  - FREE: Telehealth Membership
  - FREE: OneMedical Account
