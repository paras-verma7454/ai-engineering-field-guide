  Role: Data Engineer (AI Platform) Experience: 3–8 years
  
  About the Role
  
  You will build the data backbone of our AI platform—enabling
  scalable ingestion, transformation, and access to structured
  and unstructured data (e.g., transcripts, metadata).
  
  Responsibilities
  
  - Build and maintain data ingestion pipelines (batch +
    streaming)
  - Design ETL/ELT workflows for transcripts and metadata
  - Implement data normalization, tagging, and enrichment
    pipelines
  - Manage storage layers (S3, data lakes, vector stores)
  - Enable secure, API-based access to customer data (VPC-based)
  - Ensure data quality, reliability, and observability
  
  Required Skills
  
  - Strong experience with Python / SQL
  - Experience with data pipeline tools (Airflow, Spark, Kafka,
    etc.)
  - Hands-on AWS experience (S3, Glue, Lambda, Kinesis, Athena)
  - Understanding of data modeling and schema design
  - Experience with APIs and data integration
  
  Nice to Have
  
  - Experience with vector databases (Pinecone, OpenSearch,
    etc.)
  - Exposure to GenAI pipelines / embeddings workflows
  - Knowledge of data privacy and governance practices
  
  Impact
  
  You will enable reliable, scalable, and secure data flow
  powering all AI capabilities.
  
