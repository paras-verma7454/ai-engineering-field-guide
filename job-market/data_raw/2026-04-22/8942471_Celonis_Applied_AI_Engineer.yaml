description: |
  Celonis is the global leader in Process Intelligence and the
  pioneer of Process Mining technology. As one of the world’s
  fastest-growing enterprise SaaS companies, we are
  changemakers pushing the boundaries of what’s possible. We
  invest heavily in advanced AI capabilities—specifically our
  Process Intelligence Graph—to turn data insights into
  immediate business action. We believe there is a massive
  opportunity to unlock global productivity and sustainability
  by placing intelligence at the core of every business
  process. Join our mission to make processes work for people,
  companies, and the planet.
  
  Overview
  
  You will join the Sailfin Accounts Receivable (AR) Team, a
  product engineering team working in the Finance and
  Accounting domain. The team designs, develops, deploys, and
  maintains a large-scale AR product used by global customers.
  Most of the team is based in India, including this role in
  Bangalore, and we work with a modern technology stack—AI/ML
  models, LLMs, multi-agent systems, cloud platforms, and
  automation frameworks. Our focus is on building secure,
  scalable, and intelligent solutions that transform financial
  operations.
  
  The Role
  
  We are looking for an Applied AI Engineer who can build
  production-ready predictive, generative, and agentic AI
  solutions for the Finance domain.
  
  You will handle end-to-end development—from identifying use
  cases to deploying AI features in production. You must have
  experience building real-world, production-grade AI and
  agentic systems, not just POCs.
  
  Responsibilities
  
  - Partner with product owners and finance experts to identify
    strong AI use cases in Accounts Receivable.
  - Design and build predictive models, generative AI features,
    and multi-agent systems tailored to business problems.
  - Develop LLM-based copilots and autonomous agents, including
    human-in-loop flows, security guardrails, and audit
    trails.
  - Work closely with software engineers and data scientists to
    embed AI features into the product.
  - Build and maintain secure, scalable MLOps pipelines for
    training, deployment, and monitoring.
  - Continuously evaluate and improve model performance and user
    impact.
  - Stay current with the latest advancements in LLMs, NLP,
    multi-agent frameworks, and applied AI engineering.
  - Set up and tailor AI demos as needed for customers,
    stakeholders, and internal teams.
  - Contribute to a culture of innovation, collaboration, and
    continuous learning.
  
  Required Experience
  
  AI/ML/LLM Experience
  
  - 7+ years of AI/ML engineering experience.
  - 3+ years of hands-on experience with LLM-based solutions.
  - 1+ year of experience building agentic systems (production-
    ready, not POCs).
  
  Multi-Agent & Autonomous Systems
  
  - Strong understanding of multi-agent architectures, memory
    systems, tool-use, orchestration, routing, and safety
    guardrails.
  - Experience building autonomous or semi-autonomous agents
    with governance, logging, and human-in-loop flows.
  
  Technical Skills
  
  - Strong programming skills in Python (preferred), R, or Java.
  - Experience with AI/ML frameworks such as TensorFlow,
    PyTorch, and scikit-learn.
  - Solid understanding of predictive modeling, NLP, ML
    algorithms, and statistics.
  - Experience working in cloud environments (AWS/Azure/GCP)
    with model deployment and data pipelines.
  - Knowledge of GitHub/GitLab, version control, and CI/CD
    practices.
  - Basic understanding of web fundamentals (HTTP, JSON,
    authentication) and REST APIs to integrate AI/LLM
    solutions into the product.
  
  General Skills
  
  - Strong analytical and problem-solving skills.
  - Ability to communicate complex concepts clearly to non-
    technical partners.
  - Great collaboration and teamwork abilities.
  - Curiosity and passion for innovation in AI and Finance.
  
  What Celonis can offer you:
  
  - Pioneer Innovation: Work with the global leader in Process
    Mining and the Process Intelligence Graph to shape the
    future of AI-driven business operations.
  - Ownership from Day 1: Every full-time "Celonaut" is an
    owner, receiving Restricted Stock Units (RSUs) and merit-
    based refresh grants.
  - Unrivaled Family Support: Benefit from our inclusive
    parental leave policy—24 weeks of fully paid leave for
    primary carers and 12 weeks for supporting carers,
    available from your first day of employment.
  - Work-Life Integration: Enjoy Unlimited PTO (in applicable
    regions) and generous PTO globally, as well as a flexible
    hybrid work model that balances remote focus with vibrant
    office collaboration.
  - Continuous Growth: Elevate your skills through our 70-20-10
    learning framework, mentorship programs, and access to a
    dedicated learning platform.
  - Holistic Well-being: Prioritize your health with subsidized
    Wellhub memberships, mental health counseling, and
    dedicated "Wellness Weeks" that prioritize work/life
    balance.
  - Drive Sustainability: Participate in annual Impact Days,
    where you receive paid time off to volunteer for community
    and environmental causes with your local office, or
    virtually.
  - Global Inclusion & Belonging: Find community through our
    Inclusion Think Tank and participate in our annual
    Inclusion Days, ensuring every voice is heard and valued.
  - Value-Driven Impact: Join a mission-led organization where
    our core values—Live for Customer Value, The Best Team
    Wins, We Own It, and Earth Is Our Future—drive every
    decision.
  
  About Us:
  
  Celonis makes processes work — for people, companies, and
  the planet. Powered by process mining and AI, the Celonis
  Process Intelligence Platform integrates process data and
  business context to create a living digital twin of business
  operations. We enable thousands of companies worldwide to
  understand how their business actually runs and, together
  with their partners, build intelligent solutions that
  transform and continuously improve the way they operate —
  unlocking billions in value. Celonis is headquartered in
  Munich, Germany, and New York City, USA, with more than 20
  offices worldwide.
  
  Get familiar with the Celonis Process Intelligence Platform
  by watching this video.
  
