description: |
  Description
  
  Today’s world is crime-riddled. Criminals are everywhere,
  invisible, virtual and sophisticated. Traditional ways to
  prevent and investigate crime and terror are no longer
  enough…
  
  Technology is changing incredibly fast. The criminals know
  it, and they are taking advantage. We know it too.
  
  For nearly 30 years, the incredible minds at Cognyte around
  the world have worked closely together and put their
  expertise to work, to keep up with constantly evolving
  technological and criminal trends, and help make the world a
  safer place with leading investigative analytics software
  solutions.
  
  We are defined by our dedication to doing good and this
  translates to business success, meaningful work friendships,
  a can-do attitude, and deep curiosity.
  
  As a Senior Engineer you will act as a Technical Lead and
  play a key role in driving the integration of cutting-edge
  algorithms, ML, and AI technologies into Cognyte's products.
  Your deep technical expertise and hands-on experience will
  guide architectural decisions, mentor engineers and
  researchers, and ensure the delivery of scalable, high-
  quality solutions. Together with the team, you will
  transform innovative ideas into practical, production-ready
  capabilities that directly impact our customers’ success.
  
  As a Cognyter you will:
  
  - Support in Recruiting and technically leading a team of
    researchers, data scientists and data engineers focused on
    various applications of machine learning, artificial
    intelligence and advanced algorithms.
  - Provide technical guidance and mentorship to team members,
    ensuring the successful execution of research initiatives
    and their alignment with business objectives.
  - Oversee the fine-tuning of language models on specific
    domains, addressing challenges related to NLP, and
    optimizing their performance in real-world scenarios.
  - Guide the team in developing data processing pipelines for
    efficient storage, retrieval, and preprocessing of text,
    image and other data types that are prevalent in the
    intelligence domain.
  - Evaluate and analyze model outputs, providing insights and
    recommendations for model improvements and enhancements.
  - Collaborate closely with research scientists, software
    engineers, product managers and other stakeholders to
    integrate research outcomes into Cognyte's products.
  - Stay up to date with the latest advancements in machine
    learning and AI research, and identify opportunities to
    leverage emerging techniques and technologies.
  - Initiate and drive innovative research projects that advance
    the company’s strategic goals.
  
  Requirements
  
  Your toolbox
  
  - MSc or Ph.D. in computer science, statistics, artificial
    intelligence or related fields.
  - Extensive experience in applying advanced algorithms,
    machine learning and AI techniques to diverse domains,
    with a track record of leading teams and driving
    successful projects to product impact in these domains.
  - Proven track record of developing and fine-tuning models on
    specific domains, performing quality evaluations and
    optimizing model performance.
  - Experience with MLOps practices (Git, Kubernetes, Docker,
    DVC – advantage)
  - Excellent problem-solving, analytical, and critical thinking
    skills, with a focus on delivering innovative and
    practical solutions.
  - Effective communication and leadership abilities, with a
    demonstrated ability to collaborate and coordinate with
    cross-functional teams.
  - A passion for staying updated with the latest advancements
    in a wide research field, and a commitment to driving
    innovation in the field.
  - Strong entrepreneurial mindset with a proven ability to
    champion innovative research, pioneer new concepts, and
    drive them forward within the company.
  - Willingness to travel abroad (10%).
