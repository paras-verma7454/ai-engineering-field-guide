description: |
  Alkami is the digital sales and service platform provider
  for U.S. banks and credit unions. Our unified Platform
  integrates onboarding, digital banking, and data and
  marketing—each solution can stand alone, but together they
  deliver more—to help institutions onboard, engage, and grow
  relationships. As the future shifts toward Anticipatory
  Banking, we help data-informed bankers meet the moment with
  technology that drives action.
  
  Founded in 2009, we continue to be recognized for our
  intentional culture and tremendous growth (Best Place to
  Work in Fintech; Best & Brightest to Work For Nationally;
  and Comparably’s Best Company Culture, Best Career Growth,
  Best Engineering Team, and Best Places to Work in Dallas,
  among others). We’re building a culture where each Alkamist
  can perform to their highest potential, and we’re always on
  the lookout for the best and brightest minds. If you’re
  ready to experience the power of alchemy - transforming the
  ordinary into the extraordinary - come join one of the
  fastest growing SaaS companies in the U.S.
  
  As a remote-first company, most of our positions can be
  remote in the US, except for key roles, which will be
  indicated in the Job Title.
  
  Follow us on Glassdoor and LinkedIn!
  
  The Staff AI Engineer will lead the adoption of AI-assisted
  development, agent-based automation, and intelligent
  engineering workflows to accelerate developer productivity,
  improve software quality, and modernize legacy systems.The
  ideal candidate has strong hands-on experience in cloud-
  native systems, enterprise architecture, and multi-stack
  engineering, while actively leveraging GenAI coding
  assistants and agentic orchestration frameworks to transform
  the way software is built, tested, and operated.
  
  Essential Duties & Responsibilities
  
   ● Drive the adoption of AI-assisted software development
  practices across the SDLC.
  
  ● Implement context-driven AI code generation using tools
  such as GitHub Copilot,Claude Code,emerging  enterprise code
  assistants.
  
  ● Design frameworks for AI-powered developer productivity,
  including intelligent code generation,  documentation
  synthesis, and refactoring.
  
  ● Architect and implement agentic workflows to automate
  engineering processes such as Bug detection and  fixing,
  Code quality validation, Test generation,Release readiness
  
  ● Build agent-based orchestration pipelines using tools such
  as n8n, OpenClaw, emerging agent orchestration  platforms.
  
  ● Implement engineering automation using multi-agent
  systems, A2A protocols, and Model Context Protocol  (MCP).
  
  ● Design and deploy AI-powered development lifecycle
  solutions including AI-assisted code  reviews,automated
  testing and quality engineering,agent-based CI/CD
  augmentation,AI-driven root cause  analysis
  
  ● Implement Agentic QA and bug remediation systems that
  proactively detect and resolve defects.
  
  ● Lead initiatives to modernize legacy applications using
  AI-assisted refactoring and migration.
  
  ● Apply AI models to codebase understanding, architecture
  reconstruction,automated migration strategies.
  
  ● Design scalable cloud-native architectures across major
  cloud platforms.
  
  ● Apply Infrastructure as Code (IaC) practices using modern
  tooling.
  
  ● Integrate AI engineering platforms with enterprise systems
  and developer platforms.
  
  ● Implement telemetry-driven development insights using
  observability platforms.
  
  ● Leverage AI for operational insights,anomaly
  detection,performance optimization.
  
  ● Ensure AI engineering solutions follow secure development
  practices.
  
  ● Apply principles of Responsible AI,AI ethics,model
  governance,data protection
  
  ● Establish guardrails for enterprise AI-assisted
  development.
  
  Required
  
   ● Typically requires 12+ years of experience in software
  engineering, distributed systems, cloud-native  development,
  or AI-augmented engineering transformation
  
  ● Hands-on experience with Generative AI development tools
  
  ● Experience designing large-scale distributed systems.
  
  ● Experience implementing AI-powered SDLC platforms.
  
  ● Hands-on work with agent orchestration frameworks.
  
  ● Experience with AI-driven legacy modernization.
  
  ● Deep understanding of LLM-based developer tools.
  
  ● Experience across diverse technology ecosystems including
  Python,Java,.NET, JavaScript / Vue.js
  
  ● Experience across Cloud computing platforms (AWS / Azure /
  GCP),Infrastructure as Code,Platform  engineering,Developer
  platforms,API-driven architectures
  
  ● Hands-on experience with GenAI code assistants (Copilot,
  Cursor, Claude),Agentic workflow systems,Multi agent
  architectures,Model Context Protocol (MCP)
  
  ● Experience contributing to AI-driven SDLC transformation
  initiatives, including adoption of AI coding assistants,
  context-aware code generation, automated testing, and
  agentic workflow automation across the software  development
  lifecycle with hands-on coding.
  
  ● Experience applying AI to improve developer productivity,
  software quality, legacy modernization, bug  remediation,
  and engineering automation.
  
  ● Exposure to implementing AI-enabled engineering practices
  across one or more stages of the SDLC, including  design,
  development, testing, deployment, and operations.
  
  ● Proficient in API fundamentals and best practices, REST
  API architecture
  
  ● In-depth understanding of the entire software development
  process (design, development and deployment)
  
  ● Advanced experience developing and deploying applications
  for Cloud Native Infrastructure, using CI/CD tools
  following best practices
  
  ● Experience building applications in microservice
  architecture with API-first mindset.
  
  ● Collaborates effectively within the agile framework with a
  problem-solving attitude and willing to take a variety  of
  approaches
  
  ● Excellent analytical and time management skills, with a
  proven ability to deliver cross-organization impact
  independently
  
  ● Proven ability to work cross-functionally, experience with
  planning and leading complicated technical projects  that
  work with several teams within the company.
  
  ● Excellent leadership, written and verbal communication
  skills
  
  Preferred
  
  ● Master’s degree in engineering, technology or related
  field
  
  ● Experience working with SaaS offerings in the technology
  and financial industries
  
  ● Experience building and deploying applications on Amazon
  Web Services
  
  ● Experience and familiarity with mobile application
  development.
  
