  CORE SKILLS
  
  Programming: Writing code to manipulate, analyze, and
  visualize data, often using languages like Python, R, and
  SQL. Proficiency Level: Proficient
  
  AI & Machine Learning: Creating systems that can perform
  tasks that typically require human intelligence. Using
  Machine learning (ML), a subset of AI that uses algorithms
  to learn from and make predictions based on data Proficiency
  Level: Proficient
  
  Data Analysis: Inspecting, cleansing, transforming, and
  modeling data to discover useful information, draw
  conclusions, and support decision-making Proficiency Level:
  Foundational
  
  Machine Learning Pipelines: Using automated workflows that
  manage the end-to-end process of training and deploying
  machine learning models. Proficiency Level: Proficient
  
  Model Deployment: Making a trained machine learning model
  available for use in production environments. Proficiency
  Level: Proficient
  
  SPECIALIZED SKILLS
  
  Big Data Technologies: Using continuous integration and
  continuous delivery (CI/CD) pipelines to automate the
  process of software development, including building,
  testing, and deploying code
  
  Natural Language Processing (NLP): Focusing on the
  interaction between computers and humans through natural
  language.
  
  Data Architecture: Designing and structuring of data
  systems, ensuring that data is stored, managed, and utilized
  efficiently
  
  Data Processing Frameworks: Using tools and libraries to
  process large data sets efficiently, such as Apache Hadoop
  and Apache Spark.
  
  Technical Documentation: Creating and maintaining
  documentation that explains the functionality, use, and
  maintenance of software or systems.
  
  Deep Learning: Using a subset of machine learning involving
  neural networks with many layers, used to model complex
  patterns in data.
  
  Statistical Analysis: Collecting and analyzing data to
  identify patterns and trends, and to make informed
  decisions.
  
  Data Engineering: Designing and building systems for
  collecting, storing, and analyzing data at scale.
  
  Definition of Proficiency Levels:
  
  Foundational: This is the entry level of the skill,
  typically expected when starting a new role or working with
  the skill for the first time. You rely on strong manager
  support, coaching, and training as you build the capability
  to progress to higher proficiency levels.
  
  Proficient: This is the level at which you are considered
  effective in the skill. You demonstrate more than just
  functional competence—you begin to have a noticeable impact
  in your role by applying the skill consistently and
  meaningfully. You require only minimal support, coaching, or
  training to apply the skill successfully.
  
  Advanced: This is the level where you move beyond meeting
  expectations to actively leading, influencing, and
  delivering considerable impact across the wider business.
  You are seen as a role model, demonstrate the skill
  independently, and require little to no manager support.
