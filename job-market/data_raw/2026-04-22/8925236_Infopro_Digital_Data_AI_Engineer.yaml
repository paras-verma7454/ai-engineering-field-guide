description: |
  Infopro Digital is seeking a Data Developer to join its
  software development team on a permanent basis and support
  the expanding Data & Benchmarking team, working primarily
  with Risk.net but occasionally across other brands.
  
  Infopro Digital is a B2B group specialising in information
  and technology. With a presence in 20 countries, the group
  has 4,000 employees of 79 nationalities.
  
  The successful candidate will work on building, maintaining
  and improving data pipelines, datasets and tools used by
  editorial, research and product teams. This includes
  collecting, processing and managing data from public,
  internal and third-party sources.
  
  The role involves designing and maintaining data workflows,
  developing scripts and services for data ingestion and
  transformation, and supporting the storage and management of
  structured datasets used across the organisation.
  
  The successful applicant will collaborate with developers,
  analysts and editorial teams to ensure data is accessible,
  reliable and well-structured for analysis, reporting and
  product development.
  
  So, what makes our software team awesome?
  
  There are many opportunities to learn, grow and work on
  interesting projects. You will collaborate with a team of
  experienced developers, testers, architects and system
  administrators, gaining exposure to a wide range of
  technologies and practices.
  
  We offer stable employment and a strong project pipeline,
  with many ongoing initiatives and improvements on our
  roadmap. Many of our developers build long-term careers with
  us.
  
  Duties and responsibilities include:
  
  - Develop and maintain data pipelines and automated workflows
    for collecting and processing data
  - Design, manage and optimise structured datasets used across
    the organisation
  - Write scripts and services to extract, transform and load
    data from various sources
  - Support journalists, analysts and product teams with
    accessing and working with data
  - Ensure data quality, consistency and reliability across
    datasets
  - Identify opportunities to improve automation and efficiency
    in data workflows
  - Collaborate with internal stakeholders including developers,
    designers, UX specialists and product teams
  - Contribute to the development of new data products, tools
    and services
  
  Requirements
  
  The ideal candidate will have practical experience working
  with data in a development or technical environment. This
  may include software development, data processing, database
  management or building automated data workflows.
  
  They should be comfortable working with structured datasets,
  writing scripts to process data, and supporting data-driven
  applications or services.
  
  An interest in financial markets is helpful but not
  required.
  
  Some travel will be required, so we will only consider
  candidates who have the right to freely travel across
  Europe.
  
  Must have
  
  - Minimum 2 years professional use of Python and/or PHP
  - SQL
  - Experience working with structured data and spreadsheets
  
  Should have
  
  - Git
  - AWS or Google Cloud
  
  Nice to have
  
  - Snowflake
  - PHP Symfony
  - Drupal (we are on version 11)
  - JavaScript, jQuery, Vue.js
  - Docker
  
  Benefits
  
  This role is can be based in the UK or anywhere in the EU
  remote.
  
  We offer a competitive benefits package including:
  
  - 25 days of annual leave, rising to 30 days with length of
    service
  - Additional day off on your birthday
  - Group personal pension plan
  - Private medical insurance
  - Life assurance
  - Interest-free season ticket loan
  - Employee assistance programme providing confidential 24/7
    support on wellbeing and mental health
  - Eye-care vouchers
  - Discounted gym membership and employee discount scheme
  - Cycle-to-work scheme
  - Enhanced maternity leave up to 26 weeks full pay
  - Dependant leave up to 5 days full pay per year
  - We’re proud to support employee wellbeing with a dedicated
    menopause policy and a culture of open, inclusive support.
  - Option to buy additional annual leave
  - Dental insurance
  - Health cash plan
  - Personal accident insurance
  - Paid volunteer days each year
  - Access to professional development and training through our
    learning platform, Generation Infopro
  - Employee recognition programme (Bonusly)
  
  Additional benefits may include options such as adding a
  partner to gym membership and participating in the Give As
  You Earn charitable donation scheme.
  
  About Infopro Digital
  
  Risk.net is part of Infopro Digital, a B2B information and
  technology group operating in 20 countries with around 4,000
  employees representing more than 70 nationalities.
  
  Infopro Digital connects professional communities through
  specialist media, data and technology platforms. The group’s
  brands operate across five key sectors: construction and
  public sector, automotive, industry, risk and insurance, and
  retail.
  
  Our products and services help decision-makers access the
  information they need to develop their businesses and
  improve performance.
  
  Equal opportunities
  
  Infopro Digital is committed to providing equal
  opportunities to employees and job applicants. We do not
  discriminate, either directly or indirectly, on the basis of
  any protected characteristic or other characteristic
  protected by law.
  
  As part of our commitment to fair recruitment, we monitor
  diversity across our applicant pool. You may therefore be
  asked to complete equal opportunities questions as part of
  the application process.
  
  Providing this information is voluntary. The data is
  collected anonymously, stored separately from your
  application and used only for statistical monitoring. It
  will not be seen by anyone involved in the hiring process.
