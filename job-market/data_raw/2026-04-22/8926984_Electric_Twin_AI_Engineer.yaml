  The Role
  
  
  
  As an AI Engineer you will be part of the wider technical
  team but positioned within Science.You’ll research and build
  the systems that bring our AI agents to life and you will
  work with engineering to scale the infrastructure that
  powers our LLM-driven synthetic populations. You'll design
  agent cognitive architectures, implement context engineering
  and memory systems, while ensuring these AI systems can
  operate reliably at scale in production environments.
  
  
  
  This role balances AI agent research with backend
  engineering. It is ideal for research engineers who want to
  work directly with large language models to create realistic
  behavioural simulations, while building the robust
  infrastructure needed to deploy them in enterprise settings.
  
