description: |
  About Mento
  
  Mento is a career technology company that helps people be
  exceptional and thrive at work through human, AI, and
  software-based coaching.  We’re on a mission to provide
  people access to the best support, advice, and mentorship at
  work and empower them to take action on it. In a world where
  jobs and careers are rapidly changing, we believe that
  transformational growth and continuous improvement is
  mandatory for people and companies to thrive. We believe
  that coaching is the best way to unlock this growth, and we
  believe everyone deserves access to coaching. We are on a
  mission to bring our unique model of coaching to every
  member of the global workforce.
  
  We strive to create a fun, conscientious, collaborative, and
  supportive work environment and are looking for several team
  members to join us. We are a remote-first company based in
  the US, Canada, and Latin America, with $8M raised from
  leading VCs and angel investors.
  
  About The Role
  
  We’re looking for a product-minded senior software engineer
  with experience working with data to help us build a
  differentiated and impactful AI & software coaching product
  alongside software and AI-based tools to augment human
  coaches. For this role, we are only hiring candidates in the
  United States or Canada.
  
  In this role, you’ll join our small-but-mighty engineering
  team and work closely with design and coaching to create a
  unique, compelling, and valuable product experience that
  brings the power of coaching to life within a software
  platform.
  
  Key Responsibilities:
  
  - Building features and experiences from 0-to-1. This is a
    product-focused role, and you will be shipping regularly.
    You ideally have experience building early-stage products
    and are comfortable making technical trade-offs and taking
    risks.
  - Design our AI-enabled capabilities. We are building out a
    set of application capabilities on top of foundational
    models, and you will be critical to determining how we
    structure those for adaptability, reuse, and scalability.
  - Work with coaching to help translate coaching insights into
    AI Agents. Mento has a tremendous advantage in bringing AI
    coaching to life - an extremely strong team of active
    coaches. Part of this role will be figuring out how to
    translate coaching workflows into high-quality product
    experiences.
  - Build pipelines and integrations to import and export data
    into the product. Our product connects into a wide
    ecosystem of productivity and learning and development
    tools. You will help us design and build these
    integrations scalably and reusable.
  - Educate the team on best practices around data and AI. We
    have a small, fluid team filled with experts but not
    silos. As an expert bringing AI and data expertise, you
    will be expected to share your knowledge with the rest of
    the team via peer mentorship, code reviews, lunch and
    learns, and more.
  
  Who We’re Looking For
  
  We’re looking for an experienced software engineer to help
  us put theory into action, integrating cutting-edge
  artificial intelligence into our coaching platform. Our tech
  stack has Go, Typescript, and Ruby and is set up to allow
  experimenting with other languages where appropriate within
  service boundaries. We work fast with an emphasis on
  iterative product development.
  
  - You are a software engineer who has experience shipping
    data-related products into production with real users -
    we’re currently not looking for new grads.
  - You’re comfortable working in dynamic programming languages
    and have experience with server-side web applications. You
    ideally have experience with event-driven architectures as
    well as traditional web stacks like Ruby on Rails or
    Laravel.
  - You have an understanding of core data engineering and
    software architecture concepts for modern data-based
    applications. Ideal candidates will have opinions on
    things like designing search indexes and the right way to
    set up data pipelines.
  - You have figured out how to productively integrate LLM-based
    coding tools (things like cursor, cody, etc) into your
    flow. We are early adopters & embracers of these
    techniques, and want to work with people for whom this is
    exciting rather than threatening.
  - You operate well with some ambiguity. We’re an early-stage
    startup, and we’re still iterating fast and figuring out a
    lot about our customers. For some people, that’s
    thrilling, and for others terrifying. Know what you’re
    opting in to.
  
  Why Work with Us?
  
  - We are a company dedicated to empowering professionals to
    live meaningful careers. That starts with our culture at
    Mento.
  - You’re very excited about being part of a team crafting
    novel ways for people, teams, and companies to unlock
    their performance, growth, and how we all work together.
  - We work hard to foster a workplace built around trust,
    respect, collaboration, and having fun. We believe that
    feeling comfortable and safe at work is critical to
    creativity and productivity. Work-life balance should be
    your right, not your reward. As long as you are getting
    your work done and being accountable to your teammates, we
    don't care when, where, or how you work.
  - We are a highly collaborative work-environment where every
    team member plays a critical role in building our
    products, shaping our culture, and growing our business.
    This is a unique opportunity to join an early-stage,
    mission-driven team.
  - We strongly believe that diversity of experience,
    perspectives, and background will lead to a better
    environment for our employees and a better product for our
    users. If you’re passionate about helping more people feel
    and perform their best at work, we want to hear from you.
  
  Other benefits and perks include:
  
  ✈️  Fully Remote - ability to work from anywhere with bi-
  annual team offsites
  
  💰  Competitive salary and equity
  
  🏥  Medical, dental, vision, and a 401k plan
  
  🌴  Unlimited vacation (We actually mean this! it's important
  to keep yourself fresh)
  
  💻  $500 home office stipend
  
  👥  Access to your own Mento Coach
