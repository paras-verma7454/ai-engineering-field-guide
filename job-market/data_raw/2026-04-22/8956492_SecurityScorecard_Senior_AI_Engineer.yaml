description: |
  About SecurityScorecard:
  
  SecurityScorecard is the global leader in cybersecurity
  ratings, with over 12 million companies continuously rated,
  operating in 64 countries. Founded in 2013 by security and
  risk experts Dr. Alex Yampolskiy and Sam Kassoumeh and
  funded by world-class investors, SecurityScorecard’s
  patented rating technology is used by over 25,000
  organizations for self-monitoring, third-party risk
  management, board reporting, and cyber insurance
  underwriting; making all organizations more resilient by
  allowing them to easily find and fix cybersecurity risks
  across their digital footprint.
  
  Headquartered in New York City, our culture has been
  recognized by Inc Magazine as a "Best Workplace,” by Crain’s
  NY as a "Best Places to Work in NYC," and as one of the 10
  hottest SaaS startups in New York for two years in a row.
  Most recently, SecurityScorecard was named to Fast Company’s
  annual list of the World’s Most Innovative Companies for
  2023 and to the Achievers 50 Most Engaged Workplaces in 2023
  award recognizing “forward-thinking employers for their
  unwavering commitment to employee engagement.”
  SecurityScorecard is proud to be funded by world-class
  investors including Silver Lake Waterman, Moody’s, Sequoia
  Capital, GV and Riverwood Capital.
  
  About the Role:
  
  We are looking for a Senior AI Engineer who ships. This is a
  hands-on builder role for an engineer who is as comfortable
  defining the architecture of an agentic workflow as they are
  reviewing the production code that runs it. You will work at
  the intersection of LLMs, distributed systems, and real
  customer problems, turning emerging AI capabilities into
  features that security teams rely on every day.
  
  What You'll Do
  
  - Design, build, and ship customer-facing AI-powered product
    features using TypeScript, Go, and AWS, owning quality and
    reliability end-to-end
  - Architect and implement agentic workflows, LLM pipelines,
    and intelligent automation that help customers surface
    faster, more actionable security insights
  - Integrate foundation models into existing product surfaces
    with a practical eye toward latency, cost, output quality,
    and evaluation
  - Use AI-native development tools (Cursor, Claude Code, and
    similar) as a core part of your workflow, setting the
    standard for how this team builds
  - Lead architecture and code reviews with a focus on
    production-grade reliability, security, and
    maintainability
  - Partner with product and design to translate user needs into
    compelling AI-driven experiences, contributing product
    judgment alongside technical execution
  - Own projects end-to-end from concept through production,
    including monitoring, iteration, and improvement post-
    launch
  - Stay current with the AI tooling and foundation model
    landscape and bring relevant advances into our roadmap and
    practices
  
  Required Skills and Experience
  
  - 5+ years of professional software engineering experience
    with a strong track record shipping customer-facing
    product features
  - 2+ years of hands-on experience building AI-powered
    applications in production, including LLM integration,
    prompt design, and output evaluation
  - Proficiency in TypeScript and strong backend engineering
    fundamentals
  - Demonstrated ability to own complex projects end-to-end
    across the full software development lifecycle
  - Experience designing and operating distributed systems in
    cloud environments (AWS preferred)
  - Hands-on experience with CI/CD, containerization (Docker,
    Kubernetes), and production deployment practices
  - Strong computer science fundamentals including systems
    design, data structures, and networking
  - Fluency with AI-native development workflows including AI-
    assisted coding tools as part of day-to-day engineering
  - Clear, direct communication with both technical and non-
    technical stakeholders
  
  Our Tech Stack
  
  TypeScript / JavaScript, Go, AWS, Docker, Kubernetes,
  Terraform, ClickHouse, PostgreSQL
  
  Nice to Have
  
  - Experience with agentic AI systems, multi-agent
    orchestration, or retrieval-augmented generation (RAG)
  - Familiarity with LLM evaluation frameworks and production
    observability for AI systems
  - Background in cybersecurity, threat intelligence, or
    compliance-focused products
  - Experience with high-scale data systems and large structured
    datasets
  - Full-stack delivery experience and comfort working across
    the product surface
  
  Benefits: Specific to each country, we offer a competitive
  salary, stock options, Health benefits, and unlimited PTO,
  parental leave, tuition reimbursements, and much more!
  
  The estimated total compensation range for this position is
  $160,000 - $185,000 (base plus bonus). Actual compensation
  for the position is based on a variety of factors,
  including, but not limited to affordability, skills,
  qualifications and experience, and may vary from the range.
  In addition to base salary, employees may also be eligible
  for annual performance-based incentive compensation awards
  and equity, among other company benefits.
  
