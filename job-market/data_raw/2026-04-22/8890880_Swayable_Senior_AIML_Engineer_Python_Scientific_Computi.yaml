description: |
  About Swayable
  
  Swayable is a fast-growing AI and automated data science
  platform that measures public opinion and the impact of
  messages and advertising content on it. We are a 40-person
  team backed by top technology and social impact investors,
  including Y Combinator. Founded in 2018 by physics PhDs, it
  is led by the former Executive Director for Digital Strategy
  at the New York Times. Clients include major consumer-facing
  brands (American Express, Airbnb, Paramount Pictures),
  technology companies (Anthropic, Meta, Amazon), academic
  researchers (MIT, Yale, Stanford) and mission-aligned civic
  advocacy campaigns (e.g. on climate, human rights and
  elections).
  
  Joining Swayable means being on a team whose work changes
  the course of history. The technology we develop is at the
  leading edge of transforming some of the world’s most
  important campaign organizations and enterprises: combatting
  disinformation, protecting democracy, and supporting the
  sustainable growth of consumer-facing brands. Check our our
  values & culture deck to learn more:
  https://tinyurl.com/4zjchwzs
  
  Technology stack
  
  Swayable uses Python (Numpy, Scipy, scikit-learn, Pandas,
  Celery, Flask), JavaScript (Vue.js, Node.js), MongoDB, and
  GraphQL.
  
  About the role
  
  Swayable is seeking a Senior Engineer blending Python
  software development expertise with scientific computing,
  machine learning, and AI experience to advance the state of
  the art analytics engine that powers our core product. In
  this role, you will be part of the team that productizes all
  AI, machine learning, and data analysis at Swayable. You
  will be responsible for building, maintaining, and
  continuously improving our tools, techniques, and
  architecture for high-performance computing. You will work
  with a talented and diverse team of engineers, data
  scientists, and research staff to build new features and
  solve novel problems across the spectrum of software
  engineering, data visualization, and science.
  
  Requirements
  
  - You have 5+ years of professional experience building
    scientific or quantitative data-intensive software.
  - You have expertise in the scientific Python stack, object
    oriented and test-driven development, vectorized code, and
    machine learning.
  - You have excellent problem solving skills and attention to
    detail.
  - You have expertise in architecting, maintaining, and
    optimizing distributed, parallel computing systems.
  - You keep up with the constantly evolving toolset for ML and
    AI Ops.
  - You are knowledgeable about software architecture and can
    design scalable, performant solutions.
  - You value code quality and write maintainable, testable
    code.
  
  Preferred qualifications
  
  - You have an advanced degree (MSc or Ph.D.) in STEM.
  - You have a thorough knowledge of the Linux operating system.
  - You have experience with Celery, and MongoDB.
  - You believe in the scientific method and use data to drive
    decisions.
  - You can give and receive informed, actionable feedback on
    technical and non-technical skills.
  - You are experienced at mentoring junior engineers.
  - You are a strong communicator, especially in text. You can
    write documentation and discuss the tradeoffs of different
    implementations.
  
  Salary range: $175k-$250k
