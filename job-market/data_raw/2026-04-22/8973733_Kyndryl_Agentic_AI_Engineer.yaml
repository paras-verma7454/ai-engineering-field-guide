description: |
  Who We Are
  
  At Kyndryl, we run and reimagine the mission-critical
  technology systems that drive advantage for the world’s
  leading businesses.  We are at the heart of progress; with
  proven expertise and a continuous flow of AI-powered
  insight, enabling smarter decisions, faster innovation, and
  a lasting competitive edge. For our people—Kyndryls—that
  means doing purposeful work that powers human progress. Join
  us and experience a flexible, supportive environment where
  your well-being is prioritized and your potential can
  thrive.
  
  The Role
  
  As a Agentic AI Engineer at Kyndryl you are the bridge
  between business problems and innovative solutions, using a
  powerful blend of well-defined methodologies, statistics,
  mathematics, domain expertise, consulting, and software
  engineering. You'll wear many hats, and each day will
  present a new puzzle to solve, a new challenge to conquer.
  In this role, you will embark on a transformative process of
  business understanding, data understanding, and data
  preparation. Utilizing statistical and mathematical modeling
  techniques, you'll have the opportunity to create models
  that defy convention – models that hold the key to solving
  intricate business challenges. With an acute eye for
  accuracy and generalization, you'll evaluate these models to
  ensure they not only solve business problems but do so
  optimally. Additionally, you're not just building and
  validating models – you’re deploying them as code to
  applications and processes, ensuring that the model(s)
  you've selected sustains its business value throughout its
  lifecycle. Your expertise doesn't stop at data; you'll
  become intimately familiar with our business processes and
  have the ability to navigate their complexities, identifying
  issues and crafting solutions that drive meaningful change
  in these domains. You will develop and apply standards and
  policies that protect our organization's most valuable asset
  – ensuring that data is secure, private, accurate,
  available, and, most importantly, usable. Your mastery
  extends to data management, migration, strategy, change
  management, and policy and regulation.
  
  In this role, you’ll go beyond traditional modeling. You’ll
  orchestrate the end-to-end process: business understanding,
  system design, and deployment of AI agents capable of
  handling real-world complexity. Leveraging advanced
  reasoning, RAG (retrieval-augmented generation), and agent
  orchestration, you’ll engineer solutions that autonomously
  adapt, learn, and optimize. You’ll evaluate these systems
  not just for accuracy, but for scalability, safety, and
  reliability in production.
  
  You won’t stop at building prototypes—you’ll integrate and
  operationalize agentic AI into applications, workflows, and
  processes, ensuring continuous value delivery. Your
  expertise extends beyond code: you’ll navigate business
  processes, identify opportunities for automation, and apply
  policies and standards to ensure our solutions are secure,
  private, accurate, and trustworthy.
  
  If you’re ready to embrace the power of #Agentic AI  to
  transform how enterprises operate, then join us at Kyndryl.
  Together, we’ll redefine what’s possible and unlock the next
  generation of intelligent, autonomous systems Your Future at
  Kyndryl Every position at Kyndryl offers a way forward to
  grow your career. We have opportunities that you won’t find
  anywhere else, including hands-on experience, learning
  opportunities, and the chance to certify in all four major
  platforms. Whether you want to broaden your knowledge base
  or narrow your scope and specialize in a specific sector,
  you can find your opportunity here.
  
  Who You Are
  
  Who You Are
  
  You’re an innovator who thrives at the intersection of AI
  engineering, automation, and problem-solving. Beyond
  technical skill, you bring a growth mindset—constantly
  learning, experimenting, and pushing the boundaries of what
  agentic AI can do. You’re customer-obsessed, designing
  solutions that deliver real business impact, and you’re
  collaborative and inclusive, working seamlessly across
  teams, disciplines, and technologies to build systems that
  truly make a difference.
  
  Required Skills and Experience
  
  - 6+ Yrs Hands-on experience building and deploying agentic AI
    systems, autonomous workflows, or multi-agent
    orchestration solutions with total exp of 8-12 years..
  - Proficiency in AI/ML development tools and languages such as
    Python, LangChain, LlamaIndex, Hugging Face, or
    orchestration frameworks like Azure AI Studio, Prompt
    Flow, AutoGen, or CrewAI.
  - Strong problem-solving, analytical, and reasoning skills,
    with the ability to translate complex business challenges
    into agentic workflows.
  - Excellent communication and storytelling abilities, capable
    of conveying complex AI concepts and system behaviors to
    both technical and non-technical stakeholders.
  - Ability to manage and deliver multiple AI initiatives
    simultaneously, maintaining precision and quality across
    the lifecycle—from design to deployment.
  
  Preferred Skills and Experience
  
  - Degree in a quantitative or technical field such as Computer
    Science, Artificial Intelligence, Data Science,
    Mathematics, or a related discipline.
  - Professional certifications in AI, ML, or LLM development
    (e.g., Azure AI Engineer Associate, AWS Certified Machine
    Learning – Specialty, or equivalent).
  - Experience with cloud-native AI platforms (Azure, AWS, or
    GCP) and modern MLOps/LLMOps practices.
  - Familiarity with retrieval-augmented generation (RAG), tool
    integration, API orchestration, and agent autonomy
    patterns.
  - Domain knowledge in areas such as cybersecurity, financial
    services, IT operations, or healthcare, where agentic AI
    can deliver significant value.
  
  #Agentic AI
  
  Being You
  
  The “Kyn” in Kyndryl means kinship, which represents the
  strong bonds we have with each other, our customers and our
  communities. We focus on ensuring all Kyndryls feel included
  and we welcome people of all cultures, backgrounds, and
  experiences. Even if you don’t meet every requirement, we
  encourage you to apply. We believe in growth, and we’re
  excited to see what you can bring. At Kyndryl, employee
  feedback has told us that our number one driver of employee
  engagement is belonging. That sense of belonging — being a
  valued, respected, trusted member of the team — is
  fundamental to our culture and fueling great experiences for
  our customers. This dedication to welcoming everyone into
  our company means that Kyndryl gives you the ability to
  thrive and contribute to our culture of empathy and shared
  success. That’s The Kyndryl Way.
  
  What You Can Expect
  
  Your career with us isn’t just a job—it’s an adventure with
  purpose.  We offer a dynamic, hybrid-friendly culture that
  supports your well-being and empowers you to grow. Our Be
  Well programs are thoughtfully designed to support your
  financial, mental, physical, and social health—because we
  know that when you feel your best, you do your best.  From
  your very first day, you’ll dive into impactful work that
  powers the systems our customers rely on every day. You
  won’t just contribute—you’ll make a difference, tackling
  meaningful projects that sharpen your skills and fuel your
  growth. We’re here to champion your journey. With powerful
  tools to chart your career path, personalized development
  goals aligned with your ambitions, and continuous feedback
  to keep you inspired and on track, you’ll have everything
  you need to thrive and evolve. You’ll develop in-demand
  skills to grow your career and achieve your ambitions with
  access to cutting-edge learning opportunities—from
  certifications with Microsoft, Google, and Amazon to
  coaching and hands-on experiences. And through it all,
  you’ll be part of a culture that values empathy, restless
  learning, and a devotion to shared success. We want you to
  thrive here—and we’re committed to helping you do just that.
  Ready to make an impact? Join us and help shape what’s next.
  
  Get Referred!
  
