description: |
  Here’s a summary of the role:
  
  Ready to build real-world AI solutions that actually make an
  impact?
  
  You’ll take cutting-edge AI and GenAI concepts—like
  copilots, agents, and intelligent workflows—and turn them
  into scalable, production-ready systems used across sales,
  finance, customer success, and more. If you enjoy hands-on
  backend engineering, working with APIs, cloud platforms, and
  LLMs, and transforming ideas into high-performing AI-driven
  products, this role puts you right at the center of
  innovation.
  
  Here’s a breakdown of what you’ll do (not all of it, just
  the important stuff):
  
  - Build and scale backend services, APIs, and integrations
    that embed AI/GenAI into enterprise systems (CRM, ERP, BI)
  - Develop LLM-powered solutions such as RAG pipelines,
    copilots, agents, and automation workflows
  - Take AI solutions from concept to production—design, build,
    test, deploy, and monitor
  - Collaborate with architects and business stakeholders to
    turn requirements into practical AI implementations
  - Create and manage data pipelines to enable reliable, high-
    quality AI workflows
  - Ensure solutions are secure, scalable, observable, and
    aligned with best practices
  
  These are the essentials you’ll need to get an interview:
  
  - 5+ years of experience in software or solutions engineering
    with production systems
  - Strong programming skills in Python, Java, C#, or Node.js
  - Hands-on experience with APIs, integrations (REST/webhooks),
    and backend development
  - Practical experience working with LLMs/GenAI tools (e.g.,
    OpenAI, LangChain, or similar)
  - Experience with cloud platforms (preferably AWS), CI/CD, and
    containerization
  - Solid understanding of AI/GenAI concepts like prompt
    engineering, RAG, or agents
  - Ability to translate technical solutions into business
    impact and collaborate across teams
  
  It would be great if you had these too, but we’ll support
  you if you don’t:
  
  - Experience integrating AI into CRM, ERP, or analytics
    platforms
  - Familiarity with MLOps/LLMOps concepts such as model
    lifecycle and monitoring
  - Exposure to machine learning or data analytics tools (e.g.,
    Scikit-learn, dashboards)
  - Experience working in global or distributed teams
  - Knowledge of AI governance, security, and responsible AI
    practices
  
  About Us
  
  Diligent is the AI leader in governance, risk and compliance
  (GRC) SaaS solutions, helping more than 1 million users and
  700,000 board members to clarify risk and elevate
  governance. The Diligent One Platform gives practitioners,
  the C-Suite and the board a consolidated view of their
  entire GRC practice so they can more effectively manage
  risk, build greater resilience and make better decisions,
  faster.
  
  At Diligent, we're building the future with people who think
  boldly and move fast.  Whether you're designing systems that
  leverage large language models or part of a team reimaging
  workflows with AI, you'll help us unlock entirely new ways
  of working and thinking.  Curiosity is in our DNA, we look
  for individuals willing to ask the big questions and
  experiment fearlessly - those who embrace change not as a
  challenge, but as an opportunity.  The future belongs to
  those who keep learning, and we are building it together.
  At Diligent, you’re not just building the future - you’re an
  agent of positive change, joining a global community on a
  mission to make an impact.
  
  Learn more at diligent.com or follow us on LinkedIn and
  Facebook
  
  What Diligent Offers You
  
  - Creativity is ingrained in our culture. We are innovative
    collaborators by nature. We thrive in exploring how things
    can be differently both in our internal processes and to
    help our clients
  - We care about our people. Diligent offers a flexible work
    environment, global days of service, comprehensive health
    benefits, meeting free days, generous time off policy and
    wellness programs to name a few
  - We have teams all over the world. We may be headquartered in
    New York City, but we have office hubs in Washington D.C.,
    Vancouver, London, Galway, Budapest, Munich, Bengaluru,
    Singapore, and Sydney.
  - Diversity is important to us. Growing, maintaining and
    promoting a diverse team is a top priority for us. We
    foster and encourage diversity through our Employee
    Resource Groups and provide access to resources and
    education to support the education of our team, facilitate
    dialogue, and foster understanding.
  
  Diligent created the modern governance movement. Our world-
  changing idea is to empower leaders with the technology,
  insights and connections they need to drive greater impact
  and accountability – to lead with purpose. Our employees are
  passionate, smart, and creative people who not only want to
  help build the software company of the future, but who want
  to make the world a more sustainable, equitable and better
  place.
  
  Headquartered in New York, Diligent has offices in
  Washington D.C.,  London, Galway, Budapest, Vancouver,
  Bengaluru, Munich, Singapore and Sydney.   To foster strong
  collaboration and connection, this role will follow a hybrid
  work model. If you are within a commuting distance to one of
  our Diligent office locations, you will be expected to work
  onsite at least 50% of the time. We believe that in-person
  engagement helps drive innovation, teamwork, and a strong
  sense of community.
  
  We are a drug free workplace. Diligent is proud to be an
  equal opportunity employer. We do not discriminate based on
  race, color, religious creed, sex, national origin,
  ancestry, citizenship status, pregnancy, childbirth,
  physical disability, mental disability, age, military
  status, protected veteran status, marital status, registered
  domestic partner or civil union status, gender (including
  sex stereotyping and gender identity or expression), medical
  condition (including, but not limited to, cancer related or
  HIV/AIDS related), genetic information, or sexual
  orientation in accordance with applicable federal, state and
  local laws. We also consider qualified applicants regardless
  of criminal histories, consistent with legal requirements.
  See also Diligent's EEO Policy and Know Your Rights. We are
  committed to providing reasonable accommodations for
  qualified individuals with disabilities and disabled
  veterans in our job application procedures. If you need
  assistance or an accommodation due to a disability, you may
  contact us at recruitment@diligent.com.
  
  To all recruitment agencies: Diligent does not accept
  unsolicited agency resumes. Please do not forward resumes to
  our jobs alias, Diligent employees or any other organization
  location. Diligent is not responsible for any fees related
  to unsolicited resumes.
