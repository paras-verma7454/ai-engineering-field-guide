description: |
  At Gurobi Optimization, we're on a mission!
  
  
  
  A mission that focuses on mathematical optimization. We
  empower our customers to expand their use of mathematical
  optimization technology in order to make smarter decisions
  and solve some of the world's toughest and most impactful
  business problems. We're looking for passionate, dedicated,
  innovative game-changers to join our team and drive the
  future of Gurobi.
  
  
  
  As a Senior AI Engineer at Gurobi Optimization, you will
  have the technical depth, rigor and initiative to enhance
  our platform's diverse components and services with AI
  Agents and Machine Learning. In this role, you will become
  an integral part of the Gurobi Platform Team, a team
  responsible for overseeing critical elements including the
  Gurobi SaaS Instant Cloud, the Gurobi Compute Server, the
  Gurobi User Portal, and the Gurobot Expert Agent. Your
  expertise and contributions will play a pivotal role in
  shaping the future AI capabilities of the Gurobi
  Intelligence framework.
  
  What will you be doing?
  
  - Design and implement AI agents facilitating the full
    development cycle of optimization applications with a
    focus on leveraging Gurobi optimization expertise and best
    practices.
  - Architect and maintain the integration of optimization
    components, including Gurobi's solver and related
    libraries, into AI features of existing and new products.
  - Partner with cross-functional teams (AI Innovation Lab,
    Optimizer team, Experts, Product Management, Marketing) to
    align on AI feature requirements, gather domain knowledge,
    and ensure best practices are reflected across AI systems
    and products.
  - Develop and refine prompt and context engineering strategies
    for production AI systems.
  - Participate in the quality testing of AI features by
    designing test cases and evaluations.
  - Troubleshoot AI feature quality and performance issues. Be
    an escalation contact for service incidents related to AI
    features to help our support team when necessary.
  - Serve as an internal AI subject matter expert, evaluating
    use cases across teams and providing technical guidance
    and recommendations on AI applicability and approach.
  - Collaborate with a team of software developers and QA
    engineers of the Platform team following our agile
    methodology. The role involves a substantial amount of
    teamwork and individual contribution.
  
  What experience and qualifications should you have?
  
  - 5+ years of experience as a software engineer.
  - 2+ years of hands-on experience with prompt engineering,
    knowledge base management, or machine learning application
    development.
  - 2+ years of hands-on experience developing mathematical
    optimization applications.
  - Bachelor’s in Computer Science or related technical field or
    equivalent professional experience.
  - Fluent in English.
  
  What skills, abilities, and behaviors should you have?
  
  - Proficient with at least one programming language such as
    Python, Node.js or Go.
  - Good understanding of generative AI agents including prompt
    and context engineering, orchestration, vector databases,
    and RAG architecture.
  - Prior experience with one or more AI platforms (Anthropic,
    AWS Bedrock, OpenAI, Agentforce), AI protocols (MCP, A2A),
    and AI orchestration frameworks (LangChain, LangGraph,
    Strands or custom).
  - Solid understanding of machine learning concepts and
    applications, including reinforcement learning techniques.
  - Strong understanding of mathematical optimization concepts
    and experience modeling or solving optimization problems.
  
  What other requirements should you have?
  
  - Awareness of responsible AI practices, including output
    safety, guardrails, and AI governance, with familiarity
    with the OWASP Top 10 for LLMs would be beneficial.
  - Prior experience with CI/CD pipelines development would be
    advantageous.
  - Prior experience with ML frameworks (MetaFlow, MLFlow, DVC,
    Kuberflow, LakeFS) would be advantageous.
  - Good understanding of container technology (Docker) would be
    beneficial.
  - Prior engagement with agile methodologies, such as Scrum,
    would be advantageous.
  
  Your Alignment with our Gurobi Core Values:
  
  - Customer Focus: Verbal & written communication skills that
    bring clarity and build trust.
  - Power of the Team: Motivated with a team-oriented mindset
    that aims to both inspire and be inspired by others.
  - Innovation: The courage to bring ideas forward and see
    yourself as an integral part of our global team.
  - Dedication: Organized and agile, focusing on meeting
    professional objectives while promoting a healthy
    work/life balance.
  - Integrity: Promise to uphold honesty as your compass and
    conduct all business practices with an ethical mindset and
    fiscal responsibility.
