description: |
  Blossom Health exists to solve the mental health epidemic in
  America by partnering with psychiatrists to expand access to
  affordable, timely, clinically-effective mental healthcare.
  Our AI-native care platform is loved by hundreds of
  clinicians and thousands of patients.
  
  We’re a Series A company with $20M+ raised from Headline,
  Village Global, and the founders of General Catalyst,
  Flatiron Health, Sword Health, Grow Therapy, Fay, Elemy,
  Zip, Blank Street, Assured, Bridge, Birches Health, and Enzo
  Health.
  
  Why you should work here:
  
  - 🚀 Hyper-growth environment: Get firsthand exposure to how a
    startup scales from 0→1→n, with visibility across product,
    engineering, and operations
  - 🤝 High trust and autonomy: You’ll own meaningful projects
    from day one and shape both technical decisions and
    product direction. We trust engineers to figure out the
    best path forward - without micromanagement.
  - 🧠 Talent-dense team: Work with a top-percentile team built
    on mutual respect and admiration, with shared goals,
    motivations, and vision for the future.
  - ⚡ Real impact: Your code will directly improve access to
    mental health care for thousands of patients and
    clinicians
  
  What we're looking for:
  
  - Highly motivated, ambitious, and capable - looking to tackle
    a large, meaningful problem area
  - Ownership mindset - thinking for the long-term and placing
    the business and our customers first
  - High velocity and high excellence - have a real sense of
    urgency to move quickly and take pride in the quality of
    your work
  - An explorer - comfortable with ambiguity and autonomy,
    seeking to answer questions previously unasked, to leap
    into the unknown
  - An optimist - you believe in a tomorrow better than today
  - A builder - you take joy in bringing new creation to the
    world, in leveraging technology to make useful things
  - Humble - you use your gifts in the service of others and
    understand that success is an output, not an input
  
  What you'll do:
  
  - Design and build scalable, reliable systems powering core
    product workflows
  - Ship high-quality code that balances speed and technical
    rigor
  - Proactively identifying and resolving system reliability
    risks, owning uptime, observability, and performance as
    first-class engineering concerns
  - Leverage cutting-edge AI to create intuitive and novel
    clinician and patient experiences
  - Conduct thoughtful code reviews and provide technical
    mentorship, raising the bar for engineering excellence
    across the team and beyond
  
  You'll thrive here if you:
  
  - Have a bachelor's degree or equivalent experience in
    Computer Science or related field
  - Have 2+ years of professional working experience
    outperforming in high-quality environments
  - Excel at building production systems end-to-end with minimal
    oversight
  - Are fluent in TypeScript and/or Python (experience with LLM-
    powered apps preferred)
  - Are comfortable with traversing the software stack and
    picking up the latest technologies to drive technical
    outcomes
  - Love autonomy, ambiguity, and ownership
  - Are authorized to work in the U.S. and excited to be in-
    person in NYC 5 days a week
  
  Benefits:
  
  - Competitive salary, equity, growth opportunities
  - Best-in-class health, dental, and vision insurance
  - A focus on outcomes, not hours, with unlimited PTO
  - Team outings, offsites, and a sunny NYC office stocked with
    snacks
