description: |
  About Gartner IT: Join a world-class team of skilled
  engineers who build creative digital solutions to support
  our colleagues and clients. We make a broad organizational
  impact by delivering cutting-edge technology solutions that
  power Gartner. Gartner IT values its culture of nonstop
  innovation, an outcome-driven approach to success, and the
  notion that great ideas can come from anyone on the team.
  
  About the Role:
  
  Gartner is looking for passionate, creative data engineers
  who are excited to foray into any technology and create
  innovative products for end users. We are looking for
  exceptional talent for the Innovation Team which works on
  new growth products for the future. The team is responsible
  for R&D into new areas and come up with rapid solutions that
  can be taken to the market.
  
  What you’ll do:
  
  - Be a part of a new energetic team of engineers delivering
    fresh Products.
  
  - Work as an AI/ML Engineer.
  
  - Work with Open-source frameworks and create new packages.
  
  - Work in a fast-paced environment along with
    passionate, technology rock stars.
  
  - Lead the design and delivery of ML features end-to-end:
    problem framing, data prep, modeling, evaluation,
    deployment, and monitoring.
  
  - Architect and ship GenAI applications: RAG pipelines,
    agentic workflows, MCP use, structured outputs: using LLMs
    from OpenAI, Anthropic, and other open-source models.
  
  - Own retrieval systems: embeddings, chunking strategies,
    hybrid search, re-ranking and relevance tuning at scale.
  
  - Design and maintain data pipelines (batch and streaming)
    that feed ML and GenAI workloads: ingestion,
    transformation, feature engineering.
  
  - Operationalize models: containerization, CI/CD, inference
    optimization, cost/latency tuning, drift and quality
    monitoring.
  
  - Follow coding standards, build appropriate unit tests,
    integration tests and deployment scripts.
  
  - Continuously problem-solve to create secure and simple
    solutions.
  
  - Create a robust backend for massive scalability and high
    performance.
  
  - Bring to life elegant and modern data solutions.
  
  What you’ll need:
  
  Must Have:
  
  - Bachelor's or Master's degree in Computer Science or related
    engineering field w/experience in software development.
  
  - 3+ to 6 years of experience developing customer facing
    products or data applications.
  
  - Expertise in AI: fine-tuning and hosting LLM models;
  
  - Experience building and scaling with LLM APIs, agentic AI
    frameworks, prompt engineering, RAG, embeddings, and
    rigorous evaluation of LLM outputs.
  
  - Strong hands-on AWS experience or similar (GCP/Azure)
    is required: model deployment and data infrastructure on
    services such as SageMaker, Bedrock, Lambda, ECS/EKS, S3,
    EMR, and OpenSearch Service or similar on other
    environments.
  
  - Experience with vector stores (FAISS, Pinecone,
    Milvus, Weaviate) and embedding model
    selection/evaluation.
  
  - Experience with classical ML (regression, tree-based
    methods, gradient boosting) or deep learning (CNNs, RNNs,
    Transformers).
  
  - Ability to lead technical discussions, mentor others, and
    communicate trade-offs clearly to both engineering and
    product stakeholders.
  
  - Excellent communication and interpersonal skills.
  
  Nice to have:
  
  - Exposure to OpenSearch: hands-on experience with vector
    search, hybrid retrieval, ingest/search pipelines, k-NN
    queries, index design, and relevance tuning.
  
  - Exposure in implementing machine learning algorithms
    in PyTorch/TensorFlow/Spark.
  
  Who you are:
  
  - Bachelor’s degree or foreign equivalent degree in Computer
    Science or a related field required
  - Excellent communication skills.
  - Able to work independently or within a team proactively in a
    fast-paced AGILE-SCRUM environment.
  - Owns success – Takes responsibility for the successful
    delivery of the solutions.
  - Strong desire to improve upon their skills in tools and
    technologies
  
  Don’t meet every single requirement? We encourage you to
  apply anyway. You might just be the right candidate for
  this, or other roles.
  
  #LI-SS9
  
  Who are we?
  
  At Gartner, Inc. (NYSE:IT), we guide the leaders who shape
  the world.
  
  Our mission relies on expert analysis and bold ideas to
  deliver actionable, objective business and technology
  insights, helping enterprise leaders and their teams succeed
  with their mission-critical priorities.
  
  Since our founding in 1979, we’ve grown to 21,000 associates
  globally who support ~14,000 client enterprises in ~90
  countries and territories. We do important, interesting and
  substantive work that matters. That’s why we hire associates
  with the intellectual curiosity, energy and drive to want to
  make a difference. The bar is unapologetically high. So is
  the impact you can have here.
  
  What makes Gartner a great place to work?
  
  Our vast, virtually untapped market potential offers
  limitless opportunities – opportunities that may not even
  exist right now – for you to grow professionally and
  flourish personally. How far you go is driven by your
  passion and performance.
  
  We hire remarkable people who collaborate and win as a team.
  Together, our singular, unifying goal is to deliver results
  for our clients.
  
  Our teams are inclusive and composed of individuals from
  different geographies, cultures, religions, ethnicities,
  races, genders, sexual orientations, abilities and
  generations.
  
  We invest in great leaders who bring out the best in you and
  the company, enabling us to multiply our impact and results.
  This is why, year after year, we are recognized worldwide as
  a great place to work.
  
  What do we offer?
  
  Gartner offers world-class benefits, highly competitive
  compensation and disproportionate rewards for top
  performers.
  
  In our hybrid work environment, we provide the flexibility
  and support for you to thrive — working virtually when it's
  productive to do so and getting together with colleagues in
  a vibrant community that is purposeful, engaging and
  inspiring.
  
  Ready to grow your career with Gartner? Join us.
  
