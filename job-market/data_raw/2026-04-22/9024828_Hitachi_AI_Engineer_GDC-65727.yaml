  Job description
  
  Job Summary:** Hitachi, Ltd. is seeking an AI Engineer to
  join our Global Development Center (GDC). This role involves
  developing, deploying, and maintaining cutting-edge
  artificial intelligence solutions to enhance Hitachi's
  product and service offerings across various sectors. Job
  Responsibilities:** * Design, develop, and implement AI/ML
  models and algorithms using various programming languages
  and frameworks (e.g., Python, TensorFlow, PyTorch). *
  Collect, clean, and preprocess large datasets for training
  and evaluating AI models. * Evaluate and optimize model
  performance, accuracy, and efficiency. * Deploy AI solutions
  into production environments, ensuring scalability and
  reliability. * Collaborate with cross-functional teams,
  including data scientists, software engineers, and domain
  experts, to understand requirements and integrate AI
  capabilities. * Conduct research and stay abreast of the
  latest advancements in AI and machine learning. * Document
  AI system architecture, design decisions, and implementation
  details. * Participate in code reviews and contribute to
  maintaining high code quality standards. * Troubleshoot and
  resolve issues related to AI model performance and
  deployment. Job Qualifications:** * Bachelor's or Master's
  degree in Computer Science, Artificial Intelligence, Machine
  Learning, Electrical Engineering, or a related quantitative
  field. * Proven experience (3+ years) in developing and
  deploying AI/ML solutions. * Strong proficiency in Python
  and relevant AI/ML libraries (e.g., TensorFlow, PyTorch,
  scikit-learn, Keras). * Experience with data manipulation
  and analysis tools (e.g., Pandas, NumPy). * Solid
  understanding of machine learning algorithms (e.g., deep
  learning, supervised/unsupervised learning, reinforcement
  learning). * Familiarity with cloud platforms (e.g., AWS,
  Azure, Google Cloud Platform) for AI/ML development and
  deployment. * Experience with version control systems (e.g.,
  Git). * Excellent problem-solving, analytical, and
  communication skills. * Ability to work independently and
  collaboratively in a fast-paced environment.
  
