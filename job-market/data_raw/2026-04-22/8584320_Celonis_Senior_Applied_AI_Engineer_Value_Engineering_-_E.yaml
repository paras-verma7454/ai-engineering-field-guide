description: |
  Celonis is the global leader in Process Intelligence and the
  pioneer of Process Mining technology. As one of the world’s
  fastest-growing enterprise SaaS companies, we are
  changemakers pushing the boundaries of what’s possible. We
  invest heavily in advanced AI capabilities—specifically our
  Process Intelligence Graph—to turn data insights into
  immediate business action. We believe there is a massive
  opportunity to unlock global productivity and sustainability
  by placing intelligence at the core of every business
  process. Join our mission to make processes work for people,
  companies, and the planet.
  
  The Team:
  
  The Celonis Value Engineering (VE) team is focused on
  managing the entire customer value lifecycle, from sales
  through value realization, renewal and expansion. As a
  Senior Value Engineer - India, your primary focus will be
  supporting our GCC's (Global Competency Centers) across the
  Adopt and Expand phases of our customer value journey. This
  team will be a part of the Global VE CoE spearheading our
  mission of data-driven business transformation with our
  customers.
  
  You will blend deep process and industry expertise with a
  proven consulting skill set with strong analytical skills at
  the forefront of one of the fastest-growing tech companies
  worldwide.
  
  The Role:
  
  - Collaborate with GCC customers in India to uncover their
    core business challenges and determine how Celonis can
    help them achieve their business objectives
  - Provide support to other regions, including APAC, to
    establish and cultivate foundational accounts.
  - Build strong relationships with our customers by winning
    their trust through technical, product expertise, and
    business acumen to act as a trusted advisor.
  - Collaborate and share customer insights & feedback with
    internal Product and Engineering teams to influence
    product innovation
  - Create re-usable collateral, best practices & tools within
    the Global VE Center of Excellence and feed them back to
    the regional Value Engineering team
  - Conduct ROI analysis and develop business cases to quantify
    the potential benefits of implementing Celonis solutions
  
  The work you’ll do:
  
  - Identify & Frame Value●  Discover and translate customers’
    strategic priorities into high-impact Celonis use cases●
    Build demos and business cases, leveraging industry
    benchmarks and best practices in order to win new
    customers●  Undertake Value Assessments or Proof-of-Value
    Projects and communicate the value opportunity and
    strategic roadmap to C-Level executivesRealize Value●
    Facilitate business value workshops and use Celonis to
    identify and qualify opportunities for process
    enhancement●  Derive improvement measures in core business
    functions and initiate improvement actions and enterprise-
    wide change initiatives●  Present results and realized
    value to senior management and C-level executiveScale
    Value●  Build a strategic expansion roadmap for customers
    embedding Celonis Process Intelligence as a strategic
    business transformation platform in their organization and
    therefore drive adoption and expansion●  Provide feedback
    to our product development teams to enhance the Celonis
    platform and Apps based on new use casesThe qualifications
    you need:Live for Customer Value: 5 yrs + experience in an
    analytical role with the objective to demonstrate or
    secure value through business data analysis, business
    process improvement and respective Software deployment.
    Ideally in a customer-facing role in Solution Consulting,
    Sales Engineering or IT/Management Consulting with a
    Business Software / SaaS Provider or a Consultancy.
    Alternatively in an In-house role (e.g. Center of
    Excellence for Data Mining / Analytics / Intelligence)
    within an Enterprise.Data, Analytics, Applications & IT:
    Good knowledge of Business Software / SaaS applications
    (e.g. SAP),  experience with implementing RPA and/or BI
    Tools and/or building Dashboards, Apps and Action Flows.
    Hands-on SQL experience and Python is preferred .
    Experience in collaborating with IT teams.Process
    Improvement & Value Realization: Experience in identifying
    use cases for business process improvement and deploying
    improvement measures,  being a change agent and training
    users/process owners to realize valueProject Management:
    Experience in planning and managing project scopes,
    expectations and timelines. You will manage multiple
    projects across your aligned accounts that will be at
    different parts of the value journey. Also, you will
    leverage partners from the Celonis Ecosystem wherever
    possible.Executive Stakeholder Management: Experience in
    preparing and communicating (value) roadmaps and results
    to stakeholders and management, both internally and
    externally. Excellent communication and presentation
    skills in Italian and English.
    - Live for Customer Value: 5 yrs + experience in an analytical
      role with the objective to demonstrate or secure value
      through business data analysis, business process
      improvement and respective Software deployment. Ideally
      in a customer-facing role in Solution Consulting, Sales
      Engineering or IT/Management Consulting with a Business
      Software / SaaS Provider or a Consultancy. Alternatively
      in an In-house role (e.g. Center of Excellence for Data
      Mining / Analytics / Intelligence) within an Enterprise.
    - Data, Analytics, Applications & IT: Good knowledge of
      Business Software / SaaS applications (e.g. SAP),
      experience with implementing RPA and/or BI Tools and/or
      building Dashboards, Apps and Action Flows. Hands-on SQL
      experience and Python is preferred . Experience in
      collaborating with IT teams.
    - Process Improvement & Value Realization: Experience in
      identifying use cases for business process improvement
      and deploying improvement measures,  being a change
      agent and training users/process owners to realize value
    - Project Management: Experience in planning and managing
      project scopes, expectations and timelines. You will
      manage multiple projects across your aligned accounts
      that will be at different parts of the value journey.
      Also, you will leverage partners from the Celonis
      Ecosystem wherever possible.
    - Executive Stakeholder Management: Experience in preparing
      and communicating (value) roadmaps and results to
      stakeholders and management, both internally and
      externally. Excellent communication and presentation
      skills in Italian and English.
  
  What Celonis can offer you:
  
  - Pioneer Innovation: Work with the global leader in Process
    Mining and the Process Intelligence Graph to shape the
    future of AI-driven business operations.
  - Ownership from Day 1: Every full-time "Celonaut" is an
    owner, receiving Restricted Stock Units (RSUs) and merit-
    based refresh grants.
  - Unrivaled Family Support: Benefit from our inclusive
    parental leave policy—24 weeks of fully paid leave for
    primary carers and 12 weeks for supporting carers,
    available from your first day of employment.
  - Work-Life Integration: Enjoy Unlimited PTO (in applicable
    regions) and generous PTO globally, as well as a flexible
    hybrid work model that balances remote focus with vibrant
    office collaboration.
  - Continuous Growth: Elevate your skills through our 70-20-10
    learning framework, mentorship programs, and access to a
    dedicated learning platform.
  - Holistic Well-being: Prioritize your health with subsidized
    Wellhub memberships, mental health counseling, and
    dedicated "Wellness Weeks" that prioritize work/life
    balance.
  - Drive Sustainability: Participate in annual Impact Days,
    where you receive paid time off to volunteer for community
    and environmental causes with your local office, or
    virtually.
  - Global Inclusion & Belonging: Find community through our
    Inclusion Think Tank and participate in our annual
    Inclusion Days, ensuring every voice is heard and valued.
  - Value-Driven Impact: Join a mission-led organization where
    our core values—Live for Customer Value, The Best Team
    Wins, We Own It, and Earth Is Our Future—drive every
    decision.
  
  About Us:
  
  Celonis makes processes work — for people, companies, and
  the planet. Powered by process mining and AI, the Celonis
  Process Intelligence Platform integrates process data and
  business context to create a living digital twin of business
  operations. We enable thousands of companies worldwide to
  understand how their business actually runs and, together
  with their partners, build intelligent solutions that
  transform and continuously improve the way they operate —
  unlocking billions in value. Celonis is headquartered in
  Munich, Germany, and New York City, USA, with more than 20
  offices worldwide.
  
