  Bristol Myers Squibb recognizes the importance of balance
  and flexibility in our work environment. We offer a wide
  variety of competitive benefits, services and programs that
  provide our employees with the resources to pursue their
  goals, both at work and in their personal lives. Read more:
  careers.bms.com/working-with-us.
  
  Key Responsibilities
  
  - Design, build, and deploy custom Copilot agents using
    Microsoft Copilot Studio and Azure AI Foundry.
  - Architect and implement AI solutions that integrate
    enterprise data, applications, and workflows across
    Microsoft 365, SharePoint, and Power Platform.
  - Develop custom connectors, grounding data pipelines, and AI
    orchestration logic to extend Copilot capabilities.
  - Leverage Azure OpenAI, Azure Cognitive Search, and Azure AI
    Services to deliver retrieval-augmented generation (RAG)
    based agent solutions.
  - Build and optimize prompt flows, semantic memory, and
    contextual grounding for AI agents.
  - Build Power Apps, including model-driven and canvas
    applications.
  - Develop automation workflows using Power Automate (Flows)
    integrated with AI and enterprise data sources.
  - Understand and implement agent-to-agent communication
    frameworks such as A2A and MCP
  - Collaborate with business teams to identify use cases and
    translate them into scalable AI applications.
  - Develop proofs of concept (POCs) and AI prototypes that
    demonstrate business value.
  - Ensure compliance with Responsible AI, data security, and
    governance standards.
  - Monitor, evaluate, and continuously improve the performance,
    accuracy, and usability of Copilot agents and AI
    solutions.
  - Partner with Microsoft platform owners, data engineers, and
    solution architects to operationalize and scale AI
    initiatives.
  
  Qualifications & Experience
  
  - Bachelor’s degree in computer science, AI/ML, Engineering,
    or related discipline
  - 5–8 years of experience in AI solution development,
    Microsoft Cloud engineering, or automation platforms.
  - Proven experience with:
    - Microsoft Copilot Studio (Power Virtual Agents,
      conversational design, orchestration).
    - Azure AI Foundry and Azure OpenAI (model deployment, prompt
      optimization, content grounding).
    - Azure Cognitive Services (Search, Language, Vision, Speech,
      etc.).
    - Microsoft Graph, SharePoint REST APIs, and Teams
      integrations.
    - Power Platform (Power Automate, Power Apps, Power BI,
      Dataverse).
  - Strong understanding of AI architecture patterns, including
    RAG, prompt chaining, and function calling.
  - Understand and implement agent-to-agent communication
    frameworks such as A2A and MCP
  - Experience with Python, C#, React or TypeScript for building
    integrations and APIs.
  - Familiarity with vector databases and semantic search
    technologies.
  - Excellent analytical, problem-solving, and communication
    skills.
  - Ability to collaborate with business stakeholders to
    translate needs into AI-powered Copilot experiences.
  - Extensive experience with Power Apps, Power Automate, and
    custom Power Platform connectors.
  - Proficiency in SPFx (SharePoint Framework) development and
    Microsoft Graph integrations.
  - Experience building Copilot extensions, Graph connectors,
    and custom copilots for enterprise workflows.
  - Knowledge of Responsible AI principles, prompt evaluation,
    and AI governance frameworks.
  - Familiarity with MLOps, Azure AI Studio, Azure Dev Ops and
    model lifecycle management.
  
