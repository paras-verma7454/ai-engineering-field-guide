  On-site Protocol
  
  BMS has an occupancy structure that determines where an
  employee is required to conduct their work. This structure
  includes site-essential, site-by-design, field-based and
  remote-by-design jobs. The occupancy type that you are
  assigned is determined by the nature and responsibilities of
  your role:
  
  Site-essential roles require 100% of shifts onsite at your
  assigned facility. Site-by-design roles may be eligible for
  a hybrid work model with at least 50% onsite at your
  assigned facility. For these roles, onsite presence is
  considered an essential job function and is critical to
  collaboration, innovation, productivity, and a positive
  Company culture. For field-based and remote-by-design roles
  the ability to physically travel to visit customers,
  patients or business partners and to attend meetings on
  behalf of BMS as directed is an essential job function.
  
