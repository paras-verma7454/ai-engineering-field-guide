  Job requirements
  
  - Key Responsibilities • Design, implement, and manage
    scalable machine learning (ML) pipelines using Azure ML,
    Databricks, and PySpark. • Build and maintain automated
    CI/CD pipelines with Github and Github Action,
    incorporating SonarQube to ensure code quality and
    security standards. • Utilize Azure Kubernetes Service
    (AKS) to containerize and deploy machine learning models,
    ensuring high availability and scalability. • Have
