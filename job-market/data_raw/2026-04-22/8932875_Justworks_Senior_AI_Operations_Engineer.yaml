description: |
  Who We Are
  
  At Justworks, you’ll enjoy a welcoming and casual
  environment, great benefits, wellness program offerings,
  company retreats, and the ability to interact with and learn
  from leaders in the startup community. We work hard and care
  about our most prized asset - our people.
  
  We’re helping businesses get off the ground by enabling them
  to focus on running their business. We solve HR issues.
  We’re data-driven and never stop iterating. If you’d like to
  work in a supportive, entrepreneurial environment, are
  interested in building something meaningful and having fun
  while doing it, we’d love to hear from you.
  
  We're united by shared goals and shared motivations at
  Justworks. These are best summed up in our company values,
  which are reflected in our product and in our team.
  
  Our Values
  
  If this sounds like you, you’ll fit right in.
  
  Who You Are
  
  As a Senior AI Operations Engineer, you are a forward-
  thinking technologist who bridges the worlds of
  infrastructure, automation, and artificial intelligence. You
  thrive in dynamic, data-rich environments and bring a
  disciplined, service-oriented mindset to scaling AI systems
  and automations across Justworks. You understand how to
  operationalize machine learning and generative AI
  technologies responsibly and effectively, driving measurable
  business value while maintaining our commitment to
  reliability, security, and transparency.
  
  You are a proactive problem-solver and trusted technical
  partner to Digital Security, Data and Analytics, and
  Engineering stakeholders. You excel at designing,
  implementing, and maintaining AI-driven workflows that
  enhance productivity, automate support processes, and
  integrate seamlessly into our enterprise systems. Your
  curiosity drives continuous learning, and your expertise
  enables you to mentor others in emerging AI operations
  practices.
  
  Your Success ProfileWhat You Will Work On
  
  - Architect, deploy, and manage AI infrastructure, workflows,
    and automations that power IT and internal operations.
  - Develop, monitor, and optimize AI models and pipelines used
    for IT support automation, knowledge retrieval, and
    internal tooling.
  - Partner with IT Systems, Data Engineering, and Security
    teams to ensure responsible, compliant, and ethical AI
    deployment.
  - Integrate AI and automation tools into Justworks’ SaaS
    ecosystem — including Okta, Slack, Atlassian, and other
    enterprise platforms.
  - Define and maintain standard operating procedures for AI
    workflows, including monitoring, model retraining, and
    incident response.
  - Collaborate with cross-functional teams to assess
    opportunities for automation using LLMs, RPA, and AI
    service APIs.
  - Serve as a subject matter expert and mentor on AI operations
    practices, guiding the IT team through adoption and
    experimentation.
  - Contribute to internal documentation, training, and
    governance frameworks for AI systems across the
    organization.
  - Stay current with emerging AI operations technologies,
    frameworks, and best practices — sharing insights to
    strengthen our IT capabilities.
  
  How You Will Do Your Work
  
  As a Senior AI Operations Engineer, how results are achieved
  is as important as the results themselves. Your foundational
  competencies include:
  
  Good Judgment — Applying critical thinking to evaluate the
  tradeoffs of automation and AI deployment; balancing
  innovation with risk. Resourcefulness — Building creative,
  effective solutions using available tools and data; adapting
  quickly to evolving AI technologies. Teamwork and
  Communication — Collaborating across IT, Security, and Data
  teams with clarity and empathy; documenting rigorously.
  Influence and Leadership — Mentoring peers, promoting
  responsible AI adoption, and fostering a culture of
  knowledge sharing. Skills and Knowledge — Combining deep
  technical expertise with continuous learning in AI systems
  engineering, MLOps, and automation frameworks.
  
  In addition, all Justworkers focus on aligning their
  behaviors to our core values known as COGIS. It stands for:
  
  - Camaraderie - Day to day you can be seen working together
    toward a higher purpose. You like to have fun. You’re an
    active listener, treat people respectfully, and have a
    strong desire to know and help others.
  - Openness - Your default is to be open. You're willing to
    share information, understand other perspectives, and
    consider new possibilities. You’re curious, ask open
    questions, and are receptive to thoughts and feedback from
    others.
  - Grit - You demonstrate grit by having the courage to commit
    and persevere. You’re committed, earnest, and dive in to
    get the job done well with a positive attitude.
  - Integrity - Simply put, do what you say and say what you'll
    do. You’re honest and forthright, have a strong moral
    compass, and strive to match your words with your actions
    while leading by example.
  - Simplicity - Be like Einstein: “Everything should be made as
    simple as possible, but no simpler.”
  
  Qualifications
  
  - 5+ years of experience in IT Systems Engineering, DevOps, or
    AI/ML Operations.
  - Hands-on experience with AI workflow orchestration tools
    (e.g., LangChain, Airflow, Prefect, or similar).
  - Proficiency in Python, API integrations, and automation
    scripting for systems and service management.
  - Experience managing LLM-based or ML-powered applications in
    production environments.
  - Knowledge of Okta, Atlassian, and SaaS automation platforms
    (e.g., BetterCloud, Torq, Zapier for Enterprise, or
    similar).
  - Familiarity with cloud environments (AWS, Azure, GCP) and
    CI/CD best practices.
  - Experience building secure and auditable automations aligned
    with compliance and governance standards.
  - Proven record of mentorship, technical leadership, and
    cross-functional collaboration.
  - Passion for continuous learning in AI and automation, with a
    strong sense of accountability for outcomes. The base wage
    range for this position based in our New York City Office
    is targeted at $127,000.00 to $152,500.00 per year.
  
  Actual compensation is based on multiple factors that are
  unique to each candidate, including and not limited to skill
  set, level of relevant experience, and specific work
  location.  Salary ranges for positions based in other
  locations may differ based on the cost of labor in that
  location.
  
  For more information about Justworks’ Total Reward
  Philosophy, including all of the perks and benefits we are
  proud to offer our team members, please visit Total Rewards
  @ Justworks.
  
