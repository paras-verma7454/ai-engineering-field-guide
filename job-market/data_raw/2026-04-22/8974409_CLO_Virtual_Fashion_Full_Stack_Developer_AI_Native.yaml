description: |
  CLO Virtual Fashion is the creator of CLO and Marvelous
  Designer, the top 3D garment design programs used in
  fashion, film, and game development. With over two decades
  of research and development in accurate garment simulation,
  CLO Virtual Fashion's mission is to empower users at every
  step of the garment journey, from concept to design,
  manufacturing to marketing, and fitting to styling.
  
  
  
  In addition to 3D garment design software, CLO Virtual
  Fashion's products include CLO-SET (a digital asset
  management and collaboration platform), CONNECT (a digital
  fashion hub and marketplace), and consumer-facing solutions
  such as e-commerce virtual fittings.
  
  
  
  Founded in 2009, CLO's interconnected and ever-growing
  product ecosystem is built to power the future of everything
  related to garments.
  
  
  
  CLO Virtual Fashion currently has 14 offices located in 12
  countries across North America, Asia, Europe, and South
  America, and continues to expand to serve users around the
  globe.
  
