  AI Engineer
  
  As an AI Engineer, you will design, implement, and deploy
  intelligent systems powered by LLMs, agent orchestration
  frameworks, and embedding-based retrieval solutions. This
  role blends hands-on engineering with solution thinking,
  focusing on scalable workflows and cloud-native delivery.
  
  
  
  Core Responsibilities
  
  • Build applications leveraging LLM APIs for summarization,
  Q&A, and decision support • Implement agentic workflows for
  multi-step task automation • Develop embedding pipelines
  integrated with vector stores for RAG and search
  optimization • Deploy AI components into cloud platforms
  using containerized CI/CD practices • Monitor model
  behaviors in production and optimize for performance and
  cost-efficiency
  
  
  
  Required Skills
  
  • 3 years of experience in AI/ML application development •
  Strong programming skills in Python with LLM API integration
  and prompt workflows • Hands-on experience with Databricks
  (Spark SQL, PySpark, Delta Lake) and Snowflake • Familiarity
  with agent orchestration, embeddings, vector databases, and
  agentic tools • Experience with cloud-native delivery
  (Azure), CI/CD, and API integration patterns
