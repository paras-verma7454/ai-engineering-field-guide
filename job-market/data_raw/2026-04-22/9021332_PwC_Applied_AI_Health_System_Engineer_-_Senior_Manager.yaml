description: |
  At PwC, our people in data and analytics engineering focus
  on leveraging advanced technologies and techniques to design
  and develop robust data solutions for clients. They play a
  crucial role in transforming raw data into actionable
  insights, enabling informed decision-making and driving
  business growth. Those in artificial intelligence and
  machine learning at PwC will focus on developing and
  implementing advanced AI and ML solutions to drive
  innovation and enhance business processes. Your work will
  involve designing and optimising algorithms, models, and
  systems to enable intelligent decision-making and
  automation. Growing as a strategic advisor, you leverage
  your influence, expertise, and network to deliver quality
  results. You motivate and coach others, coming together to
  solve complex problems. As you increase in autonomy, you
  apply sound judgment, recognising when to take action and
  when to escalate. You are expected to solve through
  complexity, ask thoughtful questions, and clearly
  communicate how things fit together. Your ability to develop
  and sustain high performing, diverse, and inclusive teams,
  and your commitment to excellence, contributes to the
  success of our Firm. Examples of the skills, knowledge, and
  experiences you need to lead and deliver value at this level
  include but are not limited to:
  
  - Craft and convey clear, impactful and engaging messages that
    tell a holistic story.
  - Apply systems thinking to identify underlying problems
    and/or opportunities.
  - Validate outcomes with clients, share alternative
    perspectives, and act on client feedback.
  - Direct the team through complexity, demonstrating composure
    through ambiguous, challenging and uncertain situations.
  - Deepen and evolve your expertise with a focus on staying
    relevant.
  - Initiate open and honest coaching conversations at all
    levels.
  - Make difficult decisions and take action to resolve issues
    hindering team effectiveness.
  - Model and reinforce professional and technical standards
    (e.g. refer to specific PwC tax and audit guidance), the
    Firm's code of conduct, and independence requirements.
  
  The Opportunity As part of the Data and Analytics
  Engineering team, you will lead the development of
  innovative AI solutions tailored for health systems. As a
  Senior Manager, you will serve as a strategic advisor,
  leveraging your knowledge to drive project success and
  operational excellence while fostering productive teams that
  tackle complex healthcare challenges. Responsibilities
  - Lead the creation of innovative AI solutions for healthcare
    systems
  - Serve as a trusted advisor, utilizing knowledge to enhance
    project outcomes
  - Foster collaboration within dynamic teams to address complex
    challenges
  - Drive operational excellence through creative problem-
    solving approaches
  - Cultivate relationships with stakeholders to promote
    alignment on project goals
  - Guide teams in navigating ambiguity and delivering impactful
    results
  - Promote a culture of continuous improvement and professional
    development
  - Uphold adherence to industry standards and practices in AI
    implementation
  What You Must Have
  - Bachelor's Degree
  - At least 8 years of experience
  What Sets You Apart
  - Demonstrated experience delivering production AI or GenAI
    use cases in a health system environment
  - Hands-on experience building RAG pipelines or agentic AI
    workflows against clinical data sources
  - Experience with MLOps platforms and model governance
    practices in regulated, PHI-handling environments
  - Ability to translate clinical and revenue cycle workflows
    into structured AI use case requirements
  - Familiarity with Azure OpenAI Service, AWS Bedrock, or
    Google Vertex AI in a HIPAA-compliant deployment context
  - Understanding of population health program design and how AI
    accelerates outcomes
  - Proven record of success managing healthcare AI and GenAI
    solutions
  - Experience in analytical techniques applied to healthcare
    use cases
  - Experience working with data warehouse technology including
    Snowflake or Databricks
  The salary range for this position is: $124,000 - $280,000.
