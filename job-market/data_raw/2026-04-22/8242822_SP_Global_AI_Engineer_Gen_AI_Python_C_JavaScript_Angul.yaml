description: |
  About the Role:
  
  Grade Level (for internal use):
  
  10The Team:
  
  The team's mission is to design and integrate an intelligent
  AI Assistant, employing Generative AI technology, into our
  existing web application ecosystem. As a Senior Engineer,
  you will be a key technical contributor working alongside a
  diverse team of highly skilled engineers and data scientists
  who are passionate about utilizing cutting-edge technology
  to achieve transformative business outcomes.
  
  The Impact:
  
  With the advent of Generative AI, we are witnessing a
  paradigm shift in software development and business
  intelligence. This senior engineering role positions you at
  the forefront of our AI transformation initiative, where
  your technical contributions will directly shape the
  implementation of innovative solutions that deliver
  competitive advantage and transformative value to our
  customers across global markets.
  
  What's in it for you:
  
  - Technical Excellence: Work with cutting-edge AI technologies
    and contribute to the architecture of next-generation AI
    applications
  - Innovation Opportunity: Lead technical initiatives and
    proof-of-concepts that push the boundaries of AI
    integration
  - Professional Growth: Gain deep expertise in AI/ML
    technologies while working on enterprise-scale challenges
  - Technical Leadership: Mentor junior engineers and influence
    technical decisions across multiple projects
  - Industry Impact: Build solutions that transform how
    businesses leverage AI for intelligence and decision-
    making
  
  Responsibilities:Technical Development
  
  - Design and implement scalable AI components and services
    integrated with existing web applications
  - Develop robust APIs and microservices for AI model
    deployment and orchestration
  - Build and optimize data pipelines for AI model training and
    inference
  - Implement best practices for code quality, testing, and
    documentation across AI projects
  
  AI Implementation
  
  - Integrate Large Language Models and other AI services into
    production applications
  - Develop prompt engineering strategies and optimize AI model
    performance
  - Implement RAG (Retrieval-Augmented Generation) systems and
    vector databases
  - Build monitoring and evaluation frameworks for AI system
    performance
  
  Technical Leadership
  
  - Conduct code reviews and provide technical guidance to team
    members
  - Drive technical design discussions and architectural
    decisions
  - Research and evaluate emerging AI technologies for potential
    adoption
  
  Collaboration & Delivery
  
  - Partner with Product Management and Data Science teams to
    translate requirements into technical solutions
  - Collaborate with cross-functional teams to ensure successful
    AI feature delivery
  - Participate in Agile ceremonies and contribute to sprint
    planning and estimation
  - Support production deployments and troubleshoot complex
    technical issues
  
  What We're Looking For:Requirements-
  
  - Education: Bachelor's degree in computer science,
    Engineering, or related field
  - Experience: 6-9 years of software development experience
    with enterprise applications
  - Programming Expertise: Strong proficiency in C# and .NET
    Core/Framework
  - AI/ML Knowledge: 1+ years of hands-on experience with AI/ML
    technologies, including LLMs or machine learning
    frameworks
  - Cloud Skills: Solid experience with AWS services (Lambda,
    SQS, API Gateway, S3)
  - Frontend Development: Working knowledge of modern JavaScript
    frameworks (Angular, React, or Vue)
  
  Preferred Qualifications-
  
  - AI Technologies: Experience with OpenAI API, Azure AI
    Services, or similar AI platforms
  - AI Frameworks: Familiarity with LangChain, Semantic Kernel,
    or vector databases (Pinecone, Weaviate)
  - Data Engineering: Experience with data pipeline tools and
    ETL processes
  - DevOps: Knowledge of CI/CD pipelines, containerization
    (Docker), and infrastructure as code
  - Testing: Experience with automated testing frameworks and AI
    model evaluation techniques
  
  Technical Competencies-
  
  - Problem Solving: Strong analytical skills with ability to
    solve complex technical challenges
  - System Design: Capability to design scalable, maintainable
    software architectures
  - Communication: Ability to articulate technical concepts to
    both technical and non-technical audiences
  - Learning Agility: Enthusiasm for continuous learning and
    staying current with AI advancements
  - Quality Focus: Commitment to writing clean, efficient, and
    well-documented code
  
