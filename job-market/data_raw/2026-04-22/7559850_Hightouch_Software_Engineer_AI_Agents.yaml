description: |
  About Hightouch
  
  Hightouch is the modern AI platform for marketing and growth
  teams. Our AI agents reimagine marketing workflows, allowing
  marketers to create content, plan campaigns, and execute
  strategies with transformational velocity and performance.
  
  Hightouch is a rare company built on the intersection of two
  fundamental technological shifts: advances in LLMs and
  agentic AI, and the creation and rapid adoption of cloud
  data warehouses like Snowflake and Databricks. Building on
  these tailwinds, we’ve become a leader in AI marketing and
  partner with industry leaders like Domino’s, Chime, Spotify,
  Ramp, Whoop, Grammarly, and over 1000 others.
  
  Our team focuses on making a meaningful impact for our
  customers. We approach challenges with first-principles
  thinking, move quickly and efficiently, and treat each other
  with compassion and kindness. We look for team members who
  are strong communicators, have a growth mindset, and are
  motivated and persistent in achieving our goals.
  
  About the Role
  
  We’re looking to add a product-minded AI engineer to the
  team. The ideal candidate will have strong customer and
  product thinking, and the ability to be highly creative with
  LLM applications. We are looking for someone who can both
  rapidly prototype and architect production LLM pipelines.
  
  Example workstreams include:
  
  - Quickly iterating and developing proofs of concept (POCs) to
    explore the maximum potential of integrating AI into data
    and marketing workflows
  - Making key decisions about the choice of AI architecture and
    frameworks
  - Building production data agents that can make use of a
    company’s data to seamlessly answer analytics and data
    science questions about their users and marketing efforts
  - Developing a deep understanding of user workflows to create
    seamless AI-assisted user experiences
  
  We're seeking talented, intellectually curious, and
  motivated individuals interested in exploring the forefront
  of AI. While no prior experience with LLMs and AI is
  required, strong technical skills, particularly in backend
  architecture, and product intuition are essential for
  understanding and executing these projects from start to
  finish.
  
  This is a senior role, but we focus on impact and potential
  for growth more than years of experience. The salary range
  for this position is $180,000 - $320,000 USD per year, which
  is location independent in accordance with our remote-first
  policy.
  
  Interview Process
  
  Our interview process focuses on evaluating fit for the most
  important dimensions of the role: product sense and
  creativity with LLMs, ability to architect backend systems,
  and alignment with Hightouch’s values. Notably, we don’t do
  any programming interviews as we believe they are low signal
  to noise and aren’t a good evaluation mechanism.
  
  - Recruiter Screen [30m]: Introductory call with our
    recruiting team to get to know each other and see if the
    role could be a good mutual fit.
  - System Design Screen [60m]: Designing a data processing
    feature end-to-end.
  - Hiring Manager Interview [30m]: Chat with hiring manager
    about past experiences and future operating preferences to
    assess fit on company values and operating principles.
  - Agent Building Systems Interview [75m]: Work with the
    interviewer to architect an agentic system at a conceptual
    level. The problem will be at a pretty high level - and
    have both product and customer requirements as well as
    technical.
  
  We have limited inbound applications to one application per
  candidate. You will be auto-rejected if you apply to
  multiple roles. Please only apply to the position you are
  most qualified for.
  
  E-Verify Statement
  
  Hightouch participates in E-Verify. We will provide the
  Social Security Administration, and if necessary, the
  Department of Homeland Security, with information from each
  new employee’s Form I-9 to confirm work authorization.
  Please note that we do not use this information to pre-
  screen job applicants.
  
