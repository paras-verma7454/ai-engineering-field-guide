description: |
  Who We Are
  
  Ontic provides software that helps corporate and government
  security teams identify threats, assess risk, and respond
  faster to keep people and organizations safe. Its Connected
  Intelligence Platform unifies security operations and data
  into a centralized system of record, enabling organizations
  to conduct risk assessments, protect against workplace
  violence, and manage threats and incidents more efficiently.
  Fortune 500 companies and federal agencies rely on Ontic to
  support security programs such as executive protection,
  threat intelligence, and corporate investigations.
  
  Learn more at ontic.co or follow us on LinkedIn.
  
  Who You Are
  
  You are an early-to-mid career engineer who enjoys building
  real products—not just experimenting with models. You take
  ownership, ship features, and are comfortable working across
  backend systems and ML components.
  
  This is not a research role—we’re looking for someone who
  can translate ML capabilities into scalable, production-
  ready product features and integrate them seamlessly into
  our platform.
  
  You align with Ontic’s values: Do Good Above All, Raise the
  Bar, Lead with Empathy, Walk the Walk, Keep Moving
  
  What We’re Looking For
  
  - Bachelor’s or Master’s degree in Computer Science, AI, Data
    Science, or a related field
  - 3.5–5 years of hands-on experience building and shipping ML-
    enabled or data-driven applications
  - Strong programming skills in Java and Python
  - Solid experience with Spring Framework / Spring Boot for
    building backend services
  - Experience with ML frameworks such as PyTorch, LangChain, or
    similar
  - Experience building backend services/APIs and integrating ML
    models into applications
  - Familiarity with data pipelines and tools like Airflow,
    Spark, or similar
  - Exposure to cloud platforms (AWS, GCP, or Azure)
  - Basic understanding of MLOps practices (model deployment,
    monitoring, CI/CD)
  - Experience with Docker (Kubernetes is a plus)
  - Strong problem-solving ability and willingness to learn and
    adapt quickly
  - Good communication and collaboration skills
  
  Key Responsibilities
  
  - Build and ship ML-powered product features that deliver real
    customer value
  - Develop and maintain backend services using Java (Spring
    Boot) and Python
  - Integrate ML capabilities into existing backend systems and
    microservices architecture
  - Work on data pipelines and model workflows from ingestion to
    inference
  - Collaborate with senior engineers to design scalable and
    reliable systems
  - Deploy and monitor models in production, ensuring
    performance and stability
  - Troubleshoot issues across the stack (data, model, and
    backend systems)
  - Contribute to code quality, testing, and documentation
    standards
  - Participate in system design discussions and cross-team
    collaboration
  
  Preferred Qualifications
  
  - Experience with LLMs or AI-driven product features
  - Familiarity with microservices architecture and distributed
    systems
  - Exposure to Kubernetes or production-scale deployments
  - Understanding of feature stores or data versioning
  - Interest or experience in security or risk-related domains
  
  What Sets This Role Apart
  
  - Strong focus on engineering and product delivery, not
    research
  - Opportunity to work on real-world, high-impact systems
  - Deep integration of ML into a mature backend platform
    (Java/Spring ecosystem) Ontic Benefits & Perks
    - Competitive Salary
    - Medical Benefits
    - Internet Reimbursement
    - Home Office Stipend
    - Continued Education Stipend
    - Festive & Achievement Celebrations
    - Dynamic Office Environment
  
