description: |
  Agentic AI Engineer
  
  Location: Remote / Alexandria, VA
  
  Clearance: Eligibility to be cleared
  
  Are you ready to be part of a team that creates cutting-edge
  AI-powered analysis and simulation on-demand? At Whitespace,
  we use our Iris platform to uncover hidden relationships and
  patterns of life (POL) at machine speed, enhancing mission
  performance like never before.
  
  We are seeking a creative and proven Agentic AI Engineer to
  join our dynamic team and play a crucial role in unlocking
  the potential of our AI models. Someone who knows how to
  make AI systems that do more than just generate text — they
  make them take action. This role focuses on building
  intelligent, tool-using agents that can navigate complex
  technical environments, identify problems, and reason about
  remediation paths. You will be part of a small, high-caliber
  team solving hard problems at the intersection of machine
  learning, systems, and national security.
  
   At Whitespace, we are redefining national security by
  pushing the limits of what is possible—leveraging AI-
  powered, data-driven innovation to stay ahead of tomorrow's
  threats. If you are passionate about making a difference in
  the world and being part of groundbreaking technology in
  national security, this position is for you!
  
  This position is 100% remote for candidates that are not
  located within fifty miles of the corporate office. This
  role requires approximately 10% travel. Remote employees
  will be required to travel to the corporate office in
  Alexandria, VA at least twice a year. This position will
  report directly to the Product Manager. The candidate must
  be a U.S. citizen and reside in the contiguous United
  States. You will be a W-2 employee of GeoDelphi, Inc., and
  we do not accept third-party applications.
  
  Requirements
  
  RESPONSIBILITIES
  
  - Architect, develop, and deploy advanced autonomous AI agents
    tailored for cybersecurity applications.
  - Define and implement intelligent agent systems capable of
    real-time decision-making and adaptive threat responses.
  - Collaborate cross-functionally with product managers,
    engineers, and analysts to translate innovative concepts
    into robust solutions.
  - Mentor and guide engineering teams on best practices in
    developing agent-based AI solutions.
  - Continuously evaluate, test, and enhance the capabilities
    and performance of agentic systems within Whitespace’s
    ecosystem.
  - Drive technical excellence and promote engineering best
    practices within the AI team.
  
  EXPERIENCE
  
  - A bachelor's or master’s degree in Computer Science, AI,
    Machine Learning, or a related field with at least 5 years
    of related experience. Will consider experience in lieu of
    a degree.
  
  - Strong proficiency in Python, with experience in relevant
    libraries, frameworks, and technologies such as FastAPI,
    asyncio, and PyTorch.
  - Deep understanding of agent frameworks and tools (e.g.,
    OpenAI Agents SDK, autogen, Google ADK/A2A, LangGraph,
    etc.).
  
  - Proven experience developing in Python and deploying robust
    AI/ML solutions, with specific expertise in autonomous
    agents.
  
  - Direct experience integrating generative AI models (OpenAI,
    Anthropic, Google Gemini, LLaMA) into practical agentic
    systems.
  - Demonstrated ability to design scalable, distributed systems
    and cloud-native architectures.
  
  - Extensive experience in prompt engineering and fine tuning
    LLM models
  
  - Ability to design and implement agentic frameworks and
    architectures.
  
  - Knowledge of techniques for grounding generative models with
    external knowledge sources (e.g., retrieval-augmented
    generation, Knowledge graphs, etc.)
  
  - Familiarity with MLOps principles and tools for model
    deployment and monitoring
  
  - Understanding of the security implications and mitigation
    strategies for generative AI and agentic systems.
  
  - Excellent collaboration, mentorship, and communication
    skills, enabling you to collaborate effectively with
    distributed teams.
  - Excellent communication skills, both verbal and written, to
    convey technical concepts to non-technical stakeholders.
  
  DESIRED SKILLS
  
  - Familiarity with Cloud Computing Platforms
  
  - Experience in Deploying AI models at scale in high-
    throughput, low-latency environments.
  
  Benefits
  
  GEODELPHI BENEFITS
  
  - Medical, Dental, and Vision plans
  - Unlimited PTO
  - Federal Holiday Paid Leave
  - 12 weeks of paid Parental Leave
  - Employer paid STD/LTD
  - Employer Paid Life Insurance
  - 401K plan and Employer Match
  - Professional Development Assistance
  - Equity Incentive Plan
  
   Who we are:
  
  GeoDelphi, Inc. dba Whitespace is building AI solutions for
  global leaders. Recognized as the most innovative company in
  the Geospatial Industry, Whitespace exponentially
  accelerates speed-to-answer with powerful analytics, high-
  cadence data feeds, and human expert-machine teaming. Our
  answers are rooted in truth data about human activity,
  delivering reliable decision advantage that keeps pace with
  world events. Whitespace is headquartered in Alexandria,
  Virginia. For further information, visit:
  http://www.inthewhitespace.com.
  
  GeoDelphi, Inc. is an Equal Opportunity employer. All
  qualified applicants will receive consideration for
  employment without regard to race, color, religion, creed,
  sex, sexual orientation, pregnancy, gender identity,
  national origin, disability, or Veteran status.
