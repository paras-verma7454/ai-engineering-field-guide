description: |
  (Fully remote, async-first, DevTool SaaS, 32-40h/week, time
  zones: UTC-3 to UTC+3)
  
  Location: This is a FULLY remote role, but you must be
  within UTC-3 to UTC+3 to work with your team, peers, and
  internal customers. You do not have to be in the specific
  country or city shown in this listing, but please only apply
  if you are physically based within the UTC-3 to UTC+3
  timezone.
  
  --
  
  Join Checkly as a Senior Product Engineer AI and empower
  developers and agents to own and ensure application
  performance and reliability - from pull request to post-
  mortem!
  
  Checkly helps engineers build reliable products by unifying
  testing, synthetic monitoring and observability.
  OpenTelemetry, Playwright, and Monitoring as Code are our
  foundation for unifying performance and reliability.
  
  Our tech stack is Vue.js, Node.js, TypeScript, Postgres,
  ClickHouse and AWS. We ship to prod all day, every day,
  including our agentic layer, which we just released. We
  practice Agile (not scrum) and take pride in good
  documentation and good looking products.
  
  We’re a remote-first startup that keeps things simple—low on
  meetings, high on productivity, and always shipping. If you
  love building cool things, working async, actually listening
  to and working with customers, and keeping it lean, you’ll
  fit right in!
  
  Thousands of developers—teams at 1Password, CrowdStrike,
  Render, LinkedIn and Vercel included—trust Checkly to keep
  their apps running smoothly. In 2024, we raised $20M in
  Series B funding from Balderton, CRV, and Accel to take
  things to the next level.
  
  We care about building a team where people of all
  backgrounds are encouraged to do their best work. To achieve
  this we built a flexible, remote-first and async-first
  startup environment with inclusive benefits and full
  transparency about how we pay.
  
  What you'll do
  
  - Design & build AI agents and AI-enhanced features
    iteratively that help our customers debug, fix and create
    Playwright and API tests faster.
  - Implement solutions full stack with your team.
  - Get in touch with users to learn from their feedback
    directly, we want to build solutions that are delightful
    and solve real problems.
  
  What you should have
  
  - Excitement to build AI solutions that help developers debug,
    test, and ship faster.
  - A track record of building AI solutions with customer focus.
  - Experience in building applications in a professional
    product (SaaS) environment ideally with JS/TS & Node.js.
  - You have the ability to be autonomous and self-motivated in
    a remote work environment, while you also enjoy getting to
    know your colleagues and helping others.
  - You assume good intentions and are a great communicator in
    spoken and written English.
  - You love making software!
  
  How we work
  
  - Teams organize around outcomes, not ceremonies. We ship and
    iterate continuously.
  - You work autonomously and own your output.
  - We talk to customers. All interactions matter.
  - We assume good intentions, give direct feedback, and do not
    avoid uncomfortable conversations.
  
  Why us?
  
  - Have business impact and the instant visibility that a
    startup offers.
  - Transparent salary because your salary shouldn't be dictated
    by how good a negotiator you are. (more info below)
  - Remote-first, flexible work hours, async-first (low meeting,
    high productivity) and transparent culture
  - Stock options
  - 27 days of paid vacation + your local public holidays
  - Paid sick leave & up to 14 weeks of paid parental leave
  - $1,500 learning, visiting and wellbeing budget
  - Co-working budget or home office setup
  - Annual company retreats
  
  Find out more here.
  
  What we pay
  
  Fair, competitive, and transparent pay is very important for
  us. Therefore we work with a standardized salary calculator
  that includes several factors such as seniority level as
  well as location.
  
  For this role, the range is
  
  - €93k - €103k for someone in a similar cost of market as UK,
    Germany etc.
  - €84k - €93k for someone in a similar cost of market as
    Spain, Poland, Ukraine etc.
  
  Apply
  
  If this sounds interesting, please apply! Studies by several
  different sources have shown that on average men will apply
  for a job if they meet 60% of the application requirements.
  Women, non-binary people and POC will seek to match a much
  higher percentage of requirements before applying. If you're
  not sure you're the right fit, apply anyway and let us know
  what you bring to the table. We'd love to hear from you!
  
  We're all about being transparent and setting clear
  expectations. That's why we've put together our hiring
  playbook and open-sourced our employee handbook. There
  you'll find a sneak peek of who we are, how we work and what
  you can expect in our hiring process.
