description: |
  🚀 Why Midnite?
  
  Midnite is a next-generation sports betting and gaming
  platform built for a new wave of players.
  
  We combine sharp product thinking, bold brand, and fast
  execution to create experiences that feel modern, intuitive,
  and built for how people actually play today.
  
  Over 400,000 players have already made the move,  and we’re
  only just getting started.
  
  We’re a high-performance team operating at pace. High
  ownership. Constant iteration. No hiding behind processes.
  We move quickly, test relentlessly, and turn ambitious ideas
  into real impact. If you’re driven, creative, and thrive in
  fast-moving environments where you can shape meaningful
  outcomes - keep reading.
  
  Not your grandad’s bookie.
  
  👀 The Role
  
  Title: Senior Fullstack Engineer (Admin & AI Enablement)
  
  Team: Admin & AI Enablement
  
  Location: Remote / London / Hybrid (TBD)
  
  Salary: £90,000 - £110,000
  
  This role will be a key part of building Midnite’s new
  internal back office platform and shaping how internal tools
  evolve across the business. You’ll work across the stack to
  deliver high-quality admin experiences used by teams every
  day, while also contributing to practical AI-enabled
  improvements in both internal tooling and engineering
  workflows. This is a senior individual contributor role with
  meaningful ownership, particularly across the frontend
  experience, working closely with Product, Design, and
  engineering teammates to build scalable systems from the
  ground up.
  
  You will:
  
  - Build fullstack features for Midnite’s internal back office
    platform.
  - Own features end-to-end across backend APIs and internal
    UIs.
  - Write production code across Python backend and modern
    frontend technologies, primarily Vue + Tailwind.
  - Work closely with Product and Design to implement high-
    quality internal experiences.
  - Design and build APIs as part of fullstack feature delivery.
  - Contribute to practical AI-enabled features and internal
    tooling improvements.
  - Explore ways AI and automation can improve engineering
    workflows and team efficiency.
  - Participate in code reviews and maintain a high quality bar
    across the codebase.
  - Mentor junior engineers and contribute to raising the
    technical standard of the team.
  
  Requirements
  
  The next Midniter:
  
  - Brings 5+ years of engineering experience across frontend
    and backend.
  - Has strong frontend capability in a modern JavaScript
    framework such as Vue, React, or Angular.
  - Has backend development experience in Python or a similar
    language.
  - Can build end-to-end features across UI, API, and database
    layers.
  - Has worked closely with Product to build good product
    experiences.
  - Brings strong ownership and can operate effectively in a
    fast-moving, ambiguous environment.
  - Has an interest in AI tooling, automation, and practical
    experimentation.
  - Communicates clearly and works well with Product, Design,
    and engineering teammates.
  
  Benefits
  
  💰 Winnings
  
  - Private health insurance with zero excess, including optical
    cover and optional dental.
  - Income protection to protect your earnings and give you
    peace of mind.
  - Tenure holiday policy. After three years you receive an
    extra two days leave, increasing to 30 days annually after
    five years.
  - Flexible working and a fully supported home office setup so
    you can do your best work from home.
  - Nursery salary sacrifice scheme helping parents save
    thousands each year on nursery fees.
  - Salary sacrifice schemes for tech and holidays so you can
    spread the cost of the things you want.
  - Retail discounts and subscription perks across a wide range
    of brands.
  - Quarterly team socials to connect, celebrate and have fun
    together.
  
  At Midnite, we’re committed to creating equal opportunities
  for everyone. We actively strive to build balanced teams
  that reflect the diversity of our communities, including
  ethnic minorities, people with disabilities, the LGBTQIA+
  community, and all genders.
  
  We aim to provide an inclusive and supportive interview
  experience for all candidates. If you require any reasonable
  adjustments, please let us know in advance so we can ensure
  you feel comfortable and set up for success.
