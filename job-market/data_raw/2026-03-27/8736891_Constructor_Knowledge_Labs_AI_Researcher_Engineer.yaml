description: |
  Autonomous Scientific Discovery (AI × Materials)
  
  Project: MIND-MATTER
  
  Duration: 6 months (2026)
  
  Location: Hybrid (Bremen / remote)
  
  About the Role
  
  We are looking for an AI Researcher / Engineer for a project
  funded under the ARIA AI Scientist Call, to help build next-
  generation systems for autonomous scientific discovery. You
  will work on AI agents that can reason over scientific
  knowledge, design and run simulations, analyze results, and
  iteratively refine hypotheses — pushing toward the vision of
  an AI Scientist.
  
  This role sits at the intersection of AI systems, scientific
  computing, and materials research, within a high-risk, high-
  impact research programme exploring neuromorphic materials
  and “computation in matter”.
  
  What You’ll Do
  
  - Build and integrate AI agents that autonomously explore
    scientific hypotheses
  - Connect AI reasoning systems to simulation and data analysis
    pipelines
  - Design infrastructure for managing experiments, simulations,
    and results
  - Develop tools for automated analysis, comparison of models,
    and visualization
  - Collaborate closely with experimentalists and researchers
    across Europe
  
  The emphasis is on systems thinking and autonomy, not narrow
  model tuning.
  
  What We’re Looking For
  
  Essential
  
  - Background in AI, computer science, physics, materials
    science, or related fields
  - Strong Python skills and experience with scientific or ML
    workflows
  - Familiarity with modern AI tools (LLMs, agents, APIs, or ML
    frameworks)
  - Ability to work independently in open-ended research
    settings
  
  Nice to Have
  
  - Experience with simulations, computational physics, or
    materials modeling
  - Cloud infrastructure, data pipelines, or automation
    experience
  - Interest in Bayesian methods, experiment design, or
    scientific reasoning
  
  We welcome applications from researchers at different career
  stages, provided they have relevant expertise and a strong
  research background aligned with the project
  
  About the Project
  
  MIND-MATTER investigates neuromorphic materials that perform
  energy-efficient analogue computing. The project pioneers an
  AI Scientist that closes the loop from hypothesis →
  experiment → analysis → theory refinement, setting a
  blueprint for future self-driving labs.
  
  How to Apply
  
  Send:
  
  - Your CV
  - A short statement (1–2 paragraphs) on your background and
    interest in autonomous scientific discovery
