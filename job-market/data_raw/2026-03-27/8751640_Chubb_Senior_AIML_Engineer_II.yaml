  About Chubb
  
  Chubb is a world leader in insurance. With operations in 54
  countries and territories, Chubb provides commercial and
  personal property and casualty insurance, personal accident
  and supplemental health insurance, reinsurance and life
  insurance to a diverse group of clients. The company is
  defined by its extensive product and service offerings,
  broad distribution capabilities, exceptional financial
  strength and local operations globally. Parent company Chubb
  Limited is listed on the New York Stock Exchange (NYSE: CB)
  and is a component of the S&P 500 index. Chubb employs
  approximately 43,000 people worldwide. Additional
  information can be found at: www.chubb.com.
  
  About Chubb India
  
  At Chubb India, we are on an exciting journey of digital
