  Position Details:
  
  - Function/Department: Advanced Analytics
  - Location: Bangalore, India
  - Employment Type: Full-time
  - Role Overview – AI/ML Engineer
  
  Chubb is seeking a highly skilled and experienced Deep
  Learning Engineer with Generative AI experience to develop
  and scale our Generative AI capabilities. The ideal
  candidate will be responsible for designing, finetuning and
  training large language models and developing Generative AI
  systems that can create and improve conversational abilities
  and decision-making skills of our machines
  
  Responsibilities:
  
  - Develop and improve Generative AI systems to enable high
    quality decision making, to refine answers for queries,
    and to enhance automated communication capabilities.
  - Own the entire process of data collection, training, and
    deploying machine learning models.
  - Continuous research and implementation of cutting-edge
    techniques in deep learning, NLP and Generative AI to
    build state-of-the-art models.
  - Work closely with Data Scientists and other Machine Learning
    Engineers to design and implement end-to-end solutions.
  - Optimize and streamline deep learning training pipelines.
  - Develop performance metrics to track the efficiency and
    accuracy of deep learning models.
  
  Qualifications
  
  Requirements :
  
  - Minimum of 2 years of industry experience in developing deep
    learning models with a focus on NLP and Generative AI.
  - Expertise in deep learning frameworks such as Tensorflow,
    PyTorch and Keras.
  - Experience working with cloud-based services such as Azure
    for training and deployment of deep learning models.
  - Experience with Hugging Face's Transformer libraries.
  - Expertise in developing and scaling Generative AI systems.
  - Experience in large dataset processing, including pre-
    processing, cleaning and normalization.
  - Proficient in programming languages such as Python (
    preferred ) /R.
  - Experience with natural language processing (NLP) techniques
    and libraries.
  
  
  
