description: |
  About Us
  
  Parity is one of the world’s most experienced companies
  building the core infrastructure behind blockchain — the
  system that allows information and value to be shared
  securely without needing an intermediary. We’re laying the
  foundation for a better web which respects the freedom and
  data of individuals, and empowers developers to build
  better, more trustworthy online services.
  
  Our remote-first, global team develop open-source software
  that anyone can use or improve. This includes Polkadot,
  Polkadot SDK, and Kusama — key parts of the Web3 tech stack,
  the next generation of the internet. Our mission is to make
  Polkadot the most active and innovative community in
  blockchain, powering a new era of connected and
  decentralised applications.
  
  About the Team
  
  This role sits in our Acceleration department, home to the
  people who drive ecosystem growth by building tools,
  integrations, and partnerships across the Polkadot network.
  
  Reporting into our Engineering Lead, you’ll be joining our
  Builder Experiences team. This team is responsible for
  accelerating both internal and external developers that
  build on Polkadot. It’s a large canvas offering lots of
  opportunities, from reasoning through how we can bring AI
  assistants to help to building better CI/CD tools, more
  expressive documentation or just creating tutorials that
  delight people on their first hands-on experience.
  
  About the Role
  
  As a DevTooling Engineer, you’ll be at the center of that
  change, defining bright new ways to build, both internally
  in Parity and externally in the Polkadot ecosystem.
  
  As Polkadot is focused on creating unstoppable apps for
  everyone, we're in the middle of deeply changing how dApps
  are built.
  
  And speaking of deep changes, you will also be required to
  think how AI can contribute to this. How do we expand the
  standard AI capabilities to our needs? What additional
  tools/skills/processes are needed?
  
  What you’ll do
  
  - Developer Tooling: Constantly iterate on the developer tools
    we use internally and externally.
    - Hands-on build Web3 app prototypes, identify friction
      points, eliminate them.
    - Rinse and repeat
  - Developer Advocacy: Connect with internal and external
    developers through hackathons, conferences, forums and
    provide support, aggregate issues, advocate for solutions
  - Building dApps:Build Web3 apps and prototypes that further
    the understanding of how everyday people can use apps
    built on Web3 principles
  - Documentation & Learning Resources: Create, review, update
    developer documentation, tutorials, videos and other
    developer artefacts
  - Emerging Initiatives: DevEx is constantly evolving. You'll
    have the opportunity to shape new projects as you identify
    gaps and opportunities in the developer journey.
  
  Your skills
  
  - Prototyping mindset: experience on iterating quickly from
    idea to running code, getting feedback and updating
    prototypes
  - Developer communications: experience in writing developer
    documentation both internally and externally, tutorial
    creation, developer videos, running workshops / booths at
    developer conferences
  - AI adept: This is a team that believes we need to win with
    AI. Have a good understanding of how AI can be used to
    accelerate developer processes, and experience in
    providing tools to make AI assistants better for our
    products
  - Web3 curiosity: You didn’t write any blockchain code, that’s
    fine. Read up on the key tenets of what we do here at
    Polkadot: Personhood, Unstoppability and tell us how would
    you use these to create something new
  - Technologies we use: Javascript, Typescript, Rust, Solidity
  
  About Working With Us
  
  Joining Parity means joining team mates who are genuinely
  excited about the impact their projects are having, and the
  opportunity to grow alongside some of the brightest minds in
  the Web3 space! You’ll work remotely and flexibly, while
  still getting to meet your team mates throughout the year at
  team and company-wide retreats.
  
  Upon receiving an offer, all candidates undergo a background
  check through Zinc, our trusted third-party provider. Team
  members will be taken on as a contractor via our UK entity.
  View our Applicant Notice to see how we use your data.
  
  Parity is an Equal Opportunity Employer. We welcome
  diversity in our global team and care about everyone in our
  collective feeling included and welcome
  
  Is this position not quite your match? Browse our other open
  roles.
