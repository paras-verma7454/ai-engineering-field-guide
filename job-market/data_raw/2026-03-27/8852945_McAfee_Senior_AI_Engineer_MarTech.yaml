  Company Overview
  
  McAfee is a leader in personal security for consumers.
  Focused on protecting people, not just devices, McAfee
  consumer solutions adapt to users’ needs in an always online
  world, empowering them to live securely through integrated,
  intuitive solutions that protects their families and
  communities with the right security at the right moment.
  
  Company Benefits and Perks:
  
  We work hard to embrace diversity and inclusion and
  encourage everyone at McAfee to bring their authentic selves
  to work every day. We offer a variety of social programs,
  flexible work hours and family-friendly benefits to all of
  our employees.
  
  - Bonus Program
  - 401k Retirement Plan
  - Medical, Dental, Vision, Basic Life, Short Term Disability
    and Long-Term Disability Coverage
  - Paid Parental Leave
  - Support for Community Involvement
  - 14 Paid Company Holidays
  - Unlimited Paid Time Off for Exempt Employees
  - 96 Hours of Sick Time and 120 Hours of Vacation for Non-
    Exempt Employees Accrued Each Year
  
  We're serious about our commitment to diversity which is why
  McAfee prohibits discrimination based on race, color,
  religion, gender, national origin, age, disability, veteran
  status, marital status, pregnancy, gender expression or
  identity, sexual orientation or any other legally protected
  status.
  
  The starting pay range for this position is
  $135,910.00-$223,285.00. McAfee takes into consideration an
  individual’s skillset, experience and location in making
  final salary determinations. For further details, please
  discuss with the Talent Acquisition Partner.
  
