description: |
  About Us
  
  With electric vehicles expected to be nearly 30% of new
  vehicle sales by 2025 and more than 50% by 2040, electric
  mobility is becoming a reality. ChargePoint (NYSE: CHPT) is
  at the center of this revolution, powering one of the
  world’s leading EV charging networks and a comprehensive set
  of hardware, software and mobile solutions for every
  charging need across North America and Europe. We bring
  together drivers, businesses, automakers, policymakers,
  utilities and other stakeholders to make e-mobility a global
  reality.
  
  Since our founding in 2007, ChargePoint has focused solely
  on making the transition to electric easy for businesses,
  fleets and drivers. ChargePoint offers a once-in-a-lifetime
  opportunity to create an all-electric future and a trillion-
  dollar market.
  
  At ChargePoint, we foster a positive and productive work
  environment by committing to live our values of Be
  Courageous, Charge Together, Love our Customers, Operate
  with Openness, and Relentlessly Pursue Awesome. These values
  guide how we show up every day, align, and work together to
  build a brighter future for all of us.
  
  Join the team that is building the EV charging industry and
  make your mark on how people and goods will get everywhere
  they need to go, in any context, for generations to come.
  
  ChargePoint is looking for an AI Engineer who will  design,
  development, and operation of production‑grade Generative AI
  systems. You will architect and deliver LLM‑powered
  applications, including Copilot‑style experiences, AI
  agents, and automation at enterprise scale.
  
  You will operate with high autonomy, own complex technical
  initiatives end‑to‑end, and influence GenAI architecture and
  standards across teams.
  
  Reports To
  
  Senior Manager-Information Security
  
  What You Will Be Doing
  
  As an AI Engineer, you will:
  
  - Assist in developing and training ML, deep learning, and NLP
    models.
  - Support senior engineers in building and maintaining data
    pipelines
  - Implement basic preprocessing, feature engineering, and data
    validation tasks.
  - Contribute to testing, evaluating, and optimizing model
    performance.
  - Help deploy models into staging or production under
    guidance.
  - Write clean, well‑documented Python code for AI experiments
    and prototypes.
  - Work with APIs, model inference scripts, and small‑scale
    automation tasks.
  - Collaborate with cross‑functional teams to understand
    requirements.
  - Stay updated with emerging AI tools, frameworks, and
    techniques
  
  What You Will Bring to ChargePoint
  
  - Proven ability to own ambiguous, complex problem spaces
  - Experience influencing architecture and technical direction
    beyond your immediate team
  - Strong system design and debugging skills for distributed AI
    systems
  - Ability to balance speed, quality, and risk in production AI
    deployments
  - Passion for building scalable, maintainable, and responsible
    AI platforms
  - Strong communication skills with engineers, product
    managers, and leadership
  
  Requirements
  
  - 4 plus years of professional software engineering experience
  - Strong development skills in Python (required); experience
    with Java, Go, or TypeScript is a plus
  - Deep hands‑on experience with LLMs and Generative AI systems
  - Strong experience with RAG, embeddings, vector search, and
    prompt engineering
  - Experience building Copilot‑style or agent‑based AI systems
  - Strong understanding of distributed systems, APIs, and
    microservices
  - Experience deploying and operating systems using
    Docker/Kubernetes
  - Experience with Azure, AWS, or GCP
  - Familiarity with LLMOps / MLOps practices
  
  Good to Have
  
  - Experience with AI governance, compliance, or regulated
    enterprise environments
  - Experience with vector databases and retrieval optimization
  - Prior ownership of AI systems running in production at scale
  
  Location
  
  Remote location in India
  
