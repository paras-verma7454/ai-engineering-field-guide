description: |
  About Us
  
  Finance of America helps homeowners 55+ access the equity
  they’ve built while staying in full control of their home
  and their financial future. Through a range of reverse
  mortgage solutions, we help customers shape the retirement
  they’ve earned while continuing to evolve how we serve and
  work together.
  
  Joining Finance of America now means stepping into a period
  of momentum and growth, with teams actively shaping what
  comes next and opportunities to make an impact and grow your
  career.
  
  To learn more about us, visit www.financeofamerica.com
  
  Purpose of Role
  
  Responsible for designing, developing, and deploying AI-
  powered solutions across the company. Focuses on building
  and fine-tuning AI models, creating scalable AI
  applications, and ensuring their seamless integration into
  business operations. Collaborates closely with data
  scientists, engineers, and business leaders to deliver AI-
  driven innovations that enhance efficiency, automation, and
  decision-making.
  
  Expectations
  
  - Develops, trains, and optimizes machine learning and deep
    learning models by leveraging state-of-the-art algorithms,
    hyperparameter tuning, and advanced training techniques to
    address complex business challenges and improve decision-
    making processes.
  - Builds AI-driven applications and tools by integrating
    machine learning models, natural language processing, and
    computer vision into software solutions to enhance
    automation, personalization, and intelligent insights for
    users and stakeholders.
  - Works with structured and unstructured data by implementing
    data cleaning, transformation, feature extraction, and
    augmentation techniques to ensure high-quality datasets
    that maximize model accuracy and efficiency.
  - Collaborates with business teams, IT, and data scientists by
    gathering requirements, translating business needs into
    AI-driven solutions, and aligning technical
    implementations with organizational objectives to maximize
    value and impact.
  - Deploys AI models into production environments by utilizing
    cloud-based infrastructure, containerization, and MLOps
    best practices to ensure models are scalable, resilient,
    and seamlessly integrated into business workflows.
  - Continuously monitors AI models' performance by implementing
    tracking mechanisms, analyzing drift, and proactively
    retraining models to maintain accuracy and effectiveness.
  - Ensures AI solutions adhere to legal, regulatory, and
    ethical guidelines by applying fairness-aware algorithms,
    explainability techniques, and bias detection methods to
    promote responsible AI adoption and mitigate potential
    risks.
  - Stays updated on the latest AI trends, tools, and best
    practices by researching academic papers, experimenting
    with emerging technologies, and participating in industry
    conferences to drive continuous innovation and maintain a
    competitive edge.
  - Develops technical documentation, best practices, and
    training materials by creating detailed guides, tutorials,
    and presentations to support knowledge sharing, foster AI
    adoption across teams, and ensure smooth onboarding of new
    AI solutions.
  - Performs other duties as assigned.
  
  Reports To
  
  - Chief Data Officer
  
  Qualifications – Experience/Skills/Competencies
  
  - Minimum 4 years of hands-on experience developing, training,
    and deploying AI/ML models.
  - Strong proficiency in machine learning frameworks
    (TensorFlow, PyTorch, Scikit-Learn, etc.).
  - Proficiency in programming languages such as Python, R, or
    Julia.
  - Experience working with cloud AI services (AWS SageMaker,
    Azure AI, Google Vertex AI).
  - Knowledge of MLOps, model deployment, and API integration.
  - Understanding of deep learning, NLP, computer vision, and
    other AI subfields.
  - Strong problem-solving and critical-thinking skills.
  - Ability to translate business problems into AI-driven
    solutions.
  - Excellent communication skills to explain AI concepts to
    non-technical stakeholders.
  - Experience working with large datasets and implementing data
    pipelines.
  
  Qualifications – Education Requirements
  
  - Bachelor's Degree or comparable qualifications
  
  Qualifications – Education – Field(s)/Profession(s)
  
  - Computer Science, Information Security, Management of
    Information Systems or related field preferred.
  
  Compensation
  
  The base salary range for this position is ($100,800 -
  $168,000 ) inclusive of all geographical differences in the
  labor market. The base salary for the position will be
  determined based on factors such as the candidate’s work
  location, skills, education, and experience. In addition to
  those factors, we believe in the importance of pay equity
  and consider the internal equity of our current team members
  in determining any final offer. We offer a competitive
  benefits package including health, dental, vision, life
  insurance, paid time-off benefits, flexible spending
  account, 401(k) with employer match, and ESPP.
  
  Additional Information
  
  The application deadline for this job opportunity is
  5/1/2026.
  
