  Compensation Details
  
  The salary range for this role is $130,000-$180,000. This is
  the lowest to highest salary we in good faith believe we
  would pay for this role at the time of this posting. We may
  ultimately pay more or less than the posted range, and the
  range may be modified in the future. This range is only
  applicable for jobs to be performed in the job posting
  location. An employee’s pay position within the salary range
  will be based on several factors including, but limited to,
  relevant education, qualifications, certifications,
  experience, skills, seniority, geographic location, business
  sector, performance, shift, travel requirements, sales or
  revenue-based metrics, market benchmarking data, any
  collective bargaining agreements, and business or
  organizational needs. This job is also eligible for a
  discretionary bonus, which, along with base salary and
  retirement contributions, is part of our total comprehensive
  package. We offer a comprehensive package of benefits
  including paid time off, medical/dental/vision insurance,
  retirement, life insurance and other benefits to eligible
  employees.
  
  Note: No amount of pay is considered to be wages or
