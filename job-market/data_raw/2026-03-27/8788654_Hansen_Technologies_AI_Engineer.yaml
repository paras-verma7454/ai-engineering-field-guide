description: |
  Who Are We
  
  
  
  
  
  
  
  Hansen Technologies is a leading global provider of software
  and services that enable organisations to transform customer
  experiences and streamline critical business processes. With
  a rich history of innovation and a footprint that spans over
  80 countries, Hansen empowers utilities, energy, and
  communications companies to thrive in an ever-evolving
  digital landscape. Our commitment to excellence, customer
  focus, and collaborative culture makes Hansen a place where
  passionate professionals can make a meaningful impact, drive
  real change, and help shape the future of industries
  worldwide.
  
  
  
  
  
  
  
  
  
  
  
  
  We are proud to be an equal opportunities employer. Hansen
  prides itself on celebrating diversity and is committed to
  creating an inclusive environment for all employees, even
  extending this to how we work with our customers, partners,
  and suppliers. We welcome applications from all qualified
  candidates, regardless of age, disability, gender identity
  or expression, marital status, race, ethnicity, religion or
  belief, sexual orientation, or any other protected
  characteristic. If you require any adjustments or
  accommodation during the recruitment process, please let us
  know.
  
  
  
  
  
  
  
  
  Why This Role Matters
  
  
  
  
  
  
  
  Design and Innovate, Enable and Empower, Transform and
  Scale.
  
  
  
  
  
  
  
  This is more than an engineering role—it’s a strategic
  enabler. You’ll design and deploy advanced AI architectures,
  foster adoption through enablement programs, and act as a
  trusted advisor to stakeholders. Your contributions will
  directly influence how we leverage AI to create measurable
  business outcomes and maintain our position as a leader in
  intelligent automation.
  
  
  
  
  
  
  
  
  What You’ll Do
  
  
  
  
  
  
  
  - Design AI Solutions: Architect and prototype advanced AI
    systems leveraging multi-cloud platforms (AWS, Azure, GCP)
    and large language models.
  
  
  
  
  
  
  
  - Build Scalable Architectures: Develop secure, robust, and
    future-ready AI frameworks that integrate seamlessly with
    enterprise technology stacks.
  
  
  
  
  
  
  
  - Collaborate Cross-Functionally: Partner with software
    engineers, data scientists, and business stakeholders to
    deliver optimized AI solutions.
  
  
  
  
  
  
  
  - Drive AI Adoption: Create and lead enablement programs,
    workshops, and hands-on labs to upskill teams and foster a
    culture of innovation.
  
  
  
  
  
  
  
  - Evaluate Emerging Technologies: Continuously assess new AI
    tools and frameworks for integration into our ecosystem.
  
  
  
  
  
  
  
  - Advise Strategically: Act as a subject matter expert,
    guiding stakeholders on best practices, integration
    opportunities, and change management.
  
  
  
  
  
  
  
  
  What You Bring
  
  
  
  
  
  
  
  - Expertise in cloud platforms (AWS, Azure, GCP) and multi-
    cloud integration.
  
  
  
  
  
  
  
  - Deep understanding of large language models, machine
    learning frameworks, and AI architectures.
  
  
  
  
  
  
  
  - Proficiency in programming languages (Python, Java, C#).
  
  
  
  
  
  
  
  - Strong analytical and problem-solving skills for complex
    system design.
  
  
  
  
  
  
  
  - Experience with DevOps practices and deploying scalable AI
    services.
  
  
  
  
  
  
  
  - Excellent communication and collaboration skills for cross-
    functional engagement.
  
  
  
  
  
  
  
  - Knowledge of enterprise security, compliance, and data
    governance.
  
  
  
  
  
  
  
  Preferred:
  
  
  
  
  
  
  
  - Bachelor’s or Master’s degree in Computer Science,
    Engineering, or related field.
  
  
  
  
  
  
  
  - 1+ years of experience in AI engineering (in-house or
    consulting).
  
  
  
  
  
  
  
  - Strategic mindset with ability to turn vision into
    actionable steps.
  
  
  
  
  
  
  
  
  
  
  
  
  Benefits and Perks
  
  
  
  
  
  
  
  Join us for a rewarding career with competitive
  compensation, leave entitlements, health coverage, and
  financial security. Enjoy work-life balance, growth, and
  recognition for your exceptional performance. Our team will
  unveil the intricacies of our benefit package during the
  selection process.
