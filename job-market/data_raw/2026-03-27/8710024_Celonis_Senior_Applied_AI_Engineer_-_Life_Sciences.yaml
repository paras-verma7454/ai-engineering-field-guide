description: |
  We're Celonis, the global leader in Process Intelligence
  technology and one of the world's fastest-growing SaaS
  firms. We believe there is a massive opportunity to unlock
  productivity by placing AI, data and intelligence at the
  core of business processes - and for that, we need your
  help. Care to join us?
  
  Role Description
  
  As an Applied AI Engineer specializing in the Life Sciences,
  you are pushing the envelope in solving business-critical
  problems for the world's largest, most diversified life
  science organizations. You will be working intimately with
  this strategic client, understanding their uniquely complex
  objectives—spanning from logistics to the precision
  distribution of advanced products—and building Celonis
  solutions using the world’s leading Process Intelligence
  (PI) platform in combination with top AI and ML technology
  partners (e.g., Microsoft, OpenAI, Databricks)..
  
  With Celonis’ Process Intelligence (PI) platform, we feed
  operational context to AI so it understands the intricate
  realities of our customers’ supply chain networks and
  enables them to industrialize AI. This unlocks real ROI on
  AI deployments at scale, ensuring life-saving products reach
  patients faster and safer. There is no AI without PI. You
  will prototype these solutions, demonstrate their value to
  Chief Supply Chain Officers (CSCOs) and operational leaders,
  and ensure successful implementation, adoption, and value
  realization to increase the footprint of Celonis across the
  life sciences sector.
  
  Key Responsibilities
  
  - AI Discovery & Solutioning: Understand the client's
    overarching AI strategy and the distinct supply chain
    challenges across both their MedTech portfolios (e.g.,
    mitigating global raw material shortages, optimizing
    supply chains, managing inventories, or accelerating
    quality batch releases). As a Celonis product and life
    sciences domain expert, translate these complex, multi-
    tiered logistics requirements into innovative AI solutions
    that drive measurable impact..
  - Pre- and Post-Sales Execution: Actively drive the full
    customer lifecycle. Lead technical discovery and
    capability demonstrations during the pre-sales cycle, and
    remain deeply involved post-sale to guide implementation,
    ensuring agreed value and adoption thresholds in the
    supply chain are successfully reached.
  - Hackathons & Prototyping: Think out of the box, have a „can-
    do“ attitude, and don’t shy away from complex, fragmented
    supply chain networks. Leverage cutting-edge AI
    technologies to rapidly build creative prototypes in
    customer hackathons, solving critical pain points in
    planning, sourcing, manufacturing, and distribution.
  - Agentic Process Transformation: Support our customers in
    achieving real ROI out of AI deployments at scale,
    enabling a fundamental shift from traditional, rule-based
    automation to the use of autonomous AI agents empowered by
    our Celonis Process Intelligence Platform (e.g.,
    autonomous inventory rebalancing or intelligent shipment
    exception handling).
  - Proof Projects: End-to-end execution of business-critical
    Proof-of-Value projects. This includes architecting and
    delivering secure, scalable LLM/agent systems with RAG,
    tools, and guardrails, while seamlessly integrating with
    enterprise ERPs (e.g., SAP), Quality Management Systems
    (QMS), and strict regulatory frameworks (FDA, EMA, GxP).
  - Domain & Industry Leadership: Serve as the internal and
    external technical subject matter expert for the Life
    Sciences Supply Chain, scaling knowledge across the
    organization regarding pharmaceutical manufacturing and
    logistics processes.
  
  Requirements
  
  - 5+ years of experience leading technical pre-sales and post-
    sales engagements specifically within Life Sciences,
    Pharmaceutical, or MedTech supply chains. This includes
    defining AI roadmaps, building compelling ROI/TCO business
    cases, and guiding technical implementations through to
    value realization.
  - Deep understanding of supply chain business processes native
    to Life Sciences (such as Sales & Operations Planning
    (S&OP), Procure-to-Pay, Track & Trace, Cold Chain
    Management, or Quality Control/Batch Release) with the
    ability to translate high-level business needs into
    specific AI use cases.
  - Expertise in generative AI techniques like RAG, few-shot
    learning, prompt engineering, multi-agent orchestration,
    multimodal understanding, or fine-tuning used to build
    high-impact use cases (e.g., intelligent chatbots for
    supplier collaboration, automated extraction of data from
    complex customs or quality documents).
  - Solid knowledge of Python and common ML libraries (such as
    LangChain, pandas, pydantic, sklearn, PyTorch) as well as
    data engineering tools and technologies for handling
    massive, siloed supply chain datasets.
  - Strong presentation skills to both internal and external
    stakeholders (including supply chain executives and IT
    leaders), whether leading technical whiteboarding sessions
    or formal readouts and demos.
  - Bachelor’s Degree required; Master's Degree in computer
    science, supply chain management, engineering,
    mathematics, or related fields, or equivalent work
    experience preferred.
  
  Nice to Have (Big Plus)
  
  - Hands-on experience building agentic systems using LLM
    orchestration, RAG, function calling, and prompt
    engineering, while ensuring safety through rigorous
    evaluations suited for highly regulated (GxP) life
    sciences environments.
  - Familiarity with life sciences supply chain data standards
    and systems (e.g., GS1 EPCIS for traceability, SAP
    APO/IBP, Kinaxis).
  - Working knowledge of tools in the LLM ecosystem such as
    LangChain, LlamaIndex, or other OSS packages.
  - Experience in deploying and monitoring models at scale
    across major cloud platforms (AWS Bedrock, Azure AI, GCP
    Vertex).
  
