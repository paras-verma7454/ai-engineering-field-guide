  AI Engineer
  
  At Proofpoint, you will find an environment where innovation
  comes from creative collaboration and where everyone is
  empowered to move quickly and have fun. If you enjoy taking
  the “im” out of impossible, you will feel right at home with
  our team!
  
  As an AI Engineer, you will be part of a high-caliber
  Engineering team focused on designing, building, and
  supporting AI-driven solutions to classify digital
  communications for regulated industries. You will
  collaborate closely with Product Management and fellow
  engineers to deliver scalable, effective AI solutions. This
  role is hands-on and execution-focused, contributing
  directly to model development, experimentation, and
  production deployment.
  
  Responsibilities
  
  - Contribute to the development and deployment of transformer-
    based models for classification tasks, leveraging pre-
    trained models, fine-tuning techniques, and embedding-
    based retrieval.
  - Evaluate generalized/base models for low true-positive
    classification problems and help improve model
    performance.
  - Implement prompt-based classification techniques and vector-
    based retrieval approaches to enhance accuracy and
    efficiency.
  - Design and execute experiments to measure model efficacy,
    balancing performance with computational cost.
  - Collaborate with cross-functional teams to translate product
    requirements into practical AI/ML solutions.
  - Support build vs. buy evaluations by researching and testing
    available AI/ML technologies.
  - Help ensure AI solutions are scalable, secure, and aligned
    with enterprise best practices.
  - Stay current with advancements in transformers, LLMs, and
    AI-driven text classification, applying relevant
    innovations where appropriate.
  
  Requirements
  
  - 5+ years of experience in software engineering, with
    experience in AI/ML-focused projects.
  - 2+ years of hands-on experience working with transformer
    models or NLP.
  - Experience with one or more AI/ML frameworks such as
    TensorFlow, PyTorch, or Hugging Face Transformers.
  - Practical experience applying transformer models to text
    classification problems.
  - Familiarity with prompt engineering, vector-based retrieval,
    and embedding models.
  - Understanding of AI cost considerations, including model
    inference costs and optimization techniques.
  - Experience contributing to experiments to evaluate and
    improve model performance.
  - Background in cloud environments, containers, Java, and
    Linux-based architectures.
  - Familiarity with Agile/Scrum development processes.
  - Strong problem-solving skills and the ability to communicate
    effectively within a team environment.
  - Degree in Computer Science, AI/ML, or a related field.
  
