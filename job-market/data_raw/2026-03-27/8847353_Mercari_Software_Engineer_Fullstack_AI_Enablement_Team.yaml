description: |
  Introduction
  
  About Us
  
  Mercari is a Japan-based C2C marketplace company founded in
  2013 with the mission to “Create value in a global
  marketplace where anyone can buy & sell.” From being the
  first tech unicorn from Japan before its IPO in 2018 we have
  come a long way towards becoming a global player and
  continuously and diligently work towards our transformation
  journey with a strong focus on our mission.
  
  Since its inception, Mercari Group has worked to grow its
  services, investing in both our people and technology. Over
  time Mercari has expanded from being the top player in the
  C2C marketplace in Japan to new geographies like the U.S. We
  have also successfully launched new businesses such as
  Merpay, which is a mobile payment service platform with a
  vision to create a society where anyone can realize their
  dreams through a new ecosystem centered not only on payment
  service but also on credit. Today, Mercari Group is made up
  of multiple subsidiary businesses including logistics, B2C
  platform, blockchain, and sports team management.
  
  For our services to be utilized by people worldwide;
  however, there is still a mountain of work ahead of us. This
  endeavor naturally requires the capability of the best
  talent and minds, and that is exactly the reason for us to
  launch the India Center of Excellence. With your help, we
  will continue to take on the world stage and strive to grow
  into a successful global tech company.
  
  Our Culture
  
  To achieve our mission at Mercari, our organization and each
  of our employees share the same values and perspectives. Our
  individual guidelines for action are defined by our three
  values: Go Bold, All for One, and Be a Pro. Our organization
  is also shaped by our four foundations: Sustainability,
  Diversity & Inclusion, Trust & Openness, and Well-being for
  Performance. Regardless of how big Mercari gets, the culture
  will remain essential to achieving our mission and something
  we want to preserve throughout our organization. We invite
  you to read the “Mercari Culture Doc,” which summarizes the
  behaviors and mindset shared by Mercari and its employees.
  We continue to build an environment where all of our members
  of diverse backgrounds are accepted and recognized, and
  where they can thrive while holding dear to Mercari’s
  culture.
  
  Work Responsibilities
  
  - Design, development, and operation of APIs using Go and
    Typescript
  - Improving services and measuring effectiveness using
    quantitative and qualitative analysis on user behavior
    logs, etc.
  - Microservice performance tuning, monitoring, and alert
    handling
  - Working with PMs on a series of development tasks (plan,
    design, implementation, QA, release, etc.)
  - Investigating inquiries from customer support or other
    development teams
  - Conducting system operation tasks, including responding to
    alerts while on call
  - Engineering Culture
  - Technology Stack
  
  Bold Challenges
  
  - We are looking for people that are interested in our
    services, mission, and values, and want to work where
    engineers can go bold, use the latest technology, make
    autonomous decisions, and take on challenges at a rapid
    pace.
  
  Requirements
  
  Minimum Requirements
  
  - At least 5 years of experience in full stack software
    development(including experience in frontend languages
    like Typescript, Javascript and backend languages like
    Golang, Nodejs, etc.).
  - Experience in creating new, dynamic, front-end, and backend
    software products and web apps that are dynamic and
    visually appealing.
  - Experience in designing and developing databases (MySQL or
    similar RDBMS)
  - Ability to design and develop API as product and technical
    requirements.
  - Ability to take ownership.
  - Ability to design a plan for stability, scalability,
    performance optimization, and ongoing improvement.
  - Good communication skills to collaborate with stakeholders
    and teammates on product development
  
  Preferred Requirements
  
  - Familiarity with JavaScript frameworks such as Angular JS,
    React, and Amber.
  - Experience developing and operating systems using
    microservice architecture
  - Cloud development experience (preferably GCP or AWS)
  - Knowledge of and experience with databases (RDBMS/NoSQL),
    networks, Linux, monitoring systems, logging, and SLO/SLA
  - Experience contributing to an open-source project
  
  Benefits
  
  Employment Status: Full-time
  
  Office Location : Bangalore
  
  Hybrid workstyle
  
  - We believe in high performance and professionalism. We work
    from office for 2 days/week and work from home 3 days/week
  - To build a strong & highly-engaged organization in India, we
    highly encourage everyone to work from our Bangalore
    office, especially during the initial office setup phase
  - We will continue to review and update the policy to address
    future organizational needs
  
  Work Hours
  
  - Full flextime (no core time)Flexible to choose working hours
    other than team common meetings
