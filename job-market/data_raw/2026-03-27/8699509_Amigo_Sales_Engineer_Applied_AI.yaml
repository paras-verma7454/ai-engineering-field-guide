description: |
  About Amigo
  
  Amigo partners with healthcare organizations to deploy
  robust AI infrastructure that directly serves patients and
  providers. Our agents handle clinical workflows and patient
  engagement across the entire journey: pre-visit intake, care
  navigation, post-visit care plans, patient monitoring, and
  more.
  
  We own outcomes, not just delivery. For our customers, we're
  responsible for agent performance: clinical safety,
  continuous improvement, measurable patient outcomes. Agents
  operate autonomously within bounded clinical domains, with
  clear scope and handoff protocols. That scope expands as we
  validate performance across populations.
  
  We're backed by Tier 1 investors like General Catalyst, GSV
  Ventures, SVA, and CohoVC. Our work is validated with
  leading academic medical institutions. Our agents have
  reached 3M+ patient encounters and are on track to 10x this
  year.
  
  About this role
  
  As a Sales Engineer at Amigo, you'll be the technical
  imagination behind every deal. You'll hack together
  compelling POCs, live demos, and experimental AI experiences
  that show prospects what's possible—not just what exists
  today. You're the person who takes a vague customer problem,
  disappears for a few hours, and comes back with a working
  prototype that makes the room say "holy shit."
  
  This role exists so our Agent Engineers can stay focused on
  production deployments and knowledge consolidation. You own
  the pre-sales technical surface: scoping what's possible,
  building proof-of-concept agents, running technical
  discovery, and making the product feel real before ink hits
  paper. You work at the intersection of sales and
  engineering—close enough to the product to build on it,
  creative enough to stretch it into new territory.
  
  This is a role for builders who get energized by innovation
  and experimentation. You'd rather prototype five ideas in a
  week than polish one for a month. You're excited by novel AI
  use cases and want to be the first person to explore what
  our platform can do in new clinical domains.
  
  What you'll do
  
  - Build rapid POCs and demo environments tailored to specific
    prospect workflows and clinical use cases
  - Partner with AEs and the sales team during technical
    discovery to scope what's possible and shape deal
    architecture
  - Design and deliver live technical demonstrations that
    translate prospect pain points into working agent
    experiences
  - Prototype experimental agent configurations that explore new
    use cases—pushing the boundaries of what our platform can
    do
  - Run technical deep-dives with prospect clinical, IT, and
    operations teams to understand integration requirements
    and workflow constraints
  - Create reusable demo assets, reference architectures, and
    POC templates that accelerate future sales cycles
  - Translate technical objections into solutions during the
    sales process—security, compliance, integration
    feasibility
  - Collaborate with Agent Engineers to hand off won deals
    cleanly, documenting POC learnings and customer
    expectations
  - Provide technical credibility in prospect conversations,
    bridging the gap between our platform capabilities and
    customer-specific needs
  - Feed insights from the field back to product and
    engineering—what prospects are asking for, what patterns
    emerge, where the platform should go next
  - Stay current on AI/LLM developments and competitor
    capabilities to maintain technical edge in sales
    conversations
  
  What we're looking for
  
  - 3+ years of experience in sales engineering, solutions
    engineering, or a technical pre-sales role at a SaaS or AI
    company
  - Strong hands-on coding ability—you can build a working
    prototype, not just talk about one. Python proficiency
    required
  - Experience with LLMs, prompt engineering, and building on AI
    platforms
  - A hacker mentality: you're fast, scrappy, and energized by
    building things from scratch under time pressure
  - Genuine excitement for AI innovation and exploring
    experimental use cases—you follow the space obsessively
  - Ability to run a room—comfortable presenting to technical
    and executive audiences, handling objections live, and
    thinking on your feet
  - Strong discovery skills: you ask the right questions to
    uncover real problems, not just stated requirements
  - Experience working deals alongside account executives,
    understanding sales cycles and buyer psychology
  - Clear technical communication—you can explain complex
    systems to non-technical stakeholders without dumbing it
    down
  - Comfort with ambiguity: prospects don't hand you clean
    requirements, and you thrive in that environment
  
  Nice to have
  
  - Experience in healthcare technology or regulated industries
  - Background as a software engineer who moved into a customer-
    facing role (or vice versa)
  - Familiarity with healthcare workflows, EHR systems, or
    clinical terminology
  - Experience building demo environments or sandbox platforms
  - Understanding of healthcare compliance requirements (HIPAA,
    SOC 2)
  - Track record of directly influencing deal outcomes through
    technical work
  
  
  
  Benefits
  
  Health & Wellness
  
  - Comprehensive health, dental, and vision insurance
  - Daily catered lunch and dinner
  - Mental health support and wellness coaching
  - Flexible wellness stipend for fitness, therapy, or personal
    growth
  
  Growth & Development
  
  - Annual learning budget for courses, books, or conferences
  - Conference attendance budget for professional development
  - Annual team offsite
  - Academic collaboration opportunities
  - Unlimited PTO
  
  Our Core Values
  
  - Patients Win, We WinIf patients aren't getting better care,
    we haven't earned the right to scale. Every internal
    decision gets pressure-tested: does this make patients'
    lives better? If we can't draw the line, we question why
    we're doing it.
  - High Standards, High CareWe hold a high bar for the team
    because patients are counting on us to get this right. But
    high standards only work with genuine investment in each
    other. You can take risks, admit mistakes, and challenge
    ideas—not despite our standards, but because of them.
  - Thoughtful UrgencyWe move fast by default, but speed without
    judgment is recklessness. The discipline is knowing which
    decisions are reversible vs. not. In healthcare AI, the
    companies that win will be fast everywhere they can be and
    careful everywhere they must be. We build the muscle to do
    both.
  - Intensely MeasuredWe instrument patient outcomes, provider
    ROI, system performance, and clinical accuracy. But data
    without action is surveillance. Every metric should have
    an owner, a threshold, and a response plan. If we're
    measuring something but never acting on it, we stop
    measuring it.
  
  Who Builds With Us
  
  - Low ego: Politics and territory don't interest you. The best
    ideas win, regardless of who has them.
  - Direct: You say the hard thing, challenge ideas openly, and
    commit fully once decided.
  - High agency: You thrive on trust rather than instruction.
    When you see something is broken, you fix it. You don’t
    file tickets and wait for someone else.
  - Bar of excellence: You hold yourself to a bar most people
    wouldn't, and you want teammates who do the same.
  - Skeptical: You push back on rules that don’t make sense and
    question assumptions that haven’t earned their place.
