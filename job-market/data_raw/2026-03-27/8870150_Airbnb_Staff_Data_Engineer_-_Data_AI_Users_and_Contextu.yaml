description: |
  Airbnb was born in 2007 when two hosts welcomed three guests
  to their San Francisco home, and has since grown to over 5
  million hosts who have welcomed over 2 billion guest
  arrivals in almost every country across the globe. Every
  day, hosts offer unique stays and experiences that make it
  possible for guests to connect with communities in a more
  authentic way.
  
  The Community You Will Join:
  
  Marketplaces Data and AI Org is a group of passionate
  machine learning, data, and analytics engineers responsible
  for creating new data products that drive quality,
  understanding and bookings. You’ll be part of the overall
  Guest and Host organization that is responsible for the
  Airbnb web and native apps used by hundreds of millions of
  our guests and Hosts.
  
  The Users and Contextualization Data & AI team, a vital part
  of the Marketplace Data & AI, focuses on building
  foundational data and systems to provide Airbnb teams with a
  deeper understanding of key domains. Specifically, this team
  concentrates on user data (Guest & Host), aiming to create
  high-quality, foundational, and well-governed user data and
  insights. These insights are crucial for enabling
  personalized and context-aware experiences that enhance trip
  quality both on and off the Airbnb platform, ultimately
  helping Airbnb better understand and serve its users
  throughout their journey.
  
  The Difference You Will Make:
  
  The quality of data related to Users, Listings, and
  Marketplaces is foundational to Airbnb's success, directly
  impacting our products and business. To enhance our data
  foundation and maximize the value derived from our data and
  machine learning models, we are significantly expanding our
  Data Engineering efforts in these crucial areas.
  
  A key opportunity lies in deepening our understanding of
  Airbnb users to improve the experience for both Hosts and
  Guests. As a Data Engineer focusing on this area, you will
  be responsible for executing these initiatives. This
  involves close collaboration with backend and analytics
  teams, product partners, and other data and ML engineers.
  Furthermore, you will have the chance to work directly with
  ML engineers on developing integrated NRT data and machine
  learning solutions. Ultimately, your contributions will lead
  to a better comprehension of Airbnb users and enhance their
  overall end-to-end product experience.
  
  A Typical Day:
  
  - Architect and productionize batch and real-time data systems
    to power products for Airbnb Guests and Hosts, or our
    business/sales teams.
  - Ensure the quality, performance, and stability of data
    systems with thoughtful quality systems and monitoring
  - Tune, productionize, and optimize data systems powering
    Airbnb products
  - Collaborate with product teams to extract data requirements
    from product specs to develop scalable and flexible
    systems
  - Collaborate and build relationships with partner engineering
    including backend/client, data science, analytics, and ML
  
  Your Expertise:
  
  - 9+ years of relevant industry experience with a Bachelor’s
    and/or Master’s degree in CS/EE, or equivalent experience,
    or 6+ years of experience with a PhD
  - Experience collaborating with client, backend, ml, analytics
    teams, product and business partners
  - Experience designing and deploying high performance Batch &
    NRT systems with reliable monitoring and logging
    practices.
  - Effectively work across team boundaries to establish
    overarching data architecture, data flow, and provide
    guidance to individual teams.
  - Strong knowledge of relational databases and query authoring
    (SQL) and streaming solutions.
  - Strong expertise with Python / Scala / Spark and operating
    on data at the petabyte scale.
  - Excellent communication skills, both written and verbal.
  
  Your Location:
  
  This position is US - Remote Eligible. The role may include
  occasional work at an Airbnb office or attendance at
  offsites, as agreed to with your manager. While the position
  is Remote Eligible, you must live in a state where Airbnb,
  Inc. has a registered entity. Click here for the up-to-date
  list of excluded states. This list is continuously evolving,
  so please check back with us if the state you live in is on
  the exclusion list. If your position is employed by another
  Airbnb entity, your recruiter will inform you what states
  you are eligible to work from.
  
  Our Commitment To Inclusion & Belonging:
  
  Airbnb is committed to working with the broadest talent pool
  possible. We believe diverse ideas foster innovation and
  engagement, and allow us to attract creatively-led people,
  and to develop the best products, services and solutions.
  All qualified individuals are encouraged to apply.
  
  We strive to also provide a disability inclusive application
  and interview process. If you are a candidate with a
  disability and require reasonable accommodation in order to
  submit an application, please contact us at:
  reasonableaccommodations@airbnb.com. Please include your
  full name, the role you’re applying for and the
  accommodation necessary to assist you with the recruiting
  process.
  
  We ask that you only reach out to us if you are a candidate
  whose disability prevents you from being able to complete
  our online application.
  
  How We'll Take Care of You:
  
  Our job titles may span more than one career level. The
  actual base pay is dependent upon many factors, such as:
  training, transferable skills, work experience, business
  needs and market demands. The base pay range is subject to
  change and may be modified in the future. This role may also
  be eligible for bonus, equity, benefits, and Employee Travel
  Credits.
  
  Pay Range
  
  $204,000—$255,000 USD
