description: |
  What you can expect working with us:
  
  
  
  You will rewrite a massive industry with 10000s of
  businesses
  
  You will be introducing technology to the moving industry,
  an industry previously untouched by software. By working
  with our customer base, you will provide them more time,
  revenue, and speed – radically uplifting the entire moving
  experience for everyone in the world. We accompany our
  customers every step of the way from the moment they partner
  with us to the end of their journey. We bring passion to
  what we do every day because what we do matters to real
  people.
  
  
  
  You will likely determine the fate of our company.
  
  You will likely determine the fate of our company. As AI
  Solutions Engineer you will scale our product to our most
  important customers. You have big upside if we execute well,
  and we can't do this without you.
  
  
  
  You will work with a smart and action-oriented team.
  
  At Supermove, we are trying to do what's nearly impossible –
  to create an enduring and iconic company. We are relentless
  and ambitious with all of our goals. We move extremely
  quickly, and prefer to iterate rather than deliberate. We
  always operate with full trust and transparency, knowing
  that our top priority is to achieve our vision to the best
  of our ability.
  
  
  
  We are seeking an AI Solutions Engineer to anchor execution
  on our largest and most strategic enterprise accounts.
  
  
  
  This role sits at the intersection of business solutioning
  and hands-on technical implementation. It is not a
  traditional Solutions Architect or a scoped Pro-Serve
  Engineer. It is a senior technical execution role
  responsible for translating defined business solutions into
  clean, scalable, enterprise-grade technical implementations.
  
  
  
  You will partner closely with our Key Account Director
  (KAD), who owns business context and solution intent. You
  will own the technical execution plan and delivery of that
  solution end-to-end.
  
  
  
  This is a highly visible, high-accountability role
  supporting mission-critical enterprise customers.
  
  What You'll Do
  
  - Translate defined business solutions into structured,
    sequenced technical execution plans.
  - Own end-to-end technical delivery on enterprise accounts
    (configure, deploy, test, iterate).
  - Design and implement complex builds across Core and AI
    products.
  - Anticipate technical risks, system constraints, and
    downstream impacts before they become issues.
  - Manage and commit to technical delivery timelines
    autonomously.
  - Work directly with enterprise client technical stakeholders
    to drive execution forward.
  - Validate feasibility of proposed solutions and identify
    platform gaps early.
  - Partner with Product & Engineering to clearly articulate
    technical requirements for enterprise needs.
  - Establish repeatable technical execution standards for
    enterprise-grade implementations.
  - Mentor and elevate technical maturity across the
    implementation team.
  - Operate autonomously in high-pressure, high-visibility
    environments.
  - Own the technical architecture of enterprise deployments
    from initial design through production rollout.
  - This role is hands-on. You will personally configure,
    implement, integrate, and test enterprise deployments, not
    delegate them.
  
  What You Bring
  
  - 2+ years of experience in technical implementation, systems
    delivery, or software engineering within SaaS
    environments.
  - Demonstrated ownership of complex, multi-stream enterprise
    implementations.
  - Proven ability to translate loosely defined business
    requirements into structured technical execution plans.
  - Strong systems thinking and ability to anticipate second-
    and third-order technical impacts.
  - Experience working directly with enterprise technical
    stakeholders.
  - Comfort operating across integrations, dependencies, and
    platform constraints.
  - High autonomy, ability to self-manage timelines and deliver
    without ongoing oversight.
  - Strong judgment under pressure and ability to make tradeoff
    decisions quickly.
  - Clear, structured communicator who can explain technical
    decisions to both technical and non-technical audiences.
  - Growth mindset and willingness to take full accountability
    for outcomes.
  - Bias toward action and ability to operate in ambiguous,
    fast-moving environments.
  
  Benefits:
  
  Market comp, medical, vision, dental.
  
  Remote work environment.
