description: |
  Zimperium® is an industry leader in enterprise mobile
  security, being the first and only company to provide a
  complete mobile tcahreat defense system that offers real-
  time, on device world-class protection against both known
  and unknown next generation of advanced mobile cyberattacks
  and malware.
  
  
  
  Our MTD and award-winning machine learning-based engine
  protects against device, network, phishing and application
  attacks for IOS, Android and Windows devices, using a non-
  intrusive approach to always protect privacy of users.
  
  
  
  To reinforce our team of experts, we are seeking a highly
  skilled Software Engineer with strong Java and Python
  expertise and deep understanding of cloud infrastructure and
  distributed systems. This role focuses on building scalable
  infrastructure platforms, automation frameworks, and cloud-
  native services that support large-scale production
  environments.
  
  
  
  The ideal candidate combines strong coding ability with
  infrastructure knowledge, enabling them to design reliable
  systems, automate operational processes, and build internal
  tools that improve platform reliability and efficiency.
  
  
  
  Location: India (Remote)
  
  
  
  Responsibilities:
  
  
  
  Software Development
  
  - Design, develop, and maintain backend services using Java
    and Python
  - Build scalable microservices and APIs supporting cloud
    infrastructure platforms
  - Develop automation tools for infrastructure provisioning,
    monitoring, and operational workflows
  - Write clean, maintainable, and testable code following
    modern engineering practices
  - Cloud Infrastructure Engineering
  - Work with cloud platforms (AWS, GCP, OCI, or Azure) to
    design and operate scalable systems
  - Develop automation for infrastructure provisioning,
    configuration, and deployment
  - Implement Infrastructure-as-Code using tools such as
    Terraform, Helm, or CloudFormation
  - Build systems that support high availability, resiliency,
    and performance at scale
  
   Platform & Reliability Engineering
  
  - Build internal tools for monitoring, alerting, and
    operational observability
  - Improve system reliability through automation and self-
    healing mechanisms
  - Work closely with SRE and platform teams to reduce
    operational overhead
  - Implement best practices around security, scalability, and
    performance
  
   Collaboration
  
  - Collaborate with DevOps, SRE, Security, and Product
    Engineering teams
  - Participate in design reviews and architecture discussions
  - Contribute to continuous improvement of engineering
    processes and tooling
  
  
  
  Requirements:
  
  - Strong programming skills in Java and Python
  - Experience building production-grade backend services
  - Deep understanding of cloud infrastructure (AWS, GCP, Azure,
    or OCI)
  - Experience with containerized environments (Docker,
    Kubernetes)
  
  Infrastructure & DevOps
  
  - Experience with Infrastructure-as-Code tools (Terraform,
    Helm, CloudFormation)
  - Strong knowledge of Linux systems and networking
    fundamentals
  - Experience with CI/CD pipelines and automated deployment
    systems
  - Understanding of monitoring and observability platforms
  
  Software Engineering:
  
  - Experience designing scalable distributed systems
  - Strong understanding of API design and microservices
    architecture
  - Familiarity with Git-based workflows and modern development
    practices
  - Experience with unit testing, integration testing, and code
    reviews
  
  
  
  Preferred Qualifications:
  
  - Experience working in large-scale SaaS environments
  - Knowledge of streaming platforms (Kafka / Kinesis)
  - Experience with data stores such as PostgreSQL,
    Elasticsearch, Redis
  - Experience building automation tools for SRE or platform
    engineering
  - Familiarity with security and compliance requirements in
    cloud environments
  
  
  
  
  
