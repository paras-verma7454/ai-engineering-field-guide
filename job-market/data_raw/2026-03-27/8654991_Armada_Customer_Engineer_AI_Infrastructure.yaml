  genetic information, pregnancy, or any other characteristic
  protected by law. This policy applies to all employment
  decisions, including hiring, promotions, and compensation.
  Our hiring is guided by qualifications, merit, and the
  business needs at the time.
  
  Unsolicited Resumes and Candidates
  
