description: |
  Lead IT Engineer - IE07ME
  
  We’re determined to make a difference and are proud to be an
  insurance company that goes well beyond coverages and
  policies. Working here means having every opportunity to
  achieve your goals – and to help others accomplish theirs,
  too. Join our team as we help shape the future.
  
  
  
  Lead Productivity AI & Agentic Platforms Engineer
  
  Core Responsibilities
  
  - Solution Ownership:Deliver complex subsystems and
    integrations for Gemini Enterprise, Copilot and related
    Microsoft 365 services, owning solutions end‑to‑end from
    design through production.
  - Architecture & Design:Define solution architecture for
    Copilot and agentic deployments, including governance,
    security, scalability, resiliency, and lifecycle
    management.
  - Integration:Integrate and connect Gemini Enterprise and
    Microsoft 365 Copilot with enterprise systems and M365
    workloads, ensuring seamless interoperability across
    platforms.
  - Performance and Optimization:Identify and implement
    opportunities for automation, refactoring, performance
    tuning, and maintainability improvements across agentic
    solutions.
  - DevOps Practices:Implement CI/CD pipelines for agent
    platforms such as Gemini Enterprise and M365
    Copilot‑related services, aligned with enterprise DevOps
    and security standards.
  - Leadership & Mentorship:Guide junior engineers, lead
    technical and architectural discussions, and influence
    platform‑level engineering and design decisions.
  - Governance & Compliance:Ensure adherence to AI governance
    policies, licensing requirements, and enterprise data
    protection standards.
  - Innovation:Drive adoption of Copilot, Copilot components,
    Gemini Enterprise, and AI‑driven insights to enhance
    productivity and decision‑making across business units.
  
  Required Skills
  
  - Deep knowledge of the Microsoft 365 ecosystem, including
    Teams, SharePoint, Outlook/Email, and Viva Insights.
  - Expertise in Gemini Enterprise, Copilot for Microsoft 365,
    Copilot Studio, and AI‑driven automation.
  - Strong understanding of licensing models and enterprise
    deployment strategies.
  - Experience with scripting, automation, and integration,
    including Power Platform, PowerShell, and Python.
  - Familiarity with data governance, security, and compliance
    best practices in enterprise environments.
  
  Preferred Qualifications
  
  - Advanced technical expertise in Gemini Enterprise, the
    Microsoft 365 ecosystem, and AI agentic creation and
    management capabilities.
  - Ability to anticipate business needs and develop
    forward‑looking technical and AI strategy.
  - Strong problem‑solving and architectural decision‑making
    skills.
  - Demonstrated leadership in complex agentic implementations
    and multi‑team coordination.
  - Experience with Copilot, Copilot Studio, and contextual AI
    responses.
  - Knowledge of analytics and reporting tools, including Power
    BI and Viva Insights dashboards.
  - Proven track record leading enterprise‑scale AI and
    productivity platform implementations. Work Arrangement
  
  This role will have a Hybrid work schedule, with the
  expectation of working in an office (Columbus, OH, Chicago,
  IL, Hartford, CT or Charlotte, NC) 3 days a week (Tuesday
  through Thursday).
  
  Candidates must be authorized to work in the US without
  company sponsorship. The company will not support the STEM
  OPT I-983 Training Plan endorsement for this position.
  
  Compensation
  
  The listed annualized base pay range is primarily based on
  analysis of similar positions in the external market. Actual
  base pay could vary and may be above or below the listed
  range based on factors including but not limited to
  performance, proficiency and demonstration of competencies
  required for the role. The base pay is just one component of
  The Hartford’s total compensation package for employees.
  Other rewards may include short-term or annual bonuses,
  long-term incentives, and on-the-spot recognition. The
  annualized base pay range for this role is:
  
  $128,800 - $193,200
  
