description: |
  Meet the Moment with Alteryx
  
  We're living through a once-in-a-generation shift in how
  work gets done. Data, automation, and AI are quickly
  becoming the center of every business decision - and Alteryx
  is leading the transformation.
  
  You'll be working on the challenges that sit at the heart of
  modern business. No matter your role, the work you do will
  help organizations move faster, see more clearly, and tackle
  questions that used to feel impossible.
  
  If you're ready to meet the moment with innovation,
  curiosity, and excellence, there's a place for you here.
  
  Alteryx is searching for a Software Engineer (Mid-Level).
  This position is remote-friendly.
  
  Position Overview:
  
  Alteryx is seeking a Mid-Level Cloud Software Engineer to
  join the Onyx UI team. In this role, you will design, build,
  and maintain a scalable, high-performance TypeScript
  application that runs across both cloud and desktop
  environments.
  
  You’ll contribute to a mission-critical UI platform and help
  integrate emerging AI-driven capabilities into user
  workflows. This is an opportunity to work at the
  intersection of modern frontend engineering, design systems,
  and applied AI in a fast-paced, product-driven environment.
  
  Primary Responsibilities:
  
  - Develop and enhance application features using TypeScript
    and React
  - Build intuitive, performant, and accessible user interfaces
    using design systems and reusable component libraries
  - Contribute to and extend shared UI components to ensure
    consistency and scalability across the platform
  - Implement and manage client-side state using modern patterns
    (no specific framework required)
  - Collaborate on integrating AI-powered features into the
    product experience (e.g., copilots, recommendations,
    intelligent automation)
  - Write clean, maintainable, and well-tested code (unit,
    integration, and E2E)
  - Participate in an agile development process, including
    sprint planning and retrospectives
  - Work closely with Product, UX, and AI partners to define and
    deliver solutions
  - Contribute to code reviews, technical discussions, and
    engineering best practices
  - Support and troubleshoot applications across cloud and
    desktop environments
  - Create and maintain technical documentation and share
    knowledge across the team
  
  Required Qualifications:
  
  - 2–5 years of experience in cloud software engineering or
    frontend/full-stack development
  - Strong proficiency in TypeScript and React (or similar
    frameworks)
  - Experience working with design systems, component libraries,
    or shared UI frameworks
  - Experience with modern state management approaches
    (framework-agnostic)
  - Familiarity with Git and modern version control workflows
  - Solid understanding of software testing practices (unit,
    integration, E2E)
  - Experience working in collaborative, cross-functional teams
  - Working knowledge of CI/CD pipelines and cloud platforms
  - Exposure to AI concepts or tools, such as:
    - Working with LLM APIs (e.g., OpenAI, Azure OpenAI, etc.)
    - Building AI-assisted features (chat, summarization,
      recommendations, etc.)
    - Prompt design, evaluation, or basic model integration
  
  Valued Skills:
  
  - Familiarity with Material UI (MUI) or similar component
    libraries
  - Experience contributing to or maintaining a design system at
    scale
  - Hands-on experience building AI-powered product features
  - Experience with Docker and Kubernetes
  
  Compensation:
  
  Alteryx is committed to fair, equitable, and transparent
  compensation. Final compensation is determined by several
  factors, including but not limited to relevant work
  experience, education, certifications, skills, and
  geographic location.
  
  The salary range for this role in the United States is
  $103,300 - $133,850.
  
  Bonus payouts are based on individual and company
  performance.
  
  In addition to base pay and bonus eligibility, this role
  includes clear forms of additional compensation, such as:
  
  - A monthly Connectivity Plus stipend of $150 to support
    remote work-related expenses
  - An annual $200 home office reimbursement
  
  Alteryx offers a comprehensive benefits package designed to
  support your health, financial security, and overall well-
  being, including:
  
  - Medical, dental, and vision coverage
  - 401(k) with company match
  - Paid parental leave, caregiver leave, and flexible time off
  - Mental health support and wellness reimbursement
  - Career development and education assistance
  
  Interested? Learn more and apply today at
  alteryx.com/careers!
  
  #LI-EM1
  
  #LI-REMOTE
  
  Find yourself checking a lot of these boxes but doubting
  whether you should apply? At Alteryx, we support a growth
  mindset for our associates through all stages of their
  careers. If you meet some of the requirements and you share
  our values, we encourage you to apply. As part of our
  ongoing commitment to a diverse, equitable, and inclusive
  workplace, we’re invested in building teams with a wide
  variety of backgrounds, identities, and experiences.
  
  Benefits & Perks:
  
  Alteryx has amazing benefits for all Associates which can be
  viewed here.
  
