  Location: Remote (U.S. or Canada)
  
  Type: US Applicants – Full-Time; Canadian Applicants –
  Independent Contractor
  
  About Human Agency
  
  We're scaling rapidly and have a growing pipeline of
  opportunities that demand exceptional talent across
  disciplines. Our mission is to bring on individuals, from
  creative producers to technical experts to entrepreneurial
  leaders, who can help us realize this next chapter of
  growth.
  
  We are a company of doers. Leaders roll up their sleeves,
  teams work flat, and everyone contributes to what ships.
  Titles don't insulate us from feedback or basics. We invite
  critique, learn quickly, and keep raising the bar. The best
  ideas win here, no matter where they come from, because
  clients trust us to deliver the strongest outcomes every
  time.
  
  Our clients' missions, products, and bottom lines are
  sacred. We immerse ourselves in their world, becoming
  stewards of their goals and partners in solving big
  problems. Every product, strategy, or asset we create must
  be both beautiful and functional; practical, usable, and
  designed for real-world impact.
  
  Humans are our most valuable resource, and we only grow by
  hiring people who push us forward. Across strategy,
  engineering, design, data, and operations, we seek out
  teammates who raise the bar and make us better. Always hire
  up, never down.
  
  We partner with organizations of all sizes to explore,
  design, and implement AI strategies that are secure,
  scalable, and human-centered. We believe AI should amplify
  human potential, not replace it, and we build with that
  conviction in every engagement. From advisory and tooling to
  implementation and education, we meet clients where they are
  and help them integrate AI in ways that align with their
  mission and values. Our goal is to empower teams to work
  smarter, move faster, and unlock new possibilities through
  thoughtful, responsible innovation.
  
  And through it all, we lead with purpose, love, and
  adventure. We do meaningful work with people we care about,
  and we make the ride an adventure worth taking. Because at
  Human Agency, who we are and how we work are one and the
  same.
  
  The Opportunity
  
  You're not here to build traditional software. You're here
  to build AI-native products and systems that fundamentally
  change how work gets done — for our clients, our ventures,
  and our own operations. This is the engineering role for
  someone who sees the current AI moment not as hype but as
  infrastructure, and who has the skills and instinct to build
  on top of it before the rest of the world catches up.
  
  We need someone who can architect agent-driven workflows
  that replace entire categories of manual work, ship
  production systems that integrate LLMs and orchestration
  frameworks at scale, and move with the speed required when
  the state of the art shifts every few weeks. You'll work
  directly with venture leads, client teams, and internal
  operators to turn ambitious ideas into deployed reality.
  
  This role exists because we're building faster than we can
  hire, and the projects in our pipeline demand an engineer
  who doesn't need their hand held. You'll have autonomy,
  access, and the expectation that you'll use both to ship
  work that compounds in value over time.
  
  What You'll Own
  
  - Ship AI-powered products and tools from zero to production.
    You'll design, build, and deploy systems for both internal
    operations and client-facing venture products — agent
    workflows, automation platforms, LLM-integrated
    applications, and tooling that didn't exist six months
    ago.
  - Architect systems that scale beyond demos. You're building
    real infrastructure, not prototypes. That means thinking
    through orchestration, error handling, observability,
    cost, and how things actually run in production when users
    depend on them.
  - Work across the full stack. Frontend, backend,
    infrastructure, LLM integration, agent frameworks — you
    move fluidly between layers and own the entire system, not
    just one piece of it.
  - Collaborate directly with venture and client teams. You'll
    work alongside founders, strategists, and operators to
    understand what needs to be built and why, then make
    technical decisions that serve the mission without waiting
    for permission.
  - Stay current and opinionated about the AI tooling landscape.
    The best tools from two months ago are already outdated.
    You know what's shipping, what's worth using, and what's
    just noise, and you bring that perspective into every
    build.
  - Push the boundary on what's possible with AI. You're not
    satisfied with prompt wrappers or surface-level
    integrations. You're here to explore what happens when you
    treat agents, models, and orchestration as foundational
    infrastructure, and you build accordingly.
  
  Who You AreExperience & Skills
  
  - Strong software engineering foundation with experience
    building and shipping production systems — you understand
    how to write maintainable code, architect scalable
    services, and deploy software that people actually use.
  - Deep, hands-on experience building with LLMs, agent
    frameworks, and AI tooling — you've worked with OpenAI,
    Anthropic, or similar APIs, and you've integrated them
    into real products, not just demos or side projects.
  - Full-stack capability — you're comfortable working across
    frontend, backend, databases, APIs, and infrastructure,
    and you know when to go deep versus when to move fast.
  - Proven track record of AI projects you've built and shipped
    — we want to see your work. GitHub repos, deployed
    products, live demos, or detailed writeups of systems
    you've architected. Proof of work is non-negotiable.
  - Product sense and judgment — you don't just execute on
    specs. You understand why something matters, what should
    be built, and what can wait. You ask the right questions
    and make smart tradeoffs under ambiguity.
  - Familiarity with modern AI tooling and orchestration
    frameworks — whether it's LangChain, LlamaIndex, agent
    libraries, vector databases, or the next thing that just
    launched, you know the landscape and have opinions about
    what works.
  
  Mindset & Traits
  
  - You're AI-pilled in the best way — you see the current
    moment as foundational, not hype, and you're building
    accordingly. You're not waiting for permission to explore
    what's possible.
  - You ship fast and iterate in public. You'd rather deploy
    something good today and improve it tomorrow than wait
    three weeks for perfect. You have strong instincts about
    when to move quickly and when to slow down.
  - You think in systems, not features. You're interested in
    building things that compound in value over time — tools
    that get more useful, workflows that unlock other
    workflows, infrastructure that enables future work.
  - You're comfortable with ambiguity and autonomy. You don't
    need a roadmap handed to you. You can take a problem,
    figure out what needs to be built, and make it happen with
    minimal oversight.
  - You care about craft but not at the expense of impact. You
    write clean code and build thoughtful systems, but you're
    not precious about it. Shipping something useful beats
    building something perfect.
  - You're curious, opinionated, and willing to be wrong. You
    have strong views on what's worth building and how to
    build it, but you update those views when you learn
    something new. You invite feedback and get better because
    of it.
  
  Compensation & Logistics
  
  - This is a remote, full-time position open to candidates
    based in the US or Canada.
  
  - Compensation is competitive and commensurate with
    experience, including base salary, performance-based
    bonuses.
  
  - Some travel required for client engagements, team offsites,
    and collaborative working sessions.
  
  Equal Opportunity Commitment
  
  Human Agency is an Equal Opportunity Employer. We value
  diverse perspectives and are committed to building
  inclusive, high-performing teams where everyone can do their
  best work.
