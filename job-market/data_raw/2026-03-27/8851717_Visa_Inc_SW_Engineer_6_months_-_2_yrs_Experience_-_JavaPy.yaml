description: |
  Company Description
  
  Visa is a world leader in payments technology, facilitating
  transactions between consumers, merchants, financial
  institutions and government entities across more than 200
  countries and territories, dedicated to uplifting everyone,
  everywhere by being the best way to pay and be paid.
  
  At Visa, you'll have the opportunity to create impact at
  scale — tackling meaningful challenges, growing your skills
  and seeing your contributions impact lives around the world.
  Join Visa and do work that matters — to you, to your
  community, and to the world.
  
  Progress starts with you.
  
  Job Description
  
  Visa’s Technology Organization is a collaborative community
  of problem solvers and innovators dedicated to reshaping the
  future of commerce. We operate the world’s most
  sophisticated processing networks as the leader in digital
  payments, supporting up to 65,000 secure transactions per
  second across a global network of over 100 million merchant
  locations and nearly 15,000 financial institutions,
  empowering billions of cardholders worldwide.
  
  The Opportunity:
  
  We are looking for dedicated, curious, and energetic
  Software Engineers who embrace solving complex challenges on
  a global scale. As a Associate Software Engineer at Product
  Reliability Engineering team, you will be an integral part
  of a multi-functional full stack engineering team inventing,
  designing, building, and testing agentic solutions and
  software products that will operate at global scale to
  predict and prevent real time reliability challenges in a
  rapidly evolving technology environment at Visa’s scale. You
  will get to see how your efforts shaping the digital future
  of fintech transactions and ensuring a reliability of
  99.9999% and beyond.
  
  The Work itself:
  
  - Build Agentic Solutions using world’s most advanced LLM
    models from Anthropic, OpenAI and others
  - Build Deep Learning solutions using AI/ML Platforms for real
    time transactions at a scale of 100K+ TPS and for peta
    bytes of Data.
  - Design code and systems that touch 40% of the world
    population while influencing Visa’s internal standards for
    scalability, security, and reusability
  - Collaborate multi-functionally to create design artifacts
    and develop best-in-class software solutions for Visa’s
    commercial products and services.
  - Actively contributes to product reliability improvements,
    valuable service technology, and new operations flows in
    diverse agile squads
  - Opportunities to make a difference on a global or local
    scale through mentorship and continued learning and
    experiments.
  
  Essential Functions:
  
  - Demonstrates in-depth technical proficiency to accurately
    interpret and address project requirements.
  - Identifies and contributes to the development and solution
    strategies to team members that improve the design and
    functionality of interface features across one or more
    project features, under minimal guidance.
  - Collaborates with others to support the piloting of new
    technology capabilities and features that enhance the
    customer experience across commercial products.
  - Supports ongoing innovation by developing scalable,
    maintainable, and efficient systems aligned with
    organizational objectives and global technology standards.
  
  This is a hybrid position. Expectation of days in office
  will be confirmed by your hiring manager.
  
  Qualifications
  
  Basic Qualifications: Bachelor’s Degree in Computer Science,
  or related technology/engineering discipline.
  
  Preferred Qualifications: 1-2 years of work experience with
  a Bachelor’s degree or Advanced Degree (e.g. Masters, MBA,
  JD, MD) in Computer Science, or related
  technology/engineering discipline. Exposure in developing
  agentic solutions using Cline, Claude, GitHub Copilot, Power
  Automate etc. Experience in Software Development with Agile
  and full SDLC using programming languages such as (e.g.,
  Java, GO, Python, Scala, Java scripts, .Net) etc.
  Development experience in building and using Microservices
  with HTTP, REST, JSON. Experience with a Relational database
  and/or NoSQL database. Proficient in GIT/Stash, Maven and
  Jenkins. Exposure in streaming platform like Kafka. Exposure
  with tools development, automation (CI/CD, Auto Deployment,
  System Availability, etc.), logging and monitoring.
  Knowledge of large scale data analytics and statistical
  modelling. Strong analytical, problem solving and
  communication skills.
  
  The Skills You Bring: Energy and Experience: A growth
  mindset that is curious and passionate about technologies
  and enjoys challenging projects on a global scale Challenge
  the Status Quo: Comfort in pushing the boundaries, ‘hacking’
  beyond traditional solutions Language Expertise: Expertise
  in anyone programing language (e.g., Java, C#, C++, GO,
  Python, Scala, Java scripts, .Net) Builder: Experience
  building and deploying modern services and web applications
  with quality and scalability Learner: Constant drive to
  learn new technologies such as coding with GenAI, new
  backend, front-end, test and devops technologies.
  Partnership: Experience collaborating with Product, Test,
  Dev-ops, and Agile/Scrum teams
  
  Additional Information
  
  Visa is an EEO Employer. Qualified applicants will receive
  consideration for employment without regard to race, color,
  religion, sex, national origin, sexual orientation, gender
  identity, disability or protected veteran status. Visa will
  also consider for employment qualified applicants with
  criminal histories in a manner consistent with EEOC
  guidelines and applicable local law.
