description: |
  Hinge is the dating app designed to be deleted
  
  In today's digital world, finding genuine relationships is
  tougher than ever. At Hinge, we’re on a mission to inspire
  intimate connection to create a less lonely world. We’re
  obsessed with understanding our users’ behaviors to help
  them find love, and our success is defined by one simple
  metric– setting up great dates. With millions of users
  across the globe, we’ve become the most trusted way to find
  a relationship, for all.
  
  About the Role
  
  Join Hinge as a Staff AI Engineer, where you’ll lay the
  cornerstone of our agent-powered future by focusing on
  Operational AI Systems. You will architect the foundational
  workflows, guardrails, and tooling that turn AI agents into
  everyday teammates for our internal support and operations
  teams. Think of it as building the AI Agent Operating System
  for critical internal operations: establishing the
  orchestration layer, standardizing tool schemas, automating
  the agent lifecycle, instrumenting real-time monitoring, and
  ensuring every solution is robust, scalable, efficient, and
  responsible.
  
  You’ll collaborate closely with operational specialists and
  engineers, meet non-technical stakeholders where they are,
  and deliver value in tight, incremental loops tied directly
  to solving their biggest problems. Because we’re still early
  in our agent journey, you’ll enjoy a broad scope with an
  expectation of mentoring peers, shaping best practices, and
  defining the north star for AI-native operations at Hinge.
  
  If you’re energized by building green-field systems that
  leverage AI to solve challenging problems, this is your
  invitation to help write the next chapter of how Hinge
  deploys AI to create a safer and more meaningful user
  experience on their journey to find an intimate connection.
  
  Responsibilities
  
  - Own the technical roadmap for AI automation across high-
    volume operational workflows, driving discovery and
    prioritization of high-impact AI automation opportunities
    while providing hands-on technical leadership from concept
    to production.
  - Prototype agentic solutions using the latest platforms and
    frameworks and integrate them with existing internal and
    third-party tools and systems.
  - Deliver reliable, scalable, and robust automations with the
    appropriate evaluations, guardrails, human oversight, and
    clear performance monitoring.
  - Drive adoption by producing documentation, running hands-on
    training and enablement sessions for non-technical
    operators, and curating prompt libraries and playbooks
    that empower self-service iteration.
  - Collaborate closely with Data Scientists, Data Engineers,
    Product Managers, Backend Engineers, and the AI Platform
    Team to ensure a comprehensive and coordinated approach to
    improving operational efficiency.
  - Embed safety, privacy, auditability, and responsible-AI
    standards into every workflow in partnership with Legal
    and Security teams.
  - Mentor and educate ML Engineers and Platform Engineers on
    new trends and research in AI/ML that can be applied to
    initiatives to improve user outcomes, promote safety, and
    improve AI-powered products and workflows.
  
  What We're Looking For
  
  - Production-grade agent orchestration and state management:
    Proven ability to design, build, and operate highly
    reliable multi-step LLM agents, emphasizing state machine
    design, reliable tool calling, and recovery from failure
    states within coordination frameworks.
  - Applied AI engineering & prompt craft: Deep Python skills
    plus hands-on experience integrating foundation models and
    crafting robust prompts and utilizing vector databases.
  - Rapid prototyping & experimentation: Proven ability to ship
    and iterate quickly. Skilled at leveraging fast proofs of
    concept and early data to drive continuous tuning and
    feature improvement with high velocity.
  - Backend, data-systems & tool integration: Skilled at wiring
    external services and internal data into agent workflows
    through well-designed APIs and schemas.
  - Human-in-the-loop system design: Able to blend automation
    with human oversight through clear escalation paths,
    review checkpoints, and moderator tooling.
  - Operator enablement & training: Talent for translating
    technical workflows into clear, actionable training for
    non-technical teams and supporting their day-to-day
    adoption.
  - Working through ambiguity: Proven skill thriving in high-
    ambiguity, fast-moving environments—prioritizing
    effectively, adapting plans quickly, and delivering impact
    amid shifting requirements.
  - 7+ years of software or machine-learning engineering
    experience, with a recent focus on AI-driven automation or
    agentic systems.
  - 2+ years delivering solutions that combine automated
    decision support with human-in-the-loop review.
  - 2+ years designing and tracking operational metrics that
    demonstrate ROI, accuracy, and user-experience
    improvements for automated workflows.
  - 1+ years of hands-on experience designing and operating
    stateful, multi-step agentic workflows (e.g., LangGraph,
    AutoGen, or similar internal frameworks) in production,
    moving beyond simple single-turn chatbot or RAG demos.
  - A degree in computer science, engineering, or a related
    field (or equivalent practical experience).
  
  As a member of our team, you’ll enjoy:
  
  401(k) Matching: We match 100% of the first 10% of pre-tax
  401(k) contributions you make, up to a maximum of $10,000
  per year.
  
  Professional Growth: Get an annual Learning & Development
  stipend once you’ve been with us for three months. You also
  get free access to Udemy, an online learning and teaching
  marketplace with over 6000 courses, starting your first day.
  
  Parental Leave & Planning: When you become a new parent,
  you’re eligible for 100% paid parental leave (20 paid weeks
  for both birth and non-birth parents.)
  
  Fertility Support: You’ll get easy access to fertility care
  through Carrot, from basic treatments to fertility
  preservation. We also provide a stipend towards fertility
  preservation. You and your spouse/domestic partner are both
  eligible.
  
  Date Stipend: All Hinge employees receive a $100 monthly
  stipend for epic dates– Romantic or otherwise. Hinge Premium
  is also free for employees and their loved ones.
  
  ERGs: We have eight Employee Resource Groups (ERGs)—Asian,
  Unapologetic, Disability, LGBTQIA+, Raices, Women/Nonbinary,
  Parents —that hold regular meetings, host events, and
  provide dedicated support to the organization & its
  community.
  
  At Hinge, our core values are…
  
  Authenticity: We share, never hide, our words, actions and
  intentions.
  
  Courage: We embrace lofty goals and tough challenges.
  
  Empathy: We deeply consider the perspective of others.
  
  Diversity inspires innovation
  
  Hinge is an equal-opportunity employer. We value diversity
  at our company and do not discriminate on the basis of race,
  religion, color, national origin, gender, sexual
  orientation, age, marital status, veteran status, or
  disability status. We believe success is created by a
  diverse workforce of individuals with different ideas,
  strengths, interests, and cultural backgrounds.
  
  If you require reasonable accommodation to complete a job
  application, pre-employment testing, or a job interview or
  to otherwise participate in the hiring process, please let
  your Talent Acquisition partner know.
  
