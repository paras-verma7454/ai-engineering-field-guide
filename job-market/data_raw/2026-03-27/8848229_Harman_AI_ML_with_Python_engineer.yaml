  About the Role:
  
  We're looking for an AI/ML engineer to join our team,
  focusing on vehicle bringup, data analytics, and cloud
  infrastructure.
  
  What You Will Do:
  
  - Develop and deploy AI/ML models for vehicle bringup and
    analytics using Python
  
  - Work with Kubernetes (K8s) for container orchestration on
    AWS/Azure cloud
  
  - Leverage pyspark for big data processing and SQL for data
    querying
  
  - Build and maintain data pipelines and visualization using
    Grafana
  
  - Collaborate with teams to integrate AI/ML solutions into
    products
  
  Bonus Points if You Have:
  
  - Experience with vehicle bringup or automotive industry
  
  - Knowledge of cloud services like AWS SageMaker or Azure ML
  
  - Familiarity with deep learning frameworks like TensorFlow or
    PyTorch
  
  - Experience with CI/CD pipelines and DevOps practices
  
  What Makes You Eligible:
  
  - 3-6 years of experience in AI/ML development with Python
  
  - Strong understanding of K8s, AWS/Azure cloud, and pyspark
  
  - Proficiency in SQL and data visualization with Grafana
  
  - Good communication and teamwork skills
  
