description: |
  KLDiscovery offers a fantastic opportunity for you to use
  your talents to make a meaningful impact in a fast-paced,
  growing technology and services organization!  KLDiscovery
  is a global leader in eDiscovery, compliance, and data
  management solutions, empowering law firms, corporations,
  and government agencies to tackle their most complex legal
  and regulatory challenges.
  
  We are actively seeking a candidate with strong expertise in
  Python software engineering, who demonstrates either prior
  experience or a keen interest in transitioning to the
  dynamic field of AI/Machine Learning.
  
  
  
  Work Status: Remote, work from home opportunity.
  
  
  
  Is This Role For You?
  
  The primary responsibilities of this position revolve around
  constructing AI development and production infrastructure,
  as well as implementing them effectively. Your specific
  tasks will include aiding in the construction of analytical
  tools, curating datasets, conducting experiments, precisely
  estimating impact, productizing solutions, and monitoring
  the performance of machine learning models.
  
  
  
  A Day in The Life
  
  - Develop high-quality code for seamless integration of Data
    Science tools and processes into the company's products
    and services.
  - Offer expert analysis and valuable insights to the product
    development team, contributing to the enhancement of our
    product offering.
  - Foster close collaboration with engineering teams to
    optimize the implementation and monitoring of solutions.
  - Conduct research, provide recommendations, and implement
    best practices in data science and data engineering.
  
  
  
  Driving Career Growth, Benefit Excellence: The KLD Advantage
  
  At KLD we invest in employees and their families by placing
  their wellbeing first. We offer competitive total
  compensation that includes base pay, bonus potential,
  inclusive benefits, wellness programs, and perks. We use
  market and industry data to inform pay decisions while
  considering geography and labor markets, individual
  experience, and business needs. Individual compensation will
  vary, although a reasonable estimate of the current
  annualized base pay range for this position is £50,000 to
  £65,000.
  
  - This position is 100% remote, and we offer a high-
    performance laptop computer, options for wireless headset
    or external speaker, up to two 24" 2K monitors, and a
    mobile phone for business use.
  - Life assurance
  - Private Medical Health Cover (currently with BUPA)
  - Group Income Protection
  - 25 days annual leave
  - Contributory pension after completion of three months’
    service and the option to join the Workplace Pension in
    line with statutory rules
  - Flexible Benefits including Season Ticket Loans and Ride 2
    Work.
  - Buy and sell up to 5 days of Holiday per year
  - Roll over 5 days of Holiday per year
  - Competitive salary (including bonuses and/ or team
    incentives) and benefits package
  - Refer a friend, earn a bonus!
  - Career progression and training opportunities
  
  
  
  What You Will Bring To The Role
  
  - 3+ years developing production Python code with demonstrated
    proficiency in code review practices, unit testing
    (pytest, unittest), and maintaining codebases >10K lines
  - Strong CI/CD pipeline experience using Git, Azure
    DevOps/GitHub, Docker
  - Hands-on experience building and maintaining ML pipelines
    including ETL processes, data versioning and model
    deployment
  - Experience with modern ML frameworks: PyTorch or TensorFlow
    for model development, scikit-learn for classical ML
  - Working knowledge of LLM deployment patterns including
    prompt engineering, RAG (Retrieval-Augmented Generation)
    architectures, and fine-tuning approaches
  - Proficiency with NLP libraries: Hugging Face Transformers,
    spaCy, or LangChain
  - Experience managing datasets >1TB and implementing data
    quality validation frameworks
  - Cloud platform experience (Azure preferred) including
    compute, storage, and managed ML services
  - Familiarity with model quantization, optimization techniques
    (ONNX, TensorRT), and cost-efficient inference strategies
  - Experience leveraging AI Code Assistants/Agents like Claude
    Code
  
  
  
  Business Travel & Flexibility Requirements
  
  - This position requires the individual to be flexible to our
    client and team needs for out-of-hours work and weekend
    work where applicable.
  
  
  
  Highly Valued Skills
  
  - Vector database implementation (Pinecone, pgvector) with
    experience scaling to millions of embeddings
  - Production experience with embedding models (OpenAI, Cohere,
    sentence-transformers) and semantic search systems
  - Modern Python practices: type hints, async/await, pydantic
  - Experience using AI coding assistants (GitHub Copilot,
    Cursor, Claude Code, or similar) to accelerate development
    workflows
  - SQL expertise (PostgreSQL) including query optimization and
    database design
  - Experience with model monitoring, A/B testing frameworks,
    and performance tracking in production
  - Agentic AI patterns and multi-step reasoning systems
  - C# for integration with existing .NET systems
  - eDiscovery, legal tech, or document processing domain
    knowledge
  
  
  
  Professional Capabilities
  
  - Clear technical communication with both technical and non-
    technical stakeholders
  - Self-directed problem-solving with ability to scope and
    deliver projects independently
  - Collaborative approach to code review and knowledge sharing
  - Detail-oriented with strong testing discipline
  
  
  
  Education
  
  - Bachelor's degree in Computer Science, Engineering,
    Mathematics, Statistics, or related STEM field (Master's
    preferred)
  - Equivalent professional experience considered
  
  
  
  Language
  
  - English fluency (written and verbal)
  
  
  
  Who We Are
  
  KLDiscovery provides technology-enabled services and
  software to help law firms, corporations, and government
  agencies solve complex data challenges. With offices in 26
  locations across 17 countries, KLDiscovery is a global
  leader in delivering best-in-class data management,
  information governance, and eDiscovery solutions to support
  the litigation, regulatory compliance, and internal
  investigation needs of clients. Our Nebula Ecosystem
  provides powerful end-to-end eDiscovery and enterprise-grade
  information governance. Through its global Ontrack data
  recovery business, KLDiscovery delivers world-class data
  recovery, disaster recovery, email extraction and
  restoration, data destruction, and tape management.
  
  
  
