description: |
  We are seeking a highly skilled and experienced Lead
  Engineer, Game AI to join our dynamic team. As the Lead AI
  Engineer, you will be responsible for overseeing the design,
  development, and optimization of game artificial
  intelligence systems- from NPC behavior and navigation to
  combat tactics and ambient life. You will guide a team of
  engineers in close collaboration with design, animation, and
  gameplay teams to deliver intelligent, immersive, and
  believable game experiences and characters.
  
  Core Responsibilities
  
  - Oversee the development and implementation of character
    control AI systems, including pathfinding, state trees,
    decision-making systems, sensory perception, group
    coordination models, design control interface, and large
    scale NPC behavior models in an open world environment.
  - Collaborate closely with game designers and content creators
    to define the needs and constraints for AI systems.
  - Architect and maintain scalable, reusable AI code systems
    that support a wide range of NPC behaviors (combat and
    noncombat), traversal mechanics, and game scenarios.
  - Create and maintain thorough documentation for AI systems
    and architecture.
  - Guide and mentor a team of AI engineers; provide code
    reviews, technical feedback, and career development
    support.
  - Ensure performance and memory efficiency across multiple
    platforms, using profiling tools and optimization
    techniques.
  - Work with QA and production to identify, debug, and resolve
    AI-related issues throughout development.
  - Stay current on AI trends in game development and other
    industries to bring innovative ideas and techniques to the
    project.
  
  Core Qualifications
  
  - 7+ years of professional experience in game development,
    with significant focus on AI programming.
  - Shipped at least one console title in a senior or lead AI
    engineering role.
  - Expertise in C++ and strong knowledge of modern software
    engineering practices.
  - Deep understanding of AI techniques including state
    machines, behavior trees, utility systems, navigation, and
    spatial reasoning.
  - Strong debugging, profiling, and optimization skills.
  - Experience leading technical teams and managing cross-
    disciplinary collaboration.
  - Excellent communication and organizational skills.
  
  Plus If...
  
  - Experience developing AI systems in Unreal Engine (UE4 or
    UE5), including familiarity with EQS, Blackboard, and
    Behavior Trees.
  - Experience with Open World games
  - Background in machine learning, procedural content
    generation, or large-scale crowd simulations.
  - Familiarity with scripting languages such as Python or Lua.
  - Passion for systemic design and emergent gameplay.
  - Interest in creating AI that supports narrative, ambient,
    and sandbox-driven game worlds.
  
  Description
  
  - Full-time job with benefits.
  - Role is on-site in Santa Monica, CA.
  - Office is located near downtown Santa Monica – near metro
    and freeways.
  
  The base pay range for this position is $170,000 to $210,000
  per year. Actual compensation is based on market location
  and may vary depending on job-related knowledge, skills, and
  experience. We also offer a competitive package of benefits
  including vacation time, sick time, company holidays,
  parental leave, medical/dental/vision insurance, life
  insurance, disability insurance, and 401(k) matching to
  regular full-time employees. Certain roles may also be
  eligible for bonus and equity.
