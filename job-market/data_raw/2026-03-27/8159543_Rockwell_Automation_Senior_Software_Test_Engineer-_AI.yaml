  Job Description
  
  Position Title: Senior Software Test Automation Engineer -
  AI
  
  Location: Pune, India
  
  You will work across the quality team to lead Quality
  Platform programmes focusing on innovation and process
  improvements across the organisation. Research and lead AI
  other automation techniques in our testing processes.
  Cultivate and communicate knowledge and upskilling of
  Quality Engineers. Responsibilities will include
  contribution and support of test tooling automation and
  direct scripting.
  
  You will work on cross initiative quality projects working
  closing with Quality Assurance Managers and their teams to
  promote continuous improvement. Focus on latest technology
  and improvements in our overall test orchestration solution
  and tools.
  
  You will work in hybrid position with 3 days on-site
  (Monday, Tuesday and Thursday)
  
  You will report to SR. MANAGER, QUALITY.
  
  Your Responsibilities:
  
  - Research, guide and implement innovation across the testing
    practice
  - Champion AI integration into our testing processes to
    improve the efficiency and help upskill and mentoring of
    test engineers
  - Perform hands-on scripting, PR reviews to our automation
    frameworks and infrastructure
  - Help deliver high visibility customer-facing programmes to
    ensure delivery of quality solutions
  
  The Essentials - You Will Have:
  
  - Bachelor's degree in computer science, software engineering
    or related field
  - Experience using AI solution within the quality assurance
    testing practice
  - 5+ years of Test automaton or development background C#.
  - 3+ years of experience implementing Continuous Integration
    and build automation
  - Experience with Object-Oriented Programming (OOP) paradigms,
    practices, concepts, algorithms, and data structures
  
  The Preferred - You Might Also Have:
  
  - Expertise working with one or both of C#/.NET ecosystem or
    Java/JVM ecosystem
  - GitHub Copilot or other AI tooling for automation coding
    assistance
  - 3+ Experience applying contemporary deployment technologies
    like Docker, Terraform.
  - Expertise in automation framework architecture: designing
    with multiple, diverse automation frameworks; Bellatrixis
    good to have.
  - #Experience with Selenium WebDriver, or other open
    source/commercial market-leading solutions for functional,
    regression, or performance test automation; Jenkins
  - DevOps and repo ownership is good to have.
  
  What We Offer:
  
  Our benefits package includes …
  
  - Comprehensive mindfulness programmes with a premium
    membership to Calm
  - Volunteer Paid Time off available after 6 months of
    employment for eligible employees
  - Company volunteer and donation matching programme – Your
    volunteer hours or personal cash donations to an eligible
    charity can be matched with a charitable donation.
  - Employee Assistance Program
  - Personalised wellbeing programmes through our OnTrack
    programme
  - On-demand digital course library for professional
    development
  
  ... and other local benefits!
  
