description: |
  Our Purpose  Mastercard powers economies and empowers people
  in 200+ countries and territories worldwide. Together with
  our customers, we're helping build a sustainable economy
  where everyone can prosper. We support a wide range of
  digital payments choices, making transactions secure,
  simple, smart and accessible. Our technology and innovation,
  partnerships and networks combine to deliver a unique set of
  products and services that help people, businesses and
  governments realize their greatest potential. Title and
  Summary Lead Front-End Engineer (React/Angular & AI/LLM)
  Lead Software Engineer, Front-End & Full Stack AI
  Applications - Foundry R&D, Pune We are looking for a Lead
  Software Engineer to be part of the Mastercard Foundry R&D
  team. You will be part of the team that drives Mastercard's
  innovation journey by consistently looking to discover and
  learn new skills and technologies and apply them to create
  highly scalable products. The ideal candidate is passionate
  about technology, willing to experiment, agile, highly
  motivated, intellectually curious, analytical, and possesses
  an entrepreneurial mindset. What you'll do * Lead Front-End
  Development for AI Products: Drive the design and
  development of cutting-edge web user interfaces for AI-
  driven applications. You will create rich, interactive
  dashboards and visualisations that surface insights from AI
  models in real time, making complex analytics intuitive and
  actionable for users, iterating quickly in an R&D
  environment to showcase what's possible with AI. * Full-
  Stack Architecture & Integration: Own the end-to-end
  technical design of the web application, from front-end to
  back-end integration. You will architect scalable, modular
  front-end components, potentially employing micro-frontend
  patterns and ensure they seamlessly connect to backend
  services and APIs. * Design Intuitive UX & Data
  Visualisations: You will translate complex AI outcomes into
  clear visual representations: for instance, plotting trends
  from an ML model on interactive charts, or displaying an AI
  agent's reasoning steps in a user-friendly manner. * Ensure
  Quality, Performance & Security: Take responsibility for the
  robustness of the web solutions you build instituting proper
  unit, integration, and end-to-end tests for all front-end
  code, and setting up automated pipelines to catch issues
  early. * Mentorship & Cross-Functional Collaboration: As a
  lead engineer, you will mentor junior engineers and set the
  bar for coding excellence. You'll conduct code reviews with
  a keen eye on design patterns, guide the team in using the
  right tools and frameworks, and help troubleshoot tricky
  issues in both front-end and backend code. You will also act
  as a bridge between cross-functional teams: working with
  product managers to refine requirements, with designers to
  iterate on the look-and-feel, and with AI researchers to
  understand how users should interact with new ML features.
  What you'll bring * Deep Front-End Expertise: Extensive
  experience, typically 8-12+ years in software development
  with a strong focus on modern front-end technologies. You
  have mastery of JavaScript/TypeScript, HTML5, and CSS3, and
  a proven track record building and shipping user-facing
  applications at scale using frameworks like React, Angular
  or Vue. You understand the ins and outs of front-end
  architecture - from state management like React Hooks,
  Context, Redux, etc. to routing and build tooling. * Full-
  Stack Technical Breadth: While your specialty is front-end,
  you bring a broad full-stack understanding. You have hands-
  on experience with back-end development, for example
  building RESTful APIs and a solid grasp of database design -
  SQL or NoSQL. * User-Centric Product Mindset: A strong
  product sense and UX mindset - you think from the end-user's
  perspective when building features. * Architectural
  Leadership & Quality Focus: Demonstrated ability to
  architect front-end systems for scale and maintainability.
  You enforce best practices in code structure and review -
  encouraging reusable components, clear separation of
  concerns, and comprehensive documentation * Agile
  Collaboration & Communication: You can communicate technical
  concepts to non-technical stakeholders clearly, and
  conversely, can understand and incorporate feedback from
  design or product teams into the technical plan. When
  coordinating with globally distributed teams, you adapt to
  different time zones and cultures, ensuring smooth
  collaboration. * Continuous Learning & Innovation: In a
  fast-moving R&D setting, you are comfortable with
  uncertainty and excited by greenfield projects. You take
  initiative to prototype new ideas or proof-of-concepts, for
  example, trying out a new way to display AI model confidence
  levels to users and aren't afraid to propose novel
  solutions. Required skills * Education & Experience:
  Bachelor's degree in Computer Science, Software Engineering,
  or a related field. 8-12+ years of software development
  experience, including substantial front-end development on
  complex, data-driven web applications. * Front-End
  Development: Expert-level skills in JavaScript and
  TypeScript, with deep knowledge of a major front-end
  framework like React is strongly preferred; experience with
  Angular or Vue is also valuable). * UI/UX and Visualisation
  Skills: Demonstrated ability to implement rich user
  interfaces and data visualisations. You have worked with
  design teams or used design prototypes on Figma, Adobe XD,
  etc. to translate UI/UX designs into code, paying attention
  to pixel-perfect details and user flow. * Backend and API
  Integration: Strong competence in integrating the front-end
  with backend services and APIs. You must be comfortable
  working with RESTful APIs - making asynchronous calls using
  fetch/Axios, handling JSON/XML data, managing client-side
  caching, and dealing with error states and retries. *
  Software Quality & DevOps: Proven experience in applying
  software engineering best practices to front-end projects.
  You write unit tests for your functions/components and have
  used frameworks like Jest or Mocha for testing. * Security &
  Performance Considerations: Solid understanding of web
  security principles and performance tuning for web
  applications. You should know common web vulnerabilities
  like XSS, CSRF, clickjacking, etc. and how to mitigate them
  in front-end code, for instance, using proper escaping,
  content security policies, and secure cookies. Preferred
  skills * Real-Time & Advanced Web Features: Experience with
  real-time web technologies and interactive features beyond
  the typical request/response cycle. For example,
  implementing webSockets or Server-Sent Events / SSE for live
  updates such as refreshing dashboards with streaming data. *
  Data Visualisation & Graphics Libraries: Additional
  expertise in data visualisation is highly desirable. This
  might include proficiency in libraries such as D3.js for
  bespoke, highly custom visuals, Plotly or Recharts, or using
  frameworks like Three.js for 3D visualisations in the
  browser * Testing & DevOps Tooling: A track record of using
  advanced testing frameworks and DevOps tools on front-end
  projects. For instance, experience with Cypress or
  Playwright for end-to-end testing, beyond basic unit
  testing, shows your commitment to quality. * Domain
  Knowledge of AI & FinTech: While not mandatory, having
  domain experience can be advantageous - for example,
  integrating an LLM into a chatbot interface, or building a
  UI for an AI-enabled analytics tool - you'll have a head
  start in understanding the special considerations of AI
  applications such as conveying uncertainty, handling model
  latency, etc. * UI/UX Leadership & Innovative Projects:
  Evidence of having led or significantly contributed to
  innovative front-end projects is beneficial. This could be
  in the form of open-source contributions, hackathon wins, or
  writing tech blogs about front-end development. Corporate
  Security Responsibility All activities involving access to
  Mastercard assets, information, and networks comes with an
  inherent risk to the organization and, therefore, it is
  expected that every person working for, or on behalf of,
  Mastercard is responsible for information security and must:
  
  - Abide by Mastercard's security policies and practices;
  - Ensure the confidentiality and integrity of the information
    being accessed;
  - Report any suspected information security violation or
    breach, and
  - Complete all periodic mandatory security trainings in
    accordance with Mastercard's guidelines.
