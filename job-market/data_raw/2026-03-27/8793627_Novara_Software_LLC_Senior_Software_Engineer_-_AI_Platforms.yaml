  Position Description:
  
  The Flex platform helps clients develop a comprehensive
  compliance program, leveraging technology to instill a
  culture of safety and maintain a productive workplace. The
  platform combines features that are tailored to the needs of
  our client’s business, including audits and inspections,
  incident management, flexible training, and reporting and
  insights.
  
  
  
  As a member of our development team, the Senior Software
  Engineer I, II or III will play a key role in delivering
  modern, AI-powered product functionality. The successful
  candidate will build product capabilities powered by LLM
  workflows which empower clients to keep their team safe and
  manage risk.
  
