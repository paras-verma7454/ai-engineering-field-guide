description: |
  We're Celonis, the global leader in Process Intelligence
  technology and one of the world's fastest-growing SaaS
  firms. We believe there is a massive opportunity to unlock
  productivity by placing AI, data and intelligence at the
  core of business processes - and for that, we need your
  help. Care to join us?
  
  Role Description
  
  - As a Senior Applied AI Engineer, you will work directly with
    our most strategic customers to understand their
    objectives and key challenges, identify high-impact
    opportunities for AI, and turn them into measurable
    business value. You will be building Celonis solutions
    using the world’s leading Process Intelligence (PI)
    platform - in combination with the largest AI and ML
    technology partners, such as Microsoft, OpenAI and
    Databricks. With Celonis’ Process Intelligence (PI)
    platform we feed operational context to AI so it
    understands our customers’ business and enables them to
    industrialize AI unlocking real ROI on AI deployments and
    at scale. There is no AI without PI. You will prototype
    these solutions, demonstrate their value to Executives and
    ensure successful implementation, adoption and value
    realization in order to increase the footprint of Celonis
    at those customers.
  
  This customer-facing role is ideal for people who enjoy
  working directly with customers and turning complex business
  challenges into practical AI solutions. The focus is on
  problem framing, solution design, and business impact rather
  than pure software engineering. While you will prototype AI
  solutions, the primary goal is delivering meaningful value
  for customers.
  
  Key Responsibilities:
  
  - Identify High-Impact AI Opportunities: Work closely with
    enterprise customers to understand their strategic
    priorities and operational challenges, identifying where
    AI can deliver measurable business value.
  - Design AI-Powered Solutions: Translate complex business
    problems into scalable AI solution architectures combining
    the Celonis Process Intelligence platform with modern AI
    technologies.
  - Prototype & Demonstrate Value: Rapidly build prototypes and
    proof-of-value solutions that demonstrate tangible
    outcomes to business and technical stakeholders.
  - Lead AI Innovation with Customers: Facilitate workshops,
    hackathons, and innovation sessions with customers to
    explore new ways AI can transform their operations.
  - Drive Adoption and Business Impact: Partner with customer
    teams to ensure successful implementation, adoption, and
    realization of measurable value from AI deployments.
  - Develop Domain Expertise: Build deep expertise in specific
    industries or business domains (e.g., supply chain,
    finance) and help scale that knowledge across the
    organization.
  
  You might be a great fit if you...
  
  - have 5+ years of experience in solutions consulting, data /
    AI consulting, technical pre-sales, sales engineering,
    value engineering, or customer-facing solution-
    architecture or AI roles
  - enjoy translating business challenges into technical
    solutions
  - can communicate complex technical concepts to business and
    executive stakeholders
  - have a good understanding of business processes across
    sectors (such as Supply Chain or Finance) with the ability
    to translate high-level business needs into specific AI
    use cases.
  - demonstrate strong presentation skills to both internal and
    external stakeholders (including executives), whether
    whiteboarding sessions or formal readouts and demos.
  - have some experience prototyping solutions with Python and
    modern AI frameworks
  - are familiar with Generative AI architectures such as RAG,
    prompt engineering, or agent-based systems
  - hold a Bachelor’s Degree required (Masters Degree in
    computer science, engineering, mathematics or related
    fields, or equivalent work experience is a nice-to-have).
  
  Nice to have (big plus):
  
  - Experience building or deploying generative AI applications
  - Familiarity with tools such as LangChain, LlamaIndex, or
    other LLM orchestration frameworks
  - Industry experience in domains such as supply chain,
    finance, or operations
  
  What Celonis Can Offer You:
  
  - Pioneer Innovation: Work with the leading, award-winning
    process mining technology, shaping the future of business.
  - Accelerate Your Growth: Benefit from clear career paths,
    internal mobility, a dedicated learning program, and
    mentorship opportunities.
  - Receive Exceptional Benefits: Including generous PTO, hybrid
    working options, company equity (RSUs), comprehensive
    benefits, extensive parental leave, dedicated volunteer
    days, and much more. Interns and working students explore
    your benefits here.
  - Prioritize Your Well-being: Access to resources such as gym
    subsidies, counseling, and well-being programs.
  - Connect and Belong: Find community and support through
    dedicated inclusion and belonging programs.
  - Make Meaningful Impact: Be part of a company driven by
    strong values that guide everything we do: Live for
    Customer Value, The Best Team Wins, We Own It, and Earth
    Is Our Future.
  - Collaborate Globally: Join a dynamic, international team of
    talented individuals.
  - Empowered Environment: Contribute your ideas in an open
    culture with autonomous teams.
  
  About Us:
  
  Celonis makes processes work for people, companies and the
  planet. The Celonis Process Intelligence Platform uses
  industry-leading process mining and AI technology and
  augments it with business context to give customers a living
  digital twin of their business operation. It’s system-
  agnostic and without bias, and provides everyone with a
  common language for understanding and improving businesses.
  Celonis enables its customers to continuously realize
  significant value across the top, bottom, and green line.
  Celonis is headquartered in Munich, Germany, and New York
  City, USA, with more than 20 offices worldwide.
  
  Get familiar with the Celonis Process Intelligence Platform
  by watching this video.
  
  Celonis Inclusion Statement:
  
  At Celonis, we believe our people make us who we are and
  that “The Best Team Wins”. We know that the best teams are
  made up of people who bring different perspectives to the
  table. And when everyone feels included, able to speak up
  and knows their voice is heard - that's when creativity and
  innovation happen.
  
