description: |
  Job Title: AI Engineer Location: Baner, Pune, India (Work
  from office) Full time, Permanent.
  
  About Us
  
  Cyncly is a global technology powerhouse with 2,400 plus;
  employees and 70,000 plus; customers across 100 plus ;
  countries. Cyncly transforms the way customizable products
  and spaces are imagined, designed, sold, managed and made.
  Our end-to-end software solutions connect professional
  designers, retailers and manufacturers to the world's
  largest repository of product content.
  
  Today, our business spans across the Kitchen & Bath,
  Furniture, Window, Glass & Door, and Flooring industries
  with operations in North & South America, Europe, Asia
  Pacific and Africa.
  
  Cyncly brings over 30 years of experience to deliver more
  value for our customers through an expanded portfolio of
  end-to-end solutions. Our global presence allows us to
  provide world-class support and sales with a local touch,
  providing the best possible customer experience.
  
  Cyncly is now embarking on an exciting journey as we
  continue to expand through strong organic growth and
  complementary acquisitions, backed by leading growth private
  equity firms specialising in technology.
  
  About the Role
  
  As a AI Engineer you will be an essential part of the
  modelling team, developing analytics solutions to meet
  business and user requirements. Conduct exploratory data
  analysis, build and integrate models into the solution
  pipeline. Ensure solution robustness and scalability across
  multiple clients, while constantly exploring advanced
  modelling techniques for optimal efficacy. This is an
  exciting role that offers tremendous learning and growth
  opportunities in a dynamic data-driven environment.
  
  Key Position Responsibilities include
  
  - Interpret data, analyse results using statistical techniques
    and provide ongoing reports.
  - Develop and implement databases, data collection systems,
    data analytics and other strategies that optimise
    statistical efficiency and quality.
  - Acquire data from primary or secondary data sources and
    maintain databases/data systems.
  - Identify, analyse, and interpret trends or patterns in
    complex data sets.
  - Filter and “clean” data by reviewing computer reports,
    printouts, and performance indicators to locate and
    correct code problems.
  - Work with management to prioritise business and information
    needs.
  - Work with Data Engineer to build the data science
    infrastructure.
  - Deliver on time with high quality.
  - Trouble Shooting and debugging skills for faster data defect
    fixing.
  
  Required Experience and Qualifications
  
  - Master’s/B.Tech degree with a major in quantitative field
    (Statistics, Predictive Analytics, Economics, Mathematics
    etc)
  - 4 plus years of experience in implementing AI/ML solutions.
  - Must have 2 plus; years of experience in OpenCV, Object
    detection, image processing and classification.
  - Must have 2 plus; years of experience with frameworks like
    YOLO, Faster R-CNN, Computer vision models etc.
  - Good understanding of AI/ML modelling techniques and
    implementation experience.
  - Experience with ML, deep learning, TensorFlow, Python, NLP.
  - Exposure to Image classification models, Diffusion models,
    voice assistants and chat bots is a big plus.
  - Knowledge of basic algorithms, object-oriented and
    functional design principles, and best-practice patterns.
  - Experience in REST API development, NoSQL database design,
    and RDBMS design and optimisations.
  - Analytical, problem-solving, and decision-making skills.
  - Demonstrate excellent interpersonal and organisational
    skills and be a good team player.
  
  What we offer
  
  - Competitive salary and benefits package.
  - Professional business environment and the opportunity to be
    exposed to cultural diversity through the international
    flavor of our global company.
  - Being a flat structured organization, you can expect lots of
    responsibility and accountability for your work which will
    be meaningful and impactful both locally and
    internationally.
  - A complete and all-encompassing medical insurance package.
  
  Working for us
  
  At Cyncly, we call our team OneCyncly, a reflection of how
  we work together as one, united by our purpose: powering
  businesses that bring spaces to life. Our strength comes
  from our diversity of experiences, perspectives, and skills
  - and we thrive when we work together with openness, trust,
  and respect.
  
  Here, you’ll join a group of colleagues who take ownership,
  solve problems, and focus on making an impact. We embrace
  curiosity, welcome new ideas, and see mistakes as
  opportunities to learn.You’ll have the freedom to work
  flexibly and autonomously, supported by teammates and
  leaders who are committed to your growth.
  
  We celebrate the different ways people contribute and
  encourage everyone - from every background - to bring their
  authentic self to work. Because when we collaborate,
  challenge each other, and share what we know, we build
  something better together.
  
  If you want to work in a place where your ideas matter, your
  growth is valued, and your work shapes the spaces people
  live, work, and play in - come join us.
