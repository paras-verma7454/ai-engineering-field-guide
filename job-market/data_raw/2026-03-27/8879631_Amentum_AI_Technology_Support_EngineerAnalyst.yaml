description: |
  Amentum is a global leader in advanced engineering and
  innovative technology solutions, trusted by the United
  States and its allies to address their most significant and
  complex challenges in science, security and sustainability.
  Our people apply undaunted curiosity, relentless ambition
  and boundless imagination to challenge convention and drive
  progress. Our commitments are underpinned by the belief that
  safety, collaboration and well-being are integral to
  success. Headquartered in Chantilly, Virginia, we have
  approximately 50,000 employees in more than 70 countries
  across all 7 continents.
  
  We are seeking a highly skilled and motivated AI Technology
  Support Engineer/Analyst to join our dynamic team. The ideal
  candidate will possess a strong technical background in AI
  technologies, exceptional problem-solving abilities, and a
  passion for providing top-tier technical support. This role
  involves troubleshooting, diagnosing, and resolving complex
  issues related to AI products and services, as well as
  collaborating with cross-functional teams to enhance product
  performance and customer satisfaction.
  
  Key Responsibilities:
  
  - Provide technical support for AI products and services,
    addressing client inquiries, troubleshooting issues, and
    offering resolutions in a timely and efficient manner.
  - Diagnose and resolve complex technical problems related to
    AI algorithms, model deployment, data processing, and
    system integration.
  - Collaborate with product development, engineering, and data
    science teams to identify and implement solutions for
    improving AI system performance and functionality.
  - Conduct thorough analysis of technical issues, document
    findings, and communicate solutions to internal teams and
    clients.
  - Develop and maintain comprehensive technical documentation,
    including user guides, troubleshooting manuals, and FAQs.
  - Offer training and guidance to clients and internal teams on
    the utilization and optimization of AI technologies.
  - Stay up-to-date with emerging trends and advancements in AI
    and related technologies to provide informed support and
    recommendations.
  - Participate in the continuous improvement of support
    processes and tools to enhance efficiency and customer
    satisfaction.
  
  Knowledge, Skills and Abilities (KSAs):
  
  - Strong understanding of machine learning algorithms, natural
    language processing, data analysis, and AI model
    deployment.
  - Proficiency in programming languages such as Python, R,
    Java, or similar.
  - Knowledge of data preprocessing, data visualization, and
    data manipulation techniques.
  - Familiarity with cloud platforms (e.g., AWS, Azure, Google
    Cloud) and containerization technologies (e.g., Docker,
    Kubernetes).
  - Excellent analytical and problem-solving skills with a
    proactive approach to identifying solutions.
  - Strong communication and interpersonal skills, with the
    ability to explain technical concepts to non-technical
    audiences.
  - Ability to work independently and as part of a collaborative
    team in a fast-paced environment.
  
  Minimum Requirements:
  
  - Bachelor’s degree in Computer Science, Information
    Technology, Engineering, or a related field. A Master’s
    degree is a plus.
  - Three years of experience in a technical support or
    engineering role, with a focus on AI technologies and
    related domains.
  - Experience with AI frameworks and libraries such as
    TensorFlow, PyTorch, scikit-learn, Keras, etc.
  
  Preferred Education, Experience and KSAs:
  
  - Certifications in AI/ML or related technologies are
    desirable.
  - Hands-on experience with deploying AI models in a production
    environment.
  - Knowledge of API integration and microservices architecture.
  - Experience with version control tools (e.g., Git).
  - Familiarity with database technologies (SQL and NoSQL).
  - Prior experience in a customer-facing technical support
    role.
  
  
  
  Compensation Details:
  
  86k - 107k
  
  
  
  The compensation range or hourly rate listed for this
  position is provided as a good-faith estimate of what the
