  posting was issued. Actual compensation may vary based on
  factors such as job responsibilities, education, experience,
  skills, internal equity, market data, applicable collective
  bargaining agreements, and relevant laws.
  
  Benefits Overview:
  
  Our health and welfare benefits are designed to support you
  and your priorities. Offerings include:
  
  - Health, dental, and vision insurance
  - Paid time off and holidays
  - Retirement benefits (including 401(k) matching)
  - Educational reimbursement
  - Parental leave
  - Employee stock purchase plan
  - Tax-saving options
  - Disability and life insurance
  - Pet insurance
  
  Note: Benefits may vary based on employment type, location,
  and applicable agreements. Positions governed by a
  Collective Bargaining Agreement (CBA), the McNamara-O'Hara
  Service Contract Act (SCA), or other employment contracts
  may include different provisions/benefits.
  
  
  
