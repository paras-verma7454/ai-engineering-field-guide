description: |
  As an AI Engineer Intern, you'll join a global team of
  engineers and product professionals working on AI-enabled
  digital solutions transforming P&C insurance. This
  internship provides hands-on exposure to three core
  disciplines: applied AI/ML, production AI/LLM systems
  engineering, and agentic AI systems. You'll contribute to
  real projects across the AI product lifecycle, from model
  experimentation to production support, while learning from
  experienced engineers in a fast-paced enterprise
  environment. This position offers a unique opportunity to
  gain hands-on experience building production AI systems at
  enterprise scale while contributing to Chubb's AI-driven
  transformation.
  
  We expect our AI engineers to be AI-native in how they work.
  You should be comfortable using AI-powered coding tools
  (e.g., GitHub Copilot, Cursor, Claude Code) and agentic
  development environments to accelerate your workflow, debug
  problems, and explore solutions.
  
  Key Responsibilities
  
  Applied AI/ML
  
  - Assist AI engineers in building and testing ML/AI solutions
    for business challenges in cloud environments
  - Support experimentation with LLM techniques including prompt
    engineering, fine-tuning workflows, and evaluation methods
  - Help curate and prepare datasets for model training and
    evaluation
  - Write and maintain Python scripts for data processing, model
    inference, and pipeline automation
  
  Production AI Systems
  
  - Contribute to building and testing AI service components
    including APIs, inference pipelines, and integration
    layers
  - Assist with prompt management, versioning, and testing
    workflows
  - Support documentation and testing of AI system integrations
  - Learn production engineering practices including
    containerization (Docker), version control, and CI/CD
    workflows
  
  Agentic AI Systems
  
  - Explore agentic AI frameworks (e.g., LangChain, CrewAI,
    AutoGen) through guided prototyping projects
  - Assist in testing agent behaviors, tool integrations, and
    multi-step workflows
  - Support evaluation and observability efforts including
    prompt tracing and performance logging
  - Document findings and contribute to internal knowledge
    sharing.
  
  General Engineering Practices
  
  - Write clean, well-documented code following team standards
    and guidelines
  - Participate in code reviews (as reviewer and reviewee) to
    develop engineering judgment
  - Communicate progress, blockers, and learnings clearly to
    mentor and team
  - Complete a capstone project demonstrating skills developed
    during the internship
  
  Qualifications
  
  - Currently pursuing a Bachelor's or Master's degree in
    Computer Science, Data Science, Machine Learning, or
    related technical field
  - Proficiency in Python programming (coursework, personal
    projects, or prior internship experience)
  - Foundational understanding of machine learning concepts
    (supervised/unsupervised learning, neural networks, model
    evaluation)
  - Familiarity with version control systems (Git)
  - Comfortable using AI-powered coding assistants (e.g., GitHub
    Copilot, Cursor, Claude) as part of your development
    workflow
  - Strong problem-solving skills and attention to detail
  - Intellectual curiosity and eagerness to learn in a fast-
    paced environment
  
  Preferred
  
  - Exposure to ML frameworks and libraries (PyTorch,
    TensorFlow, Hugging Face Transformers, scikit-learn)
  
  The pay range for the role is $20/hr. - $24/hr. The specific
  offer will depend on an applicant’s skills and other
  factors. This role may also be eligible to participate in a
  discretionary annual incentive program.  Chubb offers a
  comprehensive benefits package, more details on which can be
  found on our careers website.  The disclosed pay range
  estimate may be adjusted for the applicable geographic
  differential for the location in which the position is
  filled.
  
  About Us
  
   Chubb is a world leader in insurance. With operations in 54
  countries, Chubb provides commercial and personal property
  and casualty insurance, personal accident and supplemental
  health insurance, reinsurance, and life insurance to a
  diverse group of clients. The company is distinguished by
  its extensive product and service offerings, broad
  distribution capabilities, exceptional financial strength,
  underwriting excellence, superior claims handling expertise
  and local operations globally.
  
  
  
