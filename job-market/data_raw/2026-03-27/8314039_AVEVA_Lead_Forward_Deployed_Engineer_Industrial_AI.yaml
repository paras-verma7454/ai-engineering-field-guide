description: |
  AVEVA is creating software trusted by over 90% of leading
  industrial companies.
  
  Position: Lead Forward Deployed Engineer, Industrial AI
  
  Location: United Kingdom, Ireland, Spain, Germany, France,
  Sweden, Italy
  
  Employment Type: Full-time 
  
  
  
  The job     
  
  We are hiring a Lead Forward Deployed Engineer, Industrial
  AI to join the AI Investigation and Incubation team. This
  leader will drive the development and deployment of AI
  solutions in industrial settings. This hands-on senior role
  will bridge the gap between AI technologies exploration and
  real-world applications, ensuring solutions are practical,
  scalable, and impactful.  
  
  
  
  Key responsibilities 
  
  - Provide industrial domain expertise to guide AI tool,
    platform, and roadmap decisions and development
  
  - Work directly with internal and external customers in a
    consultative, problem-solving manner to gather feedback
    and refine solutions
  
  - Drive investigations into the application of advanced AI
    capabilities to industrial problems
  
  - Identify and define industrial use cases for AI applications
  
  - Develop AI-enabled demos, prototypes, and proof-of-value
    solutions for industrial problems
  
  - Collaborate with cross-functional teams to integrate AI
    capabilities into industrial software
    systems and implement AI solutions
  
  - Evaluate the performance and impact of AI models in
    operational environments
  
  - Support and mentor junior team members
  
  
  
  Essential requirements 
  
  - 12+ years of experience in industrial systems, automation,
    applied AI, or AI-enabled software engineering with at
    least 4 years in a customer-facing, technical lead
    position
  
  - Bachelor's degree in Computer
    Science, Engineering, Industrial Systems, or a related
    technical field; advanced degree preferred
  
  - Exceptional industrial domain understanding (manufacturing,
    energy, infrastructure, asset-intensive
    industries, material science, etc.)
  
  - Customer-focused, pragmatic, and results-oriented with
    experience leading cross-functional technical projects or
    customer engagements
  
  - Demonstrated hands-on experience deploying or integrating
    AI/ML solutions into real-world industrial environments
  
  - Ability to identify emerging opportunities for AI in
    industrial applications
  
  - Excellent communication and interpersonal skills with the
    ability to embed closely with customer teams
    and collaborate internally across engineering, product,
    and commercial teams
  
  
  
  Desired skills and competencies 
  
  - Experience working across on-prem, edge, and cloud-connected
    architectures
  
  - Prior work in environments transitioning from traditional
    on-prem systems to AI-enabled or hybrid architectures
  
  - Experience operating within regulated or compliance-driven
    environments (e.g. energy, safety-critical systems, data
    privacy)
  
  - Experience mentoring or guiding less-experienced engineers
  
  
  
  What success looks like 
  
  - AI solutions are successfully applied to real
    industrial problems, not just conceptual designs
  
  - Prototypes and deployments demonstrate practical feasibility
    and measurable impact
  
  - Codified learnings, insights and architectural patterns
    into references, guides, playbooks, or building blocks
    that are digestible and actionable for others
  
  - Industrial constraints (latency, security, compliance,
    reliability) are addressed through solid engineering
    decisions
  
  - Strong collaboration in a matrix / incubation environment,
    contributing as a senior technical practitioner
  
  - Feedback from field deployments meaningfully influences AI
    platform and product direction
  
  UK Benefits include:
  
  Flexible benefits fund, emergency leave days, adoption
  leave, 28 days annual leave (plus bank holidays), pension,
  life cover, private medical insurance, parental leave,
  education assistance program.
  
  It’s possible we’re hiring for this position in multiple
  countries, in which case the above benefits apply to the
  primary location. Specific benefits vary by country, but our
  packages are similarly comprehensive.
  
  Find out more: aveva.com/en/about/careers/benefits/
  
  Hybrid working
  
  By default, employees are expected to be in their local
  AVEVA office three days a week, but some positions are fully
  office-based. Roles supporting particular customers or
  markets are sometimes remote.
  
