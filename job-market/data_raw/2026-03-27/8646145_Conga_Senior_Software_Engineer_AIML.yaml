description: |
  A career that’s the whole package!
  
  At Conga, we’ve built a community where our colleagues can
  thrive. Here you’ll find opportunities to innovate and
  support growth through individual and team development, all
  within an environment where every voice is heard.
  
  Conga accelerates the customer’s journey to becoming a more
  connected and intelligent business. The Conga Advantage
  Platform is recognized worldwide for enhancing this journey,
  bringing together Configure, Price, Quote, Contract
  Lifecycle Management, and Document Automation capabilities
  on a single open platform. It integrates seamlessly with any
  ERP, CRM, and Cloud. Powered by a unified data model and
  purpose-built AI, Conga helps companies achieve a unique
  advantage—one built on seamless connection, actionable
  intelligence, and scalable growth.
  
  Our approach is grounded in the Conga Way, a framework that
  reflects our values and drives everything from hiring to
  decision-making, as well as key programs including
  recognition. Created with direct input from our colleagues,
  the Conga Way forms the foundation of our vibrant culture.
  
  Job Title: Senior Software Engineer, AI/ML or GenAI
  Locations: Bangalore / Ahmedabad / Pune
  
  Reports to: Director, Software Engineering
  
  A quick snapshot…
  
  As a Senior Software Engineer, you’ll be a key member in a
  team responsible for the development of scalable, reliable,
  and innovative AI/GenAI solutions. You’ll contribute to
  high-priority projects, ensuring maintainable code and
  producing high-quality, production-ready applications.
  You’ll operate with a high degree of technical expertise,
  strategic thinking, effective collaboration across diverse
  teams, while helping to mentor and elevate others to meet a
  very high technical bar.  
  
  Why it’s a big deal…
  
  You will be a key contributor to delivering Conga’s AI
  roadmap, ensuring solutions meet high quality standards and
  timelines. You’ll be a core member of the team that will
  implement complex, large-scale AI systems. You’ll also have
  the opportunity to work cross-functionally to resolve
  issues, mentor junior members, and help to foster a culture
  of continuous learning and technical excellence. All of this
  adds up to an exciting, challenging, and always interesting
  place to work, where complex problems are found and solved
  every day.
  
  Here's what we’re looking for…
  
  Related Experience. You have 7+ years of professional
  software development experience, including 3+ years in AI/ML
  or GenAI. You have a proven track record of developing and
  deploying scalable, production-grade AI solutions.
  
  Technical expertise. You have:
  
  - Experience in Python and frameworks such as TensorFlow,
    PyTorch, FastAPI, LangChain, LangGraph, and KubeFlow.
  
  - Knowledge of AI/ML algorithms, generative models, and LLMs.
  
  - Proficiency with cloud platforms (e.g., GCP, AWS, Azure) and
    modern DevOps practices.
  
  - Strong understanding of distributed systems, microservices
    architecture, and database systems (SQL/NoSQL).
  
  Education. A bachelor’s degree in engineering or equivalent.
  
  Here’s what will give you an edge…
  
  Effective communication and interpersonal skills. You’re
  comfortable initiating and engaging in collaborative
  discussions. You are skilled at reading and adapting to
  different communication styles. When you speak, you are
  clear and concise. Your strong listening skills help to
  build trust and foster connections with our clients. They
  also ensure you collect the right information so you can
  resolve issues most expediently.
  
  Initiative. You do not wait around for things to happen or
  for someone to tell you what to do. You are not only
  proactive about completing your own work, but when you sense
  the need to introduce a project that will benefit the team
  or the organization -- even if it’s outside your scope of
  work -- you put a proposal together, talk to the team about
  it, and own it. And that also goes back to having an
  entrepreneurial spirit.
  
  Passionate Problem Solver. Proactive, self-driven, and
  enjoys solving complex problems, not just in the primary
  area of responsibility but across boundaries. Identify and
  implement best practices for coding as well as development
  processes and perform as a trusted contributor requiring
  little to no supervision and demonstrating the ability to
  meet deadlines, exceed goals, and create benchmarks for
  success.
  
  #Li-VA1
  
  Did we pique your interest? 
  
  If this sounds like the kind of job you would love in the
  kind of environment where you would thrive, please click
  apply. We'd love to hear from you! 
  
  Preferred Resume Format
  
  We accept resumes in any format, we suggest using PDF or
  plain text. These formats help ensure that your resume’s
  formatting remains intact, making it easier for our
  recruiters to review your application promptly.
  
  Don’t meet every requirement for the role?  
  
  Studies have shown that women and members of ethnic
  minorities are less likely to apply to jobs unless they meet
  every single qualification. At Conga we are dedicated to
  building a diverse, inclusive, and authentic workplace, so
  if you’re excited about this role but your experience
  doesn’t align perfectly with every qualification in the job
  description, we encourage you to apply anyway. You just
  might be the right candidate for this or other roles. 
  
  Additional Information
  
  Conga is proud to be an Equal Opportunity Employer and
  provides equal employment opportunities to all employees and
  applicants regardless of race, color, religion, gender,
  gender identity, age, national origin, disability, parental
  or pregnancy status, marriage and civil partnership, sexual
  orientation, veteran status, or any other characteristic
  protected by law. We understand interviewing can be
  stressful for those with disabilities. If reasonable
  accommodation is needed to allow you to show us your best
  self, please let your recruiter know as soon as possible.
  All your information will be kept confidential according to
  EEO guidelines. Conga is not open to third party
  solicitation or resumes for our posted FTE positions.
  Resumes received from third party agencies that are
  unsolicited will be considered complimentary.
  
