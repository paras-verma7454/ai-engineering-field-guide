description: |
  The Chief Technology Office (CTO) is building out its
  Technology Strategy practice, which is responsible to
  develop and maintain Citi’s Technology Strategy in support
  of firm’s Businesses and Functions. As part of the
  Technology Strategy Team, the candidate will be joining an
  existing global team of technology strategy analysts,
  project/product managers and engineers.
  
  We are seeking a Generative AI Software Senior Engineer with
  deep expertise in modern AI technologies and a passion for
  building exceptional AI‑first product experiences. This is a
  hands‑on development role, working as part of a global
  engineering team across the US, UK, and India.
  
  You will lead the design and development of user‑facing
  capabilities for our Technology Strategy platform and our
  next generation of AI agents — including the Tech Strategy
  Assistant and the AI Metrics Assistant. You will translate
  cutting‑edge GenAI, LLM, and agentic orchestration
  capabilities into intuitive, high‑trust, production‑grade
  user experiences that power strategic decision‑making across
  the firm.
  
  This is a high-impact role at the intersection of AI
  engineering, UX, and strategic enablement.
  
  Your Mission
  
  - Total years of experience should be 14 plus.
  - Design and build AI agents that enable and streamline
    Technology Strategy processes.
  - Translate complex LLM and agentic workflows into clear,
    responsive, and intuitive user experiences.
  - Embed AI capabilities into strategic workflows to drive
    measurable productivity gains.
  - Enable real-time and streaming AI outputs (chat, reasoning
    traces, document generation, workflow automation).
  - Design and build high-quality, highly reliable products with
    user experience at the centre
  - Continually iterate and scale Generative AI products, whilst
    listening to the needs of the customers (internal)
  - Be responsible for engineering innovative, best in class AI
    platforms for the bank
  - Maintain strong engineering discipline (clean architecture,
    componentisation, performance optimisation, testing,
    documentation, adherence to PM standards).
  - Mentor and nurture other engineers to help them grow their
    skills and expertise
  
  What You Bring
  
  - Deep hands-on knowledge of Kubernetes, developing backend
    platforms and engineering APIs that scale
  - Fluency in at least two programming language, with
    preference for Python, Javascript/Typescript, Golang
  - Experience designing control and sandboxing systems for AI
    research
  - Pytorch, TensorFlow experience
  - Experience maintaining and/or contributing to bug bounty and
    responsible disclosure programs
  - Understanding of LLMs and transformers
  - Rich understanding of vector stores and search algorithms
  - Large-scale ETL development
  - Direct engineering experience of high performance, large-
    scale ML systems
  - Hands on MLOps experience, with an appreciation of the end-
    to-end CI/CD process
  - Have experience supporting fast-paced startup engineering
    teams
  - Have used LangChain and even contributed to the project.
  - A well-known contributor to opensource and always thinking
    out of the box tooling, using and standardizing with
    methods of creating APIs , ML/Ops automation and more.
  
  Why Join Us
  
  You will join a high-discipline, AI-first engineering team
  within Technology Strategy, building and scaling enterprise-
  grade AI agents and modernising our core strategic platform.
  This role offers the opportunity to shape how AI is embedded
  into Technology Strategy workflows — not as experimentation,
  but as scalable, measurable, production capabilities.
  
