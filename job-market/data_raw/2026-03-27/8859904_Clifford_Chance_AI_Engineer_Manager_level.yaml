description: |
  Company Description
  
  Who we are
  
  
  
  We are one of the largest international law firms in the
  world. With over 30 offices across the globe, we strive to
  exceed the expectations of our clients, providing them with
  the highest-quality advice and legal insight, which combines
  the firm’s global standards with in-depth local expertise.
  
  Our firm, work and people span jurisdictions, cultures, and
  languages. We offer our clients a truly international
  perspective. We believe every career should be rewarding and
  stimulating - full of opportunities to learn, thrive, and
  grow. That’s why we’re so proud of our inclusive, friendly,
  and team-based approach to work.
  
  Our one firm global strategy is focused on targeted growth
  led by the needs of our core clients, those who we can best
  support with the breadth and depth of Clifford Chance
  expertise, across the sectors and geographies, which matter
  most to them.
  
  You’ll find our clients in commercial and industrial
  sectors, the financial investor community, governments,
  regulators, trade bodies, and not-for-profit organisations.
  But no matter who they are or why they’ve reached out to us,
  we provide a world-class service every step of the way. And
  that’s possible thanks to the entrepreneurial spirit and
  conscientious approach to work that you’ll find across all
  of our teams.
  
  Whichever area of the business you join, you’ll become an
  integral part an innovative, diverse and ambitious team of
  people. Clifford Chance is a place where the brightest minds
  and the best of colleagues meet.
  
  Job Description
  
  The role
  
  
  
  This role is a key contributor in the Data & Analytics, AI
  team:
  
  - The daily work primarily focuses on  Natural Language
    processing (NLP).
  - This role will lead a range of data analytics efforts,
    including monitoring and improving the performance of our
    Natural Language Understanding (NLU) models
  - Collaborate with legal technology advisors, business
    departments, innovation lab, finance team and work in the
    data science lab
  - Further develop Clifford Chance's generative AI solutions
  
  
  
  Who you will work with
  
  The candidate's primary role is to develop and deliver
  applications for internal organisation and service-based
  use. It will involve collaborating with other IT teams,
  internal product development teams and Data & Analytics, AI
  team members for the architectural design and implementation
  of these applications. The candidate will be actively
  involved not only in application design but also in the
  realisation of those designs as applications for the cloud.
  
  
  
  What you will be responsible for
  
  
  
  - Develop products as both on-premises and cloud-based
    applications in Python, whilst ensuring they align to
    Application, Enterprise, Security architecture as well as
    the whole-of-Government policies and framework
  - Collaborate on creating architectural designs for on-
    premises and cloud-based applications, including relevant
    documentation to effectively explain architectural design
    concepts and solutions to various level of stakeholders
  - Recommend new software development methodologies, design
    patterns and approaches to continually improve product
    delivery as part of the Legal Technology Solutions
  - Apply knowledge of Agile software development and DevOps to
    ensure best delivery of applications, ensuring focus is
    always kept on maintainability and scalability.
  - Identify potential and emerging technologies relevant to
    innovation for the Data Science Lab and wider Legal
    Technology Solutions group
  - Contribute to the execution of data science use cases on a
    need basis
  
  Qualifications
  
  Your experience
  
  
  
  Skills & Experience
  
  - 6-7 years total (at least 3 years in all technologies listed
    below)
  - Azure AI Ecosystem: AI Services, GPT models, vector search,
    Cognitive search, Document Intelligence, Azure queues
  - Advanced Python proficiency (including multithreading,
    document processing, packaging)
  - Theoretical understanding of LLM driven applications
  - Experience with deep learning and Natural Language
    Processing (NLP)
  - Hands-on experience with using and configuring Azure OpenAI
    language models
  - Strong software engineering skills (high code quality,
    debugging, Azure CI/CD)
  - Experience with load testing of generative AI applications
  - Solid understanding of Machine Learning
  - Hands-on experience with data exploration and building
    machine learning models
  - Document code and document detailed designs
  - Excellent problem solving and troubleshooting skills
  - Experience in working with Databricks and Spark
  
  
  
  Professional Expertise
  
  - BSc or greater in Data Science, Computer Science, Math or
    Statistics
  
  
  
  Written and Verbal Communications
  
  - Highly developed written communication skills and capable of
    producing global and sensitive communications to a varied
    audience at all levels in both Practice Areas and Business
    Services.
  - Excellent verbal and interpersonal communications skills –
    some form of customer-facing interaction or consulting
    experience is a plus.
  
  
  
  Core Competencies
  
  Analytical Thought and Problem Solving
  
  - Makes decisions that solve the immediate problem and prevent
    it from occurring again.
  - Prepares for potential problems and contingencies in case
    things go wrong.
  - Takes prompt action to resolve problems quickly.
  - Makes pragmatic and practical decisions about how centrally
    driven initiatives should be implemented locally.
  - Uses all relevant sources of information, including the team
    and other colleagues, to generate solutions.
  
  
  
  Communicating and Influencing
  
  - Takes account of different needs and concerns in order to
    effectively communicate with others.
  - Communicates effectively with the team through structured
    meetings and reviews.
  - Resolves conflict and delivers feedback in an assertive and
    transparent way.
  
  
  
  Commitment and Self-Motivation
  
  - Remains positive even if progress is slow and solutions are
    diluted.
  - Is open to learning new skills.
  - Demonstrates a drive towards continual personal growth and
    development.
  - Learn about and champion best practices in code,
    architecture & processes.
  - Contribute to the architecture and development direction of
    the team to ensure quality code is written and excellent
    products are built
  
  
  
  How we will support you
  
  From your first day with us, you will have varied
  opportunities to continuously grow and development your
  skills and knowledge. From formal training, informal
  coaching and mentoring through to skills-based and technical
  training and on the job learning
  
