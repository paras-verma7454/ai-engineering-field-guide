description: |
  Who We Are
  
  At Kyndryl, we run and reimagine the mission-critical
  technology systems that drive advantage for the world’s
  leading businesses.  We are at the heart of progress; with
  proven expertise and a continuous flow of AI-powered
  insight, enabling smarter decisions, faster innovation, and
  a lasting competitive edge. For our people—Kyndryls—that
  means doing purposeful work that powers human progress. Join
  us and experience a flexible, supportive environment where
  your well-being is prioritized and your potential can
  thrive.
  
  The Role
  
  As part of a large-scale platform modernization journey, the
  organization is strengthening its AI and Machine Learning
  capabilities to deliver intelligent, secure, and scalable
  digital solutions on Microsoft Azure. This transformation
  focuses on embedding enterprise-grade AI capabilities within
  the platform engineering landscape—enabling automation,
  improving data security, and accelerating outcomes through
  responsible AI adoption.
  
  To support this initiative, we are seeking an experienced
  AI/ML Engineer. This role will be pivotal in designing,
  building, and operationalizing a central AI Platform and its
  supporting capabilities, including AI SDK development, data
  masking, PII detection, and document intelligence. The
  engineer will integrate Azure AI services with modern DevOps
  practices to ensure performance, reliability, and compliance
  with enterprise governance standards.
  
  Among your key responsibilities you will find:
  
  - Designing and assessing serverless compute architectures for
    AI workloads.
  - Implementing scalable Azure Databricks Serverless
    environments.
  - Developing and maintaining CI/CD pipelines in Azure DevOps
    for AI and Databricks workloads.
  - Ensuring reliability, observability, monitoring, and
    optimization of Databricks and serverless services.
  - Collaborating closely with Data Science, Cloud Engineering,
    and DevOps teams as an independent expert - providing
    consultancy, technical alignment, and best practices for
    operationalizing AI models efficiently.
  
  Your future at Kyndryl This role opens the door to many
  career paths, both vertical and horizontal. It’s a great
  chance for database administrators or other techs to break
  into the cloud. It’s also a solid path to become enterprise
  or chief architect or a distinguished engineer! Whatever you
  see for yourself, you’ll find the opportunity here.
  
  Who You Are
  
  You’re good at what you do and possess the required
  experience to prove it. However, equally as important – you
  have a growth mindset; keen to drive your own personal and
  professional development. You are customer-focused – someone
  who prioritizes customer success in their work. And finally,
  you’re open and borderless – naturally inclusive in how you
  work with others. Required Technical and Professional
  Experience
  
  - Proven experience designing and deploying AI/ML and data
    engineering solutions on Azure.
  - Deep understanding of Azure Databricks architecture,
    including serverless compute capabilities.
  - Hands-on experience with serverless technologies such as
    Azure Functions, Event Grid, and Logic Apps.
  - Proficiency in Python, PySpark, and SQL for data engineering
    and model integration.
  - Strong knowledge of CI/CD, MLOps, and Infrastructure-as-Code
    using Azure DevOps and Terraform.
  - Solid understanding of cloud cost management, scaling
    strategies, and workload optimization.
  - Familiarity with enterprise security, data protection, and
    compliance requirements for AI workloads.
  - Ability to design and implement observability, monitoring,
    and alerting for Databricks Serverless environments.
  
  Being You
  
  The “Kyn” in Kyndryl means kinship, which represents the
  strong bonds we have with each other, our customers and our
  communities. We focus on ensuring all Kyndryls feel included
  and we welcome people of all cultures, backgrounds, and
  experiences. Even if you don’t meet every requirement, we
  encourage you to apply. We believe in growth, and we’re
  excited to see what you can bring. At Kyndryl, employee
  feedback has told us that our number one driver of employee
  engagement is belonging. That sense of belonging — being a
  valued, respected, trusted member of the team — is
  fundamental to our culture and fueling great experiences for
  our customers. This dedication to welcoming everyone into
  our company means that Kyndryl gives you the ability to
  thrive and contribute to our culture of empathy and shared
  success. That’s The Kyndryl Way.
  
  What You Can Expect
  
  Your career with us isn’t just a job—it’s an adventure with
  purpose.  We offer a dynamic, hybrid-friendly culture that
  supports your well-being and empowers you to grow. Our Be
  Well programs are thoughtfully designed to support your
  financial, mental, physical, and social health—because we
  know that when you feel your best, you do your best.  From
  your very first day, you’ll dive into impactful work that
  powers the systems our customers rely on every day. You
  won’t just contribute—you’ll make a difference, tackling
  meaningful projects that sharpen your skills and fuel your
  growth. We’re here to champion your journey. With powerful
  tools to chart your career path, personalized development
  goals aligned with your ambitions, and continuous feedback
  to keep you inspired and on track, you’ll have everything
  you need to thrive and evolve. You’ll develop in-demand
  skills to grow your career and achieve your ambitions with
  access to cutting-edge learning opportunities—from
  certifications with Microsoft, Google, and Amazon to
  coaching and hands-on experiences. And through it all,
  you’ll be part of a culture that values empathy, restless
  learning, and a devotion to shared success. We want you to
  thrive here—and we’re committed to helping you do just that.
  Ready to make an impact? Join us and help shape what’s next.
  
  Get Referred!
  
  If you know someone that works at Kyndryl, when asked ‘How
  Did You Hear About Us’ during the application process,
  select ‘Employee Referral’ and enter your contact's Kyndryl
  email address.
