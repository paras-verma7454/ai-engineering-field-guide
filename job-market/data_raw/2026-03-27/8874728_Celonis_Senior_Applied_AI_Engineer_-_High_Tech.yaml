description: |
  We're Celonis, the global leader in Process Intelligence
  technology and one of the world's fastest-growing SaaS
  firms. We believe there is a massive opportunity to unlock
  productivity by placing AI, data and intelligence at the
  core of business processes - and for that, we need your
  help. Care to join us?
  
  Role Description
  
  - As an Applied AI Engineer you are pushing the envelope in
    solving business-critical problems for our customers. You
    will be working with our most strategic customers,
    understanding their objectives and key challenges, and
    building Celonis solutions using the world’s leading
    Process Intelligence (PI) platform in combination with the
    largest AI and ML technology partners, such as Microsoft,
    OpenAI and Databricks. With Celonis’ Process Intelligence
    (PI) platform we feed operational context to AI so it
    understands our customers’ business and enables them to
    industrialize AI unlocking real ROI on AI deployments and
    at scale. There is no AI without PI. You will prototype
    these solutions, demonstrate their value to Executives and
    ensure successful implementation, adoption and value
    realization in order to increase the footprint of Celonis
    at those customers.
  
  Key Responsibilities:
  
  - AI Discovery & Solutioning: Understand customers AI strategy
    and business critical challenges. As Celonis product &
    domain expert, find the best problem-solution fit and
    translate customer requirements into innovative solutions
    that move the needle
  - Hackathons & Prototyping: Think out of the box, have a „can-
    do“ attitude and don’t shy away from complex problems.
    Leverage cutting edge AI technologies to rapidly build
    creative prototypes in customer hackathons solving
    business critical problems
  - Agentic Process Transformation: Support our customers in
    achieving real ROI out of AI deployments at scale enabling
    a fundamental shift in business operations from
    traditional, rule-based automation to the use of
    autonomous AI agents empowered by our Celonis Process
    Intelligence Platform
  - Proof projects: End-to-end execution of business-critical
    Proof-of-Value projects, incl. architecture and deliver
    secure, scalable LLM/agent systems with RAG, tools, and
    guardrails; integrating with enterprise data, identity,
    and compliance frameworks.
  - Ensure Successful Project Outcome: Applied AI Engineers stay
    involved with projects until agreed value & adoption
    thresholds are reached
  - Specialize in Domains or Industries: To scale knowledge
    across the organization Applied AI Engineers specialize in
    domains (e.g. supply chain) and industries
  
  Requirements:
  
  - 6+ years of experience leading technical pre-sales,
    including defining AI roadmaps, building compelling
    ROI/TCO business cases and prototyping of machine learning
    and generative AI solutions.
  - Understanding of generative AI techniques like RAG, few shot
    learning, prompt engineering, multi-agent orchestration,
    multimodal understanding, or fine-tuning that are used to
    build high-impact use cases like intelligent chatbots and
    automated text processors.
  - Understanding of business processes across sectors (such as
    Supply Chain or Finance) with the ability to translate
    high-level business needs into specific AI use cases.
  - Good knowledge of Python and common ML libraries (such as
    LangChain, pandas, pydantic, sklearn, PyTorch) as well as
    data engineering tools and technologies.
  - Strong presentation skills to both internal and external
    stakeholders (including executives), whether whiteboarding
    sessions or formal readouts and demos.
  - Bachelor’s Degree required, Masters Degree in computer
    science, engineering, mathematics or related fields, or
    equivalent work experience preferred.
  
  Nice to have (big plus):
  
  - Hands-on experience building agentic systems using LLM
    orchestration, RAG, function calling, and prompt
    engineering, while ensuring safety through rigorous
    evaluations and guardrails.
  - Working knowledge of tools in the LLM ecosystem such as
    LangChain, LlamaIndex, or other OSS packages.
  - Experience in deploying and monitoring models at scale
    across major cloud platforms (AWS Bedrock, Azure AI, GCP
    Vertex)
  
  What Celonis Can Offer You:
  
  - Pioneer Innovation: Work with the leading, award-winning
    process mining technology, shaping the future of business.
  - Accelerate Your Growth: Benefit from clear career paths,
    internal mobility, a dedicated learning program, and
    mentorship opportunities.
  - Receive Exceptional Benefits: Including generous PTO, hybrid
    working options, company equity (RSUs), comprehensive
    benefits, extensive parental leave, dedicated volunteer
    days, and much more. Interns and working students explore
    your benefits here.
  - Prioritize Your Well-being: Access to resources such as gym
    subsidies, counseling, and well-being programs.
  - Connect and Belong: Find community and support through
    dedicated inclusion and belonging programs.
  - Make Meaningful Impact: Be part of a company driven by
    strong values that guide everything we do: Live for
    Customer Value, The Best Team Wins, We Own It, and Earth
    Is Our Future.
  - Collaborate Globally: Join a dynamic, international team of
    talented individuals.
  - Empowered Environment: Contribute your ideas in an open
    culture with autonomous teams.
  
  About Us:
  
  Celonis makes processes work for people, companies and the
  planet. The Celonis Process Intelligence Platform uses
  industry-leading process mining and AI technology and
  augments it with business context to give customers a living
  digital twin of their business operation. It’s system-
  agnostic and without bias, and provides everyone with a
  common language for understanding and improving businesses.
  Celonis enables its customers to continuously realize
  significant value across the top, bottom, and green line.
  Celonis is headquartered in Munich, Germany, and New York
  City, USA, with more than 20 offices worldwide.
  
  Get familiar with the Celonis Process Intelligence Platform
  by watching this video.
  
