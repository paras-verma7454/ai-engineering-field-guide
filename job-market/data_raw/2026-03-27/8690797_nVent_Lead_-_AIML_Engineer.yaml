  We’re looking for people who put their innovation work to
  advance our success – and their own. Join an organization
  that ensures a more secure world through connecting and
  protecting our customers with inventive electrical
  solutions.
  
  What YOU WILL EXPERIENCE IN THIS POSITION:
  
  As a Lead AI/ML Engineer at nVent, you will serve as both a
  strategic leader and hands-on technical expert, responsible
  for designing, implementing, and governing enterprise AI &
  ML solutions that drive measurable business value while
  managing organizational risk. The ideal candidate combines
  strong AI, ML engineering skills with the ability to
  translate business problems into technical solutions, deploy
  production-grade systems, and work effectively with business
  stakeholders.
  
  Key Responsibilities
  
  - AI Strategy Leadership
    - Guide enterprise agentic AI framework, and define
      integration patterns balancing innovation with
      governance and risk management
    - Partner with business stakeholders to understand challenges
      and translate those challenges into AI/ML solution
      delivery
    - Design and implement ML models and AI solutions that address
      specific business problems with measurable ROI (cost
      reduction, revenue growth, efficiency gains)
    - Present findings and recommendations to business leaders and
      technical audiences, adjusting communication style for
      varying levels of AI literacy
  - Model Development & Deployment
    - Build, train, validate, and deploy machine learning models
      using Snowflake ML capabilities and AWS services
      (SageMaker, Bedrock, Lambda)
    - Implement generative AI solutions leveraging large language
      models (LLMs), Langchain and Streamlit for applications
      such as document processing, content generation,
      conversational AI, and knowledge management
    - Develop natural language processing (NLP) solutions for text
      analysis, sentiment detection, entity extraction, and
      automated classification
    - Create computer vision applications for quality inspection,
      safety monitoring, and document understanding
    - Establish MLOps practices including model versioning,
      monitoring, retraining pipelines, and performance
      tracking
    - Implement human-in-the-loop workflows for high-stakes
      decisions requiring human oversight
    - Design and implement MCP servers to manage structured
      context for AI agents
  - Data Engineering & Platform Integration
    - Work within our centralized Snowflake data platform to
      access and prepare data from multiple source systems
    - Create chunking and manage vector databases utilizing
      Snowflake Cortex to enable efficient semantic search and
      retrieval for generative AI applications.
    - Perform feature engineering, data preprocessing, and data
      quality validation to ensure model training data meets
      requirements
    - Build data pipelines that support model training, inference,
      and monitoring at scale
    - Integrate AI/ML solutions with existing business systems
      through APIs and automated processes
  - Governance & Best Practices
    - Follow NIST AI Risk Management Framework principles in all
      AI development activities
    - Document model architecture, training data characteristics,
      performance metrics, and limitations for governance and
      audit requirements
    - Implement appropriate testing, validation, and error
      handling for production AI systems
    - Support compliance requirements including data privacy
      (GDPR, CCPA), export controls, and industry-specific
      regulations
    - Contribute to organizational AI standards, best practices,
      and reusable components
    - Participate in cross-functional AI review councils to assess
      proposed initiatives
    - Share knowledge through documentation, internal
      presentations, and communities of practice
    - Stay current with AI/ML advancements relevant to
      manufacturing and enterprise applications
  
  You have:
  
  - A Bachelor’s degree in Computer Science, AI/ML, Mathematics,
    or a related quantitative field; Master’s degree preferred
  - 8+ years in AI/ML engineering with demonstrable production
    deployments with measurable business value
  - Technical Skills
    - Expert proficiency in Python for ML development
    - Experience with ML frameworks and libraries such as
      TensorFlow, PyTorch, and Scikit-learn
    - Understanding of application of classical ML algorithms
      (regression, classification, clustering, ensemble
      methods)
    - Experience with model evaluation techniques, cross-
      validation, hyperparameter tuning, and performance
      metrics
    - Hands-on experience with large language models
    - Experience in prompt engineering, retrieval-augmented
      generation (RAG), and fine-tuning approaches
    - Experience implementing chatbots, document understanding, or
      automated content generation solutions
    - Experience in AI agent frameworks like LangChain, LLamaIndex
      etc
    - Experience in AI application frameworks like Streamlit,
      Gradio, FastAPI etc
    - In-depth knowledge of AWS services, including SageMaker,
      Lambda, EC2, Bedrock, and S3
    - Experience with data preprocessing, feature engineering, and
      model evaluation metrics
    - Experience with modern development practices: source
      control, CI/CD, containerization, code reviews
    - Familiarity with software engineering principles: testing,
      documentation, debugging, performance optimization
  - Soft Skills:
    - Excellent problem-solving and analytical skills.
    - Strong communication and collaboration abilities.
    - Ability to work independently and as part of a team.
    - Proven ability to manage multiple projects and meet
      deadlines.
  
  WE HAVE:
  
  - A dynamic global reach with diverse operations around the
    world that will stretch your abilities, provide plentiful
    career opportunities, and allow you to make an impact
    every day
    - nVent is a leading global provider of electrical connection
      and protection solutions. We believe our inventive
      electrical solutions enable safer systems and ensure a
      more secure world. We design, manufacture, market,
      install and service high performance products and
      solutions that connect and protect some of the world's
      most sensitive equipment, buildings and critical
      processes. We offer a comprehensive range of systems
      protection and electrical connections solutions across
      industry-leading brands that are recognized globally for
      quality, reliability and innovation.
    - Our principal office is in London and our management office
      in the United States is in Minneapolis. Our robust
      portfolio of leading electrical product brands dates
      back more than 100 years and includes nVent CADDY,
      ERICO, HOFFMAN, ILSCO, SCHROFF and TRACHTE. Learn more
      at www.nvent.com.
  
  - Commitment to strengthen communities where our employees
    live and work
    - We encourage and support the philanthropic activities of our
      employees worldwide
    - Through our nVent in Action matching program, we provide
      funds to nonprofit and educational organizations where
      our employees volunteer or donate money
  
  - Core values that shape our culture and drive us to deliver
    the best for our employees and our customers. We’re known
    for being:
    - Innovative & adaptable
    - Dedicated to absolute integrity
    - Focused on the customer first
    - Respectful and team oriented
    - Optimistic and energizing
    - Accountable for performance
  
  - Benefits to support the lives of our employees
  
  At nVent, we connect and protect our customers with
  inventive electrical solutions. People are our most valuable
  asset. Inclusion and diversity means that we celebrate and
  encourage each other’s authenticity because we understand
  that uniqueness sparks growth.
