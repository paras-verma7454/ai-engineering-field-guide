  AI Engineer
  
  Salary: £170k + Equity
  
  Company Description: Gizmo.ai - Series A edtech startup
  backed by $22M in funding
  
  Job Description: Join one of the UK's fastest-growing
  startups to build the "Duolingo for anything." Reporting
  directly to the CEO, you will leverage generative AI and
  cognitive science to transform passive learning into
  interactive, gamified experiences. You'll play a central
  role in shipping production-ready LLM features to over 1.5
  million monthly active users.
  
  Location: London, UK
  
  Why this role is remarkable:
  
  - Massive traction with 1.5M monthly active users and $5M ARR,
    scaling rapidly following a $22M Series A funding round
  - High-impact, early-stage opportunity where you report
    directly to the CEO and shape the product architecture for
    millions of global learners
  - Work at the cutting edge of AI implementation, moving beyond
    research to deploy production-grade LLM systems using
    Gemini, GPT-5, and Claude
  
  What you will do:
  
  - Design and ship production AI features using advanced prompt
    engineering and the latest models like Gemini and GPT-5
  - Build and maintain robust evaluation frameworks to
    systematically assess and improve the performance and
    grounding of AI systems
  - Integrate complex AI models into a high-performance
    TypeScript production environment, owning features from
    initial design through to deployment
  
  The ideal candidate:
  
  - Senior software engineer with 7+ years of experience and
    deep technical proficiency in TypeScript and backend
    systems
  - Practical expertise in AI/LLM implementation, including
    production work with APIs, model evaluation, or a strong
    academic ML background
  - Proven startup veteran or ex-founder who thrives in high-
    autonomy environments and prioritizes shipping impactful
    code over rigid corporate processes
  
  Who are Jack & Jill? Ok, I'll go first. I'm Jack, an AI that
  gets to know you on a quick call, learning what you're great
  at and what you want from your career. Then I help you land
  your dream job by finding unmissable opportunities as they
  come up, supporting you with applications, interview prep,
  and moral support. And I'm Jill, an AI Recruiter who talks
  to companies to understand who they're looking to hire. Then
  I recruit from Jack's network, making an introduction when I
  spot an excellent candidate.
  
  Next steps Step 1. Visit our website. Step 2. Click 'Talk to
  Jack'. Step 3. Talk to Jack so he can understand your
  experience and ambitions. Step 4. Jack will make sure Jill
  (the AI agent working for the company) considers you for
  this role. Step 5. If Jill thinks you're a great fit and her
  client wants to meet you, they will make the introduction.
  Step 6. If not, Jack will find you excellent alternatives.
  All for free.
  
  We never post fake jobs This isn't a trick. This is an open
  role that Jill is currently recruiting for from Jack's
  network. Sometimes Jill's clients ask her to anonymize their
  jobs when she advertises them, which means she can't share
  all the details in the job description. We appreciate this
  can make them look a bit suspect, but there isn't much we
  can do about it.
  
  Give Jack a spin! You could land this role. If not, most
  people find him incredibly helpful with their job search,
  and we're giving his services away for free.
