description: |
  As a Principal Software Engineer, you’ll be one of the most
  senior technical leaders shaping the future of our AI-
  powered product ecosystem: from architecting the foundations
  of next‑generation agentic and AI‑enabled experiences, to
  scaling our platform to millions of users worldwide.
  Reporting to our SVP of Engineering and collaborating
  closely with our Distinguished Engineer, you’ll set
  technical direction across a broad horizontal product space,
  guide dozens of engineering teams, and build systems from V0
  through V2 that are both innovative and production‑ready.
  This role blends high-level architectural influence with
  hands-on code contributions, tackling complex problems at
  scale and delivering capabilities that will define our
  company’s next chapter.
  
  Primary Duties:
  
  - Architect complex systems and make critical technical
    decisions.
  - Solve challenging technical problems with innovative
    solutions.
  - Mentor engineers and promote engineering excellence across
    teams.
  - Align technical strategies with business goals through
    cross-functional collaboration.
  - Contribute to technical roadmaps and strategic planning.
  - Evaluate new technologies and lead innovation initiatives.
  
  Minimum Qualifications:
  
  - BS/BTech (or higher) in Computer Science, Engineering or a
    related field required]
  - 10+ years of production-level experience as an engineer
    building highly scalable systems
  - 6+ years of experience acting as a trusted technical
    decision-maker in a team setting, solving for short-term
    and long-term business value
  - 4+ years of experience working with SQL or other database
    querying languages on large multi-table data sets
  - Experience architecting, developing, and deploying large-
    scale distributed systems at scale
  - Experience with cloud technologies, e.g., AWS, Azure, GCP
  - Experience building continuous integration and continuous
    development (CI/CD) pipelines
  - Strong familiarity with server-side web technologies (eg:
    Java, Python, Scala, C#, C++, Go)
  
