description: |
  A career that’s the whole package!
  
  At Conga, we’ve built a community where our colleagues can
  thrive. Here you’ll find opportunities to innovate and
  support growth through individual and team development, all
  within an environment where every voice is heard.
  
  Conga accelerates the customer’s journey to becoming a more
  connected and intelligent business. The Conga Advantage
  Platform is recognized worldwide for enhancing this journey,
  bringing together Configure, Price, Quote, Contract
  Lifecycle Management, and Document Automation capabilities
  on a single open platform. It integrates seamlessly with any
  ERP, CRM, and Cloud. Powered by a unified data model and
  purpose-built AI, Conga helps companies achieve a unique
  advantage—one built on seamless connection, actionable
  intelligence, and scalable growth.
  
  Our approach is grounded in the Conga Way, a framework that
  reflects our values and drives everything from hiring to
  decision-making, as well as key programs including
  recognition. Created with direct input from our colleagues,
  the Conga Way forms the foundation of our vibrant culture.
  
  Job Title: Staff Software Engineer, AI
  
  Locations: Bangalore
  
  Reports to: Sr. Manager, AI/ML.
  
  A quick snapshot…
  
  As a Staff Software Engineer, you will be a key contributor
  to the design, development, and deployment of advanced AI
  and generative AI-based products. You will drive technical
  innovation, lead complex projects, and collaborate closely
  with cross-functional teams to deliver high-quality,
  scalable, and maintainable solutions. This role requires a
  strong background in software development, AI/ML techniques,
  and DevOps practices, along with the ability to mentor
  junior engineers and contribute to strategic technical
  decisions.
  
  Why it’s a big deal…
  
  This is one of the critical roles in the project, where you
  will be an expert in product development, a good team
  player, and will lead and mentor your team members. We
  believe in using the best tools for the task at hand so the
  ability and desire to learn new programming languages and
  technologies is necessary. All of this adds up to an
  exciting, challenging, and always interesting place to work,
  where complex problems are found and solved every day. This
  role determines the root cause for the most complex software
  issues and develops practical, efficient, and permanent
  technical solutions.
  
  Are you the person we’re looking for?
  
  Experience: 8+ years of professional software development
  experience, including significant experience with AI/ML or
  GenAI applications. Demonstrated expertise in building
  scalable, production-grade software solutions.
  
  Advanced Software Development: Design, develop, and optimize
  high-quality code for complex software applications and
  systems, maintaining high standards of performance,
  scalability, and maintainability. Drive best practices in
  code quality, documentation, and test coverage.
  
  GenAI Product Development: Lead end-to-end development of
  generative AI solutions, from data collection and model
  training to deployment and optimization. Experiment with
  cutting-edge generative AI techniques to enhance product
  capabilities and performance.
  
  Technical Leadership: Take ownership of architecture and
  technical decisions for AI/ML projects. Mentor junior
  engineers, review code for adherence to best practices, and
  ensure the team follows a high standard of technical
  excellence.
  
  Project Ownership: Lead execution and delivery of features,
  managing project scope, timelines, and priorities in
  collaboration with product managers. Proactively identify
  and mitigate risks to ensure successful, on-time project
  completion.
  
  Architectural Design: Contribute to the architectural design
  and planning of new features, ensuring solutions are
  scalable, reliable, and maintainable. Engage in technical
  reviews with peers and stakeholders, promoting a product
  suite mindset.
  
  Code Review & Best Practices: Conduct rigorous code reviews
  to ensure adherence to industry best practices in coding
  standards, maintainability, and performance optimization.
  Provide feedback that supports team growth and technical
  improvement.
  
  Testing & Quality Assurance: Design and implement robust
  test suites to ensure code quality and system reliability.
  Advocate for test automation and the use of CI/CD pipelines
  to streamline testing processes and maintain service health.
  
  Service Health & Reliability: Monitor and maintain the
  health of deployed services, utilizing telemetry and
  performance indicators to proactively address potential
  issues. Perform root cause analysis for incidents and drive
  preventive measures for improved system reliability.
  
  Educational : Bachelor’s degree in computer science,
  Engineering, or a related technical field; Master’s degree
  preferred.
  
  Here’s what will give you an edge…
  
  Technical Expertise: Advanced proficiency in Python,
  FastAPI, PyTest, Celery, and other Python frameworks. Deep
  knowledge of software design patterns, object-oriented
  programming, and concurrency.
  
  Cloud & DevOps Proficiency: Extensive experience with cloud
  technologies (e.g., GCP, AWS, Azure), containerization
  (e.g., Docker, Kubernetes), and CI/CD practices. Strong
  understanding of version control systems (e.g., GitHub) and
  work tracking tools (e.g., JIRA).
  
  AI/GenAI Knowledge: Familiarity with GenAI frameworks (e.g.,
  LangChain, LangGraph), MLOps, and AI lifecycle management.
  Experience with model deployment and monitoring in cloud
  environments.
  
  Preferred Skill sets/Tools:
  
  AI & Machine Learning: Hands-on experience with advanced ML
  algorithms, including generative models, NLP, and
  transformers. Knowledge of industry-standard AI frameworks
  (e.g., TensorFlow, PyTorch) and experience with data
  preprocessing and model evaluation.
  
  Data & Analytics Tools: Proficiency with relational and
  NoSQL databases (e.g., MongoDB, MSSQL, PostgreSQL) and
  analytics platforms (e.g., BigQuery, Snowflake, Tableau).
  Experience with messaging systems (e.g., Kafka) is a plus.
  
  Testing & Quality: Experience with test automation tools
  (e.g., PyTest, xUnit) and CI/CD tooling such as Terraform
  and GitHub Actions. Strong emphasis on building resilient
  and testable software.
  
  Advanced Cloud Knowledge: Proficiency with GCP technologies
  such as VertexAI, BigQuery, GKE, GCS, and DataFlow, with a
  focus on deploying AI models at scale.
  
