description: |
  StubHub is on a mission to redefine the live event
  experience on a global scale. Whether someone is looking to
  attend their first event or their hundredth, we’re here to
  delight them all the way from the moment they start looking
  for a ticket until they step through the gate. The same goes
  for our sellers. From fans selling a single ticket to the
  promoters of a worldwide stadium tour, we want StubHub to be
  the safest, most convenient way to offer a ticket to the
  millions of fans who browse our platform around the world.
  
  StubHub is seeking a Software Engineer II to join a new
  engineering team building AI-powered consumer experiences
  that will shape the next evolution of our marketplace.
  
  This team is focused on reimagining how fans discover,
  evaluate, and purchase live events using AI-native
  capabilities embedded directly into our platform. Rather
  than layering AI onto existing workflows, we are building
  intelligent systems and modern application architectures
  that enable dynamic, adaptive, and highly personalized user
  journeys.
  
  This is a highly hands-on, fullstack role for engineers who
  enjoy building new systems from the ground up, moving
  quickly from prototype to production, and solving complex
  technical problems at scale.
  
  You’ll work on foundational AI-driven capabilities that
  power real consumer experiences used by millions of fans
  globally.
  
  Location: Hybrid (3 days in office/2 days remote) – New
  York, NY
  
  
  
  About the team:
  
  This team sits within our Consumer App Foundations
  organization and operates at the intersection of AI,
  platform engineering, and consumer product innovation.
  
  We partner closely with product, design, data science, and
  infrastructure teams to:
  
  - Build intelligent consumer-facing systems
  - Develop scalable services supporting AI-driven workflows
  - Rapidly prototype and validate new interaction models
  - Embed experimentation deeply into the product lifecycle
  - Deliver production-ready AI experiences at marketplace scale
  
  We operate with a startup mindset inside a global consumer
  platform.
  
  What You'll Do:
  
  - Design, build, test, deploy, and maintain fullstack systems
    powering AI-driven consumer features
  - Develop scalable backend services and APIs that support
    intelligent workflows
  - Build responsive frontend interfaces using modern frameworks
    (React, TypeScript)
  - Integrate AI/ML services into production environments with a
    focus on reliability and performance
  - Collaborate closely with product and design to iterate on
    early-stage ideas
  - Participate in rapid experimentation and data-driven
    iteration cycles
  - Debug production systems and continuously improve system
    quality
  
  What You've Done:
  
  - 3-5 years of professional experience in software development
  - Experience building and shipping fullstack applications
    using modern frontend frameworks (React,
    JavaScript/TypeScript) and backend technologies (C#, Java,
    Python, or similar)
  - Strong understanding of APIs, distributed systems, and
    service dependencies
  - Experience working on consumer-facing products at scale
  - Comfortable operating in ambiguous, fast-evolving
    environments
  - Proven ownership of projects from development through
    production
  
  Nice to have:
  
  - Experience integrating AI or ML-powered systems into real-
    world applications
  - Exposure to experimentation frameworks or feature flagging
    systems
  - Experience building personalization, recommendation, or
    automation features
  - Marketplace or high-scale consumer product experience
  
  What We Offer:
  
  - Accelerated Growth Environment: An environment designed for
    swift skill and knowledge enhancement, where you have the
    autonomy to lead experiments and tests on a massive scale.
  - Top Tier Compensation Package: Competitive base, equity, and
    upside that tracks with your impact.
  - Flexible Time Off: Enjoy unlimited Flex Time Off, giving you
    the flexibility to manage your schedule and take time to
    recharge as needed.
  - Comprehensive Benefits Package: Prioritize your well-being
    with a comprehensive benefits package, featuring 401k, and
    premium Health, Vision, and Dental Insurance options.
  
  The anticipated gross base pay range is below for this role.
  Actual compensation will vary depending on factors such as a
  candidate’s qualifications, skills, experience, and
  competencies. Base annual salary is one component of
  StubHub’s total compensation and competitive benefits
  package, which includes equity, 401(k), paid time off, paid
  parental leave, and comprehensive health benefits.
  
  Salary Range
  
  $165,000—$200,000 USD
  
  About Us
  
  StubHub is the world’s leading marketplace to buy and sell
  tickets to any live event, anywhere. Through StubHub in
  North America and viagogo, our international platform, we
  service customers in 195 countries in 33 languages and 49
  available currencies. With more than 300 million tickets
  available annually on our platform to events around the
  world -- from sports to music, comedy to dance, festivals to
  theater -- StubHub offers the safest, most convenient way to
  buy or sell tickets to the most memorable live experiences.
  Come join our team for a front-row seat to the action.
  
  
  
