description: |
  BeyondTrust is a place where you can bring your purpose to
  life through the work that you do, creating a safer world
  through our cybersecurity SaaS portfolio.
  
  Our culture of flexibility, trust, and continual learning
  means you will be recognized for your growth, and for the
  impact you make on our success. You will be surrounded by
  people who challenge, support, and inspire you to be the
  best version of yourself.
  
  The Role
  
  We’re looking for an Endpoint Systems Engineer with a
  passion for AI & automation, within modern device
  management. In this role, you’ll design, deploy, and
  continuously improve endpoint solutions that are
  intelligent, scalable, and secure. You’ll move beyond
  reactive support by leveraging automation, data, and AI-
  driven tools to enhance user experience and operational
  efficiency across the enterprise.  This is a hands-on
  engineering role for someone who enjoys building smart
  systems, eliminating repetitive work, and shaping the future
  of endpoint management.
  
  What You’ll Do
  
  - Design, deploy, and manage modern endpoint environments
    across Windows & macOS.
  - Implement and maintain endpoint management platforms (e.g.,
    Intune, Jamf) with a strong automation-first mindset
  - Develop automation workflows using scripting, APIs, and
    orchestration tools to reduce manual effort and improve
    reliability
  - Integrate AI-powered tools for endpoint analytics,
    remediation, security, and user experience optimization
  - Build self-healing and self-service solutions for common
    endpoint issues
  - Collaborate with security teams to enforce compliance,
    patching, and endpoint protection strategies
  - Monitor endpoint health, performance, and telemetry to
    proactively identify and resolve issues
  - Evaluate emerging AI and automation technologies and
    recommend improvements to endpoint strategy
  - Create and maintain technical documentation, standards, and
    best practices
  - Act as a technical escalation point
  
  What You’ll Bring
  
  - 4+ years of experience in endpoint engineering, desktop
    engineering, or EUC roles
  - Strong experience with modern endpoint management and
    MDM/MAM platforms
  - Proficiency in scripting and automation (PowerShell
    required; Python, Bash, or similar a plus)
  - Experience integrating systems via APIs and automating
    workflows
  - Experience in working with Claude AI
  - Solid understanding of endpoint security, identity, and
    device compliance
  - Comfortable working in cloud-first and zero-trust
    environments
  - Strong troubleshooting skills with the ability to think
    systemically
  
  Nice To Have
  
  - Experience with AI-driven IT operations (AIOps), endpoint
    analytics, or autonomous remediation tools
  - Familiarity with tools such as Microsoft Copilot, Defender,
    Autopilot, Jamf Pro, or similar
  - Relevant certifications (Microsoft, Apple, Jamf, or cloud
    certifications)
  
  Who You Are
  
  - A builder’s mindset: you love automating yourself out of
    repetitive work
  - Curiosity about how AI can improve IT operations and user
    experience
  - Strong communication skills and the ability to explain
    complex ideas clearly
  - A proactive, improvement-focused approach rather than
    reactive firefighting
  - Comfort working in fast-changing, modern IT environments
  
  Better Together
  
  Diversity. Inclusion. They’re more than just words for us.
  They are the guiding values of how we build our teams,
  cultivate leaders, and create a culture where people feel
  connected.
  
  We take care of our employees so they can take care of our
  customers. Customers who come from all walks of life just
  like us. We hire incredible people from diverse backgrounds
  because when we are different together, we are stronger
  together.
  
  About Us
  
  BeyondTrust is the global identity security leader
  protecting Paths to Privilege™. Our identity-centric
  approach goes beyond securing privileges and access,
  empowering organizations with the most effective solution to
  manage the entire identity attack surface and neutralize
  threats, whether from external attacks or insiders.
  
  BeyondTrust is leading the charge in transforming identity
  security to prevent breaches and limit the blast radius of
  attacks, while creating a superior customer experience and
  operational efficiencies. We are trusted by 20,000
  customers, including 75 of the Fortune 100, and our global
  ecosystem of partners.
  
  Learn more at www.beyondtrust.com.
  
