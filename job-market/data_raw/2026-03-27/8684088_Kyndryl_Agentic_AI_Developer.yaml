description: |
  Who We Are
  
  At Kyndryl, we run and reimagine the mission-critical
  technology systems that drive advantage for the world’s
  leading businesses.  We are at the heart of progress; with
  proven expertise and a continuous flow of AI-powered
  insight, enabling smarter decisions, faster innovation, and
  a lasting competitive edge. For our people—Kyndryls—that
  means doing purposeful work that powers human progress. Join
  us and experience a flexible, supportive environment where
  your well-being is prioritized and your potential can
  thrive.
  
  The Role
  
  We are seeking a Senior Agentic AI Developer to design,
  build, and scale intelligent, autonomous AI systems capable
  of reasoning, planning, and executing complex tasks with
  minimal human intervention. This role focuses on developing
  agentic AI architectures that integrate large language
  models (LLMs), tools, memory, workflows, and feedback loops
  to deliver real‑world business outcomes.
  
  The ideal candidate combines strong software engineering
  skills with deep expertise in AI/ML, modern LLM ecosystems,
  and distributed systems.
  
  Key ResponsibilitiesAgentic AI Design & Development
  
  - Design and implement agent-based AI systems that can reason,
    plan, act, and self‑correct.
  - Build multi‑agent workflows (collaborative, hierarchical, or
    tool‑using agents).
  - Implement memory, state management, tool orchestration, and
    long‑running agent processes.
  - Optimize prompt engineering, reasoning strategies, and
    evaluation pipelines.
  
  AI/ML & LLM Engineering
  
  - Integrate and fine‑tune LLMs (open‑source and commercial)
    for agentic use cases.
  - Apply techniques such as RAG, function calling, planning
    loops, reflection, and self‑critique.
  - Evaluate model performance, reliability, safety, and cost
    trade‑offs.
  - Stay current with advances in agentic frameworks and AI
    research.
  
  Software Engineering & Architecture
  
  - Build scalable, production‑grade AI services and APIs.
  - Design secure, fault‑tolerant, and observable systems.
  - Collaborate on system architecture, data pipelines, and
    MLOps practices.
  - Ensure high code quality through testing, reviews, and
    documentation.
  
  Collaboration & Leadership
  
  - Partner with product managers, UX, data scientists, and
    platform teams.
  - Mentor junior engineers and contribute to engineering best
    practices.
  - Translate business problems into agentic AI solutions.
  - Influence technical direction and roadmap for AI
    capabilities.
  
  Every position at Kyndryl offers a way forward to grow your
  career. You’ll have access to data, hands-on learning
  experiences, and the chance to certify in all four major
  platforms. Whether you want to broaden your knowledge base
  or narrow your scope and specialize in a specific sector,
  you can find opportunities here that you won’t find anywhere
  else.
  
  Who You Are
  
  You’re good at what you do and possess the required
  experience to prove it. However, equally as important – you
  have a growth mindset; keen to drive your own personal and
  professional development. You are customer-focused – someone
  who prioritizes customer success in their work. And finally,
  you’re open and borderless – naturally inclusive in how you
  work with others. Required Skills and Experience
  
  - 7+ years of professional software development experience,
    with 3+ years in AI/ML.
  - Strong proficiency in Python (primary) and experience with
    backend frameworks.
  - Hands‑on experience with LLMs and agentic AI frameworks
    (e.g., LangGraph, AutoGen, CrewAI, Semantic Kernel, or
    similar).
  - Experience with RAG systems, vector databases, and embedding
    pipelines.
  - Solid understanding of distributed systems, APIs, and
    cloud‑native architectures.
  - Familiarity with CI/CD, monitoring, and MLOps practices.
  - Strong understanding of NLP, prompt design, and evaluation
    techniques.
  - Experience working with structured and unstructured data.
  - Knowledge of model safety, hallucination mitigation, and
    governance.
  
  Preferred Qualifications
  
  - Experience deploying agentic AI in production environments.
  - Familiarity with Azure, AWS, or GCP AI services.
  - Experience with multi‑modal AI (text, image, audio).
  - Knowledge of security, privacy, and compliance in AI
    systems.
  - Prior leadership or technical ownership of complex AI
    initiatives.
  - Strong problem‑solving and systems‑thinking mindset.
  - Ability to explain complex AI concepts to non‑technical
    stakeholders.
  - High ownership, curiosity, and bias for action.
  - Comfortable working in fast‑evolving, ambiguous
    environments.
  
  Being You
  
  The “Kyn” in Kyndryl means kinship, which represents the
  strong bonds we have with each other, our customers and our
  communities. We focus on ensuring all Kyndryls feel included
  and we welcome people of all cultures, backgrounds, and
  experiences. Even if you don’t meet every requirement, we
  encourage you to apply. We believe in growth, and we’re
  excited to see what you can bring. At Kyndryl, employee
  feedback has told us that our number one driver of employee
  engagement is belonging. That sense of belonging — being a
  valued, respected, trusted member of the team — is
  fundamental to our culture and fueling great experiences for
  our customers. This dedication to welcoming everyone into
  our company means that Kyndryl gives you the ability to
  thrive and contribute to our culture of empathy and shared
  success. That’s The Kyndryl Way.
  
  What You Can Expect
  
  Your career with us isn’t just a job—it’s an adventure with
  purpose.  We offer a dynamic, hybrid-friendly culture that
  supports your well-being and empowers you to grow. Our Be
  Well programs are thoughtfully designed to support your
  financial, mental, physical, and social health—because we
  know that when you feel your best, you do your best.  From
  your very first day, you’ll dive into impactful work that
  powers the systems our customers rely on every day. You
  won’t just contribute—you’ll make a difference, tackling
  meaningful projects that sharpen your skills and fuel your
  growth. We’re here to champion your journey. With powerful
  tools to chart your career path, personalized development
  goals aligned with your ambitions, and continuous feedback
  to keep you inspired and on track, you’ll have everything
  you need to thrive and evolve. You’ll develop in-demand
  skills to grow your career and achieve your ambitions with
  access to cutting-edge learning opportunities—from
  certifications with Microsoft, Google, and Amazon to
  coaching and hands-on experiences. And through it all,
  you’ll be part of a culture that values empathy, restless
  learning, and a devotion to shared success. We want you to
  thrive here—and we’re committed to helping you do just that.
  Ready to make an impact? Join us and help shape what’s next.
  
  Get Referred!
  
  If you know someone that works at Kyndryl, when asked ‘How
  Did You Hear About Us’ during the application process,
  select ‘Employee Referral’ and enter your contact's Kyndryl
  email address.
