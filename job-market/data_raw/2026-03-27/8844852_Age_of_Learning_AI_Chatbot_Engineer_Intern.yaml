description: |
  Company Overview
  
  Age of Learning®is the leading developer of engaging and
  effective Pre-K through 5th grade learning resources that
  help children build a strong foundation for academic success
  and a lifelong love of learning. The company’s research-
  based curriculum, developed by education experts, includes
  the award-winningABCmouse.com®Early Learning Academy, as
  well as the adaptive, personalized school solutions,My Math
  Academy®,My Reading Academy®, andMy Reading Academy Español.
  Having served over 50 million children worldwide, Age of
  Learning is a global leader in efforts to advance equity,
  access, and opportunity for all children.
  
  Summary:
  
  This part-time summer internship offers undergraduate and
  graduate students the opportunity to work on meaningful,
  real-world projects while building practical experience in
  their field of study. If you’re eager to use your talents
  and creativity to help young learners build a strong
  foundation for academic success, this program provides a
  unique opportunity to do just that.
  
  You’ll work on exciting projects under the guidance of a
  dedicated mentor who is a subject matter expert in your area
  of interest, gaining hands-on experience while contributing
  to a mission that brings learning to life for children
  around the world. Along the way, you’ll strengthen your
  technical and problem-solving skills, collaborate cross-
  functionally, and see the direct impact of your work on
  products used by millions of learners.
  
  In this role, you'll review chatbot conversations to
  identify where the bot makes mistakes or falls short, run
  reports using built-in analytics and Excel, and collaborate
  with Support Operations on implementing improvements. You'll
  gain exposure to both structured and generative AI
  approaches, building a practical understanding of how modern
  conversational AI works in a customer support environment.
  
