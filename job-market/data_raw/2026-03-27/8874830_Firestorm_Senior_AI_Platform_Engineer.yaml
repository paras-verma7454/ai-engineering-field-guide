  Firestorm is an equal opportunity employer, committed to
  creating a diverse and inclusive workplace, and upholding
  equitable hiring practices. All qualified applicants will
  receive consideration for employment without regard to race,
  color, religion, sex, sexual orientation, gender identity,
  national origin, disability, protected veteran status, or
  any other characteristic under federal, state, or local law,
  including those with a criminal history, in a manner
  consistent with the requirements of applicable state and
