description: |
  At Netflix, our mission is to entertain the world. Together,
  we are writing the next episode - pushing the boundaries of
  storytelling, global fandom and making the unimaginable a
  reality. We are a dream team obsessed with the uncomfortable
  excitement of discovering what happens when you merge
  creativity, intuition and cutting-edge technology. Come be a
  part of what’s next.
  
  Machine Learning/Artificial Intelligence powers innovation
  in all areas of the business, from helping members choose
  the right title for them through personalization, to
  enhancing our understanding of our audience and content
  slate, to optimizing our payment processing and other
  revenue-focused initiatives. Building highly scalable and
  differentiated ML infrastructure is key to accelerating this
  innovation.
  
  The Opportunity
  
  The ML Insights & Visualizations team builds powerful tools
  and platforms that enable hundreds of AI/ML practitioners
  across Netflix to develop, deploy, and monitor business-
  critical models. Our mission is to deliver seamless,
  intuitive, and insightful experiences that boost
  productivity and innovation for teams working on
  personalization, growth, commerce, ads, content, and studio
  AI/ML algorithms.
  
  We are seeking talented Full-Stack Engineers to join us in
  developing end-to-end solutions that span UI, backend, and
  data layers. You’ll work closely with product managers, ML
  engineers, data scientists, and other cross-functional
  partners to create robust observability and visualization
  workflows for cutting-edge AI/ML models, including bandits,
  multi-task learning models, Large Language Models (LLMs),
  and other foundation models.
  
  What You’ll Do
  
  - Design & Build End-to-End Solutions: Develop and maintain
    web-based internal tools and platforms that help AI/ML
    practitioners visualize, monitor, and operate AI/ML models
    and pipelines.
  - Enhance Observability: Build and improve dashboards for
    model observability, anomaly and drift detection, cost
    monitoring, and system health.
  - Improve User Experience: Collaborate with users and
    stakeholders to gather feedback and deliver intuitive,
    seamless, and impactful user experiences.
  - Drive Product Excellence: Continuously improve our systems,
    codebase, and team processes to enhance overall
    performance. Introduce and champion best practices in
    full-stack development.
  - Cross-Functional Collaboration: Partner with engineering,
    product, and research teams distributed across multiple
    US-based time zones to deliver impactful solutions and
    drive ML/AI innovation at Netflix.
  
  Must-Have Skills
  
  - Full-Stack Development: Proficiency in modern UI frameworks
    (React preferred), JavaScript/TypeScript, Node.js, and
    building scalable backend systems (Java, Scala, or
    similar; Spring Boot or equivalent frameworks).
  - Cloud Experience: Hands-on experience with public cloud
    platforms (AWS, Azure, or GCP).
  - Data & Observability: Familiarity with ML model lifecycle
    management, logging, metrics, analytics, and building
    tools for data visualization and observability.
  - Legacy & Modernization: Experience in maintaining and
    improving legacy systems, with the ability to evaluate
    tradeoffs between refactoring, rebuilding, and buying
    solutions.
  - Strong Communication: Excellent written and verbal
    communication skills, with a proactive approach to cross-
    functional collaboration.
  - Education: BS/MS in Computer Science, Applied Math,
    Engineering, or a related field, or equivalent practical
    exp.
  
  Nice-to Have
  
  - Experience building UI tools for ML practitioners or data
    scientists.
  - Deep understanding of ML model development, deployment, and
    monitoring workflows.
  - Track record of shipping and refining products based on user
    feedback.
  - Passion for data-driven product development and improving
    engineering productivity.
  
  About You
  
  - You’re passionate about empowering others and building tools
    that create leverage for ML/AI practitioners.
  - You thrive in ambiguous environments and can deliver results
    while investing in long-term solutions.
  - You’re collaborative, value diverse perspectives, and
    contribute to a culture of inclusion and excellence.
  - You’re curious, eager to learn new technologies and domains,
    and enjoy mentoring others.
  
  Generally, our compensation structure consists solely of an
  annual salary; we do not have bonuses. You choose each year
  how much of your compensation you want in salary versus
  stock options. To determine your personal top of market
  compensation, we rely on market indicators and consider your
  specific job family, background, skills, and experience to
  determine your compensation in the market range. The range
  for this role is $388,000.00 - $558,000.00. This
  compensation range will vary based on location.
  
  Netflix provides comprehensive benefits including Health
  Plans, Mental Health support, a 401(k) Retirement Plan with
  employer match, Stock Option Program, Disability Programs,
  Health Savings and Flexible Spending Accounts, Family-
  forming benefits, and Life and Serious Injury Benefits. We
  also offer paid leave of absence programs. Full-time hourly
  employees accrue 35 days annually for paid time off to be
  used for vacation, holidays, and sick paid time off. Full-
  time salaried employees are immediately entitled to flexible
  time off. See more details about our Benefits here.
  
  Netflix is a unique culture and environment. Learn more
  here.
  
  Inclusion is a Netflix value and we strive to host a
  meaningful interview experience for all candidates. If you
  want an accommodation/adjustment for a disability or any
  other reason during the hiring process, please send a
  request to your recruiting partner.
  
  We are an equal-opportunity employer and celebrate
  diversity, recognizing that diversity builds stronger teams.
  We approach diversity and inclusion seriously and
  thoughtfully. We do not discriminate on the basis of race,
  religion, color, ancestry, national origin, caste, sex,
  sexual orientation, gender, gender identity or expression,
  age, disability, medical condition, pregnancy, genetic
  makeup, marital status, or military service.
  
  Job is open for no less than 7 days and will be removed when
  the position is filled.
