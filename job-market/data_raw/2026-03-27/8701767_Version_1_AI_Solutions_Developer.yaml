  Job Description
  
  Responsibilities
  
  - Build pilot solutions and proof‑of‑concepts (PoCs) for a
    variety of AI use cases
  - Create and maintain demo environments for enablement and
    presales activities
  - Develop enablement content and technical guides for AI tools
    and platforms
  - Support innovation pilots with hands‑on development and
    technical execution
  - Contribute technical content to the AI playbook and delivery
    frameworks
  - Ensure all solutions include complete documentation such as
    architecture diagrams and deployment guides
  
  Qualifications
  
  Skills & Experience
  
  - Need 3-5 years of experience
  - Strong software development background with experience
    building AI‑powered applications
  - Familiarity with Azure AI services, OpenAI APIs, or
    comparable AI platforms
  - Ability to rapidly prototype and deliver functional PoC
    solutions
  - Experience creating high‑quality technical documentation,
    guides, and enablement materials
  - Understanding of cloud deployment patterns and
    infrastructure‑as‑code practices
  - Strong communication skills, with the ability to translate
    complex technical work for non‑technical audiences
  - Comfortable working in ambiguous environments and managing
    multiple parallel workstreams
  
