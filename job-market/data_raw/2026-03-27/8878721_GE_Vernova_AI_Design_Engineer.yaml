description: |
  Job Description SummaryThe AI Design Engineer will lead the
  technical development and deployment of advanced AI, machine
  learning, and GenAI solutions across the nuclear and energy
  domains. This role requires deep expertise in model
  development, pre-training, and implementation of AI
  algorithms—including vision AI, predictive analytics, LLM-
  based applications, and anomaly detection. The engineer will
  work closely with domain experts to translate operational
  challenges into AI-solvable problems, prototype models,
  validate performance, and support integration with
  enterprise systems. Strong Python and data science skills,
  familiarity with cloud AI platforms, and experience with
  MLOps pipelines are essential. This role is critical to
  delivering high-impact technical solutions across diverse
  business use cases such as factory vision systems, error
  analysis, and procedural automation.
  
  Job Description
  
  Responsibilities:
  
  In this role, you will:
  
  - Develop custom tools and utilities to enhance the generative
    AI pipeline. These tools may include data preprocessing
    scripts, model evaluation dashboards, and content
    visualization interfaces.
  - Streamline repetitive tasks by automating processes,
    improving efficiency, and reducing manual intervention.
  - Collaborate with QA engineers to design comprehensive test
    suites for the generative AI models.
  - Write unit tests to validate individual components, ensuring
    robustness and reliability.
  - Work closely with data scientists to create diverse and
    effective prompts for the generative models.
  - Participate in prompt fine-tuning experiments to improve
    model performance.
  - Integrate generative AI models into existing applications
    and services via APIs.
  - Ensure seamless deployment across various platforms,
    including cloud environments.
  - Cross-Functional Communication: Collaborate with data
    engineers, DevOps, and product teams to align project
    goals.
  - Maintain clear and concise documentation for tools, APIs,
    and integration procedures
  
  Required Qualifications:
  
  - Minimum of a Bachelor's Degree in Computer Science, Data
    Science, or related quantitative field.
  - Minimum of 5 years of experience in AI ,Data Science and/or
    Software Engineering.
  
  Eligibility:
  
  - The preferred work location for this role is at the GEH
    Headquarters in Wilmington, NC; but highly qualified (US
    based) remote candidates will be considered.
  - This role requires access to U.S. export-controlled
    information. If applicable, final offers will be
    contingent on ability to obtain authorization for access
    to U.S. export-controlled information from the U.S.
    Government.
  
  Desired Qualifications:
  
  Technical Expertise:
  
  - Strong proficiency in Python.
  - Strong understanding of statistical modeling, machine
    learning algorithms (e.g., regression, classification,
    clustering, deep learning), and experimental design.
  - Deep expertise in model development, pre-training, and
    implementation of AI algorithms—including vision AI,
    predictive analytics, LLM-based applications, and anomaly
    detection.
  - Familiarity with cloud AI platforms, and experience with
    MLOps pipelines are essential.
  - Experience with SQL and working with relational and/or NoSQL
    databases.
  - Experience using modern development tooling such as Git and
    testing frameworks.
  - General understanding of the impacts of technology choice to
    the software development life.
  - Aware of methods and practices such as Lean/Agile/XP, etc.
  - General understanding of the impacts of technology choice to
    the software development life cycle.
  
  Business Acumen:
  
  - Has the ability to break down problems and estimate time for
    development tasks.
  - Understands the technology landscape, up to date on current
    technology trends and new technology, brings new ideas to
    the team.
  - Displays understanding of the project's value proposition
    for the customer. Shows commitment to deliver the best
    value proposition for the targeted customer.
  - Learns organization vision statement and decision-making
    framework. Able to understand how team and personal
    goals/objectives contribute to the organization vision.
  
  Personal/Leadership Attributes:
  
  - Voices opinions and presents clear rationale. Uses data or
    factual evidence to influence.
  - Learns organization vision statement and decision-making
    framework. Able to understand how team and personal
    goals/objectives contribute to the organization vision.
  - Completes assigned tasks on time and with high quality.
    Takes independent responsibility for assigned
    deliverables.
  - Has the ability to break down problems and estimate time for
    development tasks.
  - Seeks to understand problems thoroughly before implementing
    solutions. Asks questions to clarify requirements when
    ambiguities are present.
  - Identifies opportunities for innovation and offers new
    ideas. Takes the initiative to experiment with new
    software frameworks
  - Adapts to new environments and changing requirements. Pivots
    quickly as needed. When coached, responds to need & seeks
    info from other sources
  - Write code that meets standards and delivers desired
    functionality using the technology selected for the
    project.
  
  This role requires access to U.S. export-controlled
  information. If applicable, final offers will be contingent
  on ability to obtain authorization for access to U.S.
  export-controlled information from the U.S. Government.
  
