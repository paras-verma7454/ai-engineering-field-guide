description: |
  Role Overview
  
  We are seeking a Solutions Engineer (Customer Deployments &
  AI Automation) to join our team. In this role, you’ll be on
  the front lines with our enterprise customers—building
  intelligent agents, guiding them through onboarding,
  configuring automations, and helping them extract maximum
  value from Statisfy’s platform. You’ll serve as the bridge
  between our customers and product, ensuring smooth
  deployments and delivering business insights that drive
  impact.
  
  What You’ll Do
  
  - Agent Development: Build AI agents within Statisfy’s Agent
    Studio to handle onboarding flows, account health
    monitoring, risk detection, and proactive recommendations.
  - Workflow Automations: Configure and customize workflow
    automations using Statisfy’s Workflow Agent Studio to
    match customer business processes.
  - Enterprise Onboarding: Lead the technical onboarding process
    for new enterprise customers, including integration of
    CRM, support, product usage, and communication systems.
  - BI & Reporting: Design and deliver dashboards, KPIs, and BI
    reports that surface customer insights, adoption trends,
    and ROI metrics.
  - Customer Advocacy: Serve as the technical expert during
    onboarding and beyond, helping customers understand best
    practices and ensuring they achieve measurable success
    with Statisfy.
  - Feedback Loop: Collaborate closely with Product and
    Engineering teams by bringing back insights from the field
    to shape roadmap priorities.
  
  What We’re Looking For
  
  - 3+ years of experience in a customer-facing technical role
    (Forward Deployed Engineer, Solutions Engineer, Customer
    Success Engineer, or similar).
  - Hands-on coding experience is mandatory. You should be
    comfortable writing scripts, working with APIs, debugging
    issues, and building technical solutions independently.
  - Strong knowledge of SaaS systems and integrations (CRM,
    support platforms, BI tools, data pipelines).
  - Experience with workflow automation platforms, scripting, or
    low-code/no-code environments.
  - Comfort working with SQL and BI tools (e.g., Looker,
    Tableau, Superset, Cube.js).
  - Bonus: familiarity with LLM agents, LangChain/LlamaIndex, or
    similar frameworks.
  - Excellent communication skills—you’re as comfortable leading
    a customer workshop as you are writing a technical guide.
  - Problem-solving mindset: you thrive in dynamic environments
    and can adapt quickly to enterprise customer needs.
  
  Why Join Us
  
  - Work at the frontier of AI-powered Customer automation and
    shape how enterprises manage customer relationships.
  - High-impact role with direct customer interaction and
    influence on product direction.
  - Collaborative, fast-paced startup culture with significant
    growth opportunities.
  - Competitive compensation, benefits, and equity.
