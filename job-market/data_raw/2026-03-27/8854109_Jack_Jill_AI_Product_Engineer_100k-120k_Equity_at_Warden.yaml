description: |
  This is a job that Jill, our AI Recruiter, is recruiting for
  on behalf of one of our customers. She will pick the best
  candidates from Jack's network
  
  The next step is to speak to Jack.
  
  Job Title: Product Engineer
  
  Salary: £100k-120k+ + Equity
  
  Company Description: Warden AI - VC-backed AI Assurance
  platform
  
  Job Description: As a founding-tier engineer at Warden AI,
  you will build the core architecture of a platform ensuring
  AI fairness and transparency. Partnering directly with the
  CTO (ex-Monzo Staff Engineer), you will own the full
  lifecycle—from prototyping fairness modules to hardening
  production-grade compliance reporting for global enterprise
  HR vendors.
  
  Location: London, UK
  
  Why this role is remarkable:
  
  - Join a high-calibre founding team with leadership experience
    from Monzo and Onfido, backed by top-tier investors
    including Playfair Capital and founders of Codat and
    Revolut.
  - Solve a mission-critical global problem as regulation like
    the EU AI Act and NYC bias laws move from guidance to
    strict enforcement.
  - High-autonomy environment where you influence the tech stack
    and leverage cutting-edge AI tools like Cursor and Claude
    to ship impactful features at pace.
  
  What you will do:
  
  - Design and ship end-to-end features using TypeScript, React,
    and Python to analyze large datasets for AI bias and
    factual accuracy.
  - Partner directly with customers to implement reliable API
    connectors and tailor integration strategies for leading
    AI talent platforms.
  - Build automated data pipelines and instrumented monitoring
    to generate real-time audit reports and public trust
    dashboards for enterprise clients.
  
  The ideal candidate:
  
  - A versatile product-minded generalist with a track record of
    shipping production-grade services and data pipelines in
    high-growth startup environments.
  - Technically proficient in TypeScript, Next.js, and Python,
    with a pragmatic approach to balancing rapid prototyping
    with robust, maintainable architecture.
  - Exceptional communicator who thrives in ambiguity and is
    excited to shape the future of responsible AI through
    fairness and transparency.
  
  Who are Jack & Jill? Ok, I'll go first. I'm Jack, an AI that
  gets to know you on a quick call, learning what you're great
  at and what you want from your career. Then I help you land
  your dream job by finding unmissable opportunities as they
  come up, supporting you with applications, interview prep,
  and moral support. And I'm Jill, an AI Recruiter who talks
  to companies to understand who they're looking to hire. Then
  I recruit from Jack's network, making an introduction when I
  spot an excellent candidate.
  
  Next steps Step 1. Visit our website. Step 2. Click 'Talk to
  Jack'. Step 3. Talk to Jack so he can understand your
  experience and ambitions. Step 4. Jack will make sure Jill
  (the AI agent working for the company) considers you for
  this role. Step 5. If Jill thinks you're a great fit and her
  client wants to meet you, they will make the introduction.
  Step 6. If not, Jack will find you excellent alternatives.
  All for free.
  
  We never post fake jobs This isn't a trick. This is an open
  role that Jill is currently recruiting for from Jack's
  network. Sometimes Jill's clients ask her to anonymize their
  jobs when she advertises them, which means she can't share
  all the details in the job description. We appreciate this
  can make them look a bit suspect, but there isn't much we
  can do about it. Give Jack a spin! You could land this role.
  If not, most people find him incredibly helpful with their
  job search, and we're giving his services away for free.
