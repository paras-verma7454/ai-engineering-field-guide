description: |
  Airbnb was born in 2007 when two hosts welcomed three guests
  to their San Francisco home, and has since grown to over 5
  million hosts who have welcomed over 2 billion guest
  arrivals in almost every country across the globe. Every
  day, hosts offer unique stays and experiences that make it
  possible for guests to connect with communities in a more
  authentic way.
  
  The Community You Will Join:
  
  Airbnb is a mission-driven company dedicated to helping
  create a world where anyone can belong anywhere. It takes a
  unified team committed to our core values to achieve this
  goal. Airbnb's various functions embody the company's
  innovative spirit and our fast-moving team is committed to
  leading as a 21st century company.
  
  The Difference You Will Make:
  
  Our mission is to make every Airbnb engineer's day better by
  building world-class developer infrastructure that removes
  friction and provides the tools to unlock their best work.
  The Dev AI team specifically builds the foundational AI
  tooling and infrastructure that powers developer
  productivity across the entire software development
  lifecycle, also providing the building blocks for teams
  across the company to quickly and simply create their own
  domain-specific AI tools. We currently serve as both a
  platform team and an internal AI consultancy for partner
  teams building their own internally-facing AI-powered
  solutions.
  
  In this role, you will help to shape and execute the
  technical direction of the team's infrastructure and
  products. You'll work across a range of exciting problem
  spaces, from agentic coding tools and asynchronous AI
  workflow platforms, to SDKs for rapid internal AI app
  development and AI-assisted code migration. At Airbnb, you
  won't just build AI tools; your work will shape how
  individuals across the company work every day. The tools you
  create will directly accelerate the pace of innovation
  across our entire product surface.
  
  We're a collaborative, low-ego, and highly-visible team that
  values experimentation, learning, and shipping. We celebrate
  what works and learn quickly from what doesn't. Given the
  rapid evolution of AI, we strive to operate with startup-
  like agility, iterating swiftly to evaluate and incorporate
  the most recent AI technologies into our developer tooling.
  If you enjoy building, collaborating across teams, thrive
  when given high autonomy, and are motivated to make the
  lives of other developers easier and more enjoyable, we’d
  love to hear from you.
  
  A Typical Day:
  
  - Help shape and drive our AI for Developers strategy, from
    ideation through shipping, while bringing strong sense of
    ownership and coding across various stacks
  - Make pragmatic architectural and technical decisions,
    balancing ambition with real-world constraints and long-
    term operability
  - Stay current on the rapidly evolving AI tooling landscape,
    and help the team balance innovation with incremental,
    measurable developer impact
  - Serve as a champion, expert, coach, and consultant to
    empower teams and leaders across the company to adopt and
    leverage new AI capabilities in their day to day workflows
  - Champion engineering excellence through high-quality code,
    thoughtful design, and reliable systems
  - Participate in on-call rotations and drive operational
    excellence for the team's platform components
  
  Your Expertise:
  
  - 9+ years industry experience (or equivalent depth of
    expertise)
  - Prior experience building developer infrastructure, tooling,
    or platforms, ideally at scale and with tools, frameworks,
    or systems commonly used in the industry
  - Hands-on experience applying AI technologies to real-world
    software development challenges
  - A track record of quickly ramping up in new domains,
    technologies, or languages — and a genuine excitement for
    continuous learning
  - Demonstrated success partnering cross-functionally, with
    excellent written and verbal communication skills
  - Proficiency in one or more of Go, Python, Typescript, or
    Kotlin
  - Bachelor’s and/or Master’s degree or equivalent experience
  
  Your Location:
  
  This position is US - Remote Eligible. The role may include
  occasional work at an Airbnb office or attendance at
  offsites, as agreed to with your manager. While the position
  is Remote Eligible, you must live in a state where Airbnb,
  Inc. has a registered entity. Click here for the up-to-date
  list of excluded states. This list is continuously evolving,
  so please check back with us if the state you live in is on
  the exclusion list. If your position is employed by another
  Airbnb entity, your recruiter will inform you what states
  you are eligible to work from.
  
  Our Commitment To Inclusion & Belonging:
  
  Airbnb is committed to working with the broadest talent pool
  possible. We believe diverse ideas foster innovation and
  engagement, and allow us to attract creatively-led people,
  and to develop the best products, services and solutions.
  All qualified individuals are encouraged to apply.
  
  We strive to also provide a disability inclusive application
  and interview process. If you are a candidate with a
  disability and require reasonable accommodation in order to
  submit an application, please contact us at:
  reasonableaccommodations@airbnb.com. Please include your
  full name, the role you’re applying for and the
  accommodation necessary to assist you with the recruiting
  process.
  
  We ask that you only reach out to us if you are a candidate
  whose disability prevents you from being able to complete
  our online application.
  
  How We'll Take Care of You:
  
  Our job titles may span more than one career level. The
  actual base pay is dependent upon many factors, such as:
  training, transferable skills, work experience, business
  needs and market demands. The base pay range is subject to
  change and may be modified in the future. This role may also
  be eligible for bonus, equity, benefits, and Employee Travel
  Credits.
  
  Pay Range
  
  $204,000—$255,000 USD
