description: |
  ✨ Overview
  
  Tetrix is a fast-growing startup on a mission to empower
  institutional investors to confidently invest in alternative
  markets (think Bloomberg, but for private markets). Our AI-
  native product transforms messy, unstructured private market
  data into real-time insights, combining automated document
  retrieval, AI-powered data extraction, and on-demand
  portfolio analytics - all in one seamless platform. We are
  growing quickly to becoming a category-defining product, and
  are working with some of the world's leading capital
  allocators. This is a unique opportunity to join a talented
  and driven team that wants to build next-generation
  infrastructure in financial markets, and is backed by
  stellar investors that include Innovation Endeavors, Eric
  Schmidt’s VC firm, and angels from BlackRock, CPPIB,
  SoftBank, Lending Club, and Plaid.
  
  🤷🏽️ Who we are
  
  We are a small but mighty startup with deep industry
  background and expertise in both financial markets and
  modern technologies. We’ve worked hard to build a culture of
  trust, high ownership, and curiosity—where everyone feels
  empowered to contribute, challenge ideas, and grow together.
  We are led by our two co-founders, Olivier (CEO) & Naunidh
  (CTO), who met on the first day of school whilst pursuing
  their MBAs at Stanford and co-founded Tetrix in the Summer
  of 23.
  
  🤞🏽 Who you are
  
  - You’re proactive and hands-on – someone who takes
    initiative, figures things out, and keeps things moving.
  - You learn and adapt quickly – someone who approaches
    problems with creativity and energy, and is resourceful,
    adaptable and excited by tough challenges.
  - You’re customer-oriented – whether you’re making backend
    decisions or improving UI, you keep the customer in mind
    and push for delightful experiences.
  - You’re collaborative – someone who values transparency, good
    communication, and knows that the best outcomes come from
    working well with others.
  - You’re experienced and thoughtful – we are looking for folks
    with 5+ years of work experience in AI/ML, ideally in
    fast-paced or entrepreneurial environments. Bonus points
    if you’ve contributed to open source.
  
  💻 What you’ll do
  
  - You’ll build – You’ll contribute across our tech stack - our
    SaaS product, data pipelines, AI agents, telemetry
    infrastructure, and more.
  - You’ll brainstorm – We’re not looking for someone to just
    take tickets—we want you in the room helping us shape
    product direction and tech strategy.
  - You’ll work with clients – From pitching customers, to
    designing features, to soliciting feedback, you’ll do some
    non-engineering work. We believe in all-rounded team
    members.
  - You’ll champion best practices and guide others – As a B2B
    SaaS platform, our technology needs to be secure, robust
    and scalable. You’ll help set and maintain standards and
    mentor future team members.
  
  🙌🏾 Why join us
  
  - You’ll have real impact - We are at an inflection point -
    your work will directly shape our product, team, and
    company trajectory.
  - You’ll be supported - We’re committed to helping you do your
    best work and grow both professionally and personally.
  - You’ll be rewarded - Competitive salary, meaningful equity,
    and benefits including unlimited vacation, healthcare, and
    retirement plans.
  - You’ll grow fast - We move quickly, think deeply, and
    believe in learning through doing. You’ll be surrounded by
    smart, driven, kind people.
  - You’ll have fun - Shipping is inherently fun, winning is
    even more fun, and when all else fails, we have plenty of
    fun in and out of the office.
  
  🫶🏽 One more thing
  
  If this role sounds exciting but you’re second-guessing
  whether you’re “qualified” enough—please apply. Great talent
  doesn’t always fit neatly into a checklist, and we know that
  underrepresented folks often underestimate their fit. We
  care more about the ideas you bring, your ability to learn,
  and your enthusiasm for the work than about whether your
  resume matches every bullet point. The company we’re
  building will shape how financial systems work for years to
  come. That’s why we’re committed to building a team with
  diverse voices, perspectives, and lived experiences.
  Diversity isn’t a nice-to-have—it’s a must-have. And we’d
  love to have you be part of that.
