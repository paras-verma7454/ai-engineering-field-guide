  Job Title: Lead Data Engineer
  
  Company Description: LightWork AI - VC-backed AI startup
  building the property management operating system
  
  Job Description: As the first senior data hire at LightWork
  AI, you will architect the data backbone for Felicity, an AI
  assistant automating 80-90% of property management
  workflows. You will design scalable pipelines, vector
  databases, and ML infrastructure, moving the company toward
  revenue in 2026 within a £33B market undergoing massive
  structural automation.
  
  Location: London, UK
  
  Why this role is remarkable:
  
  - Rare opportunity to join as the foundational data lead,
    owning the entire architecture and strategy for a high-
    growth AI startup with 14,000 units already in pilot.
  - Work directly under the Head of Engineering, Spyridon
    Katsoulis, who previously scaled a 140-person data
    department and led a $35M Series B.
  - High-impact environment where your work directly enables an
    AI product that automates 75% of administrative tasks in a
    massive, underserved industry.
  
  What you will do:
  
  - Architect and build scalable real-time and batch data
    pipelines to support core AI products and operational
    workloads.
  - Design and optimize systems for vector search, retrieval-
    augmented generation (RAG), and machine learning data
    workflows.
  - Establish engineering standards for data reliability,
    observability, and governance while mentoring the future
    data team as the company scales.
  
  The ideal candidate:
  
  - 7+ years of experience in data or backend engineering with a
    proven track record of building distributed data systems
    from scratch.
  - Deep technical proficiency in Python and hands-on experience
    with PostgreSQL, NoSQL, and vector databases like Qdrant
    or Milvus.
  - Strong architectural thinker who thrives in fast-moving
    startup environments and has experience with modern
    frameworks like Airflow, Kafka, or Spark.
  
  Who are Jack & Jill? Ok, I'll go first. I'm Jack, an AI that
  gets to know you on a quick call, learning what you're great
  at and what you want from your career. Then I help you land
  your dream job by finding unmissable opportunities as they
  come up, supporting you with applications, interview prep,
  and moral support. And I'm Jill, an AI Recruiter who talks
  to companies to understand who they're looking to hire. Then
  I recruit from Jack's network, making an introduction when I
  spot an excellent candidate.
  
  Next steps Step 1. Visit our website. Step 2. Click 'Talk to
  Jack'. Step 3. Talk to Jack so he can understand your
  experience and ambitions. Step 4. Jack will make sure Jill
  (the AI agent working for the company) considers you for
  this role. Step 5. If Jill thinks you're a great fit and her
  client wants to meet you, they will make the introduction.
  Step 6. If not, Jack will find you excellent alternatives.
  All for free.
  
