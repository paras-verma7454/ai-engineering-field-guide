  About Us
  
  KlearNow.AI is on a mission to futurize global trade. Our
  patented AI and machine learning platform digitizes and
  contextualizes unstructured trade documents to unlock real-
  time shipment visibility, drive smart analytics, and provide
  critical business intelligence—without the hassle of complex
  integrations.
  
  We empower supply chains to move faster, work smarter, and
  make data-driven decisions with confidence. With operations
  in the U.S., Canada, U.K., Spain, and the Netherlands—and
  aggressive growth plans underway—we’re scaling a global
  platform for the future of logistics.
  
  
  
  We achieve our goals by assembling a team of the best
  talents. As we expand, it's crucial to maintain and
  strengthen our culture, which places a high value on our
  people and teams. Our collective growth and triumphs are
  intrinsically linked to the success and well-being of every
  team member
  
  OUR VISION
  
  To empower people and optimize processes with AI-powered
  clarity.
  
  YOUR MISSION
  
  We’re building a team of bold thinkers, problem solvers, and
  storytellers. As part of our high-energy, inclusive
  workplace, you’ll challenge the status quo of traditional
  supply chains and help shape a more transparent,
  intelligent, and efficient world of trade.
  
  Whether you're a product innovator, logistics expert, or
  marketing storyteller—your work at KlearNow.AI will make a
  measurable impact.
  
  Why Klearnow.ai
  
  Global Impact: Be part of a platform live in five countries
  and expanding rapidly.
  
  Fast-Growing SaaS Company: Work in an agile environment with
  enterprise backing.
  
  Cutting-Edge Tech: AI-powered customs clearance, freight
  visibility, document automation, and drayage
  intelligence—all in one.
  
  People-First Culture: We invest in our team’s growth and
  well-being.
  
  Make Your Mark: Shape the future of trade with your ideas
  and energy.
  
  
  
  Responsibilities
  
  
  
  ·
  
  Develop innovative AI solutions for challenging business
  problems.
  
  Discover data sources, get access to them, import them,
  clean them up, and make them “machine learning ready”.
  
  Build backend systems that interact with other
  microservices.
  
  Train and optimize machine learning models.
  
  Engineer machine intelligence systems and infrastructure for
  real-world production use at scale.
  
  Explore data features and manipulate data with SQL and
  scripts.
  
   Familiarity with machine learning frameworks (like Keras or
  PyTorch) and libraries (like Scikit-learn)
  
  Should be able to understand the problem statement and be
  able to justify the usage of AI/ML as a solution
  
  Be able to quickly prototype and provide results
  
  Be able to understand requirements and fine tune them to
  provide results for concrete problems
  
  
  
  Key Qualifications
  
  
  
  
  
  Strong coding experience in Python and working with related
  libraries (NumPy/Pandas/matplotlib).
  
  Familiarity with machine learning frameworks
  (Keras/PyTorch/Tensorflow) and relevant libraries.
  
  Excellent knowledge and good practical skills in major ML
  algorithms as applied to Natural Language Processing and
  Computer Vision.
  
  Practical experience with deep learning projects is highly
