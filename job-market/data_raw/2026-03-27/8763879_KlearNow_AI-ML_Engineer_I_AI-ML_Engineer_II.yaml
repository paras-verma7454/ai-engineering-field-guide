  Ability to improve the accuracy, runtime, scalability and
  reliability of machine intelligence systems.
  
  Strong in understanding underlying math and algorithms.
  
  Passion for continuing to learn state-of-the-art techniques
  in ML/Data science.
  
  
  
  
  
  
  
