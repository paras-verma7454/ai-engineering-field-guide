  for those residing in the United States.
  
  Additional information about E-Verify can be found here.
  
  #LI-Remote
  
  To be considered for any position at Phaidra, you must
  submit an online application. This role will remain open
  until it is filled.
  
  Phaidra only hires individuals who are legally authorized to
  work in the specified location(s) above. We do not provide
  employment sponsorship. Candidates requiring visa
  sponsorship, either now or in the future, are not eligible
  for hire.
  
  WE DO NOT ACCEPT APPLICATIONS FROM RECRUITERS.
