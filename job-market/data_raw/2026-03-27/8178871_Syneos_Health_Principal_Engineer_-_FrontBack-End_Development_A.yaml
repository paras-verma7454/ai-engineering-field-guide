  Job Responsibilities
  
  Job Summary
  
  The Principal Engineer provide advance level leadership and
  designs, develops, and delivers clean maintainable solutions
  based on Big Data applications that fulfill the strategic
  vision for enterprise while driving business value and
  innovation. Performs the full deployment lifecycle, using
  Azure Cloud Technologies, including installation,
  configuration, initial production deployment, recovery,
  security and data governance for Data Lake. Evaluates and
  provides technical solutions to design, develop, and support
  as required in a lead role for business units wishing to
  implement a Big Data solution. Refines raw data into
  actionable insight using visualization and statistics with
  innovative analytics applications and systems. Develops
  applications that can interact with the data in the most
  appropriate way, from batch to interactive SQL.
  
  Core Responsibilities
  
  • Provide technical leadership and guidance to teams and
  clients throughout the solution lifecycle. Troubleshoot and
  resolve complex issues related to Cloud based Data Lake and
  Data Mesh environments. Stay current with emerging
  technologies and trends and recommend best practices. •
  Design, develop, and implement scalable and secure cloud
  solutions for Big Data Platforms interfacing with API, file,
  SQL databases. Architect and optimize data pipelines using
  distributed cloud computing to ensure that they support high
  volume / high velocity data streams and are scalable to meet
  growth expectations • Develop guidelines and plans for
  performance tuning of a Big Data /NoSQL environment with
  underlying impact analysis of distributed jobs to enhance
  data processing, analytics, and machine learning
  capabilities. Implement a mixed batch/near-real time
  architecture to analyze, index, and publish data for
  applications. Develop and implement strategies for data
  governance, security, and compliance. • Create and maintain
  comprehensive documentation for solution designs,
  configurations, and best practices. Provide training and
  support to clients and internal teams on solution
  architecture. Engage with clients to understand their
  business needs and deliver tailored cloud solutions. Conduct
  presentations, demos, and workshops to showcase Data Lake
  Capabilities
  
  Qualifications • Bachelor’s degree in computer science,
  Engineering, or a related field; advanced degree preferred.
  
  • Experience in Oracle APEX migrating to newer stacks
  
  • Experience utilizing and leveraging modern data and cloud
  technologies, like Snowflake, SQL Server, Tableau, Power BI,
  and Azure.
  
  • Strong experience with JavaScript & Node.js. Experience
  with Sveltekit, React.js, Next.js, Python or React Native
  desired. • SME in cloud engineering or solution architecture
  with a focus on Azure and related capabilities. Demonstrated
  ability to engage both developers and business partners to
  achieve target outcomes • Experience with DevOps and best
  practices for Coding in a distributed Cloud environment.
  Command of Data Movement, Analysis, Modeling best practices.
  • Excellent written and verbal communications; Solid written
  and oral presentation skills • Excellent problem-solving
  skills, strong communication abilities, and the ability to
  work collaboratively in a team environment. Demonstrated
  ability to define business use cases and measure /
  communicate proposed project benefits
  
