description: |
  Job Requisition ID #
  
  26WD94547
  
  Position Overview Autodesk is building an AI-first
  application platform that delivers a cohesive, unified
  experience across our products—improving how users and
  internal teams work in a modern, workflow-driven workspace.
  To power this vision, we are growing our Pune team to build
  scalable services and core platform capabilities used across
  products. In this role, you will drive architectural
  decisions, establish engineering best practices, and deliver
  high-impact, long-term initiatives that improve the
  platform’s reliability, resiliency, and scalability.
  Responsibilities
  
  
  - Drive the technical vision and architecture for large-scale,
    distributed collaboration systems
  - Diagnose complex system issues and deliver iterative, well-
    designed solutions
  - Participate in and lead design and code reviews, upholding
    engineering best practices
  - Automate cloud infrastructure, CI/CD pipelines, testing, and
    observability
  - Provide technical leadership and mentor engineers while
    fostering an inclusive, collaborative team culture
  
  Minimum Qualifications
  
  
  - 5–8 years of experience designing and building large-scale,
    backend distributed systems in cloud environments
  - Strong proficiency in Node.js and TypeScript, with a focus
    on writing high-quality, maintainable, and testable code
  - Deep experience with AWS, including cloud-native services,
    infrastructure-as-code, containers, and automation (e.g.,
    Terraform, CI/CD)
  - Solid understanding of distributed system fundamentals,
    NoSQL databases, and non-functional requirements such as
    performance, scalability, and resiliency
  - Proven ability to operate effectively in Agile environments,
    contribute to technical design discussions, and make
    sound, data-driven engineering decisions
  - Bachelor’s degree in computer science/engineering (or
    equivalent practical experience
  
  Preferred Qualifications
  
  
  - Experience building AI-assisted or workflow automation
    features (including agent-style workflows)
  - Exposure to Amazon Bedrock, SageMaker, or other ML/LLM
    platforms
  - Familiarity with LLM application patterns (tool calling,
    RAG, evaluation, guardrails)
  
