description: |
  AI/ML Cloud Application Developer
  
  
  
  This role has been designed as ‘Hybrid’ with an expectation
  that you will work on average 2 days per week from an HPE
  office.
  
  Who We Are:
  
  Hewlett Packard Enterprise is the global edge-to-cloud
  company advancing the way people live and work. We help
  companies connect, protect, analyze, and act on their data
  and applications wherever they live, from edge to cloud, so
  they can turn insights into outcomes at the speed required
  to thrive in today’s complex world. Our culture thrives on
  finding new and better ways to accelerate what’s next. We
  know varied backgrounds are valued and succeed here. We have
  the flexibility to manage our work and personal needs. We
  make bold moves, together, and are a force for good. If you
  are looking to stretch and grow your career our culture will
  embrace you. Open up opportunities with HPE.
  
  Job Description:
  
  
  
  In the HPE Hybrid Cloud, we lead the innovation agenda and
  technology roadmap for all of HPE. This includes managing
  the design, development, and product portfolio of our next-
  generation cloud platform, Green Lake. Working with
  customers, we help them reimagine their information
  technology needs to deliver a simple, consumable solution
  that helps them drive their business results. Join us
  redefine what’s next for you
  
  Job Family Definition:
  
  The Cloud Developer builds from the ground up to meet the
  needs of mission-critical applications, and is always
  looking for innovative approaches to deliver end-to-end
  technical solutions to solve customer problems. Brings
  technical thinking to break down complex data and to
  engineer new ideas and methods for solving, prototyping,
  designing, and implementing cloud-based solutions.
  Collaborates with project managers and development partners
  to ensure effective and efficient delivery, deployment,
  operation, monitoring, and support of Cloud engagements. The
  Cloud Developer provides business value expertise to drive
  the development of innovative service offerings that enrich
  HPE's Cloud Services portfolio across multiple systems,
  platforms, and applications.
  
  Management Level Definition:
  
  Contributions include applying an intermediate level of
  subject matter expertise to solve common technical problems.
  Acts as an informed team member providing analysis of
  information and recommendations for appropriate action.
  Works independently within an established framework and with
  moderate supervision.
  
  What you'll do:
  
  - Design simple to moderate AI/ML based cloud application
    features as per specifications.
  - Should know the AI/ML technologies and have hands-on
    experience with GenAI-based software development
  - Develops and maintains GenAI / cloud application modules
    adhering to security policies.
  - Designs test plans, develops, executes, and automates test
    cases for assigned portions of the developed code.
  - Deploys code and troubleshoots issues in application modules
    and the deployment environment.
  - Shares and reviews innovative technical ideas with peers,
    high-level technical contributors, technical writers, and
    managers.
  - Analyses science, engineering, business, and other data
    processing problems to develop and implement solutions to
    complex application problems, system administration
    issues, or network concerns.
  
  What you need to bring:
  
  - Bachelor's degree in computer science, engineering,
    information systems, or closely related quantitative
    discipline. Master’s desirable.
  - Typically, 3-5 years’ experience.
  
  Knowledge and Skills:
  
  - Strong working knowledge on GenAI, Prompts Engineering
  - Strong programming skills in Python (Pandas, Scikit, NumPy
    ), Golang and Scripting.
  - Hands-on with Jupyter notebooks
  - Experience with design methodologies, cloud-native
    applications, developer tools, managed services, and next-
    generation databases.
  - Good written and verbal communication skills.
  - Ability to quickly learn new skills and technologies and
    work well with other team members.
  - Understanding DevOps practices like continuous
    integration/deployment and orchestration with Kubernetes.
  
  Additional Skills:
  
  Cloud Architectures, Cross Domain Knowledge, Design
  Thinking, Development Fundamentals, DevOps, Distributed
  Computing, Microservices Fluency, Full Stack Development,
  Release Management, Security-First Mindset, User Experience
  (UX)
  
  What We Can Offer You:
  
  Health & Wellbeing
  
  We strive to provide our team members and their loved ones
  with a comprehensive suite of benefits that supports their
  physical, financial and emotional wellbeing.
  
  Personal & Professional Development
  
  We also invest in your career because the better you are,
  the better we all are. We have specific programs catered to
  helping you reach any career goals you have — whether you
  want to become a knowledge expert in your field or apply
  your skills to another division.
  
  Unconditional Inclusion
  
  We are unconditionally inclusive in the way we work and
  celebrate individual uniqueness. We know varied backgrounds
  are valued and succeed here. We have the flexibility to
  manage our work and personal needs. We make bold moves,
  together, and are a force for good.
  
  Let's Stay Connected:
  
  Follow @HPECareers on Instagram to see the latest on people,
  culture and tech at HPE.
  
