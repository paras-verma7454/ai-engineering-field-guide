  infrastructure costs or the need to build large in-house
  AI/ML teams. Our employees work at the cutting edge of AI
  cloud infrastructure alongside some of the most experienced
  and innovative leaders and engineers in the field.
  
  Where we work Headquartered in Amsterdam and listed on
  Nasdaq, Nebius has a global footprint with R&D hubs across
  Europe, North America, and Israel. The team of over 1400
  employees includes more than 400 highly skilled engineers
  with deep expertise across hardware and software
  engineering, as well as an in-house AI R&D team.
  
  Summary:
  
  Location: Amsterdam Duration: 3 months Start date: June 2026
  Compensation: Paid Eligibility: Current University student
  (Computer Science or related field), Recent Graduate or
  Early Career specialist
  
  The role
  
  We are looking for an Early Talent to develop cloud-based
  integrations on Microsoft Azure. You will work with
  experienced engineers and gain hands-on experience building
  API-based and cloud-native integration solutions.
  
  We expect you to have
  
  - Basic knowledge of Microsoft Azure
  - Programming experience with Python or C#
  - Understanding of REST APIs and JSON
  - Familiarity with Git and basic CI/CD concepts
  - Strong willingness to learn and collaborate
  
  Your responsibilities will include
  
  - Assist in developing API-based integrations between systems
  - Support solutions using Azure Functions, Logic Apps, API
    Management
  - Help automate workflows and data synchronization
  - Contribute to CI/CD pipelines and Infrastructure-as-Code
    (Terraform)
  - Maintain technical documentation
  
  What we offer
  
  - Competitive salary and comprehensive benefits package.
  - Mentorship from experienced AI, ML, and cloud infrastructure
    professionals.
  - Hands-on experience with real customer workloads and
    production systems.
  - Opportunities for professional growth within Nebius.
  - A dynamic and collaborative work environment that values
    initiative and innovation.
  - Opportunity to be considered for a full-time role after the
    Early Talent Program.
  
  We’re growing and expanding our products every day. If
  you’re up to the challenge and are excited about AI and ML
  as much as we are, join us!
  
