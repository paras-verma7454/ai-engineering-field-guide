description: |
  The Full Stack Engineer (AI & Agentic AI Systems) is a
  strategic professional who will play a pivotal role in
  architecting and delivering next‑generation intelligent
  applications that blend advanced software engineering,
  autonomous agents, and robust end‑to‑end engineering. In
  this role, you will work across the entire technology stack—
  REACT based front ends, designing scalable backend services
  (JAVA/Python), intuitive user experiences, and AI‑driven
  workflows that reason, plan, and act with minimal human
  intervention. You’ll collaborate with cross‑functional teams
  to transform complex business challenges into innovative,
  production‑ready AI systems that push the boundaries of
  automation, intelligence, and modern software engineering.
  
  Key Responsibilities:
  
  - Design and deliver end‑to‑end solutions spanning
    architecture, system design, low‑level design, and
    high‑quality coding across modern full‑stack environments.
  - Build responsive, modular UI applications using React,
    integrating complex AI-driven workflows and real‑time
    interactions.
  - Develop scalable, high‑performance backend services in Java
    / Python, implementing resilient APIs, event‑driven
    patterns, and microservices architectures.
  - Strong expertise in SQL (Oracle, PostgreSQL), no SQL DB like
    MangoDB, PYTHON, JAVA, APIs, Authentication &
    Authorization like OAuth and others, Encryption
  - Engineer AI‑powered features leveraging Google Gemini LLM,
    Vertex AI, ADK, vector databases (A2A), RAG pipelines,
    MCP, context engineering, and advanced prompt engineering
    techniques.
  - Implement secure, well‑structured REST and GraphQL APIs,
    ensuring reliability, versioning discipline, and clean
    integration patterns across platforms.
  - Optimize system performance and scalability, applying
    profiling, load‑testing insights, caching strategies, and
    distributed system tuning.
  - Drive robust CI/CD practices, integrating automated testing,
    code quality gates, containerization, and cloud‑native
    deployment pipelines.
  - Partner with QE to build and maintain automated test suites
    (UI, API, integration, and performance), improving release
    quality and reducing regression risk.
  - Identify, diagnose, and remediate performance bottlenecks,
    penetration testing vulnerabilities, and production issues
    with precision and root‑cause clarity.
  - Collaborate cross‑functionally with AI scientists,
    architects, and product teams to translate business
    challenges into production‑ready, intelligent agentic
    systems.
  
  Other Responsibilities:
  
  - Accountable for executing and driving mid-size feature
    application design and development efforts to completion,
    serving as a development lead on medium-scale projects and
    supporting the execution of larger efforts.
  - Proficient at operating with considerable autonomy and
    discretion as you will significantly influence the way an
    application is designed and developed by providing subject
    specific expertise and an advanced level of understanding
    of application programming principles.
  - Sought after due to ability to analyze and troubleshoot
    coding, application performance and design challenges.
  - Capable of research in root cause of development and
    performance concerns as well as the resolution of defects.
  - Have a deep understanding of the technical requirements for
    the solutions being built.
  - Understand engineering needs including those required to
    build, maintain, and operate the system through all phases
    of its life.
  - Proficient in information modeling, data structures and
    algorithms.
  - Understand maintenance characteristics, runtime properties
    and dependencies that exist in support of your system’s
    software. These dependencies will include but not limited
    to: hardware, platform, operating system, performance and
    load requirements, as well as contingencies with upstream
    and downstream systems.
  - Demonstrate an advanced understanding of supported main
    system flows and possess a comprehensive understanding of
    how the system and others (i.e. architecture or
    infrastructure) collectively integrate to contribute
    towards achieving business objectives. Using this
    expertise, assist with the development of standards for
    coding, testing, debugging and implementation. This will
    ensure application design adheres to the overall
    architecture blueprint.
  - Participate in design discussions as a Development Lead and
    as such will play the part of a key decision maker in
    driving design decisions. This is evidenced by your
    knowledge of the application code details and your
    experience with the technology and teams engaged.
  - Work with limited guidance, seeking guidance only as needed
    as the development and delivery strategy is defined; the
    design is not.
  - Exhibit the ability to turn complex application design into
    a well written application.
  - Partner with industry vendors that provide technology or
    user experience design components that support our Digital
    architecture and work with vendors on our implementation
    plans and roadmaps identifying partnership opportunities
    to increase our development velocity and our learnings.
  - Participates in the full development life cycle, identify
    dependencies between agile and waterfall delivery, working
    within broadly defined parameters, including test plan
    execution and software quality needs
  - Directly impact the business by influencing strategic
    functional decisions through advice, counsel or provided
    services. This will require persuading and influencing
    others through strong and comprehensive communication and
    diplomacy skills.
  - Communicate progress, anticipate bottlenecks, provide
    escalation management, identify, assess, track and
    mitigate issues/risks at multiple levels.
  - Recognize discordant views and take part in constructive
    dialog to resolve them.
  - Work across teams to optimize processes.
  - Regularly review metrics and proactively seek out new and
    improved mechanisms for visibility ensuring your program
    stays aligned with organization objectives.
  - Continuously assess development processes, test plans, and
    operations.
  - Work with teams to improve concurrent project delivery.
  - Streamline and / or eliminate excess process in any area of
    architecture, build, delivery, production operations
    environment, or business area where the same efforts (or
    issues) are repeated year-over-year.
  - Share knowledge with the team in various forums (brown bags,
    engineering forums etc.) and demonstrate a higher level of
    knowledge through industry certifications
  - Appropriately assess risk when business decisions are made,
    demonstrating particular consideration for the firm's
    reputation and safeguarding Citigroup, its clients and
    assets, by driving compliance with applicable laws, rules
    and regulations, adhering to Policy, applying sound
    ethical judgment regarding personal behavior, conduct and
    business practices, and escalating, managing and reporting
    control issues with transparency.
  
  Qualifications:
  
  - 8+ years in a product development/product management
    environment
  - Strong analytical and quantitative skills; Data driven and
    results-oriented
  - Experience delivering with an agile methodology
  - Experience in affecting large culture change
  - Experience leading infrastructure programs
  - Skilled at working with third party service providers
  - Excellent written and oral communication skills
  
  Education:
  
  - Bachelor’s/University degree or equivalent experience
  
