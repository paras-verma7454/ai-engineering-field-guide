description: |
  We're Celonis, the global leader in Process Intelligence
  technology and one of the world's fastest-growing SaaS
  firms. We believe there is a massive opportunity to unlock
  productivity by placing AI, data and intelligence at the
  core of business processes - and for that, we need your
  help. Care to join us?
  
  Role Description
  
  - As an Applied AI Engineer specializing in CPG and Fleet
    Logistics, you are pushing the envelope in solving
    business-critical problems for some of the world's most
    recognized consumer brands and global mobility networks.
    You will be working intimately with our most strategic
    enterprise clients, understanding their uniquely complex
    objectives—spanning from high-velocity beverage
    manufacturing and Direct Store Delivery (DSD) optimization
    to massive-scale fleet lifecycle management and dynamic
    asset routing. You will build Celonis solutions using the
    world’s leading Process Intelligence (PI) platform in
    combination with top AI and ML technology partners (e.g.,
    Microsoft, OpenAI, Databricks).With Celonis’ Process
    Intelligence (PI) platform, we feed operational context to
    AI so it understands the intricate realities of our
    customers' massive supply chains, vehicle fleets, and
    distribution networks. This enables them to industrialize
    AI, unlocking real ROI on deployments at scale—ensuring
    products are always on the shelf and vehicles are always
    ready for the customer. There is no AI without PI. You
    will prototype these solutions, demonstrate their value to
    global Chief Supply Chain Officers (CSCOs) and Fleet
    Operations Executives, and ensure successful
    implementation, adoption, and value realization to
    solidify and expand the footprint of Celonis across these
    premier global networks.
  
  Key Responsibilities:
  
  - AI Discovery & Solutioning: Understand the clients'
    overarching AI strategies and the distinct supply chain
    challenges inherent to high-volume CPG and fleet mobility
    (e.g., predictive demand forecasting, route optimization,
    fleet predictive maintenance, dynamic asset allocation,
    and mitigating raw material volatility). As a Celonis
    product and logistics domain expert, translate these
    complex, physical-world challenges into innovative AI
    solutions that drive measurable impact.
  - Pre- and Post-Sales Execution: Actively drive the full
    customer lifecycle. Lead technical discovery and
    capability demonstrations during the expansion/pre-sales
    cycle within various manufacturing, distribution, and
    fleet management business units. Remain deeply involved
    post-sale to guide implementation, ensuring agreed value,
    efficiency, and adoption thresholds are successfully
    reached.
  - Hackathons & Prototyping: Think out of the box with a "can-
    do" attitude, tackling heavily siloed legacy logistics and
    telematics networks. Leverage cutting-edge AI technologies
    to rapidly build creative prototypes in client hackathons,
    solving critical pain points across inventory allocation,
    fleet routing, and DSD execution.
  - Agentic Process Transformation: Support these enterprise
    clients in achieving tangible ROI from AI at scale. Enable
    a fundamental shift from traditional, rule-based
    automation to autonomous AI agents empowered by the
    Celonis Process Intelligence Platform (e.g., autonomous
    fleet rebalancing, intelligent shipment exception
    handling, or automated trade promotion deductions).
  - Proof Projects: End-to-end execution of business-critical
    Proof-of-Value projects. Architect and deliver secure,
    scalable LLM/agent systems with RAG, tools, and
    guardrails, ensuring seamless integration with complex
    enterprise ERPs (e.g., SAP), Transportation Management
    Systems (TMS), Warehouse Management Systems (WMS), and
    massive IoT/telematics data streams.
  - Domain & Industry Leadership: Serve as the internal and
    external technical subject matter expert for CPG and
    Mobility Supply Chains, scaling knowledge across the
    organization regarding the nuances of fast-moving consumer
    goods and asset-heavy fleet operations.
  
  Requirements:
  
  - 5+ years of experience leading technical pre-sales and post-
    sales engagements specifically within highly complex
    Supply Chain, CPG/Beverage, or Fleet Logistics
    environments. This includes defining AI roadmaps, building
    compelling ROI/TCO business cases for large-scale
    distribution networks, and guiding technical
    implementations through to value realization.
  - Deep understanding of supply chain business processes native
    to high-volume manufacturing and mobility (such as Direct
    Store Delivery (DSD), Order-to-Cash, Procure-to-Pay, Fleet
    Lifecycle Management, or Sales & Operations Planning) with
    the ability to translate high-level operational needs into
    specific AI use cases.
  - Expertise in generative AI techniques like RAG, few-shot
    learning, prompt engineering, multi-agent orchestration,
    multimodal understanding, or fine-tuning used to build
    high-impact use cases (e.g., intelligent dispatch
    assistants, or automated extraction of data from complex
    vendor contracts and logistics documentation).
  - Solid knowledge of Python and common ML libraries (such as
    LangChain, pandas, pydantic, sklearn, PyTorch) as well as
    data engineering tools and technologies for handling
    massive, high-velocity transactional and IoT datasets.
  - Strong presentation skills to both internal and external
    stakeholders (including supply chain executives, logistics
    directors, and enterprise IT leaders), whether leading
    technical whiteboarding sessions or formal readouts and
    demos.
  - Bachelor’s Degree required; Master's Degree in computer
    science, supply chain management, logistics, engineering,
    mathematics, or related fields, or equivalent work
    experience preferred.
  
  Nice to have (big plus):
  
  - Hands-on experience building agentic systems using LLM
    orchestration, RAG, function calling, and prompt
    engineering, while ensuring safety through rigorous
    evaluations suited for enterprise-grade supply chain
    environments.
  - Familiarity with CPG and fleet-specific systems (e.g., SAP
    APO/IBP, Blue Yonder, Manhattan, or major telematics/fleet
    tracking platforms).
  - Working knowledge of tools in the LLM ecosystem such as
    LangChain, LlamaIndex, or other OSS packages.
  - Experience in deploying and monitoring models at scale
    across major cloud platforms (AWS Bedrock, Azure AI, GCP
    Vertex).
  
