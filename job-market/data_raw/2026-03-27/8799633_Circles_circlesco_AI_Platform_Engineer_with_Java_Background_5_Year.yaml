description: |
  Founded in 2014, Circles is a global technology company
  reimagining the telco industry with its innovative SaaS
  platform, empowering telco operators worldwide to
  effortlessly launch innovative digital brands or refresh
  existing ones, accelerating their transformation into
  techcos.
  
  Today, Circles partners with leading telco operators across
  multiple countries and continents, including KDDI
  Corporation, Etisalat Group (e&), AT&T, and Telkomsel,
  creating blueprints for future telco and digital experiences
  enjoyed by millions of consumers globally.
  
  Besides its SaaS business, Circles operates three other
  distinct businesses:
  
  - Circles.Life: A wholly-owned digital lifestyle telco brand
    based in Singapore, Circles.Life is powered by Circles’
    SaaS platform and pioneering go-to-market strategies. It
    is the digital market leader in Singapore and has won
    numerous awards for marketing, customer service, and
    innovative product offerings beyond connectivity.
  
  - Circles Aspire: A global provider of Communications
    Platform-as-a-Service (CPaaS) solutions. Its cloud-based
    Experience Cloud platform enables enterprises, service
    providers and developers to deliver and scale mobile,
    messaging, IoT, and connectivity services worldwide.
  
  - Jetpac: Specializing in travel tech solutions, Jetpac
    provides seamless eSIM roaming for over 200 destinations
    and innovative travel lifestyle products, redefining
    connectivity for digital travelers. Jetpac was awarded
    Travel eSIM of the Year.
  
  Circles is backed by renowned global investors, including
  Peak XV Partners (formerly Sequoia), Warburg Pincus,
  Founders Fund, and EDBI (the investment arm of the Singapore
  Economic Development Board), with a track record of backing
  industry challengers.
  
  Standardized Job Title: Senior  Software Engineer
  
  Role: AI Platform Engineer with Java Background
  
  Location: Bangalore
  
  About the Role
  
  We seek a highly accomplished Senior Java Developer with
  extensive Spring experience to join our distinguished team.
  This pivotal role requires a seasoned professional with
  robust technical expertise and refined client-facing skills,
  who will work closely with our esteemed clientele to deliver
  sophisticated and resilient solutions. This role is
  augmented with a focus on implementing and owning end-to-end
  AI features, integrating Large Language Models (LLMs) into
  production, and contributing to AI design decisions. We
  require a candidate with exceptional analytical prowess,
  unwavering drive, and meticulous attention to detail. The
  ideal candidate will be a collaborative team leader with a
  visionary mindset, capable of challenging existing paradigms
  and shaping future strategic directions. This position
  presents a unique opportunity to lead high-impact projects
  and engage directly with senior leadership.
  
  Key Responsibilities
  
  - Architect, develop, and maintain complex enterprise-level
    applications utilizing the Java Spring framework and
    integrate advanced AI/ML features into production systems.
  - Collaborate strategically with cross-functional teams to
    elicit requirements, provide expert technical guidance,
    and ensure the successful execution of projects.
  - Lead the development of highly scalable and efficient
    backend services leveraging the Java Spring framework.
  - Design, build, and maintain key AI/ML components, including
    Retrieval-Augmented Generation (RAG) pipelines and AI
    agent workflows.
  - Implement and manage integrations with Large Language Model
    (LLM) APIs, handling rate limiting, error handling,
    caching, and building validation layers.
  - Mentor and guide junior developers, fostering their
    professional growth and contributing to the overall
    advancement of the development team.
  - Conduct rigorous code reviews to ensure adherence to
    industry best practices and established coding standards,
    including attention to AI-related concerns like prompt
    safety and cost optimization.
  - Diagnose, debug, and optimize applications to achieve peak
    performance.
  - Maintain a comprehensive understanding of emerging trends
    and technologies within the Java Spring, AI/ML ecosystems.
  
  Requirements
  
  - Bachelor’s degree in Computer Science, Software Engineering,
    or a closely related discipline.
  - Minimum of five years of progressive professional experience
    in software development.
  - Advanced proficiency in Java and extensive expertise with
    the Spring Framework (Spring Boot, Spring MVC, Spring
    Security).
    - Proven experience in designing and implementing RESTful
      APIs.
    - Proficiency with build tools (e.g., Maven, Gradle) and
      version control systems (e.g., Git).
    - Experience with event-driven architectures and message
      queues.
  - Substantial experience with database technologies, both SQL
    and NoSQL.
  - Working knowledge of cloud platforms, preferably AWS or
    Azure.
  - Conceptual understanding of Large Language Models (LLMs),
    embeddings, vector similarity, and Retrieval-Augmented
    Generation (RAG) fundamentals.
  - Familiarity with prompt engineering principles, including
    designing effective prompts, using structured outputs
    (e.g., JSON mode), and managing context.
  - Experience writing well-tested, production-ready code with
    unit tests, integration tests, and basic AI-specific
    tests.
  - Exceptional problem-solving and analytical capabilities.
  - Outstanding communication skills and the ability to excel in
    a client-facing environment.
  - Demonstrated experience with Agile/Scrum development
    methodologies.
  
  Preferred Qualifications
  
  - Extensive experience with microservices architecture.
  - In-depth knowledge of containerization technologies (Docker,
    Kubernetes).
  - Familiarity with CI/CD pipelines.
  - Proven track record in test-driven development (TDD) and
    automated testing frameworks.
  - Familiarity with AI development frameworks such as LangChain
    or LangGraph.
  - Proficiency in Python for AI scripting and prototyping.
  - Basic familiarity with at least one vector database (e.g.,
    pgvector, Pinecone).
  - Any prior experience building AI-powered features in a
    production environment.
  - Knowledge of the telecom domain.
  - Significant contributions to open-source projects.
  
