    - Coverage Type - Employee Only
    - Sum Insured - 3 times of annual CTC with minimum cap of INR
      10,00,000
    - Free Cover Limit - 1.5 Crore
  - Work-Life Balance ⚖️ - 15 days of Privilege leaves per
