  offer competitive salaries or wages that reflect the value
  you bring to our team. Depending on the position,
  compensation may include base salary and/or hourly wages,
  incentives, or bonuses.
  
  - Medical 🩺 - Medical insurance coverage is available for
    employees, their spouse, and up to two dependent children
