description: |
  Redefine the future of customer experiences. One
  conversation at a time.
  
  At Nextiva, we’re reimagining how businesses connect,
  bringing together customer experience and team collaboration
  on a single, conversation centric platform. Powered by AI,
  driven by human innovation.
  
  Our culture is forward thinking, customer obsessed and built
  on the belief that meaningful connections drive better
  business outcomes. Whether it’s through our signature
  Amazing Service®, the technology we create, or the
  experiences we cultivate, connection is at the core of who
  we are.
  
  If you’re ready to collaborate with incredible people, make
  an impact, and help businesses everywhere deliver truly
  amazing experiences, this is where you belong.
  
  Build Amazing. Deliver Amazing. Live Amazing. Be Amazing.
  
  
  
  
  
  Nextiva, a leader in business communications, is seeking a
  skilled AI Software Engineer to join our AI Agents team
  within our Data & Intelligence Platform group. In this role,
  you will develop intelligent, multimodal AI agents (voice
  and chatbots) as part of Nextiva’s next-generation customer
  experience platform. You will apply expertise in machine
  learning and software engineering to build AI-driven
  features that transform how businesses engage with
  customers. This position offers the opportunity to work at
  the forefront of generative AI and multimodal interactions,
  creating scalable AI solutions that blend automation with
  the human touch to deliver exceptional customer experiences.
  
  Key Responsibilities
  
  - Design & Develop AI Agents: Design, implement, and refine AI
    agents for Nextiva’s products that understand and respond
    to customers in multiple formats (e.g., spoken voice,
    written text). Develop conversational logic and multimodal
    interaction flows leveraging state-of-the-art natural
    language processing (NLP) and speech recognition
    techniques.
  - AI Model Integration: Integrate large language models and
    other AI/ML components into the Agentic AI Platform to
    enable capabilities such as question answering, task
    automation, sentiment analysis, and recommendations.
    Ensure that AI models and solutions perform effectively in
    real-world environments and at scale.
  - Full Lifecycle Engineering: Own the end-to-end development
    lifecycle of AI features.
  - Multimodal Interaction Systems: Build and integrate
    components for multimodal interactions, including speech-
    to-text, text-to-speech, and dialog management systems.
  - Performance Optimization: Optimize AI algorithms and agent
    frameworks for performance, scalability, and reliability.
    Use data-driven methods to tune model accuracy and
    response times.
  - Quality, Ethics & Compliance: Implement robust testing
    (unit, integration, end-to-end) for AI features to ensure
    reliability and correctness. Incorporate ethical AI
    practices, ensuring AI agent behavior is unbiased and
    compliant with privacy and security regulations.
  - Documentation & Mentorship: Document AI agent designs,
    algorithms, and usage guidelines for future reference.
    Provide technical guidance and mentorship to junior
    engineers or new team members as needed.
  
  Success in this role will be measured by your ability to
  deliver AI features that measurably improve customer
  experiences (e.g., higher self-service resolution rates,
  faster response times, improved user satisfaction) while
  maintaining high software quality and ethical AI standards.
  You will help Nextiva achieve a balanced integration of AI
  and human interaction, directly contributing to our CX-first
  vision.
  
  Qualifications
  
  - Education: Bachelor’s degree in computer science, Software
    Engineering, or a related field (required). A Master’s
    degree in AI, Machine Learning, or a related discipline is
    strongly preferred. Equivalent practical experience in
    AI/ML development will also be considered.
  - Software Engineering Experience: 5+ years of professional
    software development experience, including at least 2+
    years building AI or machine-learning powered
    applications. Proven experience developing production-
    grade software (e.g., backend services, APIs, data
    pipelines) in a collaborative team environment.
  - AI/ML Expertise: Strong understanding of AI and machine
    learning fundamentals with hands-on experience in natural
    language processing (NLP) and/or deep learning.
    Familiarity with the latest AI advancements (e.g.,
    transformer-based models, conversational AI frameworks,
    agentic SDKs) and a history of applying AI models to solve
    real-world problems.
  - Technical Skills: Proficiency in programming languages
    commonly used for AI development, such as Python (with ML
    libraries like TensorFlow or PyTorch) and/or a general-
    purpose language like Java or C# for scalable systems.
    Experience with both training and inference frameworks for
    AI/ML and libraries for NLP, speech, or computer vision
    (e.g., PyTorch, BERT-based, common LLM SDKs/APIs,
    AWS/GCP/Azure AI services) is expected.
  - Multimodal Interaction Knowledge: Experience with speech and
    language technologies – for example, integrating speech-
    to-text (ASR) and text-to-speech (TTS) engines, or
    building chatbots and voice bots for conversational
    interfaces.
  - Cloud & Scalability: Familiarity with cloud platforms and
    deploying AI/ML models at scale (AWS, Google Cloud, or
    Azure). Experience with microservices architecture and
    containerization (Docker, Kubernetes) for AI services.
  - Collaboration & Communication: Excellent teamwork and
    communication skills.
  
  Nextiva DNA (Core Competencies)
  
  Nextiva’s most successful team members share common traits
  and behaviors:
  
  - Drives Results: Action-oriented with a passion for solving
    problems. They bring clarity and simplicity to ambiguous
    situations, challenge the status quo, and ask what can be
    done differently. They lead and drive change, celebrating
    success to build more success.
  - Critical Thinker: Understands the "why" and identifies key
    drivers, learning from the past. They are fact-based and
    data-driven, forward-thinking, and see problems a few
    steps ahead. They provide options, recommendations, and
    actions, understanding risks and dependencies.
  - Right Attitude: They are team-oriented, collaborative,
    competitive, and hate losing. They are resilient, able to
    bounce back from setbacks, zoom in and out, and get in the
    trenches to help solve important problems. They cultivate
    a culture of service, learning, support, and respect,
    caring for customers and teams.
  
  Total Rewards
  
  Our Total Rewards offerings are designed to allow our
  employees to take care of themselves and their families so
  they can be their best, in and out of the office.
  
  Our compensation packages are tailored to each role and
  candidate's qualifications. We consider a wide range of
