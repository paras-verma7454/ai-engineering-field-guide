description: |
  AI/ML Cloud Developer
  
  
  
  This role has been designed as ‘Hybrid’ with an expectation
  that you will work on average 2 days per week from an HPE
  office.
  
  Who We Are:
  
  Hewlett Packard Enterprise is the global edge-to-cloud
  company advancing the way people live and work. We help
  companies connect, protect, analyze, and act on their data
  and applications wherever they live, from edge to cloud, so
  they can turn insights into outcomes at the speed required
  to thrive in today’s complex world. Our culture thrives on
  finding new and better ways to accelerate what’s next. We
  know varied backgrounds are valued and succeed here. We have
  the flexibility to manage our work and personal needs. We
  make bold moves, together, and are a force for good. If you
  are looking to stretch and grow your career our culture will
  embrace you. Open up opportunities with HPE.
  
  Job Description:
  
  
  
  Aruba is an HPE Company, and a leading provider of next-
  generation network access solutions for the mobile
  enterprise. Helping some of the largest companies in the
  world modernize their networks to meet the demands of a
  digital future, Aruba is redefining the “Intelligent Edge” –
  and creating new customer experiences across intelligent
  spaces and digital workspaces. Join us redefine what’s next
  for you.
  
  The Cloud Developer builds from the ground up to meet the
  needs of mission-critical applications and is always looking
  for innovative approaches to deliver end-to-end technical
  solutions to solve customer problems. Brings technical
  thinking to break down complex data and to engineer new
  ideas and methods for solving, prototyping, designing, and
  implementing cloud-based solutions. Collaborates with
  project managers and development partners to ensure
  effective and efficient delivery, deployment, operation,
  monitoring, and support of Cloud engagements. The Cloud
  Developer provides business value expertise to drive the
  development of innovative service offerings that enrich
  HPE's Cloud Services portfolio across multiple systems,
  platforms, and applications.
  
  Management Level Definition:
  
  Contributions include applying developed subject matter
  expertise to solve common and sometimes complex technical
  problems and recommending alternatives where necessary.
  Might act as project lead and provide assistance to lower-
  level professionals. Exercises independent judgment and
  consults with others to determine best method for
  accomplishing work and achieving objectives.
  
  What you’ll do:
  
  - Understanding Domain, Business and Requirements
    - Understand the business, end-use cases, and how customers
      use the product.
    - Collaborate with Stakeholders: Work with product managers,
      clients, or end-users to gather and understand
      requirements.
    - Requirement Analysis: Break down the requirements into
      functional and non-functional needs.
  - Coding and Development
    - Understanding System Architecture: Ensuring scalability,
      reliability, and performance.
    - Decide on programming languages, frameworks, databases, and
      other tools to use.
    - Implement the software’s functionality using required
      programming languages and implement efficient algorithms
    - Create videos and diagrams, and documents that describe how
      the system will work
    - Ensure the software continues to perform well as demand
      grows.
  - Testing
    - Unit Testing: Test individual components for correctness.
    - Integration Testing: Ensure different components work
      together seamlessly.
    - Debugging: Identify and fix bugs in the code.
  - Deployment
    - Prepare Builds: Package software for deployment.
    - Monitoring: Ensure the software runs as expected post-
      deployment and address any issues that arise.
  - Maintenance
    - Bug Fixing: Resolve issues reported by customers/users or
      discovered after deployment.
    - Feature Updates: Add new features or improve existing ones
      based on user feedback.
  - Collaboration and Communication
    - Team Coordination: Work closely with other engineers,
      designers, and QA teams.
    - Stakeholder Communication
    - Mentorship: Guide junior developers in their work and
      growth.
  - Learning and Upskilling
    - Stay Updated: Keep up with the latest tools, trends, and
      technologies.
    - Innovate: Experiment with new methods to improve efficiency
      or create innovative solutions.
  - Escalation Management: Identify, manage technical
    escalations. Participate in formal Escalation when
    required to support escalation, especially during a
    crisis.
  
  Problem Management: Proactively and reactively look for
  solutions to prevent problems from occurring in the
  team/technology area. Perform Trend and Root cause analysis
  
  What you need to bring:
  
  - Bachelor’s or master’s degree.
  - Typically, 6+ years’ experience.
  
  Knowledge and Skills:
  
  - Must have full-stack development experience and skills for
    writing clean and readable code.
  - Proficient in one of the programming languages:  Python, GO
    (Python must have; Go nice to have), along with
    OOAD/design patterns
  - Proficient in one of the DB such as PostgreSQL or SQL
    Server, Oracle and/or NoSQL
  - Hands on exposure to .Net Core 6 + Web API, C#/LINQ
  - Experience in creation, management and consumption of REST
    APIs leveraging Swagger, Postman, etc.
  - Must have experience with TDD practices and experience with
    Unit Testing.
  - Experience in developing in Linux/Unix Operating System
    environments.
  - Knowledge of how the web works and how to make it efficient
    (HTTP, caching, page rendering…).
  - Strong problem-solving and software
    development/troubleshooting skills. Ability to think in
    code and discuss ideas is a must.
  - Experience in Agile/Scrum software development process is a
    must.
  
  Good to have/Added advantage:
  
  - Good understanding of cloud computing platforms (AWS or
    Azure) and services.
  - Experience in Containers (Docker/Kubernetes) based
    deployment and management.
  
  Additional Skills:
  
  Cloud Architectures, Cross Domain Knowledge, Design
  Thinking, Development Fundamentals, DevOps, Distributed
  Computing, Microservices Fluency, Full Stack Development,
  Release Management, Security-First Mindset, User Experience
  (UX)
  
  What We Can Offer You:
  
  Health & Wellbeing
  
  We strive to provide our team members and their loved ones
  with a comprehensive suite of benefits that supports their
  physical, financial and emotional wellbeing.
  
  Personal & Professional Development
  
  We also invest in your career because the better you are,
  the better we all are. We have specific programs catered to
  helping you reach any career goals you have — whether you
  want to become a knowledge expert in your field or apply
  your skills to another division.
  
  Unconditional Inclusion
  
  We are unconditionally inclusive in the way we work and
  celebrate individual uniqueness. We know varied backgrounds
  are valued and succeed here. We have the flexibility to
  manage our work and personal needs. We make bold moves,
  together, and are a force for good.
  
  Let's Stay Connected:
  
  Follow @HPECareers on Instagram to see the latest on people,
  culture and tech at HPE.
  
