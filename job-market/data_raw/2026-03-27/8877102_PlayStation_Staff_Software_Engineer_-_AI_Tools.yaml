description: |
  Why PlayStation?
  
  PlayStation isn’t just the Best Place to Play — it’s also
  the Best Place to Work. Today, we’re recognized as a global
  leader in entertainment producing The PlayStation family of
  products and services including PlayStation®5,
  PlayStation®4, PlayStation®VR, PlayStation®Plus, acclaimed
  PlayStation software titles from PlayStation Studios, and
  more.
  
  PlayStation also strives to create an inclusive environment
  that empowers employees and embraces diversity. We welcome
  and encourage everyone who has a passion and curiosity for
  innovation, technology, and play to explore our open
  positions and join our growing global team.
  
  The PlayStation brand falls under Sony Interactive
  Entertainment, a wholly-owned subsidiary of Sony Group
  Corporation.
  
  About the Role
  
  We’re looking for a Staff Software Engineer to build AI-
  powered tools and integrations that plug directly into game
  engines, editors, clients, and backend services. You’ll
  deliver high-quality C++ integrations across proprietary
  studio engines, ship robust build/QA automation, and partner
  with multiple PlayStation Studios teams to make AI an
  everyday part of development.
  
  What You’ll Be Doing
  
  - Build and maintain engine/editor plugins, runtime SDKs, and
    services that integrate AI (LLMs and related systems) into
    game clients, servers, and build tools.
  - Ship performant, memory-aware C++ by profiling, optimizing,
    and debugging across PC/console builds with tight frame
    budgets.
  - Design stable API surfaces for game teams (C++/C API,
    gRPC/HTTP) with versioning, telemetry, and backward
    compatibility.
  - Stand up CI/CD for game builds and tools (UBT or proprietary
    build systems; artifact packaging; nightly/regression
    suites; distributed/accelerated builds).
  - Automate QA for tooling and in-engine features using engine
    test frameworks and headless runs, and wire results into
    CI and dashboards.
  - Implement production LLM integrations (prompting, RAG/tool
    calls, guardrails/safety, observability, timeouts/retries,
    and cost controls).
  - Collaborate with studio engineering, tech art, design, and
    QA to land integrations across varied codebases and
    pipelines.
  - Document patterns, provide sample projects, and deliver
    internal training so solutions scale across PlayStation
    Studios.
  - Influence standards and tech choices for AI in our dev
    stack, and contribute to shared libraries and best
    practices.
  
  Qualifications
  
  - You have at least five years of experience building
    production software in modern C++ (C++17/20) with strong
    fundamentals in memory management, concurrency,
    performance, and debugging.
  - You have shipped tools or runtime features in AAA engines,
    including work on plugins/modules, asset and build
    pipelines, and editor/runtime integration.
  - You have delivered features or tooling that integrate with
    LLMs or other ML services, and you understand prompt
    design, evaluation, safety, and telemetry for production
    usage.
  - You have implemented engine-level automated testing
    (functional and integration), including headless execution
    and CI gating.
  - You work fluently with large code/asset repositories and are
    comfortable with both Perforce and Git.
  - You communicate clearly across disciplines and translate
    diverse studio requirements into pragmatic, maintainable
    solutions.
  - You write thorough documentation and favor well-tested,
    maintainable code.
  
  Nice to Have
  
  - You have built networking/service integrations for game
    backends (gRPC/HTTP) and implemented
    telemetry/observability (logs, metrics, traces).
  - You have packaged SDKs/plugins for multiple studios and
    managed semantic versioning and migration tooling.
  - You understand console platform requirements and
    certification workflows.
  - You are familiar with security, privacy, and responsible-AI
    practices in production systems.
  
  Please note; this position can be completed remotely from
  either The UK, or The US.
  
  Please note, Sony Interactive Entertainment conducts
  background checks at the offer stage for all new employees
  (which may include criminal background checks for some
  roles) and will need to process personal information to
  support these checks.
  
