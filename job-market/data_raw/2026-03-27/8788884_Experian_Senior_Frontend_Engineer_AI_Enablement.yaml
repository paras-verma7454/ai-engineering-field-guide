  Job Description
  
  About the Role
  
  The AI Enablement team is building a unified platform that
  allows product and engineering teams to quickly integrate AI
  capabilities into their customer experiences. As a Senior
  Frontend Engineer, you will design and build the Widget Host
  Application and the UI contribution surface that enables
  teams to plug in AI-driven widgets, tools, and experiences
  in a scalable and extensible manner.
  
  You’ll work on a modern Node/React/TypeScript stack with a
  strict test-first approach, shaping a UI platform that other
  teams can confidently build upon.
  
  Key Responsibilities
  
  Frontend Platform Development
  
  - Architect and develop the Widget Host App, enabling secure,
    scalable, and flexible embedding of AI widgets across
    products.
  - Build the UI contribution framework that allows teams to
    register, customize, and render UI components consistently
    across surfaces.
  - Ensure performance, accessibility, responsiveness, and
    cross-browser reliability.
  
  Test-First Engineering
  
  - Follow a strict test-first discipline using unit,
    integration, and UI component testing frameworks.
  - Drive quality practices across the team and contribute to
    automated pipelines.
  
  Extensible UI Platform Design
  
  - Design plug-in models, contribution APIs, and extensible
    patterns enabling teams to create and deploy UI features
    rapidly.
  - Influence the architecture for widget lifecycle management,
    sandboxing, secure rendering, and communication patterns.
  
  Collaboration & Platform Mindset
  
  - Partner with backend, design, and product teams to deliver
    end-to-end AI experiences.
  - Operate with a platform mindset—your success is measured by
    how easily and quickly other teams build on your UI
    platform.
  - Create documentation, samples, and SDKs that accelerate
    adoption.
  
  Required Qualifications
  
  - Strong experience with Node.js, React, and TypeScript.
  - Deep understanding of frontend architecture, component-
    driven development, state management, and build systems.
  - Test-first mindset with experience in Jest, React Testing
    Library, Playwright/Cypress, or similar tools.
  - Experience building or contributing to extensible UI
    platforms, plugin frameworks, or micro-frontend
    architectures.
  - Strong understanding of web security, performance
    optimization, and UI scalability.
  
  Qualifications
  
  Qualifications
  
  Preferred Qualifications
  
  - Experience with Model Context Protocol (MCP) or similar
    tool/agent frameworks.
  - Familiarity with event-driven architectures, streaming
    platforms, or asynchronous pipelines.
  - Exposure to AI ecosystems: vector stores, embeddings, RAG,
    or agent frameworks.
  - Experience building internal developer platforms or
    enablement tooling.
  
  What Success Looks Like
  
  - Other teams ship AI-powered features faster and more safely
    because of the infrastructure you build.
  - AI tools are easy to integrate, observable, testable, and
    reliable.
  - MCP-based components scale seamlessly across multiple teams
    and use cases.
  - Engineering quality remains consistently high because of
    your test-first approach.
  
