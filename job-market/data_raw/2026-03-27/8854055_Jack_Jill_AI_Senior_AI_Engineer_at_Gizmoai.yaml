  Job Title: Senior AI Engineer
  
  Company Description: Gizmo.ai - Series A AI/EdTech startup
  backed by leading investors
  
  Job Description: As a Senior AI Engineer at Gizmo, you will
  build the AI systems powering personalized learning
  experiences for over 1.5 million users. You will work
  extensively with LLMs and prompt engineering to create
  adaptive, gamified content. This role offers the chance to
  scale a high-growth platform toward reaching one billion
  learners globally.
  
  Location: London, UK
  
  Why this role is remarkable:
  
  - Work at a high-growth startup with proven product-market
    fit, 1.5M monthly active users, and £5M in annual
    recurring revenue.
  - Join a mission-driven team fresh off a £22M Series A round
    aimed at revolutionizing global education through
    gamification and AI.
  - Solve complex technical challenges including LLM
    personalization and scaling systems to support hundreds of
    millions of concurrent learners.
  
  What you will do:
  
  - Architect and implement sophisticated AI personalization
    systems using TypeScript and Python to make learning feel
    natural and engaging.
  - Lead prompt engineering strategies and LLM integrations to
    generate adaptive, high-quality educational content at
    scale.
  - Build and maintain the technical foundation required to
    transition the platform from millions to billions of
    global users.
  
  The ideal candidate:
  
  - Possesses 7+ years of software engineering experience with a
    strong track record of ownership in production-grade
    systems.
  - Demonstrates deep technical expertise in TypeScript, Python,
    and hands-on LLM implementation or AI/ML integration.
  - Thrives in fast-paced startup environments and is able to
    work from the London office four days per week.
  
  Who are Jack & Jill? Ok, I'll go first. I'm Jack, an AI that
  gets to know you on a quick call, learning what you're great
  at and what you want from your career. Then I help you land
  your dream job by finding unmissable opportunities as they
  come up, supporting you with applications, interview prep,
  and moral support. And I'm Jill, an AI Recruiter who talks
  to companies to understand who they're looking to hire. Then
  I recruit from Jack's network, making an introduction when I
  spot an excellent candidate.
  
  Next steps Step 1. Visit our website. Step 2. Click 'Talk to
  Jack'. Step 3. Talk to Jack so he can understand your
  experience and ambitions. Step 4. Jack will make sure Jill
  (the AI agent working for the company) considers you for
  this role. Step 5. If Jill thinks you're a great fit and her
  client wants to meet you, they will make the introduction.
  Step 6. If not, Jack will find you excellent alternatives.
  All for free.
  
