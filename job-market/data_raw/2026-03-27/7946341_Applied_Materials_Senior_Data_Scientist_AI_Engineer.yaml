description: |
  Who We Are
  
  Applied Materials is a global leader in materials
  engineering solutions used to produce virtually every new
  chip and advanced display in the world. We design, build and
  service cutting-edge equipment that helps our customers
  manufacture display and semiconductor chips – the brains of
  devices we use every day. As the foundation of the global
  electronics industry, Applied enables the exciting
  technologies that literally connect our world – like AI and
  IoT. If you want to push the boundaries of materials science
  and engineering to create next generation technology, join
  us to deliver material innovation that changes the world.
  
  What We Offer
  
  Location:
  
  Bangalore,IND
  
  You’ll benefit from a supportive work culture that
  encourages you to learn, develop, and grow your career as
  you take on challenges and drive innovative solutions for
  our customers. We empower our team to push the boundaries of
  what is possible—while learning every day in a supportive
  leading global company. Visit our Careers website to learn
  more.
  
  At Applied Materials, we care about the health and wellbeing
  of our employees. We’re committed to providing programs and
  support that encourage personal and professional growth and
  care for you at work, at home, or wherever you may go. Learn
  more about our benefits.
  
  ## Educational Qualifications
  
  - B.E./B.Tech/M.Tech/MCA in Computer Science, Electronics &
    Communication, or a related field.
  - Master's degree in Computer Science, AI, Deep Learning, or
    NLP is highly preferred.
  - Domain Knowledge: Semiconductor / Manufacturing
  
  ## Experience
  
  - 6–10 years of IT experience, with 6+ years in data science.
  - Proven experience designing, pretraining, and fine-tuning
    large-scale LLMs for tasks such as text generation,
    summarization, and question answering.
  
  ## Technical Skills
  
  - Strong Python programming skills; hands-on with TensorFlow,
    PyTorch, or Keras.
  - Solid understanding of transformer architectures (BERT, GPT,
    LLaMA) and fine-tuning techniques (LoRA, adapters, prompt
    engineering).
  - Familiarity with Databricks, MLflow, and Delta Lake;
    experience with MLOps best practices including CI/CD and
    model versioning.
  - Proficiency in data preprocessing and handling large-scale
    text, image, or multimodal datasets.
  
  - *(Preferred)* Experience with LLM orchestration frameworks
    such as **LangGraph, LangChain, or LlamaIndex**, including
    agentic workflows, RAG pipelines, and multi-agent system
    design.
  
  - *(Preferred)* Proficiency in **AI-assisted coding tools**
    (e.g., Claude Code, GitHub Copilot) for accelerating
    development across complex codebases.
  
  - Exposure to computer vision or multimodal models is a plus.
  
  ## Cloud & Infrastructure
  
  - Experience working with cloud platforms, with a preference
    for candidates familiar with the Azure ecosystem.
  - Comfortable working in UNIX/Linux environments with command-
    line scripting.
  
  ## Soft Skills
  
  - Strong analytical, problem-solving, and communication skills
    (written, verbal, and visual).
  - Ability to collaborate across cross-functional teams and
    mentor junior members.
  
