description: |
  At PwC, our people in data and analytics engineering focus
  on leveraging advanced technologies and techniques to design
  and develop robust data solutions for clients. They play a
  crucial role in transforming raw data into actionable
  insights, enabling informed decision-making and driving
  business growth. Those in data science and machine learning
  engineering at PwC will focus on leveraging advanced
  analytics and machine learning techniques to extract
  insights from large datasets and drive data-driven decision
  making. You will work on developing predictive models,
  conducting statistical analysis, and creating data
  visualisations to solve complex business problems. Growing
  as a strategic advisor, you leverage your influence,
  expertise, and network to deliver quality results. You
  motivate and coach others, coming together to solve complex
  problems. As you increase in autonomy, you apply sound
  judgment, recognising when to take action and when to
  escalate. You are expected to solve through complexity, ask
  thoughtful questions, and clearly communicate how things fit
  together. Your ability to develop and sustain high
  performing, diverse, and inclusive teams, and your
  commitment to excellence, contributes to the success of our
  Firm. Examples of the skills, knowledge, and experiences you
  need to lead and deliver value at this level include but are
  not limited to:
  
  - Craft and convey clear, impactful and engaging messages that
    tell a holistic story.
  - Apply systems thinking to identify underlying problems
    and/or opportunities.
  - Validate outcomes with clients, share alternative
    perspectives, and act on client feedback.
  - Direct the team through complexity, demonstrating composure
    through ambiguous, challenging and uncertain situations.
  - Deepen and evolve your expertise with a focus on staying
    relevant.
  - Initiate open and honest coaching conversations at all
    levels.
  - Make difficult decisions and take action to resolve issues
    hindering team effectiveness.
  - Model and reinforce professional and technical standards
    (e.g. refer to specific PwC tax and audit guidance), the
    Firm's code of conduct, and independence requirements.
  
  The Opportunity As part of the Data and Analytics
  Engineering team you will lead the development of innovative
  AI solutions that drive operational excellence. As a Senior
  Manager you will serve as a strategic advisor, leveraging
  your knowledge to guide large projects and motivate top-
  performing teams to navigate complex challenges. This role
  offers the chance to work with advanced technologies and
  collaborate with diverse stakeholders, securing impactful
  results that align with industry- leading standards.
  Responsibilities
  - Lead the creation of innovative AI solutions to enhance
    operational effectiveness
  - Serve as a strategic advisor on large-scale projects,
    guiding teams through challenges
  - Motivate and develop top-performing teams to achieve project
    objectives
  - Work with diverse stakeholders to secure alignment with
    industry standards
  - Utilize advanced technologies to drive impactful results
  - Foster a culture of continuous improvement and operational
    excellence
  - Analyze complex data to identify opportunities for
    innovation
  - Communicate effectively to convey project goals and progress
  What You Must Have
  - High School Diploma
  - At least 6 years of experience
  What Sets You Apart
  - Master's Degree in Computer Engineering, Computer Science,
    Data Processing/Analytics/
  Science, Software Engineering, Artificial Intelligence and
  Robotics preferred
  - Crafting and conveying clear, impactful messages
  - Applying systems thinking to identify underlying problems
  - Validating outcomes with clients and sharing perspectives
  - Directing teams through complex and ambiguous situations
  - Evolving your technical and industry knowledge
  - Initiating open coaching conversations at various levels
  - Adhering to production-grade quality standards
  - Experience creating context aware GenAI Chat experience
    using SSE, JSON-RPC and WebSocket
