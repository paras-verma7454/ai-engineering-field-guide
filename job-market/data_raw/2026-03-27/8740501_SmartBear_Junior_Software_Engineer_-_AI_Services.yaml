description: |
  SmartBear delivers application integrity for modern tech
  stacks, ensuring continuous, measurable assurance that
  software just works as intended with governance to operate
  at AI speed and scale. SmartBear offers deep test
  automation, API lifecycle management, and observability
  capabilities. With integrations across the SDLC, it sets a
  new quality standard for application delivery teams.
  SmartBear is trusted by more than 16 million developers,
  testers, and software engineers across 32,000 organizations,
  including 75% of the largest financial institutions and
  industry leaders such as Adobe, JetBlue, and Microsoft.
  SmartBear’s best-loved brands include Swagger, TestComplete,
  Reflect, QMetry, Zephyr, and more. As stewards of a
  collaborative open source community, SmartBear meets
  customers where they are to make our technology-driven world
  a better place. Learn more at www.smartbear.com, or follow
  us on LinkedIn, X, and Reddit. At SmartBear, you will be
  part of a dynamic team solving one of the most critical
  challenges facing modern businesses: ensuring the integrity
  of software in an AI-driven world. Whether you are working
  directly with customers, driving go to market strategies,
  supporting operations, building products, or enabling teams,
  your contributions help shape the future of software quality
  for organizations worldwide. Join us in our mission.
  
  Junior Software Engineer - AI
  
  Product Introduction:
  
  SmartBear is leading the charge to productionize the use of
  Generative AI throughout the software development lifecycle
  in ways that go far beyond the chatbots proliferating in UIs
  everywhere. Beginning with AI integrations into existing
  products like QMetry, Reflect and Swagger. SmartBear has
  shown its commitment to using AI to fundamentally drive
  workflows that users previously did themselves. This
  approach delivers greater value for customers and increases
  SmartBear’s growth velocity.
  
  Go to our product page if you want to know more about
  SmartBear
  
  You can even have a free trial to check it out 😊
  
  Job Responsibility
  
  - Build new and ongoing products and services, including MCP
    framework with Agentic AI offerings, in SmartBear’s
    domains: API Design and Management, Testing and
    Observability.
  - Primarily Focused on AI and MCP-style workflows atop
    SmartBear's existing products.
  - Rapidly validate the feasibility of new use cases from
    research ideas
  - Maintain an appreciation for the end-user product experience
    and use this knowledge to inform system implementation
    trade-offs
  - Perform code reviews across the front-to-back-end stack and
    ensure a standard of high engineering quality throughout
    the small, but growing, engineering team.
  - Deliver working code on-time and own the experience post-
    production
  - Measure success and iterate on technical designs to improve
    the overall product experience
  
  Skills Required:
  
  - 2-4 Years of experience in Typescript with Python and
    exposure to backend frameworks such as Flask or FastAPI,
    with familiarity (or strong interest) in LLM or agent-
    based systems (e.g., LangChain/LangGraph)
  - Experience running services in Docker and deploying to AWS
    with support from senior engineers. Uses GitHub for
    version control in a team setting.
  - Foundational understanding of HTTP and REST APIs,
    client/server architecture, and modern API concepts
    (including MCP). Familiarity with NoSQL or vector
    databases is a plus
  - Experience in full-stack development, RESTful backend
    services and frontends using TypeScript with Python with
    HTML/CSS
  - Demonstrated ability to complete assigned development tasks
    as part of a team, including implementing features, fixing
    bugs, and writing tests
  - Ability to work from defined requirements, asking clarifying
    questions and breaking problems into manageable steps,
    with increasing comfort handling moderately ambiguous
    tasks over time
  - Clear and effective communication skills in English
  
  Why you should join the SmartBear crew:
  
  - You can grow your career at every level.
  - We invest in your success as well as the spaces where our
