description: |
  Snowflake is about empowering enterprises to achieve their
  full potential — and people too. With a culture that’s all
  in on impact, innovation, and collaboration, Snowflake is
  the sweet spot for building big, moving fast, and taking
  technology — and careers — to the next level.
  
  Summary
  
  The AI/ML Flex Solution Engineer (SE) is a high-impact,
  customer-facing technical role supporting AI/Machine
  Learning (AI/ML) initiatives across our strategic US Major
  Accounts. This role is designed for a technical professional
  who possesses a strong foundation in AI/ML concepts,
  technologies, and solution architecture, positioning them
  above a generalist but not necessarily requiring deep
  specialization (Level 200-300 technical depth). The Flex SE
  will act as a critical, hands-on technical resource,
  accelerating customer adoption and success. This role
  translates business challenges into AI/ML- driven solutions
  through the rapid development of MVPs and prototypes,
  supporting our regional SE teams, and driving growth in this
  strategic area. The AE and SE maintain ownership and
  ultimate approval over the account strategy. The Flex SE
  role is designed to be supportive, not to supersede their
  authority. The RVP should provide prescriptive guidance on
  which accounts the Flex SE should prioritize, as the RVP
  possesses the most comprehensive regional overview.
  
  Key Responsibilities and ScopeTechnical Leadership &
  Solutioning
  
  - Partner with regional Account Executives (AEs) and Solution
    Engineers (SEs) to identify, qualify, and develop AI/ML
    opportunities within USMajors accounts. The direction of
    which account teams to partner with should come from the
    RVP.
  - Conduct technical presentations, product demonstrations, and
    workshops focused on our AI/ML portfolio (e.g., platforms,
    services, and MLOps tools).
  - Architect and prototype foundational AI/ML solutions,
    including proof-of-concepts (PoCs) that demonstrate clear
    business value.
  - Serve as the technical bridge between customers and the
    central AI/ML Product and Engineering teams, synthesizing
    customer feedback and emerging requirements.
  - Maintain a current understanding of the competitive
    landscape and industry trends in AI/ML, advising internal
    teams and customers accordingly.
  - Drive sales acceleration through AI-assisted "hands-on-
    keyboard" development, creating Minimum Viable Products
    (MVPs) and functional prototypes that quickly demonstrate
    platform capability and time-to-value.
  - Lead the rapid technical build of customized AI/ML
    prototypes to secure technical wins and directly influence
    incremental consumption for the region.
  
  Cross-Regional Enablement
  
  - Provide direct technical support and capacity augmentation
    for regional SE teams engaged in complex or specialized
    AI/ML sales cycles.
  - Develop and deliver AI/ML training materials and technical
    guidance to upskill the broader USMajors SE organization.
  - Document successful solution patterns and best practices,
    contributing to a centralized knowledge base for regional
    SE reuse.
  - Travel up to 30-40% of the time to support critical customer
    engagements across the assigned regions.
  
  Preferred Skills and Experience
  
  - 2+ years of hands-on experience with AI/ML concepts, such as
    data preparation, model training
    (supervised/unsupervised), deployment, and monitoring.
    Ability to translate this experience directly into how
    Snowflake can help advance the customer’s AI/ML
    initiatives.
  - Technical Depth: Possesses Level 200-300 knowledge of AI/ML:
    capable of designing robust solutions, discussing common
    algorithms and frameworks, and implementing standard MLOps
    pipelines.
  - Excellent communication, presentation, and interpersonal
    skills, with the ability to explain complex technical
    topics to both technical and non-technical audiences.
  
  Metrics That Matter
  
  The performance of the Flex SE will be measured primarily
  based on their direct contribution to accelerating and
  growing our AI/ML business within the USMajors sector. Our
  current annual run rate as a business is about $1.8 billion,
  with AI/ML contributing 2% of that.
  
  - Blended Attainment: 60% tied to incremental consumption for
    the region and 40% tied to TACV bookings for the region
  - % Increase YoY in AI/ML Revenue: 100% year-over-year growth
    in AI/ML revenue across USMajors. Some Flex SEs may be
    subject to doing more than 100% and others less than 100%
    depending on need/feasibility.
  - AI/ML Use Case Tech Wins ($ and Volume): Measured by use
    cases the Flex SE is tagged to
  - AI/ML Use Case Go-Lives ($ and Volume): Measured by use
    cases the Flex SE is tagged to
  - Regional Technical Proficiency in AI/ML: Measured by AI/ML
    technical proficiency for SE Generalists at the start of
    the year compared to end of year
  
  Snowflake is growing fast, and we’re scaling our team to
  help enable and accelerate our growth. We are looking for
  people who share our values, challenge ordinary thinking,
  and push the pace of innovation while building a future for
  themselves and Snowflake.
  
  How do you want to make your impact?
  
  For jobs located in the United States, please visit the job
  posting on the Snowflake Careers Site for salary and
  benefits information: careers.snowflake.com
