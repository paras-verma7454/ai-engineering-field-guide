  Location: London, UK
  
  Why this role is remarkable:
  
  - Exceptional growth trajectory, scaling from $0 to $30m ARR
    in less than a year with a fresh $30m Series B.
  - High-autonomy environment with no product managers, where
    engineers own the full strategy and execution of their
    business area.
  - Direct access to a world-class human data division of 60+
    annotators from top AI labs to accelerate model training.
  
  What you will do:
  
  - Select and implement optimal model architectures using a
    mixture of LLM steps and traditional machine learning
    models.
  - Define evaluation metrics and design production monitoring
    systems to identify and resolve model performance
    bottlenecks.
  - Collaborate with the human data team to procure high-quality
    training and validation datasets for subjective judgment
    tasks.
  
  The ideal candidate:
  
  - Proven track record as an ML/AI engineer at a high-growth
    scaleup or as a founder of an AI-focused startup.
  - Deep technical expertise in Generative AI systems and
    recommendation engines developed over the last four years.
  - Product-focused mindset capable of translating user needs
    into technical decisions regarding model architecture and
    evaluation methods.
  
