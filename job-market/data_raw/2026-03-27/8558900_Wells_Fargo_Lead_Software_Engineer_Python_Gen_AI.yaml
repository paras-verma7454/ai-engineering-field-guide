description: |
  About this role: Wells Fargo is seeking a Lead Software
  Engineer (Python & GenAI) to design, develop, and deliver
  enterprise-grade Generative AI solutions that drive
  automation, improve operational efficiency, and support
  modernization. This role blends hands-on engineering, GenAI
  system design, and technical leadership, leveraging the
  enterprise AI ecosystem-including Tachyon GenAI Studio, RAG
  frameworks, and approved LLM platforms. In this role, you
  will:
  
  - Lead complex technology initiatives including those that are
    companywide with broad impact
  - Act as a key participant in developing standards and
    companywide best practices for engineering complex and
    large-scale technology solutions for technology
    engineering disciplines
  - Design, code, test, debug, and document for projects and
    programs
  - Review and analyze complex, large-scale technology solutions
    for tactical and strategic business objectives, enterprise
    technological environment, and technical challenges that
    require in-depth evaluation of multiple factors, including
    intangibles or unprecedented technical factors
  - Make decisions in developing standard and companywide best
    practices for engineering and technology solutions
    requiring understanding of industry best practices and new
    technologies, influencing and leading technology team to
    meet deliverables and drive new initiatives
  - Collaborate and consult with key technical experts, senior
    technology team, and external industry groups to resolve
    complex technical issues and achieve goals
  - Lead projects, teams, or serve as a peer mentor.
  
  Required Qualifications:
  
  - 5+ years of Software Engineering experience, or equivalent
    demonstrated through one or a combination of the
    following: work experience, training, military experience,
    education
  
  Desired Qualifications:
  
  - 9+ years of Software Engineering experience, or equivalent
    demonstrated through one or a combination of the
    following: work experience, training, military experience,
    education
  - 3+ years working with LLMs, GenAI, agent frameworks, vector
    DBs, or RAG systems
  - Build scalable Python based automation services, APIs and
    backend utilities
  - Experience with enterprise GenAI environments (e.g., Tachyon
    GenAI Studio)
  - Build Gen AI powered solutions such as summarization,
    runbook generation and operational insights
  - Develop LLM powered assistants for engineering and support
    teams
  - Design Agentic AI workflows where AI agents can analyze
    issues, trigger automations and execute multi step tasks
    with human oversight
  - Familiarity with multi-agent orchestration, embeddings,
    retrieval optimization, and evaluation methods
  - Implement RAG pipelines, embeddings and prompt engineering
    techniques
  - Ensure AI Solutions follow security, governance and
    responsible AI practices
  - Experience working with version control systems (Git)
  - Experience with containerization (Docker and Kubernetes)
  - Strong communication, problem-solving and collaboration
    skills
