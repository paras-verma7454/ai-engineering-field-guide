description: |
  Company Description
  
  As the world’s pioneering local delivery platform, our
  mission is to deliver an amazing experience, fast, easy, and
  to your door. We operate in over 70+ countries worldwide,
  powered by tech, designed by people. As one of Europe’s
  largest tech platforms, headquartered in Berlin, Germany.
  Delivery Hero has been listed on the Frankfurt Stock
  Exchange since 2017 and is part of the MDAX stock market
  index. We enable creative minds to deliver solutions that
  create impact within our ecosystem. We move fast, take
  action and adapt. No matter where you're from or what you
  believe in, we build, we deliver, we lead. We are Delivery
  Hero.
  
  Job Description
  
  We are on the lookout for a Senior AI Engineer to join the
  Logistics Data & Machine Learning Platform team  on our
  journey to always deliver amazing experiences.
  
  In our Logistics Team, you’ll tackle high-impact challenges
  that make last-mile delivery efficient, affordable, and
  sustainable. Your work will directly improve experiences for
  riders, end customers, and merchants across the globe. Each
  enhancement you contribute will help Delivery Hero optimize
  delivery operations, supporting expansion into new areas
  like grocery and retail.
  
  The Data & ML Platform team’s mission is to enable teams
  across the organization to build, deploy, and scale
  intelligent products powered by data and machine learning.
  As part of this team, you will work on the core AI agent
  platform, building reliable infrastructure and services that
  power production AI applications used across the company.
  
  As a Senior AI Engineer, you will help design and operate
  scalable systems that enable LLM-powered agents, intelligent
  automation, and data-aware AI services. This role combines
  AI engineering, platform engineering, and ML systems design,
  with a strong focus on reliability, scalability, and
  production impact.
  
  In this role you will,
  
  - Build and scale AI agents capable of reasoning, tool
    calling, and interacting with internal services and data
    systems.
  - Develop and maintain Retrieval-Augmented Generation (RAG)
    pipelines using vector databases & semantic retrieval
    systems to enable agents to access knowledge and
    enterprise data.
  - Design and implement evaluation frameworks & safety
    guardrails for agent behaviour, model performance, and
    response quality.
  - Implement observability, monitoring, and cost visibility for
    LLM and agent workloads to ensure reliability,
    performance, and operational efficiency.
  - Collaborate closely with data scientists, ML engineers, and
    platform engineers to integrate AI systems with the
    broader data and ML ecosystem.
  - Optimize systems for performance, reliability, and cost
    efficiency while operating AI workloads at scale.
  
  Qualifications
  
  Must have:
  
  - Proven experience shipping LLM-powered systems or AI agents
    into production.
  - 4+ years experience in production machine learning and/or
    backend engineering, particularly systems involving LLMs.
  - Strong programming skills in Python, with experience
    building scalable backend services.
  - Experience with Cloud - ideally AWS/GCP
  - Strong communication skills and the ability to work
    collaboratively in cross-functional teams.
  
  Nice to have
  
  - Experience with Kubernetes, Terraform, Kafka, MLflow, or
    Kubeflow.
  - Experience using LLM application frameworks such as
    LangChain, LangGraph, LlamaIndex, or similar agent
    orchestration tools.
  - Experience with ML frameworks such as Hugging Face or
    PyTorch.
  
