description: |
  Dive in and do the best work of your career at DigitalOcean.
  Journey alongside a strong community of top talent who are
  relentless in their drive to build the simplest scalable
  cloud. If you have a growth mindset, naturally like to think
  big and bold, and are energized by the fast-paced
  environment of a true industry disruptor, you’ll find your
  place here.  We value winning together—while learning,
  having fun, and making a profound difference for the
  dreamers and builders in the world.
  
  We want people who are passionate about taking complex
  concepts and providing a simple and accessible experience
  for users.We are looking for a Senior Software Engineer to
  build features and improvements end to end to make
  accelerated compute simple and accessible for everyone.The
  Gradient Platform team is responsible for creating tools so
  that developers can easily create AI Agents for real world
  problems. We’re a fast-pace team looking to build the next
  generation of AI/ML workflows on DigitalOcean.
  
  What You’ll Do:
  
  - Drive large cross-functional projects independently to
    completion
  - Work primarily in Typescript, React, GraphQL, Python, and Go
  - Build UI components, libraries, tools, and services that
    power platform
  - Maintain and develop the Go and GraphQL API
  - Collaborate on design and UX
  - Participate and support in operational excellence
  - Independently ship product features from planning to launch
    to maintenance with high autonomy
  - Collaborate with other engineers to find elegant
    architectures and solutions
  
  What You’ll Add to DigitalOcean:
  
  - Own a technical area by providing technical leadership for a
    team
  - Strong interest in development platforms, Data Engineering,
    MLOps, AI, CI/CD, infrastructure or making products for
    technical teams
  - Able to make effective trade-offs in regards to both
    engineering and product requirements, while balancing
    short term and long term needs
  - 5+ years relevant industry experience in a fast-paced, high
    growth tech environment building UI component libraries,
    design systems, and tools using TypeScript
  - Demonstrated design and UX sensibilities
  
  *This job is located in Hyderabad, India
  
  #LI-Hybrid
  
  Why You’ll Like Working for DigitalOcean
  
  - We innovate with purpose. You’ll be a part of a cutting-edge
    technology company with an upward trajectory, who are
    proud to simplify cloud and AI so builders can spend more
    time creating software that changes the world. As a member
    of the team, you will be a Shark who thinks big, bold, and
    scrappy, like an owner with a bias for action and a
    powerful sense of responsibility for customers, products,
    employees, and decisions.
  - We prioritize career development. At DO, you’ll do the best
    work of your career. You will work with some of the
    smartest and most interesting people in the industry. We
    are a high-performance organization that will always
    challenge you to think big. Our organizational development
    team will provide you with resources to ensure you keep
    growing. We provide employees with reimbursement for
    relevant conferences, training, and education. All
    employees have access to LinkedIn Learning's 10,000+
    courses to support their continued growth and development.
  - We care about your well-being. Regardless of your location,
    we will provide you with a competitive array of benefits
    to support you from our Employee Assistance Program to
    Local Employee Meetups to flexible time off policy, to
    name a few. While the philosophy around our benefits is
    the same worldwide, specific benefits may vary based on
    local regulations and preferences.
  - We reward our employees. The salary range for this position
    is based on market data, relevant years of experience, and
    skills. You may qualify for a bonus in addition to base
    salary; bonus amounts are determined based on company and
    individual performance. We also provide equity
    compensation to eligible employees, including equity
    grants upon hire and the option to participate in our
    Employee Stock Purchase Program.
  - DigitalOcean is an equal-opportunity employer. We do not
    discriminate on the basis of race, religion, color,
    ancestry, national origin, caste, sex, sexual orientation,
    gender, gender identity or expression, age, disability,
    medical condition, pregnancy, genetic makeup, marital
    status, or military service.
  
  Application Limit: You may apply to a maximum of 3 positions
  within any 180-day period. This policy promotes better role-
  candidate matching and encourages thoughtful applications
  where your qualifications align most strongly.
