description: |
  Saviynt's AI-powered identity platform manages and governs
  human and non-human access to all of an organization's
  applications, data, and business processes. Customers trust
  Saviynt to safeguard their digital assets, drive operational
  efficiency, and reduce compliance costs. Built for the AI
  age, Saviynt is today helping organizations safely
  accelerate their deployment and usage of AI. Saviynt is
  recognized as the leader in identity security, with
  solutions that protect and empower the world’s leading
  brands, Fortune 500 companies and government institutions.
  For more information, please visit www.saviynt.com.
  
  About the Job We are building a next-generation Agentic
  Security Operations Center (SOC) designed for the AI era. We
  believe that effective security operations must evolve
  beyond traditional reactive methods. We are building an
  intelligent, AI-driven SOC that combines deep cloud security
  expertise with advanced automation and machine learning to
  predict, prevent, and neutralize advanced threats faster
  than ever.
  
  We are seeking a SOC Detection Engineer - Cloud and AI
  Automation to serve as a technical expert responsible for
  designing, building, and optimizing detection capabilities
  across our cloud-native security stack. This is a hands-on-
  keyboard role for someone who thrives on creating
  intelligent detections, leveraging AI/ML for threat
  identification, and building automation that scales security
  operations. You will be responsible for engineering
  detection logic, fine-tuning AI-powered alerts, and driving
  continuous improvement in our detection and response
  capabilities.
  
  WHAT YOU WILL BE DOING
  
  WHAT YOU BRING
  
  If required for this role, you will:
  
  - Complete security & privacy literacy and awareness training
    during onboarding and annually thereafter
  
  - Review (initially and annually thereafter), understand, and
    adhere to Information Security/Privacy Policies and
    Procedures such as (but not limited to):
  
    > Data Classification, Retention & Handling Policy
  
    > Incident Response Policy/Procedures
  
    > Business Continuity/Disaster Recovery Policy/Procedures
  
    > Mobile Device Policy
  
    > Account Management Policy
  
    > Access Control Policy
  
    > Personnel Security Policy
  
    > Privacy Policy
  
  Saviynt is an amazing place to work. We are a high-growth,
  Platform as a Service company focused on Identity Authority
  to power and protect the world at work. You will experience
  tremendous growth and learning opportunities through
  challenging yet rewarding work which directly impacts our
  customers, all within a welcoming and positive work
  environment. If you're resilient and enjoy working in a
  dynamic environment you belong with us!
  
  Saviynt is an equal opportunity employer and we welcome
  everyone to our team.  All qualified applicants will receive
  consideration for employment without regard to race, color,
  religion, sex, sexual orientation, gender identity, national
  origin, disability, or veteran status.
