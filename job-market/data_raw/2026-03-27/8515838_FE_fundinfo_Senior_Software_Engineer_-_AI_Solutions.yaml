description: |
  Design and deliver production‑grade AI systems that power
  data‑intensive financial products for global clients—turning
  cutting‑edge LLM capabilities into reliable, scalable
  services that make a real impact.
  
  
  
  This role offers the opportunity to build AI solutions
  end‑to‑end, working with modern platforms like Databricks,
  Spark, and Delta Lake while shaping an internal AI platform
  used across the organisation. You’ll work at the
  intersection of software engineering, data engineering, and
  platform architecture, integrating LLMs into real products
  where data quality, traceability, and explainability are
  essential. You’ll collaborate with data, product, and
  platform teams, contribute to complex problem‑solving in a
  regulated environment, and grow your technical depth through
  meaningful ownership, continuous learning, and a supportive
  engineering culture.
  
  
  
  Your key responsibilities as a Senior Software Engineer – AI
  Solutions will include: • Developing AI agents and
  LLM‑backed data pipelines in Databricks, progressing
  solutions from experimentation through to production. •
  Designing, building, and maintaining scalable data and ML
  pipelines using Spark, Delta Lake, and modern orchestration
  tools. • Evolving the internal AI platform to expand
  capabilities, reliability, and developer usability. •
  Integrating LLMs into existing products and workflows with a
  focus on data quality, traceability, and explainability. •
  Translating business requirements into robust technical
  solutions in partnership with data, product, and platform
  teams. • Ensuring solutions meet performance, security, and
  compliance requirements expected in regulated financial
  environments.
  
  
  
  You will need the following experience and skills to join us
  as a Senior Software Engineer – AI Solutions: • You have
  strong professional experience as a software engineer, with
  recent hands‑on work in AI/ML or data‑intensive systems. •
  You are skilled in Python and TypeScript and have solid
  experience with distributed data processing (Spark
  preferred). • You have proven experience building and
  operating data pipelines in Databricks or similar platforms.
  • You have practical experience working with LLMs (e.g.,
  OpenAI, Azure OpenAI), including prompt design, evaluation,
  and production integration. • You demonstrate strong
  software engineering fundamentals—API design, testing,
  version control, CI/CD, and observability.
  
  
  
  FE fundinfo is a leading financial data provider, connecting
  the investment industry across the UK, Europe, and Asia-
  Pacific through an integrated platform. Our skilled team
  empowers clients with data-driven insights, making the
  industry Navigate Complexity with Confidence!
  
  
  
  We foster a collaborative and inclusive work environment
  where engineers contribute to meaningful outcomes and are
  encouraged to explore new tools and techniques. You can
  expect hybrid working options, flexible hours to support
  work–life balance, regular knowledge‑sharing sessions, and
  continuous learning opportunities. We value curiosity,
  pragmatic engineering, and teamwork—creating a space where
  you can grow your expertise while delivering secure,
  scalable solutions.
  
  
  
  Benefits: • 25 days of annual leave with the option to buy
  an extra 5 days each year. • Benefit from enhanced
  paternity, maternity, and shared parental leave. • Secure
  your future with our pension scheme. • Advance your career
  with sponsored learning and development, including formal
  qualifications. • Private medical insurance as employee
  wellbeing matters • Stay fit with discounted gym
  memberships. • Take advantage of the Bike to Work scheme for
  eco-friendly commuting. • Keep your eyes sharp with eye care
  and flu jab services.
