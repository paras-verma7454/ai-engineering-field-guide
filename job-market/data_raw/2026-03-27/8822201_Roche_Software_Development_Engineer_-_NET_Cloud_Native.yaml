description: |
  At Roche you can show up as yourself, embraced for the
  unique qualities you bring. Our culture encourages personal
  expression, open dialogue, and genuine connections,  where
  you are valued, accepted and respected for who you are,
  allowing you to thrive both personally and professionally.
  This is how we aim to prevent, stop and cure diseases and
  ensure everyone has access to healthcare today and for
  generations to come. Join Roche, where every voice matters.
  
  The Position
  
  Principal Duties & Responsibilities:
  
  - As a Sr Software Engineer, you will design and develop
    critical software components & applications.
  - You will be part of agile development team and would be
    collaborating with multiple teams across different
    locations
  - You will provide mentorship for team members and participate
    in the interview panels to hire new members.
  - You will be required to communicate successfully with
    multiple teams and many personalities.
  - You will perform code reviews to ensure quality of the
    codebase.
  - You will be required to update skills by studying state-of-
    the-art development tools, programming techniques; reading
    professional publications; maintaining personal networks;
  - You will be required to identify opportunities for improving
    system performance, reliability, security, and stability
    then working with product owners to prepare backlog items
    for the team.
  - Implement best practices based on company wide policies and
    standards.
  - Promote internal best practices and coding conventions to
    write tests for code, including creating comprehensive
    unit, integration and system tests.
  - Contribute to the detailed technical & design documentation.
  - Assist in removing obstacles for the team to yield
    successful releases.
  
  Skills & Experience:
  
  - 8+ years' software product development experience.
  - 3+ years of experience in programming large-scale enterprise
    products & web applications.
  - Experience is designing APIs using REST Architectural Style
  - Experience in designing & implementing services using
    various Microservices patterns and design principles.
  - Deep knowledge of the Microsoft Development Stack: C#,
    Especially .NET Core/ .NET 6.0+
  - Deep knowledge of ASP.NET Core, Minimal APIs
  - Experience in using various AI tools for development (Github
    co-pilot, MCP, Prompts, Claude and other)
  - Experience in Docker and Kubernetes.
  - Experience in AWS services including EKS, EC2, Elastic
    cache, Non RDBMS, SNS and SQS.
  - Familiar with SDLC and programming design patterns.
  - Familiar with Agile methodology.
  - Familiar with DevOps principles & especially GitOps and
    GitHub Actions.
  - Skilful at reviewing new feature impact on an application
    and recognizing potential risks.
  - Skilled at analyzing performance in a service.
  - Uses time effectively and efficiently.
  - Detailed oriented, professional and possesses a positive
    work attitude.
  - Communicate professionally both verbally and in writing.
  - Bachelor’s/Master’s Degree in Computer Science or
    equivalent.
  
  
  
  
  
