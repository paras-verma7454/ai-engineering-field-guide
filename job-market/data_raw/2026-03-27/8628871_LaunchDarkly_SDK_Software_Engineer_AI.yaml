description: |
  About the Job:
  
  As an SDK Engineer on LaunchDarkly’s AI Configs team, you'll
  build the primary touchpoint that our customers interact
  with on a daily basis. You’ll drive the development of the
  SDK that enables customers to control, monitor, and optimize
  their GenAI functionality. You’ll primarily work in Python
  and Typescript, but you’ll also be exposed to other
  languages in LaunchDarkly’s stack. When working on our SDKs,
  you’ll contribute to much more than thin client wrappers.
  Our SDKs are feature-rich agents with strong emphases on
  performance, concurrency, and resiliency – all while
  following idiomatic practices for their tech stack.
  
  LaunchDarkly’s AI Configs team is on a mission to manage the
  complete software development lifecycle for GenAI features,
  from configuring to benchmarking to observing and beyond.
  This team has a huge opportunity ahead of it; we're growing
  fast and we need your help writing the next chapter in our
  story.
  
  Responsibilities:
  
  - Contribute to the development of our open-source AI SDKs,
    including implementing new features and keeping up-to-date
    with the latest development practices
  - Collaborate with our engineering and product teams to drive
    the implementation and release of major features
  - Drive key improvements to key developer experience touch
    points within the SDK
  - Actively maintain our open-source repositories
  - Identify areas of improvement and advocate for best
    practices
  - Have an active voice in shaping both technology and product
    decisions
  
  Qualifications:
  
  - Demonstrable experience building libraries and packages used
    by other developers
  - 5+ years experience with Python and Typescript
  - Experience working with AI SDKs such as the OpenAI and
    Vercel AI SDKs
  - Strong computer science fundamentals
  - Committed to working in a communicative, collaborative
    environment
  - Self‐starter and problem solver, willing to solve difficult
    problems and work independently when necessary
  - Strong testing background: experience building unit,
    integration, load tests, and benchmarks
  - Experience writing production-ready code with emphasis on
    quality and maintainability
  - Experience contributing to open-source software
  
  Pay:
  
  Target pay ranges based on Geographic Zones* for Level 3:
  
  - Zone 1: San Francisco/Bay Area or NYC Metropolitan Area,
    Boston, Seattle - $171,200 - $235,400**
  - Zone 2: Irvine, LA, Monterey, Santa Barbara, Santa Rosa,
    Austin, Portland, Philadelphia, Chicago - $154,100 -
    $211,860**
  - Zone 3: All other US locations - $145,500 - $200,090 **
  
  LaunchDarkly operates from a place of high trust and
  transparency; we are happy to state the pay range for our
  open roles to best align with your needs. Exact compensation
  may vary based on skills, experience, and location.
  
  *Within the United States, our geographic pay zones are
  defined by counties surrounding major metropolitan areas.
  **Restricted Stock Units (RSUs), health, vision, and dental
  insurance, and mental health benefits in addition to salary.
  
  About LaunchDarkly:
  
  Modern software delivery was supposed to be the foundation
  for a thriving digital business but reality has proven
  otherwise. Slow, inefficient development cycles, costly
  outages, and fragmented customer experiences are preventing
  developers from building their best software. The
  LaunchDarkly platform helps developers innovate on new
  features faster while protecting them with a safety valve to
  instantly rewind when things go wrong. Developers can target
  product experiences to any customer segment and maximize the
  business impact of every feature. And by gradually rolling
  out new application components, they escape nightmare "big-
  bang" technology migrations.
  
  The LaunchDarkly platform was built to guide engineers to
  the next frontier of DevOps by:
  
  - Improving the velocity and stability of software releases,
    without the fear of end customer outages
  - Delivering targeted experiences by easily personalizing
    features to customer cohorts
  - Maximizing the business impact of every feature through the
    ability to experiment and optimize
  - Coordinating the release and optimization of software to
    provide consistent experiences across mobile platforms and
    device types
  - Improving the effectiveness and productivity of engineering
    teams, by providing insights into engineering cadence and
    stability
  
