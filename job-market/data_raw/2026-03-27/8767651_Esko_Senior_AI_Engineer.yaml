  technology solutions made up of over 16,000 associates
  across our Water Quality and Product Identification segments
  all united by a powerful purpose: Safeguarding the World’s
  Most Vital Resources.
  
  At Veralto, we value diversity and the existence of
  similarities and differences, both visible and not, found in
  our workforce, workplace and throughout the markets we
  serve.  Our associates, customers and shareholders
  contribute unique and different perspectives as a result of
  these diverse attributes.
  
  
