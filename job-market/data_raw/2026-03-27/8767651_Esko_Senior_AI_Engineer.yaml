description: |
  Are you…
  
  Interested to work on cutting edge AI work and be a front
  runner in AI space?
  
  Excited to work on solving business problems using AI?
  
  Interested in developing your career in a leading packaging
  and printing industry?
  
  Interested in working for a company that is dedicated to
  sustainability?
  
  If so, read on!
  
  Esko, a Veralto company, is a global provider of integrated
  software and hardware solutions that accelerate the go-to-
  market process of packaged goods. Our products empower teams
  to support and manage the packaging design and print
  processes for brand owners, retailers, pre-media and trade
  shops, manufacturers, and converters to provide the most
  innovative, integrated platform and comprehensive portfolio
  of tools that intelligently digitize, connect, automate, and
  accelerate the concept to market processes for every
  packaged product.
  
  You will be part of a flexible, family friendly organization
  that cares about its people just as it cares about the
  environment.
  
  We recognize that people come with a wealth of experience
  and talent.  Diversity of experience and skills combined
  with passion is a key to innovation and excellence.
  Therefore, we encourage people from all backgrounds to apply
  to our positions.
  
  We are looking for Senior AI Engineer to support the
  development and integration of AI solutions using large
  language models (LLMs), retrieval-augmented generation
  (RAG), and agentic frameworks. This mid-level role is ideal
  for engineers with a solid foundation in AI/ML and a passion
  for building intelligent systems.
  
  You will contribute to Esko’s mission of helping brands and
  suppliers streamline their packaging go-to-market process.
  Your work will focus on enabling automatic artwork creation,
  layouting, and simplifying business workflows through AI-
  powered tools that integrate with existing Esko products.
  Role is Hybrid and its preferable to have incumbent based in
  Bangalore.
  
  In this role, a typical day will look like:
  
  - Develop and maintain LLM-based components including prompt
    templates, embeddings, and vector search integrations.
  - Assist in building agentic workflows that utilize tools,
    APIs, and plugins for task execution.
  - Collaborate with senior engineers to prototype and deploy
    AI-powered features in production environments.
  - Integrate and experiment with frameworks like LangChain,
    Semantic Kernel, or similar.
  - Monitor and improve performance, reliability, and safety of
    deployed AI systems.
  - Work closely with data scientists, product managers, and
    platform teams to support AI initiatives across Esko’s
    packaging solutions.
  
  Required Skills & Qualifications
  
  - Bachelor’s degree in Computer Science, Data Science, or a
    related field.
  - Minimum 6 years of IT experience.
  - 3–4 years of hands-on experience in AI/ML engineering, with
    exposure to Natural Language Processing (NLP) or Large
    Language Models (LLMs).Strong familiarity with transformer
    architectures, prompt engineering, and vector databases
    such as FAISS or Pinecone.
  - Proficiency in Python, with practical experience using
    frameworks like Hugging Face Transformers or LangChain.
  - Solid understanding of software engineering principles,
    cloud-based deployment, and ML model lifecycle management.
  
  Preferred Qualifications
  
  - Experience working with agentic frameworks or building
    simple autonomous workflows.
  - Exposure to RAG pipelines or fine-tuning LLMs.
  - Interest in responsible AI practices and secure model
    deployment.
  - Contributions to open-source projects or participation in AI
    communities.
  
  At Esko, a Veralto Company, innovation comes in every color
  and never in the same package. Join Esko and see how
  diversity of people and thought fuels a career journey like
  no other. Create unique technology solutions for the
  packaging value chain, bring new ideas to life, make and
  influence decisions, and experience career growth, rewards,
  and recognition in our global Packaging & Color
  organizations.
  
  Esko is proud to be a Product Quality & Innovation company
  in Veralto (NYSE: VLTO).  Imagine a world where everyone has
