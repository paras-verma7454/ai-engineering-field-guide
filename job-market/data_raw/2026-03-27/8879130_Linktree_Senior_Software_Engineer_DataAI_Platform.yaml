description: |
  The Role
  
  As a Senior Software Engineer on Linktree’s Data Platform
  team, you’ll play a crucial role in building a robust,
  scalable data platform that drives innovative experiences in
  our core product. Your contributions will unlock new
  opportunities for our tens of millions of users and our
  billions of visitors around the world, helping us achieve
  Linktree’s mission: empowering anyone to curate, grow and
  monetize their digital universe.
  
  You’ll collaborate with a talented group of ML/AI/Product
  Engineers, Analysts, Data Scientists and Product Managers
  and create powerful frameworks, tools, and services that
  support emerging technologies like semantic search,
  recommender systems, and content understanding.
  
  Now is an exciting time to join our team as we undergo a
  major transition to a self-serve data platform. With our
  company experiencing rapid growth, you'll have the
  opportunity to be at the forefront of this transformative
  shift, shaping a pivotal part of our data strategy and
  making a lasting impact on our future success. Help us take
  the next giant leap in our data journey.
  
  What You’ll Own
  
  - You’ll be responsible for the delivery and real-world
    application of a broad range of data, ML and AI
    technologies;
  - You’ll do hands-on work to continuously level-up our event
    ingestion, event SDKs, data warehouses, data pipelines and
    data integrations;
  - You’ll design performant, scalable systems that empower our
    internal teams to self-serve their data needs;
  - You’ll contribute to Linktree’s experimentation platform;
    helping teams rapidly experiment with a wide range of
    ideas;
  - You’ll evangelise best practices for data, ML, and AI, and
    drive adoption across the company.
  
  Who We’re Looking For
  
  - Experience: 4+ years of software engineering experience with
    a strong background in contributing to scalable data
    platforms. Experience supporting AI/ML systems that scale.
    Experience with data technologies (e.g. DBT), data
    warehousing solutions (e.g. Snowflake), and cloud
    platforms (e.g. AWS).
  - Technical Skills: Proficiency in programming languages such
    as Python, or TypeScript and experience with
    infrastructure as code tools such as CDK.
  - Communication: Excellent interpersonal and communication
    skills, with the ability to collaborate effectively across
    teams and present technical concepts to non-technical
    stakeholders.
  - Education: Bachelor’s degree in Computer Science,
    Engineering, or a related field. Advanced degrees or
    relevant certifications are a plus.
  
  Linktree is committed to providing a competitive
  compensation package. Our cash compensation amount for this
  role is targeted at $180,000-$200,000 in the San Francisco
  Bay or Los Angeles area. Final offer amounts are determined
  by multiple factors including candidate expertise, the scope
  of role and level, and may vary from the amounts listed
  above.
  
  P.S. If you don’t tick every box in this ad, please don’t
  rule yourself out. We take pride in inclusion and hiring
  incredible human beings with great potential over ticking
  boxes – so if this role resonates with you, hit that apply
  button!
  
  Our Story
  
  We’re on a mission to empower anyone to curate, grow, and
  monetize their digital universe. We created the “link in
  bio” category — and we’re just getting started. From
  creators, artists, and entrepreneurs to global brands, we’re
  redefining how people connect with their communities,
  showcase their content and promote products — all in one
  link.
  
  Today, a community of 70+ million use Linktree, including
  icons like Adidas, TikTok, the UN Environmental Program, The
  NFL, Manchester United, World Central Kitchen, Sabrina
  Carpenter, Olivia Rodrigo, and Selena Gomez. With 48,000 new
  accounts created every day, Linktree is the fastest-growing
  leader in our space.
  
  We’ve teamed up with some of the world’s biggest platforms
  including TikTok, Snap, YouTube, GoFundMe, Spotify, Google,
  Stripe, Reddit, Laylo, and Kajabi, to unify Linkers’ digital
  spaces, and we partner with retail brands Amazon, Nike,
  Nordstrom Target, Sephora, Vuori, and more to share products
  they love.
  
  We’re a tight-knit, passionate team building best-in-class
  tools that make online presence simple, powerful, and yours.
  If you're excited by the idea of shaping a new category,
  setting the standard, and making space for everyone to be
  seen and succeed, we’d love to meet you.
  
  Where and How We Work
  
  We're a global, diverse team spread across continents with
  offices in London, Los Angeles, Melbourne, and San
  Francisco. We work together flexibly and you can choose the
  setup that works best for you: fully remote or a hybrid mix
  of office and home.
  
  We offer autonomy in how you structure your days and weeks.
  While we’re mindful of time zones and occasionally
  collaborate outside the typical 9–5, we lean into async work
  to keep things flowing. Our culture is family-friendly and
  Zoom-casual where kids, pets, and delivery drivers are
  welcome.
  
  How we’ll help you thrive
  
  Our approach to benefits considers the whole person and the
  unique contributions they bring to Linktree. We want the
  experience at Linktree to be one that enables people to
  truly thrive so we can Go Further Together (one of our
  values). Some ways we support you:
  
  - An annual wellbeing allowance to use on things like (but not
    limited to) fitness memberships, development courses,
    childcare, travel, charitable donations, pet insurance,
    home office set-up - the choice is yours!
  - 100% coverage (and 80% for your dependents) of your monthly
    premiums for medical, dental, vision, disability and life
    insurance for US-based employees.
  - Employer contribution towards your retirement.
  - Generous time off for vacation, holidays, parental leave,
    volunteer time, and other categories.
  - Employee stock option program - we want each and every
    employee to share in the company’s success.
  
  At Linktree, we believe in promoting a culture that
  celebrates unique backgrounds, talents, and experiences, and
  we’re proud to be an equal opportunity workplace. We are
  creating an inclusive workplace where every individual feels
  valued, respected, and has equal opportunities to thrive. We
  aim to foster a diverse and inclusive environment where all
  team members have a sense of belonging. Linktree welcomes
  all people regardless of sex, gender identity, race,
  ethnicity, disability, pregnancy, age, or other lived
  experience. If you require accommodations to fully
  participate in our opportunities, please don't hesitate to
  reach us at talent@linktr.ee – your needs are important to
  us.
