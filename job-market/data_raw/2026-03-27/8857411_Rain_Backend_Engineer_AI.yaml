description: |
  About the Company
  
  Rain makes the next generation of payments possible across
  the globe. We’re a lean and mighty team of passionate
  builders and veteran founders. Our infrastructure makes
  stablecoins usable in the real-world by powering card
  transactions, cross-border payments, B2B purchases,
  remittances, and more. We partner with fintechs, neobanks,
  and institutions to help them launch solutions that are
  global, inclusive, and efficient. You will have the
  opportunity to deliver massive impact at a hypergrowth
  company that is funded by some of the top investors in
  fintech, crypto, and SaaS, including Sapphire Ventures,
  Norwest, Galaxy Ventures, Lightspeed, Khosla, and several
  more. If you’re curious, bold, and excited to help shape a
  borderless financial future, we’d love to talk.
  
  Our Ethos
  
  We believe in an open and flat structure. You will be able
  to grow into the role that most aligns with your goals. Our
  team members at all levels have the freedom to explore ideas
  and impact the roadmap and vision of our company.
  
  About the Team
  
  You'll be one of the first engineers on Rain's new AI team.
  We're building from the ground up internal systems that make
  our operations smarter and customer-facing infrastructure at
  the intersection of AI agents, fintech, and stablecoins,
  including some of the first agentic payment systems in
  production. If you want to shape how AI gets built into a
  payments company, this is the role.
  
  What You'll Do
  
  - Be a critical part of the technical and product roadmap
  - Build and scale the backend systems, APIs, and data
    pipelines that power Rain
  - Design and ship AI-powered features, agents, and automation
    into our core platform
  - Build shared AI infrastructure: composable tool interfaces,
    eval frameworks, and permission-aware data access
  - Rapidly ship new capabilities to our customers and internal
    teams
  - Work embedded with the business, understand the workflows
    you're building for firsthand
  
  What We're Looking For
  
  - Experience with Node.js and other backend technologies
  - 1–3+ years building production systems that use LLMs, tool
    calling, structured outputs, prompt architecture,
    retrieval patterns
  - A builder mentality, someone who experiments with side
    projects
  - Comfortable with ambiguity, you can take a loosely defined
    problem, make decisions, and ship
  - This position is for folks with 3–8+ years of experience,
    compensation will be based on experience
  
  Nice to Have
  
  - Eval framework design, building systematic ways to measure
    AI quality
  - Fintech experience (neobank or card issuing experience gets
    extra brownie points)
  - Experience building internal tools or platform systems at a
    growth-stage company
  
  Things that enable a fulfilling, healthy and happy
  experience at Rain:
  
  Unlimited time off 🌴Unlimited vacation can be daunting, so
  we require Rainmakers to take 10 days minimum for
  themselves.
  
  Flexible working ☕ We support a flexible workplace, if you
  feel comfortable at home please work from home. If you’d
  like to work with others in an office feel free to come in.
  We want everyone to be able to work in the environment in
  which they are their most confident and productive selves.
  New Rainmakers will have a stipend to create a comfortable
  atmosphere at home.
  
  Easy to access benefits 🧠For US Rainmakers, we offer
  comprehensive health, dental and vision plans for you and
  your dependents, as well as a 100% company subsidized life
  insurance plan.
  
  Retirement goals💡Plan for the future with confidence. We
  offer a 401(k) with a 4% company match.
  
  Equity plan 📦 We offer every Rainmakers an equity option
  plan so we can all can benefit from our success.
  
  Rain Cards 🌧️ We want Rainmakers to be knowledgeable about
  our core products and services. To support this mission, we
  issue a card for our team to utilize the card for testing.
  
  Health and Wellness 📚 High performance begins from within.
  Rainmakers are welcome to use their card for eligible health
  and wellness spending like gym memberships/fitness classes,
  massages, acupuncture - whatever recharges you!
  
  Team summits ✨ Summits play an important role at Rain! Time
  spent together helps us get to know each other, strengthen
  our relationships, and build a common destiny. Expect team
  and company offsites both domestically and internationally.
