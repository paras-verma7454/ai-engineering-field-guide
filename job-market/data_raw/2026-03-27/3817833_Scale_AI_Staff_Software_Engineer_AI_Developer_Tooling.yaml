description: |
  Software is eating the world, but AI is eating software. We
  live in unprecedented times – AI has the potential to
  exponentially augment human intelligence. Every person will
  have a personal tutor, coach, assistant, personal shopper,
  travel guide, and therapist throughout life. As the world
  adjusts to this new reality, leading platform companies are
  scrambling to build LLMs at billion scale, while large
  enterprises figure out how to add it to their products.
  
  At Scale, our products include the Generative AI Data
  Engine, SGP, Donovan, and others that power the most
  advanced LLMs and generative models in the world through
  world-class RLHF, human data generation, model evaluation,
  safety, and alignment. The data we are producing is some of
  the most important work for how humanity will interact with
  AI.
  
  At the foundation of these products is the Platform
  Engineering team. In this role, you will redefine how
  engineers develop, build, test, and deploy software at Scale
  using AI development tools in addition to traditional
  practices.  You’ll also get widespread exposure to the
  forefront of the AI race as Scale sees it in enterprises,
  startups, governments, and large tech companies.
  
  You will:
  
  - Define next-generation AI development tooling and frameworks
    using products like Cursor, Claude Code, OpenAI Codex, and
    MS Copilot, as well as in-house custom-built solutions.
  - Drive the architecture, design, and implementation of our
    local development process, build, test, continuous
    integration, and continuous delivery systems, working
    closely with stakeholders and internal customers to
    understand and refine requirements.
  - Directly mentor software engineers ranging from new grads to
    experienced engineers.
  - Proactively identify opportunities and drive improvements to
    software development practices, processes, tools, and
    languages.
  - Present technical information to teams and stakeholders,
    providing guidance and insight on development processes
    and technologies.
  
  Ideally you’d have:
  
  - 8+ years of full-time engineering experience, post-
    graduation, with experience in build, test, or CI/CD
    systems.
  - Extensive experience defining and evangelizing best-
    practices for AI development tools, including cost
    guardrails, security frameworks, and hosting knowledge-
    sharing sessions, among others.
  - Extensive experience in software development and a deep
    understanding of distributed systems and public cloud
    platforms (AWS preferred).
  - Experience configuring, testing, and enabling MCP servers,
    AI agents, and other associated systems.
  - Show a track record of independent ownership of successful
    engineering projects.
  - Possess excellent communication and collaboration skills,
    and the ability to translate complex technical concepts to
    non-technical stakeholders.
  - Experience working fluently with standard infrastructure,
    containerization, and deployment technologies like
    Terraform, Docker, Kubernetes, etc.
  - Experience with modern web frameworks like NodeJS, NextJS,
    etc.
  - Strong knowledge of software engineering best practices and
    CI/CD tooling (CircleCI, Helm, ArgoCD).
  
  Nice to haves:
  
  - Experience scaling products at hyper-growth startups.
  - Experience with modern build systems like Bazel, Buck,
    Pants, etc.
  
  Compensation packages at Scale for eligible roles include
  base salary, equity, and benefits. The range displayed on
  each job posting reflects the minimum and maximum target for
  new hire salaries for the position, determined by work
  location and additional factors, including job-related
  skills, experience, interview performance, and relevant
  education or training. Scale employees in eligible roles are
  also granted equity based compensation, subject to Board of
  Director approval. Your recruiter can share more about the
  specific salary range for your preferred location during the
  hiring process, and confirm whether the hired role will be
  eligible for equity grant. You’ll also receive benefits
  including, but not limited to: Comprehensive health, dental
  and vision coverage, retirement benefits, a learning and
  development stipend, and generous PTO. Additionally, this
  role may be eligible for additional benefits such as a
  commuter stipend.
  
  Please reference the job posting's subtitle for where this
  position will be located. For pay transparency purposes, the
  base salary range for this full-time position in the
  locations of San Francisco, New York, Seattle is:
  
  $248,400—$310,500 USD
  
  PLEASE NOTE: Our policy requires a 90-day waiting period
  before reconsidering candidates for the same role. This
  allows us to ensure a fair and thorough evaluation of all
  applicants.
  
  About Us:
  
  At Scale, our mission is to develop reliable AI systems for
  the world's most important decisions. Our products provide
  the high-quality data and full-stack technologies that power
  the world's leading models, and help enterprises and
  governments build, deploy, and oversee AI applications that
  deliver real impact. We work closely with industry leaders
  like Meta, Cisco, DLA Piper, Mayo Clinic, Time Inc., the
  Government of Qatar, and U.S. government agencies including
  the Army and Air Force. We are expanding our team to
  accelerate the development of AI applications.
  
