description: |
  As a Senior / Staff Forward Deployed AI Engineer at Charta,
  you'll play a pivotal role in deploying, customizing, and
  optimizing cutting-edge generative AI healthcare solutions
  directly for our clients.
  
  About Charta Health
  
  In an industry where the focus should rightly be on
  delivering quality care to patients, healthcare providers
  remain burdened by the complexities of non-clinical
  operations. Charta is changing that.
  
  We're building the operating system for modern healthcare
  organizations. Our AI platform streamlines critical
  workflows across revenue cycle, clinical operations, and
  administrative functions, helping providers and payers
  operate more efficiently and deliver better patient care.
  Backed by Bain Capital Ventures, Charta is on a mission to
  make every healthcare dollar accountable and every chart
  accurate, reimagining healthcare infrastructure from the
  ground up.
  
  About the Opportunity
  
  As a Senior Forward Deployed AI Engineer at Charta Health,
  you will be at the forefront of deploying and customizing
  AI-powered solutions for our clients. You will work directly
  with healthcare providers to understand their unique
  challenges and translate them into practical, data-driven
  solutions using AI and machine learning. This role requires
  a blend of technical expertise, problem-solving skills, and
  a strong customer-centric mindset. You will thrive in a
  dynamic environment, rapidly deploying and iterating on
  solutions to deliver immediate value.
  
  What you'll do:
  
  - Collaborate closely with healthcare clients to understand
    their workflows and identify opportunities to leverage AI
    and machine learning.
  - Customize and deploy Charta Health's AI-driven platforms to
    address specific client needs.
  - Rapidly prototype and iterate on solutions, adapting to
    client feedback and evolving requirements.
  - Break down complex projects into actionable steps and
    deliver results in ambiguous environments.
  - Explore and integrate a wide range of AI/ML technologies,
    adapting to the diverse needs of our clients.
  - Provide technical expertise and support to clients, ensuring
    successful deployment and adoption of our solutions.
  - Work closely with our internal engineering team to provide
    feedback and contribute to product development.
  - Stay up-to-date with the latest advancements in AI/ML and
    their applications in healthcare.
  - Mentor and guide fellow engineers, sharing expertise in
    AI/ML, healthcare applications, and best practices to
    foster team growth and knowledge sharing.
  - Contribute strategic ideas and technical insights to shape
    the product roadmap, leveraging client feedback and
    expertise in AI/ML advancements to drive innovation
  
  You'd be a great fit if you have:
  
  - A minimum of 4 years of professional experience in software
    engineering, data engineering, machine learning
    engineering, or a similar technical role.
  - Proficiency and practical coding skills, with a focus on
    delivering tangible results.
  - Experience with, or a demonstrated deep interest in, Large
    Language Models (LLMs) and prompt engineering.
  - Adaptability and the ability to quickly learn and master new
    technologies and concepts.
  - A priority on delivering business value over solving purely
    theoretical challenges.
  - A desire to explore a wide range of technologies and
    problems, rather than specializing in one area.
  - The ability to thrive in ambiguous environments and rapidly
    produce results.
  - The ability to excel at breaking down complex projects into
    actionable steps.
  - Resilience and resourcefulness, allowing you to overcome
    obstacles and find creative solutions.
  - Ambition and a desire for a high-growth opportunity.
  - Strong emotional intelligence, excellent communication, and
    interpersonal skills.
  - Excitement about working with external customers and
    building strong relationships.
  - A genuine interest in the medical field and a passion for
    improving healthcare.
  
  Nice to have:
  
  - Experience and/or demonstrated interest in healthcare
  - Proficiency in Python.
  - Experience with neural networks and machine learning
  
  What we offer:
  
  - Competitive salary and comprehensive benefits package,
    including health, dental, and vision.
  - Equity & growth opportunities in a fast-growing, innovative
    tech startup.
  - Ongoing professional development and access to cutting-edge
    AI and healthcare tools.
  - Lively, in-person work culture at our SF Headquarters or NYC
    office
  - $150,000 - $250,000 USD depending on experience + Equity +
    Benefits
  - Annual performance based bonus up to 30%
  
  Our Commitment to Diversity
  
  We are an equal opportunity employer and value diversity at
  our company. We do not discriminate on the basis of race,
  religion, color, national origin, gender, sexual
  orientation, age, marital status, veteran status, or
  disability status.
