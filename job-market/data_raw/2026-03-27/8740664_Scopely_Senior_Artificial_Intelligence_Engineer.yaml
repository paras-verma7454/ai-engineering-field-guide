description: |
  Scopely is looking for a Senior AI Engineer to join our Gen
  AI team in Bangalore!
  
  At Scopely, we care deeply about what we do and want to
  inspire play, every day - whether in our work environments
  alongside our talented colleagues, or through our deep
  connections with our communities of players. We are a global
  team of game lovers who are developing, publishing and
  innovating the mobile games industry, connecting millions of
  people around the world daily.
  
  What You’ll Do
  
  For this role we are seeking an experienced and forward-
  thinking Senior AI Engineer with deep expertise in
  Artificial Intelligence and Machine Learning to lead the
  design and development of intelligent systems powering
  analytics, automation, and immersive in-game experiences.
  This role involves prototyping, researching emerging AI
  methods, and delivering scalable solutions that integrate
  seamlessly into production pipelines and game technologies.
  
  - Lead the strategic design, development, and deployment of
    advanced AI systems for Conversational Analytics,
    Knowledge Bases, QA Automation, and in-game intelligent
    experiences
  - Architect and implement scalable AI solutions supporting
    real-time systems, automation pipelines, and player-facing
    features
  - Drive innovation in:
  - Collaborate across disciplines to translate high-level goals
    into robust, AI-powered capabilities
  - Mentor and guide engineers, promote best practices, and
    contribute to architectural decisions shaping long-term
    technical direction
  - Present research, insights, and prototypes that influence
    product vision and accelerate the adoption of emerging AI
    technologies
  - Lead efforts in AI infrastructure, including model
    deployment workflows, performance tuning, and system
    observability in production environments
  
  What We’re Looking For
  
  - 5+ years of professional experience in software engineering
    or a related field, with significant hands-on experience
    in AI/ML, including 2+ years in a senior role
  - Strong hands-on experience with FastAPI and designing
    scalable, high-performance APIs
  - Proven track record in cloud-native development (AWS, GCP or
    similar) and containerization using Docker
  - Strong background in software engineering best practices:
    CI/CD, Git workflows, testing strategies, and production-
    grade code quality
  - Solid understanding of distributed systems, microservices
    architectures, and data management with both SQL and NoSQL
    technologies
  - A strong sense of ownership and product thinking —
    proactively seeking ways to create value and drive impact
  - Excellent problem-solving and system design skills, with a
    methodical and scalable approach to complex AI challenges
  - Strong communicator with the ability to explain technical
    concepts clearly and influence cross-team decisions
  
  Bonus
  
  - Experience with MLOps, reinforcement learning, computer
    vision, or game AI development
  - Contributions to open-source AI projects or publications in
    AI-related domains
  
  About Scopely
  
  Scopely is a leading video game and global interactive
  entertainment company, home to many of the world’s most
  beloved and enduring experiences, including two of the most
  successful mobile games of all-time “MONOPOLY GO!” and
  “Pokémon GO,” along with “Stumble Guys,” “Star Trek™ Fleet
  Command,” “MARVEL Strike Force,” “WWE Champions,” the
  Scrabble® franchise, “Yahtzee® With Buddies,” and many
  others. Across mobile, web, PC, and console, Scopely
  creates, develops, publishes, and live-operates one of the
  most diversified and award-winning portfolios in the games
  industry — bringing hundreds of millions of players together
  through a shared love of play.
  
  Founded in 2011, Scopely is powered by its exceptional team
  — including thousands of world-class gamemakers around the
  globe, a distinctive tenet-driven culture, and its
  proprietary technology platform, Playgami. Together, these
  strengths have fueled Scopely’s position as the #1 mobile
  games company in the U.S. and #2 globally, generating more
  than $10 billion in lifetime revenue. Whether building
  global sensations like “MONOPOLY GO!” from the ground up, or
  expanding through strategic acquisitions, including the
  FoxNext, GSN, and Niantic games businesses — Scopely
  consistently delivers experiences players love today and
  return to for years to come.
  
  Recognized multiple times as one of the "100 Most
  Influential Companies in the World" by TIME magazine and one
  of Fast Company's "World's Most Innovative Companies" and
  “Best Workplaces for Innovators,” Scopely believes that
  video games can be a force for good — creating meaningful
  connections, vibrant communities, and making life better
  through play.
  
  Scopely has global operations and partners across four
  continents in more than a dozen countries worldwide. For
  more information, visit: https://www.scopely.com/.
  
  Notice to Candidates: Scopely will never request payment or
  financial information during the application or hiring
  process. Please apply only through our official website and
  verify that all Talent Partner communications come from an
  email address ending in @scopely.com.
  
  Should you have any questions or encounter any fraudulent
  requests/emails/websites, please immediately contact
  recruiting@scopely.com. Our job applicant privacy policies
  are available here: California Privacy Notice and EEA/UK
  Privacy Notice.
  
  Employment at Scopely is based solely on a person's merit
  and qualifications. Scopely does not discriminate against
  any employee or applicant because of race, creed, color,
  religion, gender, sexual orientation, gender
  identity/expression, national origin, disability, age,
  genetic information, veteran status, marital status,
  pregnancy or related condition (including breastfeeding), or
  any other basis protected by law. We also consider qualified
  applicants with arrest or conviction records, consistent
  with applicable federal, state and local law.
