  - Develop and lead the production of proprietary AI algorithms
    to push the boundaries of large language models.
  - Build and maintain a state-of-the-art evaluation pipeline to
    benchmark performance on large datasets.
  - Research and implement advanced prompt engineering methods
    to maximize model efficacy and output quality.
  
