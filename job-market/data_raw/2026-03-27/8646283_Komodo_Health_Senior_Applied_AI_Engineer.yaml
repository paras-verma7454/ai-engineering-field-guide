description: |
  We Breathe Life Into Data
  
  At Komodo Health, our mission is to reduce the global burden
  of disease. And we believe that smarter use of data is
  essential to this mission. That’s why we built the
  Healthcare Map — the industry’s largest, most complete,
  precise view of the U.S. healthcare system — by combining
  de-identified, real-world patient data with innovative
  algorithms and decades of clinical experience. The
  Healthcare Map serves as our foundation for a powerful suite
  of software applications, helping us answer healthcare’s
  most complex questions for our partners. Across the
  healthcare ecosystem, we’re helping our clients unlock
  critical insights to track detailed patient behaviors and
  treatment patterns, identify gaps in care, address unmet
  patient needs, and reduce the global burden of disease.
  
  As we pursue these goals, it remains essential to us that we
  stay grounded in our values: be awesome, seek growth,
  deliver “wow,” and enjoy the ride. At Komodo, you will be
  joining a team of ambitious, supportive Dragons with diverse
  backgrounds but a shared passion to deliver on our mission
  to reduce the burden of disease — and enjoy the journey
  along the way.
  
  The Opportunity at Komodo Health:
  
  Healthcare in the U.S. is a mess. Komodo Health is fixing
  that—with data. We’ve mapped the patient journey across the
  country to build the most complete picture of disease burden
  and treatment gaps. Our customers—pharma companies, payers,
  and health systems—use this data to make decisions that
  meaningfully improve patient outcomes.
  
  Labs@Komodo builds the AI-native platforms and systems that
  turn this data into action. We are the team behind Marmot,
  Komodo’s AI-native product—designed with AI embedded
  directly into both the interface and the development
  workflow. By combining Komodo’s unmatched healthcare data
  with modern LLMs, marmot is delivering some of the most
  compelling real-world insights of the new AI era.
  
  Mission of the Role:
  
  As a Senior Applied AI Engineer, you own complex, full-stack
  AI solutions end-to-end—from applied research to production
  deployment. This role exists to set technical direction for
  ambiguous and high-impact use cases across Komodo, while
  scaling the AI systems, patterns, and infrastructure that
  enable reliable, repeatable delivery. You’ll mentor others,
  lead architectural decisions, and deepen Komodo’s AI-first
  culture.
  
  Looking back on your first 12 months at Komodo Health, you
  will have accomplished…
  
  - Shipped production-grade, full-stack AI solutions that
    materially enhance Komodo’s platform precision,
    reliability, or scalability.
  - Led design and architecture for complex AI systems,
    including multi-agent orchestrations and advanced model
    pipelines.
  - Prototyped and validated new applied research techniques,
    bringing academic insights into practical implementation.
  - Designed A/B experiments and evaluation frameworks to
    measure AI impact in production.
  - Mentored engineers across teams in prompt engineering,
    debugging, agent orchestration, and AI system design.
  - Influenced MLOps pipeline improvements (model versioning,
    automated monitoring, CI/CD for AI).
  
  What You'll Own:
  
  - Architecting, building, and deploying end-to-end AI systems
    that balance innovation with reliability and ethical
    considerations.
  - Leading solution design for ambiguous AI problems across
    Komodo’s platform and internal operations.
  - Collaborating with product, data, and platform teams to
    define requirements and shape strategic AI investments.
  - Designing advanced prompt chains, multi-agent flows, and
    complex evaluation frameworks.
  - Driving applied research by experimenting with cutting-edge
    models, techniques, and academic papers.
  - Contributing to internal AI standards, reusable templates,
    and high-performance orchestration patterns.
  - Transitioning prototypes into scalable systems with
    comprehensive observability, alerting, and governance.
  
  What you bring to Komodo Health (required):
  
  - Proven track record of building end-to-end, production-grade
    AI systems.
  - Expertise with LLMs, agent orchestration, multi-agent
    systems, and advanced prompt engineering.
  - Strong fluency in Python and modern GenAI frameworks (vLLM,
    Crew AI, Strands, Chat Completions API).
  - Full-stack depth enabling seamless integration of AI across
    front-end and back-end systems.
  - Experience designing experiments, A/B tests, evaluation
    metrics, and performance instrumentation.
  - Experience collaborating with platform/infrastructure teams
    on MLOps workflows.
  - Strong cross-functional communication and mentorship
    capability.
  
  Expectations of AI Use in this role (required):
  
  You will drive experimentation across the organization, set
  best practices, and integrate new AI techniques into
  Komodo’s broader engineering ecosystem.
  
  Additional skills and experience we’d prioritize (nice to
  have)…
  
  - Healthcare data expertise.
  - Experience with distributed computing frameworks (e.g.,
    Spark, Snowflake, Databricks) for large-scale data
    processing.
  
  ** Location flexible to NYC or SF hybrid, and remote
  
  The pay range for each job posting reflects a minimum and
  maximum range of annual base pay that we reasonably expect
  to pay for this position within the US. We carefully
  consider multiple business-related factors when determining
  compensation, including job-related skills, work experience,
  geographic work location, relevant training and
  certifications, business needs and market demands.
  
  The starting annual base pay for this role is listed below.
  This position may be eligible for performance-based bonuses
  as determined in the Company’s sole discretion and in
  accordance with a written agreement or plan. This role may
  also be eligible for equity awards. In addition, this role
  is eligible for benefits including, but not limited to,
  comprehensive health, dental, and vision insurance; flexible
  time off and holidays; 401(k) with company match; disability
  insurance and life insurance; and leaves of absence in
  accordance with applicable state and local laws and
  regulations and company policy.
  
  San Francisco Bay Area and New York City:
  
  $230,000—$270,000 USD
  
  All Other US Locations:
  
  $200,000—$235,000 USD
  
  Komodo's AI Standard
  
  At Komodo, we're not just witnessing the AI revolution –
  we're leading it. This is a pivotal moment in time, where
  being first to market with AI transforms industries and sets
  the bar. We've already established industry leadership in
  leveraging AI to revolutionize healthcare, and we expect
  every team member to contribute. AI here isn't optional;
  it's foundational. We expect you to integrate AI into your
  daily work – from summarizing documents to automating
  workflows and uncovering insights. This isn't just about
  efficiency; it's about making every moment more meaningful,
  building on trust in AI, and driving our collective success.
  
  Join us in shaping the future of healthcare intelligence.
  Where You’ll Work
  
  Komodo Health has a hybrid work model with hubs in San
  Francisco, New York City, and Chicago. Roles vary — some can
  be performed from anywhere in the country, others are scoped
  to a specific region, and some are based near one of our
  hubs. For hub-based Dragons, we're building intentional in-
  office rhythms alongside the flexibility that's core to how
  we work. Whatever your setup, expectations will always be
  clear before you join.
  
