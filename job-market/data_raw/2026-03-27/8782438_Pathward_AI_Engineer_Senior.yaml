  About the Role:
  
  Responsible for researching, developing, and implementing
  Artificial Intelligence (AI) solutions to enable machines to
  simulate human intelligence by perceiving, reasoning,
  learning, and making decisions. Identifies opportunities for
  leveraging AI technology and optimizes existing AI models or
  develops custom solutions for specific applications.
  Prepares data for AI model training and trains, validates,
  and optimizes models. Integrates AI technologies into
  existing workflows.
  
  What You Will Do:
  
  - Research, design, and develop artificial intelligence and
    machine learning models to solve business challenges and
    enable machines to simulate human intelligence through
    perception, reasoning, learning, and decision-making
    capabilities.
  - Identify and evaluate opportunities for leveraging AI
    technologies across the organization, assess existing
    workflows, and recommend AI-driven solutions that improve
    efficiency, accuracy, and business outcomes.
  - Collect, prepare, and preprocess data from various sources
    for model training, including data cleaning, feature
    engineering, exploratory analysis, and establishing data
    pipelines to support continuous improvement.
  - Train, validate, and optimize AI models using appropriate
    algorithms, frameworks, and evaluation metrics to ensure
    robustness, performance, and accuracy while mitigating
    biases and ensuring ethical AI practices.
  - Integrate AI solutions into existing systems, applications,
    and workflows by developing APIs, microservices, or
    interfaces that enable seamless deployment and scalability
    in production environments.
  - Monitor and maintain deployed AI models through performance
    tracking, troubleshooting, and iterative improvements to
    ensure continued effectiveness and alignment with business
    objectives.
  - Collaborate with cross-functional teams including data
    scientists, software engineers, and business stakeholders
    to translate requirements into technical solutions and
    communicate complex AI concepts to non-technical
    audiences.
  - Other duties as assigned.
  
  What You Will Need:
  
  - Bachelor's degree or equivalent education and work
    experience
  - Typically, 5+ years with bachelor's or equivalent.
  
  The responsibilities listed above are not all inclusive and
  may be changed at any time.
  
  Salary range: $86,000 – $145,000
  
  
  The salary range reflects the minimum and maximum target for
