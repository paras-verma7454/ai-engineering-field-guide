  About A Place for Mom
  
  A Place for Mom is the leading platform guiding families
  through every stage of the aging journey. Together, we
  simplify the senior care search with free, personalized
  support — connecting caregivers and their loved ones to
  vetted providers from our network of 15,000+ senior living
  communities and home care agencies.
  
  Since 2000, our teams have helped millions of families find
  care that fits their needs. Behind every referral and
  resource is a shared goal: to help families focus on what
  matters most — their love for each other.
  
  We’re proud to be a mission-driven company where every role
  contributes to improving lives. Caring isn’t just a core
  value — it’s who we are. Whether you’re supporting families
  directly or driving innovation behind the scenes, your work
  at A Place for Mom makes a real difference.
  
  Our employees live the company values every day:
  
  - Mission Over Me: We find purpose in helping caregivers and
    their senior loved ones while approaching our work with
    empathy.
  - Do Hard Things: We are energized by solving challenging
    problems and see it as an opportunity to grow.
  - Drive Outcomes as a Team: We each own the outcome but can
    only achieve it as a team.
  - Win The Right Way: We see organizational integrity as the
    foundation for how we operate.
  - Embrace Change: We innovate and constantly evolve.
  
  Additional Information:
  
  A Place for Mom has recently become aware of the fraudulent
  use of our name on job postings and via recruiting emails
  that are illegitimate and not in any way associated with us.
  APFM will never ask you to provide sensitive personal
  information as part of the recruiting process, such as your
  social security number; send you any unsolicited job offers
  or employment contracts; require any fees, payments, or
  access to financial accounts; and/or extend an offer without
  conducting an interview.
  
  If you suspect you are being scammed or have been scammed
  online, you may report the crime to the Federal Bureau of
  Investigation and obtain more information regarding online
  scams at the Federal Trade Commission.
  
  All your information will be kept confidential according to
  EEO guidelines.
  
  A Place for Mom uses E-Verify to confirm the employment
  eligibility of all newly hired employees. To learn more
  about E-Verify, including your rights and responsibilities,
  please visit www.dhs.gov/E-Verify.
