description: |
  FEQ427R80
  
  As a Senior Solutions Engineer (Analytics, AI, Big Data,
  Public Cloud), you will guide the technical evaluation phase
  in a hands-on environment throughout the sales process. You
  will help our customers to achieve tangible data-driven
  outcomes through the use of our Databricks Lakehouse
  Platform, helping data teams complete projects and integrate
  our platform into their enterprise Ecosystem. You'll grow as
  a leader in your field, while finding solutions to our
  customers' biggest challenges in big data, analytics, data
  engineering and data science problems.
  
  The impact you will have:
  
  - You will be a Big Data Analytics expert on aspects of
    architecture and design
  - Engage with the technical community by leading presentations
    , workshops, seminars and meet-ups
  - Lead your clients through evaluating and adopting Databricks
    including hands-on Spark programming and integration with
    the wider cloud ecosystem
  - Support your customers by authoring reference architectures,
    how-tos, and demo applications
  - Integrate Databricks with 3rd-party applications to support
    customer architectures
  - Together with your Account Executive, you will form
    successful relationships with clients throughout your
    assigned territory to provide technical and business value
  
  What we look for:
  
  - Consulting , pre-sales or post sales experience working with
    external clients across a variety of industry markets
  - Core strength in either data engineering or data science
    advantageous
  - 5+ years of experience demonstrating technical concepts,
    including presenting and white-boarding
  - 4+ years of experience designing architectures within a
    public cloud (AWS, Azure or GCP)
  - 4+ years of experience with Big Data technologies, including
    Spark, AI, Data Science, Data Engineering, Hadoop,
    Cassandra, and others
  - Solid coding experience in Python, R, Java, Spark or Scala
  
  About Databricks
  
  Databricks is the data and AI company. More than 10,000
  organizations worldwide — including Comcast, Condé Nast,
  Grammarly, and over 50% of the Fortune 500 — rely on the
  Databricks Data Intelligence Platform to unify and
  democratize data, analytics and AI. Databricks is
  headquartered in San Francisco, with offices around the
  globe and was founded by the original creators of Lakehouse,
  Apache Spark™, Delta Lake and MLflow. To learn more, follow
  Databricks on Twitter, LinkedIn and Facebook. Benefits At
  Databricks, we strive to provide comprehensive benefits and
  perks that meet the needs of all of our employees. For
  specific details on the benefits offered in your region,
  please visit https://www.mybenefitsnow.com/databricks.
  
