description: |
  This is a job that Jill, our AI Recruiter, is recruiting for
  on behalf of one of our customers.
  
  She will pick the best candidates from Jack's network.
  
  The next step is to speak to Jack.
  
  Job Title: AI Engineer
  
  Company Description: Electric Twin - Atomico-backed AI
  startup creating synthetic audiences
  
  Job Description: You will join the Science team to bridge
  the gap between AI research and production engineering. By
  designing cognitive architectures and memory systems for
  LLM-driven agents, you will help build a platform that
  predicts human behavior with 95% accuracy, enabling global
  brands to conduct deep market research in seconds rather
  than weeks.
  
  Location: London, UK
  
  Why this role is remarkable:
  
  - Work at the frontier of behavioral simulation with a
    platform that delivers insights 10,000x faster than
    traditional research, validated by research from the
    London School of Economics.
  - Join a high-caliber team founded by the former Chief Adviser
    on Digital to the UK Prime Minister and backed by $14M
    from top-tier investors including Atomico, LocalGlobe, and
    Marc Andreessen.
  - Direct impact on a product used by giants like News UK and
    Lebara, moving beyond static data to create dynamic,
    reasoning digital populations.
  
  What you will do:
  
  - Design and implement cognitive systems that provide AI
    agents with consistent personalities, reasoning
    capabilities, and advanced memory using RAG and chain-of-
    thought prompting.
  - Conduct systematic experiments to validate synthetic agent
    behavior against real-world data, iterating on model
    architectures based on empirical performance.
  - Build the scalable backend infrastructure and sophisticated
    prompting strategies required to deploy multi-agent
    simulations in enterprise production environments.
  
  The ideal candidate:
  
  - Possesses over 7 years of technical experience with at least
    1 year of hands-on expertise building complex applications
    with Large Language Models and agentic workflows.
  - Demonstrates strong proficiency in Python and backend
    frameworks like FastAPI or Django, with a solid
    understanding of distributed systems and scalable
    architectures.
  - Holds a degree in a quantitative field (CS, Math, Physics,
    or AI) and thrives in fast-paced environments where
    research-driven development meets pragmatic engineering.
  
  Who are Jack & Jill?
  
  Ok, I'll go first. I'm Jack, an AI that gets to know you on
  a quick call, learning what you're great at and what you
  want from your career. Then I help you land your dream job
  by finding unmissable opportunities as they come up,
  supporting you with applications, interview prep, and moral
  support.
  
  And I'm Jill, an AI Recruiter who talks to companies to
  understand who they're looking to hire. Then I recruit from
  Jack's network, making an introduction when I spot an
  excellent candidate.
  
  Next steps
  
  Step 1. Visit our website. Step 2. Click 'Talk to Jack'.
  Step 3. Talk to Jack so he can understand your experience
  and ambitions. Step 4. Jack will make sure Jill (the AI
  agent working for the company) considers you for this role.
  Step 5. If Jill thinks you're a great fit and her client
  wants to meet you, they will make the introduction. Step 6.
  If not, Jack will find you excellent alternatives. All for
  free.
  
  We never post fake jobs
  
  This isn't a trick. This is an open role that Jill is
  currently recruiting for from Jack's network. Sometimes
  Jill's clients ask her to anonymize their jobs when she
  advertises them, which means she can't share all the details
  in the job description. We appreciate this can make them
  look a bit suspect, but there isn't much we can do about it.
  
  Give Jack a spin! You could land this role. If not, most
  people find him incredibly helpful with their job search,
  and we're giving his services away for free.
