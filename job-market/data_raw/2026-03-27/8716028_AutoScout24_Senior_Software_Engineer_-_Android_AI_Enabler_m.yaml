description: |
  A career driven by you. Join AutoScout24 Group and
  experience life in the fast lane. We’re not just leading the
  market; we’re creating it. We’re constantly innovating,
  evolving and transforming things for our customers. We’re
  driven, ambitious and determined to do our best work,
  together. For a career that doesn’t stand still, where you
  can put your ideas in the driving seat and change the way
  the world moves, join our international community.
  
  The engineering world is moving very fast. We are all
  learning every day. Your core traits should be curiosity and
  a strong drive to learn and grow. We do not expect you to
  know everything. We expect you to help accelerate our
  curiosity and learning culture, and to become AI-first
  together with us.
  
  What you’ll do:
  
  - Working in the technology stack we are using the native
    Android development stack: Kotlin, Dagger 2, Rx,
    Coroutines, Jetpack Compose and integrate with a GraphQL
    backend and a few REST services
  - Familiarity with UI Testing frameworks
  - Exploring the usage of advanced AI tools like Claude/Codex
  - Drive the (technical) planning of projects & features
  - Closely work together with other teams that provide APIs to
    the Apps
  - Evaluate and introduce new technologies
  - Mentor other developers in the team
  - Close collaboration with Product, UX and Data
  - Deliver work in trunk-based development style, using Feature
    Flags and experiments
  - Join us on our journey by finding the right mix between
    effort, quality and user value
  
  What you’ll bring:
  
  - Experience as a Software Engineer for at least 6 years
  - You are an expert regarding Kotlin and the Android SDK
  - Know how to build features for a large-scale App
  - Have owned complex, business-critical mobile systems end-to-
    end
  - Experience with Continuous Integration and Continuous
    Delivery Pipelines
  - Fluency in English is required (our working language).
    German proficiency is a plus
  - A pragmatic view of GenAI: you understand its limitations
    and risks and know how to put guardrails in place
    (reviews, tests, policies) to keep usage safe, compliant
    and sustainable at scale
  - Bonus: experience working with cloud computing platforms,
    ideally AWS
  - Bonus: you have experience working with GraphQL
  
  A culture of growth
  
  With over 50 nationalities represented, we’re proud to
  welcome people of all backgrounds to our growing community,
  and we’re always finding new ways to help people feel
  welcomed and included. Here, you’ll have the tools, training
  and support you need to work in a way that suits you, learn
  new skills and reach your potential.
  
  For a career where you can drive our business and shape your
  future, apply now.
