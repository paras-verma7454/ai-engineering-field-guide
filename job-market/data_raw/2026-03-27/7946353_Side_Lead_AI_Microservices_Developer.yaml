description: |
  - Develop and Architect Python-based API Microservices that
    make calls to LLMs and other generative models to support
    business needs.
  - Work on Python-based API Microservices that provide AI-
    enabled and LLM powered solutions for business needs.
  - Keep up with the latest LLM technologies including OpenAI,
    Llama and Gemini.
  - Understand and become the company’s expert in LLM and
    Generative AI API methods and Open Weights model
    deployment.
  - Work as a product manager to understand the business needs
    for business process automation tasks.
  - Turn business needs into API requirements for microservices.
  - Work with the DevOps team to ensure deployment of the
    Python-based APIs are live and kept functional.
  - Assist in the integration of your API microservices with
    other software and tools throughout the organization.
  
  Requirements
  
  - Bachelor's degree in Computer Science, Engineering, or a
    related field.
  - 5+ years of experience developing Python-based REST APIs.
  - Experience with OpenAI LLM APIs.
  - Understanding of micro-services architecture and ability to
    design scalable architectures from the ground up.
  - Knowledge of databases and programming APIs that use
    databases (NoSQL or SQL).
  - Experience coding with Python frameworks such as Flask,
    Django, FastAPI or similar.
  - Basic Web Application Architecture Knowledge
  - Able to interact with business leaders across the
    organization to understand and manage requirements.
  
  Benefits
  
  What we offer:
  
  - The opportunity to join our growing business at an exciting
    time.
  - Dynamic and entrepreneurial culture.
  
  Who we are:
  
  Side is a global games services company, providing technical
  and creative services to many of the largest developers and
  studios around the world. Founded in Japan in 1994, PTW has
  grown to become a global force in the gaming industry, with
  over 40 studios in 16 countries worldwide and offices across
  North America, Europe, South America, and Asia.
  
  Our industry-leading services include art production, game
  development, quality assurance, player support, community
  management, localization, localization QA, audio production,
  and data collection.
  
  For more information, visit www.side.inc
