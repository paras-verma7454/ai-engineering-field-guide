description: |
  Requisition Number: 2351124 Optum is a global organization
  that delivers care, aided by technology to help millions of
  people live healthier lives. The work you do with our team
  will directly improve health outcomes by connecting people
  with the care, pharmacy benefits, data and resources they
  need to feel their best. Here, you will find a culture
  guided by inclusion, talented peers, comprehensive benefits
  and career development opportunities. Come make an impact on
  the communities we serve as you help us advance health
  optimization on a global scale. Join us to start Caring.
  Connecting. Growing together. As an AI Architect, you will
  be in charge of designing and implementing AI capabilities
  for a Contact Center platform in a Healthcare Payer
  enterprise. You will work closely with Cloud and Machine
  Learning engineers, as well as the CRM development team to
  ensure the proper integration of AI technologies into the
  platform. You will be responsible for the strategy, design,
  implementation, and maintenance of AI solutions. This role
  requires a highly skilled professional with a deep
  understanding of AI technologies and the ability to
  collaborate effectively with a diverse team. The ideal
  candidate will have a solid background in data science and a
  proven track record in industry. Primary Responsibilities:
  
  - Design and develop AI applications and infrastructure for
    the Contact Center platform
  - Collaborate with Cloud and Machine Learning engineers, as
    well as the development team to ensure seamless
    integration of AI technologies
  - Stay current with the latest AI trends and technologies,
    especially Google GCP or Azure AI for Contact Center
  - Create and maintain AI models and algorithms
  - Conduct AI research to improve existing systems and develop
    new technologies
  - Identify opportunities for AI solutions within the
    organization and propose strategic plans
  - Train team members and stakeholders on AI and its
    applications
  - Ensure compliance with data privacy regulations in AI
    applications
  - Monitor the performance of AI systems and make necessary
    adjustments
  - Comply with the terms and conditions of the employment
    contract, company policies and procedures, and any and all
    directives (such as, but not limited to, transfer and/or
    re-assignment to different work locations, change in teams
    and/or work shifts, policies in regards to flexibility of
    work benefits and/or work environment, alternative work
    arrangements, and other decisions that may arise due to
    the changing business environment). The Company may adopt,
    vary or rescind these policies and directives in its
    absolute discretion and without any limitation (implied or
    otherwise) on its ability to do so
  
  Required Qualifications:
  
  - 4-year bachelor's degree in Computer Science / Information
    Technology / Computer Engineering from a recognized
    university or equivalent experience with a specialization
    in Data Science
  - Proven experience as an AI Architect or similar role in the
    industry
  - Solid knowledge of AI technologies, specifically Google GCP
    or Azure AI
  - Understanding of data structures, data modeling, and
    software architecture
  - Proven ability to work collaboratively with a diverse team
    of engineers and developers
  - Proven solid communication and project management skills
  
  Preferred Qualifications:
  
  - Data Science certifications
  - Experience in the Healthcare Payer enterprise
  - Experience in training team members on AI technologies and
    applications
  - Knowledge of data privacy regulations and practices
  - Familiarity with Contact Center platforms
  - Proven ability to conduct research and stay current with the
    latest AI trends and technologies
  - Proven solid problem-solving skills and the ability to think
    strategically
  
  At UnitedHealth Group, our mission is to help people live
  healthier lives and make the health system work better for
  everyone. We believe everyone-of every race, gender,
  sexuality, age, location and income-deserves the opportunity
  to live their healthiest life. Today, however, there are
  still far too many barriers to good health which are
  disproportionately experienced by people of color,
  historically marginalized groups and those with lower
  incomes. We are committed to mitigating our impact on the
  environment and enabling and delivering equitable care that
  addresses health disparities and improves health outcomes -
  an enterprise priority reflected in our mission.
