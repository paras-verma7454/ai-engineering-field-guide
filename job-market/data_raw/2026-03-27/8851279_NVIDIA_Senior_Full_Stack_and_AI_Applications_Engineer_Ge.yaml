description: |
  NVIDIA has been transforming computer graphics, PC gaming,
  and accelerated computing for more than 25 years. It’s a
  unique legacy of innovation that’s fueled by great
  technology—and amazing people. As an NVIDIAN, you’ll be
  immersed in a diverse, supportive environment where everyone
  is inspired to do their best work. Come join the team and
  see how you can make a lasting impact on the world. Join
  NVIDIA, where we can help redefine the future of computing.
  As a Senior Full Stack Engineer, you'll work with
  experienced professionals pushing the boundaries of
  technology and innovation! This is an outstanding
  opportunity to join a team setting the standard for next-
  generation computing solutions.
  
  What you'll be doing:
  
  - Build and redesign tooling, services, and workflows that
    encompass all products on GFN
  - Adapt and scale services for both internal and consumer-
    facing applications
  - Investigate and develop future ideas for our pixel streaming
    + AI product, GDN
  - Own and standardize AI workflows to streamline development
    and UI build
  - Collaborate with engineers, designers, and TPMs to bring
    products to life successfully
  
  What we need to see:
  
  - Bachelor’s degree or equivalent experience
  - 10+ years of validated experience in full-stack development
    for AI Applications engineering around the below areas of
    focus
  - At least 5+ years of JavaScript/TypeScript experience
  - 5+ years of experience working with AWS services
  - 3+ years optimizing integration of AI models into
    applications. This extends beyond LLMs and must include
    work on video or audio.
  
  With competitive salaries and a generous benefits package,
  NVIDIA is widely considered to be one of the technology
  industry's most desirable employers. We have some of the
  most forward-thinking and versatile people in the world
  working with us, and our engineering teams are growing fast
  in some of the most impactful fields of our generation: AI,
  Data Engineering, Data Science. If you're a creative
  engineer who enjoys autonomy and shares our passion for
  technology, we want to hear from you. Widely considered to
  be one of the technology world’s most desirable employers,
  NVIDIA offers highly competitive salaries and a
  comprehensive benefits package. As you plan your future, see
  what we can offer to you and your family
  www.nvidiabenefits.com/
  
  Your base salary will be determined based on your location,
  experience, and the pay of employees in similar positions.
  The base salary range is 184,000 USD - 287,500 USD for Level
  4, and 224,000 USD - 356,500 USD for Level 5.
  
  You will also be eligible for equity and benefits.
  
  Applications for this job will be accepted at least until
  March 28, 2026.
  
  This posting is for an existing vacancy.
  
