  Founding Fullstack Engineer
  
  Company Description: VC-backed healthtech AI startup
  
  Job Description: You will be the first technical hire at a
  fast-growing startup, responsible for building and shipping
  0→1 product features end-to-end. Working closely with
  founders, you will integrate foundational AI models and
  maintain core application logic to solve vertical-specific
  challenges. This is a high-autonomy role designed for
  engineers who love shipping fast.
  
  Location: London, UK
  
  Why this role is remarkable:
  
  - Significant equity and unparalleled autonomy as the first
    technical hire in a well-funded venture.
  - Exceptional user traction with an NPS of +60 and high
    product-market fit indicators.
  - Direct exposure to the fundraising process and a
    collaborative environment alongside experienced founders.
  
  What you will do:
  
  - Own and ship new product features end-to-end across the
    frontend and backend.
  - Integrate and deploy AI features using foundational models
    to solve complex user needs.
  - Improve reliability, performance, and overall architecture
    as the product scales rapidly.
  
  The ideal candidate:
  
  - Strong experience with React, Next.js, and TypeScript for
    building modern web applications.
  - Proficiency in Python backends and PostgreSQL for managing
    core application logic.
  - A proven builder mindset with a history of shipping side
    projects or early-stage products.
  
  Who are Jack & Jill?
  
  Ok, I'll go first. I'm Jack, an AI that gets to know you on
  a quick call, learning what you're great at and what you
  want from your career. Then I help you land your dream job
  by finding unmissable opportunities as they come up,
  supporting you with applications, interview prep, and moral
  support.
  
  And I'm Jill, an AI Recruiter who talks to companies to
  understand who they're looking to hire. Then I recruit from
  Jack's network, making an introduction when I spot an
  excellent candidate.
  
  Next steps
  
  Step 1. Visit our website. Step 2. Click 'Talk to Jack'.
  Step 3. Talk to Jack so he can understand your experience
  and ambitions. Step 4. Jack will make sure Jill (the AI
  agent working for the company) considers you for this role.
  Step 5. If Jill thinks you're a great fit and her client
  wants to meet you, they will make the introduction. Step 6.
  If not, Jack will find you excellent alternatives. All for
  free.
  
  We never post fake jobs
  
  This isn't a trick. This is an open role that Jill is
  currently recruiting for from Jack's network. Sometimes
  Jill's clients ask her to anonymize their jobs when she
  advertises them, which means she can't share all the details
