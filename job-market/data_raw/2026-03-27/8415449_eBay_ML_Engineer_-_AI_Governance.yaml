  applicants will receive consideration for employment without
  regard to race, color, religion, national origin, sex,
  sexual orientation, gender identity, veteran status, and
  disability, or other legally protected status. If you have a
  need that requires accommodation, please contact us at
  talent@ebay.com. We will make every effort to respond to
  your request for accommodation as soon as possible. View our
  accessibility statement to learn more about eBay's
  commitment to ensuring digital accessibility for people with
  disabilities.
  
  We use cookies to enhance your experience and may use AI
  tools for administrative tasks in the hiring process. To
  learn how we handle your personal data and use AI
  responsibly, please visit our Talent Privacy Notice, Privacy
  Center, and AI Hiring Guidelines.
