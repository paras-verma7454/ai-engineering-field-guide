description: |
  Join our dynamic AI Center of Excellence as a Senior AI
  Software Engineer, where you’ll architect and deploy
  cutting-edge AI solutions that tackle strategic business
  challenges. Leverage your advanced software development
  skills and deep AI knowledge to mentor junior developers and
  drive innovation. Your leadership will play a pivotal role
  in enhancing Garrett's AI capabilities and shaping the
  future of technology in our organization.
  
   Key Job Responsibilities
  
  1. Software Development
  
  Architect and maintain high-quality AI solutions aligned
  with business goals.
  
  Lead design and implementation, writing clean, efficient
  code and conducting thorough code reviews.
  
  2. Testing and Quality Assurance
  
  Develop comprehensive test plans and advocate for automated
  testing.
  
  Collaborate on defect resolution and mentor junior
  developers in QA practices.
  
  3. Deployment and Maintenance
  
  Oversee seamless deployment into production and monitor
  performance for optimal functionality.
  
  Provide ongoing support, addressing issues and implementing
  updates.
  
  4. Collaboration and Communication
  
  Work with cross-functional teams to ensure alignment and
  successful project outcomes.
  
  Document technical details and conduct training sessions for
  team knowledge sharing.
  
  5. Continuous Improvement and Leadership
  
  Review and refine development methodologies to boost
  productivity and quality.
  
  Mentor junior developers, lead retrospectives, and foster a
  culture of continuous improvement.
  
  Education / Qualifications 
  
  Bachelor’s degree in computer science, Software Engineering,
  or a related field: A solid foundational understanding of
  computer science principles and software engineering
  practices is essential.
  
  Master’s Degree (preferred): Advanced education in relevant
  fields is a plus, demonstrating a deeper expertise and
  commitment to the field.
  
  Experience Required
  
  Hands on experience in software development, focusing on
  .NET or Java.
  
  Extensive proficiency in Python.
  
  Proven background in AI development, especially with Large
  Language Models (LLMs) and advanced AI technologies.
  
  Key Skills and Knowledge
  
  1.  Technical Skills
  
  Expert proficiency in .NET or Java and Python, with a
  comprehensive understanding of the software development
  lifecycle.
  
  Strong knowledge of AI technologies and frameworks, with
  extensive hands-on experience in integrating AI into
  software solutions.
  
  Deep familiarity with machine learning algorithms, data
  processing techniques, and model deployment strategies.
  
  Experience with version control systems (e.g., Git),
  continuous integration/continuous deployment (CI/CD)
  pipelines, and agile development methodologies.
  
  Comprehensive experience in testing methodologies, including
  unit testing, integration testing, and performance testing.
  
  Proficiency in automated testing tools and frameworks to
  enhance the quality assurance process.
  
  Extensive experience with cloud platforms, particularly AWS,
  with expertise in deploying and managing applications in a
  cloud environment.
  
  In-depth knowledge of AWS services such as EC2, S3, Lambda,
  RDS, and experience with infrastructure-as-code tools like
  AWS CloudFormation or Terraform.
  
  Familiarity with containerization technologies such as
  Docker and orchestration tools like Kubernetes.
  
   2. Soft Skills
  
  Excellent problem-solving abilities and analytical thinking,
  with a proactive approach to addressing complex challenges.
  
  Strong communication skills, both written and verbal, to
  effectively collaborate with cross-functional teams and
  stakeholders.
  
  Demonstrated leadership abilities, with experience in
  mentoring and guiding junior developers.
  
  Ability to work independently and as part of a team,
  demonstrating flexibility and adaptability.
  
  A proactive approach to learning new technologies and
  staying updated with industry trends.
  
  Strong organizational skills, with the ability to manage
  multiple projects and deadlines effectively.
  
  Perks & Benefits:
  
  Career growth opportunities.
  
  Experience leaders to support your professional development.
  
  Dynamic and international work environment.
  
