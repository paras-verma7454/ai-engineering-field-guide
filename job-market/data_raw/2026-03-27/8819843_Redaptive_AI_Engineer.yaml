description: |
  Position Summary:
  
  About Redaptive:
  
  Redaptive is an Energy-as-a-Service provider that funds and
  installs energy-saving and energy-generating equipment.
  Redaptive’s programs help many of the world’s most
  sophisticated organizations reduce energy waste, save money,
  lower their carbon emissions, and meet their sustainability
  goals across their entire real estate portfolios. With
  Redaptive, customers can overcome capital and contractual
  barriers to achieve energy-saving benefits quickly, all with
  real-time data powered by Redaptive’s proprietary Data
  Solutions metering platform. Redaptive was founded in 2015
  and is headquartered in Denver, CO. Redaptive is backed by
  CarVal, ENGIE New Ventures, Linse Capital, CBRE, Evergy
  Ventures, Rabobank, CPP Investments, and Honeywell.  Our
  company culture is exciting, collaborative, and fast paced.
  We are passionate about changing the world and helping our
  customers to become more environmentally sustainable and
  profitable. We are looking for team members who are driven,
  passionate, and want to take on a diverse set of challenges
  to help grow a great company. Redaptive, Inc is an equal
  employment opportunity employer and all qualified applicants
  will receive consideration for employment. For more
  information, visit www.redaptive.com Position Summary:
  
  As a member of Redaptive's AI team, you will be driving
  Agentic AI and Generative AI integration across all of
  Redaptive’s business units. You will drive AI development
  and integration across the organization, directly impacting
  Redaptive’s global sustainability efforts and shaping how we
  leverage AI to serve Fortune 500 clients.
  
  Responsibilities and Duties:
  
  - Strategic Leadership (10%):
  
  - Champion the AI/ML roadmap, driving strategic planning and
    execution for all initiatives.
  
  - Provide guidance on data science projects (Agentic AI,
    Generative AI, and Machine Learning), aligning them with
    business objectives and best practices.
  
  - Foster a data-driven culture, advocating for AI-powered
    solutions to business challenges and efficiency
    improvements.
  
  - Collaborate with product management, engineering, and
    business stakeholders to identify opportunities and
    deliver impactful solutions
  
  
  
  - Technical Leadership (40%):
  
  - Architect and develop Proof-of-Concept (POC) solutions for
    Agentic AI, Generative AI, and ML.
  
  - Utilize Python and relevant data science libraries,
    leveraging MLflow.
  
  - Provide technical guidance on AI projects, ensuring
    alignment with business objectives and best practices.
  
  - Assist in development and documentation of standards for
    ethical and regulatory-compliant AI usage.
  
  - Stay current with AI advancements, contributing to the
    team's knowledge and expertise.
  
  - Perform hands-on data wrangling and AI model development
  
  
  
  
  
  - Operational Leadership (50%):
  
  - Drive continuous improvement through Agentic AI, Generative
    AI, and predictive modeling.
  
  - Participate in Agile development processes (Scrum and
    Kanban).
  
  - Ensure compliance with regulatory and ethical AI standards.
  - Other duties as assigned
  
  Required Abilities and Skills:
  
  
  - Agentic AI development and deployment.
  
  - Statistical modeling, machine learning algorithms, and data
    mining techniques.
  
  - Databricks and MLflow for model training, deployment, and
    management on AWS.
  
  - Working with large datasets on AWS and Databricks
  
  
  
  
  
  
  
  Strong hands-on experience with:  
  
  - Agentic AI development and deployment.
  
  - Working with large datasets on AWS and Databricks.
  
  
  
  Desired Experience: 
  
  
  
  - Statistical modeling, machine learning algorithms, and data
    mining techniques.
  
  - Databricks and MLflow for model training, deployment, and
    management on AWS.
  
  - Experience integrating AI with IoT/event data.
  
  - Experience with real-time and batch inference integration
    with SaaS applications.
  
  - International team management experience.
  
  - Track record of successful product launches in regulated
    environments
  
  
  
  
  
  Education and Experience:
  
  
  
  - 5+ years of data science/AI experience
  
  - Bachelor's degree in Statistics, Data Science, Computer
    Engineering, Mathematics, or a related field (Master's
    preferred).
  
  - Proven track record of deploying successful Agentic AI,
    Generative AI, and ML projects from concept to production.
  
  - Excellent communication skills, able to explain complex
    technical concepts to both technical and non-technical
    audiences.
  
  
  
  Physical Demands and Work Environment:
  
  The physical demands described here are representative of
  those that must be met by an employee to successfully
  perform the essential functions of this position. Reasonable
  accommodation may be made to enable individuals with
  disabilities to perform the functions.
  
  
  
  While performing the duties of this position, the employee
  is regularly required to talk and hear. The employee
  frequently is required to use hands or fingers, handle or
  feel objects, tools, or controls. The employee is
  occasionally required to stand, walk, sit, and reach with
  hands and arms. The employee must occasionally lift and/or
  move up to 25 pounds. Specific vision abilities required by
  this position include close vision, distance vision, and the
  ability to adjust focus. The noise level in the work
  environment is usually low to moderate.
  
  
  
  Have an ergonomically correct and functional work-from-home
  workstation set up; amenable to hybrid of working from home
  and in an office setting in Denver Colorado.
  
  
  
  
  
  Travel:
  
  Up to 10% travel is expected to engage with remote teams,
  customers, or technology suppliers. Infrequent travel to
  engage teams in India may be expected.
  
  
  
  The Perks!
  
  At Redaptive, we believe great work starts with great people
  — and we’re committed to supporting you every step of the
  way. From health and wellbeing to growth and flexibility,
  our benefits are designed to help you live well, work smart,
  and grow with us. We foster a fun, fast-paced, and
  collaborative culture driven by our passion for creating a
  more sustainable and profitable world. Join us to take on
  diverse challenges, grow your career, and help build a
  healthier planet.
  
  
  
  - Live Well: Comprehensive health insurance for you and your
    family, access to wellness apps, second medical opinions,
    and an Employee Assistance Program for mental wellbeing.
  
  - Financial Wellbeing: Competitive pay, bonuses, and equity
    participation that reward your contribution and
    commitment.
  
  - Flexibility & Time Off: Enjoy generous paid time off, a
    hybrid work model, and family-first policies including
    paid parental leave.
  
  - Growing Ahead: We offer continuous growth and learning
    programmes for upscaling, continuous growth. This includes
    – curated learning modules, online programmes,
    certifications and cross-functional opportunities. 2 in
    every 5 roles on an average are filled through internal
    talent — a reflection of our strong culture of growing
    from within.
  
  - Redaptive Extras: Snack-stocked pantries, creative
    workspaces, and fun office events to collaborate and
    unwind.
  
