description: |
  Change the world. Love your job. In your first year with TI
  you’ll join the Career Accelerator Program (CAP) – a
  fast‑track development experience that blends
  professional‑skill workshops, technical training and
  on‑the‑job learning so you can start delivering real‑world
  impact from day 1.
  
  About the job:
  
  Design and build AI enabled solutions for discriminative and
  generative applications using a combination of classical and
  neural network (MLPs, RNNs, CNNs, GNNs, transformers) based
  machine learning algorithms.  Put together efficient data
  pipelines, develop agents using the latest LLMs or train new
  networks from scratch, test with rigor and monitor
  deployments for accuracy and drift.
  
  Work with partners across TI to address a wide variety of
  applications including design (software, digital, analog),
  manufacturing (process development, fabrication, testing),
  sales (pricing, recommendations), planning, and general
  productivity. Deliver robust scalable, performant, and
  secure solutions.
  
  Texas Instruments will not sponsor job applicants for visas
  or work authorization for this position.
  
  Qualifications
  
  Minimum requirements:
  
  - Bachelor's degree in Electrical Engineering, Computer
    Engineering, Computer Science or a related technical field
    of study
  - Cumulative 3.0 / 4.0 GPA or higher
  
  Preferred Qualifications:
  
  - AI / ML
    - Master’s and / or PhD in a relevant field or equivalent
      experience
    - Development of novel neural network related algorithms and
      associated publication in top technical conferences
    - Design, training, and use of the latest transformer based
      LLMs (reasoning, agents)
    - Design, training, and use of additional neural network types
      (MLPs, RNNs, CNNs, GNNs)
    - Traditional ML based techniques (clustering, regression,
      trees, …)
    - AI / ML based approaches to language, speech, vision, games,
      time series, and personalization related applications
  - Programming
    - Python programming and the PyTorch package
    - C / C++ programming
    - SQL programming
  - Math
    - Dense linear algebra, probability, and calculus
    - Optimization theory and algorithms
  - Personal
    - Strong technical leadership, communication and interpersonal
      skills
    - The ability to dream what could be and the drive to make the
      dream a reality
  
