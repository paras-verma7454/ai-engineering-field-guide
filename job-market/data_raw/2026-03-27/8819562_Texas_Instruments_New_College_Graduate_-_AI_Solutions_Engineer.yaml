   About Texas Instruments
  
  
  
     Texas Instruments Incorporated (Nasdaq: TXN) is a global
  semiconductor company that designs, manufactures and sells
  analog and embedded processing chips for markets such as
  industrial, automotive, data center, personal electronics
  and communications equipment. At our core, we have a passion
  to create a better world by making electronics more
  affordable through semiconductors. This passion is alive
  today as each generation of innovation builds upon the last
  to make our technology more reliable, more affordable and
  lower power, making it possible for semiconductors to go
  into electronics everywhere. Learn more at TI.com.
  
  
  
  
  
  
  
  
  
  
  
