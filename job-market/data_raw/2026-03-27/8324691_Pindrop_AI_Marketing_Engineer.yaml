description: |
  Who We Are
  
  Pindrop is the Real Human + Right Human® Identity Trust
  Platform for the AI era. As AI-driven fraud and deepfakes
  erode trust in digital communication, Pindrop delivers
  continuous identity verification and deepfake detection
  across voice, video, and digital interactions in real time.
  
  Enterprises rely on Pindrop to secure billions of high-risk
  customer interactions each year, including top U.S. banks,
  as well as leading insurers and healthcare providers.
  Powered by models trained on more than 1.5 billion real-
  world interactions annually and protected by 300+ patents,
  Pindrop restores trust while reducing fraud, lowering
  operational costs, and improving customer experience.
  
  Recognized by TIME as one of 2025’s Best Inventions and by
  Inc. for Best in Business for Innovation, Pindrop is backed
  by leading investors including Andreessen Horowitz, IVP, and
  CapitalG.
  
  What you’ll do
  
  Marketing Tech Stack & Systems Management
  
  - Build automated systems that drive efficiency across the
    marketing team
  - Own and optimize our marketing automation platform (Pardot)
    and its integration with Salesforce CRM.
  - Manage and troubleshoot integrations across the tech stack,
    including Pardot, Salesforce, Common Room, and more.
  - Be the de facto expert on all things AI for the Marketing
    organization, including introducing new AI workflows and
    training the team.
  - Ensure data integrity, accuracy, and security across
    platforms.
  - Administer user permissions and ensure compliance with data
    privacy regulations.
  
  Lead Management & Attribution
  
  - Design and maintain lead scoring, routing, and nurturing
    workflows to optimize the handoff to Sales.
  - Ensure MQL tracking accuracy and data hygiene within
    Salesforce.
  - Manage attribution models to track and optimize marketing
    performance and campaign ROI
  
  Reporting & Analytics
  
  - Build, automate, and maintain marketing performance
    dashboards in Salesforce, Google Analytics, and other
    reporting tools.
  - Provide actionable insights into lead conversion, campaign
    effectiveness, and pipeline impact.
  - Continuously analyze and refine marketing KPIs to improve
    forecasting and performance measurement.
  
  Campaign OperationsExecution & Optimization
  
  - Support campaign execution by ensuring proper setup of
    automation workflows, nurture tracks, and landing pages.
  - Manage campaign data accuracy, including UTM tracking,
    conversion reporting, and attribution tagging.
  - Implement A/B testing frameworks to optimize engagement and
    conversion rates.
  
  Cross-Team Collaboration & Process Improvement
  
  - Partner with Sales, Customer Success, and Revenue Operations
    to ensure smooth lead flow, reporting accuracy, and
    process alignment.
  - Train and support internal teams on marketing tools, best
    practices, and analytics.
  - Continuously improve and automate workflows to increase
    efficiency and scalability.
  
  Who you are
  
  - This role will require someone with a strategic mindset who
    can handle both the technical aspects of marketing
    operations and the collaborative nature of working across
    teams. If you're ready to make an impact and help us
    scale, we'd love to hear from you!
  - You are resilient in the face of challenges, change, and
    ambiguity
  - You are optimistic and believe that you can make a problem
    into a solution
  - You are resourceful, excited to uncover innovative solutions
    and teach yourself something new when needed
  - You take accountability, do the things you say you’ll do,
    under-promise and over-deliver
  - You are nimble and adaptable when priorities change and
    continue to see the “forest through the trees”
  
  Your skill-set
  
  - 10+ years in Marketing Operations (preferably in B2B SaaS,
    AI, or related industries).
  - Hands-on experience with Salesforce, Pardot (or similar
    marketing automation tools), implementing AI workflows,
    and marketing analytics.
  - Strong knowledge of lead management, attribution modeling,
    and data governance best practices.
  - Proficiency in Google Analytics, Salesforce reporting,
    Tableau, and Common Room, Clay or other similar AI tools.
  - Strong analytical mindset with a passion for turning data
    into insights.
  - Ability to work independently, solve problems proactively,
    and manage multiple priorities in a fast-paced
    environment.
  
  What’s in it for you
  
  As a Pindropper, you join a rapidly growing company making
  technology more human with the power of voice. You will work
  alongside some of the best and brightest. We’re a passionate
  group committed to excellence - but that doesn’t stop us
  from enjoying the journey as a team with chess and poker
  tournaments, catered lunches and happy hours, wellness
  programming, and more. Because we take our jobs seriously,
  we add in time for rest with Unlimited PTO, and Company-wide
  Rest Days.
  
  We are looking to add a hands-on, data-driven AI Marketing
  Engineer to our Growth Marketing team to optimize and manage
  our marketing tech stack, reporting, and lead management
  processes. Do you thrive on building, executing, and
  troubleshooting systems to drive marketing and revenue
  efficiency? You will be the go-to expert in AI, marketing
  automation, CRM integrations, campaign tracking, and
  performance analytics, ensuring alignment between Sales and
  Marketing in a fast-growing, data-driven environment.
  
  What we offer
  
  As a part of Pindrop, you’ll have a direct impact on our
  growing list of products and the future of security in the
  voice-driven economy. We hire great people and take care of
  them. Here’s a snapshot of the benefits we offer:
  
  - Competitive compensation package, including RSUs (Restricted
    Stock Units) for all employees, so everyone shares in our
    long-term success.
  - Remote-first environment - giving you flexibility and
    autonomy in how you structure your day.
  - While we work flexibly, we prioritize meaningful in-person
    moments through regular team on-sites, company-wide
    events, and intentional gatherings that foster connection,
    collaboration, and shared success.
  - Unlimited Paid Time Off (PTO)
  - Generous health and welfare plans to choose from - including
    one employer-paid “employee-only” plan!
  - Best-in-class Health Savings Account (HSA) employer
    contribution
  - Low-cost vision and dental plans for you and your family,
    providing comprehensive coverage and peace of mind.
  - Paid Parental Leave - Including birth, adoptive & foster
    parents
  - Recurring monthly phone and internet allowance to help cover
    essential connectivity costs and support flexible work.
  - Enhanced fertility and GLP-1 benefits to support family-
    building journeys and personalized health needs.
  - Annual Learning & Development stipend to support your
    professional growth, skill-building, certifications, and
    continued education.
  
  This role will be posted for up to 45 days from March 25,
  2026.
  
  Please note that the base pay range is a general guideline
  only. Pindrop considers factors such as (but not limited to)
  scope and responsibilities of the position, a candidate's
  work experience, education/training, and key skills, as well
  as market and business considerations, when extending an
  offer.
  
  US Base Pay Range
  
  $120,000—$140,000 USD
  
  Not sure if this is you?
  
  We want a diverse, global team, with a broad range of
  experience and perspectives. If this job sounds great, but
  you’re not sure if you qualify, apply anyway! We carefully
  consider every application and will either move forward with
  you, find another team that might be a better fit, keep in
  touch for future opportunities, or thank you for your time.
  
  AI - A Transformative Force
  
  At Pindrop, we view artificial intelligence as a
  transformative force that, when harnessed responsibly, can
  unlock unprecedented value for our customers, partners and
  society and enable and empower us to continue to deliver
  cutting-edge technology to combat fraud and unblur the lines
  between what it means to be human versus machine.
  
  Pindrop may use AI tools to help prioritize job applications
  for human review. The AI tool may analyze your work
  experience and skills to assess fit for the role, but does
  not consider your name or contact details. Applications with
  the strongest match to job requirements are prioritized for
  human review; not all applications may be individually
  reviewed.
  
  Pindrop is an Equal Opportunity Employer
  
  Here at Pindrop, it is our mission to create and maintain a
  diverse and inclusive work environment. As an equal
  opportunity employer, all qualified applicants receive
  consideration for employment without regard to race, color,
  age, religion, sex, gender, gender identity or expression,
  sexual orientation, national origin, genetic information,
  disability, marital and/or veteran status.
