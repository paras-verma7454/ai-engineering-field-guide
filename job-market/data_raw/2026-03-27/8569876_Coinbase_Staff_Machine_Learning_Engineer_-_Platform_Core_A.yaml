description: |
  Ready to be pushed beyond what you think you’re capable of?
  
  At Coinbase, our mission is to increase economic freedom in
  the world. It’s a massive, ambitious opportunity that
  demands the best of us, every day, as we build the emerging
  onchain platform — and with it, the future global financial
  system.
  
  To achieve our mission, we’re seeking a very specific
  candidate. We want someone who is passionate about our
  mission and who believes in the power of crypto and
  blockchain technology to update the financial system. We
  want someone who is eager to leave their mark on the world,
  who relishes the pressure and privilege of working with high
  caliber colleagues, and who actively seeks feedback to keep
  leveling up. We want someone who will run towards, not away
  from, solving the company’s hardest problems.
  
  Our work culture is intense and isn’t for everyone. But if
  you want to build the future alongside others who excel in
  their disciplines and expect the same from you, there’s no
  better place to be.
  
  While many roles at Coinbase are remote-first, we are not
  remote-only. In-person participation is required throughout
  the year. Team and company-wide offsites are held multiple
  times annually to foster collaboration, connection, and
  alignment. Attendance is expected and fully supported.
  
  The Core Automation Team is a highly driven and innovative
  group dedicated to developing AI infrastructure and
  automation solutions that enhance productivity, foster
  innovation, and create meaningful customer impact across
  Coinbase. Our mission is to streamline operations for
  customer support and compliance teams while delivering
  exceptional customer experiences. As a Machine Learning
  Engineer on our team, you will play a key role in this
  transformation, utilizing state-of-the-art AI models,
  frameworks, and tools, along with diverse and extensive data
  sources, including blockchain data. Your work will focus on
  breaking down barriers to cryptocurrency adoption and
  shaping the future of AI-powered customer interactions.
  
  What you’ll be doing (ie. job duties):
  
  - Explore and apply advanced machine learning techniques,
    including large language models (LLMs) and deep learning,
    to solve complex challenges across the organization.
  - Collaborate with management and stakeholders to define
    strategic roadmaps and translate them into actionable
    quarterly plans.
  - Drive project execution by managing priorities, deadlines,
    and deliverables, leveraging your technical expertise.
  - Develop high-quality, well-tested Python code to address
    critical product and business needs.
  - Design scalable, secure systems using state-of-the-art AI/ML
    technologies and industry best practices.
  - Mentor team members on design principles, coding standards,
    and the adoption of AI productivity tools.
  - Troubleshoot and resolve complex technical issues to improve
    system reliability, scalability, and operational
    efficiency.
  - Ensure the security, scalability, and architectural
    integrity of feature designs through thorough reviews
    across teams.
  
  What we look for in you (ie. job requirements):
  
  - 8+ years of experience in machine learning and software
    engineering.
  - Proven expertise in designing, building, scaling, and
    maintaining production services, with a strong focus on
    data processing/machine learning/analytics.
  - Hands-on experience with at least one ML model type, such as
    LLMs, GNNs, Deep Learning, Logistic Regression, or
    Gradient Boosting Trees.
  - Proficiency in one or more areas, including data mining,
    information retrieval, advanced statistics, natural
    language processing, or computer vision.
  - Ability to write high-quality, well-tested code that
    effectively addresses customer needs.
  - Experience mentoring and developing junior engineers by
    implementing processes and setting a high standard for
    excellence.
  - Passion for building an open financial system that connects
    the world.
  - Exceptional written and verbal communication skills, with a
    commitment to open and transparent cultural practices.
  
  Nice to haves:
  
  - Bachelor’s, Master’s, or PhD in Computer Science, Machine
    Learning, Data Mining, Statistics, or a related technical
    field.
  - Proficiency with GenAI frameworks/tools and technologies
    such as Apache Airflow, Spark, Flink, Kafka/Kinesis,
    Snowflake, and Databricks.
  - Familiarity with model interpretability and responsible AI
    practices.
  - Expertise in data analysis and visualization.
  
  Job #: P74155
  
  *Answers to crypto-related questions may be used to evaluate
  your onchain experience.
  
  #LI-Remote
  
  Pay Transparency Notice: Depending on your work location,
  the target annual base salary for this position can range as
  detailed below. Total compensation may also include equity
  and bonus eligibility and benefits (including medical,
  dental, vision and 401(k)).
  
  Annual base salary range (excluding equity and bonus):
  
  $218,025—$256,500 USD
  
  Please be advised that each candidate may submit a maximum
  of four applications within any 30-day period. We encourage
  you to carefully evaluate how your skills and interests
  align with Coinbase's roles before applying.
  
  Commitment to Equal Opportunity
  
