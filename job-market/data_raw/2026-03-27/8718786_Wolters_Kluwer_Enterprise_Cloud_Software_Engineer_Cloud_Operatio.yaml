description: |
  We are seeking a Enterprise Cloud Software Engineer skilled
  in automation engineering, artificial intelligence, and
  cloud operations. This role merges the Enterprise Cloud
  Software Developer and CloudOps Engineer positions into a
  single, development‑centric automation role. The focus is on
  building solutions, platforms, and automation frameworks
  that enable scalable, resilient, and intelligent cloud
  operations across AWS and Azure. The role emphasizes coding,
  Infrastructure‑as‑Code, CI/CD, and intelligent automation,
  while still maintaining strong operational awareness.
  
  The engineer will design, build, and evolve cloud automation
  solutions that replace manual IT operations with AI
  augmented, software‑driven, repeatable, and governed
  workflows, working closely with architecture, security, and
  operations teams.
  
  Key Responsibilities
  
  Cloud Software Development & Automation
  
  - Design, develop, test, and maintain cloud automation
    solutions using Python, PowerShell, Bash, and JavaScript
    to automate traditional IT and CloudOps tasks.
  - Build reusable automation frameworks, libraries, and
    services using cloud SDKs, APIs, and serverless
    technologies (AWS Lambda, Azure Functions).
  - Engineer high‑quality, production‑ready code following
    established SOLID principles, design patterns, and cloud
    resiliency patterns.
  - Implement automated self‑certification, testing, and
    validation to ensure reliability, security, and
    performance before release.
  
  Infrastructure as Code & CI/CD
  
  - Lead and contribute to Infrastructure‑as‑Code (IaC) using
    Terraform, CloudFormation, ARM/Bicep, and Ansible, aligned
    with enterprise standards.
  - Develop and maintain CI/CD pipelines for infrastructure and
    automation using Azure DevOps, GitHub Actions, Jenkins, or
    GitLab CI.
  - Apply version control best practices, including pull
    requests, code reviews, and automated quality gates.
  - Manage IaC state, modularization, and lifecycle across
    multi‑cloud and hybrid environments.
  
  Cloud Platforms & Operations Enablement
  
  - Design and automate solutions across AWS and Microsoft
    Azure, supporting IaaS, PaaS, containerized, and
    serverless workloads.
  - Enable operational capabilities such as provisioning,
    scaling, patching, backup, disaster recovery, and
    decommissioning through code.
  - Build automation that enforces cloud governance, including
    tagging standards, security baselines, cost optimization,
    and policy‑as‑code guardrails.
  - Collaborate with Cloud Operations teams to ensure solutions
    are observable, supportable, and production‑ready.
  
  Containers, Platforms & Modern Tooling
  
  - Develop and support automation for container platforms such
    as Docker, Kubernetes, AKS, and EKS.
  - Support enterprise cloud operating models, including shared
    services and multi‑tenant platforms.
  
  Intelligent & AI‑Enabled Automation
  
  - Integrate AI‑driven automation into CloudOps workflows for
    alert enrichment, operational insights, and basic
    remediation.
  - Develop Python‑based automation that leverages API‑driven AI
    services and intelligent runbooks.
  - Apply awareness of AI governance, accuracy, and operational
    risk when building automation solutions.
  
  Agile Delivery & Collaboration
  
  - Work within Agile/Scrum teams, contributing to sprint
    planning, estimation, reviews, and retrospectives.
  - Partner closely with Architecture, Security, Platform, and
    Operations teams to drive adoption and operationalization
    of automation.
  - Drive initiatives to completion by clarifying requirements,
    providing technical leadership, and removing delivery
    blockers.
  - Produce clear documentation, runbooks, patterns, and
    standards to enable reuse and operational maturity.
  
  Required Qualifications
  
  Education
  
  - Bachelor’s degree in Computer Science, Information Systems,
    or a related field.
  
  Experience
  
  - 3–5 years of experience in cloud software development,
    automation engineering, DevOps, or infrastructure
    engineering.
  - Strong hands‑on experience developing code and automation
    using Python, PowerShell, Bash, or JavaScript.
  - Proven experience with IaC, CI/CD pipelines, and version
    control–driven delivery.
  - Experience supporting and automating AWS and Azure
    environments.
  
  Preferred Certifications
  
  - Advanced AWS and/or Azure Cloud Certifications
  - Terraform Associate or equivalent IaC certification
  - AI / ML or Intelligent Automation certifications (preferred
    but not required)
  
  Other Skills & Mindset
  
  - Strong software‑engineering mindset applied to
    infrastructure and operations.
  - Analytical, automation‑first, and problem‑solving oriented.
  - Customer‑focused with an emphasis on reliability, security,
    and operational excellence.
  - Comfortable with failing fast, learning, and iterating in an
    Agile environment.
  
  Excellent written and verbal communication and
  cross‑functional collaboration skills. Our Interview
