description: |
  At BioRender, we are accelerating the world’s ability to
  discover, learn, and communicate science faster through
  visuals. Today, BioRender empowers millions of scientists to
  create beautiful, accurate biological figures for
  communication within pharma companies and academic research.
  
  Our vision is to make BioRender the place where humans read
  biology—translating human and AI-generated data into
  scientifically accurate, human-understandable visuals. As AI
  automates large parts of research, BioRender will transform
  complex data, experimental results, and text inputs into
  clear, intuitive visuals that scientists, decision-makers,
  and broader audiences can quickly interpret. Visual
  communication will be critical to accelerating breakthroughs
  across academia and industry, and BioRender will bridge the
  gap between specialized knowledge domains.
  
  About Us:
  
  We’re on a mission to democratize science communication with
  cutting-edge AI-powered products. As a Senior AI Engineer,
  you’ll not only build full-stack solutions but also
  integrate AI into every layer of our product—turning
  innovative ideas into production-ready features that delight
  our users.
  
  What you'll be doing :
  
  - Collaborate Across Teams: Work side-by-side with product
    managers, designers, and data scientists to shape a
    roadmap that leverages AI for smarter, more engaging user
    experiences.
  - Prototype & Productionize: Rapidly prototype AI-driven
    features (e.g., natural language & multimodal processing,
    intelligent recommendations) and productionize them into
    our core product to help scientists communicate faster.
  - Champion AI Innovation: Serve as the AI evangelist on your
    team—experiment with the latest AI models & techniques
    (LLMs, few-shot learning, RAG..) and share your insights
    to uplift the entire engineering organization.
  - Own and Improve: Take end-to-end ownership of key components
    of our codebase, ensuring that both traditional and AI-
    powered features are robust, scalable, and maintainable.
  - Drive Creative Problem-Solving: Embrace ambiguity,
    experiment boldly, and develop creative solutions that
    push the boundaries of what our product can do.
  
  Our ideal fit brings:
  
  - AI Fluency & Passion: You’re genuinely curious about AI,
    continuously explore emerging tools, and love applying
    them in real-world projects.
  - Builder Mentality: With 7+ years of full-stack development
    experience, you’ve built products from concept to
    production and are eager to prototype and iterate quickly.
  - Tech Expertise: Proficient in modern JavaScript frameworks
    (e.g., ReactJS), NodeJS/ExpressJS, cloud infrastructure
    (e.g., AWS), and experienced with Python along with ML
    libraries (e.g., PyTorch or TensorFlow).
  - LLM tooling: has experience leveraging modern tools to
    develop with LLMs and deploy/monitor/experiment with them
    in production.
  - Creative Problem Solver: You thrive in ambiguous
    environments and can creatively tackle challenges—both in
    standard product features and in integrating advanced AI
    functionalities.
  - Mentorship & Collaboration: You love sharing your knowledge,
    helping peers adopt AI best practices, and continuously
    improving team processes.
  
  Why join us?
  
  - We are mission-driven: we work collaboratively towards our
    shared vision of improving scientific communication and
    accelerating scientific discovery. BioRender figures have
    appeared in more than 54,000 publications!
  - BioRender is loved by millions! We have a world-class NPS
    and a community of loyal fans and users in 200+ countries!
  - Our company is backed by top investors and accelerators like
    Y Combinator, and we are on a growth trajectory comparable
    to many top-performing SaaS companies
  - We’re remote-first with team members across Canada and the
    U.S., offering you the flexibility to work from anywhere.
  
  BioRender is an Equal Opportunity Employer. We celebrate
  diversity and are committed to creating an inclusive
  environment for all employees. All qualified applicants will
  receive consideration for employment without regard to race,
  color, religion, sex, sexual orientation, gender identity,
  national origin, disability, or veteran status.
