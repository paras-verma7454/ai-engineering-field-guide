description: |
  Do you want your voice heard and your actions to count?
  
  Discover your opportunity with Mitsubishi UFJ Financial
  Group (MUFG), one of the world’s leading financial groups.
  Across the globe, we’re 150,000 colleagues, striving to make
  a difference for every client, organization, and community
  we serve. We stand for our values, building long-term
  relationships, serving society, and fostering shared and
  sustainable growth for a better world.
  
  With a vision to be the world’s most trusted financial
  group, it’s part of our culture to put people first, listen
  to new and diverse ideas and collaborate toward greater
  innovation, speed and agility. This means investing in
  talent, technologies, and tools that empower you to own your
  career.
  
  Join MUFG, where being inspired is expected and making a
  meaningful impact is rewarded.
  
  The Cloud Team is part of Digital Engineering Services
  within the Corporate Technology division at MUFG Securities.
  As AI adoption accelerates across our business lines, we are
  evolving from a traditional cloud infrastructure function
  into a diverse engineering capability focused on enabling
  scalable, sustainable AI solutions.
  
  To effectively scale AI adoption and enhance our functional
  offerings across a dynamic and evolving environment, we are
  expanding the team with engineers who combine strong cloud
  expertise with robust software engineering skills. These
  engineers will help define and deliver next‑generation cloud
  patterns, automation frameworks, and AI‑driven solutions
  that meet MUFG’s governance, security, and regulatory needs.
  
  You will join a small, dynamic team of engineers working
  across Azure, Oracle Cloud, and AWS (as it is onboarded),
  building secure, repeatable cloud and AI foundations that
  underpin our critical banking services.
  
  MAIN PURPOSE OF THE ROLE
  
  This is a hands‑on engineering role at the intersection of
  cloud platforms, software development, and AI enablement.
  You will design, develop, and support bespoke cloud and AI
  solutions across Azure, Oracle Cloud, and later AWS,
  applying strong engineering discipline to deliver secure,
  scalable and sustainable patterns for MUFG.
  
  You will be expected to work autonomously, manage ambiguity,
  and adapt rapidly to evolving business needs while
  collaborating with application and infrastructure teams to
  deliver secure, compliant AI and cloud solutions.
  
  KEY RESPONSIBILITIES
  
  - Design and implement cloud and AI‑ready solutions on Azure
    (primary), Oracle Cloud, and AWS (as onboarded).
  - Develop bespoke automation, integration, and AI‑driven
    components to support business requirements.
  - Build and maintain REST APIs, integration services, and
    identity-aware solution patterns.
  - Deliver operational (BAU) and project support for cloud and
    AI workloads.
  - Collaborate across teams to enhance platform stability,
    security, compliance, and cost efficiency.
  - Drive automation, Infrastructure‑as‑Code, CI/CD, and modern
    engineering practices.
  - Implement governance controls and guardrails for
    responsible, regulatory-compliant AI use.
  - Produce architectural designs and engineering documentation
    to support scalable, repeatable solution patterns.
  
  SKILLS AND EXPERIENCE
  
  - Essential Experience
  
  - Deep hands‑on Azure engineering experience, including
    Infrastructure‑as‑Code (Bicep/ARM/Terraform).
  - Strong proficiency in Python and PowerShell for automation,
    integration, and AI workflows.
  - Real‑world experience implementing and supporting cloud
    platforms and identity solutions (Azure, Oracle, Entra
    ID).
  - Experience developing REST APIs, integrating services, and
    implementing identity flows (OAuth2, tokens).
  - Familiarity with Azure OpenAI, OpenAI SDK/models, and
    applying AI services to real-world use cases.
  - Strong knowledge of IAM, security patterns, governance, and
    compliance requirements.
  
  - Preferred Experience
  
  - Experience with Azure API Management or similar API
    gateways.
  - Exposure to AI governance, model lifecycle controls, or
    responsible AI implementation in regulated environments.
  - Knowledge of Foundry, vectorisation patterns, or AI
    orchestration frameworks.
  
  - Key Skills (Prioritised)
  
   Cloud Platforms Expertise:
  
  - Azure (general engineering + PaaS services)
  - Entra ID (identity architecture, authentication flows)
  
  AI/ML & Generative AI:
  
  - Azure OpenAI (deployment, integration, governance)
  - OpenAI SDK, GPT models, embeddings and vector workflows
  - Prompt engineering with governance and safety controls
  
  - Programming & Scripting
  
  - Python (essential)
  - PowerShell
  
  - Governance & Compliance
  
  - Designing AI guardrails for regulated environments
  - Security and compliance awareness in financial services
  - Ability to operationalise Responsible AI controls
  
  - API Development & Integration
  
  - REST API development and integration
  - API Management / API Gateway patterns
  - OAuth2, client credential flows, identity-driven service
    design
  
  - Automation & DevOps
  
  - CI/CD pipelines (GitHub Actions, Azure DevOps, etc.)
  - IaC (Bicep, ARM, Terraform)
  - Reusable automation frameworks
  
  - 8. Supporting Tools
  
  - VS Code
  - GitHub Enterprise (Repos, Actions, Packages)
  - Artifactory or similar
  
  - Education & Certifications
  - Essential:
  
  - Azure certifications (AZ-104 or higher)
  - Bachelor’s degree or equivalent experience
  
  PERSONAL REQUIREMENTS
  
  - Excellent communication skills
  - Results driven, with a strong sense of accountability
  - A proactive, motivated approach.
  - The ability to operate with urgency and prioritise work
    accordingly
  - Strong decision-making skills, the ability to demonstrate
    sound judgement
  - A structured and logical approach to work
  - Strong problem-solving skills
  - A creative and innovative approach to work
  - Excellent interpersonal skills
  - The ability to manage large workloads and tight deadlines
  - Excellent attention to detail and accuracy
  - A calm approach, with the ability to perform well in a
    pressurised environment
  - Strong numerical skills
  - A confident approach, with the ability to present to both
    management and technical audiences
  
  We are open to considering flexible working requests in line
  with organisational requirements.
  
  MUFG is committed to embracing diversity and building an
  inclusive culture where all employees are valued, respected
  and their opinions count. We support the principles of
  equality, diversity and inclusion in recruitment and
  employment, and oppose all forms of discrimination on the
  grounds of age, sex, gender, sexual orientation, disability,
  pregnancy and maternity, race, gender reassignment, religion
  or belief and marriage or civil partnership.
  
  We make our recruitment decisions in a non-discriminatory
  manner in accordance with our commitment to identifying the
  right skills for the right role and our obligations under
  the law.
