description: |
  We are looking for a highly motivated and skilled Generative
  AI (GenAI) Developer to join our dynamic team. You will be
  responsible for building and deploying GenAI solutions using
  large language models (LLMs) to address real-world business
  challenges. The role involves working with cross-functional
  teams, applying prompt engineering and fine-tuning
  techniques, and building scalable AI-driven applications. A
  strong foundation in machine learning, NLP, and a passion
  for emerging GenAI technologies is essential.
  
   Responsibilities
  
  - Design, develop, and implement GenAI solutions using large
    language models (LLMs) to address specific business needs
    using Python.
  - Collaborate with stakeholders to identify opportunities for
    GenAI integration and translate requirements into scalable
    solutions.
  - Preprocess and analyze unstructured data (text, documents,
    etc.) for model training, fine-tuning, and evaluation.
  - Apply prompt engineering, fine-tuning, and RAG (Retrieval-
    Augmented Generation) techniques to optimize LLM outputs.
  - Deploy GenAI models and APIs into production environments,
    ensuring performance, scalability, and reliability.
  - Monitor and maintain deployed solutions, incorporating
    improvements based on feedback and real-world usage.
  - Stay up to date with the latest advancements in GenAI, LLMs,
    and orchestration tools (e.g., LangChain, LlamaIndex).
  - Write clean, maintainable, and well-documented code, and
    contribute to team-wide code reviews and best practices.
  
  Requirements
  
  - Minimum 2 years of relevant Proven experience as an AI
    Developer.
  - Proficiency in Python
  - Good understanding multiple of Gen AI models (OpenAI,
    LLAMA2, Mistral) and ability to setup up local GPTs using
    ollama, lm studio etc.
  - Experience with LLMs, RAG (Retrieval-Augmented Generation),
    and vector databases (e.g., FAISS, Pinecone).
  - Multi agents frameworks to create workflows
  - Langchain or similar tools like lamaindex, langgraph etc.
  - Knowledge of Machine Learning frameworks, libraries, and
    tools.
  - Excellent problem-solving skills and solution mindset
  - Strong communication and teamwork skills.
  - Ability to work independently and manage ones time
    effectively.
  - Experience with any of cloud platforms (AWS, GCP, Azure).
  
  Benefits
  
  Exciting Projects: We focus on industries like High-Tech,
  communication, media, healthcare, retail and telecom. Our
  customer list is full of fantastic global brands and leaders
  who love what we build for them.
  
   Collaborative Environment: You Can expand your skills by
  collaborating with a diverse team of highly talented people
  in an open, laidback environment — or even abroad in one of
  our global centres. Work-Life Balance: Accellor prioritizes
  work-life balance, which is why we offer flexible work
  schedules, opportunities to work from home, and paid time
  off and holidays. Professional Development: Our dedicated
  Learning & Development team regularly organizes
  Communication skills training, Stress Management program,
  professional certifications, and technical and soft skill
  trainings.
  
   Excellent Benefits: We provide our employees with
  competitive salaries, family medical insurance, Personal
  Accident Insurance, Periodic health awareness program,
  extended maternity leave, annual performance bonuses, and
  referral bonuses.
  
