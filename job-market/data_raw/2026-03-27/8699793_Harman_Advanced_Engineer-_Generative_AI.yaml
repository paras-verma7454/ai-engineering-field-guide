  About the Role
  
  We're seeking an experienced Android UI Developer with genAI
  and cloud to join our team. As a UI Developer, you'll lead
  the development of complex user interfaces and UI components
  for Android Automotive OS applications using Jetpack
  Compose.
  
  Must is having experience on genAI and cloud.
  
  What You Will Do
  
  UI Development: Lead the development of complex user
  interfaces and UI components for Android Automotive OS
  applications. Having experience on genAI and cloud is must
  
  3a. MVVM Adoption: Drive the adoption of the MVVM
  architectural pattern and best practices within the UI team.
  
  3b. Collaboration: Collaborate with UX/UI design team, UI
  Architect, and Product Owner to ensure alignment on
  technical feasibility and user experience goals.
  
  4. UI Testing: Design and implement comprehensive unit and
  UI testing strategies using frameworks like JUnit, Espresso,
  and Compose testing.
  
  5. Performance Optimization: Proactively identify and
  resolve performance bottlenecks and UI/UX issues.
  
  6. Mentorship: Guide junior UI developers with peer reviews
  and pair programming.
  
  What You Need to Be Successful
  
  1. Android Experience: 6 to 9 years of experience in Android
  application development, with a large focus on UI
  development using Jetpack Compose.
  
  2. Jetpack Compose: Deep technical know-how of Jetpack
  Compose, including its architecture and performance
  characteristics.
  
  3. Android Jetpack: Experience with Android Jetpack
  components, especially ViewModel and StateFlow/SharedFlow.
  
  4. UI Testing: Proven ability to design and implement
  comprehensive UI testing strategies.
  
  5. Kotlin Development: Strong knowledge of Kotlin
  development, especially Coroutines.
  
  Bonus Points if You Have
  
  1. Navigation Domain Knowledge: Domain knowledge in
  Navigation is a plus.
  
  2. Figma Toolchain: Experience with Figma toolchain for
  understanding UI concepts and extracting assets.
  
  What Makes You Eligible
  
  1. Relevant Experience: 6 to 9 years of experience in
  Android application development with genAI and cloud.
  
  2. Technical Skills: Strong technical skills in Jetpack
  Compose, Android Jetpack, and UI development.
  
  3. Problem-Solving Skills: Exceptional problem-solving,
  analytical, and critical thinking skills.
  
