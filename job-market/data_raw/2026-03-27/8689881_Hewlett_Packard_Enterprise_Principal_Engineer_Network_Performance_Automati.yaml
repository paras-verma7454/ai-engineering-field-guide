description: |
  Principal Engineer – Network Performance, Automation and
  AI/ML
  
  
  
  This role has been designed as ‘’Onsite’ with an expectation
  that you will primarily work from an HPE office.
  
  Who We Are:
  
  Hewlett Packard Enterprise is the global edge-to-cloud
  company advancing the way people live and work. We help
  companies connect, protect, analyze, and act on their data
  and applications wherever they live, from edge to cloud, so
  they can turn insights into outcomes at the speed required
  to thrive in today’s complex world. Our culture thrives on
  finding new and better ways to accelerate what’s next. We
  know varied backgrounds are valued and succeed here. We have
  the flexibility to manage our work and personal needs. We
  make bold moves, together, and are a force for good. If you
  are looking to stretch and grow your career our culture will
  embrace you. Open up opportunities with HPE.
  
  Job Description:
  
  
  
  What you’ll do:
  
  Key Responsibilities
  
  Key Responsibilities
  
  - Design, develop, and maintain scalable, high-performance
    application platforms.
  - Architect and implement distributed systems using Kubernetes
    and cloud-native technologies.
  - Build reliable, fault-tolerant services with strong focus on
    performance, scalability, and resiliency.
  - Apply deep understanding of networking concepts, including
    routing protocols, to system design and troubleshooting.
  - Work closely with databases (SQL and NoSQL) to ensure data
    consistency, performance, and reliability.
  - Leverage operating system fundamentals for efficient
    resource utilization and system optimization.
  - Write clean, maintainable, and well-tested code in Python,
    Go, or other object-oriented programming languages.
  - Mentor junior and mid-level engineers, conduct design and
    code reviews, and promote engineering best practices.
  - Collaborate with product management, SRE, and platform teams
    to deliver end-to-end solutions.
  
  What you need to bring:
  
  Education and Experience Required:
  
  - Required Skills & Qualifications
  - 12–15 years of hands-on experience in application
    development.
  - Strong experience with Kubernetes and containerized, cloud-
    native architectures.
  - Proven expertise in distributed systems design and
    implementation.
  - Solid understanding of networking concepts, including
    routing protocols.
  - Strong knowledge of databases (relational and/or NoSQL) and
    data modeling.
  - Good understanding of operating systems concepts such as
    processes, memory management, and concurrency.
  - Proficiency in Python, Go, or other object-oriented
    programming languages.
  - Experience with system debugging, performance tuning, and
    production troubleshooting.
  - Preferred Qualifications
  - Experience building platform or infrastructure-adjacent
    applications.
  - Exposure to large-scale, multi-tenant, or high-availability
    systems.
  - Prior experience in technical leadership or architecture
    roles.
  
  Additional Skills:
  
  Cloud Architectures, Cross Domain Knowledge, Design
  Thinking, Development Fundamentals, DevOps, Distributed
  Computing, Microservices Fluency, Full Stack Development,
  Security-First Mindset, User Experience (UX)
  
  What We Can Offer You:
  
  Health & Wellbeing
  
  We strive to provide our team members and their loved ones
  with a comprehensive suite of benefits that supports their
  physical, financial and emotional wellbeing.
  
  Personal & Professional Development
  
  We also invest in your career because the better you are,
  the better we all are. We have specific programs catered to
  helping you reach any career goals you have — whether you
  want to become a knowledge expert in your field or apply
  your skills to another division.
  
  Unconditional Inclusion
  
  We are unconditionally inclusive in the way we work and
  celebrate individual uniqueness. We know varied backgrounds
  are valued and succeed here. We have the flexibility to
  manage our work and personal needs. We make bold moves,
  together, and are a force for good.
  
  Let's Stay Connected:
  
  Follow @HPECareers on Instagram to see the latest on people,
  culture and tech at HPE.
  
