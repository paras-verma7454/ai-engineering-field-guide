description: |
  We're Celonis, the global leader in Process Intelligence
  technology and one of the world's fastest-growing SaaS
  firms. We believe there is a massive opportunity to unlock
  productivity by placing AI, data and intelligence at the
  core of business processes - and for that, we need your
  help. Care to join us?
  
  Role Description
  
  As an Applied AI Engineer specializing in the Public Sector,
  you are pushing the envelope in solving critical operational
  challenges for State and Local Government agencies. You will
  be working with our most strategic public sector clients,
  understanding their unique objectives—from enhancing citizen
  services and modernizing legacy systems to optimizing grant
  management and regulatory compliance—and building Celonis
  solutions using the world’s leading Process Intelligence
  (PI) platform in combination with top AI and ML technology
  partners, such as Microsoft, OpenAI, and Databricks. With
  Celonis’ Process Intelligence (PI) platform, we feed
  operational context to AI so it understands the complex
  realities of government operations (breaking down agency
  silos) and enables agencies to industrialize AI. This
  unlocks real ROI on AI deployments, maximizing taxpayer
  value at scale. There is no AI without PI. You will
  prototype these solutions, demonstrate their value to
  government CIOs and Agency Directors, and ensure successful
  implementation, adoption, and value realization to increase
  the footprint of Celonis across state and local governments.
  
  Key Responsibilities:
  
  - AI Discovery & Solutioning: Understand public sector AI
    strategies and specific agency challenges (e.g., benefits
    administration backlogs, procurement bottlenecks, public
    safety resource allocation, or permitting delays). As a
    Celonis product and government domain expert, find the
    best problem-solution fit and translate agency
    requirements into innovative solutions that deliver
    measurable public impact.
  - Pre- and Post-Sales Execution: Actively drive the full
    customer lifecycle within the public sector. Lead
    technical discovery and capability demonstrations during
    the complex government pre-sales and procurement (RFP)
    cycles, and remain deeply involved post-sale to guide
    implementation, ensuring agreed value and adoption
    thresholds are successfully met.
  - Hackathons & Prototyping: Think out of the box, have a „can-
    do“ attitude, and don’t shy away from complex legacy
    processes. Leverage cutting-edge AI technologies to
    rapidly build creative prototypes in agency hackathons,
    solving critical pain points to improve constituent
    experiences.
  - Agentic Process Transformation: Support our government
    customers in achieving real value out of AI deployments at
    scale, enabling a fundamental shift from traditional,
    rigid, paper-heavy workflows to the use of autonomous AI
    agents empowered by our Celonis Process Intelligence
    Platform (e.g., intelligent case triaging or automated
    compliance checks).
  - Proof Projects: End-to-end execution of critical Proof-of-
    Value projects. This includes architecting and delivering
    secure, scalable LLM/agent systems with RAG, tools, and
    guardrails, while seamlessly integrating with government
    enterprise data, identity protocols, and stringent
    compliance/security frameworks (e.g., StateRAMP, HIPAA,
    CJIS).
  - Domain & Industry Leadership: Serve as the internal and
    external technical subject matter expert for the State &
    Local Government vertical, scaling knowledge across the
    organization regarding agency processes and public sector
    nuances.
  
  Requirements:
  
  - 5+ years of experience leading technical pre-sales and post-
    sales engagements specifically within the Public Sector
    (State & Local Government). This includes navigating
    government procurement cycles, building compelling ROI
    business cases for public funds, and guiding technical
    implementations through to constituent value realization.
  - Deep understanding of business processes native to state and
    local governments (such as Health & Human Services,
    Procurement, Finance, DMV operations, or Public Safety)
    with the ability to translate high-level policy or agency
    needs into specific, impactful AI use cases.
  - Expertise in generative AI techniques like RAG, few-shot
    learning, prompt engineering, multi-agent orchestration,
    multimodal understanding, or fine-tuning used to build
    high-impact use cases (e.g., intelligent constituent-
    facing chatbots, automated processing of policy documents,
    or grant application analysis).
  - Solid knowledge of Python and common ML libraries (such as
    LangChain, pandas, pydantic, sklearn, PyTorch) as well as
    data engineering tools and technologies.
  - Strong presentation skills to both internal and external
    stakeholders (including elected officials, agency
    directors, and IT leadership), whether leading technical
    whiteboarding sessions or formal readouts and demos.
  - Bachelor’s Degree required; Master's Degree in computer
    science, engineering, mathematics, or related fields, or
    equivalent work experience preferred.
  
  Nice to have (big plus):
  
  - Hands-on experience building agentic systems using LLM
    orchestration, RAG, function calling, and prompt
    engineering, while ensuring safety through rigorous
    evaluations and guardrails suited for highly scrutinized
    public sector environments.
  - Experience in deploying and monitoring models at scale
    within government-compliant cloud environments (e.g., AWS
    GovCloud, Azure Government).
  - Working knowledge of tools in the LLM ecosystem such as
    LangChain, LlamaIndex, or other OSS packages.
  
