  Company Description
  
  Experian is a global data and technology company, powering
  opportunities for people and businesses around the world. We
  help to redefine lending practices, uncover and prevent
  fraud, simplify healthcare, create marketing solutions, and
  gain deeper insights into the automotive market, all using
  our unique combination of data, analytics and software. We
  also assist millions of people to accomplish their financial
  goals and help them save time and money.
  
  We operate across a range of markets, from financial
  services to healthcare, automotive, agribusiness, insurance,
  and many more industry segments.
  
  We invest in people and new advanced technologies to unlock
  the power of data. As a FTSE 100 Index company listed on the
  London Stock Exchange (EXPN), we have a team of 22,500
  people across 32 countries. Our corporate headquarters are
  in Dublin, Ireland. Learn more at experianplc.com.
  
  Job Description
  
  What you'll be doing:
  
  You will lead the implementation, release, and
  operationalization of workplace GenAI tools—turning
  architecture decisions and governance requirements into
  production‑ready deployments with overseeing, documentation,
  and service readiness. A major focus will execute POCs/POVs,
  standing up provisioning and identity workflows, building
  the operational strategies, and ensuring
  performance/availability metrics meet enterprise standards
  before GA. This role will also help reduce manual overhead
  where ChatGPT tooling lacks mature admin capabilities, by
  creating automation and operational processes for
  account/access, custom GPT handling, and controls support.
  You will operationalize ChatGPT Enterprise workspace
  management capabilities: implementing SSO/SCIM provisioning
  flows, applying workspace roles, supporting GPT
  publishing/sharing standards, and enabling evidence capture
  via the Compliance API where required by audit/compliance
  partners. You will report to a Manager.
  
  
  
  Summary of Primary Responsibilities:
  
  - Onboard and implement GenAI tools, integrating with
    enterprise identity/security tooling and standards.
  - Implement ChatGPT Enterprise identity posture: SSO + SCIM
    onboarding, and support RBAC patterns in the workspace for
    admins/owners and GPT governance roles.
  - Execute POCs/POVs: build capability maps, define target
    productivity outcomes, evaluate effectiveness, support
    acceptable use artifacts, and coordinate end‑user
    communications.
  - Operationalize GA readiness: monitoring/alerting,
    availability metrics, performance management, release
    validation, and service transition readiness.
  - Create and maintain technical documentation for
    implementation, deployment, and maintenance processes.
  - Enable support teams (Service Desk / 1LOD) with training,
    runbooks, and escalation pathways for GenAI tools
  - Automate operational workflows where possible (provisioning
    steps, governance tracking updates, reporting, lifecycle
    actions).
  - Support custom GPT operational controls (where applicable):
    enforce sharing constraints, track lifecycle status, and
    align operational practice to governance requirements.
  - Support enterprise GPT operations using documented ChatGPT
    Enterprise capabilities: workspace GPT sharing controls +
    third‑party GPT allow/block decisions. Shared edit access
    and admin ownership reassignment to prevent single‑owner
    failure modes. Compliance evidence workflows using
    Compliance API logs/metadata, where audit/compliance
    requires
  
  
  
  What your background looks like:
  
  - 4–8+ years in engineering / implementation roles supporting
    enterprise SaaS tools, collaboration platforms, identity
    integration, or workplace productivity systems.
  - Hands‑on experience implementing and operating productivity
    platforms and/or GenAI services, with an emphasis on
    stability, monitoring, and operational excellence.
  - Working understanding of governance mechanics that affect
    deployment (acceptable use, approvals,
    training/attestation, access request flows).
  - Comfort producing crisp documentation, runbooks, and
    knowledge articles; capable of training support teams.
  - Build lightweight automation (e.g., workflow automation
    aligned to governance tracker patterns and audit
    reminders).
  - 3+ years of experience supporting enterprise
    audit/compliance evidence pipelines using the Compliance
    API / Compliance Logs Platform.
  - 3+ years of experience implementing ChatGPT Enterprise
    identity/provisioning and workspace management
    (SSO/SCIM/RBAC).
  
  Qualifications
  
  - 4–8+ years in engineering / implementation roles supporting
    enterprise SaaS tools, collaboration platforms, identity
    integration, or workplace productivity systems.
  - • Hands‑on experience implementing and operating
    productivity platforms and/or GenAI services, with an
    emphasis on stability, monitoring, and operational
    excellence.
  - • Working understanding of governance mechanics that affect
    deployment (acceptable use, approvals,
    training/attestation, access request flows).
  
