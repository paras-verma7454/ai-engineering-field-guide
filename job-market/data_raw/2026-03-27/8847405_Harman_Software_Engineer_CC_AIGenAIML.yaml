  About the Role
  
  As a Developer Efficiency Engineer in SBU Connectivity, you
  will contribute hands‑on engineering solutions that improve
  software development efficiency across detailed design, unit
  construction, and unit verification. You will work on
  automation, internal tooling, and AI‑assisted productivity
  improvements that help development teams reduce manual
  effort and improve consistency and quality.
  
  This role is suited for a technically strong software
  engineer who enjoys solving workflow and tooling problems,
  has a good understanding of the software development
  lifecycle, and is motivated to improve developer experience
  through practical, engineer‑driven solutions.
  
  What You Will Do
  
  Process & Workflow Efficiency
  
  - Analyze software development workflows related to design,
    implementation, and unit verification to identify
    inefficiencies and improvement opportunities.
  - Propose and implement practical, engineering‑driven
    improvements to development practices and workflows.
  - Apply engineering judgment to balance productivity, quality,
    and compliance needs.
  
  Automation & AI-Based Productivity
  
  - Leverage AI‑based productivity tools to improve developer
    workflows, consistency, and efficiency where they provide
    clear value.
  - Assess the impact of solutions using measurable indicators
    such as effort reduction, cycle time improvement, or
    quality gains.
  
  Metrics & Engineering Insights
  
  - Create and maintain dashboards and reports that provide
    visibility into development efficiency, throughput, and
    quality metrics.
  - Use data from development tools to support technical
    decisions and improvement proposals.
  
  Continuous Improvement
  
  - Participate in pilots and experiments to validate new tools,
    automation, or workflow changes.
  - Refine solutions iteratively based on feedback from
    engineers and observed results.
  - Contribute to scaling successful improvements with guidance
    from senior stakeholders.
  
  Collaboration & Enablement
  
  - Work closely with development teams to understand real‑world
    pain points and constraints.
  - Collaborate with peers and senior engineers to align
    improvements with broader engineering goals.
  - Share learnings and best practices through documentation and
    technical discussions.
  
  What You Need
  
  - Bachelor’s or Master’s degree in Software Engineering,
    Computer Science, or related field.
  - Around 3 years of experience in automotive software
    development with hands‑on exposure to design,
    implementation, testing, or verification.
  - Experience developing or applying automation and tooling to
    improve developer workflows.
  - Basic familiarity with AI‑based productivity tools and an
    understanding of responsible usage in engineering
    environments.
  - Ability to work with engineering metrics and dashboards to
    identify improvement opportunities.
  - Comfortable contributing code, scripts, or tooling as part
    of day‑to‑day engineering work.
  
  What is Nice to Have
  
  - Experience with Automotive Software Development Frameworks.
  - Exposure to DevOps, CI/CD pipelines, or internal development
    platforms.
  - Interest in developer experience, productivity, and
    engineering effectiveness.
  - Willingness to learn and experiment with new tools and
    approaches under guidance.
  
  What Makes You Eligible
  
  - Be willing to travel up to 20%, domestic and international
    travel
  - Be willing to work in an office, with hybrid model of remote
    and onsite office in one of our major software development
    sites
  - Successfully complete a background investigation and drug
    screen as a condition of employment
  
  What We Offer
  
  - Flexible work environment, allowing for full-time remote
    work globally for positions that can be performed outside
    a HARMAN or customer location
  - Access to employee discounts on world-class Harman and
    Samsung products (JBL, HARMAN Kardon, AKG, etc.)
  - Extensive training opportunities through our own HARMAN
    University
  - Competitive wellness benefits
  - Tuition Reimbursement
  - Access to HARMAN Campus Fitness Center and Cafeteria
  - An inclusive and diverse work environment that fosters and
    encourages professional and personal development
  
