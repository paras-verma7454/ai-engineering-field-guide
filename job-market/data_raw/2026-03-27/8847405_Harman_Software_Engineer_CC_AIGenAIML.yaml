  Introduction: A Career at HARMAN Automotive
  
  We’re a global, multi-disciplinary team that’s putting the
  innovative power of technology to work and transforming
  tomorrow. At HARMAN Automotive, we give you the keys to
  fast-track your career.
  
  - Engineer audio systems and integrated technology platforms
