  all qualified candidates to apply to join our team.  All
  qualified applicants will receive consideration for
  employment without regard to race, color, religion, sex,
  sexual orientation, gender identity, national origin,
  disability, protected veteran status, or any other category
  protected by applicable law.
  
  Alternative methods of applying for employment are available
  to individuals unable to submit an application through this
  site because of a disability. Contact
  applicationassistance@sailpoint.com or mail to 11120 Four
  Points Dr, Suite 100, Austin, TX 78726, to discuss
  reasonable accommodations.  NOTE: Any unsolicited resumes
  sent by candidates or agencies to this email will not be
  considered for current openings at SailPoint.
