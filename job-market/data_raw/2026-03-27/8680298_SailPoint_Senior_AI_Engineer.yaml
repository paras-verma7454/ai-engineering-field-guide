description: |
  Job Title: Senior AI Engineer
  
  About SailPoint:
  
  SailPoint is the leader in identity security for the cloud
  enterprise. Our identity security solutions
  
  secure and enable thousands of companies worldwide, giving
  our customers unmatched
  
  visibility into the entirety of their digital workforce and
  ensuring that workers have the right
  
  access to do their job—no more and no less.
  
  Built on a foundation of AI and ML, our Identity Security
  Cloud Platform delivers the right level
  
  of access to the right identities and resources at the right
  time—matching the scale, velocity,
  
  and changing needs of today’s cloud-oriented, modern
  enterprise.
  
  About the role:
  
  As an AI Engineer, you will collaborate closely with cross-
  functional teams to design, develop,
  
  and deploy cutting-edge AI solutions with a focus on
  Generative AI and autonomous systems.
  
  This role requires a strong foundation in ML engineering,
  along with experience building
  
  applications with FMs and related concepts such as RAG,
  fine-tuning, agents, and distillation.
  
  About the team:
  
  The AI team at SailPoint applies AI and domain expertise to
  create AI solutions that solve real
  
  problems in identity governance. We believe the path to
  success is through meaningful
  
  customer outcomes, and we leverage traditional AI/ML as well
  as recent innovations in
  
  Generative AI and Graph ML to bring our solutions to
  SailPoint’s core product lines.
  
  Roadmap to success:
  
  90 Days
  
  ● Deeply understand the SailPoint AI vision and Generative
  AI initiatives.
  
  ● Onboard onto our AI Platform tech stack.
  
  ● Develop or evaluate a working prototype of an AI agent
  using existing models/tools.
  
  6 months:
  
  ● Deliver or contribute to a fully functional GenAI-powered
  feature.
  
  ● Optimize existing AI pipelines to ensure robust training,
  evaluation, and deployment.
  
  ● Collaborate with the AI and product teams to identify key
  use cases for GenAI.
  
  1 year:
  
  ● Lead the development of a new FM-based capability from
  ideation to deployment.
  
  ● Drive AI innovation by rapidly incorporating advancements
  in FM fine-tuning, prompt
  
  engineering, agent-based systems, etc. into our product and
  platform.
  
  ● Establish repeatable frameworks for evaluating GenAI and
  agent-based features in
  
  production, emphasizing business impact and risk mitigation.
  
  ● Collaborate with partners to deliver thoughtful
  integrations between traditional ML and
  
  agent-based systems that provide a seamless and autonomous
  user experience.
  
  Requirements:
  
  ● 5+ years experience building and deploying ML models in
  production at scale.
  
  ● Recent experience with Generative AI models and
  techniques, such as LLMs,
  
  fine-tuning, RAG, prompt engineering, guardrails,
  distillation, and agent frameworks.
  
  ● Can-do attitude with a focus on delivering measurable
  business impact.
  
  ● Strong technical communicator who can convey complex
  topics to different audiences.
  
  ● B.S. in Computer Science, or a related field.
  
  Tech Stack:
  
  ● Core Programming: Python, Go
  
  ● Cloud Platform: AWS (SageMaker, Bedrock) preferred
  
  ● GenAI Frameworks/Tools: Any
  
  ● Data: Snowflake, Kafka, Airflow
  
  Benefits and Compensation listed vary based on the location
  of your employment and the nature of your employment with
  SailPoint.
  
  As a part of the total compensation package, this role may
  be eligible for the SailPoint Corporate Bonus Plan or a
  role-specific commission, along with potential eligibility
  for equity participation. SailPoint maintains broad salary
  ranges for its roles to account for variations in knowledge,
  skills, experience, market conditions and locations, as well
  as reflect SailPoint’s differing products, industries, and
  lines of business. Candidates are typically placed into the
  range based on the preceding factors as well as internal
  peer equity. We estimate the base salary, for US-based
  employees, will be in this range from (min-mid-max, USD):
  
  $119,400 - $201,190.00
  
  Base salaries for employees based in other locations are
  competitive for the employee’s home location.
  
  Benefits Overview
  
  1. Health and wellness coverage: Medical, dental, and vision
  insurance
  
  2. Disability coverage: Short-term and long-term disability
  
  3. Life protection: Life insurance and Accidental Death &
  Dismemberment (AD&D)
  
  4. Additional life coverage options: Supplemental life
  insurance for employees, spouses, and children
  
  5. Flexible spending accounts for health care, and dependent
  care; limited purpose flexible spending account
  
  6. Financial security: 401(k) Savings and Investment Plan
  with company matching
  
  7. Time off benefits: Flexible vacation policy
  
  8. Holidays: 8 paid holidays annually
  
  9. Sick leave
  
  10. Parental support: Paid parental leave
  
  11. Employee Assistance Program (EAP) and Care Counselors
  
  12. Voluntary benefits: Legal Assistance, Critical Illness,
  Accident, Hospital Indemnity and Pet Insurance options
  
  13. Health Savings Account (HSA) with employer contribution
  
