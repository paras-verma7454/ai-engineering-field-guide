description: |
  DLA Piper is, at its core, bold, exceptional, collaborative
  and supportive.  Our people are the backbone, heart and soul
  of our firm.  Wherever you are in your professional journey,
  DLA Piper is a place you can engage in meaningful work and
  grow your career.  Let’s see what we can achieve. Together.
  
  Summary
  
  The AI Solutions Engineer is an embedded partner to the
  Professional Excellence (PE) Practice Group, responsible for
  intake and shaping of demand into clear problem statements,
  prioritized backlogs, and sprint-ready user stories. The
  role collaborates with others to deliver iterative,
  measurable improvements to PE workflows and solutions, with
  the goal to help build/deliver re-usable AI engineering
  patterns that the business uses and accelerate sustainable
  business workflow automation. This position is designed to
  support PE’s needs with an understanding of Associate-level
  work and the practical realities of PE workflow and
  delivery.
  
  Location
  
  This position can sit in any of our U.S. offices and offers
  a hybrid work schedule.
  
  Responsibilities
  
  PE Intake, Discovery & Problem Framing (Embedded SE/BA)
  
  - Own requirements intake for PE initiatives; capture a
    concise problem statement, intended outcomes, and success
    measures.
  - Engage PE stakeholders to understand workflow pain points
    and constraints; translate needs into actionable
    requirements.
  - Apply an understanding of Associate-level work to ensure
    solutions fit real execution patterns and reduce friction.
  
  Agile Backlog Management & User Stories
  
  - Produce high-quality requirements including functional
    requirements and user stories suitable for sprint
    execution.
  - Drive iterative elaboration and refinement with stakeholders
    and solutions for delivery to maintain a healthy backlog
    and delivery cadence.
  
  Solution Design, Prototyping & Feasibility
  
  - Evaluate and recommend solutions.
  - Build prototypes / proofs of concept and support iterative
    refinement to validate feasibility and value.
  - Action solution design and integration planning.
  
  Testing, Adoption & Operational Readiness
  
  - Support UAT planning and execution; translating feedback
    into backlog updates and improvement cycles.
  - Support rollouts, training materials, demos, and adoption
    activities in partnership with IT/KM and PE stakeholders.
  - Ensure deliverables meet firm standards for documentation,
    governance, quality, and supportability.
  
  Cross-Functional Delivery
  
  - Partner with the IT and adjacent teams to surface risks,
    dependencies, and decisions early and keep delivery
    moving.
  - Promote consistent delivery practices as the pod model
    scales across practice/business groups.
  
  Desired Skills
  
  - Background in building AI based solutions within the
    practice and will be proficient in building AI agents,
    data integration, using tools to rapidly build
    pilots/demos and take to production.
  - Understanding of ML models, ability to select the correct
    models and solution patterns, various RAG patterns
    (example KG-RAG, Hybrid RAG, Agentic RAG etc.).
  - Experience with various agent, context engineering/agentic
    memory frameworks.
  - Understanding of prompt engineering and building evolving
    frameworks like DSPy and building RL into standardized
    prompt frameworks for sustainable solutions.
  - Ability to apply core engineering for solutions design,
    rapidly learn, test and certify new frameworks for use in
    production.
  - Demonstrated experience translating stakeholder needs into
    requirements, user stories, and delivery-ready backlogs.
  - Experience with Microsoft 365, Power Platform (Power
    Automate/Apps), SharePoint, and workflow automation
    systems.
  - Experience with AI-driven tools and adoption patterns in
    professional services.
  - Ability to prototype and deliver low-code solutions and
    iterate rapidly based on stakeholder feedback.
  - Working knowledge of integration concepts (APIs, data flows)
    and ability to implement integration patterns when needed
    (e.g., Graph-based patterns).
  - Working proficiency in one or more of the following
    languages: SQL (data validation, reporting, requirements
    traceability); Python (automation scripts, data shaping,
    light analysis); PowerShell (M365/automation
    administration scripting); JavaScript / TypeScript
    (web/custom UI extensions, integrations); or Java, Go,
    REST/JSON fluency (API payloads, integration testing).
  
  Minimum Education
  
  - High School or GED
  
  Preferred Education
  
  - Bachelor's Degree in Information systems, Computer Science,
    Business, or related field.
  
  Minimum Years of Experience
  
  - 5 years of experience in solutions engineering, business
    analysis, legal technology, or process improvement
    (professional services preferred).
  
  Essential Job Expectations
  
  While the specific job requirements of a DLA Piper position
  may vary depending upon scope of the job and area of
  specialty, there are certain universal requirements that are
  expected of all DLA Piper employees, which include but are
  not limited to:
  
  - Effectively communicate, verbally and in writing, with
    clients, lawyers, business professionals, and third
    parties.
  - Produce deliverables, answer phone calls, and reply to
    correspondence in an efficient and responsive manner.
  - Provide timely, accurate, and quality work product.
  - Successfully meet deadlines, expectations, and perform work
    duties as required.
  - Foster positive work relationships.
  - Comply with all firm policies and practices.
  - Engage in both physical and sedentary activity, such as (a)
    working at a computer for extended periods of time,
    including on-screen reading and typing; (b) participating
    in digital/virtual conference calls; (c) participating in
    meetings as needed.
  - Ability to work under pressure and manage competing demands
    in a fast-paced environment.
  - Perform all other duties, tasks or projects as assigned.
  
  Our employees are expected to embrace and uphold our firm
  values as a part of our DLA Piper culture. We are committed
  to excellence in how we represent our clients and develop
  our people. Physical Demands
  
  Sedentary work: Exerting up to 10 pounds of force
  occasionally and/or a negligible amount of force frequently
  or constantly to lift, carry, push, pull or otherwise move
  objects, including the human body. Sedentary work involves
  sitting most of the time. Jobs are sedentary if walking and
  standing are required only occasionally and all other
  sedentary criteria are met.   
  
  Work Environment   
  
  The individual selected for this position may have the
  opportunity for a hybrid work arrangement comprised of
  remote and in-office work, the requirement for which will be
  determined in coordination with the hiring manager or
  supervisor and may be modified in the firm’s discretion in
  the future. Disclaimer
  
  The purpose of this job description is to provide a concise
  statement of the work elements and to organize and present
  the information in a standardized way. It is not intended to
  describe all the elements of the work that may be performed
  by every individual in this classification, nor should it
  serve as the sole criteria for personnel decisions and
  actions. The job duties, requirements, and expectations for
  this position may be modified at the Firm’s discretion at
  any time. This job description does not change the at-will
  nature of employment.
  
  
  Application Process    
  
  Applicants must apply directly online instead of sending
  application materials via email.
  
  
  Accommodation   
  
  Reasonable accommodations may be made upon request to permit
  individuals with a disability to perform the essential
  functions and responsibilities of the position or to
  participate in the job selection process. If you have a
  request for an accommodation during the application process,
  please contact careers@us.dlapiper.com.
  
  
  Agency applications will not be considered.    
  
  
  No immigration sponsorship is available for this
  position.     The firm’s expected hiring range for this
  position is $129,808 - $206,399 depending on the candidate’s
  geographic market location.
  
  The compensation offered for employment will also be
  dependent on other factors including the candidate’s
  experience, skills, educational and professional background,
  and overall qualifications. We offer a comprehensive package
  of benefits including medical/dental/vision insurance, and
  401(k).
  
  
