  within this range will vary based on factors relevant to the
  position, as well as geography of the selected candidate. •
  The salary range for this role is $250,600 and $384,600. The
  actual base salary a successful candidate will be offered
  within this range will vary based on factors relevant to the
  position. • Bonus Potential: An incentive pay program offers
  payouts based on company performance, job level, and
  individual performance.  Benefits: • Benefits: GM offers a
  variety of health and wellbeing benefit programs. Benefit
  options include medical, dental, vision, Health Savings
  Account, Flexible Spending Accounts, retirement savings
  plan, sickness and accident benefits, life insurance, paid
  vacation & holidays, tuition assistance programs, employee
  assistance program, GM vehicle discounts and more. Company
  vehicle: Upon successful completion of a motor vehicle
  report review, you will be eligible to participate in a
  company vehicle evaluation program, though which you will be
  assigned a General Motors vehicle to drive and evaluate.
  Note: program participants are required to purchase/lease a
  qualifying GM vehicle every four years unless one of a
  limited number of exceptions applies. #LI-KE2 This role is
  categorized as remote. This means the selected candidate may
  be based anywhere in the country of work and is not expected
  to report to a GM worksite unless directed by their manager.
  The selected candidate will be required to travel <25% for
  this role. This job may be eligible for relocation benefits.
  The position is subject to export control restrictions and
  requires the successful candidate to be a U.S. Person (U.S.
  citizen, U.S. permanent resident, asylee or refugee) About
