description: |
  What you can expect
  
  As a Zoom AI DevOps Engineer, you will design and manage AWS
  infrastructure supporting AI services. Using Terraform,
  you’ll implement Infrastructure as Code and streamline
  automation. Your work includes monitoring systems, managing
  on-call rotations, and ensuring high reliability. You’ll
  collaborate with cross-functional teams to boost performance
  and guide engineers on automation best practices. Please
  note this role includes on-call responsibilities and
  occasional weekend deployments as needed.
  
  About the Team
  
  The team drives automation, CI/CD, observability, and cloud-
  native operations to power Zoom’s AI services. We handle
  service deployment and operations across multi-cloud and on-
  premises environments. You’ll work in a fast-paced,
  collaborative setting with Developers, Infrastructure
  Engineers, and Product teams to build and maintain
  resilient, high-performing systems.
  
  What we’re looking for
  
  - Have 5+ years of work experience as a Cloud or DevOps
    engineer
  - Have 5+ hands-on experience working on Production service
    deployments using Kubernetes
  - Have experience with AWS services and Kubernetes-based
    production deployments. Proficiency in Infrastructure as
    Code (Terraform) and configuration management tools
    (Ansible).
  - Demonstrate experience in Kubernetes, Docker workload
    deployment, and monitoring for it for large-scale
    distributed systems deployed on prod
  - Show high proficiency in programming/scripting languages
    like Python, Bash, or Go
  
  Ways of Working Our structured hybrid approach is centered
  around our offices and remote work environments. The work
  style of each role, Hybrid, Remote, or In-Person is
  indicated in the job description/posting.
  
  Benefits As part of our award-winning workplace culture and
  commitment to delivering happiness, our benefits program
  offers a variety of perks, benefits, and options to help
  employees maintain their physical, mental, emotional, and
  financial health; support work-life balance; and contribute
  to their community in meaningful ways. Click Learn for more
  information.
  
  About Us Zoomies help people stay connected so they can get
  more done together. We set out to build the best
  collaboration platform for the enterprise, and today help
  people communicate better with products like Zoom Contact
  Center, Zoom Phone, Zoom Events, Zoom Apps, Zoom Rooms, and
  Zoom Webinars. We’re problem-solvers, working at a fast pace
  to design solutions with our customers and users in mind.
  Find room to grow with opportunities to stretch your skills
  and advance your career in a collaborative, growth-focused
  environment.
  
  Our Commitment
  
  At Zoom, we believe great work happens when people feel
  supported and empowered. We’re committed to fair hiring
  practices that ensure every candidate is evaluated based on
  skills, experience, and potential. If you require an
  accommodation during the hiring process, let us know—we’re
  here to support you at every step.
  
  If you need assistance navigating the interview process due
  to a medical disability, please submit an Accommodations
  Request Form and someone from our team will reach out soon.
  This form is solely for applicants who require an
  accommodation due to a qualifying medical disability. Non-
  accommodation-related requests, such as application follow-
  ups or technical issues, will not be addressed.
  
