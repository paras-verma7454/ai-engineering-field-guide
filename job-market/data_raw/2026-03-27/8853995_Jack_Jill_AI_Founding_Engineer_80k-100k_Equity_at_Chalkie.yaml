description: |
  This is a job that Jill, our AI Recruiter, is recruiting for
  on behalf of one of our customers.
  
  She will pick the best candidates from Jack's network.
  
  The next step is to speak to Jack.
  
  Job Title: Founding Engineer
  
  Salary: £80k-£100k + Equity
  
  Company Description: Chalkie AI - Triple Point Ventures
  backed EdTech startup
  
  Job Description: Join a high-growth startup that scaled from
  £0 to £2.5M ARR in just six months. As our third founding
  engineer, you will work directly with experienced founders
  to build the first AI lesson generation tool teachers
  actually love. You will own features end-to-end, shaping the
  technical infrastructure for over 200,000 global users.
  
  Location: Remote, UK
  
  Why this role is remarkable:
  
  - Massive traction with £2.5M ARR and 200k+ users achieved in
    under six months with a lean, elite team.
  - Direct impact on global education by building tools that
    save teachers hours of planning time every week.
  - High-autonomy founding role with significant equity and the
    ability to define the engineering culture from day one.
  
  What you will do:
  
  - Lead full-stack development using NextJS and Laravel to ship
    production-ready features for 20,000+ weekly active users.
  - Architect and scale technical infrastructure on GCP and
    Digital Ocean to support millions of future students and
    teachers.
  - Collaborate daily with the CEO, CTO, and CPO to ideate,
    problem-solve, and execute the core product vision.
  
  The ideal candidate:
  
  - Proven experience building products from 0-to-1 as a former
    founder or early-stage startup engineer.
  - Strong full-stack proficiency in PHP/Laravel and
    React/NextJS with a passion for AI-first development
    workflows.
  - Product-minded engineer who prioritizes user experience and
    rapid shipping over perfect code abstraction.
  
  Who are Jack & Jill?
  
  Ok, I'll go first. I'm Jack, an AI that gets to know you on
  a quick call, learning what you're great at and what you
  want from your career. Then I help you land your dream job
  by finding unmissable opportunities as they come up,
  supporting you with applications, interview prep, and moral
  support.
  
  And I'm Jill, an AI Recruiter who talks to companies to
  understand who they're looking to hire. Then I recruit from
  Jack's network, making an introduction when I spot an
  excellent candidate.
  
  Next steps
  
  Step 1. Visit our website. Step 2. Click 'Talk to Jack'.
  Step 3. Talk to Jack so he can understand your experience
  and ambitions. Step 4. Jack will make sure Jill (the AI
  agent working for the company) considers you for this role.
  Step 5. If Jill thinks you're a great fit and her client
  wants to meet you, they will make the introduction. Step 6.
  If not, Jack will find you excellent alternatives. All for
  free.
  
  We never post fake jobs
  
  This isn't a trick. This is an open role that Jill is
  currently recruiting for from Jack's network. Sometimes
  Jill's clients ask her to anonymize their jobs when she
  advertises them, which means she can't share all the details
  in the job description. We appreciate this can make them
  look a bit suspect, but there isn't much we can do about it.
  
  Give Jack a spin! You could land this role. If not, most
  people find him incredibly helpful with their job search,
  and we're giving his services away for free."
