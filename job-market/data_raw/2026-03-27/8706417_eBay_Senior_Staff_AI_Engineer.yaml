description: |
  At eBay, we're more than a global ecommerce leader — we’re
  changing the way the world shops and sells. Our platform
  empowers millions of buyers and sellers in more than 190
  markets around the world. We’re committed to pushing
  boundaries and leaving our mark as we reinvent the future of
  ecommerce for enthusiasts.
  
  Our customers are our compass, authenticity thrives, bold
  ideas are welcome, and everyone can bring their unique
  selves to work — every day. We're in this together,
  sustaining the future of our customers, our company, and our
  planet.
  
  Join a team of passionate thinkers, innovators, and dreamers
  — and help us connect people and build communities to create
  economic opportunity for all.
  
  About the Role and the Team:
  
  eBay is seeking a dedicated, team-oriented, and highly
  skilled Senior Staff AI Engineer to join our Core AI
  division. This is an exciting opportunity to work with a
  highly visible and well-positioned team at one of the most
  established and heavily trafficked ecommerce companies in
  the world. You will be part of an agile team driving forward
  some of eBay’s most important and impactful AI initiatives.
  
  You will work closely with Software Engineers, Researchers,
  and Data Engineers across the full AI lifecycle: from early
  experimentation and prototyping to deploying production-
  grade AI systems that support millions of users. Your focus
  will include Generative AI systems and intelligent agents,
  contributing to both foundational infrastructure and end-
  user capabilities.
  
  We value curiosity, engineering discipline, and the
  willingness to challenge convention. Our systems handle
  billions of requests per day, leverage large-scale GPU
  clusters, and power key AI-driven experiences across the
  platform.
  
  What You Will Accomplish:
  
  - Define and implement the strategic roadmap for AI
    Engineering, aligning technical direction with broader AI
    and business objectives.
  - Architect, design, and optimize scalable AI systems that
    operate reliably in high-throughput, production
    environments.
  - Lead end-to-end operationalization of AI/ML models, ensuring
    robust lifecycle management including deployment,
    monitoring, and iteration.
  - Drive automation, CI/CD, and infrastructure-as-code best
    practices to improve system scalability, resilience, and
    performance.
  - Establish operational excellence frameworks, including
    monitoring, incident response, root cause analysis, and
    performance optimization.
  - Build and mentor a high-performing, multidisciplinary team
    while fostering a culture of innovation, accountability,
    and shared ownership.
  
  What You Will Bring:
  
  - Proven experience leading and contributing hands-on to AI/ML
    engineering and operations in large-scale production
    environments.
  - Deep understanding of AI model lifecycle management,
    distributed systems, and integration of applications
    powered by artificial intelligence into customer-facing
    platforms.
  - Strong software engineering background with experience in
    Java or JVM-based environments, along with modern AI/ML
    frameworks and data pipelines.
  - Expertise in CI/CD pipelines, infrastructure-as-code (IaC),
    containerized environments, and cloud-native
    architectures.
  - Experience with monitoring, logging, alerting systems, and
    operational automation, including building self-healing
    and highly available systems.
  - Demonstrated leadership capability in guiding
    multidisciplinary teams and collaborating effectively
    across engineering, research, and product
    organizations.#LI-DO1
  
  Additional Details
  
