description: |
  We're Celonis, the global leader in Process Intelligence
  technology and one of the world's fastest-growing SaaS
  firms. We believe there is a massive opportunity to unlock
  productivity by placing AI, data and intelligence at the
  core of business processes - and for that, we need your
  help. Care to join us?
  
  Role Description
  
  - As an Applied AI Engineer specializing in the Energy Sector,
    you are pushing the envelope in solving business-critical
    problems for our strategic customers across utilities, oil
    & gas, and renewable energy. You will be working with our
    most strategic energy clients, understanding their unique
    objectives—from grid modernization and asset lifecycle
    management to navigating the energy transition—and
    building Celonis solutions using the world’s leading
    Process Intelligence (PI) platform in combination with the
    largest AI and ML technology partners, such as Microsoft,
    OpenAI, and Databricks.With Celonis’ Process Intelligence
    (PI) platform, we feed operational context to AI so it
    understands our customers’ complex business realities
    (bridging IT and OT systems) and enables them to
    industrialize AI, unlocking real ROI on deployments at
    scale. You will prototype these solutions, demonstrate
    their value to Energy Executives, and ensure successful
    implementation, adoption, and value realization in order
    to increase the footprint of Celonis across the global
    energy landscape.
  
  Key Responsibilities:
  
  - AI Discovery & Solutioning: Understand energy customers' AI
    strategy and sector-specific challenges (e.g., predictive
    maintenance, outage management, supply chain resilience,
    or regulatory compliance). As a Celonis product and energy
    domain expert, find the best problem-solution fit and
    translate customer requirements into innovative solutions
    that move the needle.
  - Pre- and Post-Sales Execution: Actively drive the full
    customer lifecycle. Lead technical discovery and
    capability demonstrations during the pre-sales cycle, and
    remain deeply involved post-sale to guide implementation,
    ensuring agreed value and adoption thresholds are
    successfully reached.
  - Hackathons & Prototyping: Think out of the box, have a „can-
    do“ attitude, and don’t shy away from complex operational
    problems. Leverage cutting-edge AI technologies to rapidly
    build creative prototypes in customer hackathons, solving
    critical pain points specific to power generation,
    transmission, and O&G operations.
  - Agentic Process Transformation: Support our customers in
    achieving real ROI out of AI deployments at scale,
    enabling a fundamental shift from traditional, rule-based
    automation to the use of autonomous AI agents empowered by
    our Celonis Process Intelligence Platform (e.g.,
    intelligent field service routing or autonomous
    procurement).
  - Proof Projects: End-to-end execution of business-critical
    Proof-of-Value projects. This includes architecting and
    delivering secure, scalable LLM/agent systems with RAG,
    tools, and guardrails, while seamlessly integrating with
    enterprise data, identity protocols, and stringent energy
    compliance frameworks.
  - Domain & Industry Leadership: Serve as the internal and
    external technical subject matter expert for the Energy
    vertical, scaling knowledge across the organization
    regarding utilities, upstream/downstream oil & gas, and
    renewable energy processes.
  
  Requirements:
  
  - 5+ years of experience leading technical pre-sales and post-
    sales engagements specifically within the Energy sector
    (Utilities, Oil & Gas, and/or Renewables). This includes
    defining AI roadmaps, building compelling ROI/TCO business
    cases, and guiding technical implementations through to
    value realization.
  - Deep understanding of business processes native to the
    Energy sector (such as Asset Management, Field Services,
    Supply Chain, Capital Projects, or Trading) with the
    ability to translate high-level business needs into
    specific, impactful AI use cases.
  - Expertise in generative AI techniques like RAG, few-shot
    learning, prompt engineering, multi-agent orchestration,
    multimodal understanding, or fine-tuning used to build
    high-impact use cases (e.g., automated processing of
    engineering documents, regulatory filings, or intelligent
    diagnostic chatbots).
  - Solid knowledge of Python and common ML libraries (such as
    LangChain, pandas, pydantic, sklearn, PyTorch) as well as
    data engineering tools and technologies relevant to
    handling large-scale industrial data.
  - Strong presentation skills to both internal and external
    stakeholders (including C-level executives and operational
    leaders), whether leading technical whiteboarding sessions
    or formal readouts and demos.
  - Bachelor’s Degree required; Master's Degree in computer
    science, engineering, mathematics, or related fields, or
    equivalent work experience preferred.
  
  Nice to have (big plus):
  
  - Hands-on experience building agentic systems using LLM
    orchestration, RAG, function calling, and prompt
    engineering, while ensuring safety through rigorous
    evaluations and guardrails suited for highly regulated
    industries.
  - Working knowledge of tools in the LLM ecosystem such as
    LangChain, LlamaIndex, or other OSS packages.
  - Experience in deploying and monitoring models at scale
    across major cloud platforms (AWS Bedrock, Azure AI, GCP
    Vertex) and familiarity with IT/OT convergence and
    industrial IoT data structures.
  
