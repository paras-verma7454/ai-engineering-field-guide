description: |
  There are NO limits to your career: come shape the future
  and be part of a truly unique global culture at OutSystems!
  
  We are seeking a high-impact FDE to drive this new
  engagement model. Unlike traditional professional services,
  this role requires deep embedding within the customer’s
  mission to provide ownership of their agentic future. You
  will be a strategic asset, dedicated to solving complex
  business problems using the OutSystems platform and Agentic
  capabilities. You will understand customer needs, scope
  work, prove feasibility, structure delivery, and measure
  value. Success means reaching outcomes.
  
  You’ll own the agentic transformation and the building
  process. It is expected that you:
  
  - Discover and Prioritize AI-driven business use cases. Lead
    in what to build and why, not just how. Act as if the
    customer’s mission is our own. Stay accountable to the
    outcome
  - Move with urgency, focus, and resilience, wearing many hats
    with confidence. Test, adapt, and scale fast. Evolve in
    motion, turning ambiguity into momentum.
  - Embraces complex customer environments not as obstacles, but
    as blank canvases
  
  The position requires strong consulting skills and deep
  architectural knowledge to guide the design and
  implementation of enterprise Agentic solutions and
  intelligent automation systems. Hands-on experience in
  delivering these solutions is essential.
  
  
  You’ll partner closely with every field team at OutSystems
  and across the leadership team. You’ll become a key source
  of customer insight, guiding our long-term product roadmap.
  
  
  You will act as an extension of our Product team, ensuring
  our most strategic accounts achieve rapid value.
  
  Forward Deployed Engineer: $153,000 - $186,300 Base Salary
  
  Salary Determination: Our salary range is based on industry
  standards, company performance, and market conditions. We
  offer competitive compensation packages to attract and
  retain top talent.
  
  In determining salary ranges, we consider factors such as:
  
  Market Research: Industry reports, salary surveys, and
  online salary databases
  
  Company Performance: Financial performance, revenue growth,
  and budget allocation
  
  Job Requirements: Skills, experience, and qualifications
  necessary for the role
  
  Geographic Location: Cost of living, market conditions, and
  industry standards in our region
  
  
  Key Responsibilities
  
  - Deep Customer Embedding: operate as a dedicated resource
    embedded within customer teams to identify and activate
    new opportunities, finding and solving complex business
    problems.
  - Accelerate Adoption: actively drive the adoption of
    OutSystems Agentic capabilities to prevent slowdowns and
    ensure "agentic success" at strategic accounts.
  - AI-Native Delivery: Execute "Intelligent” Solution Delivery
    by integrating AI into the core of the team's daily work
    and solution design. Prototype fast, proving technical
    feasibility and business value.
  - Client Engagement: Lead transformational discussions and the
    growth strategy by managing executive relationships.
  - Business Development: Strategically identify opportunities
    to expand use cases. Work with the Account Teams to turn
    initial "lands" into lasting success stories.
  - Product Feedback Loop: Create a direct connection with the
    Product team, conveying field experience to evolve the
    product where gaps exist between capabilities and customer
    needs.
  
  Qualifications & Requirements
  
  - Proven experience performing Forward-Deployed Engineer
    responsibilities in complex enterprise environments, with
    a track record of building trust and driving delivery with
    customers.
  - Hands-on experience designing, building, and deploying
    custom AI solutions to production.
  - Strong experience with agentic AI, LLM-based workflows, RAG,
    and enterprise integrations.
  - Experience preparing and structuring enterprise data for AI
    use cases, including unstructured and semi-structured
    data.
  - Solid understanding of AI governance, security, guardrails,
    and compliance requirements in enterprise environments.
  - Strong consultative engineering skills, with the ability to
    turn ambiguous business problems into practical solutions
    and rapid prototypes.
  - Demonstrated ability to deliver measurable business
    outcomes, not just technical implementations.
  - Ability to work onsite with strategic customers as needed.
  
  More about OutSystems
  
  OutSystems is a leading AI Development Platform built for
  the enterprise. Global organizations trust OutSystems to
  rapidly build mission-critical apps and agents, modernize
  legacy processes with agentic systems, and govern their
  entire AI portfolio across complex regulatory environments,
  all on one unified platform.
  
  As the future becomes agentic, our customers need us now
  more than ever. While AI has opened the door to
  extraordinary possibilities, most large organizations find
  themselves stuck on one side of the "enterprise gap" because
  AI by itself doesn't solve their complex use cases and
  business challenges. OutSystems bridges the "enterprise gap"
  by combining the speed of generative AI with a
  deterministic, enterprise-grade framework. We provide the
  tools for teams of any size to deliver high-quality,
  reliable AI solutions that drive real business impact.
  
  We are looking for passionate, talented, and motivated
  people to join us as we empower organizations to build,
  deploy, and scale the next generation of enterprise
  software. While we are leading the charge into the agentic
  era, our mission is broader: we are the platform enterprise
  leaders trust to evolve their entire business, accelerating
  innovation through secure, governed human-AI collaboration.
  
  OutSystems is a global company, with more than 900k
  developer community members, 1,700 employees, more than 600
  partners, and thousands of active customers in over 75
  countries and across 21 industries. Founded in 2001,
  OutSystems now has offices in the United States, United
  Kingdom, the Netherlands, Portugal, Germany, the UAE, Japan,
  Hong Kong, Malaysia, Australia, India, and Singapore, and
  includes a thriving, worldwide community of remote
  employees.
  
  Our customers are some of the world's most recognizable
  brands across diverse industries— such as Toyota, Heineken,
  Bosch, KeyBank, and UCLA—who trust OutSystems to deliver ROI
  and transformational impact.
  
  Consistently recognized as a leader by top analyst firms
  Gartner, IDC and Forrester, OutSystems continues to shape
  the future of enterprise software development in the agentic
  era. We are proud to be named a leader in more than 100
  categories on G2, including #1 in Customer Satisfaction in
  Enterprise Low Code Development, and most recently as a
  leader in AI Agent Building in the G2 Spring 2026 Reports.
  
  Working at OutSystems
  
  Our culture is built on our core values of Trust, Customer
  Success, Innovation, and Alignment. We operate as one global
  OutSystems team, taking ownership to pursue our vision of
  being the AI platform enterprise leaders trust to build,
  secure, and evolve their most critical applications and
  systems.
  
  What do we have to offer you?
  
  - A company at the vanguard of the agentic revolution, where
    we don’t just react to AI innovation—we architect it.
    Joining OutSystems means stepping onto a high-growth
    rocket ship that combines the fearless agility of a
    startup with the sophisticated, global foundation of an
    enterprise powerhouse.
  - Real growth opportunities. We don't just talk about
    development; we invest in it through structured programs
    designed to scale your expertise. Whether you are aiming
    for vertical progression, exploring lateral moves into new
    domains, or mastering specialized AI skills through our
    Professional Development Fund and Internal Mobility
    Program, we provide the resources to get you there.
  - A global collective of world-class talent, where you’ll
    collaborate with enterprise software legends and sought-
    after thought leaders. At OutSystems, our industry experts
    aren't just visionaries—they are accessible, approachable
    mentors who are deeply invested in your growth as we
    architect the agentic future together.
  
  OutSystems nurtures an inclusive culture where talented
  individuals from all backgrounds are empowered to learn,
  experiment and make an impact. . We believe that driving our
  next phase of growth requires the radical creativity that
  only comes from diverse perspectives. We are committed to
  building a team as global and diverse as the organizations
  we serve, ensuring every individual can perform to their
  full potential. As an equal opportunity employer, all
  qualified applicants receive equal consideration regardless
  of race, origin, religion, sex, sexual orientation, gender
  identity, disability, veteran status, or any other protected
  status.
