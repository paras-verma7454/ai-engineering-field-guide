description: |
  Job Title: Full Stack AI Engineer
  
  Location: Pune / Mohali / Hyderabad
  
  Job Summary:
  
  Client’s team is responsible for the platforms, processes,
  and practices that power AI across the organization. This
  role goes beyond traditional delivery-your decisions
  influence how data is transformed into intelligent, scalable
  solutions used by teams company‑wide. We require AI fluency
  because this role sits at the intersection of data,
  technology, and business outcomes. That means understanding
  how AI systems are designed and operationalized, using
  AI‑enabled tools in day‑to‑day work, and partnering
  effectively with engineering, analytics, and business teams
  to ensure AI solutions are reliable, responsible, and
  impactful.
  
  Job Description:
  
  About the Role
  
  We're seeking a Full Stack AI Engineer who can design,
  build, and ship AI-powered products end-to-end - from data
  layer to user interface. This role is for a builder who
  thrives at the intersection of modern app engineering and
  applied AI, and who wants to create products that directly
  improve how real estate assets are managed, leased, and
  optimized across a multi-billion dollar global portfolio.
  
  You will work across the stack - building performant
  frontend experiences, robust backend services, and
  integrating AI/ML capabilities including LLMs, predictive
  models, and intelligent automation. You'll ship features
  that are used by property managers, owners, investors, and
  residents. Our team includes engineers, designers, and
  product leaders with experience from Google, Microsoft,
  Airbnb, Strava, Amazon, and more.
  
  What You’ll Do
  
  Build AI-Powered Products End-to-End
  
  - Design and implement full stack features across our digital
    products including GPS (our asset management platform) and
    internal AI tools.
  - Build and integrate AI/ML capabilities into production
    applications - including LLM-powered workflows, MCP tool
    integrations, retrieval-augmented generation (RAG), and
    predictive analytics.
  - Own features from concept through deployment: frontend UI,
    API design, backend services, data pipelines, and AI model
    integration.
  - Rapidly prototype and iterate on AI-driven features, moving
    from proof of concept to production with speed and
    quality.
  
  Engineer for Scale and Performance
  
  - Build responsive, accessible frontend interfaces using
    modern frameworks (React/Next.js or similar).
  - Design and implement scalable backend services and APIs
    (Python, Node.js, or similar) that serve both human users
    and AI agents.
  - Work with cloud infrastructure (Azure preferred) including
    serverless functions, container orchestration, and managed
    AI/ML services.
  - Ensure production systems are reliable, observable, and
    secure - with appropriate monitoring, logging, and error
    handling.
  
  Collaborate and Ship
  
  - Partner with Product Management, Design, Business owners,
    and Data Engineering to define and deliver high-impact
    features.
  - Participate in architectural decisions that affect the
    broader platform, advocating for simplicity,
    maintainability, and AI-readiness.
  - Collaborate with other engineers on AI integration patterns,
    prompt engineering, and modern development practices. We
    are an AI forward team and it’s moving fast so we test,
    iterate, share and repeat.
  
  What You Bring
  
  Engineering Excellence
  
  - 5+ years of professional software engineering experience
    shipping production applications.
  - Strong proficiency in both frontend (React, TypeScript,
    modern CSS) and backend (Python, Node.js, or Go)
    development.
  - Deep experience with AI coding tools like Cursor, Codex,
    Claude Code, etc.
  - Experience designing and building RESTful APIs,
    microservices, and event-driven architectures.
  - Solid understanding of relational and non-relational
    databases, caching strategies, and data modeling.
  - Experience with CI/CD pipelines, infrastructure as code, and
    cloud platforms (Azure preferred, AWS/GCP acceptable).
  
  AI/ML Integration
  
  - Hands-on experience integrating LLMs (OpenAI, Anthropic, or
    similar) into production applications - including prompt
    engineering, function calling, and agent workflows.
  - Familiarity with RAG architectures, vector databases,
    embedding models, and MCP (Model Context Protocol) or
    similar tool-use patterns.
  - Understanding of when to build vs. buy AI capabilities and
    how to evaluate AI vendor tools critically.
  - Personal projects or portfolio demonstrating AI-powered
    applications you’ve built - we want to see what you’ve
    shipped.
  
  Domain Knowledge (Preferred)
  
  - Experience in real estate, property management, or asset
    management is a strong plus.
  - Familiarity with marketplace or multi-sided platform
    products.
  - Experience working in data-intensive environments where data
    quality and governance matter.
  
  Mindset & Communication
  
  - AI-first mindset - you naturally look for opportunities to
    automate, augment, and accelerate with AI in your daily
    work and product development. We’ll want to see something
    you built on the side as a passion project.
  - Strong written and verbal communication skills; able to
    explain technical trade-offs to non-technical
    stakeholders.
  - Comfort with ambiguity and a bias toward shipping
    iteratively over waiting for perfection.
  - Collaborative approach; you work well across product,
    design, data, and business teams.
  
  Tools & Technologies:
  
  - Proficient with modern development tools: Git, Linear (or
    similar), VS Code/Cursor.
  - Experience with Databricks, Snowflake, or similar data
    platforms is a plus.
  - Knowledge of cloud platforms (Azure preferred),
    containerization (Docker/Kubernetes), and modern DevOps
    practices.
  - Familiarity with design systems and component libraries;
    able to collaborate effectively with designers.
  
  Company Description: Bits in Glass - India
  
  Bits in Glass is a leading software consulting firm
  specializing in innovative data solutions and enterprise
  applications.
  
  - Industry Leader:
    - Bits in Glass(BIG) has been in business for more than 20
      years. In 2021 Bits in Glass joined hands with Crochet
      Technologies, forming a larger organization under the
      Bits In Glass brand to better serve customers across the
      globe.
    - Offices across three locations in India: Pune, Hyderabad &
      Chandigarh.
    - Specialized Pega partner since 2017, delivering Pega
      solutions with deep industry expertise and experience.
    - Proudly ranked among the top 30 Pega partners, Bits In Glass
      has been one of the very few sponsors of the annual
      PegaWorld event.
    - Elite Appian partner since 2008, delivering Appian solutions
      with deep industry expertise and experience.
    - Operating in the United States, Canada, United Kingdom, and
      India.
    - Dedicated global Pega CoE to support our customers and
      internal dev teams.
    - Specializes in Databricks, AI, and cloud-based data
      engineering to help companies transition from manual to
      automated workflows.
  - Company Culture:
    - Collaborative Environment: Emphasizes teamwork, innovation,
      and knowledge sharing.
    - Inclusive Workplace: Values diversity and fosters an
      inclusive environment where all ideas are respected.
    - Continuous Learning: Encourages professional development
      through ongoing learning opportunities and
      certifications.
  - Core Values:
    - Integrity: Commitment to ethical practices and transparency
      in all business dealings.
    - Excellence: Strive for the highest standards in everything
      we do.
    - Client-Centric Approach: Focus on delivering the best
      solutions tailored to client needs.
