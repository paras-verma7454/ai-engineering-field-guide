description: |
  Innovation starts from the heart. At Edwards Lifesciences,
  we’re dedicated to developing ground-breaking technologies
  with a genuine impact on patients’ lives. At the core of
  this commitment is our investment in cutting-edge
  information technology. This supports our innovation and
  collaboration on a global scale, enabling our diverse teams
  to optimize both efficiency and success. As part of our IT
  team, your expertise and commitment will help facilitate our
  patient-focused mission by developing and enhancing
  technological solutions.
  
  This role is responsible to lead the design and development
  of key strategic AI and GenAI initiatives by partnering with
  peers and outside vendors.
  
  How will you make an impact:
  
  - Lead the design, development, and deployment of AI solutions
    at scale to solve complex business problems in partnership
    with business SME's, product managers, data scientists,
    and other engineering teams.  Accountable for successful
    completion within scope of project deliverables .
  - Determine operational feasibility by evaluating analysis,
    problem definition, requirements, solution development,
    and proposed solutions .
  - Build and maintain robust data pipelines for training,
    testing, and evaluating various Large Language Model's
    (LLM) and/or traditional machine learning models and
    engineer solutions based on various AI/ML frameworks and
    libraries.
  - Stay current with the latest GenAI and/or traditional AI/ML
    research and trends, and incorporate them into our product
    offerings.
  - Improve and optimize the performance of models, ensuring
    robustness, scalability, and efficiency.
  - Provide technical leadership and mentorship to junior
    engineers and data scientists.
  - Ensure code and model development are well-documented and
    follow EW engineering practices.
  - Other incidental duties.
  
  What you'll need (Required):
  
  - Bachelor's Degree in Engineering or technical field.
  - 6years experience in Software Development or Engineering
    demonstrably solid performance in a role working with
    cross-functional teams (within IT and/or within the
    business) on enterprise-level or complex/novel system
    implementations Required
  - Proficiency in programming languages such as Python, Java,
    C++, or similar.
  - Experience with deploying AI/ML models to production
    systems.
  - Experience with AWS or Cloud Infrastructure Services.
  - Experience in a leadership or senior technical role, driving
    AI/ML strategy.
  - Excellent coding skills especially Python.
  - Solid experience with version control systems (Git) and
    agile development methodologies.
  - Experience with ML frameworks and libraries like TensorFlow,
    PyTorch, Keras, Scikit-Learn or similar frameworks.
  - Solid experience with deep learning techniques (e.g., CNNs,
    RNNs, GANs, etc.).
  
  What else we look for (Preferred):
  
  - Extensive troubleshooting/debugging skills.
  - Excellent analytical, detail-oriented, organized and
    information seeking skills.
  - Experience and training in the specific technologies that
    will be used for development required.
  - Excellent organization and time management skills.
  - Excellent written and verbal communication skills and
    interpersonal relationship skills including negotiating
    and relationship management skills with ability to drive
    achievement of objectives.
  - Ability to manage multiple tasks and work towards long-term
    goals.
  - Strict attention to detail.
  - Ability to interact professionally with all organizational
    levels.
  - Ability to manage competing priorities in a fast paced
    environment.
  - Adhere to all company rules and requirements (e.g., pandemic
    protocols, Environmental Health & Safety rules) and take
    adequate control measures in preventing injuries to
    themselves and others as well as to the protection of
    environment and prevention of pollution under their span
    of influence/control.
