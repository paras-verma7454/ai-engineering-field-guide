description: |
  Senior Software Engineer (AI / ML, Python) (Perm, UK,
  Hybrid)
  
  This is a full-time, permanent opportunity for candidates
  based in the UK. There will be a need to travel to the
  office in London periodically.
  
  About Nearform
  
  Nearform is an independent team of data & AI experts,
  engineers, and designers who build intelligent digital
  solutions and capability at pace. We create AI-enabled
  solutions that enhance digital experiences, empower
  developers, and deliver measurable results. In these ways,
  we partner with ambitious enterprises to deliver enduring
  impact.
  
  Our deep expertise in solving the world’s most complex
  digital problems, along with our collaborative, people-first
  approach, enables enterprises to build breakthrough products
  and modernise legacy systems by unleashing the power of AI.
  
  Today, our team of 500 experts in 20+ countries is trusted
  by leading enterprises including Lululemon, Puma, Sun Life,
  Starbucks, Travelex, Virgin Media 02, and Walmart.
  
  As part of our Engineering function, you will work closely
  with clients to translate complex business requirements into
  innovative digital products.  Whether you are a Senior
  Engineer, Tech Lead, or DevOps Engineer, you will
  collaborate with distributed teams, leveraging cutting-edge
  technologies to build secure, high-performance applications.
  Our Nearform engineers are known for building high quality,
  scalable solutions that solve real world problems.
  
  About the AI Senior Python Engineer role
  
  As a Senior Engineer at Nearform your main task will be
  designing & building applications using Python and AI tools.
  However as you’ll likely work on a variety of projects your
  responsibilities may also include:
  
  - Supporting component design, development and maintenance and
    taking responsibility for personal technical quality
    standards within the project team.
  - Assisting with defining structured practices, especially in
    source code management, building and deployment.
  - Designing and implementing data storage solutions.
  - Optimising performance in applications for maximum speed and
    scalability.
  - Getting feedback from users and clients, and building
    solutions for them.
  - Assisting with the analysis of client requirements.
  - Working with and supporting Technical Leaders in project
    execution and timely delivery.
  - Collaborating with client teams.
  
  What we are looking for in this person:
  
  - Significant experience delivering at a Senior Engineer
    level.
  - Deep knowledge and experience with the Python language and
    modern AI frameworks.
  - Experience with building AI agents
  - Practical experience of delivering in an agile environment.
  - Practical experience and knowledge of developing real-world
    solutions.
  - Deep understanding of versioning control tools - e.g. Git.
  - Testing experience and familiarity with testing tools at all
    levels, unit, integration and end-to-end testing.
  - Practical and real-world experience working with databases
    and cloud environments.
  - Experience with automation, CI and CD.
  - Experience building software collaboratively using pull
    requests and code reviews
  - Excellent communication and collaboration skills.
  - Professional proficiency in English.
  
  Benefits & Perks:
  
  - Annual Company Bonus - We all help Nearform to hit company
    goals so we all receive a share of the profits on an
    annual basis in line with company performance.
  - Paid Time Off Package - We offer an annual leave of 25 days
    plus public holidays. We also offer sick leave, marriage
    leave and many more.
  - Remote Working Allowance - Every 2 years, you will have a
    budget of up to €1250 (equivalent in GBP) to help you set
    up a comfortable and productive workspace in addition to
    your essential equipment provided by Nearform when you
    join.
  - Training and Development Allowance - We understand the
    importance of continuously learning so we offer an
    allowance of up to €1000 (equivalent in GBP) you can use
    to upskill yourself.
  - Healthcare - It’s important to always take care of your
    health, so we offer additional private healthcare here at
    Nearform. If you wish to learn more about the plan offered
    feel free to reach out to our team.
  - Pension & Insurances - We offer a pension match of up to 5%
    and Income Protection and Death in Service for peace of
    mind.
  
  Our Interview Process
  
    - Talent Call (30 mins via Zoom)An introductory conversation
      with a member of our Talent Team to learn more about
      your background, experience, and career goals. We'll
      also provide a high-level overview of Nearform and
      answer any questions you may have. This step helps us
      assess initial alignment.
    - Technical Assessment (1 hour via Zoom)A live coding
      challenge with one of our trained interviewers. You'll
      be asked to build a working solution to a problem via
      screen sharing, demonstrating your Python expertise,
      problem-solving ability, and coding best practices in a
      real-time environment.
    - Hiring Manager Interview (45 mins via Zoom)A conversation
      with a Hiring Manager focused on your approach to
      teamwork, client collaboration, and problem-solving in
      an enterprise development setting. We'll also share more
      details about Nearform and the potential projects you
      may join.
  
  There may also be an additional interview with the client
  depending on the project
  
  Ready to Join Us?
  
  If you're passionate about building high-quality
  applications, solving complex challenges, and driving
  innovation in enterprise development, we’d love to hear from
  you.
  
  Apply now via our careers page at Nearform and be part of a
  team that values technical excellence, collaboration, and
  continuous learning.
  
  Nearform is committed to shaping a better world in all that
  we do. Our global team is built based on respect,
  inclusivity, diversity and excellence.
  
  If you require any adjustments to the interview process as
  part of your application, please let someone from our Talent
  Team know so they can help.
