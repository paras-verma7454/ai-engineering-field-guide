description: |
  About this role: Wells Fargo is seeking a Senior Software
  Engineer In this role, you will:
  
  - Lead moderately complex initiatives and deliverables within
    technical domain environments
  - Contribute to large scale planning of strategies
  - Design, code, test, debug, and document for projects and
    programs associated with technology domain, including
    upgrades and deployments
  - Review moderately complex technical challenges that require
    an in-depth evaluation of technologies and procedures
  - Resolve moderately complex issues and lead a team to meet
    existing client needs or potential new clients needs while
    leveraging solid understanding of the function, policies,
    procedures, or compliance requirements
  - Collaborate and consult with peers, colleagues, and mid-
    level managers to resolve technical challenges and achieve
    goals
  - Lead projects and act as an escalation point, provide
    guidance and direction to less experienced staff
  
  Required Qualifications:
  
  - 4+ years of Software Engineering experience, or equivalent
    demonstrated through one or a combination of the
    following: work experience, training, military experience,
    education
  
  Desired Qualifications:
  
  - 7+ years of experience in Microsoft .NET Framework and .NET
    Core / .NET 6+, including the design and development of
    scalable, high-performance enterprise applications.
  - Expertise in C#, .NET Core Web APIs, and RESTful services
    following industry best practices.
  - Solid understanding of object-oriented programming (OOP),
    SOLID principles, and common enterprise design patterns.
  - Experience in microservices-based architectures, service
    orchestration, and API lifecycle management.
  - Proficient in Entity Framework / EF Core, LINQ, and database
    interaction layers.
  - Strong working knowledge of SQL Server and relational
    database design, performance tuning, and query
    optimization.
  
  Front-End & UI (Core Skills)
  
  - Hands-on experience with Angular (Angular 8+) for building
    rich, responsive, and modular single-page applications.
  - Strong understanding of TypeScript, HTML5, CSS3, and modern
    UI component frameworks.
  - Experience in integrating Angular front ends with .NET Core
    APIs and securing applications using industry-standard
    authentication and authorization mechanisms.
  - Familiarity with UI/UX best practices and performance
    optimization techniques.
  
  Python (Plus Skills)
  
  - Working knowledge of Python for:
  - Automation and scripting
    - Data processing and transformation
    - Backend support services and integrations
  - Ability to leverage Python alongside .NET ecosystems for
    auxiliary services, analytics support, or AI/ML-backed
    workflows.
  
  Cloud, DevOps & Tooling
  
  - Experience working in cloud-hosted environments (OCP
    preferred), including scalable application deployment and
    configuration.
  - Familiarity with CI/CD pipelines, automated builds, and
    deployment workflows with EPL-X , Harness and other tools.
  - Comfortable working with containerization (e.g., Docker) and
    environment-based configuration management.
  - Strong experience with Git-based source control and
    collaborative development workflows.
  
  AI, Productivity & Co-Pilot Usage (Mandatory)
  
  - Practical experience using Microsoft Copilot and other AI-
    assisted development tools to:
    - Accelerate code development and refactoring
    - Improve code quality and consistency
    - Generate unit tests and documentation
    - Assist with debugging and root cause analysis
    - Practical usage of MCP tools to generate workflows
  - Demonstrated ability to responsibly leverage AI tools while
    adhering to enterprise security, compliance, and coding
    standards.
  - Openness to adopting emerging AI/ML capabilities to enhance
    delivery efficiency and development productivity.
  
  Job Expectations:
  
  - Quality, Testing & Security
  - Experience with unit testing, integration testing, and API
    validation.
  - Knowledge of secure coding practices, application security
    fundamentals, and performance testing.
  - Exposure to logging, monitoring, and diagnostics in
    production environments.
  - Strong experience working in Agile/Scrum delivery models
    with cross-functional teams.
  - Excellent problem-solving, analytical, and communication
    skills.
  - Ability to independently own modules while collaborating
    effectively within distributed teams.
  - Proven capability to deliver within agile teams, meeting
    defined milestones, SLAs, and quality expectations.
