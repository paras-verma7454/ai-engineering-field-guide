  AI Automation Engineer
  
  Role Overview
  
  As part of the Enterprise Automation function, we are
  building the next generation of scalable business automation
  — combining RPA and Agentic AI.
  
  We are seeking a AI Automation Engineer to architect and
  implement production-grade AI automation infrastructure on
  Azure. This role is not about training or fine-tuning
  models. It is about orchestrating, deploying, governing, and
  operationalizing LLM-powered systems that integrate
  seamlessly with enterprise workflows.
  
  You will define how Agentic AI capabilities are built,
  evaluated, secured, and scaled across the organization.
  
  What You Will Do
  
  🏗 Architect & Build AI Automation Solutions
  
  - Design and implement AI-driven automation workflows
    leveraging large language models available through Azure
    AI Foundry and Azure ML model catalog
  - Build agent-based systems using modern orchestration
    frameworks (e.g., LangChain, LangGraph, Semantic Kernel,
    AutoGen, or similar)
  - Implement tool-using agents, RAG pipelines, and structured
    function-calling patterns
  - Design robust integration layers for enterprise systems
    (APIs, databases, workflow platforms)
  - Establish reusable architectural patterns for AI-powered
    automation
  
  🚀 Productionize LLM Systems
  
  - Deploy and manage production LLM-powered applications on
    Azure
  - Implement CI/CD practices for AI services
  - Containerize services using Docker (Kubernetes preferred but
    not required)
  - Ensure appropriate logging, monitoring, and operational
    reliability
  
  📊 Evaluation & Reliability
  
  - Implement practical evaluation and testing approaches to
    ensure quality and consistency of AI outputs
  - Monitor performance and iterate based on real-world usage
  
  🤝 Cross-Functional Collaboration
  
  - Partner with RPA engineers to embed intelligent decision
    layers into automation processes
  - Collaborate with AI/Data Science teams to integrate existing
    models
  - Work with IT and Security teams to align with enterprise
    standards
  
  Required Qualifications
  
  - 8+ years of experience in software engineering, ML
    engineering, or MLOps roles
  - Proven experience deploying LLM-powered applications into
    production environments
  - Strong Python backend engineering experience (building and
    deploying API-based services)
  - Hands-on experience integrating large language models via
    APIs or hosted endpoints
  - Practical experience using agent orchestration frameworks
    (e.g., LangChain, LangGraph, Semantic Kernel, AutoGen, or
    similar)
  - Experience designing and integrating RESTful APIs and
    enterprise system connectors
  - Familiarity with CI/CD workflows and version control best
    practices
  - Experience deploying containerized applications using Docker
  - Experience working within Azure-based environments
  
