  Location: Remote, UK/Europe
  
  Why this role is remarkable:
  
  - Direct ownership over the AI coding stack for a global
    platform with triple-digit year-on-year growth and $100M+
    ARR.
  - Shape the future of engineering workflows by implementing
    cutting-edge tools like Cursor, Claude Code, and
    autonomous agent skills.
  - Significant impact on a Series A startup backed by top-tier
    investors, where AI is the core competitive advantage for
    internal velocity.
  
  What you will do:
  
  - Standardize and roll out Fanvue’s AI-assisted development
    stack across IDEs, PR workflows, and CI/CD pipelines.
  - Build and operate MCP servers and AI-ready infrastructure to
    enable reliable, context-aware code generation and
    parallelized workflows.
  - Establish best practices and playbooks for AI-assisted
    coding to improve measurable metrics like PR cycle time
    and code quality.
  
  The ideal candidate:
  
  - Deep hands-on experience with modern AI coding tools such as
    Cursor, Claude Code, Aider, or GitHub Copilot.
  - Strong software engineering background with production
    TypeScript and experience managing RAG pipelines or LLM
    embeddings.
  - Proven ability to build and deploy agentic workflows and MCP
    servers using tools like Puppeteer or Context 7.
  
