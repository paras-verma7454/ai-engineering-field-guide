description: |
  Summary
  
  Job Description Summary Join Guidewire as an Employee
  Experience Integration Engineer Intern and help shape the
  future of insurance technology. In this hybrid, full-time
  role based in Bangalore, you will be part of Guidewire’s
  Business Technology (BizTech) team group focused on driving
  growth and transformation through technological innovation
  and operational excellence, and enhancing employee
  experience. This internship offers hands-on exposure to
  enterprise integrations in Workday, AI-powered automation,
  and data-driven solutions while learning from experienced
  engineers in a collaborative and agile environment. At
  Guidewire, we foster a culture of curiosity, innovation, and
  responsible use of AI—empowering our teams to continuously
  leverage emerging technologies and data-driven insights to
  enhance productivity and outcomes
  
  Job Description
  
  Job Description What you’ll do ● Learn, design, develop, and
  maintain Workday integrations using RAAS, SOAP, REST APIs,
  Java, XML, and JSON. ● Build custom reports, configure data,
  manage EIB Loads, ISUs, and OAuth2.0 settings in Workday. ●
  Monitor day-to-day integrations, troubleshoot failures, and
  recommend improvements to reduce redundancies. ● Build and
  maintain reports and dashboards in Workday for Payroll,
  Finance, Legal, People Business Partners, and other teams. ●
  Collaborate with BizTech and People Systems to design,
  develop, and implement AI features and automations in
  Workday. ● Support the expansion of GenAI engineering
  excellence and tooling, contributing to Guidewire’s agentic
  platform and citizen developer initiatives. ● Participate in
  agile product management practices, including sprint
  planning, documentation, and outcome measurement. ● Serve as
  the first point of contact for Workday tickets in
  ServiceNow, providing solutions and process enhancements. ●
  Support and administer HR technology integrations, ensuring
  alignment with Guidewire’s principles of speed, agility, and
  balanced risk and controls. ● Maintain a strong focus on
  security, automation, and continuous improvement in all
  integration and AI projects. ● Draft and pursue career
  development goals in Workday as part of your professional
  growth. ● At Guidewire, we foster a culture of curiosity,
  innovation, and responsible use of AI—empowering our teams
  to continuously leverage emerging technologies and data-
  driven insights to enhance productivity and outcomes. What
  you’ll bring Required ● Demonstrated ability to embrace AI
  and apply it to your current role as well as data-driven
  insights to drive innovation, productivity, and continuous
  improvement. ● Currently pursuing or completed a BE/BTech in
  Computer Science, Information Technology, Electronics &
  Communication Engineering, or a related field. ● Basic
  understanding of APIs and integration concepts, especially
  within Workday. ● Good knowledge of AI automation tools. ●
  Knowledge of HCM (Human Capital Management) systems and
  cloud computing databases. ● Proficiency in Java, JSON, and
  XML data formats.
  
  ● Strong analytical thinking and problem-solving skills. ●
  Excellent communication skills and eagerness to learn in a
  collaborative team environment. Preferred ● Experience in
  internships focused on integration and/or Artificial
  Intelligence. ● Knowledge of ERP systems and integration
  areas. ● Python programming skills.
  
  Your Impact We believe in clarity and setting you up for
  success. In your first six months, you’ll gain hands-on
  experience with Workday integrations, contribute to the
  design and implementation of AI-powered features in Workday,
  automate manual processes, and support the delivery of
  innovative solutions that improve employee experience and
  operational efficiency. Your work will directly support
  Guidewire’s growth and transformation goals, driving GenAI
  enablement, all while helping to build a more agile, data-
  driven, and employee-focused organization. As you grow, your
  contributions will influence how we deliver value to our
  teams and the broader company mission.
  
  What Makes You a Great Fit You’ll thrive at Guidewire if you
  embody our core values: ● Collegiality: We work together as
  equals, value diverse opinions, and support one another. ●
  Integrity: We act with honesty and transparency in
  everything we do. ● Rationality: We favor thoughtful, data-
  driven decisions over assumptions
  
  About Guidewire
  
  Guidewire is the platform P&C insurers trust to engage,
  innovate, and grow efficiently. We combine digital, core,
  analytics, and AI to deliver our platform as a cloud
  service. More than 540+ insurers in 40 countries, from new
  ventures to the largest and most complex in the world, run
  on Guidewire.
  
  As a partner to our customers, we continually evolve to
  enable their success. We are proud of our unparalleled
  implementation track record with 1600+ successful projects,
  supported by the largest R&D team and partner ecosystem in
  the industry. Our Marketplace provides hundreds of
  applications that accelerate integration, localization, and
  innovation.
  
  For more information, please visit www.guidewire.com and
  follow us on Twitter: @Guidewire_PandC.
  
  Guidewire Software, Inc. is proud to be an equal opportunity
  and affirmative action employer. We are committed to an
  inclusive workplace, and believe that a diversity of
  perspectives, abilities, and cultures is a key to our
  success. Qualified applicants will receive consideration
  without regard to race, color, ancestry, religion, sex,
  national origin, citizenship, marital status, age, sexual
  orientation, gender identity, gender expression, veteran
  status, or disability. All offers are contingent upon
  passing a criminal history and other background checks where
  it's applicable to the position.
