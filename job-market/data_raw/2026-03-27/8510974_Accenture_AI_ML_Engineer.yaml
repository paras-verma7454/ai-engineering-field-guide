description: |
  Project Role : AI / ML Engineer Project Role Description :
  Develops applications and systems that utilize AI tools,
  Cloud AI services, with proper cloud or on-prem application
  pipeline with production ready quality. Be able to apply
  GenAI models as part of the solution. Could also include but
  not limited to deep learning, neural networks, chatbots,
  image processing. Must have skills : Data Science Good to
  have skills : NA Minimum 12 year(s) of experience is
  required Educational Qualification : 15 years full time
  education Summary: As an AI / ML Engineer, a typical day
  involves designing and building advanced applications and
  systems that leverage artificial intelligence technologies
  and cloud-based services. The role requires integrating
  various AI models, including generative AI, into scalable
  and production-ready pipelines, whether deployed on cloud
  platforms or on-premises environments. Daily activities may
  include collaborating with cross-functional teams to ensure
  seamless implementation of AI-driven solutions, optimizing
  system performance, and exploring innovative approaches such
  as deep learning, neural networks, and image processing to
  address complex challenges. The position demands a proactive
  approach to developing intelligent systems that enhance
  business capabilities and user experiences.
  
  Roles & Responsibilities:
  - Expected to be an SME, collaborate and manage the team to
    perform.
  - Responsible for team decisions.
  - Engage with multiple teams and contribute on key decisions.
  - Expected to provide solutions to problems that apply across
    multiple teams.
  - Lead the design and implementation of AI solutions ensuring
    alignment with organizational goals.
  - Mentor junior team members to foster skill development and
    knowledge sharing.
  - Coordinate with stakeholders to gather requirements and
    translate them into technical specifications.
  
  Professional & Technical Skills:
  - Must To Have Skills: Proficiency in Data Science.
  - Experience in developing and deploying AI models using cloud
    AI services and on-premises infrastructure.
  - Strong knowledge of generative AI models and their practical
    applications.
  - Familiarity with deep learning frameworks and neural network
    architectures.
  - Ability to design and maintain production-quality AI
    pipelines.
  - Competence in image processing techniques and chatbot
    development.
  
  Additional Information:
  - The candidate should have minimum 12 years of experience in
    Data Science.
  - This position is based at our Bengaluru office.
  - A 15 years full time education is required.
  
  
  15 years full time education
  
