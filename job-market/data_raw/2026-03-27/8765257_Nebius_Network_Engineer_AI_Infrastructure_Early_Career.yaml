  Your responsibilities will include
  
  - Primary Focus: learning network operations while supporting
    the team with routine and low-risk tasks across data
    center and backbone networks under close supervision.
  - Operational Support (Supervised):
    - Assist in day-to-day network operations for data center and
      backbone environments.
    - Perform simple, well-defined tasks from the backlog under
      guidance: configuration updates, checks, and data
      collection.
    - Help with hardware installation tasks (rack, cable, label)
      under supervision.
  - Network Stability & Safe Execution:
    - Deploy pre-approved and tested configurations following
      clear instructions.
    - Strictly follow change management and operational
      procedures.
    - Escalate any unclear behavior or unexpected results
      immediately.
  - Learning & Growth:
    - Actively study networking fundamentals: Ethernet, IP,
      routing, DC and backbone basics.
    - Learn internal tools, workflows, and operational standards.
    - Gradually expand task scope as skills and reliability
      improve.
  
