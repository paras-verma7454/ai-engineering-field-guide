  Senior Full-Stack Product Engineer
  
  Salary: £70K - £110K + 0.30% - 0.50% Equity
  
  Company Description: Arva AI – YC-backed startup building AI
  Agents to scale AML, KYB, and KYC operations
  
  Job Description: As a Senior Full-Stack Product Engineer,
  you will build and iterate on features for an AI-powered
  anti-financial crime platform. You will develop document
  fraud detection, web due diligence tools, and automation
  systems for model fine-tuning. This role bridges front-end,
  back-end, and MLops to help financial institutions cut
  operational costs by 80%.
  
  Location: London, UK
  
  Why this role is remarkable:
  
  - Join a fast-growing Y Combinator S24 startup at an early
    stage with significant ownership over the company's core
    AI strategy.
  - Work on cutting-edge agentic workflows that automate complex
    human review tasks, directly impacting the global fight
    against financial crime.
  - Enjoy high-impact perks including bi-annual salary reviews,
    yearly performance equity refreshes, and the ability to
    work remotely for four weeks every year.
  
  What you will do:
  
  - Build scalable back-end systems and intuitive front-end
    interfaces that explain complex AI-driven decisions to
    compliance officers without overloading them.
  - Develop and optimize automated systems for prompt
    engineering, model fine-tuning (LLMs and vision models),
    and custom AI model training.
  - Iterate rapidly on AI agents to enhance performance,
    reliability, and explainability while maintaining best-in-
    class CI/CD and DevOps practices.
  
  The ideal candidate:
  
  - Has 4+ years of professional full-stack experience with a
    strong proficiency in TypeScript, React, and Node.js.
  - Possesses hands-on experience in AI/ML, specifically with
    computer vision, prompt optimization, and adapting pre-
    trained models for specific use cases.
  - Exhibits a proactive problem-solving mindset and a
    relentless focus on delivering user-centric value in a
    fast-paced startup environment.
  
