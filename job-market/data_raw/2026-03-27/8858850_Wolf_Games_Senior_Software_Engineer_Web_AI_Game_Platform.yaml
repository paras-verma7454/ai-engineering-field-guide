description: |
  About Wolf Games
  
  Wolf Games is building the platform for generative
  entertainment universes — living, ever-expanding worlds
  where creators, players, and AI collaborate in real time.
  Our first universe, Public Eye, turns everyone into a
  detective. Across a suite of crime-solving games, players
  collect evidence, crack cases, and rise through the ranks of
  a connected detective program. We're creating a future where
  game development and player experience are tightly connected
  through intelligent systems that learn, adapt, and surprise.
  
  About the role
  
  We're looking for a Senior Software Engineer to be a
  technical leader and force multiplier across our engineering
  team. This is a role for someone who can take promising
  prototypes into production, architect the shared systems
  that power our growing game portfolio, and elevate the
  engineers around them through mentorship and technical
  leadership.
  
  You will own both the technical vision and execution for our
  production game systems. You'll make architectural decisions
  that shape how we build games for years to come, while
  staying hands-on with the code that ships to players. You'll
  define the patterns, processes, and standards that let our
  team move fast and build well — from how we structure our
  codebase to how we break down and prioritize work.
  
  This is a role with real influence. You'll shape our
  technology choices, guide our engineering culture, and help
  build the team itself. You'll balance the immediate demands
  of shipping games with the longer-term investment in systems
  and people that compound over time.
  
  You will report to the Director of Engineering and work
  closely with engineering, design, and creative leadership
  to:
  
  - Lead the technical evolution of our game platform, making
    architectural decisions that balance immediate delivery
    with long-term scalability and maintainability.
  - Take validated prototypes from concept stage to production,
    defining the technical approach and guiding implementation
    across the team.
  - Design and build shared game infrastructure — progression
    systems, content pipelines, analytics integration,
    platform APIs — that accelerates development across all
    titles.
  - Own and refine our engineering processes, including ticket
    structure, sprint planning, and technical documentation
    standards that keep the team aligned and efficient.
  - Mentor and develop other engineers through code review,
    pairing, architectural guidance, and career development
    conversations.
  - Evaluate and champion new technologies, frameworks, and AI-
    assisted development practices that improve our velocity
    and output quality.
  - Collaborate with product and creative leadership to
    translate high-level goals into well-scoped technical
    plans, breaking ambiguous problems into clear, actionable
    work.
  - Drive technical decision-making through clear communication,
    documentation, and consensus-building across the
    organization.
  - Contribute to hiring and team growth, helping identify,
    evaluate, and onboard engineering talent as we scale.
  
  What you'll bring
  
  - 6+ years of experience in software engineering, with a
    meaningful portion spent building and shipping web-based
    games or interactive experiences.
  - Strong proficiency in TypeScript/JavaScript(Node.js) and
    hands-on experience with modern web game frameworks
    (Pixi.js, Phaser, Three.js).
  - Strong backend fundamentals, including API design, database
    modeling, and scalable distributed systems.
  - Experience building and operating reliable services with
    attention to performance, security, and maintainability.
  - A track record of technical leadership — you've influenced
    architecture, mentored engineers, and driven process
    improvements on a team.
  - Experience designing systems that scale across multiple
    products, with mature judgment about abstraction,
    technical debt, and when to invest in infrastructure.
  - Fluency with AI-assisted development workflows and genuine
    excitement about how these tools are transforming software
    development.
  - Strong project management instincts — you can break down
    large initiatives into well-structured tickets, anticipate
    risks, and keep work on track.
  - Experience integrating with platform APIs, analytics
    services, ad networks, or other third-party systems in
    production environments.
  - Excellent communication skills, with the ability to
    articulate technical concepts to non-technical
    stakeholders and build alignment across teams.
  - An ownership mindset paired with collaborative instincts —
    you take responsibility for outcomes while bringing others
    along.
  - Comfort operating in ambiguity, making pragmatic tradeoffs,
    and adapting as priorities shift in a fast-moving startup
    environment.
  
  Nice to have
  
  - Background in real-time multiplayer, live ops, or games-as-
    a-service models.
  - Familiarity with cloud infrastructure (GCP, AWS), CI/CD
    pipelines, and DevOps practices.
  - Experience building internal tools, content pipelines, or
    developer experience improvements.
  - Prior work at an early-stage startup or small game studio
    where you wore many hats.
  
  Why Wolf Games
  
  We are a small, creative, and collaborative team that values
  curiosity, craftsmanship, and experimentation. We believe
  small wins lead to big wins — and that senior engineers who
  combine technical excellence with leadership and mentorship
  are the foundation of great teams. If you're ready to shape
  both the technology and the culture of a new kind of game
  studio, we'd love to hear from you.
