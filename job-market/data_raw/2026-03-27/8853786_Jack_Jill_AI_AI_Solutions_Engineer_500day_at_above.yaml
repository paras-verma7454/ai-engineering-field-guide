description: |
  This is a job that Jill, our AI Recruiter, is recruiting for
  on behalf of one of our customers. She will pick the best
  candidates from Jack's network
  
  The next step is to speak to Jack.
  
  Job Title: AI Solutions Engineer
  
  Salary: £500/day
  
  Company Description: &above - AI innovation consultancy
  helping enterprise clients build at startup speed.
  
  Job Description: Join an elite innovation squad embedded
  within a major global technology company to bridge the gap
  between AI potential and reality. You will ideate and
  rapidly prototype high-fidelity proof-of-concepts using
  Google AI Studio and React. This role is about moving fast,
  sparking imagination, and proving what is possible through
  craft and code.
  
  Location: London, UK
  
  Why this role is remarkable:
  
  - Work at the bleeding edge of AI innovation within an agile
    team of 15 world-class engineers, designers, and
    strategists.
  - Influence how one of the world’s largest technology
    companies perceives and integrates AI through high-impact,
    tangible prototypes.
  - Enjoy a high-autonomy environment where side-project energy
    and hackathon-style rapid building are celebrated over
    slow enterprise architecture.
  
  What you will do:
  
  - Take ambiguous business problems and transform them into
    polished, clickable AI prototypes using React and Gemini.
  - Rapidly experiment with Google AI Studio and Firebase to
    build "wow-factor" demos that showcase the future of AI
    tooling.
  - Collaborate closely with an embedded innovation team to move
    from raw concept to working demo in as little as one week.
  
  The ideal candidate:
  
  - Possesses 3-5+ years of engineering experience with a strong
    background in React and a deep focus on UX-first
    sensibilities.
  - Demonstrates hands-on experience with LLM APIs such as
    Google AI Studio, Gemini, or Anthropic to solve complex
    problems.
  - Thrives in high-ambiguity environments and possesses the
    "builder" mindset to create solutions without needing
    exhaustive technical specifications.
  
  Who are Jack & Jill? Ok, I'll go first. I'm Jack, an AI that
  gets to know you on a quick call, learning what you're great
  at and what you want from your career. Then I help you land
  your dream job by finding unmissable opportunities as they
  come up, supporting you with applications, interview prep,
  and moral support. And I'm Jill, an AI Recruiter who talks
  to companies to understand who they're looking to hire. Then
  I recruit from Jack's network, making an introduction when I
  spot an excellent candidate.
  
  Next steps Step 1. Visit our website. Step 2. Click 'Talk to
  Jack'. Step 3. Talk to Jack so he can understand your
  experience and ambitions. Step 4. Jack will make sure Jill
  (the AI agent working for the company) considers you for
  this role. Step 5. If Jill thinks you're a great fit and her
  client wants to meet you, they will make the introduction.
  Step 6. If not, Jack will find you excellent alternatives.
  All for free.
  
  We never post fake jobs This isn't a trick. This is an open
  role that Jill is currently recruiting for from Jack's
  network. Sometimes Jill's clients ask her to anonymize their
  jobs when she advertises them, which means she can't share
  all the details in the job description. We appreciate this
  can make them look a bit suspect, but there isn't much we
  can do about it. Give Jack a spin! You could land this role.
  If not, most people find him incredibly helpful with their
  job search, and we're giving his services away for free.
