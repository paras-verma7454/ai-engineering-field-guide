description: |
  We are: Wizeline, a global AI-native technology solutions
  provider, develops cutting-edge, AI-powered digital products
  and platforms. We partner with clients to leverage data and
  AI, accelerating market entry and driving business
  transformation. As a global community of innovators, we
  foster a culture of growth, collaboration, and impact.
  
  With the right people and the right ideas, there’s no limit
  to what we can achieve
  
  Are you a fit? Sounds awesome, right? Now, let’s make sure
  you’re a good fit for the role:
  
  Key Responsibilities:
  
  - Lead the architecture, design, and development of scalable,
    high-performance web applications using React and
    TypeScript.
  - Define and execute the front-end technical strategy,
    ensuring scalability, performance, and alignment with
    product and AI goals.
  - Collaborate closely with AI engineers, data scientists,
    designers, and product managers to deliver intelligent,
    data-driven user experiences.
  - Integrate AI-powered components (e.g., chatbots, assistants,
    content generators, predictive UI) into modern web
    applications.
  - Mentor other engineers, promoting excellence in coding
    practices, architecture decisions, and technical problem-
    solving.
  - Establish and enforce standards for code quality,
    accessibility, performance optimization, and testing.
  - Partner with backend and DevOps teams to optimize CI/CD
    pipelines and deployment processes.
  - Continuously identify opportunities to use AI and automation
    to enhance both development workflows and end-user
    experiences.
  
  Must-have Skills:
  
  - 8+ years of professional software development experience,
    with at least 5+ years specializing in React and
    TypeScript.
  - Proven experience architecting and scaling enterprise-grade
    front-end applications.
  - Knowledge of AI technologies and hands-on experience
    integrating AI/ML models or APIs (e.g., OpenAI, Hugging
    Face, Vertex AI, Anthropic, or similar).
  - Demonstrated ability to design and implement AI-enhanced
    interfaces that improve usability, personalization, or
    automation.
  - Deep understanding of JavaScript (ES6+), React Hooks, and
    state management patterns (Redux, Zustand, or Recoil).
  - Proficiency with testing frameworks (Jest, React Testing
    Library, Cypress) and performance profiling tools.
  - Experience integrating RESTful and GraphQL APIs.
  - Bachelor’s degree in Computer Science, Software Engineering,
    or related field.
  - Advanced English level, both written and verbal.
  - Excellent communication, leadership, and mentoring skills.
  
  Nice-to-have:
  
  - AI Tooling Proficiency: Leverage one or more AI tools to
    optimize and augment day-to-day work, including drafting,
    analysis, research, or process automation. Provide
    recommendations on effective AI use and identify
    opportunities to streamline workflows.
  - Hands-on experience with Large Language Models (LLMs).
  - Understanding of agent architectures and key components,
    including “agent iceberg” considerations when integrating
    LLMs.
  - Familiarity with Next.js, Micro Frontends, and Server-Side
    Rendering (SSR).
  - Experience with cloud platforms (AWS, GCP, Azure) and
    infrastructure-as-code tools such as Terraform.
  - Background in data visualization or AI-driven UX design.
  - Contributions to open-source projects or active
    participation in tech communities.
  - Experience leading distributed teams in agile environments.
  
  What we offer:
  
  - A High-Impact Environment
  - Commitment to Professional Development
  - Flexible and Collaborative Culture
  - Global Opportunities
  - Vibrant Community
  - Total Rewards
  
