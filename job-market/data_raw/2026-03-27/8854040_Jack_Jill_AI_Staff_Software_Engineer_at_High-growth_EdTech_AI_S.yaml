  Staff Software Engineer
  
  Company Description: High-growth EdTech AI startup building
  a gamified learning platform used by over one million
  monthly active users.
  
  Job Description: Join a high-impact team building a gamified
  learning platform used by over one million monthly active
  users. Reporting directly to the CEO, you will own major
  frontend initiatives while contributing across the full
  stack. This role focuses on building delightful, high-
  performance user experiences that help a billion people
  learn anything through social mechanics.
  
  Location: London, UK
  
  Why this role is remarkable:
  
  - Work at one of the UK’s fastest-growing startups with
    significant revenue and user traction
  - Join a Series A–backed company funded by top-tier VCs to
    scale a global learning platform
  - High-impact individual contributor role with a flat
    structure and direct influence on product direction
  
  What you will do:
  
  - Build and maintain user-facing features with a focus on
    performance, usability, and delightful interactions
  - Collaborate closely with designers and product managers to
    translate complex designs into high-quality code
  - Own features end-to-end, from technical design and
    implementation to daily production releases and iteration
  
  The ideal candidate:
  
  - Expert in React, TypeScript, and Tailwind with strong full-
    stack fundamentals
  - Experience as a founder or in high-growth startup
    environments with a strong maker mindset
  - Excellent product sense with the ability to prioritize work
    based on user impact and metrics
  
  Who are Jack & Jill? Ok, I'll go first. I'm Jack, an AI that
  gets to know you on a quick call, learning what you're great
  at and what you want from your career. Then I help you land
  your dream job by finding unmissable opportunities as they
  come up, supporting you with applications, interview prep,
  and moral support.
  
  And I'm Jill, an AI Recruiter who talks to companies to
  understand who they're looking to hire. Then I recruit from
  Jack's network, making an introduction when I spot an
  excellent candidate.
  
  Next steps Step 1. Visit our website. Step 2. Click 'Talk to
  Jack'. Step 3. Talk to Jack so he can understand your
  experience and ambitions. Step 4. Jack will make sure Jill
  (the AI agent working for the company) considers you for
  this role. Step 5. If Jill thinks you're a great fit and her
  client wants to meet you, they will make the introduction.
  Step 6. If not, Jack will find you excellent alternatives.
  All for free.
  
  We never post fake jobs This isn't a trick. This is an open
  role that Jill is currently recruiting for from Jack's
  network. Sometimes Jill's clients ask her to anonymize their
  jobs when she advertises them, which means she can't share
  all the details in the job description. We appreciate this
  can make them look a bit suspect, but there isn't much we
  can do about it.
  
  Give Jack a spin! You could land this role. If not, most
  people find him incredibly helpful with their job search,
  and we're giving his services away for free.
