description: |
  Description Engineer the future of global finance. At Citi,
  our Tech team doesn’t just support finance – we are helping
  to redefine it. Every day, $5 trillion crosses through our
  network. We do business in 180+ countries, operating at a
  scale few can match. From deploying advanced AI to helping
  shape global markets, we build systems that matter. Look to
  join a team where your work helps influence economies, your
  ideas can drive innovation and outcomes, and your growth is
  backed by mentorship, continuous learning, and flexibility
  with potential hybrid work opportunities. Help solve
  real‑world challenges that touch millions and get the
  opportunity to build the future of finance with Citi Tech.
  
  We are seeking a motivated team member to support our AI and
  DevOps Platform Support team in North America. This role is
  responsible for assisting in the stability, reliability, and
  performance of our critical AI and DevOps platforms. The
  team supports a wide range of services, including multiple
  AI applications, developer tools, and CI/CD pipeline
  technologies used across the organization. The ideal
  candidate will work closely with SRE and Support engineers
  to resolve incidents, address platform issues, and
  collaborate with engineering and development teams to
  enhance platform supportability. The role includes
  coordinating daily operational activities and contributing
  to short‑term planning.
  
  Responsibilities
  
  • Understand how application support functions within the
  broader technology organization and contributes to business
  objectives. • Assist with vendor coordination and day‑to‑day
  interactions with offshore managed services. • Support
  efforts to improve service levels, including participating
  in incident management, problem management, and
  knowledge‑sharing initiatives. • Partner with development
  and engineering teams to support application stability and
  operational readiness. • Assist in collecting capacity,
  performance, and latency data to support platform planning
  efforts. • Support application onboarding activities using
  established guidelines and standards. • Contribute to
  fostering a collaborative and supportive team environment
  that encourages skill development. • Participate in
  cost‑efficiency initiatives such as Root Cause Analysis
  reviews, knowledge management, and performance tuning. •
  Assist in preparing materials for business review meetings
  and help align technology activities with business needs. •
  Follow established support processes and tool standards and
  provide input on improvement opportunities. • Perform other
  duties and functions as assigned. • Contribute to platform
  enhancement initiatives in partnership with engineering and
  support leads. • Assist in resilience‑related activities,
  including incident simulations, disaster recovery exercises,
  and platform readiness testing. • Support automation efforts
  to reduce manual tasks and improve operational efficiency. •
  Help maintain observability practices, including monitoring,
  logging, tracing, and alerting. • Maintain practical
  understanding of platform components to support
  troubleshooting and incident response activities. • Assist
  in tracking the operational health of production platforms
  (including OpenShift, ECS, CI/CD) and support SLA adherence.
  • Participate in monitoring and observability efforts to
  support proactive issue identification and analysis.
  
  Qualifications
  
  • 6-8 years of relevant experience in technical support,
  platform operations, or engineering. • Exposure to
  architecture concepts with the ability to contribute to
  technical discussions and understand design decisions. •
  Experience working with business partners, engineering
  teams, or technology stakeholders. • Demonstrated experience
  supporting IT services, platform operations, or
  infrastructure components. • Strong verbal and written
  communication skills, with the ability to document technical
  issues clearly. • Experience supporting operational
  workstreams or participating in platform improvement
  initiatives. • Participation in resilience‑related or
  stability‑focused activities preferred. • Ability to
  collaborate effectively with cross‑functional teams. •
  Strong organizational skills and ability to manage daily
  workload and task priorities. • Working knowledge of
  Generative AI concepts preferred. • Experience with CI/CD or
  configuration management tools preferred. • Experience with
  Red Hat OpenShift or similar Kubernetes technologies
  preferred. • Experience working with databases such as
  Postgres, Oracle, MongoDB, or Redis preferred. • Experience
  with scripting or coding in Java, Python, Go, or similar
  languages preferred. • Familiarity with modern observability
  and monitoring tools (e.g., Prometheus, Grafana, Splunk,
  ELK) preferred.
  
  Education
  
  • Bachelor’s/University degree required.
  
