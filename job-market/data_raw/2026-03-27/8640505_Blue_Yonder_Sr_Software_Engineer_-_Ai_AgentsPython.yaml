description: |
  Scope:
  
  - We are seeking a highly skilled AI/Prompt Engineer to
    design, implement, and maintain artificial intelligence
    (AI) and machine learning (ML) solutions for our
    organization.
  - The ideal candidate will have a deep understanding of AI and
    ML technologies, as well as experience with data analysis,
    software development, and cloud computing.
  
  What you'll do:
  
  - Design and implement AI/ conversational AI solutions and ML
    solutions to solve business problems and to improve
    customer experience and operational efficiency.
  - Develop and maintain machine learning models using tools
    such as TensorFlow, Keras, and PyTorch
  - Collaborate with cross-functional teams to identify
    opportunities for AI and ML solutions and develop
    prototypes and proof-of-concepts.
  - Develop and maintain data pipelines and ETL processes to
    support AI and ML workflows.
  - Must have experience in Python, RAG, Vector DB,
    LangChain/LangGraph
  - Monitor and optimize model performance, accuracy, and
    scalability
  - Stay up to date with emerging AI and ML technologies and
    evaluate their potential impact on our organization.
  - Develop and maintain technical documentation, including
    architecture diagrams, design documents, and standard
    operating procedures
  - Deep experience in GitHub ecosystem: Action, Package,
    Advance Security and CI/CD pipeline
  - Provide technical guidance and mentorship to other members
    of the data engineering and software development teams.
  - Develop and maintain integrations with third-party systems
    and APIs to support conversational AI workflows.
  - Develop and maintain technical documentation, including
    architecture diagrams, design documents, and standard
    operating procedures.
  
  Provide technical guidance and mentorship to other team
  members.
  
  What we are looking for:
  
  Industry Experience:
  
  - Bachelor’s degree in computer science, Information
    Technology, or a related field with 8-12 years of
    experience, with 5+ years of experience in conversational
    AI engineering, design, and implementation
  - Proven expertise in the GitHub ecosystem — Actions, CI/CD
    pipelines, repo governance, and workflow automation
  - Hands-on experience in DevOps with containerization
    (Docker), orchestration (Kubernetes), and infrastructure-
    as-code (Terraform) to enable scalable, reliable cloud
    deployments
  - Knowledge in Supply Chain Planning product will be added
    advantage.
  - Possesses basic knowledge of relevant industry domain and
    business processes of the customers
  
  Technical Skills:
  
  - Experience with Python(must), Oracle DB, Java.
  - Demonstrates strong analytical and problem-solving skills.
  - AI/ML: Azure AI, RAG, Vector DB, LangChain/LangGraph,
    ResponseAPI
  - Evaluation & Observability: Eval framework, Langfuse, ELK
    Stack
  - DevOps: GitHub ecosystem, CI/CD Pipeline, VC, branching
    strategies
  - Infrastructure automation: Docker, Kubernetes, Terraform
  - Understanding of scripting languages – Unix Shell Scripting,
    PowerShell, Python, etc.
  
  Key Responsibilities:
  
  - Architect, design, and deploy AI Agents
  - Build and maintain GitHub-based CI/CD pipelines and
    automation workflows.
  - Lead DevOps transformation with GitHub Actions as the
    backbone of release engineering.
  - Integrate AI-driven capabilities into enterprise SaaS supply
    chain platforms.
  - Implement Eval models, observability, and feedback loops for
    AI performance optimization.
  - Ensure high reliability and scalability of mission-critical
    AI and SaaS solutions through SRE practices.
  - Mentor and guide junior engineers in AI agents, GitHub
    DevOps, and SaaS reliability.
  
  Soft Skills
  
  - Must have excellent communication and interpersonal skills
    to interact with global customers, business users and
    internal personnel, with an emphasis on follow-through and
    reporting.
  - Collaborates relentlessly, passionately and respectfully
    with various BY teams, customers and partners
  - Leads by example demonstrating professionalism during
    internal and external conversations, understands cultural
    differences and diversity.
  - Balances between Soft skills (process, people, values,
    teamwork, roles) and hard skills (technologies,
    frameworks, solutions, products)
  - Must be self-motivated and a quick learner - adapt to new
    technologies, platforms, and integrations.
  
