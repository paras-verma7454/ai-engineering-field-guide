description: |
  Ironclad is the leading AI contracting platform that
  transforms agreements into assets. Contracts move faster,
  insights surface instantly, and agents push work forward,
  all with you in control. Whether you’re buying or selling,
  Ironclad unifies the entire process on one intelligent
  platform, providing leaders with the visibility they need to
  stay one step ahead. That’s why the world’s most
  transformative organizations, from Rivian to the World
  Health Organization and the Associated Press, trust Ironclad
  to accelerate their business.
  
  We’re consistently recognized as a leader in the industry: a
  Leader in the Forrester Wave and Gartner Magic Quadrant for
  Contract Lifecycle Management, a Fortune Great Place to
  Work, and one of Fast Company’s Most Innovative Workplaces.
  Ironclad has also been named to Forbes’ AI 50 and Business
  Insider’s list of Companies to Bet Your Career On. We’re
  backed by leading investors including Accel, Y Combinator,
  Sequoia, BOND, and Franklin Templeton. For more information,
  visit www.ironcladapp.com or follow us on LinkedIn.
  
  Legal Engineers are product experts and problem solvers.
  They are responsible for understanding our customers’ goals
  and advising on contracting processes to help customers
  realize their vision for Ironclad and build a foundation for
  long term success. Legal engineers are core to our Customer
  Success team and work cross-functionally to deliver a best-
  in-class experience for our customers.
  
  Who We’re Looking For:
  
  - 3+ years of professional services and/or consulting
    experience with software companies (B2B SaaS with
    experience integrating CLM, eSignature, SSO/IDP,
    Salesforce and data tools preferred).
  - Passion for learning new technologies and driving outcomes
    through technical solutions. Comfortable translating
    business requirements into scalable product configurations
    and workflows.
  - Demonstrated capability to establish meaningful
    relationships with customers, hold customers accountable,
    and manage customer expectations and escalations
    effectively. Able to respond to and resolve tough
    conversations with executive sponsors and end users.
  - Ability to successfully navigate customers’ complex
    organizational structures by running structured discovery
    and design, mapping processes, and aligning Legal, Sales,
    Procurement and/or IT teams.
  - Curiosity for understanding customers’ goals and values and
    turning them into measurable success metrics and adoption
    plans.
  - Familiarity with CLM (contract lifecycle management) and
    legal ops business processes. Exposure to AI‑assisted
    contracting ( smart import, clause extraction, playbooks,
    redline assist) is a plus.
  - Experience learning and adapting quickly to a growing
    organization with a learning mindset suited to frequent
    product releases.
  - Ironclad’s Values: Drive, Intent, Integrity, and Empathy
  
  What You’ll Be Doing:
  
  - Lead 5-15 customer implementations simultaneously.
    Collaborate with other professional service team members
    to manage customer projects and ensure on-time delivery
    and successful implementations with clear milestones,
    risks, and comms plans.
  - Apply best practices in CLM and legal operations to design
    scalable processes, advise on change management, and
    ensure customers achieve measurable outcomes.
  - Leverage your deep product expertise (including AI features
    and integrations) to design, configure, and optimize
    contracting processes, while enabling customers to be
    self-sufficient.
  - Managing challenging conversations with customers to reset
    expectations and address product feedback. Advise
    customers on trade-offs that balance project timeline and
    their implementation goals and guide phased delivery plans
    that align to executive priorities.
  - Serve as the internal “Voice of Customer” by regularly
    sharing product feedback and collaborating with our
    Product team to improve the Ironclad product.
  - Stay up-to-date on product releases, with a focus on AI and
    workflow automation capabilities, and continuously build
    expertise to guide customers effectively.
  - Proactively identify opportunities to improve our team’s
    implementation processes by contributing to methodology,
    templates, and playbooks.
  - Respond to high-profile customer escalations in a way that
    inspires confidence and customer loyalty with structured
    action plans, ownership, and follow‑through to resolution.
  
  Base Salary Range:
  
  The base salary range represents the minimum and maximum of
  the salary range for this position based at our San
  Francisco headquarters. The actual base salary offered for
  this position will depend on numerous factors, including
  individual proficiency, anticipated performance, and the
  location of the selected candidate. Our base salary is just
  one component of Ironclad’s competitive total rewards
  package, which also includes equity awards (a new hire
  grant, along with opportunities for additional awards
  throughout your tenure), competitive health and wellness
  benefits, and a commitment to career growth and development.
  
  US Full-Time Employee Benefits at Ironclad:
  
  - 100% health coverage for employees (medical, dental, and
    vision), and 75% coverage for dependents with buy-up plan
    options available
  - Market-leading leave policies, including gender-neutral
    parental leave and compassionate leave
  - Family forming support through Maven for you and your
    partner
  - Paid time off - take the time you need, when you need it
  - Monthly stipends for wellbeing, hybrid work, and (if
    applicable) cell phone use
  - Mental health support through Modern Health, including
    therapy, coaching, and digital tools
  - Pre-tax commuter benefits (US Employees)
  - 401(k) plan with Fidelity with employer match (US Employees)
  - Regular team events to connect, recharge, and have fun
  - And most importantly: the opportunity to help build the
    company you want to work at
  
  **UK Employee-specific benefits are included on our UK job
  postings
  
  Pursuant to the San Francisco Fair Chance Ordinance, we will
  consider for employment qualified applicants with arrest and
  conviction records.
