description: |
  Company Description
  
  CREATIVITY IS OUR SUPERPOWER. It’s our heritage and it’s
  also our future. Because we don’t just make toys. We create
  innovative products and experiences that inspire fans,
  entertain audiences and develop children through play.
  Mattel is at its best when every member of our team feels
  respected, included, and heard—when everyone can show up as
  themselves and do their best work every day. We value and
  share an infinite range of ideas and voices that evolve and
  broaden our perspectives with a reach that extends into all
  our brands, partners, and suppliers.
  
  The Team:
  
  Mattel Finance hires leaders. Every one of our finance
  professionals works in a global finance organization
  interacting with senior leadership and with the
  accountability and responsibility to grow a career. We are a
  strong and nimble finance department focused on driving
  business results in the most cost-effective manner. We pride
  ourselves on consistent processes, fast decisions and
  increased accountability.
  
  The Opportunity:
  
  The Citizen Developer (Finance) identifies, designs, and
  builds low-code automation solutions—primarily Robotic
  Process Automation (RPA)—to streamline finance processes
  such as accounts payable/receivable, reconciliations,
  journal preparation, reporting, and controls. This role will
  also expand into AI-enabled process improvement, leveraging
  approved AI capabilities (e.g., intelligent document
  processing, generative AI assistance, and AI-driven workflow
  enhancements) to improve decision support, reduce manual
  effort, and increase process insight—while adhering to
  governance, security, and compliance standards.
  
  Job Description
  
  The Opportunity:
  
  What Your Impact Will Be:
  
  
  
  
  - Identify and prioritize automation opportunities across
    Finance (AP/AR, close, reconciliations, reporting, master
    data, audit support), including candidates for AI
    augmentation (e.g., document understanding, variance
    narratives, triage, classification).
  - Build and maintain RPA workflows using approved low-code
    tools (e.g., UiPath, Power Automate, Automation Anywhere,
    Blue Prism) and associated connectors.
  - Partner with Finance and IT/CoE to pilot and scale AI-
    enabled automations such as:
    - Intelligent document processing (IDP) for invoices,
      statements, and support documentation
    - AI-assisted email/case triage and routing
    - Automated narrative generation for reconciliations/variance
      explanations (with human review)
    - Knowledge search/Q&A over approved finance procedures and
      policies
  - Document future-state processes (SOPs, process maps, user
    stories, acceptance criteria) including AI “human-in-the-
    loop” checkpoints.
  - Implement strong exception handling, audit logs,
    monitoring/alerting, and operational runbooks for both
    bots and AI-assisted workflows.
  - Execute unit testing and support UAT; assist with deployment
    and hypercare; support ongoing enhancements and incident
    resolution.
  - Ensure solutions meet SOX/internal controls, data privacy,
    model/data usage policies, and security requirements
    (including access controls and segregation of duties).
  - Track and report automation value (hours saved, cycle time
    reduction, error reduction), and for AI initiatives
    include quality measures (e.g., accuracy, exception rate,
    reviewer effort).
  
  Skills & Competencies
  
  - Process improvement mindset with practical automation
    delivery
  - Comfort learning and applying new AI capabilities
    responsibly
  - Strong written communication and documentation discipline
  - Stakeholder management across Finance, IT, Compliance, and
    Audit
  - Analytical thinking and structured problem-solving
  
  Tools (Examples)
  
  - RPA: UiPath / Power Automate / Automation Anywhere / Blue
    Prism
  - AI/IDP (examples): Document Understanding / IDP tools,
    approved GenAI assistants, workflow copilots
  - Data: Excel (advanced), Power BI/Tableau, basic SQL
  - Documentation: Visio / Lucidchart / Confluence
  - Systems: ERP (SAP/Oracle/NetSuite), ticketing
    (ServiceNow/Jira)
  
  KPIs
  
  - Hours saved / capacity released; cycle time improvements;
    error reduction
  - Bot run success rate; incident volume/time to resolution
  - Compliance adherence (audit findings/control exceptions)
  - AI workflow quality metrics (exception rate, reviewer
    rework, accuracy/consistency within defined thresholds)
  
  
  
  Qualifications
  
  Required Qualifications
  
  - Bachelor’s degree in Finance, Accounting, Information
    Systems, Business, or equivalent experience.
  - 2+ years of experience in Finance operations/accounting/FP&A
    operations and/or automation/analytics.
  - Hands-on experience building automations with one or more
    RPA/low-code platforms (or strong demonstrated aptitude).
  - Strong understanding of finance processes and systems (ERP,
    Excel, reporting tools).
  - Ability to translate business needs into automation logic
    with clear documentation.
  - Controls mindset and experience working within governed
    environments.
  
  Preferred Qualifications
  
  - Experience with AI-enabled automation (e.g., IDP/OCR
    pipelines, chatbot copilots, workflow intelligence) in a
    business setting.
  - Familiarity with model risk concepts (bias, hallucinations,
    validation), and designing human-in-the-loop review steps.
  - Exposure to process mining and continuous improvement
    methods.
  - Basic scripting (Python/VBA) or API familiarity.
  
  Additional Information
  
  Don’t meet every single requirement? At Mattel, we are
  dedicated to an inclusive workplace and a culture of
  belonging. If you’re excited about this role but your past
  experience doesn’t align perfectly with every qualification
  in the job description, we still encourage you to apply. You
  may be just the right candidate for this or other roles.
  
  How We Work: We are a purpose driven company aiming to
  empower generations to explore the wonder of childhood and
  reach their full potential. We live up to our purpose
  employing the following behaviors:
  
  - We collaborate: Being a part of Mattel means being part of
    one team with shared values and common goals. Every person
    counts and working closely together always brings better
    results. Partnership is our process and our collective
    capabilities is our superpower.
  - We innovate: At Mattel we always aim to find new and better
    ways to create innovative products and experiences. No
    matter where you work in the organization, you can always
    make a difference and have real impact. We welcome new
    ideas and value new initiatives that challenge
    conventional thinking.
  - We execute: We are a performance-driven company. We strive
    for excellence and are focused on pursuing best-in-class
    outcomes. We believe in accountability and ownership and
    know that our people are at their best when they are
    empowered to create and deliver results.
  
  Our Approach to Flexible Work: We embrace a flexible work
  model designed to empower a culture of growth, optimism, and
  wellbeing, where every employee can reach their full
  potential. Combining purposeful in-person collaboration with
  flexibility, our focus is to optimize performance and drive
  connection for moments that matter.
  
  Who We Are: Mattel is a leading global toy and family
  entertainment company and owner of one of the most iconic
  brand portfolios in the world. We engage consumers and fans
  through our franchise brands, including Barbie, Hot Wheels,
  Fisher-Price, American Girl, Thomas & Friends, UNO, Masters
  of the Universe, Matchbox, Monster High, MEGA and Polly
  Pocket, as well as other popular properties that we own or
  license in partnership with global entertainment companies.
  Our offerings include toys, content, consumer products,
  digital and live experiences. Our products are sold in
  collaboration with the world’s leading retail and ecommerce
  companies. Since its founding in 1945, Mattel is proud to be
  a trusted partner in empowering generations to explore the
  wonder of childhood and reach their full potential.
  
  Mattel’s award-winning workplace culture has been recognized
  by Forbes, Fast Company, Newsweek, Great Place to Work,
  TIME, and more.
  
  Visit us at https://jobs.mattel.com/ and
  www.instagram.com/MattelCareers.
  
  Mattel is an Equal Opportunity Employer where we want you to
  bring your authentic self to work every day. We welcome all
  job seekers, and all applicants will receive consideration
  for employment.
  
