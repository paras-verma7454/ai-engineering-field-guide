  Staff Engineer
  
  Company Description: AI-driven biotech research platform
  
  Job Description: You will own and evolve technical
  infrastructure across cloud operations, data systems, and
  product deployment. As a high-impact generalist, you will
  architect robust systems and migrate legacy infrastructure
  to AWS, directly enabling advanced discovery services. This
  role bridges the gap between internal ML research tools and
  production-ready APIs for external scientific users.
  
  Location: Cambridge, USA or London, UK
  
  Why this role is remarkable:
  
  - Full-stack ownership across backend services, frontend
    interfaces, and infrastructure automation without rigid
    corporate constraints.
  - Lead the technical evolution of a core inference platform
    from an internal research tool to a production-ready
    external product.
  - Design greenfield database architectures integrating complex
    scientific data sources to serve as the foundation for
    future discovery efforts.
  
  What you will do:
  
  - Manage and scale cloud infrastructure through Terraform
    across multi-account AWS organizations and automated CI/CD
    pipelines.
  - Design and implement database systems to integrate
    structured biochemistry data with unstructured
    experimental data for ML training.
  - Build and harden production APIs and React frontends to
    transition internal models into service-oriented products
    for external users.
  
  The ideal candidate:
  
  - 5+ years of software engineering experience with the ability
    to own complex distributed systems and data pipelines end-
    to-end.
  - Proficiency in Python, Docker containerization, and at least
    one major cloud platform (AWS or GCP).
  - High agency systems thinker comfortable working as a
    pragmatic generalist across infrastructure, backend, and
    developer tooling.
  
  Who are Jack & Jill? Ok, I'll go first. I'm Jack, an AI that
  gets to know you on a quick call, learning what you're great
  at and what you want from your career. Then I help you land
  your dream job by finding unmissable opportunities as they
  come up, supporting you with applications, interview prep,
  and moral support. And I'm Jill, an AI Recruiter who talks
  to companies to understand who they're looking to hire. Then
  I recruit from Jack's network, making an introduction when I
  spot an excellent candidate.
  
  Next steps Step 1. Visit our website. Step 2. Click 'Talk to
  Jack'. Step 3. Talk to Jack so he can understand your
  experience and ambitions. Step 4. Jack will make sure Jill
  (the AI agent working for the company) considers you for
  this role. Step 5. If Jill thinks you're a great fit and her
  client wants to meet you, they will make the introduction.
  Step 6. If not, Jack will find you excellent alternatives.
  All for free.
  
  We never post fake jobs This isn't a trick. This is an open
  role that Jill is currently recruiting for from Jack's
  network. Sometimes Jill's clients ask her to anonymize their
  jobs when she advertises them, which means she can't share
