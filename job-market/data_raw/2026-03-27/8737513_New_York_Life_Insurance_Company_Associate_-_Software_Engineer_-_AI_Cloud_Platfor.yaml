description: |
  Location Designation: Hybrid - 3 days per week  We are
  seeking a Software Engineer with experience in generative
  and agentic AI to help design and deliver modern, cloud-
  native insurance platforms. This role sits within our Core
  Systems team and partners closely with engineers,
  architects, data scientists, and product teams to build
  scalable, secure, and highly available solutions leveraging
  AWS, APIs, DevSecOps, and AI. You will contribute to
  advancing automation, developer productivity, and AI-enabled
  capabilities while continuing to grow your technical
  expertise within enterprise engineering standards and best
  practices. What You'll Do:
  
  - Design, build, test, and deploy cloud-native applications
    and services on AWS under the guidance of senior engineers
    and architects
  - Contribute to AI and automation initiatives that enhance
    developer productivity and platform capabilities
  - Support the development and maintenance of CI/CD pipelines
    and DevSecOps automation
  - Build and consume APIs and reusable services
  - Write clean, maintainable, and well-tested code following
    engineering best practices
  - Ensure solutions meet security, performance, resilience, and
    compliance standards
  - Participate in Agile ceremonies and collaborate with cross-
    functional teams
  - Contribute to documentation, technical discussions, and
    continuous improvement initiatives
  
  What You'll Bring:
  
  - Bachelor's degree in Computer Science, Engineering, or a
    related field
  - 1-3 years of software engineering experience building and
    supporting production systems
  - Hands-on experience with AWS and cloud-native application
    development
  - Familiarity with Infrastructure as Code (e.g., Terraform)
  - Exposure to CI/CD pipelines and DevSecOps practices
  - Proficiency in at least one modern programming language
    (e.g., Python, JavaScript, TypeScript)
  - Experience building generative or agentic AI applications
  - Familiarity with APIs, containerization concepts (EKS, ECR),
    and modern development tools (e.g., GitHub, Jira)
  - Strong problem-solving skills and ability to work
    effectively in a team environment
  - Strong written and verbal communication skills
  
  Preferred Qualifications
  
  - Exposure to AI/ML through academic, project, or professional
    experience
  - Experience with full-stack development of AI-powered tools
    using modern technologies (e.g., React, Node.js,
    LangChain, LangGraph)
  - Experience contributing to automation or developer
    productivity initiatives
  - Experience in financial services, insurance, or wealth
    management
  - Relevant certifications or coursework in cloud, DevOps, or
    AI
  
  Pay Transparency Salary Range: $81,000-$115,500 Overtime
  eligible: Exempt Discretionary bonus eligible: Yes Sales
  bonus eligible: No Actual base salary will be determined
  based on several factors but not limited to individual's
  experience, skills, qualifications, and job location.
  Additionally, employees are eligible for an annual
  discretionary bonus. In addition to base salary, employees
  may also be eligible to participate in an incentive program.
