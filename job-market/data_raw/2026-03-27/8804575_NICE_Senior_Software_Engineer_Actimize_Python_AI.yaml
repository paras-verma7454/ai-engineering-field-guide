description: |
  At NiCE, we don’t limit our challenges. We challenge our
  limits. Always. We’re ambitious. We’re game changers. And we
  play to win. We set the highest standards and execute beyond
  them. And if you’re like us, we can offer you the ultimate
  career opportunity that will light a fire within you.
  
  So, what’s the role all about?
  
  As a Senior Software Developer with strong fundamentals in
  Python, Algorithms & Data Structures, and AWS you will build
  scalable, cloud-native systems and contribute to AI-driven
  platform initiatives. You will be responsible for developing
  this platform for Actimize cloud-based solutions and to work
  with cutting edge cloud technologies. The ideal candidate is
  hands‑on, passionate about engineering excellence, and
  comfortable working across backend systems—with optional
  exposure to modern frontend frameworks.
  
  How will you make an impact?
  
  - Design and develop quality, proficient and well documented
    technical solutions in AWS cloud and AI that satisfy
    business requirements and meet corporate architectural
    standards.
  - Develop solid unit, integration, and automation tests
    according to organizational standards.
  - Assist in troubleshooting and maintenance of existing
    software applications; identify and implement additional
    improvements when warranted; work with external
    stakeholders as needed.
  - Develop technical models / design for assigned components.
  - Contribute to and drive technological and architectural
    decisions.
  - Work with Scrum Team, as well as internal and external
    stakeholders, to influence and drive decision making and
    support organizational project or product teams.
  - Contribute to the advancement and improvement of Agile
    practices within the organization.
  
  Have you got what it takes?
  
  - Bachelor’s or master’s degree in computer science, Data
    Engineering, or a related field.
  - 4+ years of hands-on software development experience
    preferred
  - Strong hands-on experience in Python
  - Deep understanding of Algorithms & Data Structures
  - Solid experience with AWS (EC2, Lambda, S3, API Gateway,
    IAM, RDS/DynamoDB, Bedrock)
  - Experience building REST APIs or backend services
  - Exposure to LLMs
  - Experience with Agentic AI frameworks
  - Strong problem-solving and system design skills
  - Good communication with peers, subordinates and managers
  
  You will have an advantage if you also have:
  
  - Terraform (Infrastructure as Code)
  - Docker (containerization)
  - Jenkins (CI/CD pipelines)
  - Familiarity with LangChain / LangGraph.
  - Front-end development experience in ReactJS, Angular, or
    Vue.js (any modern JavaScript framework)
  - AWS Certification
  - Embeddings & vector databases (FAISS, Pinecone, OpenSearch,
    etc.)
  
  What’s in it for you?
  
  Join an ever-growing, market disrupting, global company
  where the teams – comprised of the best of the best – work
  in a fast-paced, collaborative, and creative environment! As
  the market leader, every day at NiCE is a chance to learn
  and grow, and there are endless internal career
  opportunities across multiple roles, disciplines, domains,
  and locations. If you are passionate, innovative, and
  excited to constantly raise the bar, you may just be our
  next NiCEr!
  
   Enjoy NiCE-FLEX!
  
  At NiCE, we work according to the NiCE-FLEX hybrid model,
  which enables maximum flexibility: 2 days working from the
  office and 3 days of remote work, each week. Naturally,
  office days focus on face-to-face meetings, where teamwork
  and collaborative thinking generate innovation, new ideas,
  and a vibrant, interactive atmosphere.
  
