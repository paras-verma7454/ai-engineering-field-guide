description: |
  About ROLLER
  
  ROLLER is not your average software-as-a-service company.
  With a global presence in over 30 countries, we're here to
  bring some excitement to the leisure and attractions
  industry and make a difference! Our mission is to help
  businesses operate smoothly and create fun and memorable
  guest experiences by providing seamless ticketing, point-of-
  sale, self-serve kiosks, memberships and digital waiver
  processes.
  
  But here's the best part: our team. We're a group of 300+
  highly passionate, enthusiastic, and down-to-earth
  professionals located all around the world who are all
  working together to build something truly remarkable. We're
  aiming high and believe that the possibilities are endless.
  As we continue to grow globally, we're excited to write our
  success story and have fun along the way.
  
  We genuinely love what we do, and we're looking for like-
  minded people to join us on this amazing journey. If you're
  ready to be part of a dynamic team and make a real impact,
  come aboard, and let's create some unforgettable experiences
  together at ROLLER!
  
  Role Overview
  
  Roller is looking for a talented AI Engineer with 3-5 years
  of experience to help build the AI platform and intelligent
  automation systems enabling AI powered business verticals.
  The ideal candidate will have hands-on experience designing
  and deploying GenAI platform and solutions using modern LLM
  frameworks, RAG architectures, and scalable AI pipelines.
  
  Key Responsibilities
  
  - Develop Enterprise GenAI platform and services for various
    business verticals using Python and modern frameworks such
    as LangChain.
  - Design and implement Retrieval Augmented Generation (RAG)
    systems using vector databases and LLMs.
  - Build scalable AI pipelines for ingestion, embedding,
    retrieval, and generation workflows.
  - Integrate LLMs with enterprise data sources and APIs.
  - Implement LLM evaluation frameworks to measure model
    performance, hallucination, and response quality.
  - Establish AI governance and Guardrails practices including
    safety checks, monitoring, and responsible AI controls.
  - Optimize prompt engineering strategies and model
    interactions for accuracy and performance.
  - Implement observability for AI systems and build AI usage
    dashboards for prompt tracing, token usage monitoring,
    latency tracking, Agent usage and evaluation metrics.
  - Collaborate with cross functional teams to deploy
    production-grade AI solutions.
  
  Required Skills
  
  - Strong programming experience in Python.
  - Experience with Agentic AI framework such as LangGraph
  - Hands-on experience building RAG-based applications.
  - Experience working with Vector Databases (Pinecone,
    Weaviate, OpenSearch, etc.).
  - Knowledge of AI pipeline architecture and model
    orchestration.
  - Experience with LangChain or similar LLM orchestration
    frameworks.
  - Experience implementing LLM evaluation frameworks and
    benchmarking methods.
  - Understanding of AI governance, responsible AI, and model
    guardrails.
  
  Nice to Have skills
  
  - Experience with workflow automation tools such as n8n.
  - Experience deploying LLM systems in production environments.
  - Advanced skills such as LLM Fine tuning, Self LLM hosting,
    Voice AI.
  - Familiarity with cloud AI platforms (AWS, GCP, Azure).
  - Venue management domain experience.
  
  What We Offer
  
  - Opportunity to work on cutting-edge Generative AI systems.
  - Collaborative engineering culture focused on innovation.
  - Exposure to modern AI architectures including agents, RAG,
    and automation.
  - Competitive compensation and growth opportunities
  
  Why Join Us?
  
  - Drive the vision and scale of the company’s AI program in a
    rapidly growing SaaS environment.
  - Work at the intersection of technology, operations, and
    customer value to deliver meaningful business outcomes.
  - Collaborate with leaders across CS, Support, Product,
    RevOps, and IT to align strategy and execution.
  - Transform ideas into scalable solutions using AI,
    automation, portals, and integrated systems.
  
  Perks!
  
  - You'll get to work on a category-leading product that
    customers love in a fun, high-growth industry! Check our
    Capterra and G2 reviews.
  - 4 ROLLER Recharge days per year (When we hit our goals each
    quarter, we take a well-earned day off together to relax,
    recharge, and celebrate our wins).
  - Engage in our 'Vibe Tribe' - led by our team members; you
    can contribute to company-wide initiatives directly.
    Regular events and social activities, fundraising & cause-
    related campaigns...you name it. We're willing to make it
    happen!
  - Team Member Assistance Program to proactively support our
    team's health and wellbeing - access to coaching,
    education modules, weekly webinars, and more.
  - 16 weeks paid Parental Leave for primary carers and 4 weeks
    paid Parental Leave for secondary carers.
  - Work with a driven, fun, and switched-on team that likes to
    raise the bar in all we do!
  - Individual learning & development budget plus genuine career
    growth opportunities as we continue to expand!
  
  What You Can Expect
  
  - Initial call with our Talent Acquisition ManagerYou'll have
    an initial call with our Talent Acquisition Manager to
    chat through some of your experience to date, salary
    expectations and you can check off any initial questions
    you might have.
  - Interview with the Hiring ManagerYou'll get to meet with the
    hiring manager to learn more about the role & ROLLER
    whilst also talking through your experience in more
    detail.
  - Loop InterviewsThis is where you will get to meet our wider
    ROLLER team to do a 'vibe check' on us to make sure our
    culture & vibe meet what you are looking for!
  - OfferIf all lights are green and the fit feel right, we'll
    conduct reference checks and you'll receive an offer to
    join!
