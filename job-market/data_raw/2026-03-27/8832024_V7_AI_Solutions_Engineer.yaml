description: |
  V7
  
  At V7, we’re building AI platforms that help humans do their
  best work, at incredible scale and speed. Our mission is to
  turn human knowledge into trustworthy AI, making complex
  tasks faster, smarter, and more accurate. We’re growing
  fast, backed by leading investors and AI pioneers (including
  the minds behind Transformers and Gemini).
  
  The Product
  
  V7 Go provides legal, finance, insurance, and accounting
  teams with a toolkit for deploying and building custom no-
  code AI agents. The platform focuses taking multi-modal data
  and delivering verifiable outputs with transparent AI logic
  to ensure accuracy and compliance.
  
  V7 Go supports all of the latest models like GPT, Claude,
  and Gemini for the best accuracy and performance.⁠⁠⁠⁠ Watch
  the V7 Go keynote to see what we’re building.
  
  The team you’ll be joining and the impact you’ll have
  
  - You'll join our go-to-market team as our second Solutions
    Engineer in New York (the team is six people), sitting at
    the intersection of sales and product in a company
    processing tens of millions of documents for customers
    across finance, insurance, and real estate.
  - V7 Go 4x-ed revenue last year, with 160%+ upsell into
    accounts. You'll help accelerate that trajectory by making
    sure every customer gets real value.
  - We run a lean, high-trust team where you'll work directly
    with AEs, engineers, and product to close complex deals
    and turn new logos into long-term champions.
  - Your work directly shapes how enterprises experience agentic
    AI for the first time and how quickly they believe in it.
  
  What you’ll be doing from day one
  
  - Run technical discovery, design solutions, and lead POCs
    alongside Account Executives to close deals, then own
    onboarding to get customers to first value fast.
  - Build and implement workflows within V7 Go; combining prompt
    engineering, data pipelines, and integrations to solve
    real customer problems across document processing and
    more.
  - Act as the primary technical contact for accounts, handling
    complex challenges and spotting expansion opportunities as
    customers scale.
  - Juggle up to 10 concurrent projects while feeding customer
    insights back to product and engineering.
  
  Who you are
  
  - You are a prototyper at heart with a gift of talking to
    customers, building relationships, and solving technical
    problems with repeatability.
  - You have experience in delivering Large Language Model
    projects with customers, including LLM API integration,
    up-to-speed knowledge of foundation models, solutions
    design/architecture, integrating different cloud
    providers, prompt engineering, and/or measuring AI
    accuracy.
  - You love coding with Python.
  - You can develop and articulate an AI solution vision to
    technical and business stakeholders, with customers and
    partners to match the value proposition to business needs.
  
  V7 champions equality and inclusion because diverse teams
  build better products. Don't check every box? Apply anyway —
  we value what makes you unique and will support you through
  the process, just let our Talent team know how they can
  help.
