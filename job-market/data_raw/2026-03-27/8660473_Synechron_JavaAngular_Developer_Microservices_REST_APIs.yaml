description: |
  Job Summary Synechron is seeking a highly skilled
  Java/Angular Developer to support the development of
  scalable, innovative enterprise applications. In this role,
  you will engineer frontend and backend solutions using Java
  (Spring Boot) and Angular, incorporating AI-driven tools for
  enhanced productivity. Your work will directly contribute to
  delivering high-quality, secure, and efficient solutions
  that align with the organization’s strategic growth
  objectives. You will collaborate with cross-functional teams
  to develop prototypes, implement new features, and support
  rapid project deliveries in a dynamic environment.
  
  Software Requirements
  
  - Required: Java (latest or version 11+), Spring Boot,
    Angular, TypeScript, JavaScript, Git, Maven, Jenkins, SQL
    (MySQL, Oracle, SQL Server), IDEs (Eclipse, IntelliJ IDEA,
    or NetBeans), CI/CD pipelines (Jenkins, GitLab CI, Azure
    DevOps), AI tools (Amazon Q, Co-pilot or equivalent)
  - Preferred: Cloud platforms (AWS, Azure), Docker, Kubernetes,
    testing frameworks (JUnit, Mockito, Jasmine), web services
    (REST, SOAP), security libraries (OAuth2, JWT)
  - Experience level: 6+ years supporting enterprise development
    with strong frontend and backend skills
  
  Overall Responsibilities
  
  - Design, develop, and maintain scalable Java and Angular-
    based enterprise applications
  - Lead architectural discussions on combining frontend
    (Angular) and backend (Spring Boot) solutions for high
    availability and performance
  - Integrate and leverage AI tools such as Co-pilot or Amazon Q
    for intelligent code assistance and automation support
  - Collaborate across teams to translate project requirements
    into technical specifications and prototypes
  - Write, review, and optimize code for responsiveness,
    security, and maintainability
  - Support continuous integration, automated testing, and
    deployment pipelines for rapid release cycles
  - Troubleshoot and resolve complex issues related to
    application performance, security, and integration
  - Mentor junior team members, fostering best practices in
    coding, testing, and development processes
  - Document system architecture, API specifications, and
    development procedures
  
  Technical Skills (By Category)
  
  - Programming Languages:
    - Essential: Java (version 11+), Angular, TypeScript,
      JavaScript
    - Preferred: Python, Groovy, or other scripting languages for
      automation and integration
  - Frontend Development:
    - Angular (latest version), responsiveness, component-based
      architecture, data binding, Redux/ngrx (preferred)
  - Backend Development:
    - Spring Boot, Spring Cloud, REST/SOAP APIs, Hibernate/JPA,
      microservices architecture
  - Databases/Data Management:
    - SQL: MySQL, Oracle, SQL Server; NoSQL support (MongoDB,
      Redis) is a plus
  - Cloud Technologies:
    - Basic knowledge of deploying applications on AWS or Azure
      (preferred)
  - Frameworks & Libraries:
    - Angular, Spring Boot, REST API, JWT/OAuth2, AI integration
      SDKs (Amazon Q, Co-pilot)
  - Development & Deployment Tools:
    - Git, Jenkins, Maven, Docker, Kubernetes, CI/CD pipelines,
      Agile/Scrum methodologies
  - Security & Protocols:
    - OAuth2, JWT, SSL/TLS, secure coding practices, API security
      standards
  
  Experience Requirements
  
  - At least 6 years of enterprise software development
    experience with Java and Angular
  - Proven experience delivering full-stack solutions in a fast-
    paced environment
  - Hands-on experience integrating frontend and backend
    services with APIs and microservices
  - Experience working with AI-driven tools for software
    development tasks (preferred)
  - Industry experience in finance, banking, fintech, or
    enterprise sectors is advantageous; equivalent large-scale
    enterprise experience accepted
  
  Day-to-Day Activities
  
  - Develop and maintain enterprise-level Java and Angular
    applications supporting business workflows
  - Collaborate in design sessions to align frontend and backend
    architectures with project goals
  - Integrate AI tools such as Amazon Q or Co-pilot into
    development workflows for automation and efficiency
  - Troubleshoot system issues, optimize performance, and
    strengthen application security
  - Support deployment activities, automate build and release
    processes, and monitor system health
  - Conduct code reviews, mentor team members, and ensure
    adherence to best practices in coding and security
  - Maintain technical documentation, API specifications, and
    development standards
  
  Qualifications
  
  - Bachelor’s or Master’s degree in Computer Science, Software
    Engineering, or a related field
  - 6+ years supporting enterprise applications, with experience
    in full-stack Java and Angular development
  - Certifications in Java, cloud platforms, or security
    standards are advantageous
  - Strong problem-solving, troubleshooting, and analytical
    skills
  - Excellent communication skills for stakeholder engagement
    and technical documentation
  - Ability to work independently and lead technical initiatives
  
  Professional Competencies
  
  - Critical thinking and innovative problem-solving for
    scalable interface and backend solutions
  - Leadership and mentorship skills to guide development teams
    and foster best practices
  - Effective communication of complex technical ideas to
    diverse audiences
  - Adaptability in adopting new frameworks, tools, and emerging
    technologies
  - Ownership and accountability for code quality, security, and
    system performance
  - Time management skills to deliver projects on schedule
    within a fast-paced environment
  
