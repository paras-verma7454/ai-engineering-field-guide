  Location(s): US (remote), Boston (hybrid), or New York
  (hybrid)
  
  Bready* to make a change?
  
  Now, more than ever, the Toast team is committed to our
  customers. Our focus is on building the restaurant platform
  that helps restaurants adapt, take control, and get back to
  what they do best: building the businesses they love. And
  because our technology is purpose-built for restaurants, by
  restaurant people, restaurants can trust that we’ll deliver
  on their needs for today while investing in experiences that
  will power their restaurant of the future.
  
  Who We Are
  
  The Voice AI team is responsible for building and advancing
  Toast’s restaurant Voice products, as well as working
  closely with the integrated Websites, Branded App, and
  Online Ordering teams. This group is highly product
  oriented, with a laser-focus on creating top tier Voice-
  driven consumer experiences for restaurants and their
  guests, starting with Voice Ordering and Voice Answering.
  The Voice AI team’s work advances the cutting edge of low-
  latency AI, audio processing, and system architecture to
  provide fast and genuine Voice ordering for our customers.
  The team rigorously measures and iterates on product
  performance to build compelling voice-driven experiences, so
  be prepared to innovate in a new product paradigm on
  products built for massive scale and exacting product
  quality.
  
  About this roll* (Responsibilities)
  
  In this role, your focus will be on improving the core Voice
  AI stack, using your technical chops to influence not just
  the code, but also product and business strategies. This is
  a golden opportunity for a hands-on, entrepreneurial
  engineer who thrives in a modern tech stack environment,
  loves solving real-world problems through technology and AI.
  You’ll identify where you can create impact, run
  experiments, iterate quickly, and have a strong role in
  shaping the future of Voice AI here at Toast. Here’s what
  you’ll be doing:
  
  - Design, scope, and implement cutting-edge solutions using a
    mix of technologies.
  - Raise the bar to boost quality, performance, usability, and
    scalability of the Voice AI product.
  - Collaborate closely with Design and Product stakeholders to
    chase product-market fit.
  - Drive discovery of high-impact opportunities with your team
    and turn them into reality.
  - Be an awesome teammate who’s all in on collaboration and
    collective success.
  - Work across teams to ensure that every part of our product
    ecosystem works seamlessly together to deliver the best
    possible experience for our customers.
  
  Do you have the right ingredients*? (Requirements)
  
  - 5+ years of experience developing fullstack web applications
  - Proficient in backend technologies like Java/Kotlin, and
    Python.
  - Skilled with frontend frameworks like React, and CSS
    frameworks like Tailwind or Bootstrap.
  - Experienced in building on AWS, with tools like Docker and
    Git.
  - Comfortable turning high-fidelity UX designs from Figma into
    reality.
  - Adept at designing databases and architectures that scale
    and perform well.
  - Enthusiastic to employ AI-based tooling to expand impact and
    improve work.
  - Proven at implementing LLMs and AI inference for real-world
    applications by utilizing evolving best practices for AI-
    product building.
  - Thrive in a collaborative, team-based environment where you
    ship features together.
  - Passionate about making users happy and seeing people use
    your product in the wild.
  - Embrace the agile mindset—ship quickly, iterate, and refine.
  
  AI at Toast
  
  At Toast, one of our company values is that we're hungry to
  build and learn. We believe learning new AI tools empowers
  us to build for our customers faster, more independently,
  and with higher quality. We provide these tools across all
  disciplines, from Engineering and Product to Sales and
  Support, and are inspired by how our Toasters are already
  driving real value with them. The people who thrive here are
  those who embrace changes that let us build more for our
  customers; it’s a core part of our culture.
  
  Our Total Rewards Philosophy  We strive to provide
  competitive compensation and benefits programs that help to
  attract, retain, and motivate the best and brightest people
  in our industry. Our total rewards package goes beyond great
  earnings potential and provides the means to a healthy
  lifestyle with the flexibility to meet Toasters’ changing
  needs. Learn more about our benefits at
  https://careers.toasttab.com/toast-benefits.
  
  The base salary range for this role is listed below. The
  starting salary will be determined based on skills and
  experience. In addition to base salary, our total rewards
  components include cash compensation (overtime,
  bonus/commissions, if eligible), benefits, and equity (if
  eligible).
  
  Pay Range
  
  $138,000—$221,000 USD
  
  How Toast Uses AI in its Hiring Process
  
  Throughout the hiring process, our goal is to get to know
  you. We use AI tools to support our recruiters and
  interviewers with tasks like note-taking, summarization, and
  documentation of interviews to ensure they can be fully
  focused on your conversation. All hiring decisions are made
  by people.
  
  Diversity, Equity, and Inclusion is Baked into our Recipe
  for Success
  
  At Toast, our employees are our secret ingredient—when they
  thrive, we thrive. The restaurant industry is one of the
  most diverse, and we embrace that diversity with
  authenticity, inclusivity, respect, and humility. By
  embedding these principles into our culture and design, we
  create equitable opportunities for all and raise the bar in
  delivering exceptional experiences.
  
  We Thrive Together
  
  We embrace a hybrid work model that fosters in-person
  collaboration while valuing individual needs. Our goal is to
  build a strong culture of connection as we work together to
  empower the restaurant community. To learn more about how we
  work globally and regionally, check out:
  https://careers.toasttab.com/locations-toast.
  
  Apply today!
  
  Toast is committed to creating an accessible and inclusive
  hiring process. As part of this commitment, we strive to
  provide reasonable accommodations for persons with
  disabilities to enable them to access the hiring process. If
  you need an accommodation to access the job application or
  interview process, please contact
  candidateaccommodations@toasttab.com.
  
