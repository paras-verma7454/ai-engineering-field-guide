  Company Overview
  
  Wolters Kluwer (EURONEXT: WKL) is a global leader in
  professional information, software solutions, and services
  for the healthcare, tax and accounting, financial and
  corporate compliance, legal and regulatory, and corporate
  performance and ESG sectors. We help our customers make
  important decisions every day by providing expert solutions
  that combine deep domain knowledge with specialized
  technology and services.
  
  Wolters Kluwer reported 2022 annual revenues of €5.5
