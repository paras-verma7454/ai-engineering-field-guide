  About the Role:
  
  Take your software engineering career to the next level as a
  Senior Product Software Engineer. You will play a key role
  in designing, developing, and troubleshooting software
  programs. Your technical skills and innovative mindset will
  contribute to the continuous improvement of our products,
  making a significant impact on user experience and
  satisfaction.
  
  Hybrid: Eight days a month we come together in the closest
  office (NYC) within 50 miles to experience the value of
  connecting with colleagues. You will report to the Manager,
  Product Software Engineering and work under the leadership
  of the Director, Product Software Engineering. This role is
  a part of DXG | FCC CT Corporation - Wolters Kluwer. Please
  view the site office location directory for potential office
  preferences nationwide. | https://bit.ly/Find_A_WK_Office |
