description: |
  Job Family:
  
  Data Science Consulting
  
  Travel Required:
  
  Up to 10%
  
  Clearance Required:
  
  None
  
  What You Will Do:
  
  We are seeking an AI Developer to help design, build, and
  deliver AI solutions, especially Generative AI, for clients
  modernizing their operations through intelligent automation.
  You will work alongside senior technical leads and client
  teams to develop functional AI prototypes, integrate data
  and models, and help translate emerging technologies into
  practical business value. This role blends hands-on
  development with consulting, ideal for someone who enjoys
  solving complex problems through applied AI.
  
  AI Delivery
  
  - Support the design and development of Generative AI Minimum
    Viable Products (MVPs) that address real client
    challenges.
  - Build and test backend AI components that combine data,
    logic, and model reasoning into functional workflows.
  - Contribute to architecture and implementation plans, helping
    connect models, data sources, and business processes.
  - Participate in scenario-based testing and model validation
    to ensure reliable and explainable outcomes.
  
  Collaboration
  
  - Work as part of an agile team, contributing to sprint
    planning, backlog prioritization, and client
    demonstrations.
  - Collaborate closely with the Senior AI Development Lead to
    align technical delivery with engagement goals.
  - Help document solutions, capture lessons learned, and
    develop reusable assets for future AI engagements.
  
  Technical Advisory
  
  - Stay current on advancements in Generative AI, bringing
    forward practical ideas and tools that enhance delivery
    quality.
  - Engage with client stakeholders to understand workflows,
    data sources, and decision processes.
  - Contribute to assessments of AI readiness, development
    toolchains, and opportunities for automation.
  - Support post-MVP feedback and enhancement activities,
    ensuring that solutions can evolve toward production
    deployment.
  
  What You Will Need:
  
  - A bachelor’s degree is required
  - Minimum FIVE (5) years of experience in AI, software, or
    data-driven solution development, including work with
    Generative AI or NLP applications
  - Understanding of cloud environments (e.g. Azure, Amazon Web
    Services) and DevOps for AI development and deployment
  - Proficiency in Python and experience building or integrating
    AI-based systems
  - Experience with key Generative AI system patterns, such as:
    - RAG (Retrieval-Augmented Generation) and retrieval-based
      reasoning systems
    - Agentic frameworks (e.g., orchestrated multi-step reasoning,
      tool-using AI agents)
    - Evaluation and observability frameworks (e.g., LLM/human
      evals, prompt testing, reliability scoring)
    - Model monitoring and retraining pipelines
  - Demonstrated ability to work collaboratively in agile teams
    and communicate effectively with both technical and non-
    technical audiences
  
  What Would Be Nice To Have:
  
  - Experience designing or deploying solutions with Amazon
    Bedrock, SageMaker, or other AWS AI services
  - Understanding of AI governance and risk management
    frameworks
  - Experience supporting clients in regulated or complex
    environments (e.g., energy, infrastructure, public sector)
  
  The annual salary range for this position is
  $102,000.00-$170,000.00. Compensation decisions depend on a
  wide range of factors, including but not limited to skill
  sets, experience and training, security clearances,
  licensure and certifications, and other business and
  organizational needs.
  
  What We Offer:
  
  Guidehouse offers a comprehensive, total rewards package
  that includes competitive compensation and a flexible
  benefits package that reflects our commitment to creating a
  diverse and supportive workplace.
  
  Benefits include:
  
  - Medical, Rx, Dental & Vision Insurance
  - Personal and Family Sick Time & Company Paid Holidays
  - Position may be eligible for a discretionary variable
    incentive bonus
  - Parental Leave and Adoption Assistance
  - 401(k) Retirement Plan
  - Basic Life & Supplemental Life
  - Health Savings Account, Dental/Vision & Dependent Care
    Flexible Spending Accounts
  - Short-Term & Long-Term Disability
  - Student Loan PayDown
  - Tuition Reimbursement, Personal Development & Learning
    Opportunities
  - Skills Development & Certifications
  - Employee Referral Program
  - Corporate Sponsored Events & Community Outreach
  - Emergency Back-Up Childcare Program
  - Mobility Stipend
  
