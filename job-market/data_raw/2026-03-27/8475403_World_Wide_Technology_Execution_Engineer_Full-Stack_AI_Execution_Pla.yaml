description: |
  Job Summary & Responsibilities
  
  Required Qualifications
  
  - 4+ years of hands-on software development experience
  
  - Strong coding fundamentals and the ability to debug and
    improve unfamiliar codebases
  
  - Experience with at least one low-code / automation platform
    (Boomi, Power Automate, Power Apps, etc.)
  
  - Experience using AI coding tools (Copilot, Cursor, ChatGPT,
    etc.) to accelerate development
  
  - Experience building APIs, integrations, or workflow
    automation
  
  - Working knowledge of relational databases and SQL
  
  - Strong Git and modern development practices
  
  - Strong written communication and documentation habits
  
  
  
  Preferred Qualifications
  
  - Experience with Boomi iPaaS in production
  
  - Familiarity with CI/CD pipelines and cloud deployments
    (Azure preferred)
  
  - Experience building dashboards, portals, or lightweight UI
    components
  
  - Experience applying AI in workflows (prompting, RAG,
    orchestration, copilots)
  
  
  
  What We Value Most
  
  - Builder mentality: ship quickly, iterate often
  
  - Pragmatic engineering: quality without gold-plating
  
  - Curiosity and willingness to explore new AI and automation
    capabilities
  
  - Comfort working in a fast-moving environment with changing
    priorities
  
  - Ownership: you build it, you help operationalize it
  
  Want to learn more about Solutions Consulting & Engineering?
  Check us out on our platform:
  https://www.wwt.com/community/scande/about
  
