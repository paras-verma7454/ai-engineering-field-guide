  Preferred Qualifications
  
  Why WWT
  
  At World Wide Technology, we work together to make a new
  world happen. Our important work benefits our clients and
  partners as much as it does for our people and communities
  across the globe. WWT is dedicated to achieving its mission
  of creating a profitable growth company that is also a Great
  Place to Work for All. We achieve this through our world-
  class culture, generous benefits, and by delivering cutting-
  edge technology solutions for our clients.
  
  Founded in 1990, WWT is a global technology solutions
  provider leading the AI and Digital Revolution. WWT combines
  the power of strategy, execution, and partnership to
  accelerate digital transformational outcomes for
  organizations around the globe. Through its Advanced
  Technology Center, a collaborative ecosystem of the world's
  most advanced hardware and software solutions, WWT helps
  clients and partners conceptualize, test and validate
  innovative technology solutions for the best business
  outcomes and then deploys them at scale through its global
  warehousing, distribution and integration capabilities.
  
  With over 14,000 employees across WWT and Softchoice and
  more than 60 locations around the world, WWT's culture,
  built on a set of core values and established leadership
  philosophies, has been recognized 14 years in a row by
  Fortune and Great Place to Work® for its unique blend of
  determination, innovation and creating a great place to work
  for all.
  
  
  
  Want to work with highly motivated individuals on high-
  performance teams? Join WWT today!
  
  What is the Solutions Consulting & Engineering Team and why
  join?
  
  Solutions Consulting & Engineering is an organization that
  is customer-focused and solutions-led. We deliver end-to-end
  and emerging solutions to drive customer satisfaction and
  increase profitability and growth. Our world-class
  management consulting, delivery excellence, and engineering
  brilliance enable our success. We embody the OneWWT mindset
  by bringing the right talent at the right time from anywhere
  within WWT to solve our customer’s problems. Our goal is to
  bring together business acumen with full-stack technical
  know-how to develop innovative solutions for our clients’
  most complex challenges.
  
  About the Role
  
  WWT is building an execution-focused engineering team
  responsible for AI Execution Platforms—repeatable apps,
  workflows, and integrations that materially improve customer
  delivery execution.
  
  This role is not focused on employee productivity tooling.
  It focuses on delivery of execution systems that live months
  or quarters, are reused across projects, and must be
  observable and supportable.
  
  
  
  As an Execution Engineer, you will build end-to-end
  solutions spanning workflow automation, integration, APIs,
  data, and UI when needed. You will use AI coding tools to
  accelerate delivery while maintaining strong engineering
  discipline.
  
  
  
  Candidates must be comfortable working in a rapidly evolving
  AI and automation landscape and continuously adapting their
  approach as tools and best practices change.
  
  
  
  Key Responsibilities
  
  - Build and maintain AI-enabled delivery workflows,
    integrations, and applications
  
  - Deliver solutions using a mix of:
  
  - Traditional coding (APIs, services, data)
  
  - Low-code platforms (Boomi, Power Platform)
  
  - AI-assisted development tooling
  
  - Create reusable patterns and assets for repeatable delivery
    outcomes
  
  - Ship with operability in mind: logging, monitoring,
    runbooks, and rollback
  
  - Participate in sprint execution, reviews, and iterative
    improvement
  
  - Collaborate with time-boxed contractors and internal SMEs,
    producing clean handoffs and documentation
