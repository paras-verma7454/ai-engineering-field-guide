  Job Summary
  
  To support our extraordinary teams who build great products
  and contribute to our growth, we’re looking to add an Senior
  AI Developer (Python + AI/ML) located in Chennai location.
  
  Reports to the Manager, and the role involves,
  
  What a typical day looks like:
  
  - Design, develop, and deploy AI / Agentic AI solution using
    Python and CrewAI
  - Build and manage multi-agent workflows for complex problem-
    solving
  - Ability to translate business requirements into AI-driven
    solutions
  - Analyze data and generate actionable insights to support
    decision-making
  - Optimize and maintain AI models and agent performance
  - Document solutions, workflows, and best practices.
  
  The experience we’re looking to add to our team:
  
  - Bachelor’s degree in engineering or bachelor’s in technology
    (Preferably in Computer science, AI/ML)
  - 4 - 6 years of experience in delivering AI / ML or Analytics
    solutions.
  - Strong educational or professional background in Python,
    AI/ML frameworks, hands on work experience in Agentic AI
    solutions
  - Python – Strong proficiency in writing clean, efficient, and
    scalable code
  - Agentic AI – Experience designing autonomous, goal-driven AI
    agents
  - CrewAI – Hands-on experience building multi-agent workflows
    and AI orchestration
  - Understanding of AI/ML concepts, prompt engineering, and
    LLM-based applications
  - Sound communication and problem-solving skills
  - Curiosity to learn new solutions and tech stacks.
  - Certification in AI/ML from reputed institutions.
  
  Good-to-Have Skills:
  
  - SQL – Ability to query and manipulate structured data.
  - Tableau – Experience creating insightful data visualizations
    and dashboards.
  - Exposure to data pipelines, APIs, or cloud-based AI services
  
