  About Turvo:
  
  Turvo provides a collaborative Transportation Management
  System (TMS) application designed specifically for the
  supply chain. Turvo Collaboration Cloud connects freight
  brokers, 3PLs, shippers, and carriers to unite supply chain
  ecosystems, delivering outstanding customer experiences,
  real-time collaboration, and accelerated growth. The
  technology unifies internal and external systems, providing
  one end-to-end solution that streamlines operations,
  enhances analytics, and automates business processes while
  eliminating redundant manual tasks. Turvo’s customers
  include some of the world’s largest Fortune 500 logistics
  service providers and shippers as well as small to mid-sized
  freight brokers.
  
  
  
  Turvo is based in Dallas, Texas, with offices in Hyderabad,
  India. (www.turvo.com).
  
