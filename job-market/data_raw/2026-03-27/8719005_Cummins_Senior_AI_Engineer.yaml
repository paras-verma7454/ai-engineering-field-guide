description: |
  Job Summary:
  
  Provides application or infrastructure technical expertise,
  analysis and specifications for IT systems to meet business
  requirements in accordance with IT architecture policies and
  standards; translate requirements into technical
  specifications, create detailed solution design, coordinate
  construction, installation, configuration and testing of IT
  systems; and identifies, troubleshoots and resolves system
  technical issues.
  
  Key Responsibilities:
  
  Assists in creating and managing the technical
  specifications from which programs and configurations will
  be applied to create the application, infrastructure or
  complete solution. Assists in technical analysis of
  potential solutions including evaluating the technical fit
  and viability of commercial-of-the-shelf products versus
  custom built solution. Delivers solution design, adhering to
  standards and leveraging re-use of components. Assists in
  creating high level and detail design of infrastructure OR
  applications, interfaces, conversions, extensions, reports,
  and workflows while meeting architecture, security,
  performance, scalability, and maintainability requirements.
  Assists technical and infrastructure groups in understanding
  the solution design and specifications. Works closely with
  IT technical service providers to ensure outsourced work
  packages are delivered to specifications, meeting key
  parameters of quality, schedule, cost, security,
  performance, and scalability. Participates in formal design
  reviews and code reviews (where applicable) to ensure the
  detailed design specifications have been understood and
  coding standards have been adhered to by the development
  team(s). Leverages re-usability of component designs to
  reduce costs and shorten time to deliver solution Ensures
  adherence to obtain efficiency in the build and deploy
  processes, leveraging automation where possible. Assists in
  the test strategy and execution of master test plan.
  Participates in the creation of standards, processes,
  procedures, and guidelines for the IT design and development
  community as well work instructions or ‘runbooks’ used for
  end-user support. Analyzes and revises existing systems and
  documentation to identify remediation or improvements in the
  application or infrastructure solution. Provides level 3
  support for critical issues.
  
  Responsibilities
  
  Competencies:  Customer focus - Building strong customer
  relationships and delivering customer-centric solutions.
  Global perspective - Taking a broad view when approaching
  issues, using a global lens. Manages complexity - Making
  sense of complex, high quantity, and sometimes contradictory
  information to effectively solve problems. Manages conflict
  - Handling conflict situations effectively, with a minimum
  of noise. Optimizes work processes - Knowing the most
  effective and efficient processes to get things done, with a
  focus on continuous improvement. Data Modeling - Creates,
  writes and tests data models, test scripts and build scripts
  using industry standards and tools, version control, and
  build and test automation to meet business, technical,
  security, governance and compliance requirements.
  Performance Tuning - Conceptualizes, analyzes and solves
  application, database and hardware problems using industry
  standards and tools, version control, and build and test
  automation to meet business, technical, security, governance
  and compliance requirements. Solution Configuration -
  Configures, creates and tests a solution for commercial off-
  the-shelf (COTS) applications using industry standards and
  tools, version control, and build and test automation to
  meet business, technical, security, governance and
  compliance requirements. Solution Design - Creates and
  defines the solution design complete with instrumentation
  and measurement, using industry standards and tools, version
  control, and build and test automation to synthesize
  diagrams, models and documentation in order to build a
  solution that meets buildability, business, technical,
  security, governance and compliance requirements. Solution
  Functional Fit Analysis - Composes and decomposes a system
  into its component parts using procedures, tools and work
  aides for the purpose of studying how well the component
  parts were designed, purchased and configured to interact
  holistically to meet business, technical, security,
  governance and compliance requirements. Solution Modeling -
  Creates, designs and formulates models, diagrams and
  documentation using industry standards, tools, version
  control, and build and test automation to meet business,
  technical, security, governance and compliance requirements.
  Solution Validation Testing - Validates a configuration item
  change or solution using the Function's defined best
  practices, including the Systems Development Life Cycle
  (SDLC) standards, tools and metrics, to ensure that it works
  as designed and meets customer requirements. Values
  differences - Recognizing the value that different
  perspectives and cultures bring to an organization.
  Education, Licenses, Certifications: College, university, or
  equivalent degree in Computer Science, Information
  Technology, Business, or related subject, or relevant
  equivalent experience required. This position may require
  licensing for compliance with export controls or sanctions
  regulations. Experience: Intermediate level of relevant work
  experience required. 3-5 years of experience.
  
  Qualifications
  
  Key Responsibilities: • Design and deploy agent-based
  systems using LangChain, LlamaIndex, and Python/Java,
  LangGraph, CrewAI, AutoGen • Optimize LLM performance for
  high-throughput environments using quantization, model
  pruning, and cloud-native deployment • Implement and
  orchestrate tools, memory, and planning components in agent
  workflows. • Optimize LLM performance for high-throughput
  environments using quantization, model pruning, and cloud-
  native deployment • Implement tracing, logging, and
  monitoring for agent decisions to ensure transparency
  
  Required Skills: • Strong Python experience to build
  multiple GenAI / Agentic AI Solutions. • Should have worked
  Copilot and ChatGPT • Should have experience working on
  Agent orchestration with leading frameworks like LangGraph,
  LangChain, Semantic Kernel, CrewAI, AutoGen. • Should have
  experience on evaluation & observability • Experience
  working on SQL Query, NLP, CV, Deep Learning Algorithms •
  Should have working experience with Open Source Models
  
  Experience: • Overall 8 - 10 years' experience in
  Manufacturing domain with 3-5 years in Generative AI /
  Agentic AI • Experience of PLM (Windchill Preferred) •
  Delivered at least 2 GenAI/Agentic AI solutions for clients
  • Extensive experience of minimum 6+ years on Python • Led
  2–3 successful POCs/MVPs for Business • Led team of minimum
  3 AI Engineers
  
