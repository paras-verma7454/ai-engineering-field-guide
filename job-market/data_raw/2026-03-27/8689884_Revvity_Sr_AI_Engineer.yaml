description: |
  Job TitleSr. AI Engineer Location(s)Krakow, Mumbai
  
  About Us
  
  Revvity is a developer and provider of end-to-end solutions
  designed to help scientists, researchers, and clinicians
  solve the world’s greatest health challenges. We pair the
  enthusiasm of an industry disruptor with the experience of a
  longtime leader. Our team of 11,000+ colleagues from around
  the globe are vital to our success and the reason we’re able
  to push boundaries in pursuit of better human health.
  
  Find your future at Revvity
  
  Our dedicated team is pioneering the integration of AI-
  driven technologies to help our employees work smarter,
  faster, and more innovatively. We're committed to
  responsible AI development that improves business outcomes
  while upholding our core values. If you're seeking a
  meaningful, impactful, and stimulating internship in
  enterprise AI application, this is your opportunity to make
  a difference.
  
  About you: You're passionate about artificial intelligence,
  with a particular interest in how generative AI and large
  language models (LLMs) can transform business operations.
  You embody our core values:
  
  Embrace the unknown: You start each day with a "What if?"
  mindset, ready to explore how AI can revolutionize
  traditional business processes.
  
  Partner with purpose: You're excited to work alongside
  diverse teams, using AI to accelerate positive outcomes
  across all departments. Passion for people: You understand
  that AI's true potential lies in augmenting human
  capabilities, not replacing them. Collaborate for success:
  You thrive in team environments, putting collective goals
  before individual recognition, and valuing transparency and
  integrity in your work.
  
  You're a self-starter, comfortable with ambiguity, and
  excited by the prospect of applying cutting-edge AI
  technologies to real-world business challenges.
  
  What you'll do: Within 30 days
  
  - Complete onboarding, gaining familiarity with our enterprise
    systems and ongoing AI initiatives
  - Provide feedback on your onboarding experience, embodying
    our value of continuous improvement
  - Build relationships across various departments to understand
    their unique challenges and AI opportunities
  - Gain a basic understanding of our business operations and
    how AI can enhance productivity
  
  Beyond 60 days
  
  - Develop prototypes and proof-of-concepts for AI-powered
    features that can boost employee productivity and
    creativity
  - Contribute to the development of prompt engineering
    strategies for various business applications
  - Participate in creating AI-driven tools that can be
    integrated into our existing workflow systems
  - Collaborate on AI model integration projects, ensuring
    seamless user experiences across different platforms
  - Assist in evaluating and benchmarking AI performance against
    business KPIs and user satisfaction metrics
  - Present your work and findings to stakeholders, translating
    complex AI concepts for both technical and non-technical
    audiences
  
  Requirements:
  
  - Strong interest in enterprise AI applications
  - Familiarity with popular LLMs such as ChatGPT, Claude, or
    others
  - Familiarity with python, Next.JS, Docker and full stack
    technologies
  - Basic understanding of prompt engineering concepts
  - Deep understanding of data modeling, system architectures,
    and processing techniques.
  - Experience with AWS cloud services and SageMaker Studio for
    scalable data processing and model development
  - Proficiency in at least one programming language (js
    preferred)
  - Ability to work in a fast-paced, rapidly changing
    environment
  - Strong problem-solving skills and meticulous attention to
    detail
  - Excellent communication skills, both written and verbal
  - Bonus: Understanding of business processes and enterprise
    software systems
  
  Our Values in Action:
  
  - Embrace the unknown: Be prepared to tackle unprecedented
    challenges in applying AI to diverse business functions.
  - Partner with purpose: Collaborate closely with employees
    across all levels to understand and meet their AI-driven
    needs.
  - Passion for people: Focus on developing AI solutions that
    empower and uplift our workforce.
  - Collaborate for success: Embrace teamwork, transparency, and
    integrity as we integrate AI into our corporate culture.
  
  Using the “OCEAN” model which stands for Openness,
  Conscientiousness, Extraversion, Agreeableness and
  Neuroticism, we’re looking for the following personality
  traits: Openness – The ability to take on new challenges and
  learn new things.
  
  Conscientiousness – The ability to work independently and
  deliver high-quality work. Extraversion – The ability to
  communicate directly with customers and users, and to
  present your work clearly and effectively to different
  stakeholders as needed. Agreeableness – Be kind and
  thoughtful. We value people who are respectful of others and
  who are willing to jump in and help where and when needed.
  Neuroticism – Although we try and minimize stress levels,
  there will be deadlines to meet. Plans can change, so the
  ability to pivot and adapt to changing priorities will be
  important.
