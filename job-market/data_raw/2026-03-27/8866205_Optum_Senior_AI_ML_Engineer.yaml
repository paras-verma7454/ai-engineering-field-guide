description: |
  Requisition Number: 2351078 Optum is a global organization
  that delivers care, aided by technology to help millions of
  people live healthier lives. The work you do with our team
  will directly improve health outcomes by connecting people
  with the care, pharmacy benefits, data and resources they
  need to feel their best. Here, you will find a culture
  guided by inclusion, talented peers, comprehensive benefits
  and career development opportunities. Come make an impact on
  the communities we serve as you help us advance health
  optimization on a global scale. Join us to start Caring.
  Connecting. Growing together. Primary Responsibilities:
  
  - Collaborate with AI Architects, Cloud Engineers, and a CRM
    Development Team to design and implement machine learning
    models and systems
  - Work with GenAI models like Gemini, GPT4, as well as
    traditional machine learning models from the NLP/Deep
    Learning discipline
  - Retrain existing models and systems to ensure their accuracy
    and efficiency
  - Evaluate machine learning models and ensure they adhere to
    ethical standards
  - Stay current with the latest trends and technologies in
    machine learning and artificial intelligence
  - Provide technical support and guidance to the development
    team on machine learning-related issues
  - Troubleshoot any issues related to the machine learning
    systems and conduct regular system tests to ensure their
    functionality and efficiency
  - Document all procedures and systems related to the machine
    learning infrastructure for future reference and audits
  - Comply with the terms and conditions of the employment
    contract, company policies and procedures, and any and all
    directives (such as, but not limited to, transfer and/or
    re-assignment to different work locations, change in teams
    and/or work shifts, policies in regards to flexibility of
    work benefits and/or work environment, alternative work
    arrangements, and other decisions that may arise due to
    the changing business environment). The Company may adopt,
    vary or rescind these policies and directives in its
    absolute discretion and without any limitation (implied or
    otherwise) on its ability to do so
  
  Required Qualifications:
  
  - Bachelor's degree in Computer Science / Information
    Technology / Computer Engineering from a recognized
    university or equivalent experience
  - Proven experience as a Machine Learning Engineer or similar
    role in the industry
  - Experience working with AI technologies and cloud platforms
    (Google Cloud Platform, GCP)
  - Solid knowledge of GenAI models like Gemini, GPT4, and
    traditional machine learning models from the NLP/Deep
    Learning discipline
  - Proficiency in Python development
  - Proven excellent problem-solving and troubleshooting skills
  - Demonstrated ability to work collaboratively with a diverse
    team of engineers, architects, and developers
  
  Preferred Qualifications:
  
  - Machine Learning certifications
  - Experience in a Healthcare Payer enterprise
  - Experience in training team members on machine learning
    technologies and applications
  - Knowledge of data privacy regulations and practices
  - Proficient in CRM platforms, such as Salesforce
  - Proven solid communication and project management skills
  
  At UnitedHealth Group, our mission is to help people live
  healthier lives and make the health system work better for
  everyone. We believe everyone-of every race, gender,
  sexuality, age, location and income-deserves the opportunity
  to live their healthiest life. Today, however, there are
  still far too many barriers to good health which are
  disproportionately experienced by people of color,
  historically marginalized groups and those with lower
  incomes. We are committed to mitigating our impact on the
  environment and enabling and delivering equitable care that
  addresses health disparities and improves health outcomes -
  an enterprise priority reflected in our mission.
