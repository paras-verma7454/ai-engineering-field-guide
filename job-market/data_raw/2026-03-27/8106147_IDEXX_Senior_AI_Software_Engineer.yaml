description: |
  IDEXX is looking for a Senior AI Engineer to join a brand
  new, greenfield team focused on leveraging AI for developer
  enablement and tooling.
  
  As we scale our engineering tribes to solve complex
  challenges in this mission-driven space, we're seeking a
  Senior AI Software Engineer who thrives on leveraging AI to
  transform how teams build and innovate.
  
  At IDEXX Veterinary Software, we're pioneering the first
  vertical SaaS platform for Animal Health—empowering
  veterinarians worldwide with intelligent tools that save
  lives and advance care.
  
  In this high-impact role, you'll lead the charge in creating
  AI-driven systems, tools, and developer experiences that
  accelerate software development, eliminate friction, and
  infuse joy into the process. Drawing on the latest in
  generative AI, machine learning, and agentic systems, you'll
  prototype intelligent workflows, optimize cross-team
  collaboration, and drive adoption of cutting-edge tooling.
  With significant ownership, you'll shape the future of our
  engineering culture while advancing AI capabilities that
  directly benefit our customers—such as autonomous agents
  that streamline veterinary diagnostics and workflows.
  
  What You'll Do
  
  - Architect AI-Powered Developer Tools: Design and implement
    scalable AI systems using modern ML frameworks (e.g.,
    PyTorch, TensorFlow) to automate code generation,
    debugging, and testing—making development faster, more
    intuitive, and enjoyable for our teams.
  - Pioneer Agentic AI Innovations: Advance autonomous AI agents
    capable of independent decision-making and problem-
    solving, integrating them into our SaaS platform to
    deliver real value, like predictive analytics for animal
    health data or adaptive user experiences.
  - Enhance Engineering Workflows and Experiences: Collaborate
    across tribes to identify bottlenecks, prototype AI-
    enhanced solutions (e.g., natural language interfaces for
    DevOps tasks), and foster best-in-class practices—while
    mentoring junior engineers and influencing strategic
    roadmaps.
  
  What you need to succeed: 
  
  - 5+ years of software engineering experience, with at least
    2+ years focusing on Developer Experience or developer
    tooling.
  - Deep understanding of software development workflows, CI/CD,
    source control (Git), testing, and automation.
  - Hands-on experience integrating AI/ML models into
    engineering processes (e.g., LLMs like OpenAI, Anthropic,
    open-source LLMs).
  - Proficiency in backend development (e.g., Python, Go,
    Node.js) and scripting languages.
  - Experience building plugins or extensions for developer
    tools (e.g., VS Code, GitHub Apps, CLI tools).
  - Strong communication skills and empathy for developer pain
    points.
  - Bias for action — you turn insights into working solutions
    quickly and iteratively.
  
  Bonus Points
  
  - Experience building with AI platforms (OpenAI, Hugging Face,
    LangChain, etc.).
  - Experience working in platform engineering, productivity
    engineering, or DevOps.
  - Prior contributions to open-source developer tools.
  - Familiarity with observability and performance tooling.
  - Background in machine learning, natural language processing,
    or prompt engineering.
  
  Our teams build with modern web technologies like TypeScript
  and Go, embracing cloud-native architectures, event-driven
  systems, domain services, containerization, and distributed
  computing. We prioritize DevOps excellence through CI/CD
  pipelines, infrastructure as code, and reliability
  engineering, ensuring AI integrations are robust and
  performant in a fast-paced environment.
  
  If you're a senior AI leader passionate about pushing
  boundaries—whether through generative models for creative
  problem-solving or scalable agentic systems—and excited to
  apply your expertise to a domain with profound impact (like
  improving animal health outcomes), join us in making
  veterinary software smarter and more accessible.
  
  Apply now and help us redefine AI's role in animal
  healthcare innovation!
  
  So, what is IDEXX Veterinary Software?  
  
  At IDEXX we are dedicated to enhancing the health and well-
  being of pets, people, and livestock around the world.
  Through the power of the cloud, IDEXX Veterinary Software
  solutions simplify the flow of information across any
  practice and link vets to what they need when they need it.
  Patient data. Client communications. Business insights. All
  at their fingertips.
  
  Our journey is solving veterinary practices’ most pressing
  needs by focusing on innovation to drive meaningful
  improvements in animal health.
  
  IDEXX values a diverse workforce and workplace and strongly
  encourages women, people of color, LGBTQ+ individuals,
  people with disabilities, members of ethnic minorities,
  foreign-born residents, and veterans to apply. IDEXX is an
  equal opportunity employer. Applicants will not be
  discriminated against because of race, color, creed, sex,
  sexual orientation, gender identity or expression, age,
  religion, national origin, citizenship status, disability,
  ancestry, marital status, veteran status, medical condition,
  or any protected category prohibited by local, state, or
  federal laws.
  
