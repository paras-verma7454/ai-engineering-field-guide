description: |
  Global Strategy Group (GSG) is a leading public opinion
  research and communications firm working at the intersection
  of politics, policy, and public affairs. Our research team
  partners with campaigns, advocacy organizations,
  corporations, and foundations to generate actionable
  insights that shape strategy and win complex battles.
  
  
  
  We are seeking a hands-on AI Workflow & Automation Engineer
  to design, build, and deploy internal tools that automate
  and enhance our survey research workflows using AI. The goal
  is to reduce manual processing time, improve consistency,
  and enable our analysts to focus on strategic insight and
  client impact.
  
  
  
  This is a temporary, project-based consulting engagement
  focused on delivering a defined set of internal automation
  tools in an exciting election year. This is a high-impact,
  execution-focused opportunity for a strong engineer who can
  quickly translate research processes into reliable,
  maintainable systems. This role is focused on building
  working tools — not just experimenting with AI.
  
  This is a new (temporary) role that is expected to support
  the team through the end of 2026.
  
  Responsibilities
  
  - AI-Powered Workflow Development: Design and implement
    production-ready tools that integrate LLMs and other
    automation techniques into research workflows.
  - Software Engineering & Architecture: Write modular,
    testable, maintainable Python code grounded in strong
    engineering principles.
  - Data Processing & Automation: Build reproducible pipelines
    that transform raw data into structured, analysis-ready
    outputs, with validation and logging built in.
  - APIs & System Integration: Develop services and integrations
    that connect survey platforms, databases, and AI
    components.
  - Model Evaluation & QA: Implement structured testing and
    evaluation frameworks to validate automated outputs and
    preserve methodological rigor.
  - Internal Tooling: Build lightweight tools or interfaces that
    enable researchers to interact seamlessly with automated
    systems.
  
  Qualifications
  
  - Required
  - Strong programming skills in Python (required)
  - Experience building automated workflows, data pipelines, or
    internal tools
  - Experience integrating LLM APIs or similar AI systems into
    production workflows
  - Understanding of APIs and system integrations
  - Experience working with structured and unstructured data
  - Ability to design clean, maintainable systems (not just
    scripts)
  - Clear communicator who can collaborate effectively with non-
    technical teams
  - Preferred
  - Experience with survey data, polling, or quantitative
    research workflows
  - UI/UX/front end design or implementation experience
  - SQL and database experience (e.g., Redshift, Postgres,
    BigQuery, Snowflake)
  - Familiarity with Git/version control
  - Experience building evaluation frameworks for AI systems
  - Experience in political polling or public opinion research
  
  The base salary for this position is between $10,000 to
  $15,000 per month  commensurate with experience. GSG
  provides a comprehensive benefits package including
  excellent coverage for medical, vision, and dental
  insurance.
  
  
  
  If this sounds like an opportunity for you, please send your
  information our way!
  
  
  
  When submitting your resume, please include a cover letter
  which highlights your relevant experience, along with why
  you want to be part of the team at GSG. We are interested in
  candidates who align with our mission and want to contribute
  to our continued growth.
  
  
  
  Candidates who match the needs for the position will be
  contacted via email.
  
  
  
  If you are an individual with a disability and would like to
  request a reasonable accommodation to complete your online
  application or participate in the interview process, please
  reach out to hr@globalstrategygroup.com or you may call
  (212) 260-8813 and ask to speak to someone in Human
  Resources – Talent Acquisition.
  
  Global Strategy Group, LLC.
  
  Global Strategy Group (GSG) is a full-service research,
  public affairs, and communications agency tackling some of
  today’s most complex and important challenges. With more
  than two and half decades of experience and a team of 150+
  talented professionals, we protect and build corporate
  reputations, influence public affairs decision makers,
  advocate on important social issues, and win campaigns. We
  combine unparalleled subject matter expertise with data-
  driven insights and innovative methodologies to generate
  urgency among stakeholders and key audiences, delivering
  tangible success for our clients.
  
  
  
