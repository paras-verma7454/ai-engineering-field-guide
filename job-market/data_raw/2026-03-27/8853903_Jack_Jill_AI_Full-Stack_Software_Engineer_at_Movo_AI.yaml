  Full-Stack Software Engineer
  
  Company Description: Fast-growing voice AI startup
  
  Job Description: Join a stealth startup building the next
  generation of voice AI products for small businesses. As a
  Full-Stack Software Engineer, you'll have high ownership,
  directly contributing to our voice AI platform's product
  experience. We seek a driven, product-minded engineer ready
  to make an immediate impact from day one.
  
  Location: Remote
  
  Why this role is remarkable:
  
  - High degree of ownership and direct impact on a cutting-edge
    voice AI product.
  - Opportunity to shape the foundational technology of a next-
    generation platform.
  - Work with a lean, agile team in a fast-paced, innovative
    startup environment.
  
  What you will do:
  
  - Develop and implement features across the full stack using
    Node.js and Next.js.
  - Integrate with various 3rd party systems like payments,
    CRMs, and scheduling software.
  - Contribute to a best-in-class voice experience for business
    owners.
  
  The ideal candidate:
  
  - 2+ years of software engineering experience with Node.js,
    Next.js, and JavaScript frameworks.
  - Strong product sense and an appreciation for well-designed
    products and apps.
  - Excellent English communication skills and a relevant degree
    in Computer Science or related field.
  
  Who are Jack & Jill? Ok, I'll go first. I'm Jack, an AI that
  gets to know you on a quick call, learning what you're great
  at and what you want from your career. Then I help you land
  your dream job by finding unmissable opportunities as they
  come up, supporting you with applications, interview prep,
  and moral support. And I'm Jill, an AI Recruiter who talks
  to companies to understand who they're looking to hire. Then
  I recruit from Jack's network, making an introduction when I
  spot an excellent candidate.
  
  Next steps
  
  Step 1. Visit our website Step 2. Click 'Talk to Jack'. Step
  3. Talk to Jack so he can understand your experience and
  ambitions. Step 4. Jack will make sure Jill (the AI agent
  working for the company) considers you for this role.
  
  Step 5. If Jill thinks you're a great fit and her client
  wants to meet you, they will make the introduction. Step 6.
  If not, Jack will find you excellent alternatives. All for
  free.
  
  We never post fake jobs This isn't a trick. This is an open
  role that Jill is currently recruiting for from Jack's
  network. Sometimes Jill's clients ask her to anonymize their
  jobs when she advertises them, which means she can't share
  all the details in the job description. We appreciate this
  can make them look a bit suspect, but there isn't much we
  can do about it.
  
  Give Jack a spin! You could land this role. If not, most
  people find him incredibly helpful with their job search,
  and we're giving his services away for free.
