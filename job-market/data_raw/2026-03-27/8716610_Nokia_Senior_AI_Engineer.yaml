description: |
  The Nokia CNS AI R&D (AIRD) team's mission is to invent and
  deploy the next generation of intelligent, generative AI,
  and ML technologies that will define the future of Nokia.
  This team represents a major investment and consolidation of
  our AI efforts, created to move from siloed features to a
  unified and powerful product & platform portfolio. We are
  the future powerhouse for driving the of Nokia's future
  business growth and building a suit of technologies that is
  recognized externally as best-in-class.
  
  Responsibilities
  
  - Design, develop, and deploy advanced AI/ML models and
    algorithms to analyze and interpret complex data.
  - Design and implement machine learning models to improve a
    wide range of applications including search, forecasting,
    text mining and more.
  - Develop and implement agentic-based systems for a wide range
    of applications including anomaly detection, root-case
    analysis and more.
  - Optimize existing machine learning models and pipelines for
    performance, scalability, and resource efficiency.
  
  Qualifications
  
  - At least 5 years of relevant machine learning experience
  - MS or PhD in Computer Science or Engineering, Mathematics,
    or a related field.
  - Experience with machine learning, optimization algorithms,
    deep-learning techniques
  - Experience with machine learning frameworks (e.g.,
    TensorFlow, PyTorch).
  - Experience with search engines and vector databases, along
    with their underlying algorithms.
  - Experience with big data frameworks and technologies such as
    Spark, Kafka, Cassandra.
  
