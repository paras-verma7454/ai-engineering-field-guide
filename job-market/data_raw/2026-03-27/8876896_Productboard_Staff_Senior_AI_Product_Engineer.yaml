  Relocation Opportunities
  
  If joining us means making a move, we’re here to help make
  that transition easier.
  
  Candidates must have the legal right to work in the EU.
  While we are unable to provide visa sponsorship for this
  role, we’re happy to support relocation to Prague for
  candidates already authorized to work in the EU.
  
  Relocation Support
  
  We offer a one-time relocation bonus ranging from $6,000 to
  $13,000 USD, depending on your personal situation, whether
  you’re moving on your own or with a partner or family.
  
  This bonus is intended to help offset moving expenses and
  support your transition into your new city. While it may not
  cover every cost, it provides meaningful financial support
  as you get settled.
  
  If you’re thinking about relocating and want to explore what
  this could look like for you, we’d be happy to have that
  conversation.
  
  About Productboard
  
  At Productboard, we’re on a mission to help product teams
  build exceptional products with clarity and confidence. As
  the leading intelligent product management platform, we
  empower over 6,000 companies, including Salesforce, SAP,
  Autodesk, and Kroger, to understand what customers need,
  prioritize what to build next, and align everyone around a
  shared roadmap.
  
  Headquartered in San Francisco with offices in Prague and
  Brno, Czechia, we’re backed by some of the world’s most
  respected investors, including Index Ventures, Kleiner
  Perkins, Sequoia Capital, Bessemer Venture Partners, Tiger
  Global, and Dragoneer.
  
  We’re proud to be consistently recognized as one of the best
  places to work by BuiltIn and Comparably, and to count
  ourselves among the world’s leading unicorn companies. Well-
  funded and financially disciplined, we have the stability
  and runway to build boldly for the long term.
  
  Over the past few years, we’ve rearchitected our platform
  from the ground up to serve enterprise scale and set the
  foundation for the next era of product management. Now we’re
  entering an exciting new phase with Productboard Spark, our
  AI-first, agentic experience that transforms how product
  teams work. Spark is a true collaborator that deeply
  understands your product context, company strategy, and
  customer needs, helping teams move faster and make smarter,
  more confident decisions.
  
  Join us as we build the future of product management.
  
  About our culture
  
  Imagine working in a place where everything matters — most
  importantly, you. At Productboard, values aren’t just
  something we like to talk about, they’re something we live
  and breathe. We believe in creating a work environment
  where:
  
  - People feel empowered, supported, and included
  - Trust and transparency are built into the way we work
  - Creativity, curiosity, and continuous improvement are
    encouraged and nurtured every day
  
  Forming our company values was a group effort, with every
  employee allowed to contribute. From profit-sharing
  initiatives, like stock options, to open calendars and
  communication, we don’t waste time on politics or ego. We
  champion openness by sharing our goals, successes, and
  failures.
  
  Join colleagues who are passionate about what they do. Team
  members who are invested in their work environment, and the
  future of Productboard. Help shape our company, culture, and
  product!
  
  Check out our LinkedIn Life page, or listen to our People of
  Productboard podcast for a real feel of what life is like at
  Productboard.
  
