  An overview of this role
  
  As an Intermediate Backend Engineer on the AI Governance
  team at GitLab, you'll help build a paid product designed
  for regulated enterprise organizations that need to audit,
  govern, and demonstrate compliance for AI agent usage inside
  GitLab. This is product work with direct customer impact.
  You'll contribute to features that support visibility into
  how AI agents and related tools are used, and you'll help
  lay the foundation for governance controls that enterprise
  customers rely on.
  
  You'll join a small team with clear product direction,
  technical guidance from experienced backend engineers, and
  meaningful ownership from the start. This role is well
  suited for an engineer with experience in backend
  development who writes solid tests and wants to grow by
  shipping real features in an evolving product area. You'll
  work in GitLab's all-remote, asynchronous environment,
  collaborating across teams as the AI Governance roadmap
  continues to expand.
  
  What you’ll do
  
  - Implement well-scoped backend features across the AI
    Governance product area, including event normalization
    utilities, storage layer enhancements, API endpoint
    additions, export support, and registry integrations,
    delivering production-ready work that ships on schedule.
  - Build and maintain automated test coverage for your work
    using RSpec or equivalent tools to improve reliability and
    support safe, consistent releases.
  - Grow your knowledge of AI governance, agent-related product
    architecture, and integration patterns through hands-on
    delivery and teamwork so you can contribute more
    effectively as the roadmap evolves.
  - Work closely with senior and staff engineers to deliver
    solutions that are reliable, maintainable, and aligned
    with the product direction and release goals.
  - Work asynchronously with cross-functional partners and
    nearby engineering teams working on related governance and
    AI capabilities to help maintain smooth delivery across
    teams.
  - Take ownership of your scoped work and deliver with a high
    level of follow-through in a fast-moving product area,
    closing tasks with clear status updates and consistent
    execution.
  
  What you’ll bring
  
  - Demonstrated backend development experience building and
    shipping production features.
  - Proficiency with Ruby on Rails and solid fundamentals in
    PostgreSQL.
  - Experience building and maintaining automated test coverage
    with RSpec or an equivalent testing framework.
  - Experience communicating clearly in writing with teammates
    in an async environment.
  - Demonstrated ability to drive scoped work through completion
    and follow through on commitments.
  - Experience with, or exposure to, audit event systems,
    telemetry pipelines, or compliance-focused tooling.
  - Experience learning new technical domains and applying that
    understanding to product development.
  - Additional experience with GraphQL APIs, event-driven
    architecture patterns, Python, or data-focused databases
    such as ClickHouse.
  
  About the team
  
  You'll join the AI Governance team within GitLab's Secure,
  Scale, and Compliance area. We focus on helping
  organizations gain visibility into and govern AI usage
  inside GitLab. Our work spans two broad problem spaces:
  visibility, such as audit events, usage tracking, and
  observability, and policy controls, such as controls that
  help protect projects and meet compliance requirements.
  
  We are building this team alongside a parallel AI Governance
  team, with both groups contributing to different parts of a
  fast-changing roadmap. You'll work with a distributed group
  of engineers and collaborate with adjacent AI and Continuous
  Delivery teams as we integrate governance capabilities more
  deeply into the platform. It's an interesting team for
  engineers who want to work on emerging product challenges at
  the intersection of AI, compliance, and large-scale
  enterprise software. For more on how related teams work, see
  Team Handbook Page.
  
  
  
