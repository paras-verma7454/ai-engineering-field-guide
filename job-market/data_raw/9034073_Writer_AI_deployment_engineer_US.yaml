description: |
  🚀 About WRITER
  
  WRITER is where the world's leading enterprises orchestrate
  AI-powered work. Our vision is to expand human capacity
  through superintelligence. And we're proving it's possible –
  through powerful, trustworthy AI that unites IT and business
  teams together to unlock enterprise-wide transformation.
  With WRITER's end-to-end platform, hundreds of companies
  like Mars, Marriott, Uber, and Vanguard are building and
  deploying AI agents that are grounded in their company's
  data and fueled by WRITER's enterprise-grade LLMs. Valued at
  $1.9B and backed by industry-leading investors including
  Premji Invest, Radical Ventures, and ICONIQ Growth, WRITER
  is rapidly cementing its position as the leader in
  enterprise generative AI.
  
  Founded in 2020 with office hubs in San Francisco, New York
  City, Austin, Chicago, and London, our team thinks big and
  moves fast, and we're looking for smart, hardworking
  builders and scalers to join us on our journey to create a
  better future of work with AI.
  
  📐 About the role
  
  As a deployment engineer at WRITER, you'll be at the
  forefront of expanding human capacity through
  superintelligence. This isn't just a technical role; it's a
  deeply influential one where you'll partner directly with
  our leading enterprise customers. Your expertise will be
  crucial in uncovering their unique business challenges and
  architecting AI-powered solutions that leverage our powerful
  platform and enterprise-grade LLMs. You'll transform complex
  needs into tangible, high-impact applications, creating
  champions and driving tangible business results. Your
  builder's mentality and passion for bringing cutting-edge AI
  into the hands of real users will directly shape the future
  of work for some of the world's largest companies.
  
  This is a critical role that directly impacts our customers'
  success and product evolution. You'll contribute
  significantly to WRITER's mission, working with a dynamic
  team to push the boundaries of what's possible with
  generative AI.
  
  This is a hybrid role based out of our San Francisco,
  Chicago, Austin, and New York City hubs.
  
  🦸🏻‍♀️ What you'll do
  
  - Partner deeply with enterprise customers to identify
    strategic AI use cases, validating technical feasibility
    and owning the end-to-end implementation of tailored
    solutions
  - Architect and deliver custom applications, templates, and
    integrations leveraging WRITER's platform, APIs, and
    Knowledge Graph capabilities to solve complex business
    challenges
  - Translate intricate technical concepts and platform
    capabilities into clear, prescriptive solution
    recommendations, guiding customers through the generative
    AI landscape
  - Collaborate relentlessly with internal Product and
    Engineering teams, providing crucial customer feedback
    that directly influences our product roadmap and drives
    continuous innovation
  - Drive down customer time-to-value by developing scalable
    processes, robust documentation, and efficient workflows
    for technical integrations
  - Champion the successful adoption and expansion of WRITER's
    AI solutions within customer accounts, ensuring maximum
    impact and return on investment
  
  ⭐️ What you need
  
  - Over 5 years of hands-on experience in technical SaaS roles,
    with at least 3 years specifically in solutions
    architecture, technical consulting, or technical account
    management
  - Deep technical fluency in Python and extensive experience
    leveraging APIs, especially in designing sophisticated
    prompts and understanding linguistic principles for AI
    applications
  - Proven track record of architecting and delivering complex
    technical solutions for Fortune 500 enterprises in a fast-
    paced, high-growth B2B SaaS environment
  - Exceptional communication and executive presence, capable of
    simplifying complex AI concepts for diverse audiences,
    from technical teams to C-suite leadership
  - A true builder's mindset with a passion for emerging
    technologies, always eager to experiment, learn, and
    iterate in the rapidly evolving world of generative AI
  - A relentless drive to Connect with customers and internal
    teams, Challenge the status status quo with innovative
    solutions, and Own the successful outcomes for our most
    strategic accounts
  
  🍩 Benefits & perks (US Full-time employees)
  
  - Generous PTO, plus company holidays
  - Medical, dental, and vision coverage for you and your family
  - Paid parental leave for all parents (12 weeks)
  - Fertility and family planning support
  - Early-detection cancer testing through Galleri
  - Flexible spending account and dependent FSA options
  - Health savings account for eligible plans with company
    contribution
  - Annual work-life stipends for:
    - Wellness stipend for gym, massage/chiropractor, personal
      training, etc.
    - Learning and development stipend
  - Company-wide off-sites and team off-sites
  - Competitive compensation, company stock options and 401k
  
  WRITER is an equal-opportunity employer and is committed to
  diversity. We don't make hiring or employment decisions
  based on race, color, religion, creed, gender, national
