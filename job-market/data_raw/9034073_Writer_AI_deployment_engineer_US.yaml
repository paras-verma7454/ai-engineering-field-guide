  orientation, citizenship, or any other basis protected by
  applicable local, state or federal law. Under the San
  Francisco Fair Chance Ordinance, we will consider for
  employment qualified applicants with arrest and conviction
  records.
  
  By submitting your application on the application page, you
  acknowledge and agree to WRITER's Global Candidate Privacy
  Notice.
