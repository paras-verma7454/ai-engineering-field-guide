description: |
  About SecurityScorecard:
  
  SecurityScorecard is the global leader in cybersecurity
  ratings, with over 12 million companies continuously rated,
  operating in 64 countries. Founded in 2013 by security and
  risk experts Dr. Alex Yampolskiy and Sam Kassoumeh and
  funded by world-class investors, SecurityScorecard’s
  patented rating technology is used by over 25,000
  organizations for self-monitoring, third-party risk
  management, board reporting, and cyber insurance
  underwriting; making all organizations more resilient by
  allowing them to easily find and fix cybersecurity risks
  across their digital footprint.
  
  Headquartered in New York City, our culture has been
  recognized by Inc Magazine as a "Best Workplace,” by Crain’s
  NY as a "Best Places to Work in NYC," and as one of the 10
  hottest SaaS startups in New York for two years in a row.
  Most recently, SecurityScorecard was named to Fast Company’s
  annual list of the World’s Most Innovative Companies for
  2023 and to the Achievers 50 Most Engaged Workplaces in 2023
  award recognizing “forward-thinking employers for their
  unwavering commitment to employee engagement.”
  SecurityScorecard is proud to be funded by world-class
  investors including Silver Lake Waterman, Moody’s, Sequoia
  Capital, GV and Riverwood Capital.
  
  About the Role:
  
  SecurityScorecard is building AI capabilities that change
  how security professionals understand and act on risk. We
  are looking for a Staff AI Engineer to lead that work. This
  is the role for the engineer who needs no scaffolding. You
  identify the problem, design the system, build it, ship it,
  and improve it — and you bring others along. You use AI-
  native tools not as a novelty but as a genuine force
  multiplier, moving at a pace that used to require a full
  team. You have strong product instincts and are comfortable
  operating with the ownership and ambiguity of a founding-
  team environment within an established company.
  
  What You'll Do
  
  - Lead the design and delivery of major AI-powered product
    initiatives from concept through production, owning the
    full software development lifecycle
  - Define the technical architecture for AI systems at
    SecurityScorecard: LLM pipelines, agentic workflows,
    retrieval infrastructure, and evaluation frameworks
  - Set the standard for how the engineering organization builds
    with AI, including development practices, tooling choices,
    and quality bars
  - Use Cursor, Claude Code, and AI-native development tools as
    core instruments, and model what high-velocity, high-
    quality AI-augmented engineering looks like for the team
  - Collaborate directly with product leadership and the CTO
    organization to shape the AI product roadmap
  - Drive architecture reviews, establish cross-team engineering
    standards, and elevate the technical level of the teams
    you work with
  - Identify and eliminate bottlenecks in how AI features get
    built, tested, and shipped across the organization
  - Operate with Staff-level ownership: you see the whole
    problem, not just your part of it
  
  Required Skills and Experience
  
  - 7+ years of software engineering experience with a track
    record of leading complex, high-impact technical projects
    end-to-end
  - Demonstrated ability to operate independently across the
    full product development lifecycle, from problem
    definition through production operations
  - 3+ years building and shipping AI-powered product features
    in production, including LLM integration, agentic systems,
    or intelligent automation
  - Strong product instincts: you think about user problems and
    business outcomes, not just technical implementation
  - Proficiency in TypeScript and strong backend engineering
    fundamentals with experience in distributed systems at
    scale
  - Fluency with AI-native development workflows (Cursor, Claude
    Code, or equivalent) as a primary engineering practice,
    not an experiment
  - Cloud infrastructure experience (AWS preferred) and comfort
    with the full production stack
  - Exceptional communication: able to drive alignment across
    product, engineering, and executive stakeholders
  
  Our Tech Stack
  
  TypeScript / JavaScript, Go, AWS, Docker, Kubernetes,
  Terraform, ClickHouse, PostgreSQL
  
  Nice to Have
  
  - Prior experience in a Staff or Principal engineering role
    with cross-team technical influence
  - Background in cybersecurity, threat intelligence, or
    enterprise risk products
  - Experience building and operating agentic AI systems, multi-
    agent orchestration, or LLM evaluation infrastructure
  - Track record of defining engineering standards or leading
    technical strategy at the organizational level
  - Experience in high-growth, Series C/D+ companies where
    engineering velocity and quality both matter
  
  Benefits: Specific to each country, we offer a competitive
  salary, stock options, Health benefits, and unlimited PTO,
  parental leave, tuition reimbursements, and much more!
  
  The estimated total compensation range for this position is
  $180,000 - $220,000 (base plus bonus). Actual compensation
  for the position is based on a variety of factors,
  including, but not limited to affordability, skills,
  qualifications and experience, and may vary from the range.
  In addition to base salary, employees may also be eligible
  for annual performance-based incentive compensation awards
  and equity, among other company benefits.
  
