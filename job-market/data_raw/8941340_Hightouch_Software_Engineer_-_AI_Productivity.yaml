  About Hightouch
  
  Hightouch is the modern AI platform for marketing and growth
  teams. Our AI agents reimagine marketing workflows, allowing
  marketers to create content, plan campaigns, and execute
  strategies with transformational velocity and performance.
  
  Hightouch is a rare company built on the intersection of two
  fundamental technological shifts: advances in LLMs and
  agentic AI, and the creation and rapid adoption of cloud
  data warehouses like Snowflake and Databricks. Building on
  these tailwinds, we’ve become a leader in AI marketing and
  partner with industry leaders like Domino’s, Chime, Spotify,
  Ramp, Whoop, Grammarly, and over 1000 others.
  
  Our team focuses on making a meaningful impact for our
  customers. We approach challenges with first-principles
  thinking, move quickly and efficiently, and treat each other
  with compassion and kindness. We look for team members who
  are strong communicators, have a growth mindset, and are
  motivated and persistent in achieving our goals.
  
