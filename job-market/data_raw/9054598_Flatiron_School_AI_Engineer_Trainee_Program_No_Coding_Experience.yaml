description: |
  About Flatiron School
  
  As a leader in the tech industry, Flatiron School believes
  that education is the best investment you can make in your
  future. We’re committed to helping change lives and the
  world for the better. Our courses provide an immersive,
  outcomes-driven curriculum for students looking to launch a
  career in Software Engineering, Cybersecurity, Data Science,
  Artificial Intelligence and Game Design. In addition to
  student programs, we also offer targeted education solutions
  for organizations.
  
  Our Mission: Enabling the pursuit of a better life through
  education
  
  Our Values:
  
  - Make No Little Plans - Build for scale, create for the
    future, execute short-term goals in view of long-term
    strategy
  - Radiate Positivity - Be kind, have fun, find what to love
  - Strive for Excellence - Drive results, hold yourself and
    each other accountable to our shared goals
  - Be a Lifelong Learner - Embrace a growth mindset, be
    curious, get comfortable with being uncomfortable
  - Work Together - Collaborate, embrace transparency, empower
    others to succeed
  - Nurture Difference - Seek to understand, notice who or what
    is missing, actively seek out different opinions, create
    space for other voices to be heard
  
  About the Opportunity
  
  Flatiron School is offering a paid, work-integrated
  apprenticeship for professionals with general work
  experience (2+ years in any field) who want to transition
  into their first role in software engineering.
  
  This program is designed for career switchers who are new to
  tech or have only foundational exposure. You’ll learn in-
  demand technical skills through Flatiron’s bootcamp programs
  while gaining real, paid industry experience with an
  employer partner.
  
  What You'll Do
  
  - Complete Flatiron School’s Software Engineering (full-time)
    and AI & Data Science (part-time) bootcamp programs
  - Contribute to real software projects during a paid
    apprenticeship with an employer partner
  - Collaborate in sprint-based workflows and participate in
    code reviews
  - Build a portfolio of production-level work
  - Receive mentorship from experienced engineers and product
    leaders
  
  What You’ll Learn
  
  - Foundations of software development and modern engineering
    practices
  - How software engineering and data intersect in AI-enabled
    products
  - Agile development workflows and team collaboration
  - Writing clean, maintainable, production-quality code
  - Applying data-informed thinking to engineering problems
  
  Who This Program Is For
  
  - Professionals with 2+ years of work experience in any field
  - Career switchers seeking their first professional role in
    tech
  - Candidates excited to learn, collaborate, and grow in a
    structured environment
  
  This Program Is Not For
  
  - Experienced software engineers, developers, or data
    scientists
  - Candidates with prior professional experience in technical
    engineering roles
  - Candidates who are currently employed in full-time jobs
  
  Program Details
  
  - Commitment: Full-time (40 hours/week) for 18 months
  - Phase 1 (4 months): Full-time courseworkPhase 2 (14 months):
    - 20 hrs/week paid apprenticeship
    - 20 hrs/week part-time coursework
  - Compensation: $15/hour for 20 hrs/week (starting month 5)
  - Tuition: $19,500 (covered through an installment plan during
    the program)
  - Location: Program is fully remote and online, so you can
    work and study at home. U.S.-based candidates only
  - Work Authorization: Must be authorized to work in the U.S.
    (no visa sponsorship)
  
  Requirements
  
  - 2+ years of prior work experience (any industry)
  - Availability for 40 hours/week
  - Successful completion of the Flatiron School Aptitude
    Assessment
