description: |
  About Wind River
  
  Wind River is a global leader in delivering software for
  mission-critical intelligent systems. For more than four
  decades, the company has been an innovator and pioneer,
  powering billions of systems that require the highest levels
  of security, safety, and reliability.  
  
  Wind River helps customers across automotive, aerospace,
  defense, industrial, medical, and telecommunications
  industries solve complex technology challenges on their
  journey toward the new intelligent machine economy. The
  company’s software powers generation after generation of the
  safest, most secure systems in the world.  Examples include
  playing a key role in NASA space missions such as Artemis I,
  the James Webb Space Telescope, and multiple Mars rovers.
  We’ve achieved recent 5G milestones including the world’s
  first successful 5G data session with Verizon
  and  building one of the largest Open RAN networks in the
  world with Vodafone. 
  
  The company has received industry recognition for its
  technology innovation and leadership, and for its workplace
  culture, including global Great Place to Work certification
  and being named a “Top Workplace” for ten consecutive years.
  If you want to be part of a unique culture where the lived
  experience is based on our cultural attributes of growth
  mindset, customer-focus, and diversity, equity, inclusion &
  belonging, come join us and help advance the future software
  defined world. 
  
  
  
  About the Team
  
  Within the Wind River Cloud team, we work with large-scale
  projects including Kubernetes, Docker, OpenStack and fast-
  paced Open-Source technologies that are in high demand from
  our customers.  Wind River Cloud has adopted these
  technologies into the core of our product, which is driving
  us to find experienced and high-performing individuals that
  can learn and contribute to these full software stack
  solutions to fulfill the strict requirements of edge
  computing use cases from security to high availability.  The
  team delivers in the areas of configuration management,
  fault management and host management.  In addition, Wind
  River Cloud team is a leading contributor to the Open
  Source StarlingX cloud native project, to manage and
  maintain the critical infrastructure for highly distributed
  Edge solutions, primarily 5G.
  
  The right candidate will possess proven software engineering
  skills.  You are expected to be versatile and able to thrive
  in a dynamic environment developing applications and tooling
  to be fault tolerant, available and scalable for real time
  Kubernetes applications.  You are comfortable managing
  competing priorities and can bring order to ambiguous
  scenarios. Maturity, impeccable judgment, and the ability to
  influence and lead are essential to success in this role.  
  
  Responsibilities:
  
  - Develop leading edge, high performance cloud and container
    technologies for the Edge.
  - Work with the most dynamic and exciting open source software
    projects today – Kubernetes (K8S), Helm, Openstack and
    related projects
  - Work as part of a team focused on containerization,
    virtualization, VM management and fault tolerance/carrier
    grade development.
  - Contribute actively to StarlingX, an open source project
    under the OpenStack Foundation - a fully featured cloud
    for the distributed edge (https://www.starlingx.io/).
  - Develop and deliver high quality design and code.
  - Develop automated tests, enabling faster design and test
    cycles.
  - Investigate and resolve issues reported during product
    verification and customer integration.
  - Participate in all aspects of the software development
    process using agile development.
  - Develop solutions that are highly available across multiple
    linux hosts
  - Develop solutions for configuration management across
    multiple linux hosts
  - Develop solutions for process monitoring and recovery of
    services running in linux
  - Develop solutions for configuration and state information
    backup and retrieval to restore systems to a previous
    point in time
  - Diagnose issues related to linux processes in high
    availability, process monitoring, system active / standby
    failover and configuration management
  
  Qualifications/Skills:
  
  - Bachelor’s / master’s degree in computer science or related
    field
  - 3-5  years of professional software development experience
    including building infrastructure software for distributed
    systems
  - Programming experience with Python
  
  ·        Experience contributing to the architecture and
  design (architecture, design patterns, reliability, and
  scaling) of new and current systems.
  
  - Experience with Linux software development
  - Exposure to Helm, Ansible and Puppet
  - Strong analytical and debugging skills
  - Excellent written and oral communication skills
  - Exceptional team player who works well in collaborative
    environments
  - Self-managed, fast learner with the desire and ability to
    master new technologies
  - Strong sense of ownership, urgency, and drive
  - Familiarity with iterative and agile/scrum software
    development processes
  - Exposure to Go, C/C++, Kubernetes operators would be an
    asset
  - Contribution to the open-source community would be an asset
  
  BENEFITS
  
  - Workplace Flexibility: Hybrid Work.
  - Medical insurance: Group Medical Insurance coverage.
  - Employee Assistance Program.
  - Vacation and Time off: Employees are eligible for various
    types of paid time off.
  - Additional Time off’s – Birthday, Volunteer Time off,
    Wedding.
  
