  Senior Machine Learning / AI Solutions Engineer (m/w/d)
  
  Join the team rewriting the rules in private markets.
  
  Moonfare delivers what few others can: the highly sought-
  after funds and hidden-gem investments that go beyond what
  most private banks offer. Every opportunity is subjected to
  a ruthless vetting process; the bar is unforgivingly high.
  The result? Institutional-quality portfolios for investors
  who demand more.
  
  Our team combines finance veterans with talent from tech,
  consulting, law and industries you’d never expect.
  Headquartered in Berlin, we operate from eight offices
  across Europe, the US and Asia.
  
  If you're ready to build what's next in private markets,
  let's talk.
  
  Senior ML / AI Solutions Engineer (m/w/d)
  
  Moonfare is hiring a Machine Learning / AI Solutions
  Engineer to bridge the gap between business needs and AI
  capabilities, focusing on leveraging existing tools and
  platforms to deliver intelligent automation and AI-native
  experiences. You will partner closely with business
  stakeholders, product, and engineering teams to identify
  high-impact operational problems, design end-to-end AI
  solutions using vendor tools and agentic workflows, and
  establish the governance framework for AI adoption across
  the organisation.
  
  This is a high-impact role focused on strategic solution
  design, tool standardisation, and business enablement,
  helping Moonfare transition into an AI-augmented fintech
  platform.
  
  You Will:
  
  - Serve as Moonfare's internal AI subject matter expert,
    staying current with emerging AI trends, tools, and
    capabilities to advise leadership on opportunities.
  - Act as the primary liaison between business units and
    technical teams, translating complex operational
    challenges into actionable AI solution requirements.
  - Design and implement end-to-end AI solutions and agentic
    workflows using low-code/no-code platforms and vendor
    tools (e.g., AWS Bedrock, Camunda, n8n, Vercel v0, REALM),
    focusing on rapid prototyping and deployment.
  - Understand data requirements for AI solutions and work with
    data teams to ensure data readiness and quality for
    successful implementation.
  - Evaluate, select, and integrate commercial and cloud-native
    AI services (e.g., AWS Bedrock, OpenAI, Anthropic) to
    maximise business value and efficiency.
  - Establish and maintain the company-wide AI Tooling
    Governance framework, defining approved use cases and
    standardised tools to prevent tool sprawl and ensure
    compliance.
  - Educate and communicate the potential, limitations, and
    mechanics of LLMs and AI technologies to non-technical
    stakeholders in clear, business-focused language.
  - Guide architectural decisions related to prompt
    orchestration, workflow management, and solution
    deployment, ensuring scalability and cost-effectiveness.
  - Work closely with Security and Compliance teams to ensure
    the secure, ethical, and compliant use of generative AI
    solutions in a regulated environment.
  - Drive solution performance evaluation and tracking (e.g.,
    quality, cost, and business impact/ROI).
  
  The Next Moonfarian:
  
  - Bachelor's degree in Computer Science, Engineering,
    Business, or related field; or equivalent practical
    experience.
  - 5+ years of experience in technology or solutions
    architecture roles, with 2+ years focused on designing and
    implementing AI/LLM-based solutions.
  - Deep theoretical understanding of how LLMs work, RAG
    architectures, and agentic workflows, and how they apply
    to business automation.
  - Proven experience evaluating, selecting, and implementing
    vendor-based AI solutions and workflow orchestration tools
    (e.g., AWS Bedrock, Camunda, n8n, Vercel v0, REALM, or
    similar low-code/no-code platforms).
  - Exceptional communication skills with the ability to
    articulate complex technical concepts (AI/LLMs) to
    executive and non-technical audiences.
  - Demonstrated ability to identify, scope, and prioritise
    business problems suitable for AI intervention, focusing
    on measurable ROI.
  - Strong familiarity with AI risk, safety, and governance
    frameworks, and experience establishing tooling standards
    in a corporate environment.
  - Excited by the challenge of transforming our expert human
    judgment using AI-assisted systems.
  - Familiarity with AI risk, safety, and governance frameworks
    - especially in regulated industries highly desirable.
  
  If you feel you do not meet all of the requirements, we
  still encourage you to apply!
  
  Our Values:
  
  - Our clients come first, Moonfare comes second, and we
    prioritise ourselves third - Client-Centric Focus. Putting
    clients first means creating value for them is essential.
    Placing Moonfare second signifies that our individual
    professional future at Moonfare depends on the company's
    commercial success. Prioritising ourselves third reflects
    our humility in putting clients and Moonfare before
    personal interests.
  - We pursue excellence and honor our promises - Commitment to
    Excellence. We hold ourselves to the highest standards,
    taking responsibility for our failures, and celebrating
    our successes. We commit to deadlines and stick to them
    and we learn from our mistakes.
  - We are here to win and to celebrate our collective
    achievements - Win together. We are mission-focused and
    think and act like owners. We exemplify the attitude we
    expect and each of us commits to do what it takes to
    succeed.
  - We foster personal growth but each of us earns our place as
    a Moonfarian through merit - Growth and Merit. We hire,
    retain, and develop exceptional people and invest in
    empowering them to excel. We must all earn our place at
    the table every day.
  
  We understand the important role that diversity plays in our
  success. Different backgrounds, experiences and ideas push
  us further and raise the bar. We’re committed to developing
  an inclusive and safe culture where everyone  — regardless
  of colour, race, religion, sex, origin, sexuality,
  disability, marital status, citizenship or gender identity —
  knows that they are an integral part of the team and can
  bring their full potential to their work.
  
  *Minimum investments vary according to jurisdiction.
  
  Apply now!
