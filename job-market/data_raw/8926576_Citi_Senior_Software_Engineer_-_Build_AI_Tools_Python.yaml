description: |
  Citi, the world leading global bank, has approximately 200
  million customer accounts and a presence in more than 160
  countries and jurisdictions worldwide. Citi provides
  consumers, corporations, governments, and institutions with
  a broad range of financial products and services, including
  consumer banking and credit, corporate and investment
  banking, securities brokerage, transaction services, and
  wealth management. Citi enables clients to achieve their
  strategic financial objectives by providing them with
  cutting-edge ideas, best-in-class products and solutions,
  and unparalleled access to capital and liquidity.
  
  The Team:
  
  Cloud Technology Services (CTS) is responsible for looking
  after Citi’s Cloud programme across Public and Private
  Cloud. It has several new and exciting programmes utilising
  cutting edge cloud and container technologies, with a view
  to ensuring that our offerings are best in class and enable
  our wider business lines and clients alike.
  
  The job:
  
  This role sits within the newly formed GenAI Security team,
  which is responsible for ensuring, maintaining, and
  improving the security of our GenAi Prompt security
  capabilities within the firm. You will be responsible for
  engineering solutions that strengthen and broaden our
  security capabilities in an environment that is changing
  daily whilst also working with vendor products to achieve
  the same aims.  You will have the opportunity to partner
  with key Engineering teams, alongside Operations and Site
  Reliability Engineering.
  
  Effective capabilities that combine security and engineering
  excellence are key to success.
  
  What the role covers:
  
  - Designing, developing, optimizing, and enhancing a GenAI
    prompt security platform to protect firm AI/LLM-based
    applications from adversarial attacks and prompt
    injections.
  - Building and automating a security testing framework to
    validate protection mechanisms for various LLM use cases.
  - Owning solutions that are expected to operate and perform at
    scale across the organisation.
  - Collaboration with multiple stakeholders and partners across
    Engineering and Operations as well as partner teams within
    the wider Citi organisation, across different time zones.
  
  Job Skills/ Qualifications:
  
  - Highly motivated self-starter with excellent interpersonal
    and problem-solving skills
  - Bachelor’s degree or equivalent work experience
  - Good oral and written communication skills
  - Significant relevant industry work experience
  - Experience of the full lifecycle of design, implementation
    and running of enterprise software solutions involving
    cross functional team collaboration
  - Expertise in a major programming language such as Python
    and/or Go, and associated tooling (Git, Maven, IDEs,
    Jenkins, Bitbucket etc)
  - Expertise in designing and implementing secure APIs and
    libraries.
  - Experience in Generative AI, LLM frameworks, LLM prompt
    engineering and/or adversarial testing is a bonus.
  - Experience with Cyber engineering and Operations, which
    could include DevSecOps or MLSecOps.
  - Experience contributing to the architecture and design
    (architecture, design patterns, reliability, scaling) of
    new and current systems
  - Experience in containerized deployment (Kubernetes,
    OpenShift etc).
  - Expertise with DevOps, CI/CD and agile methodology
  
  What we can offer you:
  
  By joining Citi, you will not only be part of a business
  casual workplace with a hybrid working model (up to 2 days
  working at home per week), but also receive a competitive
  base salary (which is annually reviewed), and enjoy a whole
  host of additional benefits such as:
  
  - 27 days annual leave (plus bank holidays)
  - A discretional annual performance related bonus
  - Private Medical Care & Life Insurance
  - Employee Assistance Program
  - Pension Plan
  - Paid Parental Leave
  - Special discounts for employees, family, and friends
  - Access to an array of learning and development resources
  
  Visit our Global Benefits page to learn more.
  
  Alongside these benefits Citi is committed to ensuring our
  workplace is where everyone feels comfortable coming to work
  as their whole self, every day. We want the best talent
  around the world to be energized to join us, motivated to
  stay and empowered to thrive.
  
