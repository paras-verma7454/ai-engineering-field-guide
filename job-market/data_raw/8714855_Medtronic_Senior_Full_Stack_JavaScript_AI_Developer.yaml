description: |
  At Medtronic you can begin a life-long career of exploration
  and innovation, while helping champion healthcare access and
  equity for all. You’ll lead with purpose, breaking down
  barriers to innovation in a more connected, compassionate
  world.
  
  A Day in the LifeWe are seeking an established and highly
  experienced Senior Full Stack JavaScript Developer with
  expertise in full stack software development using
  JavaScript and ideally experience in building Generative AI
  solutions, to join our Data Science, Process Excellence and
  Automation team. Your understanding of software development
  and leveraging AI will be crucial in building, deploying and
  maintaining a scalable enterprise platform.
  
  Responsibilities may include the following and other duties
  may be assigned.
  
  - Design, develop, test, and deploy highly scalable and
    resilient JavaScript applications.
  - Collaborate with cross-functional teams to gather and
    understand requirements and translate them into
    functional, quality software solutions.
  - Create and work with various APIs, ensuring seamless data
    flow and integration across various systems.
  - Troubleshoot and resolve issues, optimize performance, and
    ensure the maintainability and scalability of our
    applications.
  - Be responsible for developing, improving, supporting, and
    monitoring our Generative AI platform.
  - Maintain up-to-date knowledge of the latest industry trends
    and technologies to ensure our applications remain
    current.
  - Participate in code reviews to ensure code quality and
    distribute knowledge.
  - Contribute to documentation for system processes,
    application design, and architecture.
  
  Required Knowledge and Experience:
  
  - 7+ years of IT experience with a Bachelor's Degree in
    Engineering, MCA, or MSc.
  - Strong experience in full stack development across frontend,
    middleware, and backend layers.
  - Solid understanding of web fundamentals (HTML, CSS,
    JavaScript) and user experience principles.
  - Strong experience in API design and integration.
  - Hands-on experience with SSO, authentication, and
    authorization mechanisms.
  - Strong understanding of MVC architecture, business logic
    implementation, and workflow design.
  - Good knowledge of SQL and database concepts.
  - Ability to translate functional requirements into technical
    specifications.
  - Strong understanding of system design and interaction across
    application layers.
  - Experience working in Agile environments.
  - Experience with AI Platforms.
  - Proven ability to work as a Tech Lead / independent
    contributor.
  - Excellent communication and stakeholder management skills.
  - Strong problem-solving and analytical skills with attention
    to detail.
  - Self-driven, independent and ownership-oriented mindset.
  
  Physical Job Requirements The above statements are intended
  to describe the general nature and level of work being
  performed by employees assigned to this position, but they
  are not an exhaustive list of all the required
  responsibilities and skills of this position.
  
