description: |
  Description
  
  WHO WE ARE
  
  Come join the company reinventing data security, empowering
  businesses to realize the full potential of their data. As
  the leading data security platform purpose-built for the
  cloud era, Cyera’s mission is to reinvent how businesses
  secure data, enable agile collaboration, and boldly pursue
  new business opportunities. Trusted by security teams at
  leading global businesses, our team is proving that data
  security is the next big thing in cyber. Backed by the
  world’s leading investors and working with a large and
  growing list of Fortune 1000 companies, we are looking for
  world-class talent to join us as we usher in the new era of
  data security.
  
  THE OPPORTUNITY
  
  We are seeking a technically strong AI Engineer to architect
  and deploy intelligent systems that transform how Marketing
  operates. This role sits within Marketing Operations and is
  responsible for building scalable, production-grade AI
  systems that drive efficiency, automation, and measurable
  revenue impact.
  
  This is a hands-on engineering role focused on applied AI —
  designing, integrating, and operationalizing AI systems
  within our marketing and revenue technology stack. The ideal
  candidate combines strong software engineering fundamentals
  with experience building LLM-powered applications and
  automation systems in production environments.
  
  RESPONSIBILITIES:
  
  - Design and deploy AI-powered applications embedded within
    marketing and CRM infrastructure
  - Build and productionize LLM-driven workflows, agentic
    systems, and retrieval-augmented (RAG) architectures
  - Architect secure integrations across Salesforce, marketing
    automation platforms, data warehouses, and external APIs
  - Develop scalable orchestration frameworks for AI workflows
    (event-driven, API-based, and automation-triggered
    systems)
  - Implement monitoring, logging, evaluation, and guardrails
    for production AI systems
  - Establish AI governance, access controls, and reliability
    standards within marketing systems
  - Optimize performance, latency, and cost of AI-powered
    workflows
  - Partner cross-functionally with Marketing, Revenue
    Operations, and Engineering teams to translate business
    requirements into scalable AI applications
  
  Requirements
  
  REQUIRED QUALIFICATIONS:
  
  Required
  
  - 4+ years of experience in software engineering or AI
    engineering
  - Strong proficiency in Python and SQL
  - Experience building and deploying LLM-based applications in
    production environments
  - Experience working with LLM APIs, vector databases,
    embeddings, and RAG architectures
  - Experience integrating systems via APIs, webhooks, and
    event-driven frameworks
  - Experience deploying and maintaining systems in AWS, GCP, or
    Azure
  - Strong understanding of system design, security, and
    reliability in distributed environments
  
  Strongly Preferred
  
  Direct experience working within or integrating with modern
  marketing and revenue technology stacks, including:
  
  - Marketo (or similar marketing automation platforms such as
    HubSpot or Pardot)
  - Salesforce (CRM architecture, objects, workflows, APIs)
  - Tableau (or similar BI tools such as Looker or Power BI)
  - Clay (data enrichment and outbound automation workflows)
  
  Additional beneficial technologies and platforms include:
  
  - Snowflake, BigQuery, or other cloud data warehouses
  - Segment or other CDPs
  - Outreach, Salesloft, or similar sales engagement platforms
  - Zapier, Workato, or other workflow automation tools
  - Reverse ETL tools (Hightouch, Census)
  - dbt or modern data transformation frameworks
  - Familiarity with marketing lifecycle management, attribution
    workflows, lead routing logic, and revenue operations
    processes is highly advantageous.
  
  COMPENSATION INFORMATION:
  
  Compensation Range: $150,000-$185,000.
  
  The range represents total compensation, and may include
  incentive for sales roles, equity or benefits, as
  applicable.
  
  This compensation range represents Cyera’s good faith and
  reasonable estimate of the range of possible compensation
  for this role at the time of posting, and Cyera may
  ultimately pay more or less than the posted range. The final
  salary for this position will be determined in Cyera’s sole
  discretion, consistent with applicable law, and based on a
  variety of factors, including but not limited to the
  employee’s work experience, skills, and qualifications for
  the role, as well as the needs of Cyera’s business and other
  operational considerations.
  
  Final compensation will vary based on seniority and
  relevance of experience, location, and position
  requirements.
  
  This role may be eligible for potential merit increases
  based on factors such as individual or company performance,
  time in role, and other discretionary factors.
  
  BENEFITS - Why Cyera?
  
  - Ability to work remotely, with office setup reimbursement
  - Competitive salary
  - Unlimited PTO
  - Paid holidays and sick time
  - Health, vision, and dental insurance
  - Life, short and long-term disability insurance
