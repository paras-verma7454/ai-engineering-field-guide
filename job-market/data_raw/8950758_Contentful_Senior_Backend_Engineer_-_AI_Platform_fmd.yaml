description: |
  About the opportunity
  
  Join Contentful as a Senior AI Software Engineer (f/m/d) and
  innovate with AI Integrations
  
  At Contentful, we empower thousands of customers to manage
  content at scale with speed, flexibility, and precision. We
  are seeking talented Senior AI Software Engineers (f/m/d) to
  join our AI Platform team—a group dedicated to building and
  maintaining an internal AI platform that accelerates
  innovation across our organization.
  
  As a key contributor, you will help shape the internal AI
  ecosystem by developing scalable, high-performance AI
  integrations, APIs, tools and documentation that empower
  feature teams to efficiently test, deliver and maintain
  cutting-edge AI-driven products. Acting as both a support
  and consultancy resource, you’ll collaborate closely with
  feature teams to enhance their development capabilities and
  bring AI-powered solutions to life. By building intuitive
  internal tooling and fostering seamless integration of AI
  technologies, your work will drive efficiency and innovation
  throughout Contentful.
  
  If you are passionate about advancing AI technology,
  enabling teams with powerful tools, and redefining how we
  build and deliver AI solutions, we’d love to have you join
  us. Together, we’ll build systems that set new standards for
  AI integration and empower our teams to create smarter, more
  impactful content solutions.
  
  What to expect?
  
  - Collaborate and Innovate: Work closely with product
    managers, designers, and other engineers to build best-in-
    class AI-enabled features for our customers, ensuring
    seamless integration of AI technologies with existing
    systems.
  - Platform Development: Design, develop, and maintain scalable
    AI platform features using TypeScript and Node.js, to
    enable feature teams, while ensuring they are compatible
    with other services, and APIs.
  - AI Integration: Implement and integrate AI technologies,
    such as generative AI, machine learning models, or NLP, to
    enhance our platform’s capabilities, optimize processes,
    and improve user experiences.
  - Holistic Thinking: Think critically about the interactions
    between AI models and product components to ensure a
    cohesive and intuitive user experience.
  - Rapid Problem-Solving: Quickly fix bugs and solve problems,
    particularly related to AI performance, model integration,
    or data pipeline issues, to enhance customer satisfaction.
  - Continuous Improvement: Participate in code reviews and
    contribute to improving our AI development processes,
    ensuring that the AI components are scalable, efficient,
    and maintainable.
  - Stay Current: Keep up-to-date with the latest industry
    trends, particularly in the domains of AI and machine
    learning, ensuring the platform stays competitive by
    leveraging cutting-edge AI technologies.
  
  What you need to be successful?
  
  - API and Service Design: Proven experience in building APIs
    and services that efficiently handle large volumes of
    traffic. Deep interest in clean code practices and
    familiarity with enterprise architectural design patterns
  - Serverless Architectures: Experience with serverless
    architectures, ideally edge compute environments such as
    Cloudflare Workers.
  - Asynchronous Systems: Experience with building and
    maintaining asynchronous systems for automation and bulk
    use cases.
  - Containerization and Orchestration: Experience with Docker
    and Kubernetes, especially in deploying AI models or
    microservices.
  - Enterprise Solutions: Knowledge with implementing enterprise
    ready governance features such as RBAC, audit logging, and
    compliance frameworks.
  - Cloud Services Familiarity: Knowledge of cloud platforms
    like AWS, Azure, or GCP. Experience with services such as
    AWS SageMaker, Google AI, or Azure Machine Learning is a
    plus.
  - Problem-Solving Skills: A natural problem-solver who brings
    forward innovative ideas to integrate and features within
    product workflows, leading to practical solutions and
    product growth.
  - Collaborative Mindset: Excellent communication skills and
    the ability to collaborate effectively in a team
    environment.
  - Adaptability: Ability to organize and prioritize competing
    workloads in a fast-paced, AI-driven environment, ensuring
    AI and software systems align with business objectives.
  
  Preferred:
  
  - AI and Machine Learning Expertise: Skills in integrating and
    implementing AI/ML solutions within a product development
    environment. Skills in foundational models, prompt
    engineering and understanding to validate the quality of
    AI products.
  - Platform Experience: Experience in developing platform
    features to enable internal teams
  - Full Stack Experience: Strong skills in TypeScript, React,
    and Node.js.
  
  What’s in it for you?
  
  - Join an ambitious tech company reshaping the way people
    build digital experiences
  - Full-time employees receive Stock Options for the
    opportunity to share in the success of our company
  - Fertility and family building benefits, including a lifetime
    reimbursable wallet to support your growing family
  - We value Work-Life balance and You Time! A generous amount
    of paid time off, including vacation days, sick days,
    education days, compassion days for loss, and volunteer
    days
  - Time off to care for and focus on your growing family
  - Use your personal annual education budget to improve your
    skills and grow in your career
  - Enjoy a full range of virtual and in-person events,
    including workshops, guest speakers, and fun team
    activities, supporting learning and networking exchange
    beyond the usual work duties
  - An annual wellbeing stipend to care for your physical,
    financial, or emotional health
  - A monthly communication phone/internet stipend and phone
    hardware upgrade reimbursement
  - New hire office equipment stipend for hybrid or distributed
    employees. Get the gear you need to work at your best
  
  Who are we?
  
  Contentful is a leading digital experience platform that
  helps modern businesses meet the growing demand for
  engaging, personalized content at scale. By blending
  composability with native AI capabilities, Contentful
  enables dynamic personalization, automated content delivery,
  and real-time experimentation, powering next-generation
  digital experiences across brands, regions, and channels for
  more than 4,200 organizations worldwide. More than 700
  people from more than 70 nations contribute their energy and
  creativity to Contentful, working from hubs in Berlin,
  Denver, San Francisco, London, New York, and distributed
  worldwide.
  
  Everyone is welcome here!
  
  “Everyone is welcome here” is a celebrated component of our
  culture. At Contentful, we strive to create an inclusive
  environment that empowers our employees. We believe that our
  products and services benefit from our diverse backgrounds
  and experiences, and we are proud to be an equal opportunity
  employer. All qualified applications will receive
  consideration for employment without regard to race, color,
  national origin, religion, sexual orientation, gender,
  gender identity, age, physical [dis]ability, or length of
  time spent unemployed. We invite you to apply and join us!
  
  If you need reasonable accommodations at any point during
  the application or interview process, please let your
  recruiting coordinator know.
  
  Please be aware of scammers who may fraudulently allege to
  be from Contentful. These types of fraud can be carried out
  through copycat websites, fake email addresses claiming to
  be from our company, or social media. We do not ask for your
  personal information, such as bank account numbers,
  identification numbers, etc, through social media or chat-
  based apps, nor do we request or send money for the purchase
  of business equipment. If you suspect fraud, please report
  it to your local authorities, as well as reach out to us at
  security-esk@contentful.com with any information you may
  have.
  
  By clicking “Apply for this job,” I acknowledge that I have
  read the “Contentful’s Candidate Privacy Notice” and hereby
  consent to the collection, processing, use, and storage of
  my personal information as described therein.
