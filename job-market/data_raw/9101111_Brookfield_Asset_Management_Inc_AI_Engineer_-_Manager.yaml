description: |
  Location
  
  Mumbai - 10th Floor, Ventura, Hiranandani Gardens, Powai
  
  Technology Services
  
  Technology Services (TS) is responsible for delivering all
  enterprise infrastructure, applications and related end user
  technology services across all Brookfield business groups.
  
  Brookfield Culture
  
  Brookfield has a unique and dynamic culture.  We seek team
  members who have a long-term focus and whose values align
  with our Attributes of a Brookfield Leader:
  Entrepreneurial, Collaborative and Disciplined.  Brookfield
  is committed to the development of our people through
  challenging work assignments and exposure to diverse
  businesses.
  
  Job Description
  
  Job Description: As a Generative AI Engineer, you will be
  responsible for designing, developing, and optimizing AI
  models that generate high-quality content. You will work
  closely with our data scientists, engineers, and product
  teams to create innovative solutions that meet our clients'
  needs.
  
  Key Responsibilities:
  
  - Design and optimize AI prompts to enhance the quality and
    relevance of generated outputs.
  - Develop and implement testing frameworks for effective model
    evaluation and continuous improvement.
  - Maintain comprehensive documentation on prompt
    configurations, testing methodologies, and usage
    guidelines.
  - Collaborate closely with cross-functional teams, including
    data scientists, product managers, and developers.
  - Integrate AI solutions into production pipelines, leveraging
    CI/CD practices to ensure scalable deployment.
  - Deploy AI models into production environments and ensure
    their ongoing maintenance and improvement
  - Monitor performance metrics, troubleshoot issues, and refine
    models to ensure high reliability.
  - Stay current with emerging generative AI trends,
    technologies, and industry best practices.
  - Develop robust AI applications using Python, applying
    industry-standard coding practices and libraries.
  - Utilize LangChain for building and managing scalable AI
    pipelines, particularly for chaining complex prompts and
    retrieval tasks.
  - Leverage Azure GenAI Services to integrate cloud-based AI
    solutions, ensuring optimized performance and compliance
    with enterprise standards, familiarity with AWS Gen AI
    services would be a nice to have.
  - Ensure ethical considerations are integrated into model
    development, including data privacy, bias mitigation, and
    adherence to intellectual property rights
  - Gather and analyze user feedback to refine and enhance AI
    models
  
  Qualifications:
  
  - Bachelor’s degree in Computer Science, Artificial
    Intelligence, Machine Learning, or a related field.
  - 3 - 5 years of experience in AI development, with a focus on
    generative models.
  - Proficiency in programming languages such as Python,
    TensorFlow, and PyTorch.
  - Strong understanding of machine learning algorithms and
    neural networks.
  - Experience with large-scale data processing and model
    training.
  - Excellent problem-solving skills and attention to detail.
  - Ability to work collaboratively in a fast-paced environment.
  
  Nice to have Skills:
  
  - Experience with .NET Framework and familiar with C# and
    Visual basic
  - Experience with natural language processing (NLP) and
    computer vision.
  - Familiarity with ethical AI practices and data privacy
    regulations.
  - Strong communication skills and ability to present technical
    concepts to non-technical stakeholders.
  
  Brookfield is committed to maintaining a Positive Work
  Environment that is safe and respectful; our shared success
  depends on it.  Accordingly, we do not tolerate workplace
  discrimination, violence or harassment.
  
  We are proud to create a diverse environment and are proud
  to be an equal opportunity employer. We are grateful for
  your interest in this position, however, only candidates
  selected for pre-screening will be contacted.
