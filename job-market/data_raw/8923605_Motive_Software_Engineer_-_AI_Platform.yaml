description: |
  Who we are:
  
  Motive empowers the people who run physical operations with
  tools to make their work safer, more productive, and more
  profitable. For the first time ever, safety, operations and
  finance teams can manage their drivers, vehicles, equipment,
  and fleet related spend in a single system. Combined with
  industry leading AI, the Motive platform gives you complete
  visibility and control, and significantly reduces manual
  workloads by automating and simplifying tasks.
  
  Motive serves nearly 100,000 customers – from Fortune 500
  enterprises to small businesses – across a wide range of
  industries, including transportation and logistics,
  construction, energy, field service, manufacturing,
  agriculture, food and beverage, retail, and the public
  sector.
  
  Visit gomotive.com to learn more.
  
  About The Role
  
  At Motive, we’re not just looking for engineers—we’re
  seeking Superbuilders. As a Senior Software Engineer, you
  will be at the forefront of designing and developing
  cutting-edge AI/ML Platforms, large scale distributed
  systems, IoT platforms, turning ambitious visions into
  scalable, high-performance solutions. You thrive on solving
  complex technical challenges, mastering new technologies on
  the fly, and delivering pragmatic solutions that drive
  impact at scale.
  
  This role offers the opportunity to influence technical
  stack decisions, shape the company’s engineering roadmap,
  and work closely with the technical leads. You will engage
  in high-impact workstreams with the freedom to innovate,
  taking ownership of projects across devices, cloud, and
  mobile platforms. If you are a self-starter with a data-
  driven mindset and an obsession for excellence, this is the
  role for you.
  
  What You’ll Be Doing
  
  - Architect and Build: Design, develop, and optimize high-
    performance software and firmware for next-gen IoT
    platforms.
  - Turn Vision into Reality: Collaborate with executive and
    product teams to translate abstract ideas into actionable
    engineering plans.
  - Debug and Validate: Troubleshoot and optimize software on
    complex distributed systems, ensuring security,
    scalability, and resilience.
  - Develop Automated Testing: Create data test driven end to
    end simulation frameworks to validate system integrity at
    scale.
  - Adopt Cutting-Edge Tools: Leverage AI-powered coding tools
    to enhance productivity and drive innovation.
  - Lead by Example: Act as a technical mentor, fostering a
    culture of excellence, ownership, and pragmatism across
    the engineering team.
  - Iterate and Innovate: Embrace rapid iteration and
    experimentation, solving real-time problems and pivoting
    when necessary to achieve breakthrough results.
  
  What We’re Looking For
  
  - 5+ years of experience in software engineering, with at
    least 6 months focused on applied AI, Generative AI. The
    ideal candidate will have deep expertise in backend
    distributed systems, ML platform, and familiarity with
    others.
  - Bachelor’s or Master's degree in Computer Science or a
    related field.
  - Proficiency in Golang, Python or Kotlin, C++, with a track
    record of writing elegant, maintainable, and high-
    performance code.
  - Hands-on experience with AI tools and platforms (e.g.,
    enterprise LLMs like Gemini/Claude, no-code/low-code
    automation platforms, agent frameworks
    LangChain/LangGraph, Python)
  - Full Stack and Ecosystem understanding - from development
    and dependencies, modern best practices, to CI/CD
    understanding, cloud-native, and security-aware
    experience.
  - Experience working with analytics and observability from
    client to cloud, such as Snowflake and Redash reporting,
    Grafana and Datadog metrics, and agent methodologies.
  - A proven history of independent, ambitious project delivery
    in fast-paced environments.
  - A strategic problem-solver who balances technical trade-offs
    with business impact.
  - Strong communication skills, capable of translating complex
    technical challenges into clear, actionable plans.
  - A natural leader with the conviction to push for the right
    technical solutions and challenge the status quo.
  
  Creating a diverse and inclusive workplace is one of
  Motive's core values. We are an equal opportunity employer
  and welcome people of different backgrounds, experiences,
  abilities and perspectives.
  
