description: |
  About the role:
  
  Forter is looking for a Senior Software Engineer to join the
  AI Engineering team in a role focused on embedding directly
  with business teams to drive AI transformation. This role is
  outward-facing: you will sit alongside GTM and G&A functions
  — Sales, Marketing, Finance, HR, Legal, Customer Success —
  and fundamentally alter how these teams operate with AI.
  
  Departments outside of R&D are still early in their AI
  journeys, and they need technically strong partners who can
  understand their workflows, identify the highest-leverage
  opportunities, and build the solutions that actually change
  how work gets done. If you see the value in sitting with a
  business leader, understanding a painful manual process, and
  shipping something in a week that saves hundreds of hours,
  then this role is for you.
  
  Why should you join us?
  
  This is a unique opportunity to own the end-to-end AI
  transformation of entire functions, with executive
  sponsorship and real mandate. You’ll be working as part of
  an incredibly strong team of senior engineers at the
  forefront of AI. The work revolves around learning the
  latest tech in AI, and leveraging it to change how hundreds
  of people across the organization work every day.
  
  You'll operate with unusual autonomy: scoping problems
  directly with function leaders, deciding what to build,
  shipping it, measuring impact, and iterating. You'll work
  closely with senior leadership to ensure your work aligns
  with company strategy, giving you company-wide business
  impact and visibility.
  
  What you will be doing:
  
  - Embed with GTM and G&A teams (Sales, Marketing, Finance, HR,
    Legal, Procurement, Customer Success) to identify, scope,
    and prioritize the highest-impact AI opportunities within
    each function, and act as both product manager and
    engineer for these initiatives.
  - Own the full lifecycle of each solution, from requirements
    gathering through deployment to adoption measurement and
    iteration, with a focus on business outcomes.
  - Serve as the primary technical partner and AI advisor for
    business function leaders, translating their needs into
    engineering plans and helping them develop their own AI
    fluency.
  - Develop and deliver hands-on AI enablement and training for
    non-R&D teams, building their ability to use AI tools
    independently and effectively.
  - Collaborate with the team to leverage shared infrastructure
    (MCP servers, RAG systems, evaluation frameworks,
    guardrails) while feeding back requirements from the
    field.
  - Measure and report on AI adoption impact — quantifying time
    saved, process improvements, and capability gains — to
    build the case for continued investment and to guide
    prioritization.
  
  Who are you?
  
  - 7+ years of software engineering experience, with a strong
    track record of shipping production systems.
  - Demonstrated experience working directly with non-technical
    teams to deliver technology-driven transformation.
  - Exceptional communication skills: you can run a discovery
    session with a VP of Sales, write a clear project brief,
    present results to an executive audience, and pair with a
    junior analyst on prompt engineering, all in the same
    week.
  - Strong product instincts. You naturally think in terms of
    user problems, adoption, and measurable outcomes rather
    than technical elegance for its own sake.
  - Comfortable with ambiguity and self-direction. You won't
    have a detailed backlog handed to you; you'll build it by
    understanding the business.
  - Passionate about LLMs, prompt engineering, and AI
    application patterns (RAG, agents, tool use).
  
  It’d be really cool if you also:
  
  - Have led or played a central role in an AI or digital
    transformation initiative, with measurable results you can
    speak to.
  - Have experience in product management, solutions
    engineering, or technical consulting roles in addition to
    software engineering.
  - Are familiar with GTM/G&A tooling ecosystems (CRM, ERP, BI
    platforms, HRIS, marketing automation) and understand how
    AI can augment them.
  - Have hands-on experience with agentic patterns (Claude Code,
    MCP, Strands Agents or similar), RAG systems, and
    evaluation frameworks.
  - Have built internal AI tools or chatbots that non-technical
    users actually adopted and continued using.
  - Have experience designing and delivering technical training
    or enablement programs.
  
  Benefits include:
  
  - Competitive salary and bonus plan
  - Restricted Stock Units (RSUs)
  - Private health insurance, including vision and dental
    coverage
  - Generous PTO policy
  - Half day Fridays, every Friday
  
  About us:
  
  Digital commerce is built on trust. At every point along the
  eCommerce journey, businesses must make a critical decision:
  Can I trust this customer? Answering this simple question
  accurately and instantly is powerful—it can accelerate
  revenue growth and strengthen a company’s connection with
  its customers. How do we do it? Forter was founded on the
  insight that it's not about what is being purchased, nor
  where— but who is behind the interaction.
  
  The Forter Decision Engine finds patterns across more than
  one billion identities in our dataset. We isolate fraudsters
  and protect customers—ensuring everyone gets the experience
  they deserve.  Given that trust is central to how we
  operate, Forter is very much driven by a defined set of
  values. We attract remarkable talent and have retention and
  engagement levels that are well above benchmarks. We’re
  meticulous about strengthening our culture as we grow and
  ensuring this is an environment where people can have
  outsized impact.
  
  Trust is backed by data –  Forter is a recipient of over 10
  workplace and innovation awards, including:
  
  - Great Place to Work Certification (2021, 2022, 2023, 2024)
  - Fortune’s Best Workplaces in NYC (2022, 2023 and 2024)
  - Forbes Cloud 100 (2021, 2022, 2023, 2024 and 2025)
  - #3 on Fast Company’s list of “Most Innovative Finance
    Companies” (2022)
  - Anti-Fraud Solution of the Year at the Payments Awards
    (2024)
  - SAP Pinnacle Awards “New Partner Application Award” (2023)
  - Fintech Breakthrough Awards – Best Fraud Prevention Platform
    (2023)
  
  Life as a Forterian:
  
  We are a team of over 600 Forterians spread across 3
  different continents. Since 2013, we've raised $525 million
  from investors such as Tiger Global, Bessemer, Sequoia
  Capital, March Capital and Salesforce Ventures. We're on a
  mission to bring trust to global digital commerce so that
  companies like Adobe, ASOS, eBay, Instacart, Priceline and
  Nordstrom can block fraud, drive revenue and improve
  customer experience.
  
  At Forter, we believe unique people create unique ideas, and
  valuable experience comes in many forms. So, even if your
  background doesn't match everything we have listed in the
  job description, we still encourage you to apply and tell us
  why your skills and values could be an asset to us. By
  welcoming different perspectives, we grow together as humans
  and as a company.
  
  Forter is an Equal Employment Opportunity employer that will
  consider all qualified applicants, regardless of race,
  color, religion, gender, sexual orientation, marital status,
  gender identity or expression, national origin, genetics,
  age, disability status, protected veteran status, or any
  other characteristic protected by applicable law.
  
  If you need assistance or an accommodation due to a
  disability, please email us at
  interviewaccommodation@forter.com. This information will be
  treated as confidential and used only for the purpose of
  determining an appropriate accommodation for the interview
  process. Hybrid work: At Forter, we embrace a hybrid work
  model that blends in-person connection with the flexibility
  of remote work. Team members based near our key hubs are
  expected to work from the office at least three days per
  week. We believe that regular face-to-face collaboration
  fuels professional development, strengthens our culture, and
  builds the relationships that help teams thrive.
  
