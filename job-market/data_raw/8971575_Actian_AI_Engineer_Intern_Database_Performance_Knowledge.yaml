description: |
  Company
  
  At Actian we believe data should be a competitive advantage.
  Through the deployment of data technology, underpinned by a
  relentless and trusted service commitment, we help business
  critical systems transact and integrate at their very best.
  As a trusted leader in data management, integration, and
  analytics, our mission is to helping businesses unlock the
  full potential of their data to drive better decision-making
  and innovation wherever it resides — in the cloud, on-
  premises, or hybrid environments.
  
  With a global team of experts and a culture of innovation,
  we’re dedicated to helping our customers solve their most
  complex data challenges.
  
  Internship Overview
  
  We are looking for interns to join us for our 2026 Summer
  Internship Program! This 12-week program is set to begin
  June 8th, so if you are looking for an incredible
  opportunity to partner with the best and brightest minds in
  the industry, apply today. This program has been designed
  with our interns in mind and includes structured learning
  plans, a dedicated buddy, and a focused capstone project
  that you will have the opportunity to present in our
  Internship Showcase!
  
  What It’s Like Interning with Us!
  
  - Intern Events— just because the internship is remote,
    doesn’t mean we don’t have time for fun! Regular intern
    events will be hosted throughout your 12-weeks with us!
  - Time with Executives— Interns all get a chance to connect
    with our executive team through panel discussions, 1:1s,
    Q&A meetings, and events
  - Workshops — Interns participate in workshops geared towards
    helping new professionals
  - Opportunity to travel – we will fly you out for onsite
    orientation at our Austin, Texas office location!
  
  Position Overview
  
  The position is to create a Results Augmented Generation
  (RAG) pipeline that can obtain system performance
  information, and relevant administrative documents for use
  by the LLM to recommend changes to the HCL Informix Database
  Server configuration.
  
