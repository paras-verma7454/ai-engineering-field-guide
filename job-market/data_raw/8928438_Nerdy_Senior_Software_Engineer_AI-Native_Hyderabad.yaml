description: |
  Overview
  
  We are looking for Senior Software Engineers based in
  Hyderabad to join the engineering team to help with our
  ongoing growth and expansion! Your focus would be on
  building products using Javascript and Typescript and a core
  Object-Oriented Programming language like Java/C++/C#. We
  have a complete CI/CD software lifecycle and an evolving
  services-oriented architecture hosted in AWS. We require
  Senior Software Engineers with a strong focus on AI-Native
  development. Proficiency in utilizing various Agentic coding
  tools to significantly amplify impact and accelerate
  implementations is essential for this role.
  
  As a Senior Software Engineer, you’ll help shape how
  students, educators, and institutions interact with our
  technology. Whether it’s building a seamless class discovery
  flow, improving accessibility and performance, or
  integrating AI into real-time classroom experiences, your
  work will directly impact how people learn every day. You’ll
  collaborate with Product, Design, and Engineering to create
  fast, elegant, and responsive interfaces that bring our
  innovations to life.
  
  About Nerdy:
  
  At Nerdy (NYSE: NRDY) -  the company behind Varsity Tutors -
  we’re redrawing the blueprint of learning. Our Live + AI™
  platform fuses real-time human expertise with proprietary
  generative-AI systems, setting a new bar for measurable
  academic impact at global scale. We recruit the kind of
  technologists and operators you’d bet on as solo founders -
  people who turn ambiguous problems into shipping code,
  iterate faster than markets move, and compound their
  advantage with every data point. In an era where great
  employees can deliver 10-times the leverage of the merely
  good, we back those who play to win.
  
  Fortune favors the bold. Join us.
  
  How we compete:
  
  - AI-Native at every levelFrom the CEO to day-one hires,
    everyone builds and ships with generative AI. If you’re
    not wielding AI, you’re not done.
  - Entrepreneurial velocityMove at founder speed, prototype in
    hours, and measure in real user outcomes. Slow teams die.
  - Free-market rigor Ideas rise or fall on merit and results -
    no committees, no politics, no cap on upside.
  - Full-stack ownership You design, build, and run what you
    ship; accountability is a feature, not a bug.
  - Reward for contributionPay rises with impact, not years.
    Outstanding results earn outsized rewards. We evaluate
    both what you achieve and howyou achieve it: living our
    leadership principles and using AI effectively are
    formally measured and rewarded.
  - Relentless explorationPush the frontier of generative AI in
    live learning and - because only the paranoid survive -
    questioning every legacy assumption along the way.
  - Is ApoliticalYou stay focused on mission-aligned outcomes,
    not distractions or unrelated causes.
  
  If you’re a technically minded builder who thrives on open
  competition, personal responsibility, and the chance to
  redefine how the world learns - while continually stretching
  the limits of what generative AI can do - come do the most
  ambitious and rewarding work of your career here. Learn more
  at nerdy.com.
  
  Nerdy’s shareholder letters below explain our latest
  products and strategy:
  
  - Q4-2025 Shareholder Letter
  - Q3-2025 Shareholder Letter
  - Q2-2025 Shareholder Letter
  
  Qualifications:
  
  - Experience with Javascript and Typescript.
  - Experience with a core Object-Oriented Programming language
    like Java/C++/C#
  - Familiarity with backend services & technologies is a plus
  - Experience with deployment systems (e.g. GitHub Actions, AWS
    CodeDeploy).
  - Familiarity with AWS Services (e.g. RDS, Lambda, EC2, et
    cetera).
  - Familiarity with the Linux operating system and command-line
    tools.
  - Understanding of OO design, algorithms, and data structures.
  - Aptitude to quickly learn new languages and technologies as
    necessary.
  - Experience developing websites that are visited by thousands
    of visitors daily.
  - Experience with enhancing SEO performance.
  - Experienced with AI-native tools that enhance productivity
    and speed (e.g., Cursor, Make, Supabase, Netlify, Claude
    Code, n8n, Firecrawl, ChatGPT, Grok, Bolt, Vercel, etc).
  - Understand and appreciate that Nerdy is an apolitical
    company and that we can have the largest impact if we are
    united in our focus on helping people learn and not
    divided or distracted by advancing unrelated causes.
  - Computer Science or related degree preferred.
  - Fluent in English.
  
  Responsibilities:
  
  - Write performant, maintainable code that is easy to read and
    well-documented.
  - Write automated tests to thoroughly validate the correctness
    of your code.
  - Deploy large-scale web applications.
  - Have a focus on quality, and operate iteratively to get from
    good to better.
  - Be a part of your team’s on-call rotation; we all own our
    code end-to-end from development to deployment to
    operations.
  - Come ready to learn from some of the best and brightest in
    the industry.
  - Work independently and collaboratively in a dynamic and
    fast-moving team.
  - Be effective in a team environment working with fellow
    engineers, product management, and design.
  
  
  
  Unlock Your Full Potential at Nerdy:
  
  Join our worldwide team—work from home, get great pay, and
  help shape the future of learning. Here’s what you get:
  
  - Competitive Compensation: Enjoy a market-leading rate.
  - 100% Remote (Home Country Only): Work from anywhere in your
    home country—no relocation required, no borders crossed.
  - Flexible Time Off: Our flexible PTO lets you recharge on
    your own terms and when you need it the most.
  - Local Holiday Pay: We honor your nation’s official holidays
    with paid time off—celebrate what matters to you.
  - Continuous Learning: Get a free, all-inclusive learning
    membership for you and your household—including 1-on-1
    tutoring hours, unlimited on-demand classes, and access to
    our full suite of learning products and services.
  - Supercharge with AI: Gain exclusive access to cutting-edge
    AI tools that boost your productivity, making you feel
    almost super-human (cape not included).
  
  The Bottom Line:
  
  If you're driven by impact, energized by ownership, and
  excited to help shape what’s next, you’ll thrive here. We
  move fast, think big, and reward those who deliver. This
  isn’t a traditional corporate environment - it’s a place to
  do the most meaningful work of your career.
