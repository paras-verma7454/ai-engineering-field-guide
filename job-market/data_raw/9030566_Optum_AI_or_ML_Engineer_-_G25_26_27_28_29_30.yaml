description: |
  Requisition Number: 2294805 Optum is a global organization
  that delivers care, aided by technology to help millions of
  people live healthier lives. The work you do with our team
  will directly improve health outcomes by connecting people
  with the care, pharmacy benefits, data and resources they
  need to feel their best. Here, you will find a culture
  guided by inclusion, talented peers, comprehensive benefits
  and career development opportunities. Come make an impact on
  the communities we serve as you help us advance health
  optimization on a global scale. Join us to start Caring.
  Connecting. Growing together. We are seeking a skilled and
  motivated AI/ML Engineer to design, develop, and deploy
  machine learning and artificial intelligence solutions. This
  role involves working with cross-functional teams to build
  intelligent systems that solve complex problems, leveraging
  the latest advancements in AI/ML technologies. Primary
  Responsibilities:
  
  - Design, develop, and deploy machine learning models and
    algorithms into production environments
  - Translate complex analytical concepts into actionable
    insights for stakeholders and leadership
  - Apply AI/ML techniques such as natural language processing
    (NLP), natural language understanding (NLU), semantic
    analysis, intent classification, computer vision, deep
    learning, and automatic speech recognition (ASR)
  - Utilize deep learning to enable systems to perceive, learn,
    and respond to complex scenarios
  - Adapt AI/ML technologies to domains such as robotics,
    interactive systems, and intelligent automation
  - Work with large-scale data processing frameworks and data
    analysis platforms
  - Apply statistical methods, experimental design,
    optimization, and probability theory to develop robust AI
    solutions
  - Collaborate with cross-functional teams to identify,
    prioritize, and execute AI/ML initiatives
  - Stay current with emerging trends and technologies in AI/ML
    and incorporate them into ongoing projects
  - Communicate technical concepts clearly to both technical and
    non-technical audiences
  - Build and maintain solid relationships with internal and
    external stakeholders
  - Comply with the terms and conditions of the employment
    contract, company policies and procedures, and any and all
    directives (such as, but not limited to, transfer and/or
    re-assignment to different work locations, change in teams
    and/or work shifts, policies in regards to flexibility of
    work benefits and/or work environment, alternative work
    arrangements, and other decisions that may arise due to
    the changing business environment). The Company may adopt,
    vary or rescind these policies and directives in its
    absolute discretion and without any limitation (implied or
    otherwise) on its ability to do so
  
  Required Qualifications:
  
  - Experience with ML frameworks (e.g., TensorFlow, PyTorch,
    Scikit-learn)
  - Experience with DevOps and CI/CD tools and practices, such
    as Git, Jenkins, Docker, Kubernetes, etc.
  - Experience with AI/ML frameworks and tools, such as MLFlow,
    TensorFlow, PyTorch, Keras, Scikit-learn, etc.
  - Experience in leading and managing AI/ML teams and projects,
    from ideation to delivery and evaluation
  - Expertise in various AI/ML techniques, such as deep
    learning, natural language processing, computer vision,
    recommender systems, reinforcement learning, large
    language models, etc.
  - Proficiency in programming languages such as Python, R, or
    Java
  - Familiarity with cloud platforms and scalable computing
    environments
  - Solid understanding of data structures, algorithms, and
    software engineering principles
  - Proven ability to work independently and collaboratively in
    a fast-paced environment
  - Proven excellent communication, presentation, and
    interpersonal skills, with the ability to explain complex
    AI/ML concepts and results to technical and non-technical
    audiences
  - Proven solid analytical, problem-solving, and decision-
    making skills, with the ability to balance innovation and
    pragmatism
  - Proven passion for learning and staying updated with the
    latest AI/ML trends and research
  
  
  Preferred Qualifications:
  
  - PhD in computer science, engineering, mathematics,
    statistics, or a related discipline
  - A proven track record of delivering high-impact AI/ML
    solutions for real-world problems and use cases
  - A portfolio of AI/ML publications, patents, or awards
  - Background in Healthcare (AI)
  
  
  At UnitedHealth Group, our mission is to help people live
  healthier lives and make the health system work better for
  everyone. We believe everyone-of every race, gender,
  sexuality, age, location and income-deserves the opportunity
  to live their healthiest life. Today, however, there are
  still far too many barriers to good health which are
  disproportionately experienced by people of color,
  historically marginalized groups and those with lower
  incomes. We are committed to mitigating our impact on the
  environment and enabling and delivering equitable care that
  addresses health disparities and improves health outcomes -
  an enterprise priority reflected in our mission.
