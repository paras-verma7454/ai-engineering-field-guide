description: |
  The Company:
  
  Faraday Future is a California-based technology company
  focused on the design, engineering, and development of
  intelligent, connected electric vehicles and related
  artificial intelligence–enabled technologies.
  
  Founded in 2014, the Company's mission is to disrupt the
  automotive and technology industries by creating user-
  centric, technology-first experiences. The Company, together
  with its controlled subsidiaries, operates across multiple
  technology-driven areas, including AI electric vehicles,
  robotics, and its crypto business (AIXC), all under its
  upgraded Global EAI Industry Bridge Strategy, marking the
  beginning of a new chapter in AI mobility and Web3
  integration. The Company aims to leverage the latest
  technologies and world's best talent to realize exciting new
  possibilities across all of these lines. Faraday Future's
  automotive business exemplifies its vision for luxury,
  innovation, and performance, while its FX strategy aims to
  introduce mass production models equipped with state-of-the-
  art luxury technology derived from the FF brand, targeted
  towards a broader market with middle-to-low price range
  offerings. FF is committed to redefining mobility through AI
  innovation. Join us in shaping the future of intelligent
  transportation and technology by creating something new,
  something connected, and something with a true global
  impact.
  
  Your Role:
  
  The Senior Staff AI Engineer, Generative AI Platforms &
  Workflows will lead the engineering of AI-native platforms
  and automation systems that power content production,
  creative operations, and cross-functional workflows inside
  FF's Visual Marketing and broader creative organization.
  
  This role sits at the intersection of AI engineering, agent
  orchestration, and business workflow automation, with the
  goal of transforming how FF's marketing, content, and
  operations teams work — turning manual, time-consuming
  processes into scalable, AI-powered systems. You will design
  and ship AI agents, tool integrations, and production-grade
  automation that enable a small team to deliver with the
  output of a much larger one.
  
  This is a hands-on engineering role. You will architect and
  build the systems yourself — multi-agent orchestration,
  memory and knowledge layers, model routing, tool
  integration, and the user-facing interfaces that sit on top.
  You will also contribute to FF's broader EAI strategy by
  helping develop internal AI platforms that the Company plans
  to roll out across its marketing, creative, and operations
  functions.
  
  This position reports to the Head of Visual Marketing and
  works cross-functionally with marketing, content, product,
  and engineering teams to align AI-powered platforms with
  business objectives and measurable outcomes.
  
  This is a full-time on-site role based in Los Angeles,
  California, requiring regular in-office collaboration.
  Fluency in both English and Chinese is required.
  
  Key Responsibilities:
  
  - AI Workflow Engineering: Build AI-powered workflow systems
    that help marketing, content, and operations teams
    automate complex creative and business tasks — from asset
    generation and campaign operations to research, review,
    and distribution pipelines.
  
  - Agent Platform Development: Design and implement multi-agent
    orchestration infrastructure — state machines, supervisor-
    executor patterns, task scheduling, memory and knowledge
    systems, and failure recovery — so that non-technical
    teams can configure and run their own AI teams.
  
  - Generative Content Pipelines: Architect end-to-end
    generative AI pipelines spanning image, video, copy, and
    multimodal asset generation to support FF's global brand
    marketing, product launches, and visual storytelling
    initiatives.
  
  - Tooling & Integration Layer: Integrate AI tools, MCP-based
    plugins, and third-party services (OpenRouter, Composio,
    Claude Code, Cursor, Midjourney, Runway, ComfyUI, and
    similar) into production-grade workflows that can be
    safely operated by business users.
  
  - AI-Native Engineering Practices: Use AI coding tools (Claude
    Code, Cursor, and equivalents) as your primary development
    method. Establish engineering workflows, prompts, and
    patterns that maximize one-engineer throughput through AI-
    assisted development.
  
  - Business-Aligned Delivery: Work directly with marketing,
    content, product, and operations stakeholders to
    understand pain points, translate messy business
    requirements into clean technical solutions, and measure
    impact on time-to-ship, content quality, and operational
    cost.
  
  - Platform & SOP Thinking: Design for reuse and scale — build
    shared components, asset libraries, SOPs, and self-serve
    tooling so creative and business teams can operate AI
    systems independently, without engineering bottlenecks.
  
  - Innovation & Experimentation: Continuously evaluate emerging
    models, agent frameworks, and creative AI tools. Prototype
    rapidly, validate against real business workflows, and
    bring proven technology into production.
  
  
  
  Basic Qualifications:
  
  - Education: Bachelor's degree or above in Computer Science,
    Electrical Engineering, or a related technical discipline.
  
  - Experience: 7-10 years of software engineering experience,
    with meaningful hands-on work in AI/ML systems, AI agents,
    or AI-enabled tools and products.
  
  - AI Engineering: Demonstrated ability to design and ship AI-
    powered products — not just calling APIs, but building
    orchestration logic, prompt systems, memory layers, and
    tool-integration chains.
  
  - LLM Fundamentals: Solid understanding of LLM capabilities
    and boundaries — context windows, prompting patterns
    (System Prompt, CoT, Few-shot), model selection, and
    cost/quality trade-offs.
  
  - AI-Assisted Development: Daily, proficient user of Claude
    Code, Cursor, or equivalent AI coding tools. Able to
    clearly demonstrate how these tools multiply your
    engineering output.
  
  - Business Sense: Comfortable working alongside non-technical
    teams (marketing, content, product, operations). Strong
    ability to translate ambiguous business needs into clean
    engineering solutions and to prioritize based on real-
    world impact.
  
  - Delivery Track Record: Has independently shipped at least
    one complete product, internal platform, or meaningful
    open-source contribution from idea to production —
    evidence of end-to-end delivery capability.
  
  - Fluency in both English and Chinese due to internal support
    for Global Team
  - Ability to work on-site in Los Angeles, CA.
  
  Preferred Qualifications:
  
  - Experience building multi-agent systems, AI workflow
    automation platforms, or creative AI production pipelines.
  
  - Familiarity with MCP protocol, Composio, Vercel AI SDK,
    LangGraph, CrewAI, LobeHub, or similar agent frameworks
    and tool-integration platforms.
  
  - Hands-on experience with generative media tools such as
    Midjourney, Flux, Runway, Pika, Sora, ComfyUI, or Unreal
    Engine / Blender real-time pipelines.
  
  - Full-stack development experience: TypeScript/Node.js,
    Next.js, or Tauri desktop applications.
  
  - Prior experience in marketing tech, creative production,
    media/entertainment, or other content-heavy industries.
  
  - Founding-engineer, solo-builder, or early-stage startup
    background — comfortable owning a product from zero to
    launch.
  
  - Strong product intuition — able to make UX decisions,
    prioritize features, and think from the user's perspective
    without a detailed PRD.
  - Interest in automotive, robotics, Web3, or autonomous
    systems, aligned with FF's broader EAI Industry Bridge
    Strategy.
  
  Salary Range:
  
  ($180,000-$200,000 DOE), plus benefits and incentive plans
  
  Perks + Benefits:
  
  - Healthcare + dental + vision benefits (Free for
    you/discounted for family)
  
  - 401(k) options
  
  - Casual dress code + relaxed work environment
  
  Faraday Future is an equal opportunity employer and does not
  discriminate on the basis of race, national origin, gender,
  gender identity, sexual orientation, protected veteran
  status, disability, age, or other legally protected status.
