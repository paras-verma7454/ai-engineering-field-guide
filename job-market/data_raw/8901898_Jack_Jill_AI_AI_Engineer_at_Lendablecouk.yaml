description: |
  This is a job that Jill, our AI Recruiter, is recruiting for
  on behalf of one of our customers.
  
  She will pick the best candidates from Jack's network.
  
  The next step is to speak to Jack.
  
  Job Title: AI Engineer
  
  Company Description: Lendable.co.uk - VC-backed fintech SaaS
  
  Job Description: Join a high-impact team of four engineers
  and one PM dedicated to supercharging internal operations
  through AI automation. You will build and ship tools, LLM
  integrations, and automated workflows that directly reduce
  friction for Finance, Compliance, and Product teams, seeing
  the immediate tangible results of your code in a fast-paced
  environment.
  
  Location: London, UK or Remote (EU)
  
  Why this role is remarkable:
  
  - Direct high-leverage impact where you can build a solution
    on Monday and see it saving colleagues hours of manual
    work by Friday.
  - Work at the frontier of AI by implementing agentic
    workflows, MCP integrations, and AWS Bedrock solutions
    rather than just maintaining legacy systems.
  - Join a lean, fast-moving team within a successful fintech
    where you have full ownership from problem discovery
    through to production deployment.
  
  What you will do:
  
  - Build and maintain AI connectors and knowledge base
    pipelines for platforms like Google Workspace, Slack,
    Snowflake, and Confluence.
  - Develop an internal automation platform using LLM provider
    APIs, n8n, and custom-built solutions to enable non-
    engineers to experiment safely.
  - Collaborate with the PM and Engineering Lead to identify
    high-leverage opportunities, shipping quickly and
    iterating based on real-world adoption metrics.
  
  The ideal candidate:
  
  - Has 4+ years of software engineering experience with strong
    full-stack proficiency in Python or TypeScript and
    shipping to Kubernetes.
  - Possesses proven commercial experience building AI tooling,
    working with LLMs, embeddings, and modern AI application
    patterns.
  - Is a self-starter motivated by measurable impact, capable of
    designing and monitoring API integrations and automated
    workflows end-to-end.
  
  Who are Jack & Jill?
  
  Ok, I'll go first. I'm Jack, an AI that gets to know you on
  a quick call, learning what you're great at and what you
  want from your career. Then I help you land your dream job
  by finding unmissable opportunities as they come up,
  supporting you with applications, interview prep, and moral
  support.
  
  And I'm Jill, an AI Recruiter who talks to companies to
  understand who they're looking to hire. Then I recruit from
  Jack's network, making an introduction when I spot an
  excellent candidate.
  
  Next steps
  
  Step 1. Visit our website. Step 2. Click 'Talk to Jack'.
  Step 3. Talk to Jack so he can understand your experience
  and ambitions. Step 4. Jack will make sure Jill (the AI
  agent working for the company) considers you for this role.
  Step 5. If Jill thinks you're a great fit and her client
  wants to meet you, they will make the introduction. Step 6.
  If not, Jack will find you excellent alternatives. All for
  free.
  
  We never post fake jobs
  
  This isn't a trick. This is an open role that Jill is
  currently recruiting for from Jack's network. Sometimes
  Jill's clients ask her to anonymize their jobs when she
  advertises them, which means she can't share all the details
  in the job description. We appreciate this can make them
  look a bit suspect, but there isn't much we can do about it.
  
  Give Jack a spin! You could land this role. If not, most
  people find him incredibly helpful with their job search,
  and we're giving his services away for free.
