description: |
  Figma is growing our team of passionate creatives and
  builders on a mission to make design accessible to all.
  Figma’s platform helps teams bring ideas to life—whether
  you're brainstorming, creating a prototype, translating
  designs into code, or iterating with AI. From idea to
  product, Figma empowers teams to streamline workflows, move
  faster, and work together in real time from anywhere in the
  world. If you're excited to shape the future of design and
  collaboration, join us!
  
  At Figma we believe design doesn’t end in a file or with
  your designer — it includes everything that goes into the
  product you ship: the production code that ties it all
  together, the systems and developer tools that make that
  code reliable, the context you provide to our AI agents, and
  the documentation that keeps everyone on the same page.
  
  The Code Area at Figma is redefining how Designers, PMs and
  Engineers collaborate. We are responsible for agentic
  workflows enabling ideation and prototyping on production
  codebases as well as accelerating the journey from design to
  code. In 2023, we launched Dev Mode, a suite of features
  that give developers everything they need to navigate design
  files and transform designs into code. In 2025, we
  introduced Figma’s MCP, accelerating how ideas get to
  production. Looking to the future, we aim to further reduce
  the barriers between design to code and code to design
  allowing ideation, prototyping and productionisation to
  happen seamlessly where it most makes sense.
  
  Our Code organization is expanding, and we’re hiring AI
  Product Engineers across multiple levels in the UK. We’re
  looking for people who have built generative AI products and
  are eager to lead AI efforts end-to-end, from early ideas to
  production.
  
  Join us in shaping the future of AI at Figma!
  
  What you’ll do at Figma:
  
  - Build and evolve Dev Mode, Figma’s leading tool for
    dev/design collaboration
  - Take part in building new 0→1 products within the agentic
    coding space
  - Collaborate with designers, PMs, and other engineers craft
    high quality products
  - Be a mentor to, and be mentored by, exceptional peers across
    engineering, product & design
  - Build strong personal connections with your teammates and
    help shape Figma’s culture.
  
  We’d love to hear from you if you have:
  
  - 3+ years of experience shipping user-facing features or
    products as a full-stack developer
  - Demonstrated strong fluency with React & Typescript
  - Experience communicating and working across functions to
    proactively drive solutions
  - Attention to detail, quality, and craftsmanship
  - High velocity & a focus on user impact
  
  While it’s not required, it’s an added plus if you also have
  experience:
  
  - Leading large scale engineering projects with high impact
  - Driving XFN projects collaborating with Product, Design,
    Data & Research
  - Working with user facing LLM and agentic product features
  - Working with Ruby / Ruby on Rails.
  - Developing for iOS and/or Android
  
  At Figma we celebrate and support our differences. We know
  employing a team rich in diverse thoughts, experiences, and
  opinions allows our employees, our product and our community
  to flourish. Figma is an equal opportunity workplace - we
  are dedicated to equal employment opportunities regardless
  of race, color, ancestry, religion, sex, national origin,
  sexual orientation, age, citizenship, marital status,
  disability, gender identity/expression, veteran status, or
  any other characteristic protected by law. We also consider
  qualified applicants regardless of criminal histories,
  consistent with legal requirements.
  
  We will work to ensure individuals with disabilities are
  provided reasonable accommodation to apply for a role,
  participate in the interview process, perform essential job
  functions, and receive other benefits and privileges of
  employment. If you require accommodation, please reach out
  to accommodations-ext@figma.com. These modifications enable
