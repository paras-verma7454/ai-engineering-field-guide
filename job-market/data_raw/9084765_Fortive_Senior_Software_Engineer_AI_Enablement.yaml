description: |
  Experience: 4–7 Years
  
  Location: Provation India Development Centre (IDC),
  Bangalore
  
  Role Type: Full‑time, Engineering
  
  Travel: Up to 25–30%
  
  Role Overview
  
  The Senior Software Engineer, AI Enablement, plays a
  hands‑on technical role in designing, developing, and
  scaling AI‑powered automation solutions across internal
  business units. The role focuses on embedding AI into real
  operational workflows to drive measurable improvements in
  productivity, quality, and efficiency.
  
  You will partner with Principal Software Engineer,
  cross‑functional teams, build rapid AI prototypes, deploy
  production‑ready solutions, and create reusable assets that
  accelerate adoption across global teams. Once solutions
  mature, you will transition ownership and move to the next
  high-impact opportunity.
  
  This role is ideal for engineers with strong technical
  depth, business problem‑solving ability, and a passion for
  driving enterprise-wide AI enablement.
  
  Key Responsibilities
  
  1. AI Solution Design & Implementation
  
  • Own end‑to‑end delivery of AI‑powered automation
  projects—from discovery to deployment, across various
  functional teams in Provation.
  
  • Translate ambiguous business problems into concrete AI/ML
  opportunities.
  
  • Build prototypes, minimum viable solutions (MVS), and
  demonstrable ROI models.
  
  • Implement solutions using LLMs, agent frameworks, workflow
  automation, REST APIs, and cloud services.
  
  • Collaborate with cross functional teams to scale or
  productionize successful pilots.
  
  2. Cross‑Functional Collaboration
  
  • Work directly with business stakeholders, SMEs, and
  process owners to identify high‑value AI opportunities.
  
  • Coordinate with global engineering, data, and automation
  teams, including offshore centers.
  
  3. Enablement & Knowledge Transfer
  
  • Create reusable templates, documentation, code modules,
  and training resources.
  
  • Build playbooks and standardized modules that accelerate
  repeatable rollout across business units.
  
  4. Scaling AI Across Enterprise
  
  • Establish a repeatable “build → enable → transition →
  replicate” model for global AI adoption.
  
  • Drive alignment with responsible AI, data governance, and
  enterprise engineering standards.
  
  • Influence internal tooling, AI platform strategy, and
  long‑term architectural decisions.
  
  Required Qualifications
  
  Education & Experience
  
  • Bachelor’s or Master’s degree in Computer Science, Data
  Science, Engineering, or related field.
  
  • 4–7 years of hands‑on experience in software engineering,
  systems engineering, or automation development across
  diverse domains.
  
  Technical Skills
  
  • Experience implementing AI/ML or automation solutions
  using Python, cloud platforms (AWS/Azure/GCP), REST APIs,
  microservices, GenAI APIs (OpenAI/Azure OpenAI/Bedrock), and
  workflow/orchestration tools.
  
  • Familiarity with SDLC, DevOps, security, and compliance in
  enterprise environments.
  
  Core Capabilities
  
  • Strong communication and stakeholder engagement skills.
  Proven expertise in using Copliot CLI, Claude code to build
  applications
  
  • Ability to translate business needs into technical
  solutions.
  
  • Proven ownership of end-to-end AI project lifecycle.
  
  • Strong analytical and problem‑decomposition skills.
  
  • Experience working with globally distributed/offshore
  teams.
  
  • Ability to quickly learn enterprise tools and frameworks.
  
  Preferred Skills
  
  • Experience with intelligent automation for document
  processing, ticket triage, or reporting.
  
  • Prompt engineering and LLM orchestration knowledge.
  
  • Understanding of MLOps (nice‑to‑have).
  
  • Experience in federated or shared-services environments.
  
  Fortive 9 Behaviors by Level:
  
  Influencing & Mentoring
  
  Customer Obsessed: Champions a customer-focused culture by
  anticipating evolving needs and shaping solutions that
  deliver long-term value.
  
  Strategic: Drives organizational impact by using data to
  derive insights that inform near-term and mid-range goals
  
  Innovation for Impact: Influences innovation through
  demonstrating bold thinking and experimentation in own work
  and coaching others to do the same.
  
  Inspiring: Demonstrates purpose-driven impact through
  expertise and collaboration.
  
  Builds Extraordinary Teams: Drives impact through
  collaboration and influence by fostering trust, sharing
  expertise, and aligning efforts across teams.
  
  Courageous: Influences and leads by example through action
  and integrity—moves quickly toward goals, tackles challenges
  head-on, and encourages open sharing of ideas without fear.
  
  Delivers Results: Leads complex initiatives to successful
  completion with high standards, precision, and urgency.
  
  Adaptable: Applies rigor and stays true to process while
  fostering adaptability within the team.
  
  Lead with FBS: Embraces FBS and models lean principles by
  mentoring peers and influencing teams, and going to Gemba
  for first-hand insights.
