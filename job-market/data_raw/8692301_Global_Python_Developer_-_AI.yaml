description: |
  Accepting applications until: 24 April 2026Job
  DescriptionPython Developer
  
  Reporting of the Role This role reports to the Python
  Developer
  
  Overview of job This role is part of our Global:IQ team, the
  group developing our new intelligence platform. Global:IQ
  brings together a suite of 1st party and partner data, tools
  and capabilities to turn data into audience understanding
  and optimised, data-led media plans. Using a combination of
  data science, machine learning & AI techniques, it supports
  smarter targeting across Global’s audio and out-of-home
  inventory, optimises advertising creatives and automates the
  tracking of outcomes for advertisers through the acquisition
  funnel—from building awareness and consideration to driving
  action.
  
  As a Python Engineer, you will be the technical backbone of
  this initiative, building the scalable backend systems that
  allow our AI and machine learning models to run efficiently
  and effectively in production.
  
  3 best things about the job
  
  Build the Future: You aren't just maintaining legacy code;
  you are building the "brain" of the company, working on end-
  to-end AI and data developments that directly impact how we
  deliver media.
  
  Startup Mindset, Enterprise Scale: You get the best of both
  worlds—the autonomy and fast-paced culture of a startup
  environment, backed by the data assets and resources of a
  major media and entertainment company.
  
  Modern Tech Stack: You will be working with the tools you
  love—Python, FastAPI, Postgres, and Snowflake—without being
  bogged down by outdated systems.
  
  Measures of success
  
  In the first few months, you would have:
  
  - Gained a comprehensive understanding of the Global:IQ
    architecture and data flows.
  - Delivered first outcomes at pace into production with an eye
    to modern AI-enabled development methodology.
  - Contributed considerably in bringing our new Global:IQ
    product offering to production.
  - Established yourself as a technical leader within the team,
    advocating for best practices in software development.
  
  Key Responsibilities of the Role
  
  - Backend Engineering (50%): Design, build, and maintain
    robust APIs and microservices using Python, FastAPI, and
    Postgres to power the Global:IQ platform.
  - Data Engineering (20%): Deliver high-level data engineering
    solutions and pipelines that support Global:IQ’s AI and
    analytics use cases.
  - Infrastructure & Data Warehousing (30%): Architect and
    manage integrations with cloud platforms (AWS) and data
    warehouses, specifically Snowflake, ensuring data
    accessibility and query performance.
  
  What you will need
  
  - Experience: 3+ years of experience in backend engineering.
  - Tech Stack: Strong proficiency in Python, with specific
    experience in FastAPI and Postgres.
  - Data Leadership: Proven experience in leading data and AI-
    driven projects from conception to deployment.
  - Cloud Data: Hands-on experience with cloud platforms and
    data warehouses, specifically Snowflake.
  
  Preferred / Bonus:
  
  - Data-Adjacent Experience: A strong understanding of how to
    build engineering systems that support data workflows.
  - AI/ML Depth: Experience with end-to-end development of AI or
    Machine Learning features.
  - Mindset: Startup or highly accountable team experience. You
    are comfortable with ambiguity, move fast, and focus on
    shipping value.
  - Agentic and AI-accelerated engineering: You are capable with
    using agentic coding tools and able to deliver outcomes
    effectively into production with tools like Claude Code,
    Codex, etc.
  - Domain Passion: You should love the challenge of using data
    & intelligence to drive ad campaign efficiency and
    demonstrate the value of the investment in the media.
