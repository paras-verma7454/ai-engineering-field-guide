  NICE Ltd. (NASDAQ: NICE) is an innovation leader in AI,
  cloud, and digital solutions, serving over 25,000 global
  businesses, including 85 of the Fortune 100 corporations.
  With over 8,500 employees across 30+ countries, NICE
  software handles more than 120 million customer interactions
  and monitors over 3 billion financial transactions daily.
  NICE is committed to diversity and inclusion, ensuring equal
  opportunities for all candidates.
  
