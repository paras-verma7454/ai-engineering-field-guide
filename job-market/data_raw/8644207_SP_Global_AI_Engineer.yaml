  About the Role:
  
  Grade Level (for internal use):
  
  10
  
  S&P Global Energy
  
  The role: Python Software Engineer
  
  The Team:
  
  Our Data Science and Modelling (DS&M) team drives innovation
  by transforming complex commodity data into actionable
  insights that impact global business decisions. We're a
  collaborative, goal-oriented group working in a dynamic
  environment where you'll leverage cutting-edge AI and
  automation technologies alongside talented data scientists,
  engineers, and domain experts who value continuous learning
  and creative problem-solving.
  
  Responsibilities and Impact:
  
  - Design workflow automation solutions using enterprise
    automation platforms or similar tools to streamline
    operations for internal and external clients
  - Create AI-powered agents to automate tasks and improve user
    efficiency
  - Build and maintain retrieval-augmented generation (RAG)
    applications and LLM-powered solutions using vector
    databases and orchestration frameworks to enhance data
    retrieval and generation capabilities
  - Work with business teams to analyze data, build pipelines,
    and identify automation opportunities
  - Drive business decisions based on insights obtained from
    data
  
  What We’re Looking For:
  
  Basic Required Qualifications:
  
  - Bachelor's degree in Computer Science, Engineering, or
    related discipline
  - Strong experience in object-oriented programming, with the
    ability to design and develop modular, maintainable code,
    and a solid understanding of design patterns and SOLID
    principles, including advanced use of distributed version
    control systems for collaborative development
  - 5+ years of programming experience with 3+ years of Python;
    and a strong understanding of data pipelines, machine
    learning implementation, and clean code practices
  - 1+ years hands-on experience building and deploying LLM-
    based applications, including RAG architectures using
    orchestration frameworks, vector databases, and LLM
    operations/monitoring tools
  - 1+ years hands-on experience with workflow automation
    platforms or similar technologies
  - 2+ years' experience accessing and manipulating data with
    relational or NoSQL databases
  
  Key Soft Skills:
  
  - Excellent written and spoken English communication skills
    with the ability to translate technical concepts for non-
    technical stakeholders
  - Collaborative team player who thrives in Agile environments
  - Adaptability and willingness to learn and adopt new tools
    and technologies
  
  Additional Preferred Qualifications:
  
  Key Qualifications
  
  - Recent work experience in an AI workflows role or experience
    with production LLM operations including prompt
    engineering, model evaluation, cost optimization, and
    managing LLM application lifecycle
  - Experience working with commodity markets
  - Experience with enterprise automation platforms or
    automation certifications
  - Experience with deep learning frameworks and unified
    analytics platforms
  - Knowledge of cloud services, big data technologies, large-
    scale data analytics tools, and API integration
  
  Soft Skills
  
  - Entrepreneurial mindset in identifying automation
    opportunities
  - Adaptable to rapidly changing technologies with a passion
    for new technologies
  - Strong stakeholder management and consulting orientation
  
  The location: Mexico or Colombia remote.
  
  What’s In It For You?
  
  Our Mission:
  
  Advancing Essential Intelligence.
  
  Our People:
  
  We're more than 35,000 strong worldwide—so we're able to
  understand nuances while having a broad perspective. Our
