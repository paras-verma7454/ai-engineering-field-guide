description: |
  About this role: Wells Fargo is seeking a Software Engineer.
  In this role, you will:
  
  - Participate in low to moderately complex initiatives and
    projects associated with the technology domain, including
    installation, upgrades, and deployment efforts
  - Identify opportunities for service quality and availability
    improvements within the technology domain environment
  - Design, code, test, debug, and document for low to
    moderately complex projects and programs associated with
    technology domain, including upgrades and deployments
  - Review and analyze technical assignments or challenges that
    are related to low to medium risk deliverables and that
    require research, evaluation, and selection of alternative
    technology domains
  - Present recommendations for resolving issues or may escalate
    issues as needed to meet established service level
    agreements
  - Exercise some independent judgment while also developing
    understanding of given technology domain in reference to
    security and compliance requirements
  - Provide information to technology colleagues, internal
    partners, and stakeholders
  
  Required Qualifications:
  
  - 2+ years of software engineering experience, or equivalent
    demonstrated through one or a combination of the
    following: work experience, training, military experience,
    education.
  
  Job Expectations:
  
  - 2+ years of experience in Java Full Stack, Java Springboot,
    Angular, Oracle / SQL Server, Kafka
  - Hands on experience in developing solution leveraging GenAI
    tools, knowledge about Agentic AI concepts is must
  - experience in Automated testing framework
  - Exposure to GenAI tools, Agentic AI
  - Strong written and verbal communication skills.
  - Strong analytical, debugging and problem solving skills
  - Experience with messaging services like Kafka
  - CI/CD techniques
  - JIRA/Confluence Proficiency
  - Knowledge in TDD or BDD frameworks
  - Proficiency in Agile delivery
  - Experience in developing Web API
  - Experience in ETL & Reporting tools - SSIS, SSRS and Tableau
  - Experience with any Cloud frameworks (like, Azure, PCF, OCP,
    GCP)
  - Experience with DevOps framework and Version control tools
    (Git, GitHub, Jenkins)
  - Domain Knowledge in financial industry
  
