description: |
  At JetBrains, code is our passion. Ever since we started
  back in 2000, we have strived to make the strongest, most
  effective developer tools on earth. By automating routine
  checks and corrections, our tools speed up production,
  freeing developers to grow, discover, and create.
  
  AI Assistant is an advanced software tool that leverages
  artificial intelligence to aid developers in various tasks.
  Our team develops the AI Assistant plugin for JetBrains
  IDEs. This tool integrates AI into the coding environment,
  enhancing features like code completion, debugging, and VCS
  operations. We’re striving to make JetBrains AI Assistant
  the most useful and intuitive AI-powered tool on the market,
  focusing on core features such as code completion, code
  generation, refactoring, and general assistance via chat.
  
  As part of our team, you will:
  
  - Perform functional, exploratory, and regression testing.
  - Design test cases and write specifications.
  - Reproduce bugs and verify fixes.
  - Communicate with the team, as well as internal and external
    users.
  - Participate in feature discussions and planning.
  - Have the opportunity to get hands-on experience working with
    data, performing online experiments, and measuring the
    impact of features on end users.
  
  Requirements:
  
  - Experience in testing without functional specifications.
  - Knowledge of testing methodologies.
  - Understanding of programming concepts sufficient for writing
    simple applications.
  - Experience with Java or Kotlin.
  - Commitment to working as a team, sharing your knowledge, and
    being open to other points of view.
  
  You’ll be great for our team if you:
  
  - Have an interest in machine learning.
  - Have experience working with data and know how to make data-
    informed decisions.
  
  Why join JetBrains?
  
  - Strong base salary. We offer competitive pay that reflects
    your skills and experience.
  - Flexible work location. Enjoy the freedom to work from home
    or from the office.
  - Remote work. Spend up to 30 days per year working remotely
    from abroad.
  - Extra time off. More days to relax, recharge, and do the
    things you love.
  - Medical insurance allowance. Enjoy peace of mind for you and
    your family
  - Learning and development opportunities. Access to
    conferences, courses, and language classes.
  - Relocation support. We help make your move as smooth and
    stress-free as possible.
  - Language classes. Pick up the local language or sharpen your
    English skills.
  - Fuel your day. Enjoy a hot meal or receive a lunch allowance
    on workdays.
  - Mental health support. To help you feel your best, we
    provide easy access to professional mental health
    services.
  - Sports benefit. Enjoy an on-site gym or sports club stipend.
  - Internal events. Join company-wide celebrations and team
    gatherings.
  
  *Some benefits may vary depending on location.
  
