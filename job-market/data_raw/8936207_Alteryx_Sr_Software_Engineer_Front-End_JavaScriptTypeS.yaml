description: |
  Meet the Moment with Alteryx
  
  We're living through a once-in-a-generation shift in how
  work gets done. Data, automation, and AI are quickly
  becoming the center of every business decision - and Alteryx
  is leading the transformation.
  
  You'll be working on the challenges that sit at the heart of
  modern business. No matter your role, the work you do will
  help organizations move faster, see more clearly, and tackle
  questions that used to feel impossible.
  
  If you're ready to meet the moment with innovation,
  curiosity, and excellence, there's a place for you here.
  
  Alteryx is searching for a Sr. Software Engineer (Front-
  End). This position is remote-friendly.
  
  Position Overview:
  
  We’re looking for a Senior Software Engineer to help build
  and scale AI-powered frontend experiences across Alteryx.
  This role spans shared conversational and agentic surfaces
  such as Copilot, workflow-native AI experiences such as
  GenAI Tools in Designer, and emerging extensibility
  experiences built around MCP and AI-ready product APIs.
  You’ll work across Designer Desktop, Alteryx One, and
  adjacent product surfaces to deliver interfaces that help
  users discover, configure, and use AI capabilities securely
  and effectively.
  
  You’ll partner closely with engineers, product managers,
  designers, and data scientists to deliver high-value user
  experiences, strengthen our frontend architecture, and help
  shape how AI shows up consistently across the Alteryx
  portfolio. This includes work on embedded AI surfaces,
  reusable frontend patterns, and the user experiences that
  connect Alteryx products to shared AI services and
  extensible agent ecosystems.
  
  This role is a strong fit for an engineer who can
  independently deliver medium-sized projects end-to-end,
  contribute to technical design, and raise the quality bar
  through code reviews, testing, and mentorship. You’ll help
  turn ambiguous product opportunities into reliable customer-
  facing capabilities while balancing speed, craft, and long-
  term maintainability.
  
  Primary Responsibilities:
  
  - Owning and delivering high-value frontend features across
    Copilot, GenAI Tools, and other AI experiences embedded in
    Alteryx products.
  - Collaborating with cross-functional partners to explore
    problem spaces, clarify requirements, shape implementation
    plans, and ship customer-facing improvements.
  - Building and evolving reusable UI patterns for
    conversational experiences, workflow-native AI tooling,
    tool actions, context-aware workflows, and product
    integration flows.
  - Partnering with backend, platform, and domain teams on AI-
    ready APIs, telemetry, and MCP-oriented integration points
    that make AI experiences more capable and extensible.
  - Contributing to software design, code reviews, testing
    strategy, telemetry, and engineering practices that
    improve reliability and developer velocity.
  - Mentoring engineers through thoughtful feedback, pairing,
    and day-to-day technical collaboration.
  - Helping the team respond quickly to new AI opportunities
    while making sound tradeoffs around performance, quality,
    and maintainability.
  
  Requirements:
  
  - 4+ years building production web applications with
    TypeScript / JavaScript, including 2+ years with React and
    modern frontend patterns.
  - Solid understanding of HTML, CSS, browser behavior,
    accessibility, and building polished user experiences
    across environments.
  - Demonstrated ability to own features or medium-sized
    projects end-to-end, from design and implementation
    through testing, rollout, and iteration.
  - Experience integrating frontend systems with backend APIs
    and service-oriented architectures.
  - Solid understanding of writing high-performing,
    maintainable, and testable code.
  - Strong experience with automated testing across unit,
    integration, and end-to-end layers.
  - Working knowledge of CI/CD practices and modern development
    workflows using tools such as GitLab or GitHub.
  - Ability to collaborate effectively with product, design,
    data science, and engineering partners in ambiguous
    problem spaces.
  
  Valued Skills:
  
  - Experience building AI-assisted, LLM-powered, or agentic
    product experiences.
  - Experience with Python backend services or APIs is
    especially valuable, since much of the supporting AI and
    service-side work is implemented in Python.
  - Experience with C# / .NET is a plus, particularly for
    Alteryx Designer integration
  - Experience with conversational UI patterns, workflow-native
    AI tools, or telemetry / event instrumentation.
  - Experience with micro-frontend architectures, extensibility
    platforms, or MCP-style integration models.
  - Experience working across service-oriented or message-based
    architectures.
  - Familiarity with observability, performance tuning, and
    Kubernetes-based environments.
  - Experience with data-rich product workflows, workflow
    builders, or analytics applications.
  
  About You:
  
  You’re passionate about building great software and want to
  have a direct impact on how customers experience AI across
  Alteryx products. You work independently, communicate
  clearly, and know how to make progress in ambiguous spaces
  without over-engineering the solution. You care about
  customer value, move comfortably between implementation
  detail and product context, and help the team get better
  through collaboration, mentorship, and a strong engineering
  mindset.
  
  Compensation:
  
  Alteryx is committed to fair, equitable, and transparent
  compensation. Final compensation is determined by several
  factors, including but not limited to relevant work
  experience, education, certifications, skills, and
  geographic location.
  
  The salary range for this role in the United States is
  $118,700 - $153,900.
  
  Bonus payouts are based on individual and company
  performance.
  
  In addition to base pay and bonus eligibility, this role
  includes clear forms of additional compensation, such as:
  
  - A monthly Connectivity Plus stipend of $150 to support
    remote work-related expenses
  - An annual $200 home office reimbursement
  
  Alteryx offers a comprehensive benefits package designed to
  support your health, financial security, and overall well-
  being, including:
  
  - Medical, dental, and vision coverage
  - 401(k) with company match
  - Paid parental leave, caregiver leave, and flexible time off
  - Mental health support and wellness reimbursement
  - Career development and education assistance
  
  Interested? Learn more and apply today at
  alteryx.com/careers!
  
  #LI-EM1
  
  #LI-REMOTE
  
  Find yourself checking a lot of these boxes but doubting
  whether you should apply? At Alteryx, we support a growth
  mindset for our associates through all stages of their
  careers. If you meet some of the requirements and you share
  our values, we encourage you to apply. As part of our
  ongoing commitment to a diverse, equitable, and inclusive
  workplace, we’re invested in building teams with a wide
  variety of backgrounds, identities, and experiences.
  
  Benefits & Perks:
  
  Alteryx has amazing benefits for all Associates which can be
  viewed here.
  
  For roles in San Francisco and Los Angeles: Pursuant to the
  San Francisco Fair Chance Ordinance and the Los Angeles Fair
  Chance Initiative for Hiring, Alteryx will consider for
  employment qualified applicants with arrest and conviction
  records.
  
  This position involves access to software/technology that is
  subject to U.S. export controls. Any job offer made will be
  contingent upon the applicant’s capacity to serve in
  compliance with U.S. export controls.
