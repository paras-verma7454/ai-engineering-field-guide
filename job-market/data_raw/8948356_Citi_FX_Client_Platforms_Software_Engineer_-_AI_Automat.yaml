description: |
  FX Client Platforms Software Engineer - AI Automation (VP)
  
  Engineer the future of global finance. At Citi, our Tech
  team doesn’t just support finance – we are helping to
  redefine it. Every day, $5 trillion crosses through our
  network. We do business in 180+ countries operating at a
  scale few can match. From deploying advanced AI to helping
  shape global markets, we build systems that matter. Look to
  join a team where your work helps influence economies, your
  ideas can drive innovation and outcomes, and your growth is
  backed by mentorship, continuous learning and flexibility
  with potential hybrid work opportunities. Help solve real-
  world challenges that touch millions and get the opportunity
  to build the future of finance with Citi Tech.
  
  About Citi
  
  As the world’s most global bank, Citi gives you the tools to
  be a trailblazer. We’re not just building technology; we’re
  building the future of banking. With thousands of employees
  located around the globe, we are an international team
  encompassing a broad range of teams, roles, and cultures,
  and we invite you to come and join us!
  
  Citi’s technology team supports business operations in 100+
  countries, across multiple lines of business spanning both
  Institutional and retail businesses.
  
  The group works to optimize the IT environment by
  standardizing production platforms, reducing complexity, and
  introducing innovative solutions that provide new business
  capabilities, reduce total cost of ownership, and create a
  competitive advantage for Citi.
  
  We want to regularly engage with talented individuals who
  are passionate about producing clean, testable code as part
  of a high performing team. We have found this to be way more
  important than experience in the financial sector.
  
  We welcome applications from any industry and should you
  wish to apply your application will be reviewed for a
  multitude of Developer positions at varying levels.
  
  About FX Tech
  
  Citi FX has a physical presence in 83 countries with 1,400
  dedicated staff giving us the largest FX presence of any
  bank globally. Foreign Exchange has been one of the defining
  businesses of Citi for much of its 200 year existence.
  
  Citi has the largest FX presence of any bank globally and we
  proudly put this down to delivering unrivalled service and
  insight to our clients. Increasing investment in technology
  has seen us roll out award winning applications. Technology
  is a central pillar for our plans to sustain and grow our FX
  business.
  
  Above all, we seek individuals who seek exceptional attitude
  and aptitude in the people they work with and have a
  demonstrated passion for delivering FX technology in support
  of our #1 FX business.
  
  Role Overview/What will you do:
  
  - Hands on technical implementation of FX trading systems
  - The successful candidate will work with teams across FX
    Technology implement solutions that benefit the business
  - The role does not involve budget responsibility
  - Drive the design and development of system architecture,
    work with end-users of the systems, and enhance the
    quality of deliverables Ensure staff follows Citi
    documented policy and procedures as well as maintain
    desktop procedures and supporting documentation for
    filings on a current basis and in comprehensive manner
  - Contribute to defining and implementing best practices and
    processes for the department and ensure transparency and
    consistency across teams
  - Work directly with trading and quant teams
  
  Key Skills and Experience required
  
  - Proven understanding of FX highly preferred
  - Understanding of low-latency development practices
  - Proven track record of building new systems, replacing
    legacy systems and renovating existing systems
  - The candidate will have systems (software, hardware,
    networks) knowledge required to define solutions and
    trouble shoot issues
  - Exceptional communicator who loves working with people,
    confident communicating at all levels from an individual
    team to the entire enterprise
  - Highly credible hands on engineer, confident to deep dive
    into a product and codebase and offer detailed,
    constructive analysis and feedback
  - Awareness of industry trends and leveraging new technologies
    as appropriate
  
  This job description provides a high-level review of the
  types of work performed. Other job-related duties may be
  assigned as required.
  
  What we’ll provide you
  
  By joining Citi, you will not only be part of a business
  casual workplace with a hybrid working model (up to 2 days
  working at home per week), but also receive a competitive
  base salary (which is annually reviewed), and enjoy a whole
  host of additional benefits such as:
  
  - 27 days annual leave (plus bank holidays)
  - A discretional annual performance related bonus
  - Private Medical Care & Life Insurance
  - Employee Assistance Program
  - Pension Plan
  - Paid Parental Leave
  - Special discounts for employees, family, and friends
  - Access to an array of learning and development resources
  
  Visit our About Us | Culture, Values & Benefits page to
  learn more.
  
  Alongside these benefits Citi is committed to ensuring our
  workplace is where everyone feels comfortable coming to work
  as their whole self, every day. We want the best talent
  around the world to be energized to join us, motivated to
  stay and empowered to thrive.
  
