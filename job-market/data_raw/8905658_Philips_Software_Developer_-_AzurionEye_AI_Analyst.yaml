description: |
  Job TitleSoftware Developer - AzurionEye AI Analyst
  
  Job Description
  
  Job Title
  
  Senior Software Technologist – AI Analyst
  
  Job Description
  
  In this role, you will have the opportunity to join the
  leading innovator in image-guided therapy solutions as
  Senior Software Technologist for the AzurionEye solution –
  an integrated, AI-enabled software platform. You will be
  responsible for product development for a portfolio of
  REST‑based, microservice‑first applications that power our
  clinical data lake platform, development of data curation
  workflows and system software. You will develop a
  high‑performance, secure, and compliant data warehouse
  platform and its companion tools for data exploration and
  data movement (viewing, uploading, downloading). You will
  pair hands‑on technical depth with system‑level thinking to
  deliver reliable, scalable data services that power imaging
  workflows and connected solutions.
  
  You will be part of the Image Guided Therapy Systems
  business unit with development sites in the Netherlands,
  China and India. This business unit is responsible for
  marketing, service, development and manufacturing of
  solutions and products used in minimally invasive
  procedures. You will join the global R&D department.
  
  Key areas of responsibility
  
  - Acts as the technical coach for a team or domain, being
    recognized and approached by team members for expertise
    and guidance, ensures consistent application of best
    practices and high standards across projects.
  - Sets quality goals and development practices with the team,
    driving continuous improvement and excellence in software
    development through rigorous standards and methodologies.
  - Integrates software components and third-party libraries
    into existing systems, ensuring seamless functionality and
    interoperability with minimal disruption.
  - Conducts and participates in code reviews, providing
    constructive feedback to peers and ensuring adherence to
    coding standards and best practices to maintain code
    quality.
  - Analyses and optimizes application performance, identifying
    and resolving bottlenecks to enhance user experience and
    system efficiency, ensuring the software meets performance
    benchmarks.
  - Stays current with emerging technologies and industry
    trends, incorporating new tools and methodologies to
    improve development processes and product quality.
  - Develops software to log and store performance data, usage,
    errors, etc., enabling continuous monitoring of solutions
    and products for improved reliability and performance.
  - Collaborates with cross-functional teams, including product
    managers, designers, and QA engineers, to define, design,
    and ship new features, ensuring alignment with project
    goals and user needs.
  - Resolves a wide range of moderate complexity requests in
    creative ways, demonstrating good judgment in selecting
    methods and techniques for obtaining solutions.
  - Design and develop scalable data ingestion & transformation
    pipelines
  - Design and extend the data lake’s architecture—partitioning
    strategies, storage formats, metadata layers, and data
    models
  - Implement automated testing, data validation checks, and
    CI/CD pipelines to support safe and frequent deployments.
  - Diagnose and fix issues related to ingestion failures,
    schema drifts, latency bottlenecks, and data
    inconsistencies. Maintain operational dashboards, logs,
    and alerting systems.
  
  To succeed in this role, you should have the following
  skills and experience
  
  - BE, BTech or MTech in Computer Science/Engineering,
    Information technology or equivalent
  - 12 - 15 years in software development/engineering including
    requirements analysis, software development, installation,
    integration, evaluation, enhancement, maintenance,
    testing, and problem diagnosis/resolution.
  - Proficiency in leveraging AI-assisted development tools to
    accelerate design, coding, testing, and documentation with
    high-quality outcomes.
  - Thrives in an agile, entrepreneurial, start‑up–like
    environment with strong ownership, learning mindset and
    the drive to rapidly iterate, validate and deliver
    customer centric solutions.
  - Strong proficiency in C# ,Python
  
  - Strong understanding of RESTful API design and
    implementation (swagger, openAPI)
  - Experience on BDD, NATS/RabbitMQ/Kafka
  - Experience on DICOM, FHIR and its application in healthcare
    or medical imaging.
  
  - In depth knowledge of Microservices & REST API design,
    Containers/Kubernetes, GitOps, Amazon web services (AWS) &
    DevOps
  - In depth knowledge of web UI technology like Reacts
    (preferred) or Angular
  - Skilled in microservices architecture and Docker/Kubernetes
    containerized deployments
  
  - Hands-on experience in database design, implementation,
    tuning and migration e.g. MS SQL Server or PostgreSQL
    (preferred)
  - Experience in enterprise application development, design
    patterns, architectural patterns, OOAD and UML.
  - The individual must be able to communicate directions and
    provide guidance to engineers in the team, as required.
  - Experience building scalable, cloud native data warehouse
    and relative tools for viewing and uploading/downloading
    data
  - Experience with GitHub or Azure Dev Ops
  - Experience working on CI/CD pipelines like Jenkins is added
    advantage.
  - Strong knowledge of all phases of the software development
    lifecycle
  - Working experience in SAFe development methodologies
  - Ability to analyze and solve complex problems. Strong desire
    to learn and adapt to new technologies and challenges
  - Ability to identify key technical risks and develop
    mitigation and recovery plan
  - Ability to innovate and foster innovation
  - Strong interpersonal and communication skills with the
    ability to interface in a cross-disciplinary manner,
    including engineers, product managers, and clinical
    specialists
  - Self-motivated individual with good organizational and time
    management skills
  - Familiarity with medical devices and/or working in a
    regulated environment a plus.
  
  How we work together We believe that we are better together
  than apart. For our office-based teams, this means working
  in-person at least 3 days per week. Onsite roles require
  full-time presence in the company’s facilities. Field roles
  are most effectively done outside of the company’s main
  facilities, generally at the customers’ or suppliers’
  locations. Indicate if this role is an office/field/onsite
  role. About Philips We are a health technology company. We
  built our entire company around the belief that every human
  matters, and we won't stop until everybody everywhere has
  access to the quality healthcare that we all deserve. Do the
  work of your life to help the lives of others. • Learn more
  about our business. • Discover our rich and exciting
  history. • Learn more about our purpose. If you’re
  interested in this role and have many, but not all, of the
  experiences needed, we encourage you to apply. You may still
  be the right candidate for this or other opportunities at
  Philips. Learn more about our culture of impact with care
  here.
  
