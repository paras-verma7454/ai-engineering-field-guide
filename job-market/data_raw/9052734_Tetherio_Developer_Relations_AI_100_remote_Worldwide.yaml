  About the job
  
  The primary goal of a Developer Relations is to engage,
  educate, and inspire the developer community - building
  trust, driving adoption of our technology, and ensuring
  developers have an exceptional experience with our products.
  This involves creating technical content, presenting at
  events, gathering feedback, and serving as the voice of the
  developer both externally and internally.
  
  The role is focused on bridging the gap between developers
  and our product teams, ensuring our solutions are
  accessible, well-understood, and developer-friendly, while
  fostering community growth, promoting best practices, and
  driving continuous improvement in how developers discover,
  learn, and build with our technology.
  
  QVAC is a cutting-edge development platform designed for
  building privacy-focused AI applications. Unlike traditional
  AI tools that rely heavily on cloud-based infrastructure,
  QVAC is designed to run entirely on local devices, giving
  users full control over their data.
  
  Responsibilities
  
  Developer Advocacy & Community Building
  
  - Build and nurture relationships with developers, partners,
    and open-source communities.
  - Engage and interact with the developer ecosystem — hosting
    AMAs, office hours, webinars, and play a part in online
    communities.
  - Collect and synthesize developer feedback to inform product
    and engineering teams.
  - Identify influential developers, projects, and communities
    to establish collaboration opportunities.
  
  Technical Content & Enablement
  
  - Create and maintain high-quality technical content (blog
    posts, tutorials, sample apps, videos, documentation, SDK
    guides, etc.) directly targeted to developers.
  - Develop demos, prototypes, and reference implementations
    that showcase real-world use cases.
  - Contribute to improving developer experience through
    documentation feedback, onboarding flows, and API design
    suggestions.
  - Support developer onboarding through workshops, hackathons,
    and training sessions.
  
  Product Evangelism
  
  - Advocate for the company’s technology stack at industry
    events, developer meetups, and online communities.
  - Translate complex technical concepts into clear, relatable
    value propositions.
  - Collaborate with marketing to align technical storytelling
    with broader brand messaging.
  - Track and report community sentiment and adoption metrics to
    measure evangelism impact.
  
  Cross-Functional Collaboration
  
  - Partner closely with engineering, product management, and
    marketing to align developer needs with product strategy.
  - Provide structured feedback loops between external
    developers and internal teams to improve product
    usability.
  - Support launch strategies for new developer-facing features,
    APIs, and SDKs.
  - Contribute to roadmap discussions to ensure developer
    experience remains a strategic priority.
  - Support initial technical discussions with potential
    customers and partners
  
  Thought Leadership
  
  - Represent the company as a credible technical voice in the
    ecosystem through public speaking, open-source
    contributions, and community engagement.
  - Stay ahead of industry trends, tools, and frameworks
    relevant to the developer community.
  - Mentor internal teams on effective developer communication
    and community engagement practices.
  
  - Bachelor’s degree in Computer Science, Software Engineering,
    or related field - or equivalent professional experience.
  - 3+ years of professional software development experience.
  - Previous experience as a Developer Advocate, Developer
    Relations, or Technical Community Manager.
  - Strong hands-on experience with JavaScript, TypeScript, and
    Node.js - able to write production-level code and explain
    it clearly to other developers.
  - Demonstrated experience building, testing, and maintaining
    applications or APIs.
  - Proven ability to create technical content (tutorials,
    sample projects, blog posts, videos, or documentation)
    that educates and inspires developers.
  - Experience presenting at public events, such as developer
    conferences, meetups, webinars, or internal company talks.
  - Excellent communication and presentation skills, both
    written and verbal, with the ability to translate complex
    technical concepts into simple, engaging messages.
  - Experience engaging with developer communities through
    events, GitHub, forums, or social media.
  - Strong understanding of developer experience principles and
    best practices.
  - Ability to collaborate effectively with product,
    engineering, and marketing teams.
  - Strong experience with Llama.cpp and ggml inference engines,
    which facilitates the deployment of models to specific GPU
    architectures
  - Experience with AI or ML technologies, such as building or
    integrating LLMs, chatbots, or AI-driven SDKs and APIs.
  - English fluency — outstanding written and verbal
    communication skills are required for public-facing
    content and developer engagement.
  
  Preferred
  
  - Experience designing, documenting, or promoting SDKs or
    developer tools.
  - Experience developing or integrating apps (web, mobile, or
    desktop).
  - 4–6 years of experience in software development or developer
    relations.
  - Experience leveraging AI tools (such as Cursor, Codex, or
    similar AI-assisted development workflows) to enhance
    productivity and problem-solving efficiency
  - Contributions to open-source projects or maintaining public
    GitHub repositories.
  - Understanding of DevRel success metrics - content reach,
    community engagement, and product adoption.
  - Experience in technical writing, developer education, or
    public speaking.
  - Passion for community building, mentoring, and empowering
    developers through content and collaboration.
  
