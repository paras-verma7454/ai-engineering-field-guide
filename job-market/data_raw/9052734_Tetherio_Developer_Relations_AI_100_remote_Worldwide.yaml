    confirm their identity by checking their profile or
    contacting us through our website.
  - Be cautious of unusual communication methods. We do not
    conduct interviews over WhatsApp, Telegram, or SMS. All
    communication is done through official company emails and
    platforms.
  - Double-check email addresses. All communication from us will
    come from emails ending in @tether.to or @tether.io
  - We will never request payment or financial details. If
    someone asks for personal financial information or payment
    at any point during the hiring process, it is a scam.
    Please report it immediately.
  
  When in doubt, feel free to reach out through our official
  website.
