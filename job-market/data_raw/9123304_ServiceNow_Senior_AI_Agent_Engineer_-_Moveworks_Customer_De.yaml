description: |
  Company Description It all started in sunny San Diego,
  California in 2004 when a visionary engineer, Fred Luddy,
  saw the potential to transform how we work. Fast forward to
  today - ServiceNow stands as a global market leader,
  bringing innovative AI-enhanced technology to over 8,100
  customers, including 85% of the Fortune 500®. Our
  intelligent cloud-based platform seamlessly connects people,
  systems, and processes to empower organizations to find
  smarter, faster, and better ways to work. But this is just
  the beginning of our journey. Join us as we pursue our
  purpose to make the world work better for everyone. Job
  Description What you get to do in this role: As a Senior AI
  Agent Engineer - Moveworks | Customer Deployment at
  Moveworks ServiceNow, you'll be responsible for making
  customers successful with the Moveworks ServiceNow Platform
  by accelerating product adoption through various customer
  engagements. You are a critical, high-leverage technical
  individual that operates at the intersection of Customer
  Success, Product Management, and Engineering. Your primary
  mission is to translate complex customer business process
  challenges into innovative, high-impact AI solutions built
  on our platform. This role provides full-stack ownership of
  technical success, allowing you to not only deploy
  capabilities in the current product but also directly
  influence the product's evolution by ensuring that learnings
  are folded back into our core platform. Core
  Responsibilities & Impact:
  
  - Full-stack Ownership: Partner deeply with customers
    throughout the entire delivery lifecycle of AI Agents on
    the Moveworks ServiceNow Platform: Vision-Lock, Solution
    Design/Architecture, Building, Tuning, and launch.
  - Custom Solution Design: Architect, design and consult with
    customers to develop high-impact technical AI solutions on
    the Moveworks ServiceNow platform by helping them leverage
    AI in novel and meaningful ways to solve complex business
    challenges.
  - Integration and implementation: Integrate the Moveworks
    ServiceNow Platform to Customer enterprise system in an
    innovative, secure and performant manner.
  - Product Partnership: Work closely with engineering and
    product teams on new product rollouts, and help drive
    product decision making by synthesizing on-the-ground
    customer feedback and technical gaps.
  - Strategic Autonomy: Consult customers and apply creative
    freedom in solution design to shape the customer's Agentic
    AI roadmap.
  
  About You: You are a technical generalist & a "do-er" with a
  deep, intuitive understanding of complex systems and a
  relentless focus on customer impact. You thrive in a
  dynamic, high-growth environment where you can both build
  and lead.
  
  - Technical Acumen & Curiosity Mindset: You are a rapid
    learner with high technical aptitude and strong generalist
    with instincts to quickly learn both new technical and
    business domains. You possess a curiosity to understand
    details from both a technical and a business perspective
    i.e: trying to understand: "what happens under the hood?"
    and "why is this done that way?"
  - Technical Mastery: Strong grasp of API based systems
    integration, LLM-based systems design including prompt
    engineering, context engineering, and data modeling.
  - Product Excellence Obsession: You have product
    taste/judgement and are obsessed with building and
    delivering exceptional product experiences for users.
  - Reusability: You share what works with the broader team, and
    help generalize solutions into reusable templates.
  - Customer-Centric Soft Skills: You have the communication
    skills required for deep customer partnerships, and you
    genuinely enjoy working directly with customers. You are
    compelled to develop and deliver compelling solution
    narratives through creation of high-quality artifacts
    (e.g. architecture diagrams, solution proposals, product
    documentation, SOWs) as well as engaging presentations and
    demos, tailored to the technical and business awareness of
    the audience.
  - Strategic Guidance & Influence: Serve as a trusted advisor
    to customers, providing strategic direction to help them
    overcome technical and organizational obstacles. This
    includes developing and delivering context-specific
    solutions, as well as upskilling customer teams to
    leverage the product independently.
  - Entrepreneurial Drive / Grit: You aspire to a high-growth
    career path, actively seeking to gain maximum exposure and
    learning across engineering, product, and business
    functions as quickly as possible. You lean into navigating
    through challenging business situations or antiquated
    legacy systems.
  - Ecosystem Partnership: You possess a strong sense of
    personal accountability to both customers and internal
    teammates who rely on your expertise.
  
  Qualifications To be successful in this role you have:
  
  - 5+ years of experience in a technical role, such as a
    Forward Deployed Engineer, Solutions Engineer, Customer
    Success Engineer, Solutions Architect, Consulting Engineer
    or Software Engineer.
  - Ability to operate across multiple business functions or
    technical domains, demonstrating adaptability, quick-to-
    learn, and broad technical skills.
  - Experience designing, building and launching full-stack
    workflows, and automations, leveraging REST APIs, iPaaS
    automation (Workato, Azure Functions, AWS Lambdas,
    ServiceNow Flow Designer), or generic scripting (e.g.,
    Python, JavaScript, Golang, etc.).
  - Fully independent practitioner who owns work with minimal
    guidance, applying in-depth knowledge to problems of
    diverse scope and evaluating multiple factors to arrive at
    sound technical decisions.
  - Track record of contributing ideas and documentation across
    project teams, not just within immediate assignments.
  - You are willing to travel up to 25% of the time
  
  Preferred Qualifications:
  
  - Familiarity with enterprise platforms (e.g. ServiceNow, Jira
    Service Desk, Zendesk, Workday, Okta, etc.) is a plus
  - You have familiarity with Linux and Windows environments and
    using the command line.
  - You have a great track record of driving successful
    technical adoption with medium to large-sized enterprise
    projects
  - You stay current with the latest AI tools and frameworks,
    and think about how to apply them thoughtfully to work
    smarter and build reliable, scalable solutions
  
  Additional Information Work Personas We approach our
  distributed world of work with flexibility and trust. Work
  personas (flexible, remote, or required in office) are
  categories that are assigned to ServiceNow employees
  depending on the nature of their work and their assigned
  work location. Learn more here . To determine eligibility
  for a work persona, ServiceNow may confirm the distance
  between your primary residence and the closest ServiceNow
  office using a third-party service. Equal Opportunity
  Employer ServiceNow is an equal opportunity employer. All
  qualified applicants will receive consideration for
  employment without regard to race, color, creed, religion,
  sex, sexual orientation, national origin or nationality,
  ancestry, age, disability, gender identity or expression,
  marital status, veteran status, or any other category
  protected by law. In addition, all qualified applicants with
  arrest or conviction records will be considered for
  employment in accordance with legal requirements.
  Accommodations We strive to create an accessible and
  inclusive experience for all candidates. If you require a
  reasonable accommodation to complete any part of the
  application process, or are unable to use this online
  application and need an alternative method to apply, please
  contact globaltalentss@servicenow.com for assistance. Export
  Control Regulations For positions requiring access to
  controlled technology subject to export control regulations,
  including the U.S. Export Administration Regulations (EAR),
