description: |
  Are you ready to make your mark in the world of Formula 1?
  
  At Formula 1, we are passionate about delivering the world’s
  greatest sports and entertainment spectacle leaving a
  positive legacy wherever we race. Innovation has always been
  at the heart of what we do ever since our first Grand Prix
  in 1950. Now, more than 75 years on, the sport remains a
  pioneer, developing technologies that have made a
  significant impact on society beyond the track.
  
  Everything you see on screen or at an event comes via our
  passionate and dedicated people. Whether its engineering,
  broadcast, legal, logistics, security, event management,
  commercial, media rights, marketing, or communications there
  is always a talented team working to maximise the potential
  of the sport.
  
  Role Overview:
  
  We are looking for an AI, ML, Data Science Engineer to join
  our Innovation & Technology team. Reporting into our Chief
  Engineering & Innovation Officer, this role will design,
  build, and deploy intelligent data systems and AI/ML
  solutions.
  
  Main Duties and Responsibilities:
  
  AI & Machine Learning Development
  
  - Design, develop, and deploy machine learning models for:
  - Predictive analytics (performance trends, operational
    forecasting)
  - Computer vision (video analysis, racing systems, media
    enhancement)
  - Natural language processing (fan insights, content
    intelligence, knowledge systems)
  - Anomaly detection (trackside operational reliability, racing
    systems telemetry monitoring)
  - Build scalable inference pipelines for real-time and batch
    processing.
  - Implement model monitoring, drift detection, and retraining
    workflows.
  - Rapidly prototype and validate ideas to demonstrate value
    before scaling solutions into production.
  - Balance short term delivery with longer term platform
    thinking, prioritising speed to value and learning.
  - Operate comfortably with incomplete requirements, shaping
    problems collaboratively with business stakeholders.
  - Continuously research emerging data, AI, and systems
    technologies across adjacent and non adjacent industries
    (e.g., aerospace, defence, healthcare, manufacturing,
    finance).
  - Translate external best practices and proven solutions into
    the unique constraints and opportunities of Formula One.
  
  Data Engineering & Architecture
  
  - Design and maintain robust data pipelines integrating:
  - Telemetry and timing systems
  - Video and image data
  - Event operations data
  - Commercial and digital engagement data
  - Develop APIs and services to expose analytics capabilities
    to internal stakeholders.
  - Ensure high availability and low latency for race-critical
    systems where required
  
  Cross-Functional Collaboration
  
  - Proactively identify high impact data and AI opportunities
    by engaging directly with teams across the business:
  - Broadcast & Media
  - Commercial & Marketing
  - Cybersecurity and IT Infrastructure
  - Motorsport Operations
  - Trackside Operations
  - Translate business and sporting requirements into technical
    solutions.
  - Present findings to both technical and executive audiences.
  - Build trusted relationships across technical and non
    technical teams to become a go to partner for data  and AI
    enabled problem solving.
  
  Governance, Compliance & Security
  
  - Implement responsible AI practices.
  - Support data privacy, governance, and regulatory compliance.
  - Collaborate with cybersecurity teams to secure data
    pipelines and AI systems.
  
  What Are We Looking For?
  
  Personal Qualities
  
  - In this role it is essential that you are:
  - Intellectually curios and bias toward innovation
  - Accountable and  have operational rigor
  - Highly autonomous and self directed
  - Comfortable operating in ambiguous and loosely defined
    problem spaces
  - Pragmatic: knows when “good enough now” beats “perfect
    later”
  - Entrepreneurial mindset with enterprise discipline
  
  Qualifications
  
  Not essential to be successful in the role but you may also
  have the following qualifications:
  
  - Bachelor’s/Master’s/PhD in Computer Science, Data Science,
    Engineering, Mathematics, or related field.
  
  Experience
  
  Prior to the role it would be essential that you:
  
  - 5–10 years of experience in data science, AI, or machine
    learning engineering.
  - Experience with ML frameworks and building and deploying
    production ML systems.
  - Experience with SQL and modern data warehouses
  - Familiarity with cloud platforms
  - Experience with containerization and orchestration
  
  Some desirable experience that you may bring to the role:
  
  - Experience working in Real-time data environments
  - Experience with computer vision applied to video analytics.
  - Familiarity with edge computing and low-latency systems.
  - Exposure to cybersecurity best practices in data systems.
  - Experience with large-scale telemetry or IoT data
  - Experience with Sensor Fusion systems
  
  Knowledge & Skills
  
  Prior to the role it is essential that you demonstrate:
  
  - Ability to deliver impactful technical solutions in
    environments where the problem definition evolved through
    experimentation and stakeholder engagement.
  - Strong communication skills and ability to work in cross-
    functional teams
  - Strong proficiency in Python.
  - Knowledge of streaming data systems.
  - Solid understanding of: (1) statistics and probability, (2)
    model evaluation methodologies, (3) data preprocessing and
    feature engineering
  - Systems thinking and architectural discipline
  - Ability to operate in high-pressure, event-driven
    environments
  - Strong debugging and performance optimization skills
  - Clear documentation and technical writing ability
  - Strong interpersonal awareness and stakeholder management
    skills
  
  Why join the force behind the sport?
  
  Joining F1 means becoming part of a team that values
  innovation, collaboration and personal growth. We offer a
  dynamic work environment where ideas are heard, and employee
  contributions truly make an impact. We seek to recruit,
  develop, and retain the most talented people to play their
  role in accelerating the future of the sport. As a member of
  the F1 team, you will be able to access our amazing
  benefits:
  
  - Private Healthcare scheme
  - Dental Care
  - 4 x Grand Prix Paddock passes per season
  - Enhanced maternity/paternity leave and other family planning
    policies
  - A free staff shuttle service running to and from surrounding
    trains stations near to Biggin Hill
  - Free healthy snacks in our offices
  - Subsidised canteen in Biggin Hill, serving breakfast and
    lunch
  - 25 days annual leave and 8 Bank Holiday days, plus a
    Christmas period closure
  - Opportunities to develop and request training for your role
    via our in-house Learning and Development team
  - Discount on F1 merchandise
  - Discount at F1’s experiences including F1 Arcade and F1
    Drive
  - Perkbox benefit portal and more
  
