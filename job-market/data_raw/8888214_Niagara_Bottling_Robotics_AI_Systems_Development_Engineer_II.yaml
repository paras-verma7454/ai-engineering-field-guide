  Robotics & AI Systems Development Engineer II
  
  Position Summary
  
  The Robotics & AI Systems Development Engineer II plays a
  foundational role in advancing Niagara’ Bottling LLC’s
  autonomous manufacturing strategy through the deployment of
  quadruped and Humanoid robotics and intelligent AI systems
  across bottle manufacturing maintenance operations.
  
  This position is responsible for designing, programming, and
  deploying robotic systems while simultaneously developing
  scalable fleet management platforms and AI-driven
  manufacturing intelligence solutions. The role extends
  beyond robotics control to include AI architecture design,
  intelligent agent development, predictive and prescriptive
  maintenance systems, and enterprise-level integration across
  manufacturing ecosystems.
  
  This is a high-impact, cross-functional engineering role
  requiring strong technical depth, system-level thinking, and
  the ability to communicate complex solutions effectively to
  diverse audiences including operations (Manufacturing
  plants), IT, systems Engineering, and executive leadership.
  
  Key Responsibilities
  
  1. Robotics Software Development & Autonomous Systems
  
  · Design, develop, and deploy control systems for quadruped
  robots operating in active manufacturing environments.
  
  · Develop autonomous inspection routines, navigation logic,
  and mission orchestration.
  
  · Integrate and optimize sensor systems including thermal
  imaging, acoustic sensors, vibration monitoring, LiDAR, and
  vision systems.
  
  · Implement edge-based decision-making frameworks for real-
  time anomaly detection.
  
  · Ensure operational robustness in industrial bottling
  environments (wet floors, dynamic obstacles, tight
  production spaces).
  
  2. Fleet Management Platform Development
  
  · Architect and develop scalable fleet management software
  to manage multiple robotic assets across facilities.
  
  · Design mission scheduling, battery optimization, health
  monitoring, and alerting systems.
  
  · Develop cloud-edge synchronization frameworks for real-
  time data exchange.
  
  · Integrate robotic data outputs into enterprise systems
  including CMMS, ticketing platforms (e.g., mCAPA),
  historians, and analytics platforms.
  
  · Establish secure API-based integration models and
  microservices architecture where appropriate.
  
  3. AI Architecture & Intelligent Manufacturing Agents
  
  · Design and deploy AI-driven agents supporting:
  
  o Condition-Based Maintenance (CBM)
  
  o Predictive Maintenance (PdM)
  
  o Prescriptive Maintenance
  
  o Intelligent Diagnostics and Root Cause Analysis
  
  · Develop time-series anomaly detection models for
  manufacturing asset health monitoring.
  
  · Build LLM-enabled operator assistants and decision-support
  systems tailored to manufacturing workflows.
  
  · Implement MLOps practices including model lifecycle
  management, monitoring, retraining, and governance.
  
  · Support digital twin and manufacturing intelligence
  initiatives.
  
  4. Industrial Systems Integration
  
  · Integrate robotic and AI systems with PLC/SCADA platforms
  and industrial communication protocols (OPC-UA, MQTT,
  Modbus, TCP/IP).
  
  · Design standardized data acquisition frameworks across
  diverse asset families (blowers, fillers, conveyors,
  utilities).
  
  · Ensure system performance, reliability, cybersecurity, and
  scalability.
  
  · Support pilot deployments and enterprise-scale rollouts.
  
  5. Technical Communication & Cross-Functional Leadership
  
  · Prepare and deliver technical presentations tailored to
  varied audiences including plant operations, engineering
  teams, IT leadership, and executive stakeholders.
  
  · Translate complex AI and robotics concepts into measurable
  business value and ROI narratives.
  
  · Participate in design reviews and strategic roadmap
  discussions.
  
  · Support change management initiatives during technology
  adoption.
  
  Required Qualifications
  
  Education
  
  Bachelor’s or Master’s degree in Robotics, Computer
  Engineering, Electrical Engineering, Mechanical Engineering,
  Artificial Intelligence, or a related technical discipline.
  
  Experience
  
  · 3–6 years of experience in robotics systems, AI
  engineering, or industrial automation.
  
  · Demonstrated experience deploying solutions in real-world
  operational environments.
  
  · Experience designing production-grade software systems
  beyond prototype development.
  
  Technical Competencies
  
  Robotics & Software Engineering
  
  · Proficiency in ROS2 or equivalent robotics frameworks.
  
  · Strong programming skills in Python and/or C++.
  
  · Experience with motion planning, SLAM, perception
  pipelines, and computer vision.
  
  AI & Machine Learning
  
  · Experience developing and deploying machine learning
  models (time-series modeling preferred).
  
  · Knowledge of LLM integration, embeddings, prompt
  engineering, and retrieval-augmented architectures.
  
  · Familiarity with MLOps, CI/CD pipelines, and model
  versioning.
  
  Systems & Industrial Technologies
  
  · Understanding of PLC/SCADA platforms and industrial
  communication protocols.
  
  · Experience integrating edge systems with cloud analytics
  platforms.
  
  · Familiarity with manufacturing data environments and asset
  monitoring systems.
  
  Professional Competencies
  
  · Strong analytical and systems-thinking mindset.
  
  · Ability to operate independently in ambiguous, high-growth
  technical environments.
  
  · Excellent written and verbal communication skills.
  
  · Ability to translate technical depth into business
  outcomes.
  
  · Collaborative and cross-functional working style.
  
  · Successful deployment of quadruped robotics in pilot
  plant(s).
  
  · Delivery of minimum viable fleet management platform.
  
  · Integration of robotic outputs into enterprise maintenance
  systems.
  
  · Deployment of at least one AI-based predictive model in
  production.
  
  · Presentation of executive-level roadmap for robotics and
  AI scale strategy.
  
  Travel Requirement
  
  Estimated 20–40% based on deployment and plant support
  needs.
  
