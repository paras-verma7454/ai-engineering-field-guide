description: |
  Summary
  
  Guidewire’s Generative AI (GenAI) team sits within Product
  Strategy and plays a critical role in shaping the future of
  our cloud and AI-powered platform for P&C insurers
  worldwide. We partner closely with Product, Engineering, and
  Go-to-Market teams to embed AI, cloud, and data capabilities
  across the portfolio, enabling secure, scalable, and
  reliable solutions for our customers. You’ll join a highly
  collaborative, hands-on engineering culture focused on
  experimentation, learning, and shipping production-grade AI
  at scale.  As a Senior ML Engineer, Generative AI, you will
  be a technical leader driving the design, development, and
  operation of Guidewire’s end-to-end GenAI solutions and
  Large Language Model (LLM) capabilities. You will own
  critical components of our LLM infrastructure, from data
  pipelines and prompt engineering through fine-tuning,
  deployment, and monitoring of models in production. This
  role is ideal for someone who wants to shape next-generation
  AI solutions that directly power insurance workflows,
  support our Agentic AI product vision, and help deliver
  measurable outcomes for customers globally.
  
  Job Description
  
  What you’ll do
  
  - Lead the design, implementation, and evolution of
    Guidewire’s GenAI and LLM products, including data
    ingestion, feature pipelines, model training, fine-tuning,
    deployment, and monitoring on AWS (e.g., S3, EC2, RDS,
    SageMaker).
  - Architect and build robust ML/LLM pipelines that power high-
    impact use cases such as claim summarization, underwriting
    assistance, pricing and rating intelligence, and developer
    productivity tools across our product portfolio.
  - Develop and optimize LLM solutions using techniques such as
    prompt engineering, retrieval-augmented generation (RAG),
    vector databases, and fine-tuning to deliver reliable,
    safe, and high-performing experiences for insurance users.
  - Collaborate with Product Strategy, PDO, and Professional
    Services teams to align GenAI capabilities with the
    broader Product VPMOM, Agentic AI product roadmap, and
    customer adoption goals (including Claims Summary,
    Underwriting Assistant, Codelift, and other GenAI
    “lifts”).
  - Establish and apply ML Ops best practices for CI/CD,
    experimentation, evaluation, observability, and
    responsible AI, ensuring models are auditable, secure, and
    production-ready at scale.
  - Mentor and coach engineers and data scientists, conduct code
    and design reviews, and champion technical excellence,
    including performance, reliability, and cost efficiency of
    AI workloads.
  - Partner with cross-functional teams (Security, Finance,
    BizTech, GTM) to ensure AI solutions adhere to data
    governance and security controls, and contribute to
    Guidewire’s mission to transform how P&C insurers do
    business through cloud, analytics, and AI.
  - At Guidewire, we foster a culture of curiosity, innovation,
    and responsible use of AI—empowering our teams to
    continuously leverage emerging technologies and data-
    driven insights to enhance productivity and outcomes.
  
  What you’ll bringRequired
  
  - Demonstrated ability to embrace AI and apply it to your
    current role as well as data-driven insights to drive
    innovation, productivity, and continuous improvement.
  - 5+ years of professional experience in Machine Learning
    and/or Data Science, including end-to-end delivery of
    production ML systems.
  - Deep expertise in Python and experience building scalable
    ML/LLM services and pipelines, ideally on AWS using
    services such as S3, EC2, RDS, and SageMaker.
  - Strong understanding of ML Ops practices for model
    development, deployment, monitoring, and lifecycle
    management (including CI/CD for ML, experiment tracking,
    model registries, and drift detection).
  - Hands-on experience with classical and gradient-boosting
    models (such as GLM, Random Forest, and XGBoost) and their
    application to real-world business problems.
  - Deep understanding of neural networks and transformer-based
    architectures for LLMs and chat models, including
    familiarity with open-source foundation models and their
    fine-tuning and inference.
  - Experience with prompt engineering, RAG and related LLM
    architecture patterns, and vector databases for semantic
    search and retrieval.
  - Solid knowledge of evaluating and monitoring LLM performance
    using NLP and LLM-assisted metrics, with a focus on
    safety, robustness, and user experience.
  - Demonstrated technical leadership: driving design decisions,
    leading complex engineering efforts, mentoring peers, and
    conducting thoughtful code and architecture reviews.
  
  Preferred
  
  - Bachelor’s or Master’s Degree in Computer Science, or
    equivalent practical experience.
  - Experience building data pipelines and features using SQL,
    Spark, or AWS Glue.
  - Experience with containerization and orchestration (Docker,
    Kubernetes) and creating backend APIs to expose ML/LLM
    services.
  - Familiarity with CI/CD and infrastructure-as-code practices
    and tools such as TeamCity and Terraform.
  - Background in insurance, banking, or financial services, or
    interest in becoming deeply fluent in P&C insurance to
    better shape high-value AI and GenAI use cases.
  
  Your Impact
  
  We believe in clarity and setting you up for success. In
  your first months, you’ll immerse yourself in Guidewire’s
  Product Strategy and GenAI roadmap, learn our cloud and data
  platform, and take ownership of one or more core components
  of the GenAI platform such as data pipelines, evaluation
  frameworks, or a flagship LLM-powered feature. Within six
  months, you’ll be leading the design and rollout of new
  GenAI use cases across products like Claims Summary,
  Underwriting Assistant, and developer tooling, delivering
  measurable “GenAI lifts” that improve efficiency, accuracy,
  and user experience for our customers. Your work will
  directly advance Guidewire’s mission to transform how P&C
  insurers operate with cloud and AI, enabling secure,
  scalable, and impactful AI solutions that support billions
  of dollars in insurance transactions and help shape the
  future of the industry worldwide.
  
  What’s in it for you
  
  The people we employ give their all, and in return, we offer
  flexibility wherever we can, such as:
  
  - Flexible work environment.
  - Health and wellness benefits.
  - Paid time off programs including volunteer time off.
  - Market-competitive pay and incentive programs.
  - Continual development and internal career growth
    opportunities.
  
  You will also participate in our in-person orientation
  process, which is part of how we build connection,
  collaboration, and a shared understanding of Guidewire’s
  mission to combine digital, core, analytics, and AI to
  transform how P&C insurers do business.
  
   The US base salary range for this full-time position is
  $160,000 - $240,000 . Your base pay will depend on your
  experience, skills, education, training, and location among
  other factors. All full-time positions or part-time roles
  working 30 hours or more a week at Guidewire are eligible
  for benefits that support their health and well-being
  including health, dental, and vision insurance, paid time
  off, and a company sponsored retirement plan. In addition,
  some roles may be eligible for the annual company bonus
  plan, commissions, and/or long term incentive awards which
  are contingent on a variety of factors including, but not
  limited to, company and employee performance.
  
  Disability Accommodations and Guidewire’s Appeals Process.
  Guidewire provides accommodations to the hiring process to
  create a fair opportunity for candidates with disabilities
  to contend for open positions. Accommodation requests should
  be directed to Accommodations@guidewire.com. If things do
  not go as hoped, we invite you to use our appeals process.
  Guidewire promises to independently review any denied
  accommodation and any decision not to offer you the
  position. The appeals process is the same in either case.
  Within five business days of receiving a notice of denial of
  an accommodation, or receiving a notice of your non-
  selection for a vacancy, e-mail Accommodations@guidewire.com
  to make an appeal. Guidewire will assign a new decision-
  maker to review the request and/or hiring decision, who will
  then notify you in writing of a decision within 10 business
  days.
  
  About Guidewire
  
  Guidewire is the platform P&C insurers trust to engage,
  innovate, and grow efficiently. We combine digital, core,
  analytics, and AI to deliver our platform as a cloud
  service. More than 540+ insurers in 40 countries, from new
  ventures to the largest and most complex in the world, run
  on Guidewire.
  
  As a partner to our customers, we continually evolve to
  enable their success. We are proud of our unparalleled
  implementation track record with 1600+ successful projects,
  supported by the largest R&D team and partner ecosystem in
  the industry. Our Marketplace provides hundreds of
  applications that accelerate integration, localization, and
  innovation.
  
  For more information, please visit www.guidewire.com and
  follow us on Twitter: @Guidewire_PandC.
  
  Guidewire Software, Inc. is proud to be an equal opportunity
  and affirmative action employer. We are committed to an
  inclusive workplace, and believe that a diversity of
  perspectives, abilities, and cultures is a key to our
  success. Qualified applicants will receive consideration
  without regard to race, color, ancestry, religion, sex,
  national origin, citizenship, marital status, age, sexual
  orientation, gender identity, gender expression, veteran
  status, or disability. All offers are contingent upon
  passing a criminal history and other background checks where
  it's applicable to the position.
