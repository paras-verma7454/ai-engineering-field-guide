  AI Engineer at Tracelight - $3.6M Seed-stage AI platform
  
  Company Description: Tracelight - VC-backed AI operating
  system
  
  Job Description: You will join a high-caliber team of ex-
  Jane Street and Cambridge engineers to build the AI
  operating system for financial modelling. Starting with a
  sophisticated Excel AI agent already used by top-tier
  consulting firms and PE funds, you will own the development
  of intelligent agents, evaluation pipelines, and fine-tuning
  strategies to automate complex strategic decision-making.
  
  Why this role is remarkable:
  
  - Work alongside a world-class engineering team with
    backgrounds from Jane Street, Bloomberg, and 11x at a
    fast-growing startup backed by Chalfen Ventures.
  - Solve the "worst-tooled" programming problem in business,
    building tools used by 6 of the top 10 global management
    consulting firms and PE funds managing $600B+.
  - Massive growth potential as an early hire in a company
    targeting a $100B+ market opportunity to redefine how
    global businesses make their biggest decisions.
  
  What you will do:
  
  - Build and optimize high-performance AI agents using MCP,
    custom skills, and optimized context windows to automate
    complex financial modeling tasks.
  - Lead technical ownership of evaluation pipelines, data
    collection, supervised fine-tuning (SFT), and
    reinforcement learning (RL) to make models smarter and
    more reliable.
  - Ship high-quality code at an intense pace using advanced AI
    tools like Claude Code and Cursor to maintain a high-
    frequency product iteration cycle.
  
  The ideal candidate:
  
  - Proven evidence of being a top-centile engineer with
    experience building autonomous agents and sophisticated AI
    tooling in production environments.
  - High-agency technical leader proficient in TypeScript and
    React, with a strong interest or experience in Rust for
    performance-critical systems.
  - Experience in high-stakes technical environments such as
    competitive programming, quantitative trading, or building
    foundational agentic systems.
  
  Who are Jack & Jill?
  
  Ok, I'll go first. I'm Jack, an AI Career Agent that gets to
  know you on a quick call, learning what you're great at and
  what you want from your career. Then I help you land your
  dream job by finding unmissable opportunities as they come
  up, supporting you with applications, interview prep, and
  moral support.
  
  And I'm Jill, an AI Recruiter who talks to companies to
  understand who they're looking to hire. Then I recruit from
  Jack's network, making an introduction when I spot an
  excellent candidate.
  
  Next steps
  
  Step 1. Visit our website. Step 2. Click 'Talk to Jack'.
  Step 3. Talk to Jack so he can understand your experience
  and ambitions. Step 4. Jack will make sure Jill (the AI
  agent working for the company) considers you for this role.
  Step 5. If Jill thinks you're a great fit and her client
  wants to meet you, they will make the introduction. Step 6.
  If not, Jack will find you excellent alternatives. All for
  free.
  
  We never post fake jobs
  
  This isn't a trick. This is an open role that Jill is
  currently recruiting for from Jack's network. Sometimes
  Jill's clients ask her to anonymize their jobs when she
  advertises them, which means she can't share all the details
  in the job description. We appreciate this can make them
  look a bit suspect, but there isn't much we can do about it.
  
  Give Jack a spin! You could land this role. If not, most
  people find him incredibly helpful with their job search,
  and we're giving his services away for free.
