  Fraud Recruitment Disclaimer 
  
  It has come to our attention that fraudulent and fictitious
  job opportunities are being circulated on the Internet.
  Prospective candidates are being contacted by certain
  individuals, mainly through telephone calls, emails and
  correspondence, claiming they are representatives of
  Anaplan. The main purpose of these correspondences and
  announcements is to obtain privileged information from
  individuals.  
  
  Anaplan does not: 
  
  - Extend offers to candidates without an extensive interview
    process with a member of our recruitment team and a hiring
    manager via video or in person.
  - Send job offers via email. All offers are first extended
    verbally by a member of our internal recruitment team
    whenever possible and then followed up via written
    communication.
  
  All emails from Anaplan would come from an @anaplan.com
  email address. Should you have any doubts about the
  authenticity of an email, letter or telephone communication
  purportedly from, for, or on behalf of Anaplan, please send
  an email to people@anaplan.com before taking any further
  action in relation to the correspondence.
