  The Staff AI Engineer – Customer Support Automation will
  drive the design, development, and deployment of AI-powered
  automation solutions that transform customer support
  operation. This role combines deep technical expertise in
  Artificial Intelligence and Machine Learning with strong
  program and stakeholder management capabilities. The
  successful candidate will lead cross-functional initiatives,
  manage end-to-end AI project lifecycles, and deliver
  measurable improvements in customer experience, operational
  efficiency, and global scalability.
  
  
  
  
  
  WHAT YOU WILL BE DOING
  
  - Design and deploy production-grade AI/ML systems that
    automate and augment customer support workflows.
  - Build and scale LLM-powered solutions including RAG
    architectures, intelligent ticket routing, sentiment
    analysis, predictive insights, and automated response
    generation.
  - Develop conversational AI systems and agentic workflows for
    autonomous case handling.
  - Identify high-impact AI leverage points across support
    operations and translate them into measurable automation
    initiatives.
  - Continuously evaluate emerging foundation models and AI
    tooling in the market; benchmark performance, cost,
    safety, and latency to assess where we stand and recommend
    adoption when strategically justified
  - Own the full lifecycle of AI initiatives from ideation
    through deployment, monitoring, and optimization.
  - Establish and mature MLOps practices including model
    versioning, observability, retraining pipelines, and cost-
    performance governance.
  - Architect scalable APIs and microservices for AI integration
    across CRM, ticketing, and knowledge platforms.
  - Partner with Product, Support Operations, Data Engineering,
    Security, and Leadership teams to deliver measurable
    business outcomes.
  - Communicate technical architecture decisions and ROI clearly
    to executive stakeholders
  
  WHAT YOU BRING
  
  - 7+ years of software engineering experience, including 4+
    years in AI/ML.
  - Strong hands-on experience with Python and modern ML
    frameworks (PyTorch, TensorFlow, Hugging Face or
    equivalent)
  - Proven experience building and deploying NLP/LLM-based
    systems in production.
  - Hands-on experience designing and implementing RAG
    architectures and working with vector databases.
  - Experience deploying ML systems in cloud environments (AWS
    experience, including Bedrock, is a strong advantage but
    not mandatory)
  - Demonstrated ability to identify where AI can augment,
    automate, or eliminate operational workflows.
  - Experience building scalable APIs, microservices, and
    containerized applications (Docker, Kubernetes)
  - Strong understanding of MLOps, monitoring, and production
    observability.
  - Experience operating in enterprise environments with
    compliance considerations (SOC2, GDPR, etc.)
  - AI/ML certifications (AWS ML Specialty or equivalent)
    preferred
  - Strong executive communication skills and ownership mindset
  
  If required for this role, you will:
  
  - Complete security & privacy literacy and awareness training
    during onboarding and annually thereafter
  
  - Review (initially and annually thereafter), understand, and
    adhere to Information Security/Privacy Policies and
    Procedures such as (but not limited to):
  
    > Data Classification, Retention & Handling Policy
  
    > Incident Response Policy/Procedures
  
    > Business Continuity/Disaster Recovery Policy/Procedures
  
    > Mobile Device Policy
  
    > Account Management Policy
  
    > Access Control Policy
  
    > Personnel Security Policy
  
    > Privacy Policy
  
  Saviynt is an amazing place to work. We are a high-growth,
  Platform as a Service company focused on Identity Authority
  to power and protect the world at work. You will experience
  tremendous growth and learning opportunities through
  challenging yet rewarding work which directly impacts our
  customers, all within a welcoming and positive work
  environment. If you're resilient and enjoy working in a
  dynamic environment you belong with us!
  
  Saviynt is an equal opportunity employer and we welcome
  everyone to our team.  All qualified applicants will receive
  consideration for employment without regard to race, color,
  religion, sex, sexual orientation, gender identity, national
  origin, disability, or veteran status.
