description: |
  About Level AI
  
  Level AI is on a mission to turn every customer interaction
  into a strategic advantage. Our AI-native platform helps
  enterprises transform contact centers from cost centers into
  engines of customer intelligence, operational efficiency,
  and business growth. By combining advanced AI with deep
  domain understanding of customer experience, Level AI
  empowers teams to unlock actionable insights, automate
  workflows, and deliver more consistent, higher-quality
  support across the customer journey.
  
  Headquartered in Mountain View, California, Level AI is a
  Series C company backed by leading investors including
  Battery Ventures and ENIAC. Our platform leverages Large
  Language Models and Custom Small Language Models (SLMs) to
  power AI Agents across the entire CX journey—customer-facing
  agents, agent-assist, and backend automation—along with deep
  conversation analytics for QA, coaching, and insights.
  
  With a fast-growing team in India, we are building a strong
  engineering presence in Noida to drive innovation across our
  platform.
  
  About the role
  
  As a Lead Engineer – AI Agents, you will play a critical
  role in building the scalable backend systems that power
  Level AI’s next-generation AI Agents. These systems operate
  in real-time, high-volume enterprise environments and are
  central to delivering intelligent, production-grade AI
  experiences.
  
  This role is based in Noida (Delhi NCR) with a hybrid work
  model (2–3 days/week in office).
  
  You will work at the intersection of distributed systems,
  cloud infrastructure, and AI-powered applications—bringing
  agentic AI capabilities into production at scale.
  
