description: |
  We are seeking a highly skilled and experienced Gen AI /
  Python Developer to join our innovative and dynamic
  engineering team. The ideal candidate will be a hands-on
  developer with a strong background in Python programming and
  extensive experience with Generative AI technologies. You
  will be instrumental in designing, developing, and deploying
  cutting-edge AI-powered solutions, working with various Gen
  AI APIs, and building robust backend services.
  Responsibilities:
  
  - Design, develop, and maintain high-quality, scalable, and
    efficient Python code for Generative AI applications.
  - Integrate and leverage various GenAI-related APIs (e.g.,
    OpenAI, Gemini) to build innovative features and products.
  - Implement and optimize Retrieval Augmented Generation (RAG)
    systems to enhance AI model capabilities and provide
    contextually relevant responses.
  - Develop and deploy robust backend services using Python
    frameworks such as FastAPI, Flask, or Django.
  - Collaborate with cross-functional teams, including product
    managers, data scientists, and other engineers, to define
    requirements and deliver solutions.
  - Write comprehensive unit and integration tests to ensure
    code quality and reliability.
  - Participate in code reviews, contributing to a culture of
    high-quality code and best practices.
  - Optimize application performance, scalability, and security.
  - (Optional, if relevant): Work with cloud container
    orchestration services like OpenShift ECS for deploying
    and managing applications.
  - (Optional, if relevant): Familiarity with Lightspeed
    (referring to a specific internal tool or technology -
    clarify if this is a known external tool) is a plus.
  
  Qualifications:
  
  - 8+ years of professional software development experience
    with a strong focus on Python.
  - Proven hands-on experience with Generative AI concepts and
    technologies.
  - Demonstrable experience working with GenAI-related APIs,
    such as OpenAI, Gemini, etc.
  - Solid understanding and practical experience in implementing
    Retrieval Augmented Generation (RAG) systems
  - Expertise in at least one modern Python web framework:
    FastAPI, Flask, or Django.
  - Strong understanding of software development best practices,
    including version control (Git), testing, and CI/CD.
  - Experience with relational and/or NoSQL databases.
  - Excellent problem-solving skills and the ability to work
    independently as well as in a team environment.
  - Strong communication and interpersonal skills.
  - Good to have knowledge on Java and Frontend technologies.
  
  Education:
  
  - Bachelor’s degree/University degree or equivalent experience
  
  This job description provides a high-level review of the
  types of work performed. Other job-related duties may be
  assigned as required.
  
