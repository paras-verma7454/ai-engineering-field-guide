description: |
  Meet the Moment with Alteryx
  
  We're living through a once-in-a-generation shift in how
  work gets done. Data, automation, and AI are quickly
  becoming the center of every business decision - and Alteryx
  is leading the transformation.
  
  You'll be working on the challenges that sit at the heart of
  modern business. No matter your role, the work you do will
  help organizations move faster, see more clearly, and tackle
  questions that used to feel impossible.
  
  If you're ready to meet the moment with innovation,
  curiosity, and excellence, there's a place for you here.
  
  Alteryx is searching for a Sr. Software Engineer (Back-End).
  This position is remote-friendly.
  
  Position Overview:
  
  We’re looking for a Senior Software Engineer to help build
  and scale the backend systems that power AI experiences
  across Alteryx. This is primarily a Python backend role
  focused on the services, APIs, orchestration layers, and
  platform integrations behind Copilot / Ask Alteryx and
  related AI capabilities. In addition to core backend
  engineering, this role also flexes into agent systems work
  when needed, contributing to the service-side AI workflows,
  MCP-connected skills, and orchestration patterns that make
  those experiences useful.
  
  You’ll work across core backend services and adjacent agent
  systems that connect Alteryx products and domain
  capabilities into a shared AI platform. That includes APIs
  and service integrations, authentication and authorization
  flows, telemetry and observability, data and tool
  orchestration, and the infrastructure needed to run
  reliable, scalable AI systems in production.
  
  This is intentionally a flex role. Depending on roadmap
  priorities and delivery pressure, you may spend more time in
  a given quarter on core backend service work or more time on
  agent systems and AI orchestration. In practice, we expect
  this engineer to move fluidly between backend and agent
  responsibilities based on where the team most needs senior
  capacity, but the center of gravity is backend engineering.
  
  This role is a strong fit for an engineer who can
  independently deliver medium-sized projects end-to-end,
  contribute to technical design, and move comfortably between
  application backend work and agent-oriented problem solving.
  You’ll help turn ambiguous product opportunities into
  reliable customer-facing capabilities while balancing speed,
  craft, maintainability, and operational rigor.
  
  Primary Responsibilities:
  
  - Owning and delivering backend features in the Python
    services that power Copilot / Ask Alteryx and adjacent AI
    experiences.
  - Designing and implementing APIs, service integrations, and
    orchestration logic that connect UI surfaces, backend
    systems, and AI capabilities.
  - Flexing into agent workflows, tool execution paths, and MCP-
    oriented integrations when roadmap needs require backend
    engineers to support agent delivery.
  - Partnering with product, design, frontend, data science, and
    platform teams to explore problem spaces, clarify
    requirements, and ship customer-facing improvements.
  - Improving service reliability through thoughtful work on
    observability, testing, performance, rate limiting,
    background processes, and operational readiness.
  - Contributing to software design, code reviews, technical
    planning, and engineering practices that improve quality
    and delivery velocity.
  - Mentoring engineers through thoughtful feedback, pairing,
    and day-to-day technical collaboration.
  - Helping the team respond quickly to new AI opportunities
    while making sound tradeoffs around correctness, cost,
    security, and maintainability.
  
  Requirements:
  
  - 4+ years building production backend systems in Python,
    including experience with APIs, service integrations, and
    maintainable application design.
  - Experience building or maintaining backend services with
    frameworks such as FastAPI, Flask, Django, or similar.
  - Solid understanding of distributed systems fundamentals,
    including service-to-service communication, authentication
    / authorization, observability, and failure handling.
  - Experience with relational databases, caching, and stateful
    service dependencies such as PostgreSQL, Redis, or similar
    technologies.
  - Demonstrated ability to own features or medium-sized
    projects end-to-end, from design and implementation
    through testing, rollout, and iteration.
  - Strong experience with automated testing across unit,
    integration, and end-to-end layers.
  - Working knowledge of CI/CD practices and modern development
    workflows using tools such as GitLab or GitHub.
  - Ability to collaborate effectively with product, design,
    data science, and engineering partners in ambiguous
    problem spaces.
  - Comfort working across both conventional backend engineering
    and agent-oriented development, with the judgment to shift
    focus based on delivery needs.
  
  Valued Skills:
  
  - Experience building AI-assisted, LLM-powered, or agentic
    product experiences.
  - Experience with agent orchestration frameworks such as
    LangGraph, LangChain, or similar patterns for tool-using
    AI systems.
  - Experience with MCP, extensibility platforms, or tool-based
    integration models.
  - Experience with retrieval, grounding, evaluation, or other
    patterns used to improve AI system quality and
    reliability.
  - Experience with Google Cloud, Vertex AI, Kubernetes, Kafka,
    or similar cloud-native and platform technologies.
  - Familiarity with frontend or product integration work that
    helps connect backend AI capabilities to real user
    experiences.
  
  About You:
  
  You’re passionate about building great software and want to
  have a direct impact on how AI capabilities are delivered
  across Alteryx products. You work independently, communicate
  clearly, and know how to make progress in ambiguous spaces
  without over-engineering the solution. You’re comfortable
  working on both conventional backend engineering problems
  and newer agent-oriented systems, and you care about
  reliability, customer value, and helping the team get better
  through collaboration, mentorship, and a strong engineering
  mindset.
  
  Compensation:
  
  Alteryx is committed to fair, equitable, and transparent
  compensation. Final compensation is determined by several
  factors, including but not limited to relevant work
  experience, education, certifications, skills, and
  geographic location.
  
  The salary range for this role in the United States is
  $118,700 - $153,900.
  
  Bonus payouts are based on individual and company
  performance.
  
  In addition to base pay and bonus eligibility, this role
  includes clear forms of additional compensation, such as:
  
  - A monthly Connectivity Plus stipend of $150 to support
    remote work-related expenses
  - An annual $200 home office reimbursement
  
  Alteryx offers a comprehensive benefits package designed to
  support your health, financial security, and overall well-
  being, including:
  
  - Medical, dental, and vision coverage
  - 401(k) with company match
  - Paid parental leave, caregiver leave, and flexible time off
  - Mental health support and wellness reimbursement
  - Career development and education assistance
  
  Interested? Learn more and apply today at
  alteryx.com/careers!
  
