description: |
  About this role: Wells Fargo is seeking a Senior Software
  Engineer In this role, you will:
  
  - Lead moderately complex initiatives and deliverables within
    technical domain environments
  - Contribute to large scale planning of strategies
  - Design, code, test, debug, and document for projects and
    programs associated with technology domain, including
    upgrades and deployments
  - Review moderately complex technical challenges that require
    an in-depth evaluation of technologies and procedures
  - Resolve moderately complex issues and lead a team to meet
    existing client needs or potential new clients needs while
    leveraging solid understanding of the function, policies,
    procedures, or compliance requirements
  - Collaborate and consult with peers, colleagues, and mid-
    level managers to resolve technical challenges and achieve
    goals
  - Lead projects and act as an escalation point, provide
    guidance and direction to less experienced staff
  
  Required Qualifications:
  
  - 4+ years of hands-on experience in analysis, design,
    development, testing, and delivery of enterprise web
    applications.
  - Develop high-quality applications using Java, J2EE, JPA,
    Spring Boot, React JS/Angular.
  - Build cloud-enabled applications with working knowledge of
    Red Hat OpenShift (OCP) container platforms.
  - Design and develop reusable React.js components, optimize
    front-end performance, and translate wireframes/mockups
    into functional UI features.
  - Perform unit testing, integration testing, and ensure
    overall code quality.
  - Demonstrate strong understanding of web architecture and
    Single Page Application (SPA) design patterns.
  - Collaborate effectively with project stakeholders: QA, Scrum
    Master, PMO, Architects, and peer developers across US and
    EGS.
  - Partner with architects and business teams to convert
    strategic objectives into scalable, governable technical
    designs.
  - Analyze business/technical challenges and propose actionable
    solutions.
  - Provide strong leadership within the pod, guiding and
    mentoring team members as needed.
  - Possesses strong knowledge of GenAI and Agentic AI
    ecosystems, including their components, capabilities, and
    practical applications.
  
  Desired Qualifications:
  
  - Expert-level proficiency in Core & Advanced Java,
    Collections, Multithreading, Data Structures, and Design
    Patterns.
  - Hands-on experience with Responsive UI, Angular or React,
    HTML5, JavaScript, and CSS3.
  - Strong experience with Spring Boot, Spring MVC, JPA,
    Hibernate, and RESTful service development.
  - Proven experience integrating front-end applications with
    backend services.
  - Ability to translate business requirements into robust
    technical solutions.
  - Experience using version control tools like GitHub.
  - Strong communication skills (verbal/written) with experience
    working directly with US partner teams.
  - Ability to independently lead a small team with minimal
    supervision.
  - Familiarity with SDLC processes, Agile/Scrum methodologies.
  - Willingness to work in shifts to ensure overlap with US
    teams.
  
