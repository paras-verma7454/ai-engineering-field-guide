description: |
  About the team
  
  The AI Deployment Engineering (ADE) team ensures the safe
  and effective deployment of Generative AI applications for
  developers and enterprises. We act as trusted advisors and
  technical partners to our customers, helping them build and
  execute their AI adoption strategy post-sale. Our mission is
  to develop a strong backlog of GenAI use cases tailored to
  each customer’s industry and to drive these initiatives from
  prototype to production through hands-on technical guidance
  and partnership.
  
  As a Partner ADE, you’ll support systems integrators and
  their most strategic customers transform their business
  through solutions such as customer service, automated
  content generation, and novel applications that make use of
  our newest, most exciting models.
  
  About the role
  
  We are looking for a driven solutions leader with a product
  mindset as the founding Partner ADE to own the technical
  engagement with our systems integrators (including GSIs,
  RSIs, and boutique SIs) and ensure their customers achieve
  tangible business value with GenAI. You will help partners
  identify high-value use cases and provide technical
  enablement through the implementation of AI solutions. Your
  efforts will accelerate partners’ time to unlock
  distribution and adoption, ensuring they deliver exceptional
  results for our joint customers while maintaining high-
  quality standards. You will collaborate closely with Sales,
  Solutions Engineering, Applied Research, and Product teams,
  and you will report to the Head of Solutions Architecture.
  
  This role is based in San Francisco, CA. We use a hybrid
  work model of 3 days in the office per week and offer
  relocation assistance to new employees.
  
  In this role, you will:
  
  - Deeply embed with GSIs, RSIs, and boutique SIs as the
    technical lead, serving as their technical thought partner
    to ideate and build novel applications on our API for
    their customers.
  - Work with senior SI and customer stakeholders to identify
    the best applications of GenAI in their industry and to
    build/qualify a comprehensive backlog to support their AI
    roadmap.
  - Intervene directly to accelerate customer time to value
    through building hands-on prototypes and/or by delivering
    impactful strategic guidance.
  - Forge and manage relationships with SI and customer
    stakeholders to ensure the successful deployment and scale
    of their applications.
  - Codify solution packages and architectural patterns to
    accelerate time to deployment for customers and partners.
  - Lead technical support during partners' initial projects to
    ensure successful implementations and mentor their
    technical teams towards self-sufficiency in delivering
    OpenAI-powered solutions.
  - Scale the Partner Solutions Architect function by sharing
    knowledge, codifying best practices, contributing
    resources to our open-source repositories, and publishing
    resources to internal and external knowledge bases.
  - Validate, synthesize, and deliver high-signal feedback to
    the Product and Research teams.
  
  You’ll thrive in this role if you:
  
  - Have 8+ years of technical consulting (or equivalent)
    experience, managing C-level technical and business
    relationships with complex global organizations.
  - Have led complex technical projects and programs with many
    stakeholders, ideally within or through an SI.
  - Have industry experience in programming languages like
    Python or Javascript.
  - Have led complex implementations of Generative AI and/or
    traditional ML solutions.
  - Have built and/or delivered prototypes using the OpenAI API.
  - Are an effective presenter and communicator who can
    translate business and technical topics to all audiences,
    including senior leaders.
  - Own problems end-to-end and are willing to pick up whatever
    knowledge you're missing to get the job done.
  - Have a humble attitude, an eagerness to help your
    colleagues, and a desire to do whatever it takes to make
    the team succeed.
  
  About OpenAI
  
  OpenAI is an AI research and deployment company dedicated to
  ensuring that general-purpose artificial intelligence
  benefits all of humanity. We push the boundaries of the
  capabilities of AI systems and seek to safely deploy them to
  the world through our products. AI is an extremely powerful
  tool that must be created with safety and human needs at its
  core, and to achieve our mission, we must encompass and
  value the many different perspectives, voices, and
  experiences that form the full spectrum of humanity.
  
  We are an equal opportunity employer, and we do not
  discriminate on the basis of race, religion, color, national
  origin, sex, sexual orientation, age, veteran status,
  disability, genetic information, or other applicable legally
  protected characteristic.
  
  For additional information, please see OpenAI’s Affirmative
  Action and Equal Employment Opportunity Policy Statement.
  
  Background checks for applicants will be administered in
  accordance with applicable law, and qualified applicants
  with arrest or conviction records will be considered for
  employment consistent with those laws, including the San
  Francisco Fair Chance Ordinance, the Los Angeles County Fair
  Chance Ordinance for Employers, and the California Fair
  Chance Act, for US-based candidates. For unincorporated Los
  Angeles County workers: we reasonably believe that criminal
  history may have a direct, adverse and negative relationship
  with the following job duties, potentially resulting in the
  withdrawal of a conditional offer of employment: protect
  computer hardware entrusted to you from theft, loss or
  damage; return all computer hardware in your possession
  (including the data contained therein) upon termination of
  employment or end of assignment; and maintain the
  confidentiality of proprietary, confidential, and non-public
  information. In addition, job duties require access to
  secure and protected information technology systems and
  related data security obligations.
  
