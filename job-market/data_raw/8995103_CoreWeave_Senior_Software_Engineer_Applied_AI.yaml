description: |
  CoreWeave is The Essential Cloud for AI™. Built for pioneers
  by pioneers, CoreWeave delivers a platform of technology,
  tools, and teams that enables innovators to build and scale
  AI with confidence. Trusted by leading AI labs, startups,
  and global enterprises, CoreWeave combines superior
  infrastructure performance with deep technical expertise to
  accelerate breakthroughs and turn compute into capability.
  Founded in 2017, CoreWeave became a publicly traded company
  (Nasdaq: CRWV) in March 2025. Learn more at
  www.coreweave.com.
  
  What You’ll Do:
  
  The Applications Engineering team in the Data Infrastructure
  organization builds AI-native analytics platforms and first-
  party applications that embed governed data directly into
  operational workflows. The team develops CoreWeave’s
  internal data-native software products, transforming data
  into operational capability through intelligent interfaces,
  automation, and decision systems. This includes AI-native
  analytics platforms (e.g., UNION) and mission-critical
  applications such as capacity planning and scenario
  modeling. These systems encode CoreWeave’s differentiated
  operating knowledge into software, enabling scalable, data-
  driven decision-making across the business.
  
  About the role:
  
  As a Senior Software Engineer, you will design and build
  production-grade, full-stack applications that make data
  accessible, actionable, and embedded within CoreWeave’s core
  workflows. You will develop AI-enabled user experiences,
  scalable backend services, and intuitive interfaces that
  abstract away the complexity of underlying data systems.
  Day-to-day, you’ll work across the stack - from React-based
  frontends to backend services running on Kubernetes - while
  integrating AI/LLM capabilities into real-world
  applications. This role offers high visibility and the
  opportunity to directly influence how data is consumed and
  operationalized across the company.
  
  Who You Are:
  
  - 7+ years of experience building production-grade software
    applications, including both backend services and modern
    web frontends
  - Strong proficiency in backend programming languages (Python,
    Go, Java, C#) and frontend programming languages
    (JavaScript, TypeScript)
  - Strong experience building modern frontend applications
    using frameworks such as React and Next.js
  - Hands-on experience with containerization and deployment
    tooling (e.g., Docker, Helm)
  - Experience building and operating APIs and services (e.g.,
    REST, gRPC) with a focus on performance and reliability
  - Experience developing and deploying AI/ML/LLM-powered
    applications in production environments
  - Familiarity with data platforms and tools (e.g., Spark,
    Kafka, or similar systems) and integrating them into
    application workflows
  - Experience implementing software development best practices,
    including CI/CD, automated testing, observability, and
    secure application design
  - Ability to take ownership of complex systems end-to-end,
    from design through deployment and iteration
  
  Preferred:
  
  - Experience building AI-native applications such as text-to-
    SQL interfaces, copilots, or automated insight-generation
    systems
  - Experience designing and building scalable, distributed
    systems deployed in cloud-native environments (e.g.,
    Kubernetes)
  - Familiarity with real-time data processing or streaming
    architectures
  - Experience building internal platforms or tools that enable
    self-service analytics or decision-making
  
  Wondering if you’re a good fit? We believe in investing in
  our people, and value candidates who can bring their own
  diversified experiences to our teams – even if you aren't a
  100% skill or experience match. Here are a few qualities
  we’ve found compatible with our team. If some of this
  describes you, we’d love to talk.
  
  - You love building user-facing applications that turn complex
    data into intuitive experiences
  - You’re curious about applying AI to real-world problems, not
    just prototypes
  - You’re an expert in designing and shipping systems that are
    both scalable and usable
  
  Why CoreWeave?
  
  At CoreWeave, we work hard, have fun, and move fast!  We’re
  in an exciting stage of hyper-growth that you will not want
  to miss out on. We’re not afraid of a little chaos, and
  we’re constantly learning. Our team cares deeply about how
  we build our product and how we work together, which is
  represented through our core values:
  
  - Be Curious at Your Core
  - Act Like an Owner
  - Empower Employees
  - Deliver Best-in-Class Client Experiences
  - Achieve More Together
  
  We support and encourage an entrepreneurial outlook and
  independent thinking. We foster an environment that
  encourages collaboration and provides the opportunity to
  develop innovative solutions to complex problems. As we get
  set for take off, the growth opportunities within the
  organization are constantly expanding. You will be
  surrounded by some of the best talent in the industry, who
  will want to learn from you, too. Come join us!
  
  The base salary range for this role is $165,000 to $242,000.
  The starting salary will be determined based on job-related
  knowledge, skills, experience, and market location. We
  strive for both market alignment and internal equity when
  determining compensation. In addition to base salary, our
  total rewards package includes a discretionary bonus, equity
  awards, and a comprehensive benefits program (all based on
  eligibility).
  
  What We Offer
  
  The range we’ve posted represents the typical compensation
  range for this role. To determine actual compensation, we
  review the market rate for each candidate which can include
  a variety of factors. These include qualifications,
  experience, interview performance, and location.
  
  In addition to a competitive salary, we offer a variety of
  benefits to support your needs, including:
  
  - Medical, dental, and vision insurance - 100% paid for by
    CoreWeave
  - Company-paid Life Insurance
  - Voluntary supplemental life insurance
  - Short and long-term disability insurance
  - Flexible Spending Account
  - Health Savings Account
  - Tuition Reimbursement
  - Ability to Participate in Employee Stock Purchase Program
    (ESPP)
  - Mental Wellness Benefits through Spring Health
  - Family-Forming support provided by Carrot
  - Paid Parental Leave
  - Flexible, full-service childcare support with Kinside
  - 401(k) with a generous employer match
  - Flexible PTO
  - Catered lunch each day in our office and data center
    locations
  - A casual work environment
  - A work culture focused on innovative disruption
  
  Our Workplace
  
  While we prioritize a hybrid work environment, remote work
  may be considered for candidates located more than 30 miles
  from an office, based on role requirements for specialized
  skill sets. New hires will be invited to attend onboarding
  at one of our hubs within their first month. Teams also
  gather quarterly to support collaboration.
  
