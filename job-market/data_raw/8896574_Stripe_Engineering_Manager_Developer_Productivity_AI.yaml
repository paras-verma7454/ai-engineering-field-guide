description: |
  Who we areAbout Stripe
  
  Stripe is a financial infrastructure platform for
  businesses. Millions of companies—from the world’s largest
  enterprises to the most ambitious startups—use Stripe to
  accept payments, grow their revenue, and accelerate new
  business opportunities. Our mission is to increase the GDP
  of the internet, and we have a staggering amount of work
  ahead. That means you have an unprecedented opportunity to
  put the global economy within everyone’s reach while doing
  the most important work of your career.
  
  About the team
  
  We are a brand new team, working quickly to accelerate
  Stripes engineering productivity by effectively deploying
  LLM agents and tools to automate large swaths of the
  engineering workflow.  We’re a cross-continent team,
  spanning North America and Europe, filled with high agency
  engineers with strong product perspectives.
  
  What you’ll do
  
  We are looking for a hands-on Manager who can effectively
  lead and guide a team high agency engineers to move quickly
  on a rapidly growing tech space. They will help set the
  product direction in a field with a nearly endless possible
  solution space. Folks passionate about great products, user
  experience and with a strong opinion about how engineers do
  good work will excel in this role. Prior experience with
  deploying AI developer tools isn’t necessary, but is
  interesting.
  
  You will:
  
  - Lead a senior, cross-continent team of engineers to move
    rapidly to deploy and exploit the latest in AI devtools.
  - Deliver compelling user and product experiences for internal
    users.
  - Work across the company to redefine how software engineers
    at Stripe work.
  - Keep up with an incredibly fast paced technology
    environment.
  - Dig deep into the data on how engineers use AI tools to seek
    out every bit of benefit, and help Stripe accelerate.
  
  Who you are
  
  We’re looking for someone who meets the minimum requirements
  to be considered for the role. If you meet these
  requirements, you are encouraged to apply. The preferred
  qualifications are a bonus, not a requirement.
  
  Minimum requirements
  
  - 2+ years managing high performing engineering teams, and at
    least 5+ years of experience as a software engineer.
  - Proven success in recruiting and building great teams.
  - A repeated history of delivering great, innovative product
    experiences - either for internal or external users.
  - Effective cross-functional collaboration, with the ability
    to think rigorously, communicate clearly, and make or
    coordinate difficult decisions and trade-offs.
  - Thrives with high autonomy and responsibility in an
    ambiguous environment.
  - Ability to foster a healthy, inclusive, challenging, and
    supportive work environment.
  
  Preferred qualifications
  
  - Experience Tech leading, mentoring and managing a team that
    shipped products to engineers.
  - Experience building tools and products, ideally for
    technical audiences - either as internal or external
    customers.
  - Deep curiosity and opinionation about the use of AI in
    software engineering.
  - Strong written and verbal communication skills for various
    audiences, including leadership, users, and company-wide.
