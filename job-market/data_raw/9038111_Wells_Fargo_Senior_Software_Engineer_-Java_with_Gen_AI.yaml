description: |
  About this role: Wells Fargo is seeking a Senior Specialty
  Software Engineer In this role, you will:
  
  - Lead or participate in complex initiatives on selected
    domains
  - Assure quality, security and compliance for supported
    systems and applications
  - Serve as a technical resource in finding software solutions
  - Review and evaluate user needs and determine requirements
  - Provide technical support, advice, and consultation with the
    issues relating to supported applications
  - Create test data and conduct interfaces and unit tests
  - Design, code, test, debug and document programs using Agile
    development practices
  - Understand and participate to ensure compliance and risk
    management requirements for supported area are met and
    work with other stakeholders to implement key risk
    initiatives
  - Conduct research and resolve problems in relation to
    processes and recommend solutions and process improvements
  - Assist other individuals in advanced software development
  - Collaborate and consult with peers, colleagues and managers
    to resolve issues and achieve goals
  
  Required Qualifications:
  
  - 4+ years of Specialty Software Engineering experience, or
    equivalent demonstrated through one or a combination of
    the following: work experience, training, military
    experience, education
  
  Desired Qualifications:
  
  - 4+ years of experience in Design, implement, and optimize
    low-latency, high-throughput Java applications for
    financial trading.
  - Experience in Electronic trading / Algorithmic Trading is
    must
  - Strong proficiency in Java 8+, with hands-on experience in
    multi-threaded and distributed systems.
  - Develop and maintain protocols for connectivity with
    exchanges (e.g., FIX, ITCH, OUCH).
  - Experience with messaging systems (e.g., Solace, Aeron etc.)
    and real-time data processing.
  - Knowledge of low-latency optimization techniques, including
    garbage collection tuning and efficient data structures.
  
  Job Expectations:
  
  - We are open for both the locations - Hyderabad or Bangalore
    and will be required to work in the office as per
    organizations In Office Adherence / Return To Office (RTO)
  - Collaborate with internal teams to integrate systems
    seamlessly with other components.
  - Ensure adherence to best coding practices and architectural
    standards.
  - Willing to work in any key area on Electronic Trading like
    Exchange Connectivity, Algo Trading or time series
    database
  - Troubleshoot and resolve production issues in real-time
    trading environments.
  - Work closely with product managers, traders, and operations
    teams to gather requirements.
  - Ensure systems comply with exchange-specific rules and
    industry regulations.
  - Drive innovation by exploring new technologies and
    methodologies.
  - Regularly review and enhance system architecture and
    processes to improve efficiency.
  - Familiarity with financial markets, trading systems, and
    exchange platforms.
  - Understanding of regulatory and compliance requirements in
    trading environments.
  - Experience with CI/CD pipelines, automated testing
    frameworks like karate and cucumber, and version control
    (e.g., Git)
  
