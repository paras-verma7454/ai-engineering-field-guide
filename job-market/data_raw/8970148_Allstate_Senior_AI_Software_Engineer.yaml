description: |
  At Allstate, great things happen when our people work
  together to protect families and their belongings from
  life’s uncertainties. And for more than 90 years, our
  innovative drive has kept us a step ahead of our customers’
  evolving needs. From advocating for seat belts, air bags and
  graduated driving laws, to being an industry leader in
  pricing sophistication, telematics, and, more recently,
  device and identity protection.
  
  Job Description
  
  We are seeking a passionate and skilled Backend
  Developer with hands-on experience in Generative AI
  technologies to join our growing engineering team. This role
  is ideal for someone who thrives on building scalable
  backend systems while integrating cutting-edge AI
  capabilities into enterprise applications.
  
  Key Responsibilities:
  
  - Design, develop, and maintain backend services and APIs
    using modern frameworks (e.g., Java Spring Boot, Node.js,
    or Python FastAPI).
  
  - Integrate and deploy Generative AI models (e.g., OpenAI,
    Hugging Face, LangChain) into production environments.
  
  - Fine-tune and optimize LLMs for specific use cases.
  
  - Build secure, scalable, and high-performance microservices.
  
  - Monitor and improve system performance, reliability, and
    scalability.
  
  - Implement CI/CD pipelines, containerization (Docker), and
    orchestration (Kubernetes).
  
  - Deploy and manage applications on cloud platforms,
    preferably Microsoft Azure.
  
  - Participate in code reviews, testing, and continuous
    integration processes.
  
  
  
  Required Skills & Qualifications:
  
  - 3+ years of backend development experience using Java Spring
    Boot or Python.
  
  - Strong understanding of RESTful APIs, microservices
    architecture, and asynchronous processing.
  
  - Experience working with Generative AI APIs and/or open-
    source models.
  
  - Experience with LangChain, LLM orchestration, or RAG
    (Retrieval-Augmented Generation) pipelines.
  
  - Familiarity with prompt engineering, embedding models,
    or vector databases.
  
  - Strong problem-solving and debugging skills.
  
  
  
  
  
  Preferred Skills:
  
  - Exposure to multi-modal AI systems and agentic AI
    frameworks.
  
  - Exposure to MLOps and model deployment workflows.
  
  - Experience with Docker, Kubernetes, and CI/CD pipelines.
  
  - Experience with cloud platforms (Azure, AWS or GCP).
  
  - Knowledge of frontend frameworks like React or Angular.
  
    Education
  
  - 4 year Bachelor’s Degree
  
  Experience
  
  - 4 or more years of experience
  
  Supervisory Responsibilities
  
  - This job does not have supervisory duties.
  
  
  
  Skills
  
  Containerization, Docker (Software), Java, Java Spring,
  Kubernetes, Large Language Model (LLM) Fine-Tuning,
  Microservices Architecture, Microsoft Azure, Software
  Development, Software Development Life Cycle (SDLC), Spring
  Boot
  
  Compensation
  
  Compensation offered for this role is 90,700.00 - 153,925.00
  annually and is based on experience and qualifications.
  
  The candidate(s) offered this position will be required to
  submit to a background investigation.
  
  Joining our team isn’t just a job — it’s an opportunity. One
  that takes your skills and pushes them to the next level.
  One that encourages you to challenge the status quo. One
  where you can shape the future of protection while
  supporting causes that mean the most to you. Joining our
  team means being part of something bigger – a winning team
  making a meaningful impact.
  
