description: |
  The Full Stack Engineer (AI & Agentic AI Systems) is a
  strategic professional who will play a pivotal role in
  architecting and delivering next‑generation intelligent
  applications that blend advanced software engineering,
  autonomous agents, and robust end‑to‑end engineering. In
  this role, you will work across the entire technology stack—
  REACT based front ends, designing scalable backend services
  (JAVA/Python), intuitive user experiences, and AI‑driven
  workflows that reason, plan, and act with minimal human
  intervention. You’ll collaborate with cross‑functional teams
  to transform complex business challenges into innovative,
  production‑ready AI systems that push the boundaries of
  automation, intelligence, and modern software engineering.
  
  Key Responsibilities:
  
  - Design and deliver end‑to‑end solutions spanning
    architecture, system design, low‑level design, and
    high‑quality coding across modern full‑stack environments.
  - Build responsive, modular UI applications using React,
    integrating complex AI-driven workflows and real‑time
    interactions.
  - Develop scalable, high‑performance backend services in Java
    / Python, implementing resilient APIs, event‑driven
    patterns, and microservices architectures.
  - Strong expertise in SQL (Oracle, PostgreSQL), no SQL DB like
    MangoDB, PYTHON, JAVA, APIs, Authentication &
    Authorization like OAuth and others, Encryption
  - Engineer AI‑powered features leveraging Google Gemini LLM,
    Vertex AI, ADK, vector databases (A2A), RAG pipelines,
    MCP, context engineering, and advanced prompt engineering
    techniques.
  - Implement secure, well‑structured REST and GraphQL APIs,
    ensuring reliability, versioning discipline, and clean
    integration patterns across platforms.
  - Optimize system performance and scalability, applying
    profiling, load‑testing insights, caching strategies, and
    distributed system tuning.
  - Drive robust CI/CD practices, integrating automated testing,
    code quality gates, containerization, and cloud‑native
    deployment pipelines.
  - Partner with QE to build and maintain automated test suites
    (UI, API, integration, and performance), improving release
    quality and reducing regression risk.
  - Identify, diagnose, and remediate performance bottlenecks,
    penetration testing vulnerabilities, and production issues
    with precision and root‑cause clarity.
  - Collaborate cross‑functionally with AI scientists,
    architects, and product teams to translate business
    challenges into production‑ready, intelligent agentic
    systems.
  
  Other Responsibilities:
  
  - Turn tech stack and application design into code on multiple
    development platforms (e.g. iOS, Android, web/Angular,
    services).
  - Address a variety of responses to problems, questions, or
    situations by applying established criteria to directly
    influence development outcomes. In doing so, use the right
    technology to solve technical challenges required to
    deliver small scale features and functions and / or
    supporting aspects of a larger program efforts.
  - Responsible for applications systems analysis and
    programming activities that may include assisting with
    feasibility studies, time and cost estimates and
    implementation of new or revised applications systems and
    programs.
  - Accountable for development, design, construction, testing
    and implementation and write secure, stable, testable and
    maintainable code.
  - Expected to operate with autonomy, while some oversight and
    direction may be required.
  - Engage in digital applications development, risk technology,
    Middleware, Mainframe applications, Non Mainframe
    applications, Analytic Model Development and Application
    support activities to meet specific business needs of user
    areas and to test systems to ensure integrity of
    deliverables.
  - Expected to provide sound understanding of application
    development concepts and principles and a basic knowledge
    of concepts and principles in other technology areas.
  - On occasion, may need to consult with users, clients and
    other technology groups on issues and recommend
    programming solutions for customer exposed systems.
  - Take the time to fully learn the functionality,
    architecture, dependencies, and runtime properties of the
    systems involved with your projects. This includes the
    business requirements, applications/services, runtime
    operations (including trouble management/associated
    support strategies), and maintenance.
  - Understand the business context and the associated customer
    use cases.
  - Understand the team’s technologies and are able to evaluate
    system designs and architecture as you participate in
    solution discussions, development and the creation of
    application / systems documentation.
  - Drive clarity into technical implementation by driving
    system build and performance discussions, providing
    technical context to team members as required and
    competently represent your team’s systems to others both
    inside and outside Digital.
  - Occasionally need guidance from peers and / or manager as
    the team’s operating procedures and technology is well
    defined.
  - Build and maintain integrated project development schedules
    that account for internal / external dependencies,
    differing SDLC approaches, numerous constraints, and
    adequately factor in contingency for unplanned delays.
  - Negotiate features and associated priority and help the team
    and their customers reach consensus.
  - Verbal and written communication is clear and concise.
  - Clearly articulate development and timeline dependencies.
  - Have good working relationships with team members, manager,
    and peers.
  - Improve team development related processes that accelerate
    delivery, drive innovation, lower costs, and improve
    quality.
  - Ensure self and peers are actively seeking ways to
    objectively measure productivity. (i.e., SonarQube
    Findbugs). This will include a focus on automating code
    quality, code performance, unit testing, and build
    processing in the CI/CD pipeline (RTC, Jenkins, RLM)
  - Appropriately assess risk when business decisions are made,
    demonstrating particular consideration for the firm's
    reputation and safeguarding Citigroup, its clients and
    assets, by driving compliance with applicable laws, rules
    and regulations, adhering to Policy, applying sound
    ethical judgment regarding personal behavior, conduct and
    business practices, and escalating, managing and reporting
    control issues with transparency.
  
  Qualifications:
  
  - 2-5 years in an Apps Development role. Demonstrated
    execution capabilities.
  - Strong analytical and quantitative skills; Data driven and
    results-oriented
  - Experience in running high traffic, distributed, cloud based
    services
  - Experience in affecting large culture change
  - Experience leading infrastructure programs
  - Skilled at working with third party service providers
  - Excellent written and oral communication skills
  
  Education:
  
  - Bachelor’s/University degree or equivalent experience
  
