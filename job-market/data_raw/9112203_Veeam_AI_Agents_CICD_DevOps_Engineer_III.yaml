description: |
  Veeam is the Data and AI Trust Company, specializing in
  helping organizations ensure their data and AI are fully
  understood, secured, and resilient to enable the
  acceleration of safe AI at scale. As the market leader in
  both data resilience and data security posture management,
  Veeam is built for the convergence of identity, data,
  security, and AI risk. Headquartered in Seattle with offices
  in more than 30 countries, Veeam protects over 550,000
  customers worldwide, who trust Veeam to keep their
  businesses running. Join us as we go fearlessly forward
  together, growing, learning, and making a real impact for
  some of the world’s biggest brands.
  
  #LI-JC2
  
  #LI-REMOTE
  
  About the Role
  
  This role focuses on building and evolving a modern CI/CD
  ecosystem that enables fast, reliable, and secure delivery
  of AI agents and cloud‑native applications. You’ll work at
  the intersection of DevOps, AI delivery, and platform
  engineering, partnering closely with developers and cloud
  teams across regions. Your work will reduce friction in the
  development lifecycle while raising the bar on automation,
  security, and reliability.
  
  What You’ll Do
  
  - Design build and deployment pipelines for AI agents and
    Azure‑based containerized applications.
  - Automate CI/CD workflows to reduce manual effort across
    build, test, and release processes.
  - Implement GitHub Actions workflows, including secure
    authentication, secrets management, and self‑hosted
    runners.
  - Enable reliable deployments to Kubernetes environments using
    Helm and AKS.
  - Integrate CI/CD pipelines with artifact repositories,
    security tools, and third‑party systems.
  - Collaborate with AI developers, infrastructure teams, and QA
    to continuously improve delivery practices.
  
  Technologies You’ll Work With
  
  - GitHub Actions, Job DSL, GitHub & GitLab APIs
  - Docker, Kubernetes, Helm, Azure Kubernetes Service (AKS)
  - Azure (ACR, Entra ID, Key Vault), GitHub Secrets
  - Python, Bash, Groovy
  - JFrog Artifactory, HashiCorp Vault, SonarQube
  - Ansible, Terraform
  
  What You’ll Bring
  
  - 5+ years of experience in CI/CD, DevOps, or platform
    engineering roles.
  - Strong expertise in Github Actions pipelines.
  - Hands-on experience building CI/CD workflows for
    containerized and Kubernetes‑deployed applications.
  - Proficiency in Bash scripting and automation, with working
    knowledge of Python.
  - Operational experience with Azure services, including AKS,
    ACR, Entra ID, and secrets management.
  - Working knowledge of Helm and Kubernetes deployment patterns
    across multiple environments.
  - Ability to collaborate effectively with distributed teams
    across time zones.
  
  Bonus Skills
  
  - Experience with additional CI/CD platforms such as Azure
    Pipelines, GitLab CI/CD, or AWS CodePipeline.
  - Familiarity with LLMOps practices, AI agent architectures,
    and multi‑environment promotion models.
  - Understanding of GitOps workflows using tools like ArgoCD or
    Flux.
  - Experience with Go for CI/CD tooling or automation.
  - Relevant certifications such as CKA, AZ‑400, or AWS DevOps
    Engineer Professional.
  
  What you'll get
  
  - Unlimited paid time off, 12 paid holidays, plus 4 extra
    global VeeaMe Days for self-care and 24 paid volunteer
    hours annually through Veeam Cares
  - Paid parental leave: 8 weeks for all parents, 16 weeks for
    birthing parents
  - Medical, dental, and vision coverage starting on your first
    day
  - Mental health support, therapy sessions, and digital
    wellness tools via our Employee Assistance Program
  - 401(k) retirement plan with company matching contributions
  - Fertility, adoption, and surrogacy support through Maven,
    plus paid volunteer time
  - AirVet: 24/7 virtual veterinary care at no cost
  - Legal services, identity protection, and supplemental health
    insurance options
  - Tax-advantaged spending accounts for healthcare, dependent
    care, and commuting
  - Opportunities to learn and grow through on-demand libraries
    (LinkedIn Learning, O’Reilly), mentoring, workshops, and
    learning events like our annual Global Day of Learning
  
  Compensation Transparency
  
  Veeam is committed to pay transparency and equitable
  compensation. For this role, the compensation range below
  reflects the expected total target compensation (TTC),
  inclusive of base pay and a competitive performance-based
  bonus. For roles with a commission plan, the compensation
  range represents On Target Earnings (OTE), which includes
  base salary plus variable commission. When determining
  compensation, Veeam takes into consideration factors such as
  experience, education, skills, and geographic zone. Offers
  are typically made below the midpoint of the range.
  
  In addition to compensation, Veeam provides a comprehensive
  benefits package, including health coverage, retirement
  plans, and unlimited time off.
  
