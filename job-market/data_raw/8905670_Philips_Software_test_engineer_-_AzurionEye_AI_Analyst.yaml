  Job TitleSoftware test engineer - AzurionEye AI Analyst
  
  Job Description
  
  Job Title
  
  Software Test Engineer – AI Analyst
  
  Job Description
  
  In this role, you will have the opportunity to join the
  leading innovator in image-guided therapy solutions as
  Software Test Architect for the AzurionEye solution – an
  integrated, AI-enabled software platform. You will be
  responsible for defining and developing test architecture
  for REST‑based, microservice‑first applications that power
  our clinical data lake platform. You will pair hands‑on
  technical depth with system‑level thinking to deliver
  reliable, scalable data services that power imaging
  workflows and connected solutions.
  
  You will be part of the Image Guided Therapy Systems
  business unit with development sites in the Netherlands,
  China and India. This business unit is responsible for
  marketing, service, development and manufacturing of
  solutions and products used in minimally invasive
  procedures. You will join the global R&D department.
  
  Key areas of responsibility
  
  - Execute software testing activities, both automated and
    manual, throughout the development cycle within agile or
    scrum teams, ensuring high-quality deliverables that meet
    customer needs.
  - Define the test strategy for products and platforms,
    ensuring coverage of functional, non‑functional, safety,
    and regulatory requirements.
  - Offers expertise in implementing software test strategies
    and initiatives at the feature and system levels,
    contributing to the overall quality assurance process.
  - Reviews functional and non-functional requirements, stories,
    and features to ensure accuracy and testability, providing
    valuable insights to enhance the testing process.
  - Collaborates with scrum teams and other stakeholders on test
    planning, participating in testing, planning, and demo
    activities to ensure comprehensive test coverage.
  - Executes a diverse range of testing methodologies,
    encompassing functional, performance, load, and
    reliability testing, to meticulously validate the
    software's functionality and robustness across different
    usage scenarios and conditions.
  - Utilizes automation tools, simulation models, test
    frameworks, and scripting languages to automate tests and
    streamline the testing process, improving efficiency and
    accuracy.
  - Documents meticulously crafted test plans, protocols, and
    reports, maintaining thorough records of testing
    activities and outcomes to facilitate comprehensive
    reference and analysis, thereby ensuring transparency and
    accountability throughout the testing process.
  - Supports design changes by rigorously assessing their
    potential impact on product quality, strategizing and
    implementing appropriate testing measures to uphold
    product integrity and mitigate risks effectively.
  - Exhibits a deep understanding of data requirements and AI
    model metrics, actively contributing to the validation and
    testing processes of AI-based products and solutions,
    preparing the AI Model validation dataset.
  - Harnesses valuable insights from customer knowledge to
    inform testing strategies and prioritize test scenarios
    effectively, aligning testing efforts closely with
    customer expectations and needs to enhance product
    usability and satisfaction.
  - Establish the end‑to‑end test architecture aligned with
    system‑level and software architecture. Ensure the test
    architecture supports continuous integration, continuous
    delivery, and test‑first principles.
  - Define frameworks, patterns, tools, and automation
    strategies that ensure consistency, scalability, and
    maintainability across scrum teams.
  - Coach developers and testers on advanced testing techniques,
    tools, and automation best practices.
  - Conduct training, design reviews, and quality audits to
    ensure continuous improvement.
  - Design and develop software testing (automated and manual)
    within the systems/agile/scrum team throughout the whole
    development cycle ensuring built-in quality
  - Review (functional and non-functional)
    requirements/stories/features for accuracy and testability
  - Consult within scrum or other teams on test planning and
    participates in scrum team testing, planning and demo
    activities
  - Testing all aspects of the web application product/system
    like functional/component, system, requirement,
    performance, regression and service.
  - Setting up test environments, designing test plans,
    developing test cases/scenarios/usage cases, and executing
    these cases.
  - Providing feedback on usability and serviceability, trace
    the result to quality risk and report it to concerned
    people
  - Ensure test approaches meet Philips quality standards,
    regulatory expectations, cybersecurity controls, and
    documentation requirements.
  - Maintain traceability from requirements to tests, defects,
    and product increments.
  
  To succeed in this role, you should have the following
  skills and experience
  
  - BE, BTech or MTech in Computer Science Engineering,
    Information technology, Electrical Engineering or
    equivalent
  - Minimum of 6 years of experience in Software automation
    testing with 2+ years as a software test architect
  - Proficiency in leveraging AI-assisted development tools to
    accelerate design, coding, testing, and documentation with
    high-quality outcomes.
  - Thrives in an agile, entrepreneurial, start‑up–like
    environment with strong ownership, learning mindset and
    the drive to rapidly iterate, validate and deliver
    customer centric solutions.
  - Experience in API automation using frameworks like
    Postman/RestAssure
  - Experience in automation testing of microservice, cloud-
    based application using frameworks like Selenium,
    playwright or similar.
  - Experience in C#, Isqt or similar automation tools
  - Desirable: Python, Kubernetes/docker
  - Experience in Python, WASM and CI/CD
  - Experience/exposure to BDD using tools like Cucumber
  - Experience in building non-functional automation scripts for
    performance, reliability, resilience tests
  - Experience with design and coding in object-oriented
    programming languages like C++ is a plus
  - Experience with Git, Azure Dev Ops
  
