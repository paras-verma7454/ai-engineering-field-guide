description: |
  New York City
  
  Spur builds fundamental technology for the future of QA:
  autonomous browser agents that think, explore, validate, and
  self-heal like real users. We’re not another test tool —
  we’re reimagining how digital teams ship with confidence.
  
  The market has responded loudly. Top brands (Alo Yoga,
  Living Spaces, HelloFresh, Nextdoor, Abercrombie & Fitch,
  and more) are actively pulling us in. Inbound demand is
  exploding. Sales cycles are fast. And the product actually
  delivers — teams go live in days, not months.
  
  We’re a small, elite team of builders from DeepMind, Figma,
  ex-founders and customers — shipping at a pace that big
  companies can’t touch.
  
  Our Mission: We want to help our customers deliver the best
  digital experiences Read our Manifesto:
  https://www.spurtest.com/founders-letter
  
  What you’ll do
  
  - Ship end-to-end features -- design, code, test, deploy, and
    own them in production. You’ll own parts of the product
    end-to-end
  - Work directly with users to turn feedback into improvements
    within hours and help shape product direction
  - Build and operate both performance frontend and backend code
  - Launching new features, speaking directly with customers to
    gather feedback, iterating quickly.
  - Rapidly iterate with product, engineering, design, and
    founders
  
  Bonus Points
  
  - Prior experience as a founder or founding engineer
  - Have build LLM products in the past
  - Passionate about developer tools and sweat the small details
    that transform both developer and customer experiences
  
  You’ll Thrive Here If You
  
  - Are relentlessly customer focused. We believe in delighting
    our users – how can we make this feature as delightful and
    magical for the end-user?
  - Are curious. You will be dealing with a lot of new
    technology and challenges every day as we scale—you should
    be comfortable learning new frameworks on the fly, and in
    communicating this knowledge to the team.
  - Have very strong technical experience with Typescript /
    Next-JS / React front-end frameworks.
  - Have high autonomy and drive projects on your own — you
    don't wait to be told what to do
  - Are curious and comfortable learning new frameworks and
    technologies on the fly
  - Care deeply about craft, quality, and the details that make
    a product feel magical
  - Are ambitious and driven, and care a lot about doing great
    work with great people.
  
  This is an in person role at our office in NYC. We’re an
  early stage company which means that the role requires
  working hard and moving quickly. Please only apply if that
  excites you.
  
  Benefits at Spur
  
  - Daily lunch, snacks, and more are available everyday in the
    office (you help choose)!
  - High quality medical, dental, and vision coverage options,
    flexible depending on your needs.
  - Meaningful equity in a fast-growing company
  
  Our office in New York City
  
  Spur is an Equal Opportunity Employer committed to diversity
  and inclusion in the workplace. All qualified applicants
  will receive consideration for employment without regard to
  sex, race, color, age, national origin, religion, physical
  and mental disability, genetic information, marital status,
  sexual orientation, gender identity/assignment, citizenship,
  pregnancy or maternity, protected veteran status, or any
  other status prohibited by applicable national, federal,
  state or local law.
