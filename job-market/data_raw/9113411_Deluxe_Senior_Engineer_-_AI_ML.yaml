description: |
  We are looking for a highly experienced Senior Engineer with
  deep expertise in AI and Machine Learning platforms to lead
  the architecture and engineering of our enterprise AI
  infrastructure. This role will drive the design and
  scalability of cloud based AI platforms, ML lifecycle
  systems, and AI driven engineering capabilities across the
  organization.
  
  The Principal Engineer will play a critical role in enabling
  production grade AI and ML solutions by building the
  underlying platform, infrastructure, and automation required
  to support model development, deployment, monitoring, and
  governance at scale.
  
  This is a senior individual contributor role focused on AI
  platform architecture, Cloud infrastructure, and AI driven
  engineering innovation.
  
  Required Qualifications
  
  - 12 or more years of experience in software engineering,
    platform engineering, or cloud architecture.
  - Strong expertise in AI and machine learning systems and
    production ML platforms.
  - Experience designing and operating AI or ML platforms at
    scale.
  - Deep experience with cloud infrastructure such as AWS and
    distributed systems.
  - Experience with container orchestration platforms such as
    Kubernetes.
  - Strong understanding of MLOps practices and ML lifecycle
    management.
  - Programming experience in languages such as Python, Java, or
    similar.
  - Experience in AWS cloud.
  - Experience working closely with data science teams to
    operationalize machine learning models.
  
  Preferred Qualifications
  
  - Experience with large scale data processing platforms and AI
    training environments.Experience deploying real time and
    batch AI inference systems.Familiarity with generative AI,
    LLM based systems, or modern AI platforms.
  - Experience in Building solution using AI Native Development
    Lifecycle
  - Experience building internal AI platforms or developer
    platforms supporting ML workflows.
  
  Key Attributes
  
  - Deep passion for AI and emerging technologies
  - Strong systems architecture and problem-solving skills
  - Ability to translate AI innovation into scalable production
    systems
  - Strong technical influence across engineering teams
  - Ability to mentor engineers and drive engineering excellence
  
  Key Responsibilities
  
  AI and Machine Learning Platform Architecture
  
  - Lead the architecture and engineering of the enterprise AI
    and ML platform supporting model development, training,
    deployment, and monitoring.
  - Define scalable infrastructure patterns for AI workloads
    including batch and real time inference environments.
  - Establish best practices for ML lifecycle management
    including model versioning, deployment, monitoring, and
    retraining.
  - Build and evolve infrastructure supporting large scale data
    processing and AI model experimentation.
  
  AI Driven Engineering and Innovation
  
  - Promote the adoption of AI driven engineering practices
    across development and platform teams.
  - Enable integration of generative AI, machine learning
    models, and intelligent automation into platform
    capabilities.
  - Evaluate emerging AI technologies and identify opportunities
    to incorporate them into the enterprise platform.
  
  Technical Leadership
  
  - Serve as the technical authority for AI platform
    architecture and infrastructure.
  - Mentor engineers and data scientists on best practices for
    building scalable AI systems.
  - Drive architectural consistency and engineering standards
    across teams.
  - Lead complex technical initiatives involving AI platforms,
    cloud infrastructure, and data systems.
  
  Cloud Infrastructure for AI Workloads
  
  - Design and implement scalable cloud infrastructure to
    support AI and data intensive workloads.
  
  MLOps and DevOps Enablement
  
  - Design and standardize MLOps frameworks for training,
    deploying, and monitoring machine learning models.
  
  Platform Reliability and Observability
  
  - Establish monitoring and observability for AI models,
    pipelines, and platform services.
  
  Security, Governance, and Responsible AI
  
  - Ensure AI platform infrastructure
  
