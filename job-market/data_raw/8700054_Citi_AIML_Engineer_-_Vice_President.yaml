description: |
  C13 Role - Senior AI/ML Engineer Vice President
  
  Responsibilities:
  
  - Designing, implementing, and maintaining secure and stable
    AI/ML solutions using leading AI technology frameworks,
    including conversational AI solutions
  - Aligning AI/ML use cases with business strategies and key
    performance indicators and other metrics
  - Hands on work with one of the major AI programming languages
    Java, Python, Ruby, etc. Develop and maintain applications
    using Node.js and JavaScript, along with relevant
    frameworks.
  - Working closely and lead software engineers to build new
    applications to run on AI/ML platforms. Perform data
    analysis, feature engineering, and NLP training to
    optimize model performance. Run what you build.
  - Monitoring current and future trends and advancements in AI,
    machine learning, and other emerging technologies. Measure
    the performance & adjust.
  - Provide vision for relevant technology systems, including
    those that support enterprise risk management and
    independent compliance applications, ensuring that
    engineers use blueprints, architecture, patterns, and
    design.
  - Explore and prototype novel techniques in generative AI/ML
    including fine-tuning, reinforcement learning with various
    reward strategies, transfer learning, and multimodal
    alignment. Build and maintain chatbot solutions using
    Kore.AI ChatBot builder platforms
  - Capable of building, articulating, and presenting new ideas
    to technical, non-technical, and business communities.
  - Experience managing vendor interactions for troubleshooting
    sessions, enhancement requests, and guiding vendor
    roadmaps to meet Citi standards and functional
    requirements.
  - Self-starter able to work with minimal supervision and in a
    global team of members with diverse skills and
    backgrounds.
  - Contributes to the development of Generative AI use cases
    and proof-of-concept projects. Knowledge of GenAI services
    on GCP, AWS or Azure. Knowledge of Loggly & Splunk logging
    management applications.
  
  Recommended Qualifications:
  
  - 11+ years of relevant experience in Apps Development or
    systems analysis role
  - Extensive experience system analysis and in programming of
    software applications
  - Experience in managing and implementing successful projects
  - Subject Matter Expert (SME) in at least one area of
    Applications Development
  - Ability to adjust priorities quickly as circumstances
    dictate
  - Demonstrated leadership and project management skills
  - Consistently demonstrates clear and concise written and
    verbal communication
  
