description: |
  WHO WE ARE:
  
  Zinnia is the leading technology platform for accelerating
  life and annuities growth. With innovative enterprise
  solutions and data insights, Zinnia simplifies the
  experience of buying, selling, and administering insurance
  products. All of which enables more people to protect their
  financial futures. Our success is driven by a commitment to
  three core values: be bold, team up, deliver value – and
  that we do. Zinnia has over $180 billion in assets under
  administration, serves 100+ carrier clients, 2500
  distributors and partners, and over 2 million policyholders.
  
  WHO YOU ARE:
  
  Senior Software engineer plays a key role in the design,
  development/configuration, unit testing, installation, and
  ongoing maintenance of Zinnia software platforms. Works with
  stakeholders to develop solutions and/or products that
  fulfill the needs of Zinnia’s internal stakeholders and
  clients. Those solutions and/or products help Zinnia and
  Zinnia clients to be more efficient and provide better
  service to end customers. Technical Architect interacts
  directly with project managers and business stakeholders and
  may periodically interact directly with Zinnia’s clients.
  Will facilitate, Architect, and enable junior team members
  by acting as a mentor for soft skills and/or technical
  subject matter experts.
  
  WHAT YOU’LL DO:
  
  - Work as part of a global, cross-functional team to develop
    innovative software for Zinnia’s stakeholders.
  - Contribute to projects by creating well-designed,
    customized, testable, and efficient code for Life &
    Annuity Exchange
  - Assist our teams in providing ongoing support,
    troubleshooting, improvements, or custom enhancements to
    existing Life & Annuity Exchange
  - Flexibility to support the challenging development and
    delivery needs of Zinnia
  - Collaborate with our global teams, internal stakeholders,
    and customers.
  - Act as a mentor and technology expert for team members and
    conduct technical reviews.
  - Architect, Design, develop and validate various requirements
    for the Zinnia platforms
  - Ability to work in a fast-paced environment, recognize and
    react to changing business needs and effectively
    prioritize tasks
  - Must be self-motivated and able to work independently and in
    conjunction with team members and business units.
    Enthusiasm and flexibility to work on a variety of
    projects
  
  WHAT YOU’LL NEED:
  
  - 10+ years of expertise across the full Microsoft .NET
    ecosystem — owning technical direction from architecture
    design through production, setting standards, mentoring
    engineers, and driving SDLC maturity within Agile/Scrum
    organizations; deep expertise in C#, ASP.NET Core, and
    enterprise design patterns
  - Architecting, designing, developing, and delivering
    solutions using C#/.NET, ASP.NET Core, MVC, Web API,
    Visual Studio IDE, SSRS, SOAP, XML, GitHub; leads API
    design strategy at scale — defining standards for security
    (OAuth2, JWT), versioning, documentation
    (OpenAPI/Swagger), and performance across distributed
    microservices environments
  - Understanding of advanced design patterns, API-first design,
    and SOLID principles
  - Effective communication, interpersonal, and critical
    thinking skills.
  - Effective troubleshooting skills.
  - Ability to work as part of a cross-functional, global team.
  - Fluent client communication, Issue management, deployment,
    and delivery support;
  - Hands-on experience designing and deploying cloud solutions
    on AWS — working across compute, storage, and serverless
    services with a focus on scalability and cost efficiency;
    contributes to cloud best practices and supports team
    adoption
  - Team coordination, analytical skill, self-learning,
    Communication, Technical documentation, system analysis
  - Contributes to RESTful API design strategy at scale, helping
    define standards for security (OAuth2, JWT), versioning,
    documentation (OpenAPI/Swagger), and performance. Supports
    the design of integration layers between systems and
    promotes API governance across distributed teams and
    microservices environments
  - Exposure to AI integration, including LLM APIs, prompt
    engineering, RAG pipelines, and AI-powered feature
    development, with a willingness to apply emerging AI
    capabilities to real-world product use cases
  
  Good to have:
  
  - Working experience on enterprise-level applications/products
  - Working experience in React/Angular
  - Insurance/financial services (Life and Annuity) industry
    knowledge
  - Experience with Web-based software as a service (SaaS)
    application
  - Knowledge of Redis Cache for in-memory data structure
    storage and caching
  
  WHAT’S IN IT FOR YOU?
  
  At Zinnia, you collaborate with smart, creative
  professionals who are dedicated to delivering cutting-edge
  technologies, deeper data insights, and enhanced services to
  transform how insurance is done. Visit our website at
  www.zinnia.com for more information. Apply by completing the
  online application on the careers section of our website. We
  are an Equal Opportunity employer committed to a diverse
  workforce. We do not discriminate based on race, religion,
  color, national origin, gender, sexual orientation, age,
  marital status, veteran status, or disability
