description: |
  Get to Know Us: It's fun to work in a company where people
  truly believe in what they're doing! At BlackLine, we're
  committed to bringing passion and customer focus to the
  business of enterprise applications. Since being founded in
  2001, BlackLine has become a leading provider of cloud
  software that automates and controls the entire financial
  close process. Our vision is to modernize the finance and
  accounting function to enable greater operational
  effectiveness and agility, and we are committed to
  delivering innovative solutions and services to empower
  accounting and finance leaders around the world to achieve
  Modern Finance. Being a best-in-class SaaS Company, we
  understand that bringing in new ideas and innovative
  technology is mission critical. At BlackLine we are always
  working with new, cutting edge technology that encourages
  our teams to learn something new and expand their creativity
  and technical skillset that will accelerate their careers.
  Work, Play and Grow at BlackLine! Make Your Mark: As a
  Senior AI Developer on BlackLine's Corporate AI team, you
  will play a pivotal role in bringing AI to every corner of
  the company. You'll design and deliver enterprise-grade AI
  agents that transform data into actionable insights,
  streamline internal workflows, and help teams across the
  business make better, faster decisions. In this highly
  visible role, you'll partner directly with business leaders
  and be trusted to shape, build, and launch AI solutions end
  to end. You'll Get To:
  
  - Design, build, and ship AI agents and applications using
    tools such as Vertex AI, Anthropic, and cloud-based AI
    services, focusing on internal/enterprise use cases.
  - Translate business problems into AI solutions by working
    directly with stakeholders to clarify needs, define
    requirements, and propose impactful use cases.
  - Own the full development lifecycle-from requirements and
    design, to coding, testing, deployment, and iterative
    enhancement.
  - Launch short-term AI agents and features within a quarter,
    consistently meeting release dates and timelines.
  - Integrate AI agents with enterprise systems, APIs, and
    internal tools, creating seamless, end-to-end workflows
    that fit into how teams already work.
  - Monitor and support AI solutions in production,
    investigating issues, improving performance, and refining
    user experience based on feedback and metrics.
  - Contribute to team-wide standards and best practices for AI
    development, including coding patterns, observability, and
    governance.
  - Collaborate closely with a global AI team sharing context,
    reviewing code, and jointly owning deliverables.
  - Provide knowledge transfer and occasional mentoring, helping
    others understand how to effectively leverage AI tools and
    patterns.
  
  
   What You'll Bring:
  
  - 5+ years of Senior-level software development experience,
    including at least 2+ years focused on AI development in
    an enterprise environment.
  - Strong programming skills in one or more languages used for
    AI and cloud development (e.g., Python, Java, or similar).
  - Hands-on experience building applications or agents with
    generative AI platforms, such as:
  - Proven experience delivering production-grade AI solutions,
    not just prototypes-covering reliability, maintainability,
    and scalability.
  - Experience implementing RAG architectures using vector
    databases such as Vertex AI Vector Search, Pinecone, or
    Weaviate.
  - Advanced prompt engineering skills and a deep understanding
    of how to design, test, and optimize prompts for specific
    outcomes within agents.
  - Experience developing software that adheres to enterprise
    security and compliance standards
  - Demonstrated ability to clarify ambiguous requirements,
    think analytically, and design practical solutions to
    operational and functional problems.
  - Excellent communication skills, with a track record of
    partnering directly with business leads to gather
    requirements, present options, and align on outcomes.
  - A history of operating as a senior individual contributor,
    setting objectives and delivering results that materially
    impact a team, function, or division.
  - Comfort working in a small, distributed team, pulling your
    own weight while collaborating effectively across time
    zones.
  
  
   We're Even More Excited If You Have:
  
  - You've worked on a Corporate/Enterprise AI team, building
    internal tools or agents rather than only external product
    features.
  - You have experience leading or significantly contributing to
    high-visibility AI projects with executive-level
    stakeholders.
  - You're familiar with enterprise data, security, and
    governance considerations when building AI solutions
    (e.g., permissions, privacy, data minimization).
  - You've successfully collaborated with global teams in a
    fast-paced environment.
  
  
   Thrive at BlackLine Because You Are Joining:
  
  - A technology-based company with a sense of adventure and a
    vision for the future. Every door at BlackLine is open.
    Just bring your brains, your problem-solving skills, and
    be part of a winning team at the world's most trusted name
    in Finance Automation!
  - A culture that is kind, open, and accepting. It's a place
    where people can embrace what makes them unique, and the
    mix of cultural backgrounds and varying interests
    cultivates diverse thought and perspectives.
  - A culture where BlackLiner's continued growth and learning
    is empowered. BlackLine offers a wide variety of
    professional development seminars and inclusive affinity
    groups to celebrate and support our diversity.
  
