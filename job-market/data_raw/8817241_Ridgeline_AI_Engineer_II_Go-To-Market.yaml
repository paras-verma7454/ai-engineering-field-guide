description: |
  Are you excited to revolutionize how AI transforms the way
  go-to-market teams operate at scale? Do you enjoy designing
  intelligent workflows and automation that remove friction
  from Sales, Marketing, and Customer Experience processes?
  Are you motivated by building AI-powered tooling that
  directly accelerates revenue and unlocks team productivity?
  If so, we invite you to be a part of our innovative team.
  
  At Ridgeline, the AI Leverage Engineering team focuses on
  internal AI initiatives that amplify productivity and
  velocity across the company. As an AI Engineer II focused on
  go-to-market, you will design and build AI-powered
  automations, copilots, and workflows that improve how our
  revenue teams operate. You will partner closely with Sales,
  Marketing, Customer Experience, Product, and Operations to
  integrate systems, enhance data flows, and deliver scalable
  solutions that drive measurable business impact. Our team of
  engineers are building with cutting-edge technologies—like
  Claude Code and Cursor—in a fast-moving, creative,
  progressive work environment.
  
  At Ridgeline, how we work matters as much as what we build.
  Ridgeliners act like owners, choose growth over comfort, and
  communicate with transparency. We assume positive intent,
  bias toward action, and bring solutions—not just problems.
  We celebrate wins, learn from setbacks, and thrive in a
  resilient, collaborative, high-performing culture.If this
  excites you, we’d love to meet you!
  
  You must be work authorized in the United States without the
  need for employer sponsorship.
  
  The impact you will have:
  
  - Build AI-powered automations, copilots, and agents that
    enhance Sales, Marketing, and Customer Experience
    workflows
  - Design and implement scalable infrastructure for routing,
    enrichment, signaling, and lifecycle automation across GTM
    systems
  - Partner directly with cross-functional stakeholders to
    understand workflows, identify friction points, and
    deliver high-impact solutions
  - Develop and maintain data pipelines and strategies that
    improve data quality, accessibility, and reliability
    across GTM systems
  - Ensure reliability, scalability, and observability across
    all AI-driven workflows and integrations
  - Translate business needs into technical solutions and lead
    projects from concept through deployment
  - Collaborate with RevOps and business partners to define
    success metrics and ensure measurable impact
  - Evaluate and integrate emerging AI tools and technologies to
    continuously improve the GTM tech stack
  - Leverage modern AI development tools to accelerate build
    cycles and improve solution quality
  
  What we look for:
  
  - 2+ years of technical experience in data science, technical
    product management, engineering, consulting with
    scripting, or similar fields
  - Ability to analyze business workflows and translate them
    into scalable, practical technical solutions
  - Demonstrated experience delivering automation or tooling
    with measurable business impact
  - Experience working directly with end users to uncover needs
    and iterate on solutions
  - Proficiency in Python or similar programming languages
  - Familiarity with APIs, AI tools such as GPT or Claude, and
    modern data tooling or warehousing concepts
  - Strong problem-solving and analytical skills with the
    ability to navigate ambiguity
  - Clear and effective communication skills across technical
    and non-technical audiences
  - Curiosity and willingness to learn new technologies and
    deepen domain expertise
  
  Bonus:
  
  - Experience with CRM platforms or GTM systems
  - Background in Sales, Marketing, or Customer Experience
    workflows
  - Familiarity with LLMs, RAG architectures, or AI application
    development
  - Experience building internal developer tools or platforms
  - Exposure to enterprise productivity tools and large-scale
    operational environments
  
  About Ridgeline
  
  Ridgeline is the first front-to-back system of record for
  investment managers. Founded by visionary entrepreneur Dave
  Duffield (co-founder of both PeopleSoft and Workday), the
  company was created to modernize an industry held back by
  outdated, disconnected technology. Powered by a single,
  real-time data set and embedded AI, Ridgeline helps firms
  automate complexity, accelerate collaboration, and deliver
  tailored client experiences at scale, without added
  headcount or risk. Ridgeline is headquartered in Lake Tahoe,
  with offices in New York, Reno, and the Bay Area, and is
  recognized by Fast Company as a “Best Workplace for
  Innovators,” by Frost & Sullivan as a “Technology Innovation
  Leader,” and by The Software Report as a “Top 100 Software
  Company.”
  
  Ridgeline is proud to be a community-minded, discrimination-
  free equal opportunity workplace.
  
  Ridgeline processes the information you submit in connection
  with your application in accordance with the Ridgeline
  Applicant Privacy Statement. Please review the Ridgeline
  Applicant Privacy Statement in full to understand our
  privacy practices and contact us with any questions.
  
  Compensation and Benefits
  
  The typical starting salary range for new hires in this role
  is $128,000-$150,500. In select locations (including the San
  Francisco Bay Area, CA, and the New York City Metro Area),
  an alternate range may apply as specified below.
  
  The typical starting salary range for this role in the
  select locations listed above is: $140,500-$165,500. Final
  compensation amounts are determined by multiple factors,
  including candidate experience and expertise, and may vary
  from the amount listed above.
  
  As an employee at Ridgeline, you’ll have many opportunities
  for advancement in your career and can make a true impact on
  the product.
  
  In addition to the base salary, Ridgeline employees can
  participate in our Company Stock Plan subject to the
  applicable Stock Option Agreement. We also offer rich
  benefits that reflect the kind of organization we want to
  be: one in which our employees feel valued and are inspired
  to bring their best selves to work. These include unlimited
  vacation, educational and wellness reimbursements, and $0
  cost employee insurance plans. Please check out our Careers
  page for a more comprehensive overview of our perks and
  benefits.
  
