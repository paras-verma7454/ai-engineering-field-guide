description: |
  Join BLP Digital — The #1 Solution for ERP Automation
  
  BLP Digital is redefining ERP automation with agentic AI.
  Spun out of ETH Zurich and HSG, we build AI agents that
  automate finance, procurement, logistics, sales, and more
  for some of the world's largest enterprises. We solve real
  enterprise problems with cutting-edge technology and a
  strong sense of ownership.
  
  Our solution is live in 40+ countries, used by 20,000+ daily
  active users, and automates 70,000+ processes every day,
  including for Fortune 500 companies. As one of Switzerland's
  fastest growing SaaS scaleups, our success stems from deep
  expertise in technology and business processes, delivering a
  product with outstanding product to market fit, proven by a
  growing global customer base.
  
  We are just getting started. Ready to build the future? Join
  BLP Digital today.
  
  About the position
  
  We're giving you the keys to the machine. As our Applied AI
  Engineer, you'll have a founder-level mandate to build and
  ship AI-powered internal tools that make our hiring, finance
  and ops workflows 10x faster — not 10% faster. You'll work
  at the frontier of what's possible with LLMs, AI agents, and
  emerging AI tooling, and apply it where it matters most:
  inside our own company.
  
  Key Responsibilities
  
  - Build and ship AI-powered internal tools fast — we're
    talking days and weeks, not quarters
  - Evaluate, integrate, and chain the latest AI models, APIs,
    and frameworks (LLMs, agent frameworks, embedding
    pipelines, AI coding tools) into production-ready internal
    solutions
  - Create compounding leverage — every tool you build should
    free up hours across the entire company
  - Write clean, maintainable code that integrates with our
    existing systems — APIs, databases, third-party services —
    and doesn't break at scale
  - Own your deployments end-to-end: build it, test it, ship it,
    monitor it — and build it well enough that it runs
    reliably without babysitting
  
  Requirements
  
  - Technical background with real building experience — CS
    degree, bootcamp, self-taught, we don't care as long as
    you've shipped things that work
  - You've built with modern AI tooling (LLMs, AI coding
    assistants, workflow automation) and you're obsessed with
    what's coming next
  - Startup or entrepreneurial DNA — you've either founded
    something, built an internal tool that became critical
    infra, or hacked together solutions that people actually
    used
  - You move fast, communicate clearly, and love collaborating
    with non-technical teams to understand their pain points
    and turn them into elegant, automated solutionsFluency in
    English, German is a plus
  - Bonus: experience with tools like Make, n8n, Retool,
    Supabase, or similar — but honestly, we care more about
    your ability to learn any tool in a weekend
  
  Benefits
  
  - Solve real problems, fast. Join a high-growth deep-tech
    startup tackling real-world challenges for global industry
    leaders.
  - Build from zero to one. Take ownership of our internal
    tooling landscape — shaping its foundations and direction
    from the ground up.
  - Opportunities to grow. You're controlling your personal
    development and career trajectory in a rapidly growing,
    internationally expanding startup
  - Exceptional colleagues. You'll be growing alongside
    individuals from exceptional academic backgrounds and
    careers
