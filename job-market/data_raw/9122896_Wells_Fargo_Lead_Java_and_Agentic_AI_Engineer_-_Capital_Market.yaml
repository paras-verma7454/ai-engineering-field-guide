description: |
  About this role: Wells Fargo is seeking a Lead Specialty
  Software Engineer within Corporate & Investment Banking
  (CIB) Capital Markets, Fixed Income Spread Technology. This
  is a hands-on technical leadership role focused on building
  and evolving low-latency, high-throughput platforms that
  power pricing, risk, P&L, and electronic trading workflows
  across Credit, Municipal, and Structured Products desks.
  Team Overview: The Fixed Income Spread Technology team
  builds and owns low-latency pricing, risk, and P&L systems
  as well as the front-end eTrading platform for Spread
  products including Credit, Municipal, and Structured
  Products. The team works directly with Front Office traders,
  Middle Office, and Product partners to deliver a live
  trading and analytics platform supporting intraday trading
  and end-of-day processing. In this role, you will:
  
  - Lead design and delivery of Java/Spring Boot based
    microservices supporting real-time pricing, risk, P&L, and
    trade lifecycle workflows.
  - Build and operate low-latency, highly resilient services
    using REST and event-driven architectures.
  - Own code quality, testing strategy, CI/CD pipelines, and
    production readiness for supported platforms.
  - Drive DevOps practices across Kubernetes/OpenShift, Docker,
    Jenkins/uDeploy, Gradle, and Autosys.
  - Troubleshoot and resolve complex production and performance
    issues in a real-time trading environment.
  - Partner closely with Front Office traders, Middle Office,
    Product, and Platform teams.
  - Mentor and provide technical guidance to less experienced
    engineers.
  
  Required Qualifications:
  
  - 5+ years of software engineering experience, or equivalent
    demonstrated through work experience, training, education,
    or military service
  - 5+ years of strong hands-on experience with Java and Spring
    Boot
  - 5+ year of strong DevOps experience with CI/CD, Kubernetes,
    Docker, OpenShift, Gradle, Jenkins and/or uDeploy
  - 5+ year of strong experience with Autosys or similar
    enterprise schedulers
  - 5+ year of strong testing experience including JUnit and
    automated testing practices
  - 5+ year of strong experience working in Agile SDLC
    environments
  
  Desired Qualifications:
  
  - Experience with event-driven messaging platforms such as
    Apache Kafka
  - Experience with distributed caching technologies such as
    Redis and/or Apache Ignite
  - Experience with NoSQL databases such as MongoDB
  - Capital Markets Fixed Income domain experience, including
    pricing, risk, P&L, and trade lifecycle
  - Exposure to low latency eTrading systems and connectivity
  - Optional UI experience with TypeScript/Angular, OpenFin, and
    Figma
  
  Job Expectations:
  
  - Telecommuting permitted up to 3 days per week: onsite
    presence required per Wells Fargo hybrid guidelines
  - No visa Sponsorship for this role
  
  Posting Location:  150 E 42nd St. New York, NY 10017 300 S
  Brevard St., Charlotte, NC 28202 Pay Range Reflected is the
  base pay range offered for this position. Pay may vary
  depending on factors including but not limited to
  demonstrated examples of prior performance, skills,
  experience, or work location. Employees may also be eligible
  for incentive opportunities. $159,000.00 - $305,000.00
  Benefits Wells Fargo provides eligible employees with a
  comprehensive set of benefits, many of which are listed
  below. Visit Benefits - Wells Fargo Jobs for an overview of
  the following benefit plans and programs offered to
  employees.
  
  - Health benefits
  - 401(k) Plan
  - Paid time off
  - Disability benefits
  - Life insurance, critical illness insurance, and accident
    insurance
  - Parental leave
  - Critical caregiving leave
  - Discounts and savings
  - Commuter benefits
  - Tuition reimbursement
  - Scholarships for dependent children
  - Adoption reimbursement
  
  Posting End Date: 3 May 2026 * Job posting may come down
  early due to volume of applicants. We Value Equal
  Opportunity Wells Fargo is an equal opportunity employer.
  All qualified applicants will receive consideration for
  employment without regard to race, color, religion, sex,
  sexual orientation, gender identity, national origin,
  disability, status as a protected veteran, or any other
  legally protected characteristic. Employees support our
  focus on building strong customer relationships balanced
  with a strong risk mitigating and compliance-driven culture
  which firmly establishes those disciplines as critical to
  the success of our customers and company. They are
  accountable for execution of all applicable risk programs
  (Credit, Market, Financial Crimes, Operational, Regulatory
  Compliance), which includes effectively following and
  adhering to applicable Wells Fargo policies and procedures,
  appropriately fulfilling risk and compliance obligations,
  timely and effective escalation and remediation of issues,
  and making sound risk decisions. There is emphasis on
  proactive monitoring, governance, risk identification and
  escalation, as well as making sound risk decisions
  commensurate with the business unit's risk appetite and all
  risk and compliance program requirements. Applicants with
  Disabilities To request a medical accommodation during the
  application or interview process, visit Disability Inclusion
  at Wells Fargo . Drug and Alcohol Policy Wells Fargo
  maintains a drug free workplace. Please see our Drug and
  Alcohol Policy to learn more. Wells Fargo Recruitment and
  Hiring Requirements: a. Third-Party recordings are
  prohibited unless authorized by Wells Fargo. b. Wells Fargo
  requires you to directly represent your own experiences
  during the recruiting and hiring process.
