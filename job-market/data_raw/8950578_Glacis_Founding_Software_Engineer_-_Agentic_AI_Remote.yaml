description: |
  About Glacis
  
  We’re on a mission to revolutionize the supply chains of
  global giants like Tesla and Coca-Cola - through AI agents
  that think, plan, and act. Backed by legendary Silicon
  Valley VCs behind Flexport, Databricks, and Perplexity,
  we’re empowering supply chain teams across the world to
  automate complex logistics workflows, integrate processes
  seamlessly with existing systems, and supercharge
  efficiency. We’re a team of seasoned entrepreneurs, Y
  Combinator alumni, and ex-Googlers - if you’re ready to
  change the way a trillion-dollar industry operates, join us
  on Day 1.
  
  The Role
  
  This isn’t just another 9 - 5 job - it’s an entrepreneurial
  launchpad designed for an ambitious generalist to drive
  outsized impact, fast-track their career, and help build the
  foundation of an ultra-scaling tech startup. If you’ve ever
  dreamed of founding your own company or being on the ground
  floor, now’s your chance to join a visionary founding team
  at a pivotal stage.
  
  As our Founding Software Engineer - Agentic AI, you’ll
  define our end-to-end technical strategy, deliver high-
  impact features for AI systems and across frontend and
  backend, and collaborate hand-in-hand with enterprise
  customers. Your innovations will reshape global supply-chain
  operations and launch your career beyond the traditional
  corporate track.
  
  Responsibilities:
  
  - Engineering Leadership: Take ownership of technical
    decisions, system architecture, and strategic development
    initiatives.
  - Full-stack Development: Build scalable frontend and backend
    solutions using modern technologies.
  - AI & System Integration: Design and deploy AI-driven
    automation features, ensuring seamless integration with
    customer ERP/TMS systems.
  - Customer & Stakeholder Engagement: Work hands-on with
    enterprise customers to gather requirements, deliver
    custom solutions, and ensure smooth deployments.
  - Strategic Impact: Directly contribute to shaping the
    company’s engineering roadmap, technology choices, and
    long-term vision.
  
  Are You the Right Fit?
  
  - Experience: 3+ years in software engineering (full-stack
    preferred with a startup background).
  - Entrepreneurial Mindset: Excited by ownership, ambiguity,
    and rapid growth. You want to build, innovate, and leave a
    tangible mark.
  - Customer-centric: Passionate about directly engaging with
    customers, understanding their challenges, and delivering
    solutions that genuinely help their operations.
  - Technical Expertise: Skilled in Python/Django, JavaScript
    frameworks, PostgreSQL. Bonus: Experience with cloud
    platforms (AWS, Azure, GCP) and workflow orchestration
    (Temporal).
  - Global Mindset: International experience and English fluency
    are required; willing to engage across time zones to align
    with stakeholders.
  
  Why Join Glacis?
  
  - High Ownership & Real Impact: Shape critical solutions used
    by global enterprises, directly influence logistics
    performance at scale.
  - Entrepreneurial Growth: Ideal stepping stone if you've
    considered founding your own company - learn firsthand
    from seasoned entrepreneurs and ex-Googlers.
  - Learn Fast in Enterprise B2B: Deep exposure to supply chain,
    logistics, and AI; you’ll learn how to communicate complex
    operational problems and solutions.
  - Foundational Team: Join at an early stage, contribute
    directly to company-building, and share the journey of
    rapid scaling.
  - Mission-Driven Culture: Fast-paced, ambitious environment
    with collaborative colleagues committed to delivering
    meaningful, impactful technology.
  
  Ready to Apply?
  
  Submit your application by clicking "Apply for this Job"
  below.
