description: |
  Join Voyfai, a fast-growing Series A startup shaping the
  future of logistics and technology across Europe.
  
  Headquartered in Berlin, we operate at the center of a
  broader group of companies active across several European
  markets.
  
  This is a unique opportunity to take ownership from day one,
  drive meaningful impact and grow within a dynamic, fast-
  paced environment. Whether you're shaping processes,
  building strategies or leading initiatives, your
  contributions will directly influence the success of Voyfai
  and the companies we support. If you're passionate about
  building from scratch and excited to be part of a company on
  the rise, we'd love to hear from you.
  
  Your Role
  
  As a Senior AI Engineer at Voyfai, you will play a key role
  in designing, building and scaling LLM-powered and applied
  GenAI systems that power our core products. You will work
  closely with Product, Engineering and Business stakeholders
  to turn complex, unstructured problems into robust,
  production-ready AI solutions.
  
  This role is hands-on and impact-driven. You will be
  expected to take end-to-end ownership, from use case
  discovery and prompt or model design to deployment,
  monitoring and continuous improvement in production, with a
  strong focus on real-world reliability and business impact.
  
  Key Responsibilities:
  
  - Design, develop and deploy LLM-powered and GenAI features
    for real-world, high-impact use cases
  - Build and own end-to-end GenAI pipelines, including prompt
    design, model selection or fine-tuning, evaluation and
    deployment
  - Integrate foundation models into production systems with a
    strong focus on latency, cost, reliability and quality
  - Collaborate closely with Product Managers and Engineers to
    translate ambiguous business problems into scalable AI
    solutions
  - Own production AI systems, including monitoring, evaluation,
    guardrails and feedback loops
  - Contribute to architectural decisions around AI platforms,
    retrieval systems, vector databases and LLMOps tooling
  - Raise the technical bar through code quality, documentation
    and mentoring
  
  What You Bring:
  
  - Several years of experience as an AI Engineer, Machine
    Learning Engineer or similar role, with hands-on focus on
    LLMs and applied GenAI in production
  - Strong understanding of LLM behavior, prompting techniques,
    evaluation strategies and common failure modes
  - Solid Python skills and experience with GenAI frameworks or
    tooling such as PyTorch, LangChain, LlamaIndex or similar
  - Experience building production-grade GenAI systems such as
    RAG pipelines, agents or tool-using models
  - Experience deploying and operating AI systems in cloud
    environments, including cost and performance optimization
  - Familiarity with LLMOps or MLOps practices such as
    observability, testing and lifecycle management
  - Pragmatic, impact-driven mindset with the ability to
    communicate complex AI concepts clearly
  
  What We Offer
  
  - Competitive salary and equity options
  - A dynamic, fast-paced work environment with a mission-driven
    team
  - Flexible working arrangements (Hybrid)
  - 30 days of PTO
  - Regular team events and offsites
  - Monthly mobility budget via Navit
