description: |
  At PwC, our people in data and analytics engineering focus
  on leveraging advanced technologies and techniques to design
  and develop robust data solutions for clients. They play a
  crucial role in transforming raw data into actionable
  insights, enabling informed decision-making and driving
  business growth. Those in data science and machine learning
  engineering at PwC will focus on leveraging advanced
  analytics and machine learning techniques to extract
  insights from large datasets and drive data-driven decision
  making. You will work on developing predictive models,
  conducting statistical analysis, and creating data
  visualisations to solve complex business problems. Focused
  on relationships, you are building meaningful client
  connections, and learning how to manage and inspire others.
  Navigating increasingly complex situations, you are growing
  your personal brand, deepening technical expertise and
  awareness of your strengths. You are expected to anticipate
  the needs of your teams and clients, and to deliver quality.
  Embracing increased ambiguity, you are comfortable when the
  path forward isn't clear, you ask questions, and you use
  these moments as opportunities to grow. Examples of the
  skills, knowledge, and experiences you need to lead and
  deliver value at this level include but are not limited to:
  
  - Respond effectively to the diverse perspectives, needs, and
    feelings of others.
  - Use a broad range of tools, methodologies and techniques to
    generate new ideas and solve problems.
  - Use critical thinking to break down complex concepts.
  - Understand the broader objectives of your project or role
    and how your work fits into the overall strategy.
  - Develop a deeper understanding of the business context and
    how it is changing.
  - Use reflection to develop self awareness, enhance strengths
    and address development areas.
  - Interpret data to inform insights and recommendations.
  - Uphold and reinforce professional and technical standards
    (e.g. refer to specific PwC tax and audit guidance), the
    Firm's code of conduct, and independence requirements.
  
  The Opportunity As part of the Data and Analytics
  Engineering team you will develop and implement AI solutions
  that enhance product offerings. As a Senior Associate, you
  will analyze complex problems, mentor junior team members,
  and maintain elevated professional standards while building
  meaningful client relationships. Responsibilities
  - Build and nurture meaningful relationships with clients
  - Utilize advanced analytical techniques to drive innovation
  - Work with cross-functional teams to achieve project goals
  - Uphold the firm's ethical standards and recommended
    practices
  What You Must Have
  - Bachelor's Degree in Computer Science, Data
    Processing/Analytics/Science, Artificial Intelligence and
    Robotics
  - 3 years of professional experience developing AI/ML systems
    or integrating AI into products
  What Sets You Apart
  - Master's Degree preferred
  - Possessing advanced proficiency in prompt engineering
  - Demonstrating experience deploying LLMs into production
  - Designing and optimizing RAG pipelines
  - Leading technical discovery in fast-paced environments
  - Collaborating effectively with cross-functional leaders
  - Advocating for responsible AI principles
  - Contributing to AI research or open-source communities
  - Demonstrating knowledge of orchestration tools such as
    LangChain, LlamaIndex, and experience with agent-based
    systems
  The salary range for this position is: $55,000 - $151,470.
  For residents of Washington state the salary range for this
  position is: $55,000 - $187,000. Actual compensation within
  the range will be dependent upon the individual's skills,
  experience, qualifications and location, and applicable
  employment laws. All hired individuals are eligible for an
  annual discretionary bonus. PwC offers a wide range of
  benefits, including medical, dental, vision, 401k, holiday
  pay, vacation, personal and family sick leave, and more. To
  view our benefits at a glance, please visit the following
  link: https://pwc.to/benefits-at-a-glance As PwC is an equal
  opportunity employer, all qualified applicants will receive
  consideration for employment at PwC without regard to race;
  color; religion; national origin; sex (including pregnancy,
  sexual orientation, and gender identity); age; disability;
  genetic information (including family medical history);
  veteran, marital, or citizenship status; or, any other
  status protected by law. PwC does not intend to hire
  experienced or entry level job seekers who will need, now or
  in the future, PwC sponsorship through the H-1B lottery,
  except as set forth within the following policy:
  https://pwc.to/H-1B-Lottery-Policy. Learn more about how we
