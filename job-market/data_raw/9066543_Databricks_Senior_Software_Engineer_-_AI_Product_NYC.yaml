description: |
  P-1606
  
  At Databricks, we are passionate about enabling data teams
  to solve the world's toughest problems — from making the
  next mode of transportation a reality to accelerating the
  development of medical breakthroughs. We do this by building
  and running the world's best data and AI infrastructure
  platform so our customers can use deep data insights to
  improve their business. Founded by engineers — and customer
  obsessed — we leap at every opportunity to solve technical
  challenges, from designing next-gen UI/UX for interfacing
  with data to scaling our services and infrastructure across
  millions of virtual machines. And we're only getting
  started.
  
  As one of the first engineers in the NYC Engineering office,
  you’ll have the opportunity to be part of a small, nimble
  team that’s innovating to build new products from the ground
  up. Our goal is to leverage the power of Databricks in data
  & AI to deliver vertical AI applications for both technical
  and business users. This will be a true 0-to-1 environment,
  combining the excitement of a startup with the resources of
  a tech leader like Databricks.
  
  The impact you'll have:
  
  - Create novel, never-seen-before interfaces for GenAI agents
    that manage complex workflows while keeping the human in
    the loop through inspectability and transparency
  - Partner closely with product management, design, and other
    engineering teams to build intuitive, scalable, and
    extensible solutions that drive user & business growth
  - Lead by example with hands-on full-stack software
    development to create dynamic, user-centric experiences
  - Enable mechanisms that can drive product-led growth, through
    seamless onboarding and sharing capabilities
  - Direct the future of intuitive agentic applications at
    Databricks, in collaboration with cross-functional teams
    of innovative software engineers, product managers, and
    designers
  - Establish best practices within the team & Databricks more
    widely for building valuable, AI products
  
  What we look for:
  
  - 5+ years of experience with HTML, CSS, and JavaScript
  - Demonstrated product mindset with the ability to translate
    ambiguous customer problems into scrappy MVPs and iterate
    quickly based on data and user feedback.
  - You care that AI features feel intuitive, trustworthy, and
    helpful, not just bolted on to an existing app
  - High ownership and bias for action in 0→1 environments: you
    are comfortable making pragmatic trade-offs, operating
    with incomplete information, and driving projects from
    idea through launch and adoption.
  - Strong ability to collaborate across product, engineering,
    and design teams to align technical strategy with company
    growth objectives.
  - Experience with modern JavaScript frameworks (e.g., React,
    Angular, or VueJs/Ember)
  - 5+ years of experience with server-side web technologies
    (eg: Node.js, Java, Python, Scala, C#, C++,Go)
  - Proven experience building and shipping end-to-end
    generative AI products, ideally with a significant UI/UX
    component
  - Experience in developing deep product and business knowledge
    to connect abstract modeling and analysis tasks with
    business value
  
