description: |
  🌎 The Opportunity
  
  In the next 30 years, the world will transform every part of
  the built environment to be climate positive green
  infrastructure. But today’s renewable energy development
  process can’t move fast enough to meet global goals. Paces
  exists to change that. We are providing software and
  services to accelerate power development - unlocking one of
  the greatest opportunities of our time: transforming how
  infrastructure gets built and ensuring it’s built with
  renewable energy.
  
  🛠️ Our Solution
  
  Paces is building the development engine for renewable
  infrastructure and power projects. We have built Agentic AI
  that automates early-stage due diligence and pairs it with
  in-house expertise to accelerate late-stage diligence. The
  result: projects move from siting to construction-ready in a
  fraction of the time. Our platform streamlines siting,
  interconnection, and permitting for renewable energy and
  data center developers, real estate firms, EV charging
  companies, and more.
  
  🧑‍🎨 Our Team
  
  We are building a team where people can proudly say their
  time at Paces is the most impactful, meaningful work of
  their career. Our amazing team in Brooklyn, New York
  includes incredible team members from tech companies like
  Meta AI, DeepMind, and Tesla; various high growth startups;
  as well as industry leaders from TotalEnergies, Con Edison
  and GE.
  
  We are looking for exceptional talents to join our growing
  Software Engineering team. You will be working closely with
  power and permitting industry experts to automate power
  development!
  
  🏆 What You’ll Achieve
  
  - Gain domain knowledge, build AI agents to truly automate
    human-driven work
  - Build automation to unlock new modeling capabilities that
    fundamentally changes the market
  - Have full ownership of projects, iterate closely with
    industry experts on end-to-end features
  - Scale up our platform and system to support ever growing
    traffic
  - Work in tight collaboration with the product team on product
    roadmap
  
  📈 Requirements
  
  - 3+ years of experience building data intensive software
  - Experience deploying AI agents in production environment,
    familiar with Agent SDK, Messages API, LangGraph
  - Proficient in Python, SQL, and comfortable working across
    the stack - backend, ETL, database, and infrastructure
  - Strong problem solving skills and the ability to work
    independently and in a team
  - You’re comfortable with ambiguity, unblock yourself, and
    make progress without waiting on perfect specs
  
  ✨ About You
  
  You will thrive in our culture if you:
  
  - Have a strong bias towards action and prioritize execution
  - Share our passion to build something that fights climate
    change
  - Easily handle the unstructured environment of fast moving
    startups
  - Have the hunger to grow together with Paces as we scale up
  
  🚀 Bonus Points
  
  - Previous experience at a high-growth, fast-paced startup
  - Previous experience working with geospatial data and
    platforms
  - Previous experience working with energy grid modeling or
    utility companies
  
  💰 Compensation and Benefits
  
  - $150K - $190K annual compensation
  - Competitive equity compensation
  - 401(k) matching
  - Health, Dental and Vision insurance
  - Paid company holidays & PTO
  - Hybrid work in the office in Williamsburg, Brooklyn ~3x per
    week
  
  ☀️ About Paces
  
  - 🛠️ If you’re a builder who wants to actively construct a
    more climate positive future, join us!
  - 🗺️ We are enabling the climate optimum use for all the
    world’s land and are thought leaders in the evolving data
    center and renewables markets.
  - 🐶 We have a dog calendar and have dogs running around in the
    office.
  - 🌞 We have world class customers and are growing!
  - 📢 We've raised $18M+ led by Navitas Capital, Resolute
    Ventures and Y Combinator.
