description: |
  About Bolna
  
  Bolna is Voice AI infrastructure built for India. We help
  businesses deploy intelligent voice agents that can call,
  converse, and convert in any language, at scale. From
  collections to customer support to sales, our agents handle
  millions of conversations so humans don't have to.
  
  We're a YC F25 company, backed by General Catalyst, with
  1,050+ paying customers and growing fast. Our team of ~25 is
  based in Bengaluru.
  
  The Role
  
  You're the person who makes our voice agents actually sound
  good and actually work for real customers. As an AI
  Solutions Engineer, you'll sit at the intersection of our
  product and our customers. Your primary job is to design,
  write, and iterate on the prompts and tools that power
  Bolna's voice agents, making them smarter, more natural, and
  more effective for each use case.
  
  You'll work closely with customers to understand their
  goals, build agent flows, test conversations, and fix what
  breaks. No heavy coding required-if you can vibe-code a
  basic script or write a solid system prompt, you're
  qualified.
  
  What You'll Do
  
  - Write, test, and iterate on system prompts for voice agents
    across industries like D2C, fintech, healthcare, and
    logistics
  - Listen to real call recordings, identify where agents fail,
    and fix them
  - Build conversation flows and call pathways for new customer
    deployments
  - Help onboard new customers-understand their use case, set up
    their agent, and get it live
  - Maintain a growing library of prompts, templates, and best
    practices across Bolna's verticals
  - Red-team agents-try to break them, find edge cases, and make
    them bulletproof
  - Work with vernacular inputs: test agents in Hindi, Hinglish,
    and regional languages
  - Feed insights back to product and engineering-you'll see
    what customers need before anyone else does
  
  What We're Looking For
  
  Must-have:
  
  - You've spent serious time prompting ChatGPT, Claude, or
    similar LLMs-not just casually, but to actually build or
    solve something
  - You're obsessive about language-you notice when a sentence
    sounds off, robotic, or unclear
  - You can think from the customer's perspective and the end-
    user's perspective at the same time
  - You're comfortable with ambiguity and can make decisions
    without a full playbook
  - Strong written and verbal communication in English. Hindi or
    any other Indian language is a big plus
  
  Good to have:
  
  - You've tinkered with voice AI tools-Bolna, Vapi, ElevenLabs,
    or similar
  - You've vibe-coded something: a small automation, a chatbot,
    a no-code workflow-anything
  - Experience in a customer-facing role, even informally
    (sales, support, intern, freelance)
  - Familiarity with how LLMs work under the hood-context
    windows, temperature, hallucination, etc.
  
  Why Bolna
  
  - The hottest team in the hottest market in India right now
  - Freshers who joined 3 months back are single-handedly
    working with CXOs and Senior PMs of massive enterprises
  - Direct access to founders and product-your work will visibly
    ship
  - You'll develop a rare, high-value skill set at the
    intersection of AI, product, and customer success
  - Competitive compensation for early-career profiles
  - Bengaluru office, in-person team collaboration
