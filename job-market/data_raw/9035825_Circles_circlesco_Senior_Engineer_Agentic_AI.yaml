description: |
  Founded in 2014, Circles is a global technology company
  reimagining the telco industry with its innovative SaaS
  platform, empowering telco operators worldwide to
  effortlessly launch innovative digital brands or refresh
  existing ones, accelerating their transformation into
  techcos.
  
  Today, Circles partners with leading telco operators across
  multiple countries and continents, including KDDI
  Corporation, Etisalat Group (e&), AT&T, and Telkomsel,
  creating blueprints for future telco and digital experiences
  enjoyed by millions of consumers globally.
  
  Besides its SaaS business, Circles operates three other
  distinct businesses:
  
  - Circles.Life: A wholly-owned digital lifestyle telco brand
    based in Singapore, Circles.Life is powered by Circles’
    SaaS platform and pioneering go-to-market strategies. It
    is the digital market leader in Singapore and has won
    numerous awards for marketing, customer service, and
    innovative product offerings beyond connectivity.
  
  - Circles Aspire: A global provider of Communications
    Platform-as-a-Service (CPaaS) solutions. Its cloud-based
    Experience Cloud platform enables enterprises, service
    providers and developers to deliver and scale mobile,
    messaging, IoT, and connectivity services worldwide.
  
  - Jetpac: Specializing in travel tech solutions, Jetpac
    provides seamless eSIM roaming for over 200 destinations
    and innovative travel lifestyle products, redefining
    connectivity for digital travelers. Jetpac was awarded
    Travel eSIM of the Year.
  
  Circles is backed by renowned global investors, including
  Peak XV Partners (formerly Sequoia), Warburg Pincus,
  Founders Fund, and EDBI (the investment arm of the Singapore
  Economic Development Board), with a track record of backing
  industry challengers.
  
  Standardized Job Title: Senior Engineer, Agentic AI
  
  Role: Senior Agentic AI Lead
  
  Location: Bangalore
  
  Job Description
  
  In the role of a Senior Agentic AI Lead  you will be a key
  member of the Data and AI group of Circles. As a key member
  of our team, your responsibilities include:
  
  - Own the agentic AI domain from both Business and Technical
    perspective
  - Extensive experience is customer facing role getting
    requirements, feedbacks and providing solutions as a  key
    forward engineer.
  - Extensive experience in the Agentic AI frameworks
  - Own the entire agentic AI lifecycle from Concept to Launch
    to Value
  - Experience in Data governance, Data security and usage
    handling customer sensitive data.
  - Knowledge of responsible AI framework
  
  
  
  
  
  As a key member of our team, your responsibilities include:
  
  - Work with end customers providing Data solutions in multi-
    disciplinary areas including Data warehousing, Reporting
    and Digital analytics.
  - Have a passion for driving actionable insights for the
    central BI team and the country teams to identify
    opportunities for cross-sell and up-sell.
  - Maintain strong accountability for project scope, cost,
    resource planning, monitoring and reporting.
  - Working on the business reporting and data analysis for our
    internal operations world-wide and reporting/data-exchange
    interfaces with external partners
  - Working closely with any one of  business units (Finance ,
    revenue Reconciliation, Product Engineering, Product
    Management, Operations etc.) across geographies to
    understand their analytics needs
  - Working very closely with our data team and engineering team
    to understand the business logic to generate accurate
    reports and correct analysis
  - Delivering top quality reports and analysis as per
    commitment
  
  
  
  Requirements
  
  - At least 18 to 24 months experience in enterprise grade
    Agentic AI applications. A seasoned Data Scientist with a
    total of 6 to 10 years in multiple areas of Data Science,
    Data warehousing, AI product development.
  - Have experience in enterprise grade Gen AI applications
  - Experience with VectorDB and RAG patterns
  - Experience in production grade ML ops
  - Experience in Data architecture scalable to high volume and
    velocity
  - Experience in real time event processing
  - Experience in debugging production issues using metrics and
    logs.
  - Hands on experience in Python, Go, Langgraph, FastAPI, LLM
    APIs, MCP, RAG, VectorDBs, Phoenix
  - Highly adaptable problem solver with a positive can-do
    attitude!
  
