description: |
  Imagine yourself…
  
  - Doing meaningful work that makes an everyday impact on the
    world around you.
  - Growing your expertise and expanding your skillset with
    every project.
  - Contributing to a brighter, more sustainable future.
  
  
  
  It’s all possible with a role at Esko. Esko, a Veralto
  company, is a global provider of integrated software and
  hardware solutions that accelerate the go-to-market process
  of packaged goods. Our integrated platform and comprehensive
  tools empower retailers, pre-media and trade shops,
  manufacturers, and converters to manage best-in-class
  packaging design and print processes.
  
  
  
  Innovation is built into the DNA of our business: every day,
  we challenge ourselves to be better by seeking out new ways
  to elevate our products, our processes, and our people.
  
  
  
  We also know that innovation and ingenuity start with
  prioritizing a diverse workforce and a deeply inclusive
  workplace. We encourage people from all backgrounds to apply
  to our positions.
  
  
  
  Reporting to the Director – Cloud & AI, the AI / ML Platform
  Engineer is responsible for designing, building, and
  evolving next-generation machine learning and generative AI
  infrastructure that enables scalable, reliable, and
  automated AI development. This role is located in Bangalore,
  India (Quarterly once visit to office for 2 weeks).
  
  
  
  In this role, a typical day will look like:
  
  - Develop, improve, and maintain the MLOps platform to support
    scalable, reproducible, and observable machine learning
    and generative AI workflows.
  - Design and operate core ML infrastructure including feature
    stores, model registries, CI/CD pipelines, and data
    pipelines using AWS services such as SageMaker, ECS/EKS,
    Lambda, and Step Functions.
  - Enable and support AI and ML development teams, providing
    best practices, tooling, and technical guidance on
    leveraging the platform for training, fine-tuning, and
    deployment.
  - Drive architecture and technology decisions across the ML
    stack, including frameworks, orchestration, data
    processing, and observability tools.
  - Collaborate with AI engineering teams to integrate LLMs and
    generative AI capabilities into products using secure,
    standardized, and auditable infrastructure.
  - Continuously evaluate and adopt emerging tools and
    technologies such as LangChain, Ray, MLflow, Kubeflow, and
    Hugging Face to improve platform capability and developer
    productivity.
  
  The essential requirements of the job include:
  
  - Bachelor’s or Master’s degree in Computer Science, Software
    Engineering, or a related field.
  - 5+ years of experience in ML/AI platform engineering,
    infrastructure engineering, or MLOps, preferably in
    enterprise or SaaS environments.
  - Strong hands-on experience with AWS cloud services,
    including SageMaker, ECS/EKS, S3, Lambda, Step Functions,
    and Terraform/CloudFormation.
  - Proficiency in Python, Docker, and Kubernetes for building
    and operating scalable ML infrastructure.
  - Experience with MLOps tools/frameworks such as MLflow,
    Kubeflow, Vertex AI, Azure ML, or equivalent, along with
    familiarity in LLM infrastructure, vector databases, and
    RAG-based systems.
  
  
  
  Esko is proud to be part of the Product Quality & Innovation
  segment of Veralto (NYSE: VLTO), a $5B global leader
  dedicated to ensuring access to clean water, safe food and
  medicine, and trusted essential goods. When you join
  Veralto’s vibrant global network of 17,000 associates, you
  join a unique culture and work environment where purpose
  meets possibility: where the work you do has an everyday
  impact on the resources and essentials we all rely on, and
  where you’ll have valuable opportunities to deepen your
  skillset, pursue your ambitions, and grow your career.
  Together, we’re Safeguarding the World’s Most Vital
  Resources™—and building rewarding careers along the way.
  
  
  
