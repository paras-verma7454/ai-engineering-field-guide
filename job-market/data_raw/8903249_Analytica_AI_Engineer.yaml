description: |
  Analytica is seeking an AI Engineer to support an
  enterprise-wide modernization of AI capabilities for a high-
  profile financial regulatory client. This role centers on
  sustaining and enhancing AI systems deployed within
  Microsoft Azure-based data management and analytics
  platforms. Analytica has been recognized by Inc. Magazine as
  one of the fastest-growing 250 businesses in the US for 3
  years. We work with U.S. government clients in health,
  civilian, and national security missions to build better
  technology products that impact our day-to-day lives. The
  company offers competitive compensation with opportunities
  for bonuses, employer-paid health care, training and
  development funds, and 401k match. Key Responsibilities:
  
  - Provide operational support for enterprise AI capabilities,
    including onboarding users, managing access controls,
    triaging issues, and monitoring performance.
  - Maintain AI solution configurations in Azure, including role
    based access, usage tracking, and troubleshooting.
  - Support AI Innovation team's solutions, including AI systems
    deployed across multi cloud environments (Azure, Appian,
    Salesforce, ServiceNow, etc.).
  - Participate in CI/CD workflows using GitHub Enterprise;
    manage PBIs, bugs, and change requests.
  - Support continuous validation, security compliance, and
    Authority to Operate (ATO) requirements for AI systems.
  - Assist in implementing responsible AI monitoring, model
    evaluation, and improving AI user experience per agency
    governance guidance.
  
  Required Qualifications
  
  - Master's degree in Statistics, Mathematics, Computer
    Science, or related field.
  - 3+ years of experience in data and AI engineering roles,
    including operational support.
  - Experience with CI/CD and Agile work management tools such
    as GitHub Enterprise.
  - Experience with Infrastructure as Code, especially Terraform
  - Familiarity with Azure AI services, Azure Machine Learning,
    or cloud native AI operations.
  - Must be a US citizen
  - Must be able to obtain and maintain a Public trust security
    clearance.
  
  About ANALYTICA: Analytica is a leading consulting and
  information technology solutions provider to public sector
  organizations supporting health, civilian, and national
  security missions. Founded in 2009 and headquartered in
  Bethesda, MD, the company is an established SBA small
  business that has been recognized by Inc. Magazine each of
  the past three years as one of the 250 fastest-
  growing companies in the U.S.  Analytica specializes in
  providing software and systems engineering, information
  management, analytics & visualization, agile project
  management, and management consulting services. The
  company is appraised by the Software Engineering Institute
  (SEI) at CMMI® Maturity Level 3 and is an ISO 9001:2008
  certified provider.
