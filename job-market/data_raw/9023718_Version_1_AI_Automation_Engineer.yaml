  Job Description
  
  
  
  - Build and maintain internal automation solutions that
    generate measurable time savings
  - Develop and enhance the internal prompt library platform
  - Create tool integrations across Microsoft 365, Jira, Azure
    DevOps, and other internal systems
  - Support AI‑driven workflow automation initiatives across the
    organization
  - Document automation patterns, runbooks, and reusable
    frameworks for cross‑team adoption
  
  Qualifications
  
  - 3-5 years of experience is required
  - Proven experience in building automation solutions within an
    enterprise environment
  - Hands-on experience with Microsoft 365, Power Automate, or
    similar automation platforms
  - Familiarity with Jira, Azure DevOps, and modern developer
    toolchains
  - Understanding of prompt engineering principles and large
    language model (LLM) capabilities
  - Strong documentation skills with a structured, methodical
    engineering approach
  - Experience working with API integrations and workflow
    automation frameworks
  - Ability to work independently while managing multiple
    concurrent workstreams
  
