  Job title: AI Engineer (Entry Level) Location: London (5
  days in the office) Salary: £35,000- £45,000 Team: CEO
  Office
  
  This role is based in London and requires existing right to
  work in the UK. At this time, we are not able to offer visa
  sponsorship for this role. We are committed to building a
  diverse, global team and our sponsorship policy is evaluated
  on a role-by-role basis. We encourage you to keep an eye on
  our careers site to stay informed about future opportunities
  where we are able to offer visa sponsorship.
  
  Kaluza is the Energy Intelligence Platform, turning energy
  complexity into seamless coordination. We help energy
  companies overcome today’s challenges while accelerating the
  shift to a clean, electrified future.
  
  Our platform orchestrates millions of real-time decisions
  across homes, devices, markets and grids. By combining
  predictive algorithms with human-centred design, Kaluza
  makes clean energy dependable, affordable and adaptive to
  everyday life.
  
  With teams across Europe, North America, Asia and Australia,
  and a joint venture with Mitsubishi Corporation in Japan, we
  power leading companies including OVO, AGL and ENGIE, as
  well as innovators like Volvo and Volkswagen.
  
  What will I be doing?
  
  As an AI Engineer at Kaluza, you'll be at the heart of our
  mission to accelerate the global clean energy transition —
  building the intelligent systems that make smarter, faster,
  and greener energy decisions possible at scale. Working
  within a collaborative and forward-thinking engineering
  team, you'll design and deploy AI-powered solutions that
  directly shape the future of how energy is produced,
  distributed, and consumed.
  
  - Design, develop, and deploy machine learning models and AI-
    driven pipelines that power real-time energy optimisation
    across our platform.
  - Collaborate closely with product managers, data scientists,
    and software engineers to translate complex business
    problems into scalable AI solutions.
  - Evaluate and integrate large language models (LLMs) and
    generative AI capabilities into Kaluza's product suite,
    driving measurable impact for our energy partners.
  - Build robust, production-ready ML infrastructure — including
    model serving, monitoring, and retraining pipelines — that
    operates reliably at global scale.
  - Champion best practices in MLOps, ensuring models remain
    accurate, explainable, and aligned with evolving data
    landscapes.
  - Contribute to the technical direction of AI at Kaluza by
    staying ahead of emerging research and bringing new ideas
    and approaches to the team.
  - Partner with cross-functional stakeholders to communicate
    model performance, limitations, and opportunities in a
    clear, human-centred way.
  
  About You
  
  Ideally you’ll have/be
  
  - Proven experience as an AI or Machine Learning Engineer,
    with a strong track record of delivering production-grade
    models and AI systems.
  - Proficiency in Python and hands-on experience with ML
    frameworks such as PyTorch, TensorFlow, or scikit-learn.
  - Solid understanding of MLOps principles, including model
    deployment, versioning, monitoring, and CI/CD for ML
    workflows.
  - Experience working with cloud platforms (AWS, GCP, or Azure)
    and containerisation tools such as Docker and Kubernetes.
  - A collaborative, product-minded approach — comfortable
    working in cross-functional agile teams and translating
    technical work into clear business value.
  - Strong analytical and problem-solving skills, with the
    ability to navigate ambiguity and deliver outcomes in a
    fast-moving environment.
  
  What will set you apart
  
  - Experience working with LLMs, generative AI, or retrieval-
    augmented generation (RAG) systems in a production
    setting.
  - Background in the energy, utilities, or climate tech sector
    — or a genuine passion for the clean energy transition.
  - Familiarity with real-time data streaming technologies such
    as Kafka or Flink, particularly in the context of time-
    series forecasting or demand prediction.
  
  Kaluza Values Here at Kaluza we have five core values that
  guide us as a business: Play to win, Solve the real problem,
  Build trust every day, Own the outcome, Go further together.
  
