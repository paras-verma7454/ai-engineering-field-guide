description: |
  ROLE SUMMARY The AI Acceleration (AIA) function within the
  Chief Marketing Office (CMO) is the single, business-led
  engine that owns the design, delivery, and scale-up of
  priority AI capabilities across Commercial. AIA works in
  tight collaboration with various Pfizer functions to deploy
  and maintain production-grade AI solutions that simplify how
  we work and drive measurable value across all processes. As
  a Manager, AI and Data Science Full Stack Engineer, your
  responsibilities will include architecting and implementing
  AI solutions at scale for Pfizer. You will iteratively
  develop and continuously improve data science workflows, AI
  based software solutions, and AI components. ROLE
  RESPONSIBILITIES
  
  - Develop end-to-end data engineering, data science and
    analytics products and AI modules.
  - Develop server-side logic using back-end technologies such
    as Python.
  - Develop data ETL pipelines using python and SQL.
  - Create responsive and visually appealing web interfaces
    using HTML, CSS, and Bootstrap.
  - Build dynamic and interactive web applications with
    JavaScript frameworks (React, Vue, or AngularJS)
  - Build data visualizations and data applications to enable
    data exploration and insights generation.
  - Implement and maintain infrastructure and tools for software
    development and deployment
  - Automate processes for continuous integration, delivery, and
    deployment (CI/CD pipeline) to ensure smooth software
    delivery
  - Implement logging and monitoring tools to gain insights into
    system behavior.
  - Collaborate with data scientists, engineers, and colleagues
    from across Pfizer to integrate AI and data science models
    into production solutions
  - Demonstrate a proactive approach to identifying and
    resolving potential system issues.
  - Contribute to the best practices of the team and help
    colleagues grow.
  - Communicate complex technical concepts and insights to both
    technical and non-technical stakeholders.
  - Stay up-to-date with emerging technologies and trends in
    your field.
  
  Basic qualification
  
  - Bachelor's or Master's degree in Computer Science, or a
    related field (or equivalent experience).
  - 5+ years of experience in software engineering, data
    science, or related technical fields.
  - Proven experience as a Full Stack Engineer or similar role,
    with a strong portfolio of successful projects.
  - Solid experience in programming languages such as Python or
    R, and experience with relevant libraries and frameworks
    (e.g., scikit-learn, TensorFlow, PyTorch).
  - Good understanding of back-end technologies, databases (SQL
    and NoSQL), and RESTful APIs.
  - Knowledge of BI backend concept like Star Schema and
    Snowflake
  - Experience in building low code dashboard solution tools
    like Tableau, Power BI, Dash and Streamlit
  - Highly self-motivated, capable of delivering both
    independently and through strong team collaboration.
  - Ability to creatively tackle new challenges and step outside
    your comfort zone.
  - Strong English communication skills (written and verbal).
  
  Pfizer is an equal opportunity employer and complies with
  all applicable equal employment opportunity legislation in
  each jurisdiction in which it operates.  Information &
