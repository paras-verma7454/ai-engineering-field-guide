description: |
  About Us
  
  Our leading SaaS-based Global Employment Platform™ enables
  clients to expand into over 180 countries quickly and
  efficiently, without the complexities of establishing local
  entities. At G-P, we’re dedicated to breaking down barriers
  to global business and creating opportunities for everyone,
  everywhere.
  
  Our diverse, remote-first teams are essential to our
  success. We empower our Dream Team members with flexibility
  and resources, fostering an environment where innovation
  thrives and every contribution is valued and celebrated.
  
  The work you do here will positively impact lives around the
  world. We stand by our promise: Opportunity Made Possible.
  In addition to competitive compensation and benefits, we
  invite you to join us in expanding your skills and helping
  to reshape the future of work.
  
  At G-P, we assist organizations in building exceptional
  global teams in days, not months—streamlining the hiring,
  onboarding, and management process to unlock growth
  potential for all.
  
  About The Position:
  
  We’re building GIA — AI for General Counsel, in-house legal
  teams, and HR teams. GIA is a startup that demands extreme
  ownership, relentless execution, and zero tolerance for
  waiting on someone else to make the call. This is a staff-
  level role reporting to the Head of Product and Engineering
  where you own entire surfaces of the product — UI, backend,
  AI, infrastructure — and ship them end-to-end. You write
  code every day, raise the bar for the team, and treat the
  product like it’s yours.
  
  What You Will Do:
  
  - Build across the entire stack — React/Next.js frontends, Go
    and Python services, AI/LLM pipelines, infrastructure
  - Own product surfaces end-to-end — you take a problem from
    design through architecture through shipped, working
    software
  - Build and ship AI agents — design agent architectures,
    prompt systems, tool-use patterns, evaluation frameworks
  - Make infrastructure decisions — deployment, observability,
    sandboxing, scaling; you build what the team runs on
  - Bring product and design sense — you don’t just implement
    specs, you push back on what’s wrong and propose what’s
    better
  - Mentor and raise the bar — set technical standards, review
    code with rigor, make the engineers around you faster and
    sharper
  - Ship fast across time zones — distributed team across US,
    India, Ireland, Poland; you unblock yourself and others
  
  What We Are Looking For:
  
  Minimum Requirements:
  
  - 7+ years of engineering experience with depth across
    frontend, backend, and infrastructure
  - Strong in Python, Go, and React/Next.js — you ship
    production code in all three
  - AI-native — you build with LLMs, agents, and tools like
    Cursor daily, not experimentally
  - Systems thinker — you design APIs, data models, and
    distributed architectures that hold up under pressure
  - Product sense — you understand why something should be
    built, not just how
  - Design sensibility — you can spot a bad UX, sketch a better
    one, and ship it without waiting for a designer
  - Extreme ownership and speed — you default to action, own
    outcomes, and never block on someone else
  - Technical leadership — you’ve mentored engineers, set
    standards, and made teams better
  
  Preferred Qualifications:
  
  - Past founder or early-stage engineer (employee 1–15)
  - Experience building AI agents or agentic systems in
    production
  - Legal or HR domain experience — you understand the workflows
    you’re building for
  - Integration experience — connecting to CLMs, HRIS, doc
    management, email systems
  
  How we evaluate
  
  - Live coding or system design — a real problem, not leetcode
    trivia
  - Walk us through something you’ve architected and shipped
    end-to-end
  - Critique our product and codebase — tell us what you’d
    change and why
  - Show us how you use AI tools in your own workflow
  
  Interested? Reach out with a link to something you’ve built
  — a repo, a product, a side project — and tell us why it
  matters.
  
  Actual compensation for this position may vary and will
  depend on multiple factors such as relevant qualifications,
  experience, education, and geographic location. For Full-
  Time Regular Employees, this position is also eligible for
  additional compensation as follows:
  
  - Sales Roles: This position is eligible for a commission
    structure in addition to base salary.
  - Non-Sales Roles: This position is eligible for an annual
    bonus which is paid dependent on various factors,
    including and without limitation, individual and company
    performance in addition to base salary.
  
  Benefits
  
  G-P values its employees and offers excellent benefits and
  perks including generous paid parental leave, flexible time
  off, spending accounts, medical insurance, dental insurance,
  vision insurance, sabbatical after 5 years and more.
  
  
  
