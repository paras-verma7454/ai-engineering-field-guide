description: |
  Lead Software Engineer, DevOps / MLOps (Agentic Workflows,
  AI/ML Guardrails, Kubernetes, Python, AWS) Do you love
  building and pioneering in the technology space? Do you
  enjoy solving complex business problems in a fast-paced,
  collaborative, inclusive , and iterative delivery
  environment? At Capital One, you'll be part of a big group
  of makers, breakers, doers and disruptors, who love to solve
  real problems and meet real customer needs. We are seeking
  DevOps Engineers who are passionate about marrying data with
  emerging technologies to join our team. As a DevOps
  Engineer, you'll have the opportunity to be on the forefront
  of driving a major transformation within Capital One.
  Intelligent Foundations & Experiences (IFX) is a powerful
  collective of horizontal technology organizations that are
  driving Capital One's real-time intelligent future. Together
  with our partners in the Enterprise and across lines of
  business, we deliver broad-reaching technical solutions and
  advance state-of-the-art science to help every Capital One
  associate and our 100+M customers succeed. What You'll Do:
  
  - Lead a portfolio of diverse technology projects and a team
    of developers with deep experience in machine learning,
    distributed microservices, and full stack systems to
    create solutions that help meet regulatory needs for the
    company
  - Share your passion for staying on top of tech trends,
    experimenting with and learning new technologies,
    participating in internal & external technology
    communities, and mentoring other members of the
    engineering community
  - Collaborate with digital product managers, and deliver
    robust cloud-based solutions that drive powerful
    experiences to help millions of Americans achieve
    financial empowerment
  - Utilize programming languages like Java, Python, SQL, Ruby
    and Go, Container Orchestration services including Docker
    and Kubernetes, CM tools including Ansible and Terraform,
    and a variety of AWS tools and services
  
  Basic Qualifications:
  
  - Bachelor's degree
  - At least 4 years of experience in DevOps Engineering
    (Internship experience does not apply)
  - At least 3 years of experience in Cloud Native technologies
    (Amazon Web Services, Microsoft Azure, Google Cloud
    Platform)
  - At least 4 years of Unix or Linux system administration
    experience
  
  Preferred Qualifications:
  
  - 7+ years of DevOps Engineering experience
  - 4+ years of experience with coding and scripting (Python,
    SQL, Java, JavaScript, Golang, Bash, Perl or Ruby)
  - 4+ years of experience using build and deployment tools
    (Jenkins, Docker, Kubernetes)
  - 2+ years of experience with distributed database systems
    (Cassandra, ElasticSearch)
  - 2+ years of experience with deploying clustered web services
  - 2+ years of experience working within Agile Development
    Practices
  - 2+ years of Machine Learning Operations experience
  
   At this time, Capital One will not sponsor a new applicant
