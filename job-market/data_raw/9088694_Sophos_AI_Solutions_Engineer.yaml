description: |
  About Us
  
  Sophos is a global leader and innovator of advanced security
  solutions for defeating cyberattacks. The company acquired
  Secureworks in February 2025, bringing together two pioneers
  that have redefined the cybersecurity industry with their
  innovative, native AI-optimized services, technologies and
  products. Sophos is now the largest pure-play Managed
  Detection and Response (MDR) provider, supporting more than
  28,000 organizations. In addition to MDR and other services,
  Sophos’ complete portfolio includes industry-leading
  endpoint, network, email, and cloud security that
  interoperate and adapt to defend through the Sophos Central
  platform. Secureworks provides the innovative, market-
  leading Taegis XDR/MDR, identity threat detection and
  response (ITDR), next-gen SIEM capabilities, managed risk,
  and a comprehensive set of advisory services. Sophos sells
  all these solutions through reseller partners, Managed
  Service Providers (MSPs) and Managed Security Service
  Providers (MSSPs) worldwide, defending more than 600,000
  organizations worldwide from phishing, ransomware, data
  theft, other every day and state-sponsored cybercrimes. The
  solutions are powered by historical and real-time threat
  intelligence from Sophos X-Ops and the newly added Counter
  Threat Unit (CTU). Sophos is headquartered in Oxford, U.K.
  More information is available at www.sophos.com.
  
  Role Summary
  
  We are seeking an AI Solutions Engineer to guide the
  strategy, architecture, and hands-on development of AI-
  powered agents, workflows, and automation solutions that
  materially improve Sales performance. This role combines
  elements of AI product management, architecture, and hands-
  on solution development
  
  This is a hybrid execution and builder role. You will:
  
  - Guide and develop the Sales AI roadmap
  - Develop scalable agentic solutions
  - Build production-grade AI agents and automations
  - Enable citizen developers across Sales
  - Serve as the primary AI subject matter expert for the
    organization
  
  You will work at the intersection of Sales, Sales
  Engineering, Operations, IT Enterprise Architecture, and
  Development — ensuring AI solutions are practical, secure,
  scalable, and outcome-driven.
  
  This role is critical to enabling sellers and Sales
  Engineers to operate faster, smarter, and with higher impact
  across the entire customer lifecycle.
  
  What You Will Do
  
  What You Will Bring
  
  In the United States, the base salary for this role ranges
  from $75,600 to $126,000. In addition to the base salary,
  there's a component for target sales commissions alongside a
  comprehensive benefits package.  A candidate’s specific pay
  within this range will depend on a variety of factors,
  including job-related skills, training, location,
  experience, relevant education, certifications, and other
  business and organizational needs.
  
  
  
