  Ready to Join Us?
  
  At Sophos, we believe in the power of diverse perspectives
  to fuel innovation. Research shows that candidates sometimes
  hesitate to apply if they don't check every box in a job
  description. We challenge that notion. Your unique
  experiences and skills might be exactly what we need to
  enhance our team. Don't let a checklist hold you back – we
  encourage you to apply.
  
  What's Great About Sophos?
  
  ·   Sophos operates a remote-first working model, making
  remote work the primary option for most employees. However,
  some roles may necessitate a hybrid approach. While we are a
  remote first organization, applicants must have legal
  authorization to work in the jurisdiction where the position
  is posted, without requiring employer sponsorship.
  
  ·   Our people – we innovate and create, all of which are
  accompanied by a great sense of fun and team spirit
  
  ·   Employee-led diversity and inclusion networks that build
  community and provide education and advocacy
  
  ·   Annual charity and fundraising initiatives and volunteer
  days for employees to support local communities
  
  ·   Global employee sustainability initiatives to reduce our
  environmental footprint
  
  ·   Global fitness and trivia competitions to keep our
  bodies and minds sharp
  
  ·   Global wellbeing days for employees to relax and
  recharge
  
  ·   Monthly wellbeing webinars and training to support
  employee health and wellbeing
  
  Our Commitment To You
  
  We’re proud of the diverse and inclusive environment we have
  at Sophos, and we’re committed to ensuring equality of
  opportunity.   We believe that diversity, combined with
  excellence, builds a better Sophos, so we encourage
  applicants who can contribute to the diversity of our team.
  All applicants will be treated in a fair and equal manner
  and in accordance with the law regardless of gender, sex,
  gender reassignment, marital status, race, religion or
  belief, color, age, military veteran status, disability,
  pregnancy, maternity or sexual orientation.  We want to give
  you every opportunity to show us your best self, so if there
  are any adjustments we could make to the recruitment and
  selection process to support you, please let us know.
  
  Data Protection
  
  If you choose to explore an opportunity, and subsequently
  share your CV or other personal details with Sophos, these
  details will be held by Sophos for 12 months in accordance
  with our Privacy Policy and used by our recruitment team to
  contact you regarding this or other relevant opportunities
  at Sophos.  If you would like Sophos to delete or update
  your details at any time, please follow the steps set out in
  the Privacy Policy describing your individual rights.  For
  more information on Sophos’ data protection practices,
  please consult our Privacy Policy Cybersecurity as a Service
