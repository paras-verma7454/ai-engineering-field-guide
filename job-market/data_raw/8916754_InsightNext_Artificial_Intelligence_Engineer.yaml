description: |
  The Opportunity
  
  We are looking for an AI/ML Engineer who is eager to build
  real-world AI solutions and grow within a fast-moving,
  client-focused environment. In this role, you will work
  alongside senior engineers and data scientists to design,
  develop, and deploy AI applications powered by Google's
  Gemini Enterprise ecosystem. You will gain hands-on
  experience across the full delivery lifecycle — from data
  preparation and model development to deployment and ongoing
  optimization — while contributing directly to client
  outcomes.
  
  This is an ideal role for someone who has a solid foundation
  in machine learning and wants to deepen their expertise in
  enterprise-grade generative AI on Google Cloud Platform
  (GCP).
  
  
  
  What You Will Do
  
  - Build and integrate AI solutions using Gemini Enterprise,
    including Gemini for Workspace, Vertex AI Agent Builder,
    and the Gemini API, to address real client business needs.
  - Develop, fine-tune, and evaluate machine learning models
    using frameworks such as PyTorch and Scikit-Learn, under
    the guidance of senior team members.
  - Support the design and implementation of data pipelines and
    preprocessing workflows to ensure high-quality inputs for
    model training and inference.
  - Assist in deploying and monitoring models on GCP using
    Vertex AI, maintaining performance standards and flagging
    issues such as data drift or degradation.
  - Work with structured and unstructured data - including text,
    documents, and multimodal inputs — to build Gemini-powered
    applications such as search, summarization, and Q&A
    systems.
  - Collaborate with client-facing team members to understand
    requirements, document technical approaches, and
    contribute to solution design discussions.
  - Stay current with developments in the Gemini ecosystem and
    broader generative AI landscape, bringing new ideas and
    approaches to the team.
