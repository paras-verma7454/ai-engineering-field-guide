description: |
  Staff AI-Native Platform Engineer (L5)
  
  Location: US - Remote Experience: 8+ years in Cloud/Platform
  Engineering or Infrastructure, with a proven track record of
  leading cross-functional initiatives and influencing
  organizational AI strategy.
  
  About the Role
  
  We are looking for a visionary Staff AI-Native Platform
  Engineer to lead the evolution of our technical foundation.
  In this high-impact role, you will move beyond traditional
  automation to architect an AI-native ecosystem that
  integrates Generative AI into every layer of our Development
  Platform.
  
  As a technical leader within the Platform organization, you
  won’t just be maintaining infrastructure, you will be
  reimagining the developer experience (DevEx). You will be
  the primary advocate for GenAI, fostering a culture of “AI-
  first” engineering by building agentic workflows that
  accelerate Cloud Orchestration, CI/CD, Observability, and
  FinOps. We need a creative engineer who can bridge the gap
  between cutting-edge LLM capabilities and robust,
  production-grade platform tooling.
  
  What You’ll DoArchitect AI-Integrated Infrastructure
  
  - AI-First Development Platform: Design and build unified
    interfaces where AI agents manage complex tasks like
    environment provisioning, automated PR reviews, and self-
    documenting codebases.
  - Intelligent Orchestration: Embed AI-driven intelligence into
    CI/CD pipelines and Observability stacks to enable
    predictive scaling, automated incident triage, and self-
    healing systems.
  - Autonomous FinOps: Evolve AI-assisted FinOps workflows to
    automate cost attribution, anomaly detection, and
    optimization recommendations across AWS and other cloud
    environments.
  - Governance & Guardrails: Implement AI-driven governance to
    ensure architectural standards and security policies are
    met without slowing down developer velocity.
  
  Elevate Developer Experience (DevEx)
  
  - Agentic Tooling: Develop production-grade internal tools
    that use agentic reasoning to solve "day two" operational
    challenges for product teams.
  - Internal Developer Portal (IDP): Integrate natural language
    interfaces into our IDP, allowing developers to interact
    with the platform through conversational AI.
  - Actionable Insights: Transform raw telemetry into
    “executive-ready” insights using advanced data modeling
    and AI-driven visualization.
  
  Lead AI Mentorship & Evangelism
  
  - Strategic Advisory: Partner with senior leadership to model
    the technical and operational trade-offs of various AI
    architectural decisions (e.g., Build vs. Buy, Model
    Selection).
  - Team Upskilling: Act as a force multiplier by mentoring
    engineers on advanced AI tooling, prompt engineering for
    infrastructure, and the deployment of agentic systems.
  - Community Building: Stay at the forefront of the GenAI
    landscape, regularly sharing insights and driving the
    adoption of emerging tools and patterns across the
    organization.
  
  What You Bring
  
  - Platform Expertise: 8+ years of experience in Cloud
    Engineering (AWS preferred), with deep knowledge of
    Kubernetes, Terraform/CloudFormation, and modern CI/CD
    patterns.
  - AI/ML Applied Logic: Expert-level experience applying AI
    techniques (summarization, RAG, agentic reasoning) to
    real-world operational workflows. You understand how to
    make LLMs "useful" in a production environment.
  - Advanced Programming: Expert Python skills and experience
    with AWS SDKs. You are comfortable building complex
    integrations and custom CLI/API tools.
  - The "Staff" Mindset: A history of leading large-scale,
    cross-functional projects. You can navigate ambiguity,
    build consensus across teams, and deliver measurable
    business impact.
  - Creative Evangelism: The ability to present complex AI
    concepts to both technical and non-technical stakeholders,
    inspiring teams to shift toward AI-native workflows.
  - Product Thinking: Experience building Internal Developer
    Portals (IDP) with a focus on "Platform as a Product" and
    user-centric design.
  
  Bonus Points
  
  - Experience with LangChain, LlamaIndex, or other AI
    orchestration frameworks.
  - Contributions to open-source platforms or AI projects.
  - Experience with vector databases and fine-tuning models for
    domain-specific tasks.
  
  The pay range is listed and actual compensation packages are
  based on a wide array of factors unique to each candidate,
  including but not limited to skill set, years & depth of
  experience, certifications and specific office location.
  This may differ in other locations due to cost of labor
  considerations.
  
  Remote USA
  
  $152,100—$190,100 USD
  
  OUR OPPORTUNITY
  
  Natera™ is a global leader in cell-free DNA (cfDNA) testing,
  dedicated to oncology, women’s health, and organ health. Our
  aim is to make personalized genetic testing and diagnostics
  part of the standard of care to protect health and enable
  earlier and more targeted interventions that lead to longer,
  healthier lives.
  
  The Natera team consists of highly dedicated statisticians,
  geneticists, doctors, laboratory scientists, business
  professionals, software engineers and many other
  professionals from world-class institutions, who care deeply
  for our work and each other. When you join Natera, you’ll
  work hard and grow quickly. Working alongside the elite of
  the industry, you’ll be stretched and challenged, and take
  pride in being part of a company that is changing the
  landscape of genetic disease management.
  
  WHAT WE OFFER
  
  Competitive Benefits - Employee benefits include
  comprehensive medical, dental, vision, life and disability
  plans for eligible employees and their dependents.
  Additionally, Natera employees and their immediate families
  receive free testing in addition to fertility care benefits.
  Other benefits include pregnancy and baby bonding leave,
  401k benefits, commuter benefits and much more. We also
  offer a generous employee referral program!
  
  For more information, visit www.natera.com.
  
  Natera is proud to be an Equal Opportunity Employer. We are
  committed to ensuring a diverse and inclusive workplace
  environment, and welcome people of different backgrounds,
  experiences, abilities and perspectives. Inclusive
  collaboration benefits our employees, our community and our
  patients, and is critical to our mission of changing the
  management of disease worldwide.
  
  All qualified applicants are encouraged to apply, and will
  be considered without regard to race, color, religion,
  gender, gender identity or expression, sexual orientation,
  national origin, genetics, age, veteran status, disability
  or any other legally protected status. We also consider
  qualified applicants regardless of criminal histories,
  consistent with applicable laws.
  
  If you are based in California, we encourage you to read
  this important information for California residents.
  
  Link: https://www.natera.com/notice-of-data-collection-
  california-residents/
  
  Please be advised that Natera will reach out to candidates
  with a @natera.com email domain ONLY. Email communications
  from all other domain names are not from Natera or its
  employees and are fraudulent. Natera does not request
  interviews via text messages and does not ask for personal
  information until a candidate has engaged with the company
  and has spoken to a recruiter and the hiring team. Natera
  takes cyber crimes seriously, and will collaborate with law
  enforcement authorities to prosecute any related cyber
  crimes.
  
