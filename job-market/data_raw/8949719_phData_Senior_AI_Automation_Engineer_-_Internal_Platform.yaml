  committed to helping global enterprises overcome their
  toughest data challenges.
  
  phData is a remote-first global company with employees based
  in the United States, Latin America, and India. We celebrate
  the culture of each of our team members and foster a
  community of technological curiosity, ownership, and trust.
  Even though we're growing extremely fast, we maintain a
  casual, exciting work environment. We hire top performers
  and allow you the autonomy to deliver results.
  
  - 6x Snowflake Partner of the Year (2020, 2021, 2022, 2023,
    2024, 2025)
  - Fivetran, dbt, Atlation, and AWS Partner of the Year
  - #1 Partner in Snowflake Advanced Certifications
  - 600+ Expert Cloud Certifications (Sigma, AWS, Azure,
    Dataiku, etc)
  
  Recognized as an award-winning workplace in the US, India,
  and LATAM
  
  Senior AI Automation Engineer - Internal Platform
  
  At phData, the Platform team builds and operates our
  internal Intelligence Platform, powering our Operations,
  Sales, Delivery, and Finance teams with data, analytics, and
  AI‑driven insights. We provide the core data and technology
  foundation that helps phData run efficiently and make better
  decisions every day.
  
  We are seeking an AI Automation Engineer to join our
  Platform team. This role will serve as a hands‑on technical
  partner to business groups across the organization. The
  ideal candidate brings demonstrated experience in both
  artificial intelligence and process automation, with a
  proven ability to assess feasibility, design solutions, and
  deliver measurable outcomes that create efficiencies and
  solve real business problems.
  
  As an AI Automation Engineer, you will work directly with
  business stakeholders to understand their challenges,
  evaluate whether AI, automation, or a combination of both is
  the right approach, and then design and deliver end‑to‑end
  solutions. This is a growth‑oriented role for those
  passionate about using AI and automation to drive impact in
  how we run phData on AI.
  
  What You’ll Do:
  
  - Business Engagement & Feasibility Assessment: Partner with
    business groups to identify AI/automation opportunities,
    assess feasibility (viability, data, integration, ROI,
    readiness), translate problems into technical plans,
    communicate recommendations, and help prioritize demand
    across the portfolio.
  - AI Solution Development: Design, build, and refine AI‑driven
    applications and agents (RAG, prompt engineering, agent
    architectures) for internal and occasional client use on
    platforms like Glean, Microsoft Copilot, and Snowflake
    Intelligence.
  - Automation & Efficiency: Implement RPA, scripting, and
    low‑code/no‑code workflows to automate repetitive
    processes, integrate systems and data sources, and
    operate/optimize automations for reliable, end‑to‑end
    execution.
  - Development & Code Quality: Write production‑grade code for
    AI and automation solutions with strong documentation,
    testing, and SDLC discipline, using modern engineering
    practices (Git, code review, CI/CD) to ensure quality and
    maintainability.
  - Collaborative Development & Cross‑Functional Engagement:
    Work with cross‑functional teams to deliver solutions,
    clearly communicate value to technical and non‑technical
    stakeholders, and align work with priorities through agile
    planning.
  - Strategic Support & Professional Growth: Share best
    practices, track and experiment with emerging
    AI/automation tools, inform leadership through prototypes
    and production learnings, and help select and operate
    secure, governed cloud AI services.
  
  Required Experience:
  
  - 4‑year Bachelor’s degree in Computer Science, Engineering,
    Data Science, or a related technical field.
  - 5+ years of professional experience developing and deploying
    automation/RPA solutions and AI/ML solutions in a business
    environment.
  - Experience with enterprise integration patterns, APIs, and
    connecting disparate business systems.
  - Demonstrated experience across both AI/ML and process
    automation (e.g., RPA, Power Automate, scripting, workflow
    tools).
  - Proven ability to work directly with business stakeholders
    to assess feasibility, gather requirements, and translate
    business problems into technical solutions.
  - Strong proficiency in software development (Python
    preferred), with hands‑on experience building
    production‑grade applications and workflows.
  - Familiarity with professional software development
    workflows: Git‑based source control, branching strategies,
    code review, and effective team collaboration on shared
    codebases.
  - Exposure to agile development methodologies, CI/CD
    practices, and collaborative development environments.
  - Basic experience deploying cloud services and APIs for AI
    workloads (AWS, Azure, or Google Cloud).
  - Strong analytical and problem‑solving capabilities with a
    demonstrated ability to assess business processes and
    identify automation opportunities.
  - Excellent communication skills for explaining technical
    information to both technical and non‑technical audiences.
  - Ability to adapt to evolving technology landscapes and work
    collaboratively in multidisciplinary teams.
  - Experience with generative AI, large language models (LLMs),
    prompt engineering, and AI agent frameworks/platforms.
  
  Prefer Any of the Following:
  
  - Familiarity with data engineering concepts (ETL/ELT, data
    pipelines, data warehousing).
  - Familiarity with the Snowflake Data Platform and cloud data
    ecosystems.
  - Experience with business intelligence tools like Sigma
    Computing.
  - Experience in the data and AI professional services
    industry.
  - Experience conducting structured opportunity assessments,
    business case development, or cost‑benefit analysis for
    technology initiatives.
  - Certifications in AI/ML, RPA, or cloud platforms (AWS,
    Azure, GCP).
  - Knowledge of data governance, responsible AI principles, and
    regulatory compliance for sensitive or regulated
    industries.
  
  Key Attributes for Success:
  
  - Consultative Mindset: Naturally engages with business teams
    to understand the “why” behind requests, asks the right
    questions, and proposes solutions that address root
    causes.
  - Dual‑Skilled: Equally comfortable building an AI agent and
    designing an automated workflow; understands when to apply
    AI, when to apply automation, and when to combine both.
  - Ownership & Follow‑Through: Takes end‑to‑end responsibility
    for solutions from initial assessment through deployment
    and ongoing optimization.
  - Bias Toward Action: Moves things forward with urgency and
    purpose; doesn’t let ambiguity stall progress and actively
    seeks opportunities to improve how work gets done.
  - Collaborative & Influential: Builds trust across teams and
    stakeholders; can navigate complex organizational dynamics
    with professionalism and clarity.
  - Curious & Growth‑Oriented: Stays current with rapidly
    evolving AI and automation trends; brings new ideas and
    approaches to the team.
  - Resilient & Adaptable: Thrives in a fast‑paced, evolving
    environment; stays composed under pressure and pivots when
    circumstances change.
  
  Why phData:
  
  - Work on a high‑impact internal AI and automation platform
    that directly shapes how phData operates, sells, and
    delivers for its customers.
  - Help define how we run phData on data and AI, collaborating
    closely with stakeholders across Operations, Sales,
    Delivery, Finance, and IT.
  - Build on a modern cloud data and AI stack (Snowflake, AWS,
    Sigma Computing, Glean, GitHub Copilot, and more) with
    strong support for experimentation and improvement.
  - Collaborate with experienced data, analytics, and AI
    practitioners, and play a key role in expanding our
    internal AI and automation capabilities.
  - Enjoy a remote‑friendly culture with a distributed team
    across the globe.
  
  Location & Time Zone Expectations
  
  This role is based in US and operates primarily in US time
  zones.
  
  - We are a remote-first company, and you should be comfortable
    working with a distributed global team.
  - Some flexibility may be required to collaborate across time
    zones with colleagues and clients.
  - Client needs may occasionally require flexibility in working
    hours to support key milestones or workshops.
  
  Benefits at phData
  
  US:
  
  - Remote-First Work Environment
  - 401k plan with company match
  - Dental and Vision insurance
  - Home Office Equipment Stipend
  - Annual stipend for Learning and Development
  - Competitive comp, excellent benefits, 4 weeks PTO plan plus
    10 Holidays (and other cool perks)
  
