  An overview of this role
  
  As a Senior Backend Engineer, AI Governance at GitLab, you
  will help build the backend systems behind a paid product
  for regulated enterprise organizations that need clear
  visibility, policy controls, and compliance evidence for AI
  use inside the software development lifecycle. This role
  sits at the intersection of AI, governance, and enterprise
  backend engineering, where your work will help customers
  adopt AI agents with more confidence.
  
  You will contribute across the AI Governance product surface
  rather than focus on a single narrow area. That includes
  backend work for audit event ingestion and export, role-
  based access control, governance features for the Model
  Context Protocol (MCP) registry, and storage systems for AI
  agent artifacts. You will work on technical problems with
  meaningful scope and complexity, partnering closely with the
  team on architecture and implementation in an async-first
  environment.
  
  This is a good fit for someone who enjoys building reliable
  systems for enterprise use cases, designing for scale, and
  working in a space where product requirements are shaped by
  emerging AI regulations and customer governance needs. Your
  work will directly support organizations that need to manage
  AI usage with the same rigor they apply to security,
  compliance, and software delivery.
  
  What you’ll do
  
  - Implement and evolve the AI audit event pipeline, including
    event ingestion, schema normalization, storage design,
    partitioning, retention, and export capabilities.
  - Implement access control for AI Governance features by
    integrating permissions for audit logs, policy
    configuration, and governance dashboards into GitLab's
    existing authorization model.
  - Contribute backend functionality for the AI agent artifact
    feature, supporting structured storage and retrieval of
    agent run metadata alongside existing CI/CD artifacts.
  - Build backend services for the MCP registry, including tool
    metadata and enforcement controls that can restrict or
    block access when needed.
  - Design and optimize data models and queries for high-write,
    event-heavy systems using PostgreSQL and ClickHouse.
  - Write and maintain solid RSpec and integration test
    coverage, while helping improve team test reliability
    practices.
  - Contribute to architecture decisions and deliver
    implementations with ownership, while working closely with
    partner teams in AI and Continuous Delivery.
  
  What you’ll bring
  
  - Extensive experience building backend applications with Ruby
    on Rails in production environments.
  - Proficiency in Python and experience building backend
    services that support AI infrastructure, gateways, or
    adjacent product systems.
  - Extensive experience with PostgreSQL and other data-
    intensive databases such as ClickHouse, including schema
    design, partitioning strategies, and efficient query
    patterns for event-heavy workloads.
  - Experience building REST or GraphQL APIs and designing
    backend systems for reliable storage, retrieval, and
    governance workflows.
  - Solid understanding of authorization, access control, and
    enterprise governance concepts in web application
    architectures.
  - Familiarity with regulatory compliance, auditability, or
    enterprise governance requirements, and the ability to
    apply them in production systems.
  - Clear written communication skills and comfort working
    effectively in a remote, async-first team.
  - Helpful experience includes audit trails, telemetry, event
    streaming, SIEM integrations, webhook delivery, enterprise
    retention requirements, AI agent infrastructure, large
    language models, the Model Context Protocol (MCP), or
    compliance, observability, and enterprise security
    products.
  
  About the team
  
  You'll join the AI Governance team within GitLab's Secure,
  Scale, and Compliance area. We focus on helping
  organizations gain visibility into and govern AI usage
  inside GitLab. Our work spans two broad problem spaces:
  visibility, such as audit events, usage tracking, and
  observability, and policy controls, such as controls that
  help protect projects and meet compliance requirements.
  
  We are building this team alongside a parallel AI Governance
  team, with both groups contributing to different parts of a
  fast-changing roadmap. You'll work with a distributed group
  of engineers and collaborate with adjacent AI and Continuous
  Delivery teams as we integrate governance capabilities more
  deeply into the platform. It's an interesting team for
  engineers who want to work on emerging product challenges at
  the intersection of AI, compliance, and large-scale
  enterprise software. For more on how related teams work, see
  Team Handbook Page.
  
