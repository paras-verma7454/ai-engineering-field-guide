description: |
  Architect the Future of Intelligent Logistics as our Lead
  Generative AI Engineer
  
  Imagine redefining the global movement of freight by
  building sophisticated GenAI agents that bridge the gap
  between complex data and real-world action. At Trimble, you
  will have the unique opportunity to lead the technical
  evolution of our transportation network, crafting autonomous
  solutions that make global shipping safer, smarter, and more
  efficient for everyone involved.
  
  About Us:
  
  T&L: In the Transportation & Logistics segment, our
  solutions make it safer, simpler and more efficient to move
  freight—bringing together a global network of shippers,
  carriers, brokers and 3PLs.
  
  What Makes This Role Great:
  
  In this role, you will be the technical visionary owning the
  end-to-end delivery of mission-critical GenAI agent
  initiatives. You will not just be writing code , you will be
  defining the component-level architecture and orchestration
  patterns that will set the standard for how Generative AI
  transforms the entire logistics industry.
  
  Key Exciting Responsibilities
  
  - Own the end-to-end technical direction and architectural
    patterns for high-impact GenAI initiatives, defining how
    we use agent orchestration graphs and RAG pipelines at
    scale.
  - Establish and evolve the CI/CD and automated evaluation
    pipelines for non-deterministic AI outputs, taking full
    ownership of SLIs/SLOs and production integrity for your
    services.
  - Lead the evaluation and prototyping of cutting-edge
    techniques (e.g., RLHF variants, DSPy, advanced retrieval)
    to make high-stakes, data-driven decisions for our AI
    roadmap.
  - Implement sophisticated observability hooks and monitoring
    strategies (eg using LangSmith) to trace agent logic,
    optimize performance, and lead root-cause analysis for
    production incidents.
  - Drive the experimentation loops required to hit aggressive
    accuracy, latency, and cost targets, ensuring our
    "Agentic" solutions are both cutting-edge and commercially
    viable.
  - Act as the principal design authority and code reviewer for
    the team, mentoring P1–P3 engineers and championing
    "secure-by-design" practices.
  
  Essential Skills & Experience
  
  - You bring 8 to 15 years of robust engineering experience,
    preferably within a Tier-1 organization.
  - You are a Python expert with a deep understanding of
    developing and scaling high-quality code.
  - Proven expertise in developing LLM applications and working
    with RAG frameworks including hybrid search, vector DBs,
    and ANN algorithms in a professional environment.
  - Strong background in defining component-level architecture
    and influencing team patterns for agentic workflows.
  - Deep understanding of implementing automated evaluation
    pipelines for non-deterministic AI outputs, including
    "LLM-as-a-judge" frameworks and benchmarking for accuracy
    and safety.
  - Experience with LLM observability and analytics tools such
    as Datadog or Databricks to monitor performance at scale.
  - Deep understanding of Agile delivery and the ability to
    handle production issues across multiple time zones.
  
  Bonus Points For:
  
  - GenAI Passion: You have a portfolio of personal projects, a
    technical blog, or a GitHub repository demonstrating your
    hands-on experimentation with the latest LLM frameworks.
  - Community Contribution: You’ve contributed to open-source AI
    libraries (like LangChain, LlamaIndex, or AutoGPT) or have
    a history of sharing insights at technical meetups.
  
  Why You'll Love Working With Us
  
  At Trimble, we're not just a company that "does good"—we are
  a team dedicated to making a tangible, positive Real-World
  Impact. We build innovative solutions designed to solve the
  world's most critical challenges. From construction sites to
  transportation hubs, our work tangibly improves how people
  live, build, move, and grow. You'll work on projects that
  truly matter: Our purpose-driven culture means you'll be
  helping to build and deliver solutions that make work
  faster, safer, and more sustainable for millions of people
  worldwide. Our impact is tangible, from connected machines
  that save fuel to data-driven insights that reduce waste.
  Collaborate with like-minded people: Our strong internal
  culture is a "hidden gem." You will work with a
  collaborative, supportive team that shares your purpose and
  fosters a genuine sense of belonging. We're a company of
  "visionary pragmatists" who think boldly and build things
  that work. Be an owner: Trimble thrives on individuals who
  take initiative and embrace ownership. You'll find an
  entrepreneurial spirit where success is often "self-
  authored," empowering proactive "doers."
  
  How to Apply: Please submit an online application for this
  position by clicking on the ‘Apply Now’ button located in
  this posting.
  
  Join a Values-Driven Team: Belong, Grow, Innovate.
  
  At Trimble, our core values of Belong, Grow, and Innovate
  aren't just words—they're the foundation of our culture. We
  foster an environment where you are seen, heard, and valued
  (Belong); where you have an opportunity to build a career
  and drive our collective growth (Grow); and where your
  innovative ideas shape the future (Innovate). We believe in
  empowering local teams to create impactful strategies,
  ensuring our global vision resonates with every individual.
  Become part of a team where your contributions truly matter.
  
