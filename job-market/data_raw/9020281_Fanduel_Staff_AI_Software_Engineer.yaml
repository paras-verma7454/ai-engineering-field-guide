description: |
  THE POSITION Our roster has an opening with your name on it
  
  We’re looking for passionate technologists, strong
  communicators, and those with a commitment to continuous
  improvement. The ideal candidate will have the confidence to
  propose pragmatic solutions to complex problems and be eager
  to learn from and educate others. As an AI software
  engineer, you will work in empowered, multidisciplinary
  teams, autonomously tackling complex challenges that provide
  the very best experiences and products for a growing
  community of millions of players as we build out an exciting
  and innovative customer experience within the fast paced and
  growing sports betting environment.
  
  As a member of Tech Transformation team, you will research
  and build proof of concepts using new and innovative
  technologies to provide new and cutting-edge customer
  experiences and drive internal innovations for the business.
  You will be asked to think big and be willing to move fast.
  You’ll identify opportunities and put them into action
  quickly, and you won’t be afraid of to fail quickly.
  
  When successful solution is identified, you’ll know how to
  build it for scale and longevity for our rapidly growing
  company. You write secure, stable, testable, maintainable
  code with minimal defects. You are proficient in a broad
  range of data structures and algorithms, knowing when it is
  appropriate to use them and when it is not. You make
  appropriate implementation trade-off decisions. You
  participate in team design, scoping, and prioritization
  discussions. You seek to learn the business context and
  technologies behind your team's software. You work
  effectively with other team members & identify any
  opportunities/problems arising from technical decisions. You
  invent, refine, and develop your solutions to ensure they
  are meeting customer needs and team goals. Most importantly,
  you are a passionate advocate for our customers.
  
  In addition to the specific responsibilities outlined above,
  employees may be required to perform other such duties as
  assigned by the Company. This ensures operational
  flexibility and allows the Company to meet evolving business
  needs.
  
  THE GAME PLAN Everyone on our team has a part to play
  
  - You rapidly prototype, experiment, and demonstrate
    production-like capabilities
  - You work on project ideas and strategy with customers,
    stakeholders, and peers, balancing customer requirements
    with the team requirements, and strive to become a subject
    matter expert.
  - You will always seek incremental delivery and you will
    pivot, when necessary
  - You help lead your team when it comes to code quality and
    roadmap, by owning your team’s tech debt & tech
    improvement roadmaps.
  - Drive engineering engagement best practices (e.g.,
    Operational Excellence, Security, Quality, etc.) and set
    standards.
  - Self-manage your craft by deliberately owning the outcome of
    key initiatives, delegating to and empowering teammates,
    pairing with your engineering manager to improve delivery,
    and proud to represent your team and Sportsbook.
  - You foster a constructive dialogue and seek resolutions in a
    professional way.
  - You keep yourself up to date with market standards and open-
    source frameworks.
  - You provide excellent customer support on an on-call
    rotation where required.
  - Most importantly, you are humble, pragmatic, self-managed,
    thirsty for knowledge, never satisfied and always
    challenging the norm.
  
  THE STATS What we're looking for in our next teammate
  
  - BA/BS degree in Computer Science or related software
    engineering field, or equivalent practical experience. 7+
    years of relevant work experience.
  - Experience designing and delivering production-grade
    LLM/agent workflows, including tool/function calling,
    orchestration patterns, and retrieval-augmented generation
    (RAG), with clear strategies for prompt/version
    management, latency/cost controls, and reliability.
  - Proven track record operationalizing LLM systems end-to-end,
    including automated evaluation (offline + online),
    telemetry/monitoring, guardrails, and incident
    response/playbooks to maintain quality over time
  - Experience integrating LLM capabilities into existing
    services and SDLC, including CI/CD, testing strategies
    (unit/integration + LLM evals), and safe rollout patterns
    (feature flags, canaries, A/B tests)
  - Experienced in exhibiting a very high standard of technical
    judgement, innovation and execution to tackle open-ended
    problems that require difficult prioritization, defining
    both the what and how of things to be done.
  - Solid experience building and designing highly scalable,
    fault tolerant and always available systems
  - Understanding of modern architectures, design patterns, and
    platform nuances
  - Expertise in at least one higher level language (Pyhton, JS,
    Java, .NET)
  - Fullstack experience owning building and designing highly
    scalable, fault tolerant and always available systems in
    React, React Native, Native and Node.JS backend.
  - Strong experience helping lead software engineering teams
    across Web, Mobile, and/or connected devices spaces.
  - Experience working with cloud-based infrastructure and
    technologies, preferably AWS
  - Proficient in responsibility delegating, mentoring, and
    empowering individuals.
  - Track record of owning the outcome of technical delivery.
  - Passion for quality and understanding of quality best
    practices within an SDLC, with experience in unit testing,
    testing tools, or integrating testing.
  - Strong sense of ownership, urgency, and drive with
    demonstrated abilities driving operational excellence and
    best practices.
  - You’re passionate about the fast-paced, innovative, and
    growing Sports Betting industry.
  
  
  
  ABOUT FANDUEL
  
  FanDuel Group is the premier mobile gaming company in the
  United States and Canada. FanDuel Group consists of a
  portfolio of leading brands across mobile wagering
  including: America’s #1 Sportsbook, FanDuel Sportsbook; its
  leading iGaming platform, FanDuel Casino; the industry’s
  unquestioned leader in horse racing and advance-deposit
  wagering, FanDuel Racing; and its daily fantasy sports
  product.
  
  In addition, FanDuel Group operates FanDuel TV, its broadly
  distributed linear cable television network and FanDuel TV+,
  its leading direct-to-consumer OTT platform. FanDuel Group
  has a presence across all 50 states, Canada, and Puerto
  Rico.
  
  The company is based in New York with US offices in Los
  Angeles, Atlanta, and Jersey City, as well as global offices
  in Canada and Scotland. The company’s affiliates have
  offices worldwide, including in Ireland, Portugal, Romania,
  and Australia.
  
  FanDuel Group is a subsidiary of Flutter Entertainment, the
  world's largest sports betting and gaming operator with a
  portfolio of globally recognized brands and traded on the
  New York Stock Exchange (NYSE: FLUT).
  
  PLAYER BENEFITS We treat our team right
  
  We offer amazing benefits above and beyond the basics. We
  have an array of health plans to choose from (some as low as
  $0 per paycheck) that include programs for fertility and
  family planning, mental health support, and fitness
  benefits. We offer generous paid time off (PTO & sick
  leave), annual bonus and long-term incentive opportunities
  (based on performance), 401k with up to a 5% match, commuter
  benefits , pet insurance, and more - check out all our
  benefits here: FanDuel Total Rewards. *Benefits differ
  across location, role, and level.
  
  FanDuel is an equal opportunities employer and we believe,
  as one of our principles states, “We are One Team!”. As
  such, we are committed to equal employment opportunity
  regardless of race, color, ethnicity, ancestry, religion,
  creed, sex, national origin, sexual orientation, age,
  citizenship status, marital status, disability, gender
  identity, gender expression, veteran status, or any other
  characteristic protected by state, local or federal law. We
  believe FanDuel is strongest and best able to compete if all
  employees feel valued, respected, and included.
  
  The applicable salary range for this position is $170,000 -
  $213,000 USD, which is dependent on a variety of factors
  including relevant experience, location, business needs and
  market demand. This role may offer the following benefits:
  medical, vision, and dental insurance; life insurance;
  disability insurance; a 401(k) matching program; among other
  employee benefits. This role may also be eligible for short-
  term or long-term incentive compensation, including, but not
  limited to, cash bonuses and stock program participation.
  This role includes paid personal time off and 14 paid
  company holidays. FanDuel offers paid sick time in
  accordance with all applicable state and federal laws.
  
  FanDuel is committed to providing reasonable accommodations
  for qualified individuals with disabilities. If you have a
  disability and need a workplace accommodation or adjustment
  during the application and hiring process, including support
  for the interview or onboarding process, please email
  Benefits@fanduel.com.
  
  It is unlawful in Massachusetts to require or administer a
  lie detector test as a condition of employment or continued
  employment. An employer who violates this law shall be
  subject to criminal penalties and civil liability.
  
