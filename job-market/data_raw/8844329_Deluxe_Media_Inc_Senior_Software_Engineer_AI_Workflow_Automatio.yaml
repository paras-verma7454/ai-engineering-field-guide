  JobSenior Software Engineer – AI & Workflow Automation
  
  Description
  
  POSITION TITLE: Senior Software Engineer – AI & Workflow
  Automation  Location: Hybrid / Remote
  
  About the Role
  
  We’re building a small, focused engineering team to use AI,
  intelligent agents, and automation to transform manual
  business workflows into efficient, scalable systems.
  
  As a Senior Software Engineer, you’ll play a key role in
  designing and building the systems that make this possible —
  from automating unstructured data intake to integrating AI-
  driven logic into existing backend workflows. You’ll
  collaborate closely with the Tech Lead, operations, and
  other engineers to deliver production-ready automation tools
  that make a measurable impact.
  
  This role is ideal for a hands-on engineer who loves solving
  open-ended problems, working with emerging technologies, and
  bringing ideas from prototype to production.
  
  What You’ll Do
  
  - Design and develop automation solutions that leverage AI
    models, rules engines, and workflow orchestration tools.
  - Integrate AI-driven components with internal and external
    services through REST APIs, message queues, or event-
    driven systems.
  - Build and maintain scalable backend systems using Python and
    frameworks such as FastAPI or Flask.
  - Experiment with AI/LLM APIs and frameworks (e.g., OpenAI,
    LangChain, Hugging Face) to prototype intelligent agents
    and data extraction solutions.
  - Collaborate cross-functionally to identify automation
    opportunities and translate them into technical designs.
  - Ensure quality and reliability, writing clean, testable, and
    maintainable code.
  - Participate in code reviews, architecture discussions, and
    technical decision-making.
  - Support deployments and monitor production systems to ensure
    uptime and performance.
  
  What You’ll Bring
  
  - 5+ years of professional software engineering experience.
  - Strong proficiency in Python, with experience building
    RESTful APIs and backend systems (FastAPI, Flask, or
    Django).
  - Experience integrating AI/ML frameworks or APIs (e.g.,
    OpenAI, AWS Bedrock, Vertex AI).
  - Solid understanding of data modeling, asynchronous
    programming, and microservice architecture.
  - Experience automating or optimizing complex workflows (e.g.,
    using NLP, OCR, or RPA).
  - Proficiency in writing robust tests and working within CI/CD
    pipelines.
  - Strong problem-solving ability and curiosity about applying
    AI to real-world use cases.
  
  Nice to Have
  
  - Experience working with LLMs or AI agents in production.
  - Familiarity with workflow engines (Temporal, Step Functions,
    Airflow).
  - Exposure to data transformation, labeling, or prompt design.
  - Cloud experience (AWS, GCP, or Azure).
  - Prior experience in enterprise automation or backend system
    integration.
  
  About the Company Deluxe, a subsidiary of Platinum Equity,
  is a global leader in media and entertainment services for
  film, video, and online content.  Since 1915, Deluxe has
  been the trusted partner for the world’s most successful
  Hollywood studios, independent film companies, TV networks,
  exhibitors, advertisers and others, offering best-in-class
  solutions in post-production, distribution, asset and
  workflow management, and cloud-based technologies.
  
  With headquarters in Los Angeles and offices around the
  globe, the company employs over 3,500 of the most talented
  individuals, developers, and industry veterans worldwide.
  For more information, please visit www.bydeluxe.com. We
  offer competitive pay and benefits program including
  medical, dental & vision coverage, vacation & sick leave,
  401(k), and more.
  
  Diversity Statement Deluxe is committed to inclusivity,
  fostering an environment where every employee feels
  comfortable bringing their full selves to work. It is our
  policy to provide equal employment opportunities to all
  applicants and employees.
  
  Applicants will receive consideration for employment without
  regard to, and will not be discriminated against, on the
  basis of race, color, religion, creed, national origin or
  ancestry, sex, age, physical or mental disability, veteran
  status, sexual orientation, gender identity or expression,
  genetic information or any other legally recognized
  protected basis under federal, state or local laws,
  regulations or ordinances. Deluxe will consider qualified
  applicants with criminal histories in a manner consistent
  with the requirements of applicable local, state, and
  federal law.
  
  Applicants with disabilities may be entitled to reasonable
  accommodation under the terms of the Americans with
  Disabilities Act and certain state or local laws. A
  reasonable accommodation is a change in the way things are
  normally done which will ensure an equal employment
  opportunity without imposing undue hardship on Deluxe.
  Please inform the company's HR representative if you need
  assistance completing any forms or to otherwise participate
  in the application process.
  
  This role is based in Los Angeles, California and the base
  pay range for this role is $170,000.00 - $200,000.00
  annually. Actual amounts will vary depending on education,
  skills, experience, and geographic location.
