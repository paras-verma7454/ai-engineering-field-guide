description: |
  At PointClickCare our mission is simple: to help providers
  deliver exceptional care. And that starts with our people.
  As a leading health tech company that’s founder-led and
  privately held, we empower our employees to push boundaries,
  innovate, and shape the future of healthcare.
  
  With the largest long-term and post-acute care dataset and a
  Marketplace of 400+ integrated partners, our platform serves
  over 30,000 provider organizations, making a real difference
  in millions of lives. We also reinvest a significant
  percentage of our revenue back into research and
  development, ensuring our employees have the resources to
  innovate and make a lasting impact. Recognized by Forbes as
  a top private cloud company and honored as one of Canada’s
  Most Admired Corporate Cultures, we offer flexibility,
  growth opportunities, and meaningful work.
  
   At PointClickCare, we empower our people to be the
  architects of a smarter healthcare future; one that is
  human-first and accelerated by AI to create meaningful and
  lasting change. Employees harness AI as a catalyst for
  creativity, productivity, and thoughtful decision-making. By
  integrating AI tools into our daily workflows, collaboration
  is enhanced, outcomes are improved, and every team member
  has the proficiency to maximize their impact. It all starts
  with our hiring practices where we uncover AI expertise that
  complements our mission, and we continue to invest in
  training and development to nurture innovation throughout
  the employee journey.
  
  Join us in redefining healthcare — so it doesn’t just
  survive, it thrives. To learn more about PointClickCare,
  check out Life at PointClickCare and connect with us on
  Glassdoor and LinkedIn.
  
  **Travel to Office expectations**
  
  For Remote Roles: If this role is remote, there will be in-
  office events that will require travel to and from the
  Mississauga and/or Salt Lake City office. These will
  include, but not limited to, onboarding, team events, semi-
  annual and annual team meetings.
  
  For Hybrid Roles: If this role is Hybrid, there will be an
  expectation to reside within commutable distance to the
  office/location specified in the job listing. This will
  include, but not limited to, weekly/bi-weekly/monthly events
  in the office with your specific team. This is a requirement
  for this role.
  
  Position Summary:
  
  PointClickCare builds cloud platforms that power safer, more
  connected care for millions of patients. As a Senior DevOps
  Engineer, you will design, build, and operate scalable cloud
  infrastructure and developer platforms that support both
  application and AI-driven workloads. You are a strong
  individual contributor who owns complex systems end-to-end,
  improves reliability and automation, and partners closely
  with software and data teams to bring services and models
  into production. You balance delivery and quality, applying
  DevOps and SRE best practices to improve developer velocity,
  system reliability, and operational insight.
  
  Who you’ll work with:
  
  
  
  You will be part of our growing team of top engineers with
  the ability to directly impact the success of the
  organization. You'll be a part of the DevOps team reporting
  to the DevOps Team Lead and working alongside our other
  DevOps Engineers. You'll work day to day with the Software
  Engineering team as well as our IT team.
  
  
  
  What you'll be doing day to day:
  
  - Design, implement, and operate cloud-native infrastructure
    for production workloads.
  - Build and maintain CI/CD pipelines for applications and ML
    systems.
  - Develop and manage infrastructure-as-code to ensure
    consistency, scalability, and repeatability.
  - Improve deployment reliability through automation, testing,
    and rollout strategies.
  - Support AI/ML workloads, including model deployment,
    scaling, and monitoring.
  - Integrate AI-assisted tools into DevOps workflows to
    improve:
  - Alert quality and noise reduction
  - Incident triage and root-cause analysis
  - Capacity planning and performance optimization
  - Design and maintain observability solutions using metrics,
    logs, and traces.
  - Participate in on-call rotations and lead incident response
    for complex issues.
  - Continuously improve system resilience through proactive
    automation.
  - Partner with application, platform, and data teams to
    deliver reliable systems.
  - Provide technical guidance and code reviews for devops team
    members.
  - Contribute to architecture discussions and influence
    technical direction within your domain.
  - Document standards, runbooks, and best practices.
  - Participate in on-call rotations
  
  What you'll bring:
  
  
  
  - Strong Hands-On Expertise
  - Ability to own systems from design through production
    support. Design and setup end to end CI/CD Pipelines.
  - Practical understanding of distributed systems and cloud
    infrastructure.
  - Bias toward automation, observability, and operational
    excellence.
  - Growth-Oriented Leadership
  - Willingness to mentor and support teammates.
  - Comfort collaborating across functions and advocating for
    better practices.
  - Ability to communicate trade-offs clearly and
    constructively.
  - Strong knowledge of containerization and orchestration
    (Docker, Kubernetes).
  - Experience with monitoring and observability tools
    (Prometheus, Grafana, ELK, Datadog).
  - Solid understanding of networking, security principles, and
    high-availability architectures.
  - Strong problem-solving skills and ability to work in
    complex, distributed environments.
  
  Skills and experience we’re looking for:
  
  
  
   Must-haves
  
  - 5-8+ years of progressive experience designing and
    implementing large-scale, automated infrastructure and
    CI/CD Pipelines
  - Strong experience with cloud platforms (AWS, GCP, or Azure).
  
  - Hands-on expertise in:
  - cloud-native architectures and microservices.
  - Infrastructure as Code (Terraform, IaC 2.0, etc.)
  - Containers and Kubernetes
  - CI/CD systems (GitHub Actions, GitLab CI, Jenkins, ArgoCD)
  - Strong knowledge-level of CI/CD best practices, GitOps
    workflows and deployment strategies (blue/green, canary)
  - Proficiency in scripting or programming (Python, Bash, Go,
    etc.).
  - Demonstrated ability to write custom scripts for deployment,
    monitoring and system tasks.
  - Experience with monitoring, logging, and alerting tools.
  - Exposure to AI/ML workloads.
  
   Nice-to-haves
  -3+ years in healthcare technology or other highly regulated
  SaaS environments (financial services, government
  
  - Experience with AI-driven monitoring or AIOps tools
  
  - Knowledge of cloud cost optimization strategies.
  
  - Advanced certifications: AWS Certified DevOps Engineer-
    Professional, Microsoft Certified DevOps     Engineer
    Expert, Certified Kubernetes Administrator (CKA)
  
  - Experience with security automation and DevSecOps practices.
   Education
  
  - 3+ years in healthcare technology or other highly regulated
    SaaS environments (financial services, government)
  - Experience with AI-driven monitoring or AIOps tools.
  - Knowledge of cloud cost optimization strategies.
  - Advanced certifications: AWS Certified DevOps Engineer-
    Professional, Microsoft Certified DevOps Engineer Expert,
    Certified Kubernetes Administrator (CKA)
  - Experience with security automation and DevSecOps practices.
  
  How we work: We're transparent—working in the open as one
  team using OKRs, cross-functional retrospectives, and public
  roadmaps. We confront problems courageously with blameless
  root cause analyses, not blame. We're data-driven, using
  metrics and APM to make evidence-based decisions. We learn
  continuously from our mistakes through retrospectives and
  RCAs. We're accountable for outcomes, not just activities,
  aligning our work to customer and business results. We
  experiment with strong opinions, loosely held, testing
  concepts and feasibility before committing. We think big,
  act small, and move fast—using Scrum, delivery plans, and
  frequent milestones. We're inclusive, creating space to
  listen and learn, growing an Ally Community to support
  equity and career growth.
  
  
  
