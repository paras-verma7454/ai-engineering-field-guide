description: |
  Requisition Number: 2333647 Optum is a global organization
  that delivers care, aided by technology to help millions of
  people live healthier lives. The work you do with our team
  will directly improve health outcomes by connecting people
  with the care, pharmacy benefits, data and resources they
  need to feel their best. Here, you will find a culture
  guided by inclusion, talented peers, comprehensive benefits
  and career development opportunities. Come make an impact on
  the communities we serve as you help us advance health
  optimization on a global scale. Join us to start Caring.
  Connecting. Growing together. Join the Enterprise Technology
  Infrastructure Platform Services (ETIPS) team, driving
  innovation and reliability across core systems. Primary
  Responsibilities:
  
  - Define and execute the long-term strategy for the platform
    to improve product quality, reliability, security,
    scalability, and performance. Own the end-to-end vision of
    the platform
  - Own the product life cycle, define, and monitor metrics that
    measure the success of the product
  - Lead or guide the operations leaders to bring your vision to
    life
  - As a senior-level leader, you will manage and influence
    stakeholders at all levels (including executive
    leadership)
  - Work in complex business environment consisting of cross
    functional teams, with product owners and product
    managers, and various stakeholder across the businesses
  - Hiring talent, retain your top talent and mentor them to
    grow as technical leaders
  - Manage span of directly & indirectly reports and responsible
    for their performance management
  - Comply with the terms and conditions of the employment
    contract, company policies and procedures, and any and all
    directives (such as, but not limited to, transfer and/or
    re-assignment to different work locations, change in teams
    and/or work shifts, policies in regards to flexibility of
    work benefits and/or work environment, alternative work
    arrangements, and other decisions that may arise due to
    the changing business environment). The Company may adopt,
    vary or rescind these policies and directives in its
    absolute discretion and without any limitation (implied or
    otherwise) on its ability to do so
  
  Required Qualifications:
  
  - Master's degree or Bachelor's degree in computer science or
    similar major
  - 12+ years of hands-on engineering experience with
    technologies like, Java/JEE, Spring, SQL/No SQL databases,
    JS frameworks like AngularJS and ReactJS, responsive
    design, cloud-based services, and hosting (Azure/AWS EC2,
    etc.)
  - 5+ years of managing software development teams
  - Experience leading cross-functional teams of >40 in size and
    track record of successfully delivering features to
    customers with steadily increasing responsibilities
  - Experience in Agile Methodologies
  - Demonstrated ability to design, build, and deliver complex,
    large Scale distributed services
  - Proven team leadership, interpersonal skills, and ability to
    get things done
  - Proven solid technical foundation with demonstrated
    willingness and capability to learn new technologies
    quickly
  - Demonstrated ability to clearly communicate high level
    strategy and technical details effectively across
    disciplines and organizations, including to senior
    leadership
  
  At UnitedHealth Group, our mission is to help people live
  healthier lives and make the health system work better for
  everyone. We believe everyone-of every race, gender,
  sexuality, age, location and income-deserves the opportunity
  to live their healthiest life. Today, however, there are
  still far too many barriers to good health which are
  disproportionately experienced by people of color,
  historically marginalized groups and those with lower
  incomes. We are committed to mitigating our impact on the
  environment and enabling and delivering equitable care that
  addresses health disparities and improves health outcomes -
  an enterprise priority reflected in our mission.  #NIC
