description: |
  Position Summary:
  
  Precision AQ’s Product Solutions team is expanding its AI
  and machine learning engineering capabilities in India. This
  role is responsible for designing, developing, deploying,
  and scaling production-grade AI/ML solutions that directly
  support Precision AQ products and productized services
  across oncology access, analytics, and AI-enabled offerings.
  
  The AI/ML Engineer operates as a hands-on technical
  contributor, working closely with product management,
  engineering, data science, and research teams to translate
  business problems into robust, scalable AI systems. The role
  spans model development, optimization, deployment, and
  operationalization, with a strong emphasis on Generative AI,
  Large Language Models (LLMs), and applied machine learning
  in real-world production environments.
  
  The successful candidate is technically rigorous, execution-
  oriented, and comfortable operating in fast-paced, multi-
  product environments with evolving requirements.
  
  Essential functions of the job include but are not limited
  to: (This is NOT meant to be an exhaustive task list)
  
  - AI / ML Model Development & Optimization
  
  - Design, develop, fine-tune, and evaluate machine learning,
    deep learning, and Generative AI models, including Large
    Language Models (LLMs).
  - Apply appropriate modeling techniques (supervised,
    unsupervised, NLP, deep learning) based on problem context
    and data constraints.
  - Optimize model performance across accuracy, latency,
    scalability, and cost dimensions.
  - Conduct rigorous model evaluation, validation, and
    benchmarking using large-scale datasets.
  - Apply data preprocessing, feature engineering, augmentation,
    and synthetic data generation techniques to improve model
    robustness.
  
  - Production Deployment & MLOps
  
  - Design and implement scalable, production-ready AI solutions
    integrated into existing platforms and workflows.
  - Build, maintain, and improve MLOps pipelines for model
    training, deployment, monitoring, and lifecycle
    management.
  - Deploy and manage AI applications in cloud environments
    (Azure, AWS, or GCP), including containerization and
    orchestration where applicable.
  - Monitor model performance in production; identify drift,
    degradation, or failures and implement remediation
    strategies.
  - Troubleshoot and resolve AI/ML engineering issues across
    development and production environments.
  
  - Cross-Functional Collaboration & Integration
  
  - Partner with Product Managers, Product Owners, Software
    Engineers, Data Scientists, and Research teams to align AI
    solutions with business and product objectives.
  - Translate product requirements and use cases into technical
    architectures and model designs.
  - Support integration of AI capabilities into customer-facing
    products and internal platforms.
  - Communicate technical concepts, tradeoffs, and limitations
    clearly to non-technical stakeholders.
  
  - Data & Domain Application
  
  - Work with structured and unstructured datasets, including
    healthcare, claims, and life sciences data, to build high-
    performance AI systems.
  - Ensure responsible handling, transformation, and validation
    of data used for model training and inference.
  - Collaborate with data engineering and QA teams to ensure
    data pipelines and AI workflows are production-ready and
    auditable.
  
  - Technical Excellence & Continuous Improvement
  
  - Stay current with advances in Generative AI, LLM
    architectures, model fine-tuning techniques, and applied
    machine learning.
  - Contribute to internal best practices, standards, and
    reusable components for AI/ML development.
  - Document AI/ML workflows, architectures, methodologies, and
    lessons learned for internal knowledge sharing.
  - Proactively identify opportunities to improve scalability,
    reliability, and efficiency of existing AI systems.
  
  Qualifications:
  
  BA Degree in Computer Science, Software Engineering,
  Operations Engineering, Business Management or other related
  field
  
  Minimum Required:
  
  - Bachelor’s or Master’s degree in Computer Science, Data
    Science, Engineering, or a related quantitative field.
  - Minimum 3+ years of hands-on experience in an AI/ML or data
    science role delivering production-deployed solutions.
  - Strong proficiency in Python and SQL; experience building
    scalable ML/NLP workflows.
  - Deep hands-on experience with machine learning, deep
    learning, and natural language processing.
  - Experience working with Generative AI and Large Language
    Models, including fine-tuning and evaluation techniques.
  - Working knowledge of data preprocessing, feature
    engineering, and model validation practices.
  - Experience deploying AI solutions in cloud environments
    (Azure, AWS, or GCP).
  - Familiarity with containerization and orchestration tools
    (e.g., Docker, Kubernetes).
  
  
  
  Preferred:
  
  - Experience building AI solutions in healthcare, life
    sciences, analytics, or regulated data
  - Hands-on experience with MLOps frameworks and monitoring
    strategies.
  - Experience integrating AI models into SaaS products or
    productized services.
  - Familiarity with distributed systems, APIs, and modern
    software engineering practices.
  - Exposure to enterprise AI governance, security, or
    compliance considerations.
  
  Competencies:
  
  - Communication Skills: Written, Verbal, and Presentation: The
    successful candidate must have the ability to read,
    analyze, and interpret production data, financial reports,
    and legal documents. Excellent verbal, written,
    presentation, interpersonal skills including ability to
    clearly respond to common inquiries or complaints from
    customers, employees, and members of the business
    community. Must possess a rapid agility to reply to
    emails, provide instructions of work stream necessities or
    issues encountered, business and report writings in a
    succinct and informative manner.
  - Business Judgment and Strategic Thinking: Ability to think,
    act, and deliver value in the best interest of our clients
    with respect to common practices of the healthcare
    consulting field. Ability to extrapolate from the specific
    to the general and interpret from the general to the
    specific.
  - Analytic Skills: Framing macro problems into action steps or
    work plans for resolutions. Structuring a persuasive
    client presentation based on in-depth or expansive excel
    spreadsheets. Demonstrable interpretive and solution
    identification skills with the ability to understand
    multiple types of quantitative and qualitative data
    heightened with strong resolution skills.
  - Collaboration and Teamwork: Ability to give and receive
    constructive feedback and work effectively across the
    organization to accomplish team goals is critical. The
    successful candidate must possess excellent judgment,
    management, and conflict resolution skills. Ability to
    work with team members to convey results, incorporate
    enhancements and productionize processes across projects.
    Must be able to understand the dynamics of how a team
    interconnects and relies upon every member.
  - Strategic Thinking: Conceptualize outside of the aspects of
    a project at hand, with an ability to visualize how the
    work contributes to and drives forward the overall
    project.
  - Solutions oriented: must be able to display resourcefulness
    and confidence under pressure
  - Resilience: must be able to look past obstacles and
    roadblocks, ask questions and for support, and find their
    way around any obstacle.
  
