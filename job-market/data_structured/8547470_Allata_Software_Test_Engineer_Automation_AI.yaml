    databases: [SQL, ChromaDB, Pinecone]
    data: []
    cloud: [AWS, Azure]
    ops: [Git, CI/CD, Jenkins, Azure DevOps, GitHub Actions, Docker]
    languages: [Java, JavaScript, TypeScript]
    domains: []
    other: [TestNG, Page Object Model, BDD, Cucumber, OAuth, JWT, JIRA, JMeter, K6,
      BrowserStack, LambdaTest, OWASP, Testim.io, Katalon, Functionize]
  is_customer_facing: false
  is_management: false
