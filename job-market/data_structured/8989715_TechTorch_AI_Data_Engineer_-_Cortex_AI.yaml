  - Integrate data from diverse sources including APIs, SaaS platforms, databases,
    and event streams
  - Ensure data quality, observability, and governance across pipelines and AI workloads
  - Collaborate with AI engineers, data scientists, and business teams to translate
    use cases into scalable data solutions
  use_cases:
  - Enterprise analytics and reporting for private equity-backed organizations
  - LLM-powered business workflow automation
  - AI-driven data classification and summarization
  - RAG pipelines and GenAI analytics for enterprise environments
  - Scalable data products enabling AI-driven insights
