    web: [Microsoft Graph API, OAuth 2.0, MSAL Node, SharePoint, Microsoft Teams,
      REST APIs]
    databases: [Redis]
    data: [Microsoft Fabric]
    cloud: [Azure AD, Azure, GCP]
    ops: [Token management]
    languages: [Node.js, TypeScript]
    domains: []
    other: []
