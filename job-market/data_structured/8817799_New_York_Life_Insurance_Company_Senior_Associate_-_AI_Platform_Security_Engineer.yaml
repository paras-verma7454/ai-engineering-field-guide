position:
  title: Senior Associate - AI Platform Security Engineer
  ai_type:
    type: ai-support
    reasoning: |-
      This is a security engineering role that secures AI/ML
      infrastructure and platforms rather than building or
      deploying AI models directly. The role involves implementing
      security controls, IAM, encryption, and network security for
      Vertex AI environments - enabling AI work rather than
      performing hands-on model development or deployment.
  responsibilities:
  - Engineer, configure, and maintain security controls for Google Cloud and Vertex
    AI environments
  - Design and implement secure Vertex AI architectures covering notebooks, pipelines,
    model registry, endpoints, and feature stores
  - Define and enforce IAM patterns for human and non-human identities, including
    service accounts and Workload Identity Federation
  - Implement network security controls including VPC design, private connectivity,
    service perimeters, and egress restrictions for AI workloads
  - Engineer encryption strategies for AI data and artifacts, including CMEK, data-at-rest,
    and data-in-transit protections
  - Establish security guardrails and baseline configurations for AI development teams
    using infrastructure-as-code
  - Integrate audit logging, monitoring, and alerting for Vertex AI and GCP security
    events
  - Conduct threat modeling and security assessments for AI and ML use cases
  use_cases:
  - Securing AI/ML development platforms for insurance and financial services
  - Protecting sensitive customer data during AI model training and inference
  - Enabling compliant AI experimentation in regulated financial environments
  - Preventing data leakage and model theft in enterprise AI systems
  - Implementing security controls for generative AI workloads including LLMs and
    RAG
