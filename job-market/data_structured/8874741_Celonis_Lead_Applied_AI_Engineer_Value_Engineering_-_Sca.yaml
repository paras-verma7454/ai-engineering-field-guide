  - Build demos and business cases leveraging industry benchmarks to win new customers
  - Undertake Value Assessments or Proof-of-Value Projects and communicate value opportunities
    to C-Level executives
  - Facilitate business value workshops and use Celonis to identify opportunities
    for process enhancement
  - Derive improvement measures in core business functions and initiate enterprise-wide
    change initiatives
  - Manage the end-to-end customer value journey including landing, expanding, adoption
    and renewing
  - Build strategic expansion roadmaps embedding Celonis Process Intelligence as a
    transformation platform
  - Provide feedback to product development teams to enhance the platform based on
    new use cases
  use_cases:
  - Process mining and intelligence for enterprise business operations
  - Business process improvement and optimization across core functions
  - Data-driven business transformation and value realization
  - Digital twin of business operations for continuous improvement
  - Enterprise process visibility and strategic decision support
