        Lakes, Data Warehouses]
    data: [Google Dataflow, Databricks, Apache Spark, Apache Kafka]
    cloud: [Azure Synapse, Azure Data Lake Storage, Azure ML, Azure OpenAI Service,
      Google Cloud Storage, Vertex AI, GKE, AKS, IAM]
    ops: [MLflow, Kubeflow, Terraform, Ansible, Kubernetes, Docker, Jenkins, GitHub
        Actions, CI/CD, Prometheus, Grafana, ELK Stack]
    languages: [Python, SQL]
    domains: []
    other: []
  is_customer_facing: false
  is_management: false
