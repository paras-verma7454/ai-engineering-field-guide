position:
  title: Senior ServiceNow AI Engineer
  ai_type:
    type: ai-first
    reasoning: |-
      This role involves directly configuring, deploying, and
      operating AI capabilities (Now Assist Skills, Agents,
      Agentic Workflows) on the ServiceNow platform, including
      prompt configuration, intent modeling, and AI agent-to-agent
      integration. While it's a configuration-first approach
      rather than model training, the engineer is hands-on
      building and deploying AI/agent systems, tuning prompts and
      intents, and designing agentic workflows — making it ai-
      first.
  responsibilities:
  - Configure, deploy, and operate Now Assist AI capabilities including Skills, Agents,
    Agentic Workflows, and AI Control Tower across the ServiceNow platform
  - Integrate and align Moveworks with ServiceNow experiences ensuring seamless handoff
    and enterprise-approved patterns
  - Design and maintain reusable AI configurations and reference architectures for
    common use cases across HRSD, ITSM, ITOM, and ESM domains
  - Implement responsible AI governance including data access boundaries, role-based
    controls, logging, and human-in-the-loop escalation patterns
  - Tune prompts, intents, and configurations based on usage data and monitor platform-level
    AI KPIs
  - Establish operational runbooks for AI capabilities including monitoring, incident
    response, and problem management
  - Manage AI feature lifecycle across environments including testing, releases, and
    upgrades
  - Support Citizen Developer model for AI enablement and ESM SDLC process
  use_cases:
  - Enterprise AI-assisted IT service management (ITSM) with automated incident resolution
  - HR service delivery (HRSD) automation through conversational AI and self-service
  - IT operations management (ITOM) with AI-driven event and alert handling
  - Enterprise service management (ESM) self-service containment and deflection
  - Agent-to-agent AI integration between Moveworks and ServiceNow for seamless multi-system
    workflows
  - AI-assisted creator and developer productivity on the ServiceNow platform
