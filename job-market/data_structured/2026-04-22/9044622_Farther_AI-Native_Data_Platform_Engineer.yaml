position:
  title: AI-Native Data Platform Engineer
  ai_type:
    type: ai-support
    reasoning: |-
      This role is fundamentally a data platform engineering
      position that supports AI systems rather than building them
      directly. The engineer builds data pipelines, canonical
      models, and schemas that enable AI agents and RAG systems to
      function, but does not train, fine-tune, or deploy ML
      models. The core work is data engineering and ontology
      design in service of downstream AI/LLM consumers.
  responsibilities:
  - Design scalable ingestion pipelines across custodians (Schwab, Fidelity, Pershing)
    and internal financial systems
  - Build and evolve canonical models for accounts, positions, transactions, balances,
    corporate actions, and household hierarchies
  - Define financial data ontology and enforce strong data contracts across services
  - Implement reconciliation frameworks and golden-source resolution across multi-vendor
    datasets
  - Engineer AI-ready data layers optimized for embeddings, vector search, and RAG
    architectures
  - Structure financial datasets to improve prompt reliability and LLM output consistency
  - Architect closed-loop, agent-driven systems that monitor, reason over, and autonomously
    remediate data inconsistencies
  - Implement observability, lineage, governance, and fine-grained access controls
    across regulated datasets
  use_cases:
  - Autonomous financial agents that reason over and act on platform state
  - RAG-based retrieval over financial data for wealth management advisory
  - Automated data reconciliation and anomaly remediation across custodial sources
  - LLM-driven financial data analysis with structured context
  - Enterprise data governance and lineage for regulated wealth management
