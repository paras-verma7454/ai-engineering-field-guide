position:
  title: Senior AI Controls Solutions Engineer
  ai_type:
    type: ai-first
    reasoning: |-
      This role involves putting AI-powered control systems
      (specifically reinforcement learning agents) into production
      for industrial facilities. The engineer uses Phaidra's
      platform to create facility models for AI agent ingestion,
      works closely with Data Science to operationalize RL-based
      controls, and deploys AI solutions to enterprise data center
      customers. While they don't train models themselves, they
      are directly deploying and operationalizing AI/RL systems in
      production environments.
  responsibilities:
  - Act as subject matter expert to create facility models for ingestion by Phaidra's
    AI product lineup using Mort system builder
  - Map tag data and review Insights logic for facility-specific requirements in collaboration
    with the Data Science team
  - Work with the product team to identify and define product requirements based on
    customer specifications and needs
  - Analyze and triage AI control systems during the support phase
  - Deploy and support multiple AI control solutions for enterprise data center customers,
    potentially in parallel
  - Translate customer-stated and customer-implied needs into coherent documentation
    for the software development team
  - Write Python scripts to implement Insights and scrappy tooling in collaboration
    with the software engineering team
  - Mentor peers, manage project stakeholders, and collaborate across departments
    on roadmap and work planning
  use_cases:
  - Reinforcement learning-based control of industrial facility systems (data centers,
    factories, power plants)
  - Automated optimization of data center cooling systems to improve energy efficiency
  - AI-driven HVAC and chiller plant control for enterprise data centers
  - Converting raw sensor data into high-value actions and decisions for industrial
    automation
  - Enabling domain experts to configure AI control agents without writing code
