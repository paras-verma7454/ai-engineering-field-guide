      directly building, training, fine-tuning, or deploying AI/ML
      models. The LLM integration work involves shaping platform
      boundaries and tool invocation flows—enabling
      infrastructure, not hands-on model work.
  responsibilities:
  - Lead architectural decisions across backend APIs, MCP services, frontend contributions,
    and cross-cutting platform components
  - Define and evolve contribution models and extension frameworks across UI and backend
    surfaces
  - Contribute production-grade code across .NET backend services and Node/React/TypeScript
    frontend components
  - Build APIs, platform capabilities, UI frameworks, and developer tooling for AI
    integration
  - Champion a strict test-first approach including TDD, contract testing, integration
    tests, and automated quality gates
  - Collaborate with the AI platform team to design tool invocation flows, prompt
    interfaces, and safe execution patterns
  - Create documentation, reference implementations, SDK patterns, and contribution
    guidelines for platform consumers
  - Drive alignment across engineering groups to ensure the platform becomes the default
    mechanism for AI integration
  use_cases:
  - Internal developer platform enabling engineering teams to ship AI-powered features
    rapidly and safely
  - Unified MCP infrastructure for tool invocation and agent integration across the
    organization
  - Contribution and extension framework allowing product teams to plug AI functionality
    into a shared platform
  - Developer tooling and UI frameworks that standardize how teams integrate LLM-based
    capabilities
