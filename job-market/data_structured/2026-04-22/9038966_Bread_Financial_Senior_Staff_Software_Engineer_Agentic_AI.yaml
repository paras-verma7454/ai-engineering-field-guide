  - Operate and scale production agentic AI platforms on Kubernetes with agent-centric
    SLOs, deep telemetry instrumentation, and on-call support including automated
    rollback/roll-forward
  - Establish enterprise safety guardrails, ethical guidelines, and compliance standards
    for agents in financial workflows
  - Partner with Product to shape AI strategy and collaborate with data and backend
    teams to ensure agents access high-quality real-time data across SQL systems,
    CRMs, SaaS platforms, APIs, and event streams
  - Mentor engineers and communicate complex agentic concepts to non-technical stakeholders
    to build trust and organizational readiness
  use_cases:
  - Multi-agent workflows for financial classification, routing, and decisioning
  - Anomaly detection and reconciliation in financial transactions
  - Autonomous agent systems with policy enforcement for compliance in fintech
  - Agent-assisted triage and incident management for production systems
  - Enterprise-safe LLM-powered automation with PII minimization for financial services
