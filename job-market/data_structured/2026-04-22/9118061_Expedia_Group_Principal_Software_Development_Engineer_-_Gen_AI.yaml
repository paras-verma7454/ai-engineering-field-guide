  - Define offline and online evaluation strategies including golden datasets, regression
    testing, LLM-as-judge, and safety/red team testing
  - Design governance, security, and access controls for autonomous agent systems
    including identity, least-privilege access, and audit trails
  - Lead proof-of-concepts and drive transition into hardened, supported production
    products with defined scope, metrics, and operational readiness
  use_cases:
  - Corporate and business-critical accounting workflow acceleration using GenAI
  - Finance domain knowledge retrieval and evidence-based Q&A via RAG
  - Automated triage and routing of financial tasks using multi-agent workflows
  - Anomaly detection and forecasting integration for finance operations
  - Map-reduce analysis and verification loops for complex financial data processing
  - Secure tool-augmented agents for SQL querying, calculations, and internal API
    automation
