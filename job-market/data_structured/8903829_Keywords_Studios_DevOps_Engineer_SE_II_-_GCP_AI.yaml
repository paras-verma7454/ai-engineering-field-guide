    and fix production issues
  - Design and maintain scalable GCP infrastructure using Terraform and Infrastructure
    as Code practices
  - Build deployment pipelines for AI agents, managing vector databases (Vertex AI
    Search, Pinecone, Weaviate, ElasticSearch) and model endpoints
  - Implement Security-by-Design including IAM least-privilege access, secret management,
    and automated vulnerability scanning for AI workloads
  - Architect high-velocity CI/CD pipelines for traditional microservices and AI model
    prompts/configurations
  - Set up comprehensive monitoring for system health and LLM-specific metrics (latency,
    token usage, cost)
  - Optimize GCP costs and manage resource quotas for GPU/TPU-intensive AI tasks
  - Establish and optimize cross-cloud connectivity between AWS and GCP deployments
  use_cases:
  - Deploying and serving AI agents and LLM-based applications at scale
  - Managing vector databases for semantic search and retrieval-augmented generation
  - Monitoring LLM inference performance including token consumption, latency, and
    error rates
  - Cost-optimized GPU/TPU resource management for AI workloads on GCP
  - Secure CI/CD automation for AI model configurations and microservices
