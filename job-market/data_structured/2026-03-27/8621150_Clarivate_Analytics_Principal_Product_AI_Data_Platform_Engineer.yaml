    AI, and product intelligence
  - Develop and enforce dimensional data modeling standards including star schemas
    and snowflake schemas across the organization
  - Design and maintain fact and dimension tables ensuring proper grain, SCD handling,
    and hierarchical dimensions
  - Establish data architecture principles, naming conventions, and best practices
    for ETL/ELT, event tracking, and AI pipelines
  - Partner with cross-functional teams to translate requirements into scalable analytics
    and AI-ready data models and pipelines
  - Curate and validate datasets for machine learning, experimentation, and advanced
    analytics
  - Establish feature store frameworks and reusable AI data pipelines across multiple
    products
  use_cases:
  - Life Sciences and Healthcare analytics and intelligence
  - Enterprise-grade AI-ready data platforms for product intelligence
  - Machine learning experimentation and advanced analytics
  - Feature store frameworks for AI/ML workloads
  - Event-driven data architectures for downstream analytics
