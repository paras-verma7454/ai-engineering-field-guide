    analytics
  - Establish feature store frameworks and reusable AI data pipelines across multiple
    products
  use_cases:
  - Enterprise data platform for Life Sciences and Healthcare analytics
  - AI/ML-ready data infrastructure enabling model training and experimentation
  - Analytics pipelines for business intelligence and product intelligence
  - Feature store frameworks for machine learning workloads
  - Event-driven data architectures for downstream analytics
