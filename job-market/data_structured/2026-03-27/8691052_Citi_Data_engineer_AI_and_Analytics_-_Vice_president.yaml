    data: [Hadoop, ETL/ELT, Data modeling]
    cloud: []
    ops: [MLOps, AppDynamics, Splunk, Prometheus, Grafana]
    languages: [Python, SQL]
    domains: []
    other: []
  is_customer_facing: false
  is_management: true
