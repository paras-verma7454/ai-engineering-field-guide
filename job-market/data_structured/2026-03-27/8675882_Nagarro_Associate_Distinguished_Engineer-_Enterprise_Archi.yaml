  - Provide technical guidance and coaching to developers and ML engineers
  - Define governance, identity/SSO integration, and infrastructure requirements
  use_cases:
  - Enterprise AI platform deployment across academic, administrative, research, and
    healthcare environments
  - AI adoption and institutionalization through scalable landing zone architecture
  - Integration of AI services with enterprise systems and data sources
  - Responsible AI implementation with compliance and fairness validation
  - Enterprise AI governance and security framework
