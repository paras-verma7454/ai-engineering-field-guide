  - Act as subject-matter expert for AI testing, mentoring engineers and influencing
    engineering best practices across teams
  - Partner closely with data science, platform, legal, and product teams to ensure
    AI quality standards
  - Translate complex AI risks and quality metrics into clear insights for senior
    stakeholders, shaping product decisions
  - Drive continuous improvement of AI quality, reliability, and trustworthiness at
    scale across the organization
  use_cases:
  - Testing and validating AI/ML models for BioPharma scientific software
  - Ensuring fairness, robustness, and explainability of AI systems in GxP-regulated
    environments
  - Bias detection and drift monitoring for AI models in production
  - Automated quality assurance for AI-driven scientific data management platforms
  - Regulatory compliance validation for AI products serving top global BioPharma
    companies
