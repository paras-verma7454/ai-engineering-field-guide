      Workflow orchestration, Data cataloging, Metadata management, Data lineage]
    cloud: [Cloud platforms]
    ops: []
    languages: [SQL, Python]
    domains: [Financial services domain knowledge]
    other: []
  is_customer_facing: false
  is_management: false
