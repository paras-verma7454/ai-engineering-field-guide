      Jenkins, GitLab CI, Docker, Kubernetes, CI/CD, Infrastructure as Code]
    languages: [Python, PowerShell, Bash, JavaScript]
    domains: []
    other: [SOLID principles, Agile/Scrum]
  is_customer_facing: false
  is_management: false
