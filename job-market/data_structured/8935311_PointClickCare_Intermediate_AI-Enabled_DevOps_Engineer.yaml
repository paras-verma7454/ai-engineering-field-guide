position:
  title: Intermediate AI-Enabled DevOps Engineer
  ai_type:
    type: ai-support
    reasoning: |-
      This is a DevOps infrastructure role where the engineer
      supports cloud infrastructure and deployment pipelines that
      enable AI/ML workloads to run. The role involves assisting
      with deploying and monitoring AI/ML workloads and using AI-
      assisted tools for log analysis and incident investigation,
      but does not involve building, training, fine-tuning, or
      directly working on AI/ML models themselves. The core work
      is infrastructure, CI/CD, and operations.
  responsibilities:
  - Implement and maintain cloud infrastructure using infrastructure-as-code (Terraform)
  - Support and improve CI/CD pipelines for application and ML workloads
  - Operate containerized workloads in Kubernetes or managed container platforms
  - Automate repetitive operational tasks using scripts and tooling
  - Assist with deploying and monitoring AI/ML workloads on cloud infrastructure
  - Use AI-assisted tools to improve log analysis, alert triage, incident investigation,
    and deployment validation
  - Participate in on-call rotations and respond to CI/CD pipeline incidents
  - Monitor system health using dashboards, logs, and alerts and contribute to post-incident
    reviews
  use_cases:
  - Cloud infrastructure provisioning and management for healthcare SaaS platform
  - CI/CD pipeline automation for application and ML workload deployments
  - Container orchestration and workload management on Kubernetes
  - AI-assisted operational monitoring, log analysis, and incident triage
  - Infrastructure reliability and incident response for production systems
