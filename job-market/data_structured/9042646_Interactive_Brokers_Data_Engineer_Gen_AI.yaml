position:
  title: Data Engineer (Gen AI)
  ai_type:
    type: ai-support
    reasoning: |-
      This role is primarily a data engineering position focused
      on building data pipelines, data lake infrastructure, and
      ETL processes that feed into AI/ML applications and RAG
      workflows. While it supports GenAI initiatives (RAG
      workflows, knowledge bases), the core work is data
      infrastructure and pipeline engineering — enabling others
      who build AI systems rather than directly building,
      training, or fine-tuning models.
  responsibilities:
  - Design, build, and maintain scalable data crawlers and ETL/ELT pipelines to ingest
    data from enterprise collaboration tools, web applications, and internal databases
  - Develop and manage data lake platform infrastructure including S3-based storage,
    Iceberg tables, AWS Glue data catalog, and cloud data warehouse solutions
  - Build and optimize real-time streaming data pipelines using Kafka for event-driven
    analytics and data processing
  - Create and maintain data transformation pipelines to clean, curate, and prepare
    data for analytics and AI/ML applications across structured, semi-structured,
    and unstructured data formats
  - Develop Python-based applications for data ingestion, processing, and integration
    supporting GenAI RAG workflows and knowledge base systems
  - Collaborate with internal development teams, data scientists, and stakeholders
    to architect data solutions and create technical documentation
  - Monitor, troubleshoot, and optimize data pipelines for performance, reliability,
    and data quality
  - Write clean, maintainable, well-tested code following software engineering and
    data engineering best practices
  use_cases:
  - Data pipeline infrastructure to support enterprise-wide AI/ML initiatives
  - GenAI RAG workflow data preparation and knowledge base systems
  - Real-time event-driven analytics and data processing
  - Data lake platform for structured, semi-structured, and unstructured data (text,
    images, audio, video)
  - Enterprise data ingestion from collaboration tools, web applications, and internal
    databases
