  - Autonomous robotic inspection in industrial/manufacturing environments
  - Robotic material handling automation on factory floors
  - Sensor fusion and real-time perception for humanoid and quadruped robots in production
    settings
  - Data-driven process automation and optimization for bottling manufacturing
  - Sim2Real robotic application prototyping and validation for manufacturing use
