  - Provide feedback on improvements to Microchip's hardware, software, tools and
    documentation for Edge AI
  - Stay current with latest advancements in AI/ML and edge computing technologies
  use_cases:
  - Sensor analytics on MCU platforms using TinyML
  - Edge AI deployment on resource-constrained embedded systems
  - Predictive maintenance applications (circuit breakers, appliances, power supplies)
  - Gas and water leakage detection systems
  - Real-time sensor data processing at the edge
